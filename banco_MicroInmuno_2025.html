dos derivados de procesamiento citos\u00f3lico.","Se localiza al lado de la HLA-I en la superficie celular."],"c":3,"e":"La <b>cadena invariante (Ii)</b> ocupa el surco de la <b>HLA-II</b> en el RE, impidiendo que capte p\u00e9ptidos citos\u00f3licos. Se degrada en el endosoma liberando el surco para p\u00e9ptidos ex\u00f3genos."},{"n":"28","noShuffle":false,"img":null,"q":"El feto no genera rechazo en la madre ya que:","o":["Comparte con ella la mitad de su c\u00f3digo gen\u00e9tico.","Los trofoblastos producen una cantidad elevada de TNF-alfa.","Los trofoblastos expresan elevadas cantidades de HLA-II.","En la localizaci\u00f3n anat\u00f3mica del feto existe una elevada inmunosupresi\u00f3n local."],"c":4,"e":"El feto tolera la respuesta materna gracias a <b>inmunosupresi\u00f3n local</b>: linfocitos Treg, IL-10, TGF-\u03b2 y falta de expresi\u00f3n de HLA cl\u00e1sicos en trofoblastos (expresan HLA-G no inmunog\u00e9nico)."},{"n":"29","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes caracter\u00edsticas corresponde a un ant\u00edgeno T-independiente?","o":["Genera una elevada memoria.","Necesitan que el linfocito CD4+ interaccione con el linfocito B para activar la producci\u00f3n de anticuerpos.","El linfocito B puede reconocerlo directamente.","Se relaciona con la producci\u00f3n de los 5 isotipos de inmunoglobulinas."],"c":3,"e":"Los ant\u00edgenos <b>T-independientes</b> son reconocidos directamente por el linfocito B <b>sin necesidad de TCD4+</b>. Generan principalmente IgM, poca memoria."},{"n":"30","noShuffle":false,"img":null,"q":"La secuencia contigua de amino\u00e1cidos reconocida por un anticuerpo se conoce como:","o":["Ant\u00edgeno.","Hapteno.","Ep\u00edtopo conformacional.","Ep\u00edtopo lineal."],"c":4,"e":"Un <b>ep\u00edtopo lineal (secuencial)</b> est\u00e1 formado por amino\u00e1cidos contiguos en la secuencia primaria. El ep\u00edtopo conformacional depende de la estructura terciaria."},{"n":"31","noShuffle":false,"img":null,"q":"La fase l\u00edtica de las v\u00edas del complemento:","o":["Es caracter\u00edstica de las v\u00edas cl\u00e1sica y alternativa, pero no se produce en la v\u00eda de las lectinas.","Tiene como principal componente el MAC formado por la convertasa C5.","Produce la lisis del microorganismo al favorecer un desequilibrio osm\u00f3tico.","Es id\u00e9ntica en la v\u00eda cl\u00e1sica y de las lectinas, pero diferente en la alternativa."],"c":3,"e":"El <b>MAC (C5b-9)</b> inserta un poro en la membrana del microorganismo causando <b>desequilibrio osm\u00f3tico</b> y lisis. Es com\u00fan a las tres v\u00edas del complemento."},{"n":"32","noShuffle":true,"img":null,"q":"Indica el mecanismo por el que los neutr\u00f3filos son capaces de actuar sobre los pat\u00f3genos:","o":["Fagocitosis.","Liberaci\u00f3n de gr\u00e1nulos citot\u00f3xicos.","Liberaci\u00f3n de trampas extracelulares de neutr\u00f3filos.","Todos los anteriores son correctos."],"c":4,"e":"Los <b>neutr\u00f3filos</b> combaten pat\u00f3genos por: <b>fagocitosis</b>, <b>degranulaci\u00f3n</b> y <b>NETs</b> (redes de cromatina con prote\u00ednas antimicrobianas)."},{"n":"33","noShuffle":false,"img":null,"q":"En relaci\u00f3n con la citotoxicidad producida por los linfocitos CD8+, indica la afirmaci\u00f3n CORRECTA:","o":["La perforina es un mediador de la citotoxicidad mediada por receptores.","La granzima induce la apoptosis de la c\u00e9lula diana al ser reconocida por receptores de superficie.","La citotoxicidad mediada por gr\u00e1nulos requiere de la interacci\u00f3n del ligando Fas con su receptor.","La granzima puede acceder al interior de la c\u00e9lula diana gracias a la actividad de la perforina."],"c":4,"e":"La <b>perforina</b> forma poros en la membrana de la c\u00e9lula diana, permitiendo la entrada de <b>granzimas</b> que activan caspasas e inducen <b>apoptosis</b>."},{"n":"34","noShuffle":false,"img":null,"q":"Indica el orden correcto de las fases de la fagocitosis:","o":["Quimiotaxis, adherencia y reconocimiento del ant\u00edgeno a trav\u00e9s del PAMP, ingesti\u00f3n y destrucci\u00f3n del agente extra\u00f1o, formaci\u00f3n del fagolisosoma y eliminaci\u00f3n de los productos de degradaci\u00f3n.","Quimiotaxis, adherencia y reconocimiento del ant\u00edgeno a trav\u00e9s del PAMP, ingesti\u00f3n del agente extra\u00f1o y formaci\u00f3n del fagolisosoma, destrucci\u00f3n del agente extra\u00f1o y eliminaci\u00f3n de los productos de degradaci\u00f3n.","Rodamiento, activaci\u00f3n, adhesi\u00f3n firme a c\u00e9lulas endoteliales, di\u00e1pedesis y quimiotaxis.","Activaci\u00f3n, di\u00e1pedesis, rodamiento y quimiotaxis."],"c":2,"e":"La <b>fagocitosis</b> sigue: quimiotaxis \u2192 reconocimiento/adherencia \u2192 ingesti\u00f3n (fagosoma) \u2192 fusi\u00f3n con lisosoma (fagolisosoma) \u2192 destrucci\u00f3n \u2192 eliminaci\u00f3n de restos."},{"n":"35","noShuffle":false,"img":null,"q":"Los anticuerpos anti-PD1 son prometedores como estrategia terap\u00e9utica frente a tumores. \u00bfEn qu\u00e9 se basa su mecanismo?","o":["Bloquean la inhibici\u00f3n de los linfocitos T que producen las c\u00e9lulas tumorales.","Se unen al PD-1 de c\u00e9lulas tumorales facilitando la citotoxicidad mediada por c\u00e9lulas NK.","Activan la producci\u00f3n de citocinas por linfocitos T cooperadores.","Bloquean la apoptosis de los linfocitos T."],"c":1,"e":"Los anticuerpos <b>anti-PD-1</b> bloquean la interacci\u00f3n PD-1/PD-L1, eje que usan las c\u00e9lulas tumorales para inhibir linfocitos T. Al bloquearlo, se <b>reactivan los linfocitos T</b> antitumorales."},{"n":"36","noShuffle":false,"img":null,"q":"En la citometr\u00eda de flujo:","o":["El detector FSC nos da informaci\u00f3n sobre el tama\u00f1o de la c\u00e9lula.","El detector SSC nos da informaci\u00f3n sobre la presencia de anticuerpos fluorescentes.","Podemos discriminar las c\u00e9lulas CD3+CD4+ de las CD3-CD4+ mediante un anticuerpo fluorescente.","Las c\u00e9lulas a analizar deben encontrarse sobre un soporte s\u00f3lido."],"c":3,"e":"En citometr\u00eda de flujo: FSC indica tama\u00f1o; SSC indica <b>granularidad</b>. Se pueden discriminar poblaciones con anticuerpos fluorescentes. Las c\u00e9lulas van en <b>suspensi\u00f3n</b>."},{"n":"37","noShuffle":false,"img":null,"q":"Indica cu\u00e1l de las siguientes c\u00e9lulas no tiene capacidad fagoc\u00edtica:","o":["C\u00e9lula dendr\u00edtica.","Neutr\u00f3filo.","Macr\u00f3fago.","Bas\u00f3filo."],"c":4,"e":"Los <b>bas\u00f3filos</b> no tienen capacidad fagoc\u00edtica; su funci\u00f3n principal es la desgranulaci\u00f3n (histamina, etc.) en procesos al\u00e9rgicos."},{"n":"38","noShuffle":false,"img":null,"q":"En referencia a los linfocitos B, indica la frase CORRECTA:","o":["Las c\u00e9lulas B de memoria mueren por apoptosis al cabo de unos pocos d\u00edas si no contactan con el ant\u00edgeno.","Los linfocitos B maduros v\u00edrgenes mueren r\u00e1pidamente por apoptosis tras entrar en contacto con el ant\u00edgeno.","La selecci\u00f3n clonal se activa cuando un linfocito B reconoce a un ant\u00edgeno espec\u00edfico por su BCR.","Las c\u00e9lulas plasm\u00e1ticas son c\u00e9lulas B inmaduras."],"c":3,"e":"La <b>selecci\u00f3n clonal</b> ocurre cuando el BCR reconoce espec\u00edficamente su ant\u00edgeno, activando proliferaci\u00f3n y diferenciaci\u00f3n. Las c\u00e9lulas plasm\u00e1ticas son c\u00e9lulas maduras secretoras."},{"n":"39","noShuffle":false,"img":null,"q":"Con respecto a los clusters de diferenciaci\u00f3n, \u00bfqu\u00e9 combinaci\u00f3n identifica un linfocito T citot\u00f3xico?","o":["CD3+CD4+","CD3+CD8+","CD3-CD8+","CD3-CD4-"],"c":2,"e":"Un linfocito T <b>citot\u00f3xico</b> es <b>CD3+ CD8+</b>. El CD3 est\u00e1 en todos los linfocitos T; el CD8 lo distingue de los TCD4+ cooperadores."},{"n":"40","noShuffle":false,"img":null,"q":"Las c\u00e9lulas M:","o":["Captan ant\u00edgenos procedentes de la v\u00eda digestiva y lo transportan a las Placas de Peyer.","Se consideran c\u00e9lulas presentadoras de ant\u00edgenos capaces de activar linfocitos T y B.","Son caracter\u00edsticas de los ganglios linf\u00e1ticos.","Son las encargadas de mediar la selecci\u00f3n negativa de los linfocitos B."],"c":1,"e":"Las <b>c\u00e9lulas M</b> (microfold cells) recubren las Placas de Peyer y captan ant\u00edgenos luminales, transport\u00e1ndolos por transcitosis donde se inicia la respuesta inmune intestinal."},{"n":"41","noShuffle":false,"img":null,"q":"Indica cu\u00e1les de los siguientes \u00f3rganos se consideran \u00f3rganos linfoides primarios:","o":["Timo y bazo.","M\u00e9dula \u00f3sea y bazo.","Timo y m\u00e9dula \u00f3sea.","Bazo y ganglios linf\u00e1ticos."],"c":3,"e":"Los \u00f3rganos linfoides <b>primarios</b> son el <b>timo</b> y la <b>m\u00e9dula \u00f3sea</b>. El bazo y los ganglios son \u00f3rganos secundarios."},{"n":"42","noShuffle":false,"img":null,"q":"Indica cu\u00e1l es un mecanismo de tolerancia central en el linfocito B:","o":["Selecci\u00f3n positiva.","Apoptosis.","Anergia.","Apoptosis y anergia."],"c":4,"e":"La tolerancia central de linfocitos B incluye: <b>apoptosis</b> (delecci\u00f3n de autorreactivos de alta afinidad) y <b>anergia</b> (inactivaci\u00f3n de los de moderada afinidad)."},{"n":"43","noShuffle":false,"img":null,"q":"Con respecto del sistema del complemento:","o":["La C3 convertasa de la v\u00eda alternativa es C3b3b1b.","La v\u00eda cl\u00e1sica se inicia por lisis espont\u00e1nea de C3.","Los factores B y D son caracter\u00edsticos de la v\u00eda alternativa.","C5a inicia la formaci\u00f3n del complejo de ataque a la membrana (MAC)."],"c":3,"e":"Los <b>factores B y D</b> son exclusivos de la <b>v\u00eda alternativa</b>. La v\u00eda cl\u00e1sica se inicia por complejos Ag-Ac. Es C5b (no C5a) el que inicia el MAC."},{"n":"44","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1les de los siguientes componentes forma parte de la inmunidad adquirida?","o":["Linfocito NK.","PAMP.","Neutr\u00f3filo.","Linfocito T."],"c":4,"e":"Los <b>linfocitos T</b> son c\u00e9lulas de la inmunidad <b>adaptativa (adquirida)</b>, con especificidad y memoria inmunol\u00f3gica. Los NK, neutr\u00f3filos y PAMPs pertenecen a la inmunidad innata."},{"n":"45","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de la/s siguiente/s inmunoglobulina/s no tiene/n la capacidad de neutralizar al pat\u00f3geno?","o":["IgA.","IgG.","IgE.","IgA e IgE."],"c":3,"e":"La <b>IgE</b> no tiene funci\u00f3n neutralizante directa. Su funci\u00f3n es la desgranulaci\u00f3n de mastocitos y bas\u00f3filos. IgA neutraliza en mucosas; IgG es la principal neutralizante sist\u00e9mica."},{"n":"46","noShuffle":false,"img":null,"q":"Los receptores de los linfocitos T:","o":["Se producen en la m\u00e9dula \u00f3sea durante el desarrollo de los linfocitos.","Est\u00e1n formados por 2 cadenas pept\u00eddicas con dominios constantes y variables.","Est\u00e1n acoplados al CD79 que transmite la se\u00f1al intracelularmente.","Se generan por la actividad de la recombinasa y su afinidad mejora por hipermutaci\u00f3n som\u00e1tica."],"c":2,"e":"El <b>TCR</b> est\u00e1 formado por dos cadenas (\u03b1\u03b2 o \u03b3\u03b4) con dominios variables y constantes. Se genera en el timo, est\u00e1 acoplado a CD3 (no CD79), y NO experimenta hipermutaci\u00f3n som\u00e1tica."},{"n":"47","noShuffle":true,"img":null,"q":"Para que la comunicaci\u00f3n entre un linfocito T cooperador y una CPA sea efectiva, se debe producir la interacci\u00f3n entre:","o":["CD4 - MCHII.","CD80 - CD86.","CD8 - MHCI.","a y b."],"c":4,"e":"El linfocito T cooperador requiere: 1\u00aa se\u00f1al (<b>TCR+CD4 con p\u00e9ptido-MHC-II</b>) y 2\u00aa se\u00f1al (<b>CD28 con CD80/CD86</b> de la CPA)."},{"n":"48","noShuffle":false,"img":null,"q":"El aumento de IgE es caracter\u00edstico de las infecciones por:","o":["Hongos.","Par\u00e1sitos.","Virus.","Bacterias."],"c":2,"e":"La <b>IgE</b> aumenta especialmente en infecciones por <b>helm\u00edntos (par\u00e1sitos)</b> y en procesos al\u00e9rgicos. Las c\u00e9lulas Th2 producen IL-4 e IL-13 que promueven la conmutaci\u00f3n a IgE."},{"n":"49","noShuffle":false,"img":null,"q":"Mujer de 48 a\u00f1os con trasplante renal que desarrolla anuria y shock brusco a las 6 horas. Tuvo un primer trasplante previo. El donante actual comparte HLA-B35 con el anterior. \u00bfQu\u00e9 tipo de rechazo es?","o":["Rechazo hiperagudo, debido a la sensibilizaci\u00f3n en su primer trasplante.","Rechazo agudo, debido a la sensibilizaci\u00f3n en su primer trasplante.","Rechazo agudo acelerado, debido a la sensibilizaci\u00f3n en su segundo trasplante.","Rechazo hiperagudo debido a la existencia de anticuerpos frente a HLA-B35 en su segundo donante."],"c":4,"e":"El <b>rechazo hiperagudo</b> ocurre en minutos-horas por anticuerpos preformados. La paciente fue sensibilizada al HLA-B35 del primer trasplante; el donante actual tambi\u00e9n tiene B35."},{"n":"50","noShuffle":false,"img":null,"q":"Tras una infecci\u00f3n por virus:","o":["Hay una r\u00e1pida producci\u00f3n de IFN de tipo II.","La primera se\u00f1al de activaci\u00f3n inmunitaria detectada es el aumento de anticuerpos neutralizantes.","No participan los linfocitos NK.","Los linfocitos T disminuyen tras la eliminaci\u00f3n del virus y se establece linfocitos T de memoria."],"c":4,"e":"Tras la infecci\u00f3n viral, la mayor\u00eda de los linfocitos T efectores mueren por apoptosis (<b>contracci\u00f3n clonal</b>) y quedan <b>linfocitos T de memoria</b> de larga vida."},{"n":"51","noShuffle":true,"img":null,"q":"La activaci\u00f3n de la respuesta inmunitaria por una infecci\u00f3n bacteriana extracelular:","o":["Puede favorecer un efecto lesivo inflamatorio relacionado con la secreci\u00f3n de citocinas.","Ser\u00e1 siempre de tipo innata.","No implica la participaci\u00f3n de anticuerpos neutralizantes.","b y c."],"c":1,"e":"Las infecciones bacterianas extracelulares activan respuestas innata <b>y</b> adaptativa (anticuerpos neutralizantes y opsonizantes). La secreci\u00f3n masiva de citocinas puede provocar shock s\u00e9ptico."},{"n":"52","noShuffle":false,"img":null,"q":"En la fase de viremia estable de la infecci\u00f3n del VIH:","o":["Los linfocitos CD4+ se recuperan y aumentan su concentraci\u00f3n en sangre.","El virus se replica principalmente en los \u00f3rganos linfoides secundarios.","El paciente presenta sintomatolog\u00eda gripal.","El paciente presenta un recuento de linfocitos CD4+ por debajo de 200 c\u00e9lulas/\u03bcL."],"c":2,"e":"En la fase cr\u00f3nica, el VIH se replica activamente en <b>\u00f3rganos linfoides secundarios</b> (ganglios, bazo). Los CD4+ caen lentamente."},{"n":"53","noShuffle":false,"img":null,"q":"Lactante de 3 meses con todas las inmunoglobulinas descendidas y descenso de linfocitos B. \u00bfCu\u00e1l ser\u00eda el diagn\u00f3stico m\u00e1s probable?","o":["Enfermedad de Bruton.","Hemoglobinuria parox\u00edstica nocturna.","S\u00edndrome linfoproliferativo ligado al cromosoma X.","S\u00edndrome del linfocito desnudo."],"c":1,"e":"La <b>agammaglobulinemia de Bruton</b> (XLA) es un defecto en la BTK que bloquea el desarrollo de linfocitos B. Cursa con <b>ausencia de linfocitos B</b> y todas las inmunoglobulinas."},{"n":"54","noShuffle":false,"img":null,"q":"Indica la relaci\u00f3n \u201cenfermedad \u2013 alteraci\u00f3n\u201d CORRECTA:","o":["S\u00edndrome Di George \u2013 inhibici\u00f3n de la migraci\u00f3n celular.","Enfermedad granulosa cr\u00f3nica \u2013 defecto en la formaci\u00f3n del timo.","Deficiencia de adhesi\u00f3n leucocitaria \u2013 d\u00e9ficit en la fagocitosis.","Deficiencia de IRAK-4 \u2013 Inhibici\u00f3n de la producci\u00f3n de citocinas proinflamatorias."],"c":4,"e":"La <b>deficiencia de IRAK-4</b> bloquea la se\u00f1alizaci\u00f3n de TLRs e IL-1R, impidiendo la producci\u00f3n de citocinas proinflamatorias. Di George: aplasia t\u00edmica; granulomatosa cr\u00f3nica: defecto en NADPH oxidasa."},{"n":"55","noShuffle":false,"img":null,"q":"En relaci\u00f3n con la dermatitis at\u00f3pica, indique la afirmaci\u00f3n FALSA:","o":["Es una hipersensibilidad de tipo I.","Est\u00e1 mediada por linfocitos Th1.","La IgE juega un papel esencial en su desarrollo.","Es una reacci\u00f3n inmediata."],"c":2,"e":"La dermatitis at\u00f3pica es hipersensibilidad tipo I mediada por <b>linfocitos Th2</b> (no Th1). Las Th2 producen IL-4, IL-13 e IL-5, promoviendo la producci\u00f3n de IgE."},{"n":"56","noShuffle":false,"img":null,"q":"La infecci\u00f3n de un virus que genera anticuerpos que pueden reconocer prote\u00ednas del hospedador se relaciona con:","o":["Mimetismo molecular.","Hipermutaci\u00f3n som\u00e1tica.","Inmunoedici\u00f3n.","Inmunodeficiencia."],"c":1,"e":"El <b>mimetismo molecular</b>: los ant\u00edgenos virales tienen similitud estructural con prote\u00ednas propias. Los anticuerpos anti-virales pueden atacar tejidos propios, causando autoinmunidad."},{"n":"57","noShuffle":false,"img":null,"q":"Indica la relaci\u00f3n \u201cenfermedad \u2013 mecanismo\u201d CORRECTA:","o":["Enfermedad de Graves \u2013 autoanticuerpos frente a la desmogle\u00edna 3.","Miastenia gravis \u2013 activaci\u00f3n del receptor de la ACh por autoanticuerpos.","Lupus eritematoso sist\u00e9mico \u2013 inmunocomplejos.","Esclerosis m\u00faltiple \u2013 autoanticuerpos contra la regi\u00f3n Fc de la IgG."],"c":3,"e":"El <b>LES</b> est\u00e1 mediado por inmunocomplejos (tipo III). Graves: anti-receptor TSH; Miastenia: bloqueo del receptor AChR."},{"n":"58","noShuffle":false,"img":null,"q":"Indica el mecanismo de evasi\u00f3n tumoral CORRECTO:","o":["Aumento de la expresi\u00f3n del ant\u00edgeno tumoral.","Secreci\u00f3n de TGF-\u03b2.","Inhibici\u00f3n de la interacci\u00f3n Fas-FasL.","Inhibici\u00f3n de los puntos de control inmunitario."],"c":2,"e":"Las c\u00e9lulas tumorales secretan <b>TGF-\u03b2</b> para crear un microambiente inmunosupresor: inhibe la proliferaci\u00f3n de linfocitos T, favorece Treg y suprime c\u00e9lulas NK."},{"n":"59","noShuffle":false,"img":null,"q":"Los tumores susceptibles a la lisis por c\u00e9lulas NK son aquellos en que las c\u00e9lulas tumorales:","o":["Producen IFN gamma.","Disminuyen la expresi\u00f3n de MHC de clase I.","Expresan de forma aberrante CD99.","Expresan elevadas cantidades de factores angiog\u00e9nicos."],"c":2,"e":"Las c\u00e9lulas NK reconocen c\u00e9lulas que han <b>perdido o reducido MHC-I</b> (\u201cmissing self\u201d). Las c\u00e9lulas tumorales reducen MHC-I para evadir TCD8+, pero esto las hace vulnerables a las NK."},{"n":"60","noShuffle":false,"img":null,"q":"En relaci\u00f3n a los anticuerpos presentes en la sangre del reci\u00e9n nacido, se\u00f1ale la afirmaci\u00f3n VERDADERA:","o":["Predomina las IgGs transferidas por la madre.","Predominan las IgMs transferidas por la madre.","Son pr\u00e1cticamente indetectables.","Se han generado en el feto."],"c":1,"e":"La <b>IgG materna</b> atraviesa la placenta por transporte activo (receptor FcRn), protegiendo al neonato. La IgM no atraviesa la placenta por ser demasiado grande."},{"n":"61","noShuffle":false,"img":null,"q":"La cadena ligera L de un anticuerpo:","o":["Interviene en la uni\u00f3n al ant\u00edgeno.","Es bivalente.","Se une a receptores Fc.","S\u00f3lo tiene dominios V."],"c":1,"e":"La cadena ligera (L) contribuye al <b>sitio de uni\u00f3n al ant\u00edgeno</b> junto con la cadena pesada. Tiene un dominio variable (VL) y uno constante (CL)."},{"n":"62","noShuffle":false,"img":null,"q":"En relaci\u00f3n con las citocinas, indique la afirmaci\u00f3n FALSA:","o":["Una misma citocina puede tener diversas funciones.","Diversas citocinas pueden tener la misma funci\u00f3n.","Tienen una vida muy prolongada.","Pueden tener acci\u00f3n endocrina, autocrina o paracrina."],"c":3,"e":"Las citocinas tienen <b>vida media muy corta</b> (minutos a pocas horas), lo que permite control preciso de la respuesta inmune."},{"n":"63","noShuffle":false,"img":null,"q":"El lipopolisac\u00e1rido bacteriano es un:","o":["Hapteno.","PRR (receptor de reconocimiento de patr\u00f3n).","DAMP (patr\u00f3n molecular asociado al da\u00f1o).","PAMP (patr\u00f3n molecular asociado con pat\u00f3genos)."],"c":4,"e":"El <b>LPS</b> es el PAMP bacteriano paradigm\u00e1tico, reconocido por TLR-4. Los DAMPs son mol\u00e9culas end\u00f3genas del hu\u00e9sped liberadas en da\u00f1o tisular."},{"n":"64","noShuffle":false,"img":null,"q":"En relaci\u00f3n con los linfocitos, indique la afirmaci\u00f3n VERDADERA:","o":["Los linfocitos B reconocen tanto ant\u00edgenos solubles como ant\u00edgenos unidos a c\u00e9lulas.","Los linfocitos T CD4+ tienen capacidad de actuar como c\u00e9lulas presentadoras de ant\u00edgenos al presentar MHCII.","Las c\u00e9lulas de memoria no se dividen y mueren tras 1-2 semanas.","Los linfocitos NK son c\u00e9lulas que participan en la respuesta inmunitaria adaptativa."],"c":1,"e":"Los <b>linfocitos B</b> reconocen ant\u00edgenos solubles y ant\u00edgenos de superficie celular a trav\u00e9s del BCR, sin necesidad de procesamiento previo."},{"n":"65","noShuffle":false,"img":null,"q":"La secreci\u00f3n autocrina de IL-2 por los linfocitos T:","o":["Favorece que el linfocito entre en la fase G0.","Se activa tras el reconocimiento de ant\u00edgenos solubles.","Favorece la proliferaci\u00f3n del linfocito T.","Inhibe la formaci\u00f3n de linfocitos T efectores y de memoria."],"c":3,"e":"La <b>IL-2</b> producida por linfocitos TCD4+ activados act\u00faa autocrina y paracrinamente promoviendo la <b>proliferaci\u00f3n clonal</b>."},{"n":"66","noShuffle":false,"img":null,"q":"Indica la v\u00eda del complemento que necesita de componentes de la respuesta inmunitaria adaptativa para iniciarse.","o":["V\u00eda alternativa.","V\u00eda cl\u00e1sica.","V\u00eda de las lectinas.","b y c."],"c":2,"e":"La <b>v\u00eda cl\u00e1sica</b> se activa por complejos ant\u00edgeno-anticuerpo (IgG o IgM). Como los anticuerpos son producto de la inmunidad adaptativa, conecta la respuesta innata con la adaptativa."},{"n":"67","noShuffle":false,"img":null,"q":"En la respuesta inflamatoria aguda:","o":["Los neutr\u00f3filos tisulares son las primeras c\u00e9lulas innatas en activarse.","Los mastocitos activados liberan factores del complemento.","Aumenta la permeabilidad vascular y se favorece la extravasaci\u00f3n de neutr\u00f3filos al tejido da\u00f1ado.","Los macr\u00f3fagos producen la inhibici\u00f3n de las citocinas proinflamatorias TNF\u03b1 e IL1."],"c":3,"e":"En la inflamaci\u00f3n aguda, los mediadores de mastocitos aumentan la <b>permeabilidad vascular</b>, facilitando la extravasaci\u00f3n de neutr\u00f3filos. Los macr\u00f3fagos producen TNF e IL-1."},{"n":"68","noShuffle":false,"img":null,"q":"En relaci\u00f3n con respuesta inmune secundaria:","o":["La fase de crecimiento de la producci\u00f3n de anticuerpos es de menor magnitud que en la primaria.","La fase latente puede ser m\u00e1s prolongada que en la respuesta primaria.","Se generan cantidades similares de IgG que IgM, aunque la IgM se detecta antes.","La fase de meseta es m\u00e1s larga que la de la respuesta primaria."],"c":4,"e":"La respuesta secundaria es m\u00e1s r\u00e1pida, mayor y m\u00e1s prolongada que la primaria. La <b>fase de meseta es m\u00e1s larga</b>. Predomina la IgG; la fase latente es m\u00e1s corta."},{"n":"69","noShuffle":false,"img":null,"q":"En la selecci\u00f3n positiva que se produce durante el desarrollo de los linfocitos T:","o":["No est\u00e1 implicada la corteza del timo.","Se seleccionan los linfocitos que son funcionales.","Se seleccionan los linfocitos que no reconocen mol\u00e9culas propias.","Los linfocitos que s\u00ed reconocen mol\u00e9culas propias entran en apoptosis."],"c":2,"e":"La <b>selecci\u00f3n positiva</b> en la corteza t\u00edmica selecciona timocitos cuyo TCR reconoce con baja afinidad el MHC propio (son \u201cfuncionales\u201d)."},{"n":"70","noShuffle":true,"img":null,"q":"Indica el mecanismo por el que los neutr\u00f3filos son capaces de actuar sobre los pat\u00f3genos: (v2)","o":["Fagocitosis.","Liberaci\u00f3n de gr\u00e1nulos citot\u00f3xicos.","Liberaci\u00f3n de trampas extracelulares de neutr\u00f3filos.","Todos los anteriores son correctos."],"c":4,"e":"Los <b>neutr\u00f3filos</b> act\u00faan frente a pat\u00f3genos por: <b>fagocitosis</b>, <b>degranulaci\u00f3n</b> y <b>NETs</b>."},{"n":"71","noShuffle":false,"img":null,"q":"En relaci\u00f3n con \u00f3rganos linfoides:","o":["Los ant\u00edgenos transportados por la sangre llegan a los ganglios linf\u00e1ticos.","Los linfocitos se desarrollan tanto en \u00f3rganos linfoides secundarios como en ganglios linf\u00e1ticos.","La m\u00e9dula y el timo son \u00f3rganos linfoides primarios.","Las placas de Peyer son fol\u00edculos ricos en linfocitos T y B que forman parte del bazo."],"c":3,"e":"Los \u00f3rganos linfoides <b>primarios</b> son la <b>m\u00e9dula \u00f3sea</b> y el <b>timo</b>. Los ant\u00edgenos de la sangre llegan al bazo. Las placas de Peyer est\u00e1n en el intestino."},{"n":"72","noShuffle":false,"img":null,"q":"Que afirmaci\u00f3n es FALSA:","o":["Los anticuerpos policlonales son de elecci\u00f3n en el diagn\u00f3stico por su elevada especificidad.","La formaci\u00f3n de inmunocomplejos puede utilizarse para cuantificar IgG.","En una muestra de suero no se pueden cuantificar linfocitos.","Los anticuerpos monoclonales se pueden utilizar en el diagn\u00f3stico y como f\u00e1rmacos."],"c":1,"e":"Los <b>anticuerpos monoclonales</b> (no policlonales) son de elecci\u00f3n en el diagn\u00f3stico por su <b>alta especificidad</b>. Los policlonales tienen mezcla de especificidades."},{"n":"73","noShuffle":false,"img":null,"q":"Se\u00f1ale la afirmaci\u00f3n FALSA. La generaci\u00f3n de hibridomas:","o":["Se utiliza para producir anticuerpos policlonales.","Se consigue mediante la fusi\u00f3n de c\u00e9lulas tumorales de mieloma y linfocitos B activados.","Permite la s\u00edntesis de anticuerpos altamente espec\u00edficos.","Es un proceso largo y caro."],"c":1,"e":"Los <b>hibridomas</b> producen anticuerpos <b>monoclonales</b> (de una sola especificidad), no policlonales. Se obtienen fusionando linfocitos B inmunizados con c\u00e9lulas de mieloma inmortal."},{"n":"74","noShuffle":false,"img":null,"q":"La tecnolog\u00eda m\u00e1s eficiente para tipificar enfermedades como leucemias empleando anticuerpos monoclonales es la:","o":["Citometr\u00eda de flujo.","Inmunoprecipitaci\u00f3n en agarosa.","Inmunoprecipitaci\u00f3n en fase s\u00f3lida.","Estudio inmunohistoqu\u00edmico."],"c":1,"e":"La <b>citometr\u00eda de flujo</b> es la t\u00e9cnica de referencia para inmunofenotipar c\u00e9lulas mediante anticuerpos monoclonales fluorescentes. Fundamental en el diagn\u00f3stico de leucemias y linfomas."},{"n":"75","noShuffle":false,"img":null,"q":"Indique la afirmaci\u00f3n FALSA:","o":["La protecci\u00f3n adquirida por las vacunas se debe a la generaci\u00f3n de linfocitos de memoria.","Los adyuvantes son sustancias que potencian la respuesta inmunitaria de las vacunas.","La protecci\u00f3n frente a un pat\u00f3geno se ve aumentada con una segunda dosis de la vacuna.","La administraci\u00f3n de anticuerpos produce una protecci\u00f3n m\u00e1s prolongada en el tiempo que la inducci\u00f3n activa de la respuesta inmunitaria."],"c":4,"e":"La administraci\u00f3n pasiva de anticuerpos da protecci\u00f3n <b>inmediata pero transitoria</b> (semanas-meses). La vacunaci\u00f3n activa genera memoria inmunol\u00f3gica con protecci\u00f3n <b>mucho m\u00e1s duradera</b>."},{"n":"76","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes mol\u00e9culas es un patr\u00f3n molecular asociado a pat\u00f3genos?","o":["Ac\u0301ido u\u0301rico.","TLR-2.","LPS.","Prote\u00edna C reactiva."],"c":3,"e":"El <b>LPS (lipopolisac\u00e1rido)</b> es el PAMP bacteriano paradigm\u00e1tico, reconocido por TLR-4. El TLR-2 es un PRR (receptor). El \u00e1cido \u00farico y la PCR son mol\u00e9culas end\u00f3genas del hu\u00e9sped."},{"n":"77","noShuffle":false,"img":null,"q":"\u00bfC\u00f3mo se denominan las mol\u00e9culas de bajo peso molecular que por s\u00ed mismas no desencadenan respuesta inmune, pero gracias a una mol\u00e9cula portadora pueden comportarse como inmun\u00f3genas?","o":["Ant\u00edgenos.","Al\u00e9rgenos.","Ep\u00edtopos.","Haptenos."],"c":4,"e":"Los <b>haptenos</b> son mol\u00e9culas peque\u00f1as no inmun\u00f3g\u00e9nicas por s\u00ed solas pero que, unidas a una prote\u00edna portadora, desencadenan respuesta inmune. Ejemplos: penicilina, urushiol."},{"n":"78","noShuffle":false,"img":null,"q":"Indica la citocina que favorece la polarizaci\u00f3n de los linfocitos T hacia Th2:","o":["IL-1.","IL-2.","IL-4.","IL-6."],"c":3,"e":"La <b>IL-4</b> es la citocina clave para la polarizaci\u00f3n hacia <b>Th2</b>. Activa el factor de transcripci\u00f3n GATA-3 y promueve la producci\u00f3n de IgE y reclutamiento de eosin\u00f3filos."},{"n":"79","noShuffle":true,"img":null,"q":"\u00bfCu\u00e1l de las siguientes caracter\u00edsticas corresponde a la apoptosis?","o":["Es un proceso celular gen\u00e9ticamente controlado.","En su fase final se activa la inflamaci\u00f3n.","Se produce la destrucci\u00f3n de la membrana celular, con la liberaci\u00f3n del contenido intracelular.","A y B son correctas."],"c":1,"e":"La <b>apoptosis</b> es muerte celular programada, gen\u00e9ticamente controlada. A diferencia de la necrosis, no libera el contenido intracelular (no activa inflamaci\u00f3n)."},{"n":"80","noShuffle":false,"img":null,"q":"Indica qu\u00e9 mol\u00e9cula/s no se expresa/n en la superficie de un linfocito B:","o":["CD79.","HLA II.","CD3.","CD79 y CD3."],"c":3,"e":"El <b>CD3</b> es exclusivo de linfocitos T. Los linfocitos B expresan CD79 (BCR) y HLA-II, pero no CD3."},{"n":"81","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes c\u00e9lulas no tiene capacidad fagoc\u00edtica? (v2)","o":["Macr\u00f3fago.","Neutr\u00f3filo.","Eosin\u00f3filo.","C\u00e9lula dendr\u00edtica folicular."],"c":4,"e":"Las <b>c\u00e9lulas dendr\u00edticas foliculares</b> no son fagocitos: capturan y retienen ant\u00edgenos en su superficie para presentarlos a linfocitos B en centros germinales."},{"n":"82","noShuffle":false,"img":null,"q":"Los alotipos:","o":["Son los responsables de que los anticuerpos de un individuo puedan ser detectados como ant\u00edgenos por otro miembro de la misma especie.","Hacen referencia a las peque\u00f1as diferencias en regiones variables de los anticuerpos de dos individuos de la misma especie.","Hace referencia a las variaciones de anticuerpos intraindividuales.","Son los responsables de que un mismo isotipo de anticuerpo reconozca distintos ant\u00edgenos."],"c":1,"e":"Los <b>alotipos</b> son variaciones gen\u00e9ticas en las regiones <b>constantes</b> de las inmunoglobulinas que difieren entre individuos de la misma especie."},{"n":"83","noShuffle":false,"img":null,"q":"Una vacuna atenuada:","o":["Presenta con frecuencia una buena inmunogenicidad.","El pat\u00f3geno est\u00e1 muerto.","Es la vacuna m\u00e1s estable.","Requiere de un virus no pat\u00f3geno como portador."],"c":1,"e":"Las vacunas <b>atenuadas</b> contienen el microorganismo vivo con virulencia reducida. Son muy inmun\u00f3g\u00e9nicas. Son menos estables (requieren cadena de fr\u00edo) y contraindicadas en inmunodeprimidos."},{"n":"84","noShuffle":false,"img":null,"q":"Se\u00f1ale la afirmaci\u00f3n VERDADERA. La generaci\u00f3n de hibridomas:","o":["Se utiliza para producir anticuerpos policlonales.","Se consigue mediante la fusi\u00f3n de c\u00e9lulas tumorales de mieloma y linfocitos T activados.","Permite la s\u00edntesis de anticuerpos altamente espec\u00edficos.","Es un proceso caro, pero que requiere poco tiempo."],"c":3,"e":"Los <b>hibridomas</b> producen anticuerpos monoclonales altamente espec\u00edficos mediante la fusi\u00f3n de linfocitos B inmunizados con c\u00e9lulas de mieloma. Proceso largo y caro."},{"n":"85","noShuffle":false,"img":null,"q":"\u00bfC\u00f3mo se denomina el fen\u00f3meno por el cual cada c\u00e9lula B expresa s\u00f3lo uno de los dos genes de cada tipo de cadena de inmunoglobulina?","o":["Recombinaci\u00f3n som\u00e1tica.","Diversidad de uni\u00f3n.","Exclusi\u00f3n al\u00e9lica.","Hipermutaci\u00f3n som\u00e1tica."],"c":3,"e":"La <b>exclusi\u00f3n al\u00e9lica</b> garantiza que cada linfocito B exprese \u00fanicamente un alelo de cada cadena, resultando en un BCR de una sola especificidad por c\u00e9lula."},{"n":"86","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes caracter\u00edsticas NO corresponde a un ant\u00edgeno T-independiente?","o":["No genera una elevada memoria.","Necesita que el linfocito CD4+ interaccione con el linfocito B.","El linfocito B puede reconocerlo directamente.","Se relaciona con la producci\u00f3n de IgM."],"c":2,"e":"Los ant\u00edgenos <b>T-independientes</b> activan linfocitos B <b>sin necesitar linfocito TCD4+</b>. La caracter\u00edstica que NO corresponde es que necesiten TCD4+."},{"n":"87","noShuffle":false,"img":null,"q":"En la superficie del linfocito T encontramos:","o":["El TCR que reconoce de manera directa los ant\u00edgenos solubles.","El CD3 que participa en la transducci\u00f3n de se\u00f1ales al interior de la c\u00e9lula tras la interacci\u00f3n con el ant\u00edgeno.","Las HLA-II si es un linfocito T colaborador.","Las HLA-II si es un linfocito T citot\u00f3xico."],"c":2,"e":"El <b>CD3</b> forma complejo con el TCR y es responsable de la <b>transducci\u00f3n de se\u00f1ales</b> al interior celular. Los linfocitos T no expresan HLA-II de forma constitutiva."},{"n":"88","noShuffle":false,"img":null,"q":"En relaci\u00f3n con el sistema del complemento, indica la afirmaci\u00f3n FALSA:","o":["Las prote\u00ednas del complemento interaccionan entre s\u00ed de modo regulado formando una cascada enzim\u00e1tica.","La ruta cl\u00e1sica y la de las lectinas conectan con el sistema inmune adaptativo.","La ruta alternativa conecta con la respuesta inmunitaria inespec\u00edfica, interaccionando directamente con la superficie del microorganismo.","Las rutas cl\u00e1sica, alternativa y de las lectinas comparten los \u00faltimos pasos de la activaci\u00f3n."],"c":2,"e":"La ruta cl\u00e1sica conecta con la inmunidad <b>adaptativa</b>. La ruta de las lectinas es <b>innata</b> (reconoce manosa en pat\u00f3genos). Decir que \u201cambas\u201d conectan con el adaptativo es <b>falso</b> para la v\u00eda de las lectinas."},{"n":"89","noShuffle":false,"img":null,"q":"En referencia a las c\u00e9lulas NK, indica la afirmaci\u00f3n CORRECTA:","o":["Expresan en su superficie el CD16 que reconoce la Fc de la IgE.","Se consideran c\u00e9lulas esenciales de la respuesta inmunitaria adaptativa.","Liberan gr\u00e1nulos ricos en granzima y perforina favoreciendo el mecanismo de receptor de muerte.","Pueden eliminar la c\u00e9lula diana a trav\u00e9s de la citotoxicidad dependiente de anticuerpos."],"c":4,"e":"Las c\u00e9lulas NK pueden realizar <b>ADCC</b> mediante el receptor CD16 (Fc\u03b3RIII) que reconoce la IgG (no IgE) unida a c\u00e9lulas diana. Son innatas (no adaptativas)."},{"n":"90","noShuffle":false,"img":null,"q":"Durante la inflamaci\u00f3n, la migraci\u00f3n de leucocitos desde el torrente circulatorio a la zona de infecci\u00f3n se ve favorecida por:","o":["Disminuci\u00f3n de la permeabilidad capilar.","Reducci\u00f3n de la liberaci\u00f3n de mediadores qu\u00edmicos.","Vasoconstricci\u00f3n.","Aumento de la expresi\u00f3n de mol\u00e9culas de adhesi\u00f3n en las c\u00e9lulas endoteliales."],"c":4,"e":"La di\u00e1pedesis se facilita por el aumento de <b>mol\u00e9culas de adhesi\u00f3n</b> (selectinas, integrinas, ICAM) en c\u00e9lulas endoteliales."},{"n":"91","noShuffle":false,"img":null,"q":"En relaci\u00f3n con la inmunidad humoral, indica la afirmaci\u00f3n correcta:","o":["En la respuesta primaria se produce primero IgG, y luego IgM.","Las c\u00e9lulas plasm\u00e1ticas procedentes de c\u00e9lulas B activadas pueden quedar en reposo durante muchos a\u00f1os.","La respuesta secundaria tiene una fase de crecimiento m\u00e1s corta que la respuesta primaria.","La interacci\u00f3n entre el linfocito B y el linfocito T es esencial para la producci\u00f3n de los distintos isotipos de anticuerpos."],"c":4,"e":"La interacci\u00f3n <b>linfocito B-linfocito T cooperador</b> (CD40L-CD40 y citocinas) es imprescindible para la conmutaci\u00f3n de isotipo."},{"n":"92","noShuffle":false,"img":null,"q":"La fracci\u00f3n cristalizable de un anticuerpo:","o":["Es la zona que reconoce al ant\u00edgeno.","Est\u00e1 formada por una cadena ligera y por una cadena pesada.","Contiene zonas variables y constantes.","Es reconocida por otras mol\u00e9culas y c\u00e9lulas efectoras del sistema inmunitario."],"c":4,"e":"La regi\u00f3n <b>Fc</b> media las funciones efectoras: se une a receptores Fc en macr\u00f3fagos, NK y neutr\u00f3filos (opsonizaci\u00f3n, ADCC) y activa el complemento."},{"n":"93","noShuffle":false,"img":null,"q":"Paciente masculino de 26 a\u00f1os con hipertiroidismo, exoftalmos y bocio. \u00bfQu\u00e9 autoanticuerpo espera en la anal\u00edtica?","o":["Anticuerpo anti-receptor de la acetilcolina.","Anticuerpo anti-receptor de tirotropina.","Anticuerpo frente a la desmogle\u00edna 3.","Anticuerpo frente a la regi\u00f3n Fc de la IgG."],"c":2,"e":"El cuadro es caracter\u00edstico de la <b>enfermedad de Graves</b>. Los autoanticuerpos <b>anti-receptor TSH</b> (TRAb) estimulan continuamente el tiroides."},{"n":"94","noShuffle":false,"img":null,"q":"Paciente politransfundido con anticuerpos anti-HLA-I (B5, B7, B12...) sometido a trasplante renal. Donante tiene B39 y B40. Indique la afirmaci\u00f3n correcta:","o":["Hay una baja probabilidad de que la prueba cruzada tenga un resultado negativo.","Hay una elevada probabilidad de que el paciente sufra un rechazo hiperagudo.","Existe la posibilidad de que el paciente sufra un rechazo agudo.","Todas son correctas."],"c":2,"e":"El paciente tiene anticuerpos anti-HLA-B preformados. El donante tiene B39 y B40 (supert\u00edpos relacionados). La probabilidad de <b>rechazo hiperagudo</b> es elevada."},{"n":"95","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 manifestaciones cl\u00ednicas se asocian con el per\u00edodo de latencia cl\u00ednica del VIH?","o":["Fiebre y cefaleas.","Aparici\u00f3n de infecciones oportunistas.","Disminuci\u00f3n progresiva de los linfocitos CD4+ sangu\u00edneos.","Concentraci\u00f3n de los linfocitos CD4+ inferior a 200 c\u00e9lulas/\u03bcL."],"c":3,"e":"Durante la <b>latencia cl\u00ednica</b> del VIH el paciente est\u00e1 asintom\u00e1tico. La caracter\u00edstica principal es la <b>ca\u00edda progresiva de CD4+</b>."},{"n":"96","noShuffle":false,"img":null,"q":"\u00bfEn qu\u00e9 se diferencia la dermatitis at\u00f3pica de la dermatitis por contacto?","o":["La at\u00f3pica es una hipersensibilidad de tipo IV, mientras que la de contacto es de tipo I.","La at\u00f3pica est\u00e1 mediada por IgE, mientras que la de contacto est\u00e1 mediada por IgG.","La at\u00f3pica est\u00e1 mediada por linfocitos Th1, mientras que la de contacto est\u00e1 mediada por IgE.","La at\u00f3pica es una hipersensibilidad inmediata mientras que la de contacto es retardada."],"c":4,"e":"La <b>dermatitis at\u00f3pica</b> es hipersensibilidad tipo I (inmediata, mediada por IgE y Th2). La <b>dermatitis por contacto</b> es tipo IV (retardada, mediada por linfocitos T)."},{"n":"97","noShuffle":false,"img":null,"q":"En relaci\u00f3n con los mecanismos de tolerancia:","o":["Los linfocitos B sufren anergia en la m\u00e9dula \u00f3sea si reconocen mol\u00e9culas presentes en la superficie de c\u00e9lulas propias.","Los linfocitos T autorreactivos se eliminan por selecci\u00f3n negativa en la m\u00e9dula t\u00edmica.","Tras el proceso de selecci\u00f3n positiva, salen a circulaci\u00f3n los linfocitos CD4+CD8+ maduros.","En la corteza del timo se eliminan aquellos linfocitos T con TCRs que reconocen las HLA propias."],"c":2,"e":"Los linfocitos T autorreactivos son eliminados por <b>selecci\u00f3n negativa</b> en la <b>m\u00e9dula t\u00edmica</b>. Los que salen son simples positivos (CD4+ o CD8+). La corteza es donde ocurre la selecci\u00f3n positiva."},{"n":"98","noShuffle":false,"img":null,"q":"Indica la frase CORRECTA en relaci\u00f3n con los ganglios linf\u00e1ticos:","o":["Los ant\u00edgenos acceden a ellos a trav\u00e9s de las c\u00e9lulas M.","Son sitios inmunol\u00f3gicamente privilegiados.","Los linfocitos se concentran en la pulpa blanca, mientras que los macr\u00f3fagos se localizan en la pulpa roja.","La selecci\u00f3n clonal de linfocitos B se produce en el fol\u00edculo secundario."],"c":4,"e":"La <b>selecci\u00f3n clonal y la maduraci\u00f3n de afinidad</b> de los linfocitos B ocurre en los <b>centros germinales</b> de los fol\u00edculos secundarios."},{"n":"99","noShuffle":false,"img":null,"q":"Las bacterias Gram positivas:","o":["Son m\u00e1s sensibles a la lisozima que las Gram negativas","Se ti\u00f1en de color rosa en la tinci\u00f3n de Gram","Presentan endotoxina","Tienen forma de coco"],"c":1,"e":"Las <b>Gram positivas</b> tienen pared de peptidoglicano m\u00e1s gruesa y expuesta, haci\u00e9ndolas m\u00e1s sensibles a la <b>lisozima</b>. Se ti\u00f1en de violeta-azul. La endotoxina (LPS) es exclusiva de Gram negativas."},{"n":"100","noShuffle":false,"img":null,"q":"En una transfusi\u00f3n sangu\u00ednea, seg\u00fan el grupo ABO:","o":["El donante AB puede donar a todos los receptores.","El donante O solo puede donar al receptor O.","Si un paciente AB recibe sangre de un donante A, se producir\u00eda hem\u00f3lisis intravascular.","Si un paciente O recibe sangre de un donante B, se producir\u00eda hem\u00f3lisis intravascular."],"c":4,"e":"Un paciente de grupo O tiene anticuerpos anti-A y <b>anti-B</b>. Si recibe sangre B, los anticuerpos anti-B atacan los hemat\u00edas transfundidos causando <b>hem\u00f3lisis intravascular</b> grave."},{"n":"101","noShuffle":false,"img":null,"q":"En el centro germinal del fol\u00edculo de un ganglio linf\u00e1tico encontramos:","o":["C\u00e9lulas B maduras no estimuladas.","C\u00e9lulas B en proliferaci\u00f3n.","C\u00e9lulas B en reposo.","C\u00e9lulas T."],"c":2,"e":"El <b>centro germinal</b> es donde los linfocitos B activados <b>proliferan activamente</b>, sufren hipermutaci\u00f3n som\u00e1tica y selecci\u00f3n por afinidad."},{"n":"102","noShuffle":false,"img":null,"q":"Indica la afirmaci\u00f3n CORRECTA con respecto a los anticuerpos:","o":["La inmunoglobulina G es el primer anticuerpo que se genera en la respuesta primaria frente a un ant\u00edgeno.","La especificidad antig\u00e9nica se determina tras el reordenamiento som\u00e1tico VDJ de los genes que codifican las regiones variables durante el desarrollo de los linfocitos B.","La inmunoglobulina M soluble est\u00e1 en forma de d\u00edmero.","La conmutaci\u00f3n del isotipo afecta a la regi\u00f3n variable de la cadena pesada de la Ig."],"c":2,"e":"La <b>especificidad antig\u00e9nica</b> queda determinada durante el reordenamiento <b>V(D)J</b>. La IgM (no IgG) es la primera en respuesta primaria; la IgM soluble es pent\u00e1mero, no d\u00edmero."},{"n":"103","noShuffle":false,"img":null,"q":"La inmunidad innata se caracteriza por:","o":["El reconocimiento de estructuras microbianas altamente conservadas y compartidas por diferentes tipos de especies microbianas.","La actividad de linfocitos T y B.","El desarrollo de c\u00e9lulas de memoria.","La especificidad de los anticuerpos."],"c":1,"e":"La inmunidad <b>innata</b> reconoce PAMPs: estructuras <b>altamente conservadas</b> entre microbios mediante PRRs (TLRs, NLRs). No genera memoria ni anticuerpos espec\u00edficos."},{"n":"104","noShuffle":false,"img":null,"q":"Indica la citocina producida por los linfocitos T que promueve la activaci\u00f3n y proliferaci\u00f3n de estas c\u00e9lulas:","o":["TNF-alfa","TGF-beta","IL-2","IL-4"],"c":3,"e":"La <b>IL-2</b> es la principal citocina producida por los linfocitos TCD4+ activados que promueve su propia proliferaci\u00f3n (autocrina) y la de otros linfocitos T."},{"n":"105","noShuffle":false,"img":null,"q":"Indica la afirmaci\u00f3n CORRECTA con respecto a las quimiocinas:","o":["Favorecen la migraci\u00f3n de diferentes c\u00e9lulas al sitio de infecci\u00f3n.","Diferenciamos 6 grandes grupos dependiendo de la posici\u00f3n de 1 ciste\u00edna cerca del extremo amino-terminal.","Favorecen la diferenciaci\u00f3n de progenitores mieloides.","Son mol\u00e9culas reconocidas por un anticuerpo o por un receptor de un linfocito T o B."],"c":1,"e":"Las <b>quimiocinas</b> son citocinas quimioatractantes que dirigen la migraci\u00f3n de c\u00e9lulas inmunitarias al foco de infecci\u00f3n. Se clasifican en 4 familias (CC, CXC, C, CX3C)."},{"n":"106","noShuffle":false,"img":null,"q":"En un ep\u00edtopo secuencial:","o":["Los amino\u00e1cidos reconocidos por el anticuerpo est\u00e1n separados en la secuencia prote\u00edca.","Los amino\u00e1cidos reconocidos por el anticuerpo est\u00e1n contiguos en la secuencia prote\u00edca.","Los amino\u00e1cidos reconocidos solo ser\u00e1n accesibles si no se encuentran en la superficie de la prote\u00edna.","Los amino\u00e1cidos de la prote\u00edna que no son reconocidos por el anticuerpo se denominan inmun\u00f3genos."],"c":2,"e":"Un <b>ep\u00edtopo secuencial (lineal)</b> est\u00e1 formado por amino\u00e1cidos <b>contiguos</b> en la secuencia primaria. El ep\u00edtopo conformacional depende de la estructura terciaria."},{"n":"107","noShuffle":false,"img":null,"q":"Selecciona la frase FALSA, en referencia a la activaci\u00f3n de las distintas v\u00edas del complemento:","o":["En la v\u00eda alternativa, a diferencia de lo que ocurre en la cl\u00e1sica y la de la lectina, no se produce el complejo de ataque a membrana.","El inicio de la v\u00eda alternativa se produce cuando se crea un ambiente local en la superficie del pat\u00f3geno.","Las v\u00edas cl\u00e1sica y de lectina activan los componentes C2 y C4.","La v\u00eda cl\u00e1sica est\u00e1 mediada por la creaci\u00f3n del complejo ant\u00edgeno-anticuerpo."],"c":1,"e":"La v\u00eda alternativa <b>s\u00ed produce el MAC</b> (complejo de ataque a membrana C5b-9), igual que la cl\u00e1sica y la de lectinas. Todas las v\u00edas convergen en C5b para formar el MAC."},{"n":"108","noShuffle":false,"img":null,"q":"En relaci\u00f3n con las HLA-I, indica la afirmaci\u00f3n correcta:","o":["Se expresan en la membrana de todas las c\u00e9lulas, aunque no tengan asociado un p\u00e9ptido antig\u00e9nico.","Presentan una cadena invariante unida al surco de uni\u00f3n al p\u00e9ptido cuando est\u00e1n en el ret\u00edculo endopl\u00e1smico.","Est\u00e1 constituida por una cadena polipept\u00eddica polim\u00f3rfica unida no covalentemente a la beta2 microglobulina.","Los ep\u00edtopos que presenta son de mayor tama\u00f1o que aquellos presentados por la HLA-II."],"c":3,"e":"Las <b>HLA-I</b> est\u00e1n formadas por una cadena \u03b1 polim\u00f3rfica unida no covalentemente a la <b>beta-2 microglobulina</b>. Se expresan en todas las c\u00e9lulas nucleadas. Presentan p\u00e9ptidos cortos (8-11 aa)."},{"n":"109","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 funci\u00f3n ejerce el IFN\u03b3 en la respuesta inmune frente a pat\u00f3genos?","o":["Activa a los macr\u00f3fagos y favorece la eliminaci\u00f3n de las bacterias que sobreviven en el interior del fagocito.","Bloquea de la replicaci\u00f3n v\u00edrica.","Promueve la apoptosis de las c\u00e9lulas infectadas por virus.","Favorece la activaci\u00f3n del complemento."],"c":1,"e":"El <b>IFN-\u03b3</b> activa a los <b>macr\u00f3fagos</b>, potenciando su capacidad bactericida. Es esencial en la defensa frente a pat\u00f3genos intracelulares como micobacterias."},{"n":"110","noShuffle":false,"img":null,"q":"Las c\u00e9lulas tumorales pueden evadir la respuesta inmunitaria mediante:","o":["Bloqueo de la actividad de los linfocitos T mediante la interacci\u00f3n PD-1/PD-L1.","Inhibici\u00f3n de la apoptosis de los linfocitos T mediante la interacci\u00f3n Fas/Fas-L.","Aumento de la expresi\u00f3n de HLA-I.","Inhibici\u00f3n de la s\u00edntesis de TGF-beta."],"c":1,"e":"Las c\u00e9lulas tumorales expresan <b>PD-L1</b>, que al unirse al PD-1 de los linfocitos T, los inhibe y bloquea la respuesta antitumoral. Es la base de los <b>inhibidores de checkpoint</b>."},{"n":"111","noShuffle":false,"img":null,"q":"Durante la fase de escape de la teor\u00eda de inmunoedici\u00f3n tumoral:","o":["El paciente consigue no desarrollar un tumor gracias a la vigilancia inmunol\u00f3gica.","El sistema inmunol\u00f3gico elimina las c\u00e9lulas tumorales altamente inmunol\u00f3gicas.","Proliferan las c\u00e9lulas tumorales menos inmun\u00f3g\u00e9nicas.","Hay un equilibrio entre la respuesta inmunitaria y la proliferaci\u00f3n de c\u00e9lulas tumorales."],"c":3,"e":"En la fase de <b>escape</b>, las c\u00e9lulas tumorales menos inmun\u00f3g\u00e9nicas <b>proliferan sin control</b> porque el sistema inmune ya no puede eliminarlas eficazmente."},{"n":"112","noShuffle":false,"img":null,"q":"Paciente con infecciones recurrentes desde los 9 meses, test NBT incoloro/amarillo p\u00e1lido. \u00bfDiagn\u00f3stico m\u00e1s probable?","o":["Enfermedad granulomatosa cr\u00f3nica.","Hemoglobinuria parox\u00edstica nocturna.","Agammaglobulinemia ligada al X.","Inmunodeficiencia combinada grave."],"c":1,"e":"El test del NBT incoloro indica que los neutr\u00f3filos no producen explosi\u00f3n oxidativa. Es caracter\u00edstico de la <b>enfermedad granulomatosa cr\u00f3nica</b> (defecto en NADPH oxidasa)."}]};

    var m=META.secciones[s]||{};

    css+='.tab.t-'+s+'.on{background:'+cd+';color:'+c+';border-color:'+c+'}\n';
    css+='.ph.s-'+s+'{border-left:4px solid '+c+'}\n';
    // Variables CSS por sección para el badge coloreado
    css+='#panel-'+s+' .qnum.sec-colored{background:'+cd+';color:'+c+'}\n';
  });
  var st=document.createElement('style');st.textContent=css;document.head.appendChild(st);
}

/* ── Header ── */
function buildHeader(){
  var total=SECS.reduce(function(a,s){return a+(D[s]?D[s].length:0);},0);
  var t=document.getElementById('h-tit');if(t)t.textContent=META.titulo||'Banco MIR';
  var pt=document.getElementById('page-title');if(pt)pt.textContent=META.titulo||'Banco MIR';
  var m=document.getElementById('h-meta');
  if(m){var p=[];if(total)p.push(total+' preguntas');if(META.examen)p.push(META.examen);m.textContent=p.join(' · ');}
  var d=document.getElementById('ph-gdesc');if(d)d.textContent=META.subtitulo||'';
  var r=document.getElementById('sc-rem-all');if(r)r.textContent='○ '+total;
}

/* ── Tabs ── */
function buildTabs(){
  var total=SECS.reduce(function(a,s){return a+(D[s]?D[s].length:0);},0);
  var h='<button class="tab t-all on" onclick="showTab(\'all\')">📋 Todos ('+total+')</button>';

/* ── Paneles ── */
function buildPanels(){
  var h='<div id="panel-all" class="sec-panel visible"><div id="qs-all"></div><div class="no-results" id="nr-all">No se encontraron preguntas</div></div>';

    h+='<div id="panel-'+s+'" class="sec-panel">';

    h+='<div class="ph-left">';

    if(m.desc)h+='<span class="ph-desc">'+escH(m.desc)+'</span>';
    h+='<div class="score-row">';
    h+='<span class="sc ok" id="sc-ok-'+s+'">✓ 0</span>';
    h+='<span class="sc ko" id="sc-ko-'+s+'">✗ 0</span>';
    h+='<span class="sc rem" id="sc-rem-'+s+'">○ '+cnt+'</span>';
    h+='</div></div>';
    h+='<button class="fbtn" id="fb-'+s+'" onclick="toggleFail(\''+s+'\')">Solo falladas</button>';
    h+='</div>';
    h+='<div id="qs-'+s+'"></div>';
    h+='<div class="no-failed" id="nf-'+s+'">Aún no has fallado ninguna 🎉</div>';
    h+='<div class="no-results" id="nr-'+s+'">No se encontraron preguntas</div>';
    h+='<div class="sec-actions">';
    h+='<button class="reset-btn" onclick="resetSec(\''+s+'\')">↺ Reiniciar</button>';
    h+='<button class="nota-btn" onclick="calcNota(\''+s+'\')">✎ Calcular nota</button>';
    h+='</div>';
    h+='<div class="nota-box" id="nota-'+s+'"></div>';
    h+='</div>';
  });
  var pw=document.getElementById('panels-wrap');if(pw)pw.innerHTML=h;
}

/* ── Índice O(1) + numeración fija ── */
function buildIdx(){
  SECS.forEach(function(s){
    qIdx[s]={};
    if(D[s])D[s].forEach(function(q){qIdx[s][q.n]=q;});
  });
}
function buildNums(){
  // Numeración correlativa fija: 1, 2, 3... por sección
  SECS.forEach(function(s){
    qNums[s]={};
    if(D[s])D[s].forEach(function(q,i){qNums[s][q.n]=i+1;});
  });
}
function getNum(sec,n){return qNums[sec]?qNums[sec][n]||n:n;}
function findQ(qid){
  var d=qid.indexOf('-'),s=qid.substring(0,d),n=qid.substring(d+1);
  return(qIdx[s]&&qIdx[s][n])||null;
}
function getSecFromQid(qid){return qid.substring(0,qid.indexOf('-'));}
function getNFromQid(qid){return qid.substring(qid.indexOf('-')+1);}

/* ── Orden inter-secciones para Todos ── */
function buildAllOrder(){
  var all=[];
  SECS.forEach(function(s){if(D[s])D[s].forEach(function(q){all.push({sec:s,n:q.n});});});
  if(!qOrd['__all__'])qOrd['__all__']=shuffle(all.map(function(x){return x.sec+'|'+x.n;}));
  allOrder=qOrd['__all__'].map(function(key){
    var p=key.indexOf('|'),sec=key.substring(0,p),n=key.substring(p+1);
    return{sec:sec,n:n,q:qIdx[sec]&&qIdx[sec][n]};
  }).filter(function(x){return x.q;});
}

/* ── Utilidades ── */
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function getQOrd(s,qs){if(!qOrd[s])qOrd[s]=shuffle(qs.map(function(q){return q.n;}));return qOrd[s];}
function getOOrd(qid){
  var q=findQ(qid);var n=q&&q.o?q.o.length:4;
  if(q&&q.noShuffle){var a=[];for(var i=0;i<n;i++)a.push(i);return a;}
  if(!oOrd[qid]){var a=[];for(var i=0;i<n;i++)a.push(i);oOrd[qid]=shuffle(a);}
  return oOrd[qid];
}
function imgHtml(key){
  if(!IMGS[key]){console.warn('IMGS: clave no encontrada →',key);return'';}
  return'<div class="clinimg-wrap"><img src="'+IMGS[key]+'" class="clinimg" alt="Imagen clínica" loading="lazy"><div class="clinimg-cap">Imagen clínica</div></div>';
}

/* ── localStorage debounce ── */
function saveLocal(){
  if(!canSave)return;
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    try{
      localStorage.setItem(KEY,JSON.stringify({state:state,qOrd:qOrd,oOrd:oOrd,starred:starred,failHist:failHist,dark:darkMode,timerSec:timerSec}));
      setBadge('Guardado','ok');
    }catch(e){setBadge('Sin guardado','warn');}
  },300);
}
function setBadge(t,c){var b=document.getElementById('save-badge');if(b){b.textContent=t;b.className='sbadge '+c;}}

/* ── Construcción de tarjeta ── */
function buildCard(q,sec,inAll,allPos){
  var qid=sec+'-'+q.n;
  var cid=(inAll?'A-':'S-')+qid;
  var num=inAll?(allPos+1):getNum(sec,q.n);
  var oo=getOOrd(qid);
  var sOpts=oo.map(function(i){return q.o[i];});
  var nc=oo.indexOf(q.c-1)+1;
  var ans=state[qid];
  var cc=ans?(ans.r?' answered-ok':' answered-wrong'):'';
  var badgeCls='qnum'+(inAll?'':' sec-colored');
  var h='<div class="qcard s-'+sec+cc+'" id="card-'+cid+'">';
  h+='<div class="qhead" id="h-'+cid+'" data-cid="'+cid+'" data-qid="'+qid+'" data-sec="'+sec+'" onclick="tog(this.dataset.cid)">';
  h+='<span class="'+badgeCls+'">'+num+'</span>';
  h+='<span class="qtxt">'+q.q+(ans?'<span class="atag '+(ans.r?'ok':'ko')+'">'+(ans.r?'✓ acertada':'✗ fallada')+'</span>':'')+'</span>';
  h+='<button class="star-btn'+(starred[qid]?' on':'')+'\" id="star-'+cid+'" onclick="event.stopPropagation();toggleStar(\''+qid+'\')" title="Marcar (S)"><span class="si">\u2606</span><span class="sf">\u2605</span></button>';
  h+='<span class="chev">▾</span>';
  h+='</div>';
  h+='<div class="qbody" id="b-'+cid+'">';
  if(q.img)h+=imgHtml(q.img);
  if(currentMode==='quick'){
    h+='<div class="quick-card"><div class="quick-rc">✓ Respuesta correcta: opción '+nc+' — '+escH(q.o[q.c-1])+'</div><div class="expbox">'+q.e+'</div></div>';
  } else {
    h+='<ul class="opts" id="opts-'+cid+'">';
    h+=sOpts.map(function(o,i){
      var p=i+1,oc='opt';
      if(ans){oc+=' done';if(p===nc)oc+=' correct';else if(p===ans.c&&!ans.r)oc+=' wrong';}
      return'<li class="'+oc+'" data-qid="'+qid+'" data-pos="'+p+'" data-sec="'+sec+'" onclick="answer(this.dataset.qid,+this.dataset.pos,this.dataset.sec)"><span class="onum">'+p+'.</span><span>'+o+'</span></li>';
    }).join('');
    h+='</ul>';
    if(ans){h+='<div class="expbox"><span class="et">'+(ans.r?'✓ Correcto':'✗ Incorrecto — Respuesta correcta: opción '+nc)+'</span>'+q.e+'</div>';}
  }
  h+='</div></div>';
  return h;
}

/* ── Render sección ── */
function render(sec){
  var qs=D[sec];if(!qs)return;
  var ord=getQOrd(sec,qs);
  var sorted=ord.map(function(n){return qIdx[sec]&&qIdx[sec][n];}).filter(Boolean);
  var el=document.getElementById('qs-'+sec);
  if(el)el.innerHTML=sorted.map(function(q){return buildCard(q,sec,false,0);}).join('');
}

/* ── Render Todos (mezcla inter-secciones) ── */
function renderAll(){
  if(!allOrder)buildAllOrder();
  var el=document.getElementById('qs-all');
  if(el)el.innerHTML=allOrder.map(function(x,i){return buildCard(x.q,x.sec,true,i);}).join('');
}

/* ── Toggle open/close ── */
function tog(cid){
  var b=document.getElementById('b-'+cid),h=document.getElementById('h-'+cid);
  if(!b||!h)return;
  var opening=!b.classList.contains('open');
  b.classList.toggle('open');h.classList.toggle('open');
  if(opening){
    if(activeCid&&activeCid!==cid){var pc=document.getElementById('card-'+activeCid);if(pc)pc.classList.remove('kb-focus');}
    activeCid=cid;
    var card=document.getElementById('card-'+cid);if(card)card.classList.add('kb-focus');
  }else{
    if(activeCid===cid){activeCid=null;var card=document.getElementById('card-'+cid);if(card)card.classList.remove('kb-focus');}
  }
}

/* ── Responder ── */
function answer(qid,pos,sec){
  if(state[qid])return;
  var q=findQ(qid);if(!q)return;
  var oo=getOOrd(qid);
  var nc=oo.indexOf(q.c-1)+1;
  var isRight=pos===nc;
  state[qid]={c:pos,r:isRight};
  // Registro de errores
  if(!isRight){failHist[qid]=(failHist[qid]||0)+1;}
  saveLocal();
  // Actualizar todas las instancias del card (panel sección + panel all)
  // Actualizar opciones en todas las instancias del card
  ['A-'+qid,'S-'+qid].forEach(function(cid){
    var optsEl=document.querySelectorAll('#opts-'+cid+' .opt');
    optsEl.forEach(function(el,i){
      el.classList.add('done');
      if(i+1===nc)el.classList.add('correct');
      else if(i+1===pos&&!isRight)el.classList.add('wrong');
    });
    var bdy=document.getElementById('b-'+cid);
    if(bdy){
      var eb=bdy.querySelector('.expbox');
      if(!eb){eb=document.createElement('div');eb.className='expbox';bdy.appendChild(eb);}
      eb.innerHTML='<span class="et">'+(isRight?'✓ Correcto':'✗ Incorrecto — Respuesta correcta: opción '+nc)+'</span>'+q.e;
    }
    var hd=document.getElementById('h-'+cid);
    if(hd){var qt=hd.querySelector('.qtxt');if(qt&&!qt.querySelector('.atag')){var at=document.createElement('span');at.className='atag '+(isRight?'ok':'ko');at.innerHTML=isRight?'✓ acertada':'✗ fallada';qt.appendChild(at);}}
    var card=document.getElementById('card-'+cid);
    if(card)card.classList.add(isRight?'answered-ok':'answered-wrong');
  });
  updateScores();updateProg();
  if(fFailed[sec]&&isRight){
    var fcard=document.getElementById('card-S-'+qid);
    if(fcard)fcard.style.display='none';
    refreshNF(sec);
  }
}

/* ── Estrella ── */
function toggleStar(qid){
  starred[qid]=!starred[qid];
  ['A-'+qid,'S-'+qid].forEach(function(cid){
    var btn=document.getElementById('star-'+cid);
    if(btn)btn.classList.toggle('on',starred[qid]);
  });
  saveLocal();
}
function filterStarred(){
  starsFilter=!starsFilter;
  var btn=document.getElementById('btn-stars');
  if(btn){btn.style.background=starsFilter?'#fef3c7':'';btn.style.fontWeight=starsFilter?'700':'';}
  document.querySelectorAll('.qcard').forEach(function(card){
    if(starsFilter){
      var hd=card.querySelector('.qhead');
      var qid=hd?hd.dataset.qid:'';
      card.style.display=starred[qid]?'':'none';
    }else{card.style.display='';}
  });
}

/* ── Filtro falladas ── */
function refreshNF(sec){
  var c=document.getElementById('qs-'+sec);if(!c||!fFailed[sec])return;
  var n=c.querySelectorAll('.qcard.answered-wrong').length;
  var m=document.getElementById('nf-'+sec);if(m)m.classList.toggle('show',n===0);
}
function toggleFail(sec){
  fFailed[sec]=!fFailed[sec];
  var btn=document.getElementById('fb-'+sec);
  if(btn){btn.classList.toggle('on',fFailed[sec]);btn.textContent=fFailed[sec]?'← Ver todas':'Solo falladas';}
  var c=document.getElementById('qs-'+sec);if(!c)return;
  var nf=0;
  c.querySelectorAll('.qcard').forEach(function(card){
    if(fFailed[sec]){var show=card.classList.contains('answered-wrong');card.style.display=show?'':'none';if(show)nf++;}
    else{card.style.display='';}
  });
  var m=document.getElementById('nf-'+sec);if(m)m.classList.toggle('show',fFailed[sec]&&nf===0);
}

/* ── Scores y progreso ── */
function updateScores(){
  var tok=0,tok2=0,tok3=0;
  SECS.forEach(function(sec){
    var ok=0,ko=0;
    if(D[sec])D[sec].forEach(function(q){var a=state[sec+'-'+q.n];if(a){if(a.r)ok++;else ko++;}});
    var tot=D[sec]?D[sec].length:0,rem=tot-ok-ko;
    tok+=ok;tok2+=ko;tok3+=rem;
    var eok=document.getElementById('sc-ok-'+sec),eko=document.getElementById('sc-ko-'+sec),erm=document.getElementById('sc-rem-'+sec);
    if(eok)eok.textContent='✓ '+ok;if(eko)eko.textContent='✗ '+ko;if(erm)erm.textContent='○ '+rem;
  });
  var eok=document.getElementById('sc-ok-all'),eko=document.getElementById('sc-ko-all'),erm=document.getElementById('sc-rem-all');
  if(eok)eok.textContent='✓ '+tok;if(eko)eko.textContent='✗ '+tok2;if(erm)erm.textContent='○ '+tok3;
}
function updateProg(){
  var total=0,done=Object.keys(state).length;
  SECS.forEach(function(s){if(D[s])total+=D[s].length;});
  var pct=total>0?Math.round(done/total*100):0;
  var bar=document.getElementById('prog-bar');if(bar)bar.style.width=pct+'%';
}

/* ── Tabs ── */
function showTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  var tb=document.querySelector('.tab.t-'+t);if(tb)tb.classList.add('on');
  var mc=document.getElementById('main-cont');if(mc)mc.setAttribute('data-tab',t);
  var panelAll=document.getElementById('panel-all');
  if(panelAll)panelAll.classList.toggle('visible',t==='all');
  SECS.forEach(function(s){
    var p=document.getElementById('panel-'+s);
    if(p)p.classList.toggle('visible',t===s);
  });
  var gnb=document.getElementById('nota-all');if(gnb){gnb.style.display='none';gnb.className='global-nota-box';}
  clearSearch();
}

/* ── Reset ── */
function resetSec(sec){
  if(D[sec])D[sec].forEach(function(q){var qid=sec+'-'+q.n;delete state[qid];delete oOrd[qid];});
  delete qOrd[sec];fFailed[sec]=false;activeCid=null;
  var btn=document.getElementById('fb-'+sec);if(btn){btn.classList.remove('on');btn.textContent='Solo falladas';}
  var nb=document.getElementById('nota-'+sec);if(nb){nb.style.display='none';nb.className='nota-box';}
  saveLocal();render(sec);
  var m=document.getElementById('nf-'+sec);if(m)m.classList.remove('show');
  updateScores();updateProg();
  // Reconstruir panel all para reflejar cambios
  buildAllOrder();renderAll();
}
function resetAll(){
  Object.keys(state).forEach(function(k){delete state[k];});
  Object.keys(oOrd).forEach(function(k){delete oOrd[k];});
  Object.keys(qOrd).forEach(function(k){delete qOrd[k];});
  activeCid=null;starsFilter=false;allOrder=null;
  var bs=document.getElementById('btn-stars');if(bs){bs.style.background='';bs.style.fontWeight='';}
  SECS.forEach(function(s){
    fFailed[s]=false;
    var btn=document.getElementById('fb-'+s);if(btn){btn.classList.remove('on');btn.textContent='Solo falladas';}
    var nb=document.getElementById('nota-'+s);if(nb){nb.style.display='none';nb.className='nota-box';}
  });
  saveLocal();
  SECS.forEach(render);
  buildAllOrder();renderAll();
  var gnb=document.getElementById('nota-all');if(gnb){gnb.style.display='none';gnb.className='global-nota-box';}
  updateScores();updateProg();
}

/* ── Nota y revisión ── */
function buildRevList(sec){
  var qs=D[sec];if(!qs)return'';
  var failed=qs.filter(function(q){var a=state[sec+'-'+q.n];return a&&!a.r;});
  if(!failed.length)return'';
  var html='<div class="review-list"><div class="review-title">📋 '+failed.length+' pregunta'+(failed.length>1?'s':'')+' fallada'+(failed.length>1?'s':'')+' — repasa aquí:</div>';
  failed.forEach(function(q){
    var qid=sec+'-'+q.n;var oo=getOOrd(qid);var nc=oo.indexOf(q.c-1)+1;
    html+='<details class="review-item"><summary><span><b>'+getNum(sec,q.n)+'.</b> '+q.q+'</span></summary>';
    html+='<div class="review-body"><div class="review-ans">✓ Opción '+nc+': '+escH(q.o[q.c-1]||'')+'</div>';
    html+='<div class="expbox">'+q.e+'</div></div></details>';
  });
  return html+'</div>';
}
function calcNota(sec){
  var qs=D[sec];if(!qs)return;
  var total=qs.length,ok=0,ko=0,skip=0;
  qs.forEach(function(q){var a=state[sec+'-'+q.n];if(!a)skip++;else if(a.r)ok++;else ko++;});
  var nota=Math.max(0,(ok-ko/3)/total*10),str=nota.toFixed(2),pass=nota>=5;
  var box=document.getElementById('nota-'+sec);if(!box)return;
  box.className='nota-box '+(pass?'pass':'fail');
  box.innerHTML='<span class="nota-score">'+(pass?'✓':'✗')+' '+str+' / 10</span>'
    +'<div class="nota-detail">Aciertos: '+ok+' | Fallos: '+ko+' | Sin responder: '+skip+'<br>'
    +'('+ok+' − '+ko+'/3) / '+total+' × 10 = '+str+'</div>'
    +buildRevList(sec);
  box.style.display='block';
}
function calcNotaAll(){
  var total=0,ok=0,ko=0,skip=0;
  SECS.forEach(function(sec){
    var qs=D[sec];if(!qs)return;
    total+=qs.length;
    qs.forEach(function(q){var a=state[sec+'-'+q.n];if(!a)skip++;else if(a.r)ok++;else ko++;});
  });
  var nota=Math.max(0,(ok-ko/3)/total*10),str=nota.toFixed(2),pass=nota>=5;
  var box=document.getElementById('nota-all');if(!box)return;
  box.className='global-nota-box '+(pass?'pass':'fail');
  var html='<span class="nota-score">'+(pass?'✓':'✗')+' '+str+' / 10 (global)</span>'
    +'<div class="nota-detail">Aciertos: '+ok+' | Fallos: '+ko+' | Sin responder: '+skip+'<br>'
    +'('+ok+' − '+ko+'/3) / '+total+' × 10 = '+str+'</div>';
  SECS.forEach(function(sec){
    var rv=buildRevList(sec);
    if(rv){var m=META.secciones[sec]||{};html+='<div class="review-sec-label">'+(m.emoji?m.emoji+' ':'')+escH(m.label||sec)+'</div>'+rv;}
  });
  box.innerHTML=html;box.style.display='block';
}

/* ── Estadísticas de errores ── */
function toggleStats(){
  statsVisible=!statsVisible;
  var btn=document.getElementById('btn-stats');
  if(btn){btn.style.background=statsVisible?'var(--ko-bg)':'';btn.style.color=statsVisible?'var(--ko-t)':'';}
  var box=document.getElementById('stats-global');
  if(!box)return;
  if(!statsVisible){box.classList.remove('show');return;}
  var entries=Object.entries(failHist).filter(function(e){return e[1]>0;});
  if(!entries.length){box.innerHTML='<div class="stats-title">📊 Sin errores registrados todavía</div>';box.classList.add('show');return;}
  entries.sort(function(a,b){return b[1]-a[1];});
  var top=entries.slice(0,10);
  var maxV=top[0][1];
  var html='<div class="stats-title">📊 Preguntas más falladas (acumulado entre sesiones)</div>';
  top.forEach(function(e,i){
    var qid=e[0],count=e[1];
    var q=findQ(qid);if(!q)return;
    var sec=getSecFromQid(qid),n=getNFromQid(qid);
    var m=META.secciones[sec]||{};
    var pct=Math.round(count/maxV*100);
    html+='<div class="stats-item">';
    html+='<span class="stats-n" style="min-width:18px;color:var(--ko-t);font-weight:700">'+(i+1)+'.</span>';
    html+='<span class="stats-q">'+(m.emoji?m.emoji+' ':'')+getNum(sec,n)+'. '+q.q.substring(0,60)+(q.q.length>60?'…':'')+'</span>';
    html+='<div class="stats-bar-wrap"><div class="stats-bar" style="width:'+pct+'%"></div></div>';
    html+='<span class="stats-n">'+count+'✗</span>';
    html+='</div>';
  });
  box.innerHTML=html;box.classList.add('show');
}

/* ── Buscador ── */
function onSearch(val){
  var v=val.trim().toLowerCase();
  var clr=document.getElementById('search-clear');
  var cnt=document.getElementById('search-count');
  if(clr)clr.style.display=v?'block':'none';
  var found=0,total=0;
  document.querySelectorAll('.qcard').forEach(function(card){
    total++;
    if(!v){card.classList.remove('search-hidden');found++;}
    else{
      var qtxt=card.querySelector('.qtxt');
      var match=qtxt&&qtxt.textContent.toLowerCase().indexOf(v)!==-1;
      card.classList.toggle('search-hidden',!match);
      if(match)found++;
    }
  });
  if(cnt){
    if(v){cnt.textContent=found+' de '+total+' preguntas';cnt.style.display='block';}
    else{cnt.style.display='none';}
  }
  // Mostrar "sin resultados" por panel
  ['all'].concat(SECS).forEach(function(s){
    var panel=document.getElementById('panel-'+s);if(!panel||!panel.classList.contains('visible'))return;
    var cards=panel.querySelectorAll('.qcard:not(.search-hidden)');
    var nr=document.getElementById('nr-'+s);if(nr)nr.style.display=cards.length===0&&v?'block':'none';
  });
}
function clearSearch(){
  var si=document.getElementById('search-input');if(si)si.value='';
  onSearch('');
}

/* ── Modo ── */
function setMode(mode){
  currentMode=mode;
  document.getElementById('mode-test').classList.toggle('on',mode==='test');
  document.getElementById('mode-quick').classList.toggle('on',mode==='quick');
  // Rerenderizar todo
  SECS.forEach(render);renderAll();
}

/* ── Modo oscuro ── */
function applyTheme(){
  document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');
  var btn=document.getElementById('btn-dark');if(btn)btn.textContent=darkMode?'☀️':'🌙';
}
function toggleDark(){darkMode=!darkMode;applyTheme();saveLocal();}

/* ── Temporizador ── */
function initTimer(){
  timerRemaining=timerSec;
  renderTimer();
  var disp=document.getElementById('timer-display');
  if(disp){
    disp.addEventListener('click',function(){startEditTimer();});
  }
}
function fmtTime(s){
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return h+':'+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;
}
function renderTimer(){
  var disp=document.getElementById('timer-display');
  if(!disp)return;
  disp.textContent=fmtTime(timerRemaining);
  disp.classList.toggle('danger',timerSec>0&&timerRemaining===0);
}
function timerToggle(){
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('btn-tplay').textContent='▶';
  }else{
    if(timerRemaining<=0&&timerSec>0)timerRemaining=timerSec;
    timerRunning=true;
    document.getElementById('btn-tplay').textContent='⏸';
    timerInterval=setInterval(function(){
      if(timerRemaining>0){timerRemaining--;renderTimer();}
      else{clearInterval(timerInterval);timerRunning=false;document.getElementById('btn-tplay').textContent='▶';renderTimer();}
    },1000);
  }
}
function timerReset(){
  clearInterval(timerInterval);timerRunning=false;
  timerRemaining=timerSec;
  document.getElementById('btn-tplay').textContent='▶';
  renderTimer();
}
function startEditTimer(){
  var disp=document.getElementById('timer-display');if(!disp)return;
  if(timerRunning){timerToggle();}
  var old=fmtTime(timerRemaining);
  disp.contentEditable='true';disp.classList.add('editing');
  disp.textContent=old;
  disp.focus();
  var range=document.createRange();range.selectNodeContents(disp);
  var sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  function commit(){
    disp.contentEditable='false';disp.classList.remove('editing');
    var txt=disp.textContent.trim();
    var parts=txt.split(':').map(Number);
    var secs=0;
    if(parts.length===3)secs=parts[0]*3600+parts[1]*60+parts[2];
    else if(parts.length===2)secs=parts[0]*60+parts[1];
    else if(parts.length===1)secs=parts[0]*60;
    if(!isNaN(secs)&&secs>=0){timerSec=secs;timerRemaining=secs;saveLocal();}
    renderTimer();
  }
  disp.addEventListener('blur',commit,{once:true});
  disp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();disp.blur();}});
}

/* ── Helpers cid ── */
function cidToQid(cid){return cid.replace(/^[AS]-/,'');}

/* ── Teclado ── */
function handleKey(e){
  var tg=e.target.tagName;
  if(tg==='INPUT'||tg==='TEXTAREA'||e.target.contentEditable==='true')return;
  var k=e.key;
  if(k>='1'&&k<='5'){
    if(activeCid&&!state[cidToQid(activeCid)]){
      var aqid=cidToQid(activeCid);
      var pos=parseInt(k),q=findQ(aqid);
      if(q&&pos<=q.o.length){e.preventDefault();answer(aqid,pos,getSecFromQid(aqid));}
    }
  }else if(k==='ArrowDown'||k==='ArrowUp'){
    e.preventDefault();navigateQ(k==='ArrowDown'?1:-1);
  }else if(k==='s'||k==='S'){
    if(activeCid)toggleStar(cidToQid(activeCid));
  }
}
function navigateQ(dir){
  var cards=Array.from(document.querySelectorAll('.sec-panel.visible .qcard')).filter(function(c){return c.style.display!=='none'&&!c.classList.contains('search-hidden');});
  var cids=cards.map(function(c){return c.id.replace('card-','');});
  if(!cids.length)return;
  var idx=activeCid?cids.indexOf(activeCid):-1;
  var nidx=Math.max(0,Math.min(cids.length-1,idx+dir));
  var ncid=cids[nidx];if(!ncid||ncid===activeCid)return;
  if(activeCid){var ob=document.getElementById('b-'+activeCid);var oh=document.getElementById('h-'+activeCid);if(ob)ob.classList.remove('open');if(oh)oh.classList.remove('open');var oc=document.getElementById('card-'+activeCid);if(oc)oc.classList.remove('kb-focus');}
  activeCid=ncid;
  var nb=document.getElementById('b-'+ncid);var nh=document.getElementById('h-'+ncid);
  if(nb)nb.classList.add('open');if(nh)nh.classList.add('open');
  var nc2=document.getElementById('card-'+ncid);if(nc2){nc2.classList.add('kb-focus');nc2.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
</script>
