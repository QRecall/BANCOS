<!--
=============================================================
  MOTOR BANCO MIR — v10
  Novedades respecto a v9:
  - Numeración correlativa fija por sección (no se mezcla)
  - Badge neutro en pestaña "Todos" + mezcla real inter-secciones
  - Temporizador sticky editable en header (play/pausa/reset)
  - Buscador de texto en tiempo real
  - Modo repaso rápido (muestra RC + explicación directamente)
  - Estadísticas de errores recurrentes entre sesiones
=============================================================
-->
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">Banco MIR</title>
<style>
:root{
  --bg:#f4f3ef;--surf:#fff;--bd:#e5e5e5;--bd2:#ddd;
  --txt:#1a1a1a;--txt2:#555;--txt3:#999;--txt4:#666;
  --hdr:#1a1a1a;--hdr-t:#fff;
  --ok-bg:#e6f9ef;--ok-t:#0b6e52;--ok-bd:#2da060;
  --ko-bg:#fdecea;--ko-t:#b91c1c;--ko-bd:#d94f45;
  --sc-ok:#dcf5ed;--sc-ko:#fdecea;--sc-rem:#f0f0f0;--sc-rem-t:#666;
  --exp:#fffbe6;--exp-bd:#f0c04a;--exp-t:#5a4500;
  --prog:#e5e5e5;--prog-fill:#1a56db;
  --star:#ccc;--star-on:#f59e0b;
  --hint:#fafafa;--hint-bd:#eee;
  --tab-bd:#ddd;--tab-t:#555;
  --all-bg:#e8f0fe;--all-t:#1a56db;--all-bd:#1a56db;
  --fab:#1a1a1a;--fab-t:#fff;
  --nota-btn-t:#1a56db;--nota-btn-bd:#1a56db;--nota-btn-bg:var(--surf);
  --timer-bg:#222;--timer-t:#fff;--timer-danger:#ef4444;
}
[data-theme="dark"]{
  --bg:#0f0f1a;--surf:#1e1e30;--bd:#2a2a45;--bd2:#333355;
  --txt:#e8e8f0;--txt2:#aaa;--txt3:#555;--txt4:#888;
  --hdr:#0a0a14;--hdr-t:#e8e8f0;
  --ok-bg:#0b3020;--ok-t:#4ade80;--ok-bd:#166534;
  --ko-bg:#2d0a0a;--ko-t:#f87171;--ko-bd:#7f1d1d;
  --sc-ok:#0b3020;--sc-ko:#2d0a0a;--sc-rem:#252540;--sc-rem-t:#aaa;
  --exp:#1a1500;--exp-bd:#a37f10;--exp-t:#d4b84a;
  --prog:#2a2a45;--prog-fill:#60a5fa;
  --star:#444;--star-on:#f59e0b;
  --hint:#1a1a2e;--hint-bd:#2a2a45;
  --tab-bd:#2a2a45;--tab-t:#aaa;
  --all-bg:#1a2a4a;--all-t:#60a5fa;--all-bd:#3b82f6;
  --fab:#2a2a50;--fab-t:#e8e8f0;
  --nota-btn-t:#60a5fa;--nota-btn-bd:#3b82f6;--nota-btn-bg:var(--surf);
  --timer-bg:#1a1a2e;--timer-t:#e8e8f0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .25s,color .25s}

/* ── Header ── */
header{background:var(--hdr);color:var(--hdr-t);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
header h1{font-size:13.5px;font-weight:600;white-space:nowrap}
.hright{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hmeta{font-size:11px;color:#888}
.hbtn{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:3px 5px;border-radius:5px;transition:background .15s;color:var(--hdr-t)}
.hbtn:hover{background:rgba(255,255,255,.12)}
.sbadge{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:500}
.sbadge.ok{background:#15803d;color:#dcfce7}.sbadge.warn{background:#92400e;color:#fef3c7}

/* ── Temporizador ── */
#timer-wrap{display:flex;align-items:center;gap:4px;background:var(--timer-bg);border-radius:7px;padding:3px 8px;border:1px solid rgba(255,255,255,.1)}
#timer-display{font-size:13px;font-weight:700;font-family:monospace;color:var(--timer-t);min-width:58px;text-align:center;cursor:pointer;border-radius:3px;padding:1px 3px}
#timer-display:hover{background:rgba(255,255,255,.08)}
#timer-display.editing{background:rgba(255,255,255,.15);outline:none;color:var(--timer-t)}
#timer-display.danger{color:var(--timer-danger)}
#timer-wrap button{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:12px;padding:1px 3px;border-radius:3px;line-height:1}
#timer-wrap button:hover{background:rgba(255,255,255,.12);color:#fff}

/* ── Barra de progreso ── */
#prog-wrap{height:3px;background:var(--prog);position:sticky;top:40px;z-index:99}
#prog-bar{height:100%;background:var(--prog-fill);width:0%;transition:width .4s}

/* ── Contenedor ── */
.container{max-width:820px;margin:0 auto;padding:16px 12px}

/* ── Buscador ── */
.search-wrap{position:relative;margin-bottom:13px}
.search-wrap input{width:100%;padding:8px 34px 8px 12px;border:1.5px solid var(--bd2);border-radius:8px;font-size:13px;background:var(--surf);color:var(--txt);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--prog-fill)}
.search-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--txt3);font-size:16px;display:none;line-height:1}
#search-count{font-size:11px;color:var(--txt3);margin-top:4px;display:none}

/* ── Modo repaso ── */
.mode-bar{display:flex;gap:6px;margin-bottom:12px;align-items:center}
.mode-btn{padding:5px 12px;border:1.5px solid var(--bd2);border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;background:var(--surf);color:var(--txt2);transition:all .15s}
.mode-btn:hover{border-color:#999}
.mode-btn.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Tabs ── */
.tabs{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.tab{padding:7px 14px;border:1.5px solid var(--tab-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;background:var(--surf);color:var(--tab-t);transition:all .15s}
.tab:hover{border-color:#999;color:var(--txt)}
.tab.t-all.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Score global ── */
.ph-global{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 15px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-left:4px solid var(--prog-fill)}
.score-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.sc{font-size:12px;font-weight:600;padding:3px 9px;border-radius:6px}
.sc.ok{background:var(--sc-ok);color:var(--ok-t)}.sc.ko{background:var(--sc-ko);color:var(--ko-t)}.sc.rem{background:var(--sc-rem);color:var(--sc-rem-t)}

/* ── Acciones ── */
.global-actions{display:none;margin-bottom:10px;gap:7px;flex-wrap:wrap;align-items:center}
.container[data-tab="all"] .global-actions{display:flex}
.sec-actions{margin:6px 0 15px;display:flex;gap:7px;flex-wrap:wrap}
.reset-btn{padding:7px 14px;background:var(--fab);color:var(--fab-t);border:none;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:opacity .15s}
.reset-btn:hover{opacity:.82}
.nota-btn{padding:7px 14px;background:var(--nota-btn-bg);color:var(--nota-btn-t);border:1.5px solid var(--nota-btn-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:background .15s}
.nota-btn:hover{background:var(--all-bg)}

/* ── Nota box ── */
.nota-box,.global-nota-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:2px solid var(--bd2);font-size:13px;line-height:1.7;display:none}
.nota-box.pass,.global-nota-box.pass{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t)}
.nota-box.fail,.global-nota-box.fail{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t)}
.nota-score{font-size:26px;font-weight:700;display:block;margin-bottom:4px}
.nota-detail{font-size:12px;opacity:.85;font-family:monospace}

/* ── Vista revisión ── */
.review-list{margin-top:12px;border-top:1px solid var(--bd2);padding-top:10px}
.review-title{font-size:12px;font-weight:700;margin-bottom:9px;color:var(--txt)}
.review-sec-label{font-size:11.5px;font-weight:700;color:var(--txt3);margin:8px 0 5px;padding-top:6px;border-top:1px solid var(--bd)}
.review-item{background:var(--surf);border-radius:8px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden}
.review-item summary{padding:9px 12px;cursor:pointer;font-size:12.5px;color:var(--txt);list-style:none;display:flex;gap:8px;align-items:flex-start}
.review-item summary::-webkit-details-marker{display:none}
.review-item summary::before{content:'▶';font-size:9px;color:var(--txt3);flex-shrink:0;margin-top:4px;transition:transform .18s}
details[open] summary::before{transform:rotate(90deg)}
.review-body{padding:0 12px 11px}
.review-ans{font-size:12px;color:var(--ok-t);margin-bottom:7px;font-weight:500}

/* ── Estadísticas ── */
.stats-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--surf);display:none}
.stats-box.show{display:block}
.stats-title{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--txt)}
.stats-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12.5px}
.stats-item:last-child{border-bottom:none}
.stats-bar-wrap{flex:1;background:var(--sc-rem);border-radius:4px;height:6px;overflow:hidden}
.stats-bar{height:100%;background:var(--ko-bd);border-radius:4px;transition:width .4s}
.stats-n{font-size:11px;color:var(--txt3);white-space:nowrap}
.stats-q{flex:2;color:var(--txt);font-size:12px;line-height:1.3}

/* ── Panel secciones ── */
.sec-panel{display:none}.sec-panel.visible{display:block}
.ph{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ph-left{flex:1;display:flex;flex-direction:column;gap:5px}
.ph-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:1px}
.ph-desc{font-size:12px;color:var(--txt4)}
.fbtn{padding:6px 12px;font-size:12px;font-weight:500;border:1.5px solid var(--bd2);border-radius:8px;cursor:pointer;background:var(--surf);color:var(--txt2);transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:#999;color:var(--txt)}.fbtn.on{background:var(--ko-bg);color:#b91c1c;border-color:#f87171}
.no-failed{display:none;text-align:center;padding:16px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin-top:4px}
.no-failed.show{display:block}
.no-results{display:none;text-align:center;padding:20px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin:8px 0}

/* ── Hint ── */
.hint{font-size:11px;color:var(--txt3);margin-bottom:15px;padding:7px 11px;background:var(--hint);border-radius:6px;border:1px solid var(--hint-bd)}

/* ── Tarjeta ── */
.qcard{background:var(--surf);border-radius:10px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden;transition:box-shadow .15s}
.qcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.qcard.kb-focus{outline:2px solid var(--prog-fill);outline-offset:-2px}
.qcard.search-hidden{display:none}
.qhead{padding:11px 13px;cursor:pointer;display:flex;align-items:flex-start;gap:9px}

/* ── Badge numérico ── */
.qnum{font-size:11px;font-weight:700;padding:3px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;background:var(--sc-rem);color:var(--sc-rem-t)}
/* En pestaña "Todos" siempre neutro; en sección aplica color de sección */
.qnum.sec-colored{background:var(--sec-dim);color:var(--sec-col)}

.qtxt{font-size:13px;line-height:1.5;flex:1}
.star-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--star);padding:0 2px;flex-shrink:0;margin-top:2px;line-height:1;transition:color .15s,transform .15s}
.star-btn:hover{transform:scale(1.2)}
.star-btn .si{display:inline}.star-btn .sf{display:none}
.star-btn.on .si{display:none}.star-btn.on .sf{display:inline;color:var(--star-on)}
.chev{font-size:15px;color:var(--bd2);flex-shrink:0;margin-top:2px;transition:transform .2s}
.qhead.open .chev{transform:rotate(180deg)}
.qbody{display:none;padding:0 13px 13px}.qbody.open{display:block}

/* ── Imagen ── */
.clinimg-wrap{margin:9px 0 7px;background:#111;border-radius:8px;overflow:hidden;border:1px solid var(--bd2);text-align:center}
.clinimg{max-width:100%;max-height:340px;object-fit:contain;display:block;margin:0 auto}
.clinimg-cap{font-size:11px;color:var(--txt3);padding:4px 0 5px;background:var(--hint);border-top:1px solid var(--bd)}

/* ── Opciones ── */
.opts{list-style:none;margin-top:9px;display:flex;flex-direction:column;gap:5px}
.opt{padding:9px 12px;border-radius:8px;border:1.5px solid var(--bd2);cursor:pointer;display:flex;align-items:flex-start;gap:9px;color:var(--txt);font-size:13px;line-height:1.45;transition:border-color .12s,background .12s;user-select:none}
.opt:hover:not(.done){border-color:#999;background:var(--hint)}
.opt.correct{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t);font-weight:500;cursor:default}
.opt.wrong{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t);cursor:default}
.opt.done:not(.correct):not(.wrong){cursor:default;opacity:.7}
.onum{font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;min-width:15px}

/* ── Modo repaso rápido ── */
.quick-card{padding:9px 12px;border-radius:8px;border:1.5px solid var(--ok-bd);background:var(--ok-bg);margin-top:8px}
.quick-rc{font-size:12.5px;font-weight:600;color:var(--ok-t);margin-bottom:6px}

/* ── Explicación ── */
.expbox{margin-top:10px;padding:10px 12px;background:var(--exp);border-left:4px solid var(--exp-bd);border-radius:0 8px 8px 0;font-size:12.5px;color:var(--exp-t);line-height:1.65}
.expbox b,.expbox strong{font-weight:600}
.et{display:block;margin-bottom:4px;font-weight:600;font-size:13px}
.atag{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
.atag.ok{background:var(--sc-ok);color:var(--ok-t)}.atag.ko{background:var(--sc-ko);color:#c0392b}

/* ── All-tab CSS ── */
.container[data-tab="all"] .ph{display:none!important}
.container[data-tab="all"] .sec-actions{display:none!important}
.container[data-tab="all"] .no-failed{display:none!important}
.container[data-tab="all"] .nota-box{display:none!important}
.container:not([data-tab="all"]) .global-nota-box{display:none!important}
.container:not([data-tab="all"]) #stats-global{display:none!important}
</style>
</head>
<body>
<header>
  <h1 id="h-tit">Banco MIR</h1>
  <div class="hright">
    <span class="hmeta" id="h-meta"></span>
    <!-- Temporizador -->
    <div id="timer-wrap" title="Haz clic en el tiempo para editar">
      <span id="timer-display">0:00:00</span>
      <button id="btn-tplay" onclick="timerToggle()" title="Play/Pausa">▶</button>
      <button onclick="timerReset()" title="Reset">↺</button>
    </div>
    <button class="hbtn" id="btn-dark" onclick="toggleDark()" title="Modo oscuro">🌙</button>
    <span id="save-badge" class="sbadge"></span>
  </div>
</header>
<div id="prog-wrap"><div id="prog-bar"></div></div>

<div class="container" id="main-cont" data-tab="all">
  <!-- Buscador -->
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="🔍 Buscar en enunciados..." oninput="onSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div id="search-count"></div>

  <!-- Modo -->
  <div class="mode-bar">
    <span style="font-size:11.5px;color:var(--txt3);font-weight:600">MODO:</span>
    <button class="mode-btn on" id="mode-test" onclick="setMode('test')">📝 Test</button>
    <button class="mode-btn" id="mode-quick" onclick="setMode('quick')">⚡ Repaso rápido</button>
    <button class="mode-btn" id="btn-stars" onclick="filterStarred()" style="margin-left:auto;border-color:#f59e0b;color:#b45309">⭐ Marcadas</button>
    <button class="mode-btn" id="btn-stats" onclick="toggleStats()">📊 Errores</button>
  </div>

  <!-- Stats globales -->
  <div class="stats-box" id="stats-global"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabs-wrap"></div>

  <!-- Score global -->
  <div class="ph-global">
    <div class="ph-left">
      <span class="ph-desc" id="ph-gdesc"></span>
      <div class="score-row">
        <span class="sc ok" id="sc-ok-all">✓ 0</span>
        <span class="sc ko" id="sc-ko-all">✗ 0</span>
        <span class="sc rem" id="sc-rem-all">○ 0</span>
      </div>
    </div>
  </div>
  <div class="global-actions">
    <button class="reset-btn" onclick="resetAll()">↺ Reiniciar y mezclar</button>
    <button class="nota-btn" onclick="calcNotaAll()">✎ Calcular nota global</button>
  </div>
  <div class="global-nota-box" id="nota-all"></div>
  <p class="hint">💡 <b>1–5</b> responde · <b>↑↓</b> navega · <b>S</b> marca ⭐ · Progreso guardado automáticamente</p>

  <div id="panels-wrap"></div>
</div>

<script>
/* ═══════════════════════════════════════ MOTOR v10 ═══════════════════════════════════════ */

var KEY=/*__KEY__*/'microinmuno_banco_2025_v1';

var D=/*__D_JSON__*/{"micro":[{"n":"1","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes afirmaciones NO corresponde a los postulados originales de Koch (aunque es verdadera)?","o":["En una enfermedad infecciosa, el microorganismo que causa la infecci\u00f3n se encuentra en el individuo enfermo y no en los individuos sanos.","Algunas enfermedades infecciosas est\u00e1n provocadas por diversos microorganismos.","El microorganismo causante de la infecci\u00f3n debe poder ser cultivado a partir de los productos o secreciones del individuo enfermo.","Cuando el microorganismo pat\u00f3geno es inoculado a un animal susceptible de infectarse, debe reproducir la sintomatolog\u00eda de la enfermedad observada en el individuo enfermo."],"c":2,"e":"El postulado original de Koch exige que el microorganismo se halle <b>exclusivamente</b> en el enfermo. La excepci\u00f3n (enfermedades por m\u00faltiples microorganismos) es verdadera pero no figura en los postulados cl\u00e1sicos."},{"n":"2","noShuffle":false,"img":null,"q":"De las siguientes combinaciones microorganismo/t\u00e9cnica de diagn\u00f3stico directo, se\u00f1ala cu\u00e1l ser\u00eda la m\u00e1s adecuada:","o":["Detecci\u00f3n de par\u00e1sitos por microscopia","Detecci\u00f3n de hongos y bacterias por PCR","Detecci\u00f3n de hongos y bacterias por inmunocromatograf\u00eda","Detecci\u00f3n de virus por cultivo"],"c":1,"e":"La <b>microscopia</b> es el m\u00e9todo directo de elecci\u00f3n para par\u00e1sitos: su tama\u00f1o y morfolog\u00eda permiten identificarlos visualmente."},{"n":"3","noShuffle":false,"img":null,"q":"El peptidoglicano:","o":["Es degradado por la lisozima","Est\u00e1 compuesto por cadenas de p\u00e9ptidos unidas a trav\u00e9s de enlaces en los que participan az\u00facares","Forma parte de la c\u00e1psula bacteriana","Solamente est\u00e1 presente en las bacterias Gram negativas"],"c":1,"e":"La <b>lisozima</b> hidroliza los enlaces \u03b2-1,4 entre el NAM y el NAG del peptidoglicano. Est\u00e1 presente en ambos tipos bacterianos."},{"n":"4","noShuffle":false,"img":null,"q":"El carbunco:","o":["Es una enfermedad infecciosa que afecta \u00fanicamente a humanos","Est\u00e1 provocada por la especie Bacillus cereus","La forma gastrointestinal puede ser em\u00e9tica o diarreica","La inhalaci\u00f3n de esporas est\u00e1 relacionada con el bioterrorismo"],"c":4,"e":"El carbunco por inhalaci\u00f3n de esporas de <b>Bacillus anthracis</b> es potencialmente letal y ha sido usado como agente de bioterrorismo. Es una zoonosis."},{"n":"5","noShuffle":false,"img":null,"q":"Cronol\u00f3gicamente las fases de la curva de crecimiento de un microorganismo son:","o":["Exponencial, estacionaria, latencia y muerte","Latencia, exponencial, estacionaria y muerte","Estacionaria, exponencial, latencia y muerte","Estacionaria, exponencial, muerte y latencia"],"c":2,"e":"La curva de crecimiento bacteriano sigue: <b>latencia</b> \u2192 <b>exponencial</b> \u2192 <b>estacionaria</b> \u2192 <b>muerte</b>."},{"n":"6","noShuffle":false,"img":null,"q":"La fiebre reum\u00e1tica y la glomerulonefritis aguda est\u00e1n provocadas por:","o":["Toxinas secretadas por Streptococcus pneumoniae","Una reacci\u00f3n cruzada de los anticuerpos generados frente a Streptococcus pyogenes","Una reacci\u00f3n cruzada de los anticuerpos generados frente a Enterococcus faecalis","Toxinas secretadas por Staphylococcus aureus"],"c":2,"e":"<b>Streptococcus pyogenes</b> genera anticuerpos que por reactividad cruzada atacan tejidos propios (miocardio, ri\u00f1\u00f3n). Mecanismo de hipersensibilidad tipo II/III."},{"n":"7","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes m\u00e9todos f\u00edsicos o qu\u00edmicos NO es esterilizante?","o":["Calor h\u00famedo","\u00d3xido de etileno","Radiaci\u00f3n ionizante","Hipoclorito de sodio"],"c":4,"e":"El <b>hipoclorito de sodio</b> es desinfectante de alto nivel pero NO esterilizante: no elimina todas las esporas en condiciones est\u00e1ndar."},{"n":"8","noShuffle":false,"img":null,"q":"Un pat\u00f3geno oportunista:","o":["No necesita producir factores de virulencia para provocar una enfermedad infecciosa","Su patogenicidad depende en exclusiva de la susceptibilidad del hu\u00e9sped","No se puede aislar de un individuo sano","Puede mantener una relaci\u00f3n de mutualismo o parasitismo con su hospedador"],"c":3,"e":"Un pat\u00f3geno oportunista puede colonizar individuos sanos sin causar enfermedad, pero en <b>inmunocomprometidos</b> genera infecci\u00f3n grave."},{"n":"9","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes afirmaciones sobre el g\u00e9nero Neisseria es correcta?","o":["Neisseria meningitidis provoca una enfermedad de declaraci\u00f3n obligatoria (EDO)","Existen vacunas eficaces frente a las dos especies que provocan infecci\u00f3n en humanos","Neisseria gonorrhoeae se clasifica en serovares seg\u00fan la c\u00e1psula","Las bacterias se agrupan en diplococos"],"c":4,"e":"<b>Neisseria</b> son diplococos Gram negativos. N. meningitidis tiene vacuna; N. gonorrhoeae carece de c\u00e1psula y no tiene vacuna comercial eficaz."},{"n":"10","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l es la diferencia principal entre Campylobacter jejuni y Helicobacter pylori?","o":["La transmisi\u00f3n de persona a persona es importante en C. jejuni pero rara en H. pylori","C. jejuni provoca linfomas asociados a mucosa y H. pylori provoca complicaciones autoinmunitarias","C. jejuni es sensible a los \u00e1cidos g\u00e1stricos mientras que H. pylori los consigue neutralizar","C. jejuni es microaer\u00f3filo y H. pylori es aerobio estricto"],"c":3,"e":"<b>H. pylori</b> produce ureasa que neutraliza el pH g\u00e1strico. C. jejuni es sensible al \u00e1cido y coloniza el intestino delgado. Ambos son microaer\u00f3filos."},{"n":"11","noShuffle":false,"img":null,"q":"En una enfermedad infecciosa:","o":["La aparici\u00f3n/desaparici\u00f3n de s\u00edntomas significa presencia/ausencia de microorganismos","No tienen por qu\u00e9 aparecer alteraciones fisiol\u00f3gicas en el individuo","Siempre existe un periodo de incubaci\u00f3n","Siempre existe un periodo de convalecencia"],"c":3,"e":"Toda enfermedad infecciosa tiene un <b>periodo de incubaci\u00f3n</b>. No siempre hay convalecencia ni s\u00edntomas (portadores asintom\u00e1ticos)."},{"n":"12","noShuffle":true,"img":null,"q":"\u00bfCu\u00e1l de las siguientes afirmaciones sobre Salmonella enterica serovar typhi es correcta?","o":["Es un pat\u00f3geno humano estricto","En los portadores cr\u00f3nicos sobrevive en la ves\u00edcula biliar","Provoca la fiebre tifoidea","Todas son correctas"],"c":4,"e":"<b>Salmonella typhi</b> es pat\u00f3geno humano estricto que causa fiebre tifoidea. En portadores cr\u00f3nicos persiste en la ves\u00edcula biliar."},{"n":"13","noShuffle":false,"img":null,"q":"Clostridium perfringens provoca:","o":["Peste","Gangrena gaseosa","Colitis postantibi\u00f3tica","S\u00edndrome de Guillain-Barr\u00e9"],"c":2,"e":"<b>C. perfringens</b> produce alfa-toxina (lecitinasa) que destruye tejidos blandos generando gas: <b>gangrena gaseosa</b>. Colitis postantibi\u00f3tica es por C. difficile."},{"n":"14","noShuffle":false,"img":null,"q":"Inoculamos un microorganismo en tubo de cultivo. Crece a lo largo de todo el tubo pero con mayor crecimiento en la zona de contacto con el aire. Este microorganismo es:","o":["Aerobio facultativo","Aerobio estricto","Microaer\u00f3filo","Anaerobio estricto"],"c":1,"e":"Un <b>aerobio facultativo</b> crece en todo el tubo pero prefiere la zona superior rica en O\u2082. Aerobio estricto solo crecer\u00eda arriba; anaerobio solo en el fondo."},{"n":"15","noShuffle":true,"img":null,"q":"Una cepa es:","o":["Un conjunto de microorganismos gen\u00e9ticamente id\u00e9nticos","El rango taxon\u00f3mico m\u00e1s bajo en el que se suelen agrupar los organismos","El primer aislado que se obtiene de una especie","Todas son correctas"],"c":4,"e":"Una <b>cepa</b> es un cultivo puro derivado de un \u00fanico aislado, con caracter\u00edsticas gen\u00e9ticas propias."},{"n":"16","noShuffle":false,"img":null,"q":"Las opsoninas facilitan:","o":["La lisis de dichos microorganismos.","La fagocitosis de dichos microorganismos.","La actividad de los anticuerpos.","La citotoxicidad de las c\u00e9lulas NK."],"c":2,"e":"Las <b>opsoninas</b> (IgG, C3b) recubren la superficie microbiana y se unen a receptores Fc o del complemento en fagocitos, potenciando la <b>fagocitosis</b>."},{"n":"17","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 especie bacteriana coincide con la siguiente descripci\u00f3n? Bacilos en forma de coma, aerobios, gram-negativos y fermentadores que provocan diarrea acuosa y v\u00f3mitos con riesgo de deshidrataci\u00f3n grave.","o":["Vibrio cholerae","Shigella dysenteriae","Campylobacter jejuni","Yersinia enterocolitica"],"c":1,"e":"<b>Vibrio cholerae</b> son bacilos curvos Gram negativos. Produce toxina col\u00e9rica causando diarrea acuosa masiva con riesgo de deshidrataci\u00f3n letal."},{"n":"18","noShuffle":true,"img":null,"q":"Legionella pneumophila:","o":["Tiene tropismo por los macr\u00f3fagos debido a su parecido con las amebas","Se transmite por la ingesta de agua contaminada","En hospedadores inmunodeprimidos provoca Fiebre de Pontiac","Todas son correctas"],"c":4,"e":"<b>L. pneumophila</b> infecta macr\u00f3fagos alveolares, se transmite por aerosoles y en inmunodeprimidos provoca Fiebre de Pontiac o legionelosis grave."},{"n":"19","noShuffle":false,"img":null,"q":"\u00bfPor qu\u00e9 tenemos que cambiar las variantes de la vacuna de la gripe cada a\u00f1o?","o":["Porque la RNA polimerasa del virus tiene elevada tasa de error","Por la acumulaci\u00f3n de mutaciones puntuales en prote\u00ednas clave del proceso infectivo","Por la capacidad del virus de llevar a cabo recombinaci\u00f3n hom\u00f3loga","Porque el genoma del virus est\u00e1 segmentado, provocando reorganizaciones entre cepas"],"c":4,"e":"El genoma <b>segmentado</b> del virus Influenza permite el <b>reordenamiento antig\u00e9nico</b> (reassortment) entre cepas, generando nuevas variantes ante las que la vacuna previa es ineficaz."},{"n":"20","noShuffle":false,"img":null,"q":"Mycobacterium tuberculosis:","o":["Es una bacteria que no tiene pared celular","Provoca infecciones latentes porque tiene un ciclo de vida lis\u00f3geno","Es un pat\u00f3geno intracelular estricto","En los individuos infectados, se forman granulomas para contener su capacidad invasiva"],"c":4,"e":"<b>M. tuberculosis</b> es un pat\u00f3geno intracelular facultativo que sobrevive en macr\u00f3fagos. La respuesta inmune forma <b>granulomas</b> para contener la infecci\u00f3n."},{"n":"21","noShuffle":false,"img":null,"q":"En relaci\u00f3n al diagn\u00f3stico del agente etiol\u00f3gico de una enfermedad infecciosa:","o":["La inmunocromatograf\u00eda y el ELISA pueden usarse como m\u00e9todos directos e indirectos","Un m\u00e9todo indirecto es la detecci\u00f3n de ant\u00edgenos","La detecci\u00f3n de componentes del microorganismo (DNA, prote\u00ednas) es imprescindible","Un m\u00e9todo directo es la detecci\u00f3n de anticuerpos"],"c":1,"e":"La <b>inmunocromatograf\u00eda</b> y el <b>ELISA</b> pueden detectar ant\u00edgenos (directo) o anticuerpos (indirecto). La detecci\u00f3n de anticuerpos es siempre m\u00e9todo indirecto."},{"n":"22","noShuffle":false,"img":null,"q":"La neumon\u00eda at\u00edpica o neumon\u00eda del caminante se caracteriza por:","o":["No poderse tratar con antibi\u00f3ticos que alteren la s\u00edntesis de la pared celular bacteriana","Presentar tos productiva y esputo purulento","Estar provocada por Streptococcus pneumoniae","Tener un inicio abrupto y riguroso"],"c":1,"e":"La neumon\u00eda at\u00edpica no responde a beta-lact\u00e1micos porque los <b>pat\u00f3genos carecen de pared celular</b> o son intracelulares. Cursa con tos seca e inicio gradual."},{"n":"23","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de estos virus tiene simetr\u00eda icosa\u00e9drica?","o":["Virus del dengue","Virus del \u00e9bola","Coronavirus","Virus de la rabia"],"c":1,"e":"El virus del <b>dengue</b> (Flaviviridae) tiene c\u00e1pside icosa\u00e9drica. El \u00e9bola y la rabia tienen simetr\u00eda helicoidal; el coronavirus tiene c\u00e1pside helicoidal envuelta."},{"n":"24","noShuffle":true,"img":null,"q":"\u00bfQu\u00e9 tienen en com\u00fan las Familia Coxiellaceae y Chlamydiaceae?","o":["Las bacterias de ambas familias presentan pleomorfismo","Tanto la variante celular grande como los cuerpos elementales son formas intracelulares","Tanto la variante celular peque\u00f1a como los cuerpos reticulados son formas extracelulares","Todas son correctas"],"c":4,"e":"Ambas familias son <b>bacterias intracelulares obligadas</b>. Chlamydia alterna cuerpos elementales (infecciosos, extracelulares) y reticulados (reproductivos, intracelulares)."},{"n":"25","noShuffle":false,"img":null,"q":"Respecto a la transferencia horizontal de informaci\u00f3n gen\u00e9tica mediante transformaci\u00f3n:","o":["Se requiere el contacto entre las bacterias","En el proceso act\u00faa un virus como v\u00eda de transferencia","Material gen\u00e9tico libre se incorpora a la bacteria","Es un proceso com\u00fan en la mayor\u00eda de las bacterias"],"c":3,"e":"En la <b>transformaci\u00f3n</b>, la bacteria capta <b>DNA libre del medio</b>. No requiere contacto (conjugaci\u00f3n) ni virus (transducci\u00f3n)."},{"n":"26","noShuffle":false,"img":null,"q":"Respecto a la transferencia horizontal de informaci\u00f3n gen\u00e9tica mediante conjugaci\u00f3n:","o":["Se requiere el contacto entre las bacterias","En el proceso act\u00faa un virus como v\u00eda de transferencia","Material gen\u00e9tico libre se incorpora a la bacteria","Interviene una estructura celular denominada fimbria"],"c":1,"e":"La <b>conjugaci\u00f3n</b> requiere contacto f\u00edsico directo mediante el <b>pili sexual (fimbria F)</b>. El pl\u00e1smido F se transfiere de la donante a la receptora."},{"n":"27","noShuffle":false,"img":null,"q":"Enfermedad causada por una micobacteria que se caracteriza por provocar lesiones cut\u00e1neas en sus dos formas cl\u00ednicas:","o":["S\u00edndrome de la piel escaldada","Escarlatina","Lepra","Ti\u00f1a"],"c":3,"e":"La <b>lepra</b> (Mycobacterium leprae) tiene dos formas: lepromatosa (n\u00f3dulos, p\u00e9rdida de sensibilidad) y tuberculoide (lesiones cut\u00e1neas bien delimitadas)."},{"n":"28","noShuffle":false,"img":null,"q":"Respecto a la esterilizaci\u00f3n, se\u00f1ala la FALSA:","o":["El autoclavado es el m\u00e9todo de elecci\u00f3n para materiales resistentes a altas temperaturas","La esterilizaci\u00f3n por \u00f3xido de etileno se utiliza en material termosensible","Los rayos ionizantes se utilizan para esterilizar suministros farmac\u00e9uticos y desechables","No se ve afectada por la presencia de materia org\u00e1nica en el instrumental a esterilizar"],"c":4,"e":"La materia org\u00e1nica <b>interfiere</b> en todos los m\u00e9todos de esterilizaci\u00f3n, protegiendo a los microorganismos. El instrumental debe limpiarse previamente."},{"n":"29","noShuffle":false,"img":null,"q":"El s\u00edndrome de Guillain-Barr\u00e9 est\u00e1 provocado por:","o":["Toxinas secretadas por Campylobacter jejuni","Una reacci\u00f3n cruzada de los anticuerpos generados frente a Campylobacter jejuni","Una reacci\u00f3n cruzada de los anticuerpos generados frente a Streptococcus pyogenes","Toxinas secretadas por Bordetella pertussis"],"c":2,"e":"El <b>GBS</b> post-infeccioso se debe a anticuerpos anti-Campylobacter que por mimetismo molecular atacan los gangli\u00f3sidos nerviosos, causando neuropat\u00eda desmielinizante ascendente."},{"n":"30","noShuffle":false,"img":null,"q":"Las bacterias se distinguen de los hongos porque:","o":["Las bacterias presentan membrana plasm\u00e1tica y los hongos no","Las bacterias presentan pared celular y los hongos no","Las bacterias pueden reproducirse de forma independiente y los hongos no","Las bacterias son c\u00e9lulas procariotas mientras que los hongos son eucariotas"],"c":4,"e":"La diferencia fundamental: bacterias son <b>procariotas</b> y hongos son <b>eucariotas</b>. Ambos tienen pared celular y membrana plasm\u00e1tica."},{"n":"31","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de estas enfermedades se adquiere por consumo de alimentos contaminados o por diseminaci\u00f3n transplacentaria?","o":["Carbunco","Infecci\u00f3n por Bacillus cereus","Listeriosis","Shigelosis"],"c":3,"e":"<b>Listeria monocytogenes</b> contamina alimentos y puede atravesar la barrera placentaria, causando aborto o listeriosis neonatal grave."},{"n":"32","noShuffle":true,"img":null,"q":"Seg\u00fan la producci\u00f3n de \u00e1cidos nucleicos y prote\u00ednas, los virus de clase IV:","o":["Tienen genoma de RNA simple cadena","Su genoma se puede usar directamente como mRNA","Los mRNA son policistr\u00f3nicos","Todas son correctas"],"c":4,"e":"Los virus de clase IV (Baltimore) tienen <b>RNA de cadena simple positiva</b> que funciona directamente como mRNA policistr\u00f3nico. Ejemplos: poliovirus, Flavivirus."},{"n":"33","noShuffle":false,"img":null,"q":"Gusano plano, segmentado, que provoca cisticercosis:","o":["Taenia spp","Echinococcus granulosus","Enterobius vermiculis","Fasciola spp"],"c":1,"e":"<b>Taenia solium</b> provoca cisticercosis cuando el humano ingiere huevos. Las larvas migran a m\u00fasculos y SNC. Echinococcus provoca hidatidosis; Enterobius causa oxiuriasis."},{"n":"34","noShuffle":false,"img":null,"q":"Respecto a las candidiasis, se\u00f1ala la FALSA:","o":["Representan la gran mayor\u00eda de las infecciones f\u00fangicas nosocomiales","En cuanto a la cl\u00ednica, destacan las infecciones pulmonares","Est\u00e1n provocadas por un hongo levaduriforme","Las candidiasis sist\u00e9micas tienen una tasa de mortalidad elevada"],"c":2,"e":"<b>Candida</b> causa principalmente infecciones orales, vaginales o cut\u00e1neas, no pulmonares. Aspergillus destaca por infecciones pulmonares invasivas."},{"n":"35","noShuffle":false,"img":null,"q":"Respecto a la peste:","o":["Los piojos act\u00faan como vectores de transmisi\u00f3n","Puede desarrollarse por la inhalaci\u00f3n de aerosoles","Est\u00e1 provocada por una bacteria Gram positiva","Se caracteriza por cuadros de gastroenteritis"],"c":2,"e":"La <b>peste neum\u00f3nica</b> se transmite por inhalaci\u00f3n de aerosoles. El vector habitual es la <b>pulga</b>. Yersinia pestis es Gram negativa."},{"n":"36","noShuffle":false,"img":null,"q":"Virus que se caracteriza por tener largos periodos de latencia en ganglios neurol\u00f3gicos dorsales o craneales:","o":["Virus de la Viruela","Virus del Herpes simple","Virus Varicela-Zoster","Virus del papiloma humano"],"c":3,"e":"El <b>virus Varicela-Zoster</b> queda latente en ganglios sensitivos dorsales tras la primofecci\u00f3n. Su reactivaci\u00f3n causa herpes z\u00f3ster."},{"n":"37","noShuffle":true,"img":null,"q":"Son estructuras que median la adhesi\u00f3n del microorganismo a la c\u00e9lula hospedadora:","o":["La c\u00e1psula","El pelo sexual","Las fimbrias","a y c son correctas"],"c":4,"e":"La <b>c\u00e1psula</b> y las <b>fimbrias</b> median la adhesi\u00f3n al hu\u00e9sped. El pelo sexual (pili F) participa en conjugaci\u00f3n."},{"n":"38","noShuffle":false,"img":null,"q":"Las endosporas:","o":["Facilitan la reproducci\u00f3n de las bacterias","Se pueden eliminar mediante desinfecci\u00f3n","Son producidas por los g\u00e9neros Bacillus y Clostridium","Se forman dentro de los individuos o animales infectados"],"c":3,"e":"Solo los g\u00e9neros <b>Bacillus</b> y <b>Clostridium</b> forman endosporas. Son estructuras de resistencia, no reproductivas. Muy resistentes a la desinfecci\u00f3n."},{"n":"39","noShuffle":false,"img":null,"q":"En parasitolog\u00eda, se define como fuente de par\u00e1sitos infectantes para los humanos al hospedador:","o":["Intermediario","Reservorio","Parat\u00e9nico","Definitivo"],"c":2,"e":"El <b>reservorio</b> mantiene el par\u00e1sito en la naturaleza y es fuente de infecci\u00f3n para humanos."},{"n":"40","noShuffle":false,"img":null,"q":"Un cultivo puro es:","o":["Una poblaci\u00f3n de microorganismos en fase exponencial","Una poblaci\u00f3n que desciende de un \u00fanico microorganismo inicial","Una poblaci\u00f3n obtenida a partir de un individuo enfermo","Todas son correctas"],"c":2,"e":"Un <b>cultivo puro</b> es la poblaci\u00f3n que desciende de un \u00fanico organismo progenitor (todos gen\u00e9ticamente id\u00e9nticos)."},{"n":"41","noShuffle":false,"img":null,"q":"En el crecimiento microbiano, la fase de latencia:","o":["Es la fase donde se generan el mismo n\u00famero de microorganismos que mueren","Aparece porque los microorganismos necesitan sintetizar prote\u00ednas y enzimas espec\u00edficas para crecer","Es la fase de crecimiento exponencial","Aparece porque los microorganismos cambian su metabolismo a respiraci\u00f3n aer\u00f3bica"],"c":2,"e":"La <b>fase de latencia</b> es de adaptaci\u00f3n: las bacterias sintetizan enzimas y maquinaria necesaria para el nuevo medio antes de comenzar a dividirse."},{"n":"42","noShuffle":false,"img":null,"q":"Var\u00f3n de 52 a\u00f1os con peritonitis post-ap\u00e9ndiceal. Tras cirug\u00eda y antibi\u00f3ticos, desarrolla 5 d\u00edas despu\u00e9s diarrea, fiebre y placas blancas en mucosa col\u00f3nica. \u00bfCu\u00e1l es el microorganismo m\u00e1s probable?","o":["Bacillus cereus","Escherichia coli","Pseudomonas aeruginosa","Clostridium difficile"],"c":4,"e":"<b>Clostridium difficile</b> es la causa m\u00e1s frecuente de colitis pseudomembranosa post-antibi\u00f3tica. Las pseudomembranas (placas blancas) en la mucosa col\u00f3nica son patognom\u00f3nicas."},{"n":"43","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l ser\u00eda una buena diana para generar un f\u00e1rmaco antif\u00fangico?","o":["Ergosterol","Peptidoglicano","C\u00e1pside","Lipopolisac\u00e1rido"],"c":1,"e":"El <b>ergosterol</b> es el esterol de la membrana de los hongos, ausente en c\u00e9lulas mam\u00edferas. Es diana de anfotericina B y azoles."},{"n":"44","noShuffle":false,"img":null,"q":"\u00bfEn qu\u00e9 punto del ciclo infectivo del VIH act\u00faa la transcriptasa inversa?","o":["Al inicio, para que el genoma viral se inserte en el genoma del hospedador en forma de provirus","Una vez generado el RNA mensajero, para producir los genomas de futuros viriones","Al inicio, para dar lugar al RNA mensajero a partir del cual se sintetiza una poliprote\u00edna","Durante la maduraci\u00f3n de los viriones, generando las dos copias del genoma"],"c":1,"e":"La <b>transcriptasa inversa</b> del VIH convierte el RNA viral en DNA de doble cadena, que se integra en el genoma del hu\u00e9sped (provirus) mediante la integrasa."},{"n":"45","noShuffle":false,"img":null,"q":"Paciente con fatiga y fiebre ondulante (picos cada 10 d\u00edas) que trabaja en granja de vacas con abortos recientes. \u00bfQu\u00e9 enfermedad sospechamos?","o":["Enfermedad de Lyme","Brucelosis","Carbunco","Triquinosis"],"c":2,"e":"La <b>brucelosis</b> (Brucella spp.) es una zoonosis que causa fiebre ondulante. Los abortos en el reba\u00f1o y la exposici\u00f3n laboral a ganado son datos epidemiol\u00f3gicos clave."},{"n":"46","noShuffle":false,"img":null,"q":"Los antibi\u00f3ticos \u03b2-lact\u00e1micos inhiben la s\u00edntesis de peptidoglicano, por tanto:","o":["Solo act\u00faan frente a bacterias Gram positivas","Solo act\u00faan frente a bacterias Gram negativas","Son m\u00e1s efectivos frente a bacterias Gram positivas","Son m\u00e1s efectivos frente a bacterias Gram negativas"],"c":3,"e":"Los <b>\u03b2-lact\u00e1micos</b> son m\u00e1s efectivos frente a Gram positivas: su gruesa pared de peptidoglicano es el principal blanco. En Gram negativas, la membrana externa dificulta el acceso."},{"n":"47","noShuffle":false,"img":null,"q":"Candida albicans:","o":["Es un hongo filamentoso","Puede diseminarse al cerebro y provocar meningitis","En el caso de producir enfermedad sist\u00e9mica, la tasa de mortalidad es baja","Representa la gran mayor\u00eda de las infecciones f\u00fangicas nosocomiales"],"c":4,"e":"<b>Candida albicans</b> es la principal causa de infecciones f\u00fangicas nosocomiales. Es levadura (no filamentosa). La candidiasis diseminada tiene alta mortalidad en inmunodeprimidos."},{"n":"48","noShuffle":true,"img":null,"q":"Las geonematodosis pueden darse por:","o":["Ingesti\u00f3n de huevos de los nem\u00e1todos","Penetraci\u00f3n transcutan\u00e9a","a y b son correctas","Intervenci\u00f3n de vectores"],"c":3,"e":"Las <b>geonematodosis</b> se adquieren por <b>ingesti\u00f3n de huevos</b> (Ascaris, Trichuris) o por <b>penetraci\u00f3n transcutan\u00e9a</b> de larvas (Ancylostoma, Strongyloides)."},{"n":"49","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes ETS puede provocar complicaciones neurol\u00f3gicas?","o":["Gonorrea","S\u00edfilis","Hepatitis","Clamidiasis"],"c":2,"e":"La <b>s\u00edfilis</b> (Treponema pallidum) puede causar neuros\u00edfilis en fase terciaria: meningitis, demencia, ataxia y tabes dorsal."},{"n":"50","noShuffle":false,"img":null,"q":"Respecto a la malaria, se\u00f1ala la respuesta correcta:","o":["El ser humano es el hospedador definitivo del agente causal","El agente causal es la hembra del mosquito Anopheles","La prueba principal para su diagn\u00f3stico es un frotis sangu\u00edneo","Uno de los s\u00edntomas m\u00e1s destacados son las fiebres altas ininterrumpidas"],"c":3,"e":"El <b>frotis sangu\u00edneo</b> es el gold standard para diagnosticar malaria, visualizando Plasmodium en eritrocitos. El humano es hu\u00e9sped intermediario; el mosquito Anopheles es el vector."},{"n":"51","noShuffle":false,"img":null,"q":"Coco-bacilo gram negativo que provoca tos ferina:","o":["Bordetella pertussis","Mycoplasma pneumoniae","Francisella tularensis","Coxiella burnetii"],"c":1,"e":"<b>Bordetella pertussis</b> es un cocobacilo Gram negativo causante de la tos ferina. Produce toxina pertussis que bloquea la se\u00f1alizaci\u00f3n celular, causando tos parox\u00edstica."},{"n":"52","noShuffle":false,"img":null,"q":"Inoculamos un microorganismo en tubo de cultivo. Crece \u00fanicamente en el fondo del tubo. Este microorganismo es:","o":["Aerobio facultativo","Aerobio estricto","Microaer\u00f3filo","Anaerobio estricto"],"c":4,"e":"Un <b>anaerobio estricto</b> solo crece en ausencia de ox\u00edgeno, por lo que el crecimiento se localiza exclusivamente en el <b>fondo</b> del tubo."},{"n":"53","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes especies bacterianas NO se transmite por vector artr\u00f3podo?","o":["Yersinia pestis","Borrelia burgdorferi","Leptospira interrogans","Rickettsia rickettsii"],"c":3,"e":"<b>Leptospira interrogans</b> se transmite por contacto con agua o suelo contaminados con orina de animales. Yersinia (pulga), Borrelia (garrapata) y Rickettsia (garrapata) s\u00ed requieren artr\u00f3podo."},{"n":"54","noShuffle":false,"img":null,"q":"Virus de RNA que se caracteriza por provocar hematemesis de sangre negra coagulada (v\u00f3mito negro):","o":["Virus de la Fiebre amarilla","Virus del Dengue","Virus del \u00c9bola","Virus de la rabia"],"c":1,"e":"El <b>virus de la fiebre amarilla</b> (Flavivirus) provoca hepatitis grave con ictericia y hemorragias digestivas. Transmitido por Aedes aegypti."},{"n":"55","noShuffle":false,"img":null,"q":"Entre las infecciones que provoca Staphylococcus aureus, NO se encuentra:","o":["Imp\u00e9tigo","Faringitis","S\u00edndrome del shock t\u00f3xico","Intoxicaci\u00f3n alimentaria"],"c":2,"e":"La <b>faringitis</b> bacteriana es causada principalmente por Streptococcus pyogenes, no S. aureus. S. aureus causa imp\u00e9tigo, shock t\u00f3xico (TSST-1) e intoxicaci\u00f3n alimentaria."},{"n":"56","noShuffle":false,"img":null,"q":"Un frasco de hemocultivo contiene:","o":["Compuestos que neutralizan o inactivan componentes del sistema inmunitario","Antibi\
