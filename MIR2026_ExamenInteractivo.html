<!--
=============================================================
  MOTOR BANCO MIR — v10
  Novedades respecto a v9:
  - Numeración correlativa fija por sección (no se mezcla)
  - Badge neutro en pestaña "Todos" + mezcla real inter-secciones
  - Temporizador sticky editable en header (play/pausa/reset)
  - Buscador de texto en tiempo real
  - Modo repaso rápido (muestra RC + explicación directamente)
  - Estadísticas de errores recurrentes entre sesiones
=============================================================
-->
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">Banco MIR</title>
<style>
:root{
  --bg:#f4f3ef;--surf:#fff;--bd:#e5e5e5;--bd2:#ddd;
  --txt:#1a1a1a;--txt2:#555;--txt3:#999;--txt4:#666;
  --hdr:#1a1a1a;--hdr-t:#fff;
  --ok-bg:#e6f9ef;--ok-t:#0b6e52;--ok-bd:#2da060;
  --ko-bg:#fdecea;--ko-t:#b91c1c;--ko-bd:#d94f45;
  --sc-ok:#dcf5ed;--sc-ko:#fdecea;--sc-rem:#f0f0f0;--sc-rem-t:#666;
  --exp:#fffbe6;--exp-bd:#f0c04a;--exp-t:#5a4500;
  --prog:#e5e5e5;--prog-fill:#1a56db;
  --star:#ccc;--star-on:#f59e0b;
  --hint:#fafafa;--hint-bd:#eee;
  --tab-bd:#ddd;--tab-t:#555;
  --all-bg:#e8f0fe;--all-t:#1a56db;--all-bd:#1a56db;
  --fab:#1a1a1a;--fab-t:#fff;
  --nota-btn-t:#1a56db;--nota-btn-bd:#1a56db;--nota-btn-bg:var(--surf);
  --timer-bg:#222;--timer-t:#fff;--timer-danger:#ef4444;
}
[data-theme="dark"]{
  --bg:#0f0f1a;--surf:#1e1e30;--bd:#2a2a45;--bd2:#333355;
  --txt:#e8e8f0;--txt2:#aaa;--txt3:#555;--txt4:#888;
  --hdr:#0a0a14;--hdr-t:#e8e8f0;
  --ok-bg:#0b3020;--ok-t:#4ade80;--ok-bd:#166534;
  --ko-bg:#2d0a0a;--ko-t:#f87171;--ko-bd:#7f1d1d;
  --sc-ok:#0b3020;--sc-ko:#2d0a0a;--sc-rem:#252540;--sc-rem-t:#aaa;
  --exp:#1a1500;--exp-bd:#a37f10;--exp-t:#d4b84a;
  --prog:#2a2a45;--prog-fill:#60a5fa;
  --star:#444;--star-on:#f59e0b;
  --hint:#1a1a2e;--hint-bd:#2a2a45;
  --tab-bd:#2a2a45;--tab-t:#aaa;
  --all-bg:#1a2a4a;--all-t:#60a5fa;--all-bd:#3b82f6;
  --fab:#2a2a50;--fab-t:#e8e8f0;
  --nota-btn-t:#60a5fa;--nota-btn-bd:#3b82f6;--nota-btn-bg:var(--surf);
  --timer-bg:#1a1a2e;--timer-t:#e8e8f0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .25s,color .25s}

/* ── Header ── */
header{background:var(--hdr);color:var(--hdr-t);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
header h1{font-size:13.5px;font-weight:600;white-space:nowrap}
.hright{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hmeta{font-size:11px;color:#888}
.hbtn{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:3px 5px;border-radius:5px;transition:background .15s;color:var(--hdr-t)}
.hbtn:hover{background:rgba(255,255,255,.12)}
.sbadge{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:500}
.sbadge.ok{background:#15803d;color:#dcfce7}.sbadge.warn{background:#92400e;color:#fef3c7}

/* ── Temporizador ── */
#timer-wrap{display:flex;align-items:center;gap:4px;background:var(--timer-bg);border-radius:7px;padding:3px 8px;border:1px solid rgba(255,255,255,.1)}
#timer-display{font-size:13px;font-weight:700;font-family:monospace;color:var(--timer-t);min-width:58px;text-align:center;cursor:pointer;border-radius:3px;padding:1px 3px}
#timer-display:hover{background:rgba(255,255,255,.08)}
#timer-display.editing{background:rgba(255,255,255,.15);outline:none;color:var(--timer-t)}
#timer-display.danger{color:var(--timer-danger)}
#timer-wrap button{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:12px;padding:1px 3px;border-radius:3px;line-height:1}
#timer-wrap button:hover{background:rgba(255,255,255,.12);color:#fff}

/* ── Barra de progreso ── */
#prog-wrap{height:3px;background:var(--prog);position:sticky;top:40px;z-index:99}
#prog-bar{height:100%;background:var(--prog-fill);width:0%;transition:width .4s}

/* ── Contenedor ── */
.container{max-width:820px;margin:0 auto;padding:16px 12px}

/* ── Buscador ── */
.search-wrap{position:relative;margin-bottom:13px}
.search-wrap input{width:100%;padding:8px 34px 8px 12px;border:1.5px solid var(--bd2);border-radius:8px;font-size:13px;background:var(--surf);color:var(--txt);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--prog-fill)}
.search-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--txt3);font-size:16px;display:none;line-height:1}
#search-count{font-size:11px;color:var(--txt3);margin-top:4px;display:none}

/* ── Modo repaso ── */
.mode-bar{display:flex;gap:6px;margin-bottom:12px;align-items:center}
.mode-btn{padding:5px 12px;border:1.5px solid var(--bd2);border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;background:var(--surf);color:var(--txt2);transition:all .15s}
.mode-btn:hover{border-color:#999}
.mode-btn.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Tabs ── */
.tabs{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.tab{padding:7px 14px;border:1.5px solid var(--tab-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;background:var(--surf);color:var(--tab-t);transition:all .15s}
.tab:hover{border-color:#999;color:var(--txt)}
.tab.t-all.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Score global ── */
.ph-global{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 15px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-left:4px solid var(--prog-fill)}
.score-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.sc{font-size:12px;font-weight:600;padding:3px 9px;border-radius:6px}
.sc.ok{background:var(--sc-ok);color:var(--ok-t)}.sc.ko{background:var(--sc-ko);color:var(--ko-t)}.sc.rem{background:var(--sc-rem);color:var(--sc-rem-t)}

/* ── Acciones ── */
.global-actions{display:none;margin-bottom:10px;gap:7px;flex-wrap:wrap;align-items:center}
.container[data-tab="all"] .global-actions{display:flex}
.sec-actions{margin:6px 0 15px;display:flex;gap:7px;flex-wrap:wrap}
.reset-btn{padding:7px 14px;background:var(--fab);color:var(--fab-t);border:none;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:opacity .15s}
.reset-btn:hover{opacity:.82}
.nota-btn{padding:7px 14px;background:var(--nota-btn-bg);color:var(--nota-btn-t);border:1.5px solid var(--nota-btn-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:background .15s}
.nota-btn:hover{background:var(--all-bg)}

/* ── Nota box ── */
.nota-box,.global-nota-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:2px solid var(--bd2);font-size:13px;line-height:1.7;display:none}
.nota-box.pass,.global-nota-box.pass{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t)}
.nota-box.fail,.global-nota-box.fail{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t)}
.nota-score{font-size:26px;font-weight:700;display:block;margin-bottom:4px}
.nota-detail{font-size:12px;opacity:.85;font-family:monospace}

/* ── Vista revisión ── */
.review-list{margin-top:12px;border-top:1px solid var(--bd2);padding-top:10px}
.review-title{font-size:12px;font-weight:700;margin-bottom:9px;color:var(--txt)}
.review-sec-label{font-size:11.5px;font-weight:700;color:var(--txt3);margin:8px 0 5px;padding-top:6px;border-top:1px solid var(--bd)}
.review-item{background:var(--surf);border-radius:8px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden}
.review-item summary{padding:9px 12px;cursor:pointer;font-size:12.5px;color:var(--txt);list-style:none;display:flex;gap:8px;align-items:flex-start}
.review-item summary::-webkit-details-marker{display:none}
.review-item summary::before{content:'▶';font-size:9px;color:var(--txt3);flex-shrink:0;margin-top:4px;transition:transform .18s}
details[open] summary::before{transform:rotate(90deg)}
.review-body{padding:0 12px 11px}
.review-ans{font-size:12px;color:var(--ok-t);margin-bottom:7px;font-weight:500}

/* ── Estadísticas ── */
.stats-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--surf);display:none}
.stats-box.show{display:block}
.stats-title{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--txt)}
.stats-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12.5px}
.stats-item:last-child{border-bottom:none}
.stats-bar-wrap{flex:1;background:var(--sc-rem);border-radius:4px;height:6px;overflow:hidden}
.stats-bar{height:100%;background:var(--ko-bd);border-radius:4px;transition:width .4s}
.stats-n{font-size:11px;color:var(--txt3);white-space:nowrap}
.stats-q{flex:2;color:var(--txt);font-size:12px;line-height:1.3}

/* ── Panel secciones ── */
.sec-panel{display:none}.sec-panel.visible{display:block}
.ph{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ph-left{flex:1;display:flex;flex-direction:column;gap:5px}
.ph-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:1px}
.ph-desc{font-size:12px;color:var(--txt4)}
.fbtn{padding:6px 12px;font-size:12px;font-weight:500;border:1.5px solid var(--bd2);border-radius:8px;cursor:pointer;background:var(--surf);color:var(--txt2);transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:#999;color:var(--txt)}.fbtn.on{background:var(--ko-bg);color:#b91c1c;border-color:#f87171}
.no-failed{display:none;text-align:center;padding:16px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin-top:4px}
.no-failed.show{display:block}
.no-results{display:none;text-align:center;padding:20px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin:8px 0}

/* ── Hint ── */
.hint{font-size:11px;color:var(--txt3);margin-bottom:15px;padding:7px 11px;background:var(--hint);border-radius:6px;border:1px solid var(--hint-bd)}

/* ── Tarjeta ── */
.qcard{background:var(--surf);border-radius:10px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden;transition:box-shadow .15s}
.qcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.qcard.kb-focus{outline:2px solid var(--prog-fill);outline-offset:-2px}
.qcard.search-hidden{display:none}
.qhead{padding:11px 13px;cursor:pointer;display:flex;align-items:flex-start;gap:9px}

/* ── Badge numérico ── */
.qnum{font-size:11px;font-weight:700;padding:3px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;background:var(--sc-rem);color:var(--sc-rem-t)}
/* En pestaña "Todos" siempre neutro; en sección aplica color de sección */
.qnum.sec-colored{background:var(--sec-dim);color:var(--sec-col)}

.qtxt{font-size:13px;line-height:1.5;flex:1}
.star-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--star);padding:0 2px;flex-shrink:0;margin-top:2px;line-height:1;transition:color .15s,transform .15s}
.star-btn:hover{transform:scale(1.2)}
.star-btn .si{display:inline}.star-btn .sf{display:none}
.star-btn.on .si{display:none}.star-btn.on .sf{display:inline;color:var(--star-on)}
.chev{font-size:15px;color:var(--bd2);flex-shrink:0;margin-top:2px;transition:transform .2s}
.qhead.open .chev{transform:rotate(180deg)}
.qbody{display:none;padding:0 13px 13px}.qbody.open{display:block}

/* ── Imagen ── */
.clinimg-wrap{margin:9px 0 7px;background:#111;border-radius:8px;overflow:hidden;border:1px solid var(--bd2);text-align:center}
.clinimg{max-width:100%;max-height:340px;object-fit:contain;display:block;margin:0 auto}
.clinimg-cap{font-size:11px;color:var(--txt3);padding:4px 0 5px;background:var(--hint);border-top:1px solid var(--bd)}

/* ── Opciones ── */
.opts{list-style:none;margin-top:9px;display:flex;flex-direction:column;gap:5px}
.opt{padding:9px 12px;border-radius:8px;border:1.5px solid var(--bd2);cursor:pointer;display:flex;align-items:flex-start;gap:9px;color:var(--txt);font-size:13px;line-height:1.45;transition:border-color .12s,background .12s;user-select:none}
.opt:hover:not(.done){border-color:#999;background:var(--hint)}
.opt.correct{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t);font-weight:500;cursor:default}
.opt.wrong{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t);cursor:default}
.opt.done:not(.correct):not(.wrong){cursor:default;opacity:.7}
.onum{font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;min-width:15px}

/* ── Modo repaso rápido ── */
.quick-card{padding:9px 12px;border-radius:8px;border:1.5px solid var(--ok-bd);background:var(--ok-bg);margin-top:8px}
.quick-rc{font-size:12.5px;font-weight:600;color:var(--ok-t);margin-bottom:6px}

/* ── Explicación ── */
.expbox{margin-top:10px;padding:10px 12px;background:var(--exp);border-left:4px solid var(--exp-bd);border-radius:0 8px 8px 0;font-size:12.5px;color:var(--exp-t);line-height:1.65}
.expbox b,.expbox strong{font-weight:600}
.et{display:block;margin-bottom:4px;font-weight:600;font-size:13px}
.atag{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
.atag.ok{background:var(--sc-ok);color:var(--ok-t)}.atag.ko{background:var(--sc-ko);color:#c0392b}

/* ── All-tab CSS ── */
.container[data-tab="all"] .ph{display:none!important}
.container[data-tab="all"] .sec-actions{display:none!important}
.container[data-tab="all"] .no-failed{display:none!important}
.container[data-tab="all"] .nota-box{display:none!important}
.container:not([data-tab="all"]) .global-nota-box{display:none!important}
.container:not([data-tab="all"]) #stats-global{display:none!important}
</style>
</head>
<body>
<header>
  <h1 id="h-tit">Banco MIR</h1>
  <div class="hright">
    <span class="hmeta" id="h-meta"></span>
    <!-- Temporizador -->
    <div id="timer-wrap" title="Haz clic en el tiempo para editar">
      <span id="timer-display">0:00:00</span>
      <button id="btn-tplay" onclick="timerToggle()" title="Play/Pausa">▶</button>
      <button onclick="timerReset()" title="Reset">↺</button>
    </div>
    <button class="hbtn" id="btn-dark" onclick="toggleDark()" title="Modo oscuro">🌙</button>
    <span id="save-badge" class="sbadge"></span>
  </div>
</header>
<div id="prog-wrap"><div id="prog-bar"></div></div>

<div class="container" id="main-cont" data-tab="all">
  <!-- Buscador -->
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="🔍 Buscar en enunciados..." oninput="onSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div id="search-count"></div>

  <!-- Modo -->
  <div class="mode-bar">
    <span style="font-size:11.5px;color:var(--txt3);font-weight:600">MODO:</span>
    <button class="mode-btn on" id="mode-test" onclick="setMode('test')">📝 Test</button>
    <button class="mode-btn" id="mode-quick" onclick="setMode('quick')">⚡ Repaso rápido</button>
    <button class="mode-btn" id="btn-stars" onclick="filterStarred()" style="margin-left:auto;border-color:#f59e0b;color:#b45309">⭐ Marcadas</button>
    <button class="mode-btn" id="btn-stats" onclick="toggleStats()">📊 Errores</button>
  </div>

  <!-- Stats globales -->
  <div class="stats-box" id="stats-global"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabs-wrap"></div>

  <!-- Score global -->
  <div class="ph-global">
    <div class="ph-left">
      <span class="ph-desc" id="ph-gdesc"></span>
      <div class="score-row">
        <span class="sc ok" id="sc-ok-all">✓ 0</span>
        <span class="sc ko" id="sc-ko-all">✗ 0</span>
        <span class="sc rem" id="sc-rem-all">○ 0</span>
      </div>
    </div>
  </div>
  <div class="global-actions">
    <button class="reset-btn" onclick="resetAll()">↺ Reiniciar y mezclar</button>
    <button class="nota-btn" onclick="calcNotaAll()">✎ Calcular nota global</button>
  </div>
  <div class="global-nota-box" id="nota-all"></div>
  <p class="hint">💡 <b>1–5</b> responde · <b>↑↓</b> navega · <b>S</b> marca ⭐ · Progreso guardado automáticamente</p>

  <div id="panels-wrap"></div>
</div>

<script>
/* ═══════════════════════════════════════ MOTOR v10 ═══════════════════════════════════════ */

var KEY=/*__KEY__*/'mir2026_v10';
var META=/*__META_JSON__*/{"titulo":"MIR 2026 \u2014 Examen Interactivo","subtitulo":"Infecciosas \u00b7 Salud P\u00fablica \u00b7 Nefrolog\u00eda \u00b7 Ginecolog\u00eda \u00b7 Pediatr\u00eda \u00b7 Endocrino \u00b7 Paliativos \u00b7 Geriatr\u00eda \u00b7 Neurolog\u00eda \u00b7 UCI","examen":"MIR 2026 \u00b7 Examen Oficial","secciones":{"inf":{"label":"Enf. Infecciosas","emoji":"\ud83e\udda0","color":"#b91c1c","colorDim":"#fde8e8","desc":"Sepsis \u00b7 Antibioterapia \u00b7 ITU \u00b7 Nocardia \u00b7 Higiene de manos"},"sp":{"label":"Salud P\u00fablica","emoji":"\ud83c\udf0d","color":"#0369a1","colorDim":"#e0f2fe","desc":"Epidemiolog\u00eda \u00b7 Cribado \u00b7 Medicina preventiva"},"nephro":{"label":"Nefrolog\u00eda","emoji":"\ud83d\udd2c","color":"#7c3aed","colorDim":"#ede9fe","desc":"Glomerulopatias \u00b7 ERC \u00b7 Litiasis \u00b7 HTA renovascular"},"gineco":{"label":"Ginecolog\u00eda","emoji":"\ud83e\uddb8","color":"#db2777","colorDim":"#fce7f3","desc":"Obstetricia \u00b7 Patolog\u00eda ginecol\u00f3gica \u00b7 Oncolog\u00eda"},"peds":{"label":"Pediatr\u00eda","emoji":"\ud83d\udc76","color":"#0f766e","colorDim":"#ccfbf1","desc":"Neonatolog\u00eda \u00b7 Patolog\u00eda pedi\u00e1trica \u00b7 Desarrollo"},"endo":{"label":"Endocrinolog\u00eda","emoji":"\u2697\ufe0f","color":"#9a3412","colorDim":"#ffedd5","desc":"Diabetes \u00b7 Tiroides \u00b7 Suprarrenal"},"paliat":{"label":"Paliativos","emoji":"\ud83c\udf3f","color":"#15803d","colorDim":"#dcfce7","desc":"Cuidados paliativos \u00b7 \u00daltimos d\u00edas"},"geria":{"label":"Geriatr\u00eda","emoji":"\ud83e\uddd3","color":"#b45309","colorDim":"#fef3c7","desc":"Fragilidad \u00b7 Barthel \u00b7 SPPB \u00b7 Hallmarks \u00b7 Paliaci\u00f3n en demencia"},"neuro":{"label":"Neurolog\u00eda","emoji":"\ud83e\udde0","color":"#374151","colorDim":"#e2e8f0","desc":"Neurolog\u00edaa cl\u00ednica \u00b7 ACV \u00b7 Epilepsia"},"uci":{"label":"Med. Intensiva","emoji":"\u26a1","color":"#1a56db","colorDim":"#e8f0fe","desc":"VM \u00b7 Shock \u00b7 Sedoanalgesia"}}};
var D=/*__D_JSON__*/{"inf":[{"n":"35","q":"Paciente en shock s\u00e9ptico con disfunci\u00f3n multiorg\u00e1nica. Hemocultivo sensible a meropenem. \u00bfTratamiento adecuado?","o":["Mantener piperacilina-tazobactam.","A\u00f1adir aminogluc\u00f3sido al tratamiento actual.","Suspender piperacilina-tazobactam e iniciar meropenem.","Iniciar ciprofloxacino."],"c":3,"e":"Principio de desescalada: cuando el hemocultivo confirma sensibilidad a meropenem en shock s\u00e9ptico con disfunci\u00f3n multiorg\u00e1nica, se debe optimizar el tratamiento cambiando al antibi\u00f3tico de espectro adecuado con mejor cobertura documentada. Pip-tazo tiene mayor riesgo de nefrotoxicidad aditiva con vancomicina y menor cobertura en bacteriemias graves."},{"n":"36","q":"Paciente con Nocardia farcinica en lavado broncoalveolar. \u00bfActitud correcta?","o":["Voriconazol + TMP-SMX.","TMP-SMX en monoterapia.","TMP-SMX + meropenem.","TMP-SMX + imipenem + amikacina."],"c":4,"e":"N. farcinica es la especie de Nocardia con peor pron\u00f3stico y mayor resistencia. En enfermedad grave o diseminada, las gu\u00edas recomiendan triple terapia: TMP-SMX (agente base) + imipenem (sin\u00e9rgico) + amikacina (aminogluc\u00f3sido activo frente a Nocardia). El voriconazol es antif\u00fangico, sin actividad frente a Nocardia."},{"n":"37","q":"Manejo inicial del shock s\u00e9ptico. Se\u00f1ale la respuesta correcta:","o":["Esperar a finalizar la reanimaci\u00f3n con fluidos antes de iniciar vasopresores.","La vasopresina es el vasopresor de primera l\u00ednea.","El objetivo hemodin\u00e1mico es PAS > 90 mmHg.","Si no hay acceso venoso central, los vasopresores pueden iniciarse por v\u00eda venosa perif\u00e9rica."],"c":4,"e":"Seg\u00fan la Surviving Sepsis Campaign 2021, los vasopresores pueden iniciarse por acceso venoso perif\u00e9rico mientras se obtiene uno central, para no retrasar el tratamiento. La noradrenalina es el vasopresor de primera l\u00ednea (no vasopresina). El objetivo es PAM \u2265 65 mmHg (no PAS 90). No hay que esperar a completar la reanimaci\u00f3n."},{"n":"38","q":"Sobre el diagn\u00f3stico del CMV. Se\u00f1ale la respuesta incorrecta:","o":["La infecci\u00f3n primaria ocasiona respuesta IgM que se negativiza en menos de 30 d\u00edas.","El cultivo produce efecto citop\u00e1tico en 7-28 d\u00edas.","La carga viral gu\u00eda el tratamiento anticipado.","La PCR en tiempo real es la prueba de elecci\u00f3n."],"c":1,"e":"La IgM frente a CMV en la infecci\u00f3n primaria puede persistir elevada durante meses (6-12 meses), NO se negativiza en menos de 30 d\u00edas. Por ello la IgM positiva no distingue infecci\u00f3n primaria de reactivaci\u00f3n. Las otras afirmaciones son correctas."},{"n":"39","q":"En un paciente con VIH, una PCR negativa de M. tuberculosis complex NO excluye infecci\u00f3n por:","o":["M. bovis.","M. tuberculosis.","Mycobacterium kansasii.","M. africanum."],"c":3,"e":"La PCR del complejo M. tuberculosis detecta M. tuberculosis, M. bovis, M. africanum y M. microti, pero NO detecta micobacterias no tuberculosas como M. kansasii. Por ello, una PCR negativa no excluye infecci\u00f3n por M. kansasii, que puede causar enfermedad pulmonar similar a la tuberculosis."},{"n":"40","q":"\u00bfCu\u00e1l es la duraci\u00f3n de tratamiento recomendada en la candidemia no complicada?","o":["Dos semanas desde el primer hemocultivo negativo.","Dos semanas desde el aislamiento del hongo.","Una semana desde el hemocultivo negativo.","Tres semanas desde el inicio del tratamiento."],"c":1,"e":"Las gu\u00edas IDSA y ESCMID recomiendan mantener el antif\u00fangico durante 14 d\u00edas contados desde el PRIMER hemocultivo negativo, no desde el aislamiento inicial. Esto asegura erradicaci\u00f3n completa de la fungemia. Requiere tambi\u00e9n retirada de cat\u00e9teres y exploraci\u00f3n de fondo de ojo."},{"n":"162","q":"\u00bfEn cu\u00e1l situaci\u00f3n se debe realizar prioritariamente un estudio etiol\u00f3gico completo en un paciente con NAC?","o":["En pacientes con NAC grave, hospitalizados o sin respuesta al tratamiento emp\u00edrico.","En j\u00f3venes sin comorbilidades para evitar antibi\u00f3ticos de amplio espectro.","En todos los pacientes con diagn\u00f3stico de NAC.","\u00danicamente en pacientes con factores de riesgo epidemiol\u00f3gico como viajes recientes."],"c":1,"e":"Seg\u00fan la normativa SEPAR 2020, el estudio etiol\u00f3gico completo (hemocultivos, ant\u00edgenos en orina, cultivo esputo, serolog\u00edas) est\u00e1 indicado prioritariamente en NAC grave (PSI IV-V o CURB-65 \u2265 3), pacientes hospitalizados y aquellos sin respuesta al tratamiento emp\u00edrico. En NAC leve ambulatoria el rendimiento es bajo y no modifica el manejo."},{"n":"203","q":"\u00bfCu\u00e1l de los siguientes microorganismos NO es un agente habitual de las infecciones del tracto urinario?","o":["Clostridium perfringens.","Klebsiella pneumoniae.","Pseudomonas aeruginosa.","Staphylococcus saprophyticus."],"c":1,"e":"Clostridium perfringens es un bacilo grampositivo anaerobio estricto que causa gangrena gaseosa y enteritis necrosante, pero NO es un agente habitual de ITU. Los g\u00e9rmenes m\u00e1s frecuentes son: E. coli (70-80%), Klebsiella, Proteus, Pseudomonas (en ITU hospitalaria), Enterococcus y S. saprophyticus (en mujeres j\u00f3venes)."}],"sp":[{"n":"26","q":"\u00bfCu\u00e1l de los siguientes NO es uno de los cinco momentos de la higiene de manos recomendados por la OMS?","o":["Antes del contacto con el entorno del paciente.","Antes de tocar al paciente.","Despu\u00e9s de tocar al paciente.","Despu\u00e9s del contacto con el entorno del paciente."],"c":1,"e":"Los 5 momentos OMS son: (1) Antes de tocar al paciente, (2) Antes de un procedimiento limpio/as\u00e9ptico, (3) Despu\u00e9s de riesgo de exposici\u00f3n a fluidos, (4) Despu\u00e9s de tocar al paciente, (5) Despu\u00e9s del contacto con el entorno del paciente. 'Antes del contacto con el entorno' no existe como momento independiente; el momento 5 es DESPU\u00c9S, no antes."},{"n":"27","q":"En relaci\u00f3n con el sobrediagn\u00f3stico, se\u00f1ale la afirmaci\u00f3n incorrecta:","o":["Se considera un efecto indeseado de los cribados poblacionales.","Se debe principalmente a la obtenci\u00f3n de resultados falsos positivos en pruebas diagn\u00f3sticas.","Una de sus principales consecuencias es el sobretratamiento.","Su reducci\u00f3n es uno de los objetivos de la prevenci\u00f3n cuaternaria."],"c":2,"e":"El sobrediagn\u00f3stico NO es equivalente a un falso positivo. Un falso positivo es un resultado err\u00f3neo que se corrige. El sobrediagn\u00f3stico es la detecci\u00f3n de una enfermedad que NUNCA habr\u00eda causado s\u00edntomas ni muerte en la vida del paciente (p.ej. c\u00e1nceres indolentes detectados en cribado). Es un diagn\u00f3stico 'verdadero' de una enfermedad que no requer\u00eda tratamiento."},{"n":"28","q":"En seguridad del paciente, todo evento imprevisto que derive en muerte o p\u00e9rdida permanente de una funci\u00f3n, sin relaci\u00f3n con la evoluci\u00f3n natural de la enfermedad, se denomina:","o":["Cuasi-incidente.","Factor contribuyente.","Infracci\u00f3n.","Evento centinela."],"c":4,"e":"El evento centinela (OMS/Joint Commission) es cualquier suceso imprevisto que causa la muerte del paciente o una p\u00e9rdida permanente importante de funci\u00f3n, sin relaci\u00f3n con la evoluci\u00f3n natural de la enfermedad subyacente. El cuasi-incidente es un error que no llega a afectar al paciente. Los factores contribuyentes son circunstancias que aumentan la probabilidad de error."},{"n":"29","q":"\u00bfQu\u00e9 tipo de sesgo se comete cuando se asume que una asociaci\u00f3n observada a nivel poblacional tambi\u00e9n existe a nivel individual?","o":["Sesgo o falacia ecol\u00f3gica.","Sesgo de atenci\u00f3n o efecto Hawthorne.","Falacia de Neyman o sesgo de prevalencia.","Sesgo de regresi\u00f3n a la media."],"c":1,"e":"La falacia ecol\u00f3gica consiste en extrapolar asociaciones observadas a nivel de grupo/poblaci\u00f3n al nivel del individuo. Ejemplo cl\u00e1sico: si los pa\u00edses con mayor consumo de grasa tienen m\u00e1s c\u00e1ncer de mama, no se puede concluir que los individuos que m\u00e1s grasa consumen tienen m\u00e1s riesgo. Pueden ser otros individuos dentro del pa\u00eds los que tienen c\u00e1ncer."},{"n":"30","q":"\u00bfCu\u00e1l de las siguientes NO se considera una infecci\u00f3n relacionada con la asistencia sanitaria?","o":["C. difficile con inicio de s\u00edntomas tras 48 horas de ingreso.","Infecci\u00f3n quir\u00fargica ambulatoria con s\u00edntomas a los 25 d\u00edas de la intervenci\u00f3n.","ITU a las 72 horas de ingreso por sondaje colocado en urgencias.","Neumon\u00eda con inicio de s\u00edntomas a las 24 horas del ingreso hospitalario."],"c":4,"e":"La neumon\u00eda hospitalaria se define como aquella que comienza DESPU\u00c9S de 48 horas del ingreso. La neumon\u00eda con s\u00edntomas a las 24 horas se considera de adquisici\u00f3n comunitaria (el paciente ya estaba incubando la infecci\u00f3n), por lo que NO es una IRAS. Las otras tres opciones cumplen los criterios de IRAS."},{"n":"31","q":"\u00bfCu\u00e1l de los siguientes NO se considera grupo de riesgo para la vacuna de la hepatitis A?","o":["Pacientes con infecci\u00f3n por VIH.","Candidatos a trasplante hep\u00e1tico.","Pacientes con asplenia anat\u00f3mica o disfunci\u00f3n espl\u00e9nica grave.","Pacientes con enfermedad hep\u00e1tica cr\u00f3nica."],"c":3,"e":"La asplenia es indicaci\u00f3n de vacunas frente a bacterias encapsuladas: neumococo, meningococo y Haemophilus influenzae b. Sin embargo, la asplenia NO es un grupo de riesgo espec\u00edfico para la vacuna VHA. Los grupos de riesgo para VHA incluyen: VIH, hepatopat\u00eda cr\u00f3nica, candidatos a trasplante hep\u00e1tico, viajeros a zonas end\u00e9micas, HSH y personas con conductas de riesgo."},{"n":"32","q":"Seg\u00fan el modelo de Donabedian, \u00bfcu\u00e1l de los siguientes es un indicador de resultado?","o":["Ratio de camas hospitalarias por habitante.","Proporci\u00f3n de partos por ces\u00e1rea.","Incidencia de infecciones relacionadas con la asistencia sanitaria.","Ratio de personal m\u00e9dico por habitante."],"c":3,"e":"Donabedian clasifica los indicadores en: Estructura (recursos: camas, personal, equipos), Proceso (actividades: tasa de ces\u00e1reas, adherencia a protocolos) y Resultado (impacto en salud: mortalidad, incidencia de complicaciones, IRAS). La incidencia de IRAS mide un resultado adverso del proceso asistencial. Los ratios de camas y personal son indicadores de estructura."},{"n":"33","q":"Se\u00f1ale el enunciado incorrecto sobre las medidas de frecuencia:","o":["La incidencia acumulada depende del per\u00edodo de tiempo estudiado.","La tasa de incidencia acumulada es \u00fatil cuando la tasa es alta o el per\u00edodo de estudio es largo.","La tasa de incidencia requiere unidad de tiempo en su denominador.","La prevalencia tiende a aumentar cuando la duraci\u00f3n de la enfermedad es mayor."],"c":2,"e":"La incidencia acumulada (riesgo) es una buena aproximaci\u00f3n cuando la tasa es BAJA y el per\u00edodo es CORTO. Cuando la tasa es alta o el per\u00edodo es largo, la incidencia acumulada subestima la incidencia real (va sacando individuos del denominador a medida que enferman) y debe usarse la densidad de incidencia (casos/tiempo-persona)."},{"n":"34","q":"\u00bfEn cu\u00e1l de las siguientes enfermedades se indican precauciones EXCLUSIVAMENTE por gotas?","o":["Infecci\u00f3n por VRS.","Gripe estacional.","Tuberculosis pulmonar activa.","Sarampi\u00f3n."],"c":2,"e":"La gripe se transmite principalmente por gotas de Fl\u00fcgge (>5 \u00b5m) \u2192 solo precauciones por gotas (mascarilla quir\u00fargica a <1 metro). La tuberculosis y el sarampi\u00f3n requieren precauciones por v\u00eda a\u00e9rea (part\u00edculas <5 \u00b5m: mascarilla FFP2/N95, habitaci\u00f3n de presi\u00f3n negativa). El VRS requiere contacto + gotas. Solo la gripe precisa EXCLUSIVAMENTE gotas."},{"n":"64","imp":true,"q":"Ensayo cl\u00ednico con colirio anticataratas: incidencia la mitad en grupo intervenci\u00f3n vs placebo (5% vs 10% en mujeres; 4% vs 8% en hombres). \u00bfAfirmaci\u00f3n correcta sobre eficacia seg\u00fan g\u00e9nero?","o":["Es m\u00e1s eficaz en mujeres, porque el NNT estimado en hombres es superior al de las mujeres.","Es m\u00e1s eficaz en hombres, porque el NNT estimado en mujeres es inferior al de hombres.","Es igual de eficaz porque en ambos casos la incidencia es la mitad.","Es m\u00e1s eficaz en hombres porque el NNT estimado en mujeres es superior al de mujeres."],"c":1,"e":"NNT = 1/RAR. Mujeres: RAR = 10%-5% = 5% \u2192 NNT = 20. Hombres: RAR = 8%-4% = 4% \u2192 NNT = 25. NNT menor en mujeres (20 vs 25) \u2192 se necesitan tratar menos mujeres para prevenir un caso \u2192 el colirio es m\u00e1s eficaz en mujeres. Aunque la reducci\u00f3n relativa del riesgo es id\u00e9ntica (50%), la eficacia absoluta difiere porque la incidencia basal es mayor en mujeres. \u26a0\ufe0f Pregunta impugnada."}],"nephro":[{"n":"84","q":"El s\u00edndrome de Stauffer es un s\u00edndrome paraneopl\u00e1sico caracter\u00edstico de:","o":["C\u00e1ncer de ri\u00f1\u00f3n (carcinoma de c\u00e9lulas renales).","C\u00e1ncer de pr\u00f3stata.","C\u00e1ncer de test\u00edculo.","C\u00e1ncer vesical."],"c":1,"e":"El s\u00edndrome de Stauffer es una hepatomegalia no metast\u00e1sica con disfunci\u00f3n hep\u00e1tica (elevaci\u00f3n de FA, transaminasas) que revierte con la nefrectom\u00eda. Es un s\u00edndrome paraneopl\u00e1sico espec\u00edfico del carcinoma de c\u00e9lulas renales. Se produce por citocinas tumorales que alteran la funci\u00f3n hep\u00e1tica sin infiltraci\u00f3n metast\u00e1sica."},{"n":"85","q":"Var\u00f3n 57 a\u00f1os, PSA 15 ng/ml, adenocarcinoma Gleason 9, >8 met\u00e1stasis \u00f3seas y met\u00e1stasis hep\u00e1ticas. \u00bfTratamiento de elecci\u00f3n?","o":["Prostatectom\u00eda radical con linfadenectom\u00eda + resecci\u00f3n de met\u00e1stasis.","Radioterapia p\u00e9lvica y estereoat\u00e1xica de las met\u00e1stasis.","Braquiterapia de alta tasa prost\u00e1tica.","Antiandr\u00f3genos + an\u00e1logos LHRH + enzalutamida + docetaxel."],"c":4,"e":"El c\u00e1ncer de pr\u00f3stata metast\u00e1sico con enfermedad de alto volumen (\u22654 met\u00e1stasis \u00f3seas o met\u00e1stasis viscerales) requiere tratamiento sist\u00e9mico intensificado. El est\u00e1ndar actual es la castraci\u00f3n (an\u00e1logos LHRH + antiandr\u00f3geno inicial) combinada con un nuevo agente hormonal (enzalutamida/apalutamida) y quimioterapia (docetaxel). La cirug\u00eda y la radioterapia local no son la opci\u00f3n principal en este estadio M1."},{"n":"86","q":"Indique la afirmaci\u00f3n correcta sobre la cistectom\u00eda radical:","o":["Incluye ex\u00e9resis de vejiga, pr\u00f3stata (en el var\u00f3n) y ganglios ilioobturadores.","La morbimortalidad es muy baja comparada con procedimientos endosc\u00f3picos.","La derivaci\u00f3n ureteral a intestino se realiza a los 5 d\u00edas tras la ex\u00e9resis.","Es el tratamiento de elecci\u00f3n del c\u00e1ncer vesical no musculoinvasivo de alto grado."],"c":1,"e":"La cistectom\u00eda radical en el var\u00f3n incluye: vejiga + pr\u00f3stata + ves\u00edculas seminales + ganglios linf\u00e1ticos ilioobturadores. La derivaci\u00f3n urinaria se realiza en el mismo acto quir\u00fargico. Es una cirug\u00eda de alta morbimortalidad y est\u00e1 indicada en el c\u00e1ncer vesical musculoinvasivo, no en el no invasivo."},{"n":"87","q":"Mujer con vejiga hiperactiva refractaria a anticolin\u00e9rgicos dosis m\u00e1ximas y doble terapia (anticolin\u00e9rgico + agonista beta-3). \u00bfPlan terap\u00e9utico?","o":["Retirar anticolin\u00e9rgicos y a\u00f1adir agonistas beta-3 a dosis m\u00e1ximas.","Inyecci\u00f3n de toxina botul\u00ednica intradetrusor.","Cateterismos intermitentes.","Enterocistoplastia de aumento."],"c":2,"e":"La escalada terap\u00e9utica sigue: medidas conservadoras \u2192 anticolin\u00e9rgicos \u2192 agonistas beta-3 \u2192 combinaci\u00f3n \u2192 toxina botul\u00ednica intradetrusor (onabotulinumtoxinA 100 UI) \u2192 neuromodulaci\u00f3n sacra \u2192 cirug\u00eda. Tras fracasar anticolin\u00e9rgicos y doble terapia, el siguiente escal\u00f3n son las inyecciones de toxina botul\u00ednica, que inhiben la liberaci\u00f3n de acetilcolina en la uni\u00f3n neuromuscular vesical."},{"n":"88","q":"Mujer fumadora 68 a\u00f1os, industria del caucho, polaquiuria, disuria y hematuria. Urocultivo y ecograf\u00eda normales. \u00bfAfirmaci\u00f3n correcta?","o":["Probable vejiga hiperactiva; solicitar estudio urodin\u00e1mico.","Realizar cistoscopia y citolog\u00edas urinarias ante riesgo de carcinoma in situ vesical.","Probable litiasis vesical que expulsar\u00e1 espont\u00e1neamente.","La disuria descarta patolog\u00eda tumoral."],"c":2,"e":"Esta paciente tiene dos factores de riesgo mayores para c\u00e1ncer vesical: tabaquismo (factor n\u00ba1) y exposici\u00f3n ocupacional a aminas arom\u00e1ticas (industria del caucho). La hematuria con urocultivo negativo obliga a descartar neoplasia vesical, especialmente el carcinoma in situ (CIS), que es una lesi\u00f3n plana no visible en la ecograf\u00eda. La cistoscopia + citolog\u00eda urinaria es el estudio de elecci\u00f3n."},{"n":"137","q":"En paciente con shock hipovol\u00e9mico y oliguria, \u00bfcu\u00e1l sugiere necrosis tubular aguda (y no fracaso prerrenal)?","o":["Sodio urinario < 20 mEq/L.","Excreci\u00f3n fraccional de sodio < 1%.","Cociente creatinina urinaria/plasm\u00e1tica > 40.","Osmolalidad urinaria < 350 mOsm/kg."],"c":4,"e":"En la NTA los t\u00fabulos est\u00e1n lesionados y no pueden concentrar orina \u2192 osmolalidad urinaria baja (<350 mOsm/kg), sodio urinario alto (>40 mEq/L), FENa >2%. En el fracaso prerrenal los t\u00fabulos est\u00e1n intactos \u2192 concentran la orina (osmolalidad >500 mOsm/kg), retienen sodio (Na urinario <20, FENa <1%). Una osmolalidad <350 es diagn\u00f3stica de NTA."},{"n":"141","q":"Mujer 67 a\u00f1os con sodio 122 mEq/L, creatinina normal, osmolalidad plasm\u00e1tica 257 mOsm/kg, sodio urinario 45 mEq/L. Cambio de antihipertensivo hace 1 mes. \u00bfDiagn\u00f3stico?","o":["Hiponatremia inducida por tiazidas.","Insuficiencia suprarrenal.","Potoman\u00eda.","Pseudohiponatremia por hiperglucemia."],"c":1,"e":"Las tiazidas bloquean el cotransportador Na-Cl en el t\u00fabulo distal, impidiendo la diluci\u00f3n de la orina y causando retenci\u00f3n de agua libre \u2192 hiponatremia hipoosmolar. Claves: osmolalidad plasm\u00e1tica baja (257), sodio urinario elevado (45 mEq/L), funci\u00f3n renal normal y cambio reciente de antihipertensivo. La potoman\u00eda dar\u00eda sodio urinario muy bajo."},{"n":"190","q":"\u00bfCu\u00e1l de estas patolog\u00edas NO es causa de hipopotasemia?","o":["Hipomagnesemia.","Hipoaldosteronismo.","V\u00f3mitos.","S\u00edndrome de Bartter."],"c":2,"e":"El aldosterona estimula la reabsorci\u00f3n de Na y la excreci\u00f3n de K en el t\u00fabulo colector. El HIPOALDOSTERONISMO (d\u00e9ficit de aldosterona) cursa con HIPERPOTASEMIA (retenci\u00f3n de K), no con hipopotasemia. Las otras opciones son causas de hipopotasemia: hipomagnesemia causa resistencia a la correcci\u00f3n del K; los v\u00f3mitos generan alcalosis con excreci\u00f3n renal de K; el s\u00edndrome de Bartter es un defecto tubular renal con p\u00e9rdida de K."},{"n":"191","q":"\u00bfLa enfermedad que m\u00e1s frecuentemente conduce a los programas de di\u00e1lisis y trasplante en Espa\u00f1a es?","o":["Pielonefritis cr\u00f3nica.","Nefroesclerosis hipertensiva.","Poliquistosis hepatorrenal.","Enfermedad renal diab\u00e9tica."],"c":4,"e":"Seg\u00fan el Registro Espa\u00f1ol de Di\u00e1lisis y Trasplante (REDyT 2024), la nefropat\u00eda diab\u00e9tica es la primera causa de entrada en terapia renal sustitutiva (TRS) en Espa\u00f1a, seguida de la nefroangioesclerosis y la glomerulonefritis. La prevalencia creciente de DM tipo 2 y la mayor supervivencia de los diab\u00e9ticos son los factores principales."},{"n":"192","q":"\u00bfCu\u00e1l es el mejor marcador bioqu\u00edmico de funci\u00f3n renal en la pr\u00e1ctica cl\u00ednica habitual?","o":["La urea plasm\u00e1tica.","La creatinina plasm\u00e1tica.","El potasio s\u00e9rico.","El filtrado glomerular estimado (FGe)."],"c":4,"e":"El FGe (calculado con f\u00f3rmulas como CKD-EPI a partir de creatinina, edad y sexo) es el mejor marcador porque corrige las limitaciones de la creatinina aislada: un anciano sarcop\u00e9nico puede tener creatinina normal con FG muy bajo. La urea var\u00eda con la dieta e hidrataci\u00f3n. El FGe permite estadificar la ERC y ajustar dosis de f\u00e1rmacos."},{"n":"193","q":"Son caracter\u00edsticas de la preeclampsia:","o":["HTA, microhematuria y edemas en la \u00faltima parte del embarazo.","HTA, microhematuria y edemas en el primer trimestre.","HTA, proteinuria y edemas en la segunda mitad del embarazo.","HTA, proteinuria y edemas en el primer trimestre."],"c":3,"e":"La preeclampsia se define por HTA (\u2265140/90 mmHg) + proteinuria significativa (>300 mg/24h) aparecida despu\u00e9s de la semana 20 de gestaci\u00f3n (segunda mitad). Los edemas son frecuentes pero no parte de la definici\u00f3n actual. NO se acompa\u00f1a de microhematuria. Si aparece antes de la semana 20, sospechar enfermedad trofobl\u00e1stica."},{"n":"194","q":"Paciente DM2, enalapril dosis m\u00e1ximas + empagliflozina 10 mg, buen control TA y gluc\u00e9mico, pero albuminuria 160 mg/g, FGe 65 ml/min, K 4,4 mEq/L. \u00bfSiguiente medida para reducir la progresi\u00f3n renal?","o":["Sustituir enalapril por un ARA II.","A\u00f1adir un agonista del receptor GLP-1.","A\u00f1adir finerenona (antagonista no esteroideo del receptor mineralocorticoide).","Aumentar la dosis de empagliflozina."],"c":3,"e":"Tras optimizar IECA + SGLT2, el siguiente escal\u00f3n con mayor evidencia en la ERC diab\u00e9tica con albuminuria persistente es la finerenona (ensayos FIDELIO-DKD y FIGARO-DKD): reduce la progresi\u00f3n de la ERC y los eventos cardiovasculares. A diferencia de la espironolactona (esteroideo), tiene menor riesgo de hiperpotasemia. Indicada si FGe \u226525 ml/min y K <5 mEq/L."},{"n":"195","q":"Indigente inconsciente con m\u00faltiples hematomas y fetor et\u00edlico. Urea 200 mg/dl, creatinina 6 mg/dl, CPK 9000 U/L. \u00bfDiagn\u00f3stico m\u00e1s probable?","o":["Necrosis tubular aguda alcoh\u00f3lica.","Fracaso renal agudo por urato.","Fracaso renal agudo prerrenal por deshidrataci\u00f3n.","Fracaso renal agudo por rabdomi\u00f3lisis."],"c":4,"e":"La CPK 9000 U/L (normal <200) indica rabdomi\u00f3lisis masiva por destrucci\u00f3n muscular (traumatismo + posici\u00f3n prolongada). La mioglobina precipita en los t\u00fabulos renales causando NTA. El patr\u00f3n cl\u00e1sico es: hombre encontrado inconsciente en posici\u00f3n mantenida prolongada, CPK muy elevada y fracaso renal agudo. El tratamiento es hidrataci\u00f3n agresiva iv para eliminar mioglobina."}],"gineco":[{"n":"50","imp":true,"q":"Respecto al c\u00e1ncer de mama, se\u00f1ale la afirmaci\u00f3n correcta:","o":["El pico de incidencia se sit\u00faa entre los 50 y 60 a\u00f1os.","El carcinoma ductal in situ se estadifica como estadio 0.","El carcinoma lobulillar es el tipo histol\u00f3gico m\u00e1s frecuente.","La mayor\u00eda de los casos se deben al riesgo gen\u00e9tico (mutaciones BRCA)."],"c":2,"e":"El carcinoma ductal in situ (CDIS) es una proliferaci\u00f3n de c\u00e9lulas malignas dentro de los conductos mamarios sin invasi\u00f3n del estroma \u2192 no puede dar met\u00e1stasis \u2192 estadio 0 (Tis N0 M0). El tipo m\u00e1s frecuente es el ductal infiltrante (~75-80%). La mayor\u00eda de los casos son espor\u00e1dicos; solo el 5-10% tienen causa hereditaria. \u26a0\ufe0f Pregunta impugnada."},{"n":"51","q":"Mujer de 35 a\u00f1os con baches amenorreicos, FSH 80 U/L y LH 51 U/L. \u00bfDiagn\u00f3stico?","o":["Insuficiencia o fallo ov\u00e1rico prematuro.","Adenoma hipofisario secretor de gonadotropinas.","Amenorrea hipotal\u00e1mica.","Sospecha de s\u00edndrome de Kallman o Prader-Willi."],"c":1,"e":"FSH muy elevada (>40 U/L en dos ocasiones separadas >4 semanas) + amenorrea en mujer <40 a\u00f1os = criterio diagn\u00f3stico de insuficiencia ov\u00e1rica primaria (IOP). Es un hipogonadismo hipergonadotr\u00f3pico: el eje hipot\u00e1lamo-hipofisario funciona bien (gonadotropinas altas), pero el ovario no responde. La amenorrea hipotal\u00e1mica cursa con FSH y LH bajas."},{"n":"52","q":"Se detecta un n\u00f3dulo mamario BIRADS 4A en mujer de 40 a\u00f1os. \u00bfActitud m\u00e1s correcta?","o":["Realizar la ex\u00e9resis quir\u00fargica del n\u00f3dulo mamario.","Im\u00e1genes de seguimiento cada 6 meses; si hay crecimiento, biopsia.","Biopsia percut\u00e1nea con aguja gruesa para estudio histopatol\u00f3gico (probabilidad de malignidad \u226410%).","El sistema BIRADS no se aplica a n\u00f3dulos, solo a microcalcificaciones."],"c":3,"e":"BIRADS 4A indica probabilidad de malignidad >2% y \u226410%: insuficiente para cirug\u00eda directa, pero s\u00ed indica biopsia percut\u00e1nea. La biopsia con aguja gruesa (BAG) permite diagn\u00f3stico histopatol\u00f3gico, evita cirug\u00eda innecesaria y es el est\u00e1ndar de cuidado. El seguimiento solo es aceptable en BIRADS 3 (probabilidad \u22642%). La ex\u00e9resis quir\u00fargica como primer paso es excesiva."},{"n":"53","q":"\u00bfCu\u00e1l es la determinaci\u00f3n m\u00e1s \u00fatil para valorar la reserva folicular ov\u00e1rica en estudio de esterilidad?","o":["Estradiol en mitad de ciclo.","FSH en mitad de ciclo.","AMH (hormona antim\u00fclleriana) en cualquier momento del ciclo.","Determinaci\u00f3n conjunta de FSH y estradiol en d\u00eda 8."],"c":3,"e":"La AMH es producida por las c\u00e9lulas de la granulosa de los fol\u00edculos antrales peque\u00f1os y refleja directamente el pool folicular. Puede determinarse en cualquier d\u00eda del ciclo (no var\u00eda significativamente) y no depende de la estimulaci\u00f3n hipofisaria. Es el marcador m\u00e1s sensible y espec\u00edfico de reserva ov\u00e1rica. La FSH en d\u00eda 3 tiene mayor variabilidad interciclo."},{"n":"54","q":"Gestante 32 semanas con rotura prematura de membranas (RPM), afebril, anal\u00edtica normal, registro cardiotocogr\u00e1fico normal. \u00bfActitud?","o":["Tocol\u00edtico profil\u00e1ctico + actitud expectante.","Tocol\u00edtico + maduraci\u00f3n pulmonar con corticoides + actitud expectante.","Antibi\u00f3tico + maduraci\u00f3n pulmonar con corticoides + actitud expectante con vigilancia maternofetal.","Antibi\u00f3tico + corticoides + medidas para finalizar la gestaci\u00f3n en 48-72 horas."],"c":3,"e":"En RPM pret\u00e9rmino (24-34 sem) sin signos de infecci\u00f3n ni compromiso fetal: antibi\u00f3tico (eritromicina/amoxicilina 7-10 d\u00edas, para prolongar latencia y reducir infecci\u00f3n) + corticoides prenatales (betametasona, para maduraci\u00f3n pulmonar fetal) + manejo expectante con monitorizaci\u00f3n estrecha. Los tocol\u00edticos no est\u00e1n indicados de rutina en la RPM."},{"n":"55","q":"Sobre el cribado de preeclampsia en el primer trimestre, se\u00f1ale la afirmaci\u00f3n correcta:","o":["La inclusi\u00f3n del Doppler de las arterias uterinas aumenta la tasa de detecci\u00f3n.","El sFlt-1 indica mayor riesgo cuando est\u00e1 en concentraciones bajas.","La detecci\u00f3n permite prevenir con AAS 150 mg/noche comenzando en la semana 16.","Solo debe realizarse en centros con ec\u00f3grafo de alta resoluci\u00f3n."],"c":1,"e":"El cribado combinado incluye: PA media, Doppler de arterias uterinas (IP), PAPP-A y PlGF. La adici\u00f3n del IP de arterias uterinas (detecta placentaci\u00f3n an\u00f3mala) aumenta significativamente la tasa de detecci\u00f3n de preeclampsia precoz. El sFlt-1 elevado (no bajo) indica mayor riesgo. El AAS preventivo debe iniciarse antes de la semana 16, idealmente entre 11-14 semanas."},{"n":"56","q":"Mujer de 41 a\u00f1os con menopausia espont\u00e1nea a los 39, asintom\u00e1tica del climaterio, exploraci\u00f3n normal, t\u00eda materna con c\u00e1ncer de mama a los 50. \u00bfMejor recomendaci\u00f3n sobre THM?","o":["THM indicado al menos hasta los 50 a\u00f1os; el beneficio supera el riesgo.","THM puede usarse pero no m\u00e1s de 5 a\u00f1os por el riesgo de c\u00e1ncer de mama.","THM no indicado al no presentar s\u00edntomas vasomotores.","Puede usar estr\u00f3genos locales para sequedad vaginal, pero no THM sist\u00e9mico."],"c":1,"e":"La insuficiencia ov\u00e1rica primaria (IOP) antes de los 40 a\u00f1os implica deprivaci\u00f3n estrog\u00e9nica prolongada con alto riesgo de osteoporosis, enfermedad cardiovascular y deterioro cognitivo. La THM est\u00e1 indicada hasta la edad media de la menopausia natural (~50-51 a\u00f1os) porque el riesgo atribuible en mujeres <50 a\u00f1os es m\u00ednimo o inexistente. Un antecedente familiar en una t\u00eda (no madre/hermana) no es contraindicaci\u00f3n."},{"n":"57","q":"\u00bfEn cu\u00e1l caso est\u00e1 claramente indicado iniciar toc\u00f3lisis en gestante de 30 semanas con din\u00e1mica uterina?","o":["Si la longitud cervical en ecograf\u00eda transvaginal es de 20 mm.","Si el test de fibronectina fetal es negativo.","En todos los casos por la edad gestacional.","En todos los casos si la mujer es primigesta."],"c":1,"e":"La longitud cervical \u226425 mm en ecograf\u00eda transvaginal confirma la amenaza real de parto pret\u00e9rmino \u2192 indicaci\u00f3n de toc\u00f3lisis (para ganar tiempo para los corticoides). El test de fibronectina fetal NEGATIVO tiene alto valor predictivo negativo (parto improbable en 7-14 d\u00edas) \u2192 NO tocolizar. Una longitud de 20 mm es indicaci\u00f3n clara."}],"peds":[{"n":"41","q":"\u00bfCu\u00e1l de las siguientes es una medida preventiva para reducir la muerte s\u00fabita del lactante?","o":["Colocar al lactante en dec\u00fabito lateral.","Retrasar la vacunaci\u00f3n del lactante.","Acostar al lactante sobre una superficie blanda.","Evitar el sobrecalentamiento de la habitaci\u00f3n y la exposici\u00f3n al humo del tabaco."],"c":4,"e":"Recomendaciones para reducir el SMSL: posici\u00f3n supina para dormir (no lateral ni prono), superficie firme y plana, sin objetos blandos en la cuna, temperatura ambiente fresca (18-20\u00b0C, sin sobrecalentamiento), no exposici\u00f3n al humo del tabaco (pre y postnatal), lactancia materna y uso de chupete. El dec\u00fabito lateral no es seguro porque puede girar a prono."},{"n":"42","q":"\u00bfCu\u00e1l de las siguientes es una manifestaci\u00f3n caracter\u00edstica de la FASE FEBRIL de la enfermedad de Kawasaki?","o":["Inyecci\u00f3n conjuntival bilateral no exudativa.","Descamaci\u00f3n periungueal de los dedos.","Trombopenia.","Aneurismas coronarios."],"c":1,"e":"Los criterios diagn\u00f3sticos en la fase aguda (fiebre \u22655 d\u00edas + \u22654 de 5 criterios) incluyen: inyecci\u00f3n conjuntival bilateral NO exudativa, cambios en la mucosa oral (lengua en fresa, labios fisurados), adenopat\u00eda cervical, rash polimorfo y cambios en extremidades (eritema palmoplantar, edema en fase aguda). La descamaci\u00f3n ocurre en la fase subaguda (semanas 2-3). Los aneurismas coronarios son la complicaci\u00f3n m\u00e1s grave pero no son criterio diagn\u00f3stico."},{"n":"43","q":"Lactante de 2 meses con lactancia materna exclusiva. \u00bfSuplemento recomendado actualmente?","o":["Ninguno es necesario.","Vitamina D.","Vitamina C.","Hierro."],"c":2,"e":"La leche materna contiene cantidades insuficientes de vitamina D (10-80 UI/L). La exposici\u00f3n solar es inadecuada en lactantes peque\u00f1os. La AAP, AEP y otras gu\u00edas recomiendan suplemento de vitamina D (400 UI/d\u00eda) desde los primeros d\u00edas de vida en todos los lactantes alimentados con leche materna exclusiva o parcial (tambi\u00e9n si toman <1L/d\u00eda de f\u00f3rmula enriquecida)."},{"n":"44","q":"Sobre las vacunas vivas atenuadas, se\u00f1ale la afirmaci\u00f3n correcta:","o":["Pueden administrarse con seguridad durante el embarazo.","Se recomienda retrasar su administraci\u00f3n en ni\u00f1os que han recibido recientemente inmunoglobulinas.","Pueden administrarse en pacientes con inmunosupresi\u00f3n grave.","Se administran exclusivamente fuera de los calendarios vacunales oficiales."],"c":2,"e":"Las inmunoglobulinas (pasivas) contienen anticuerpos que pueden neutralizar el virus vacunal atenuado antes de producir inmunizaci\u00f3n activa. Se debe esperar un intervalo variable (3-11 meses seg\u00fan el producto y la dosis) entre la administraci\u00f3n de inmunoglobulinas y las vacunas vivas atenuadas (triple v\u00edrica, varicela). Las vacunas vivas est\u00e1n contraindicadas en embarazo e inmunosupresi\u00f3n grave."},{"n":"45","q":"Sobre el s\u00edndrome hemol\u00edtico ur\u00e9mico (SHU), se\u00f1ale la afirmaci\u00f3n correcta:","o":["Campylobacter jejuni es el agente m\u00e1s frecuente.","La insuficiencia renal combinada con hem\u00f3lisis puede provocar hiperpotasemia potencialmente grave.","Es m\u00e1s frecuente en adolescentes que en ni\u00f1os peque\u00f1os.","El tratamiento antibi\u00f3tico mejora el pron\u00f3stico del SHU t\u00edpico."],"c":2,"e":"El SHU t\u00edpico (D+) se debe principalmente a E. coli productora de verotoxina (VTEC), serotipo O157:H7 (no Campylobacter). La tr\u00edada cl\u00e1sica: anemia hemol\u00edtica microangiop\u00e1tica + trombopenia + fracaso renal agudo. La hem\u00f3lisis libera K y el fracaso renal impide su excreci\u00f3n \u2192 hiperpotasemia potencialmente letal. Los antibi\u00f3ticos est\u00e1n contraindicados (aumentan la liberaci\u00f3n de toxina Shiga). Es m\u00e1s frecuente en ni\u00f1os <5 a\u00f1os."},{"n":"46","q":"\u00bfCu\u00e1l de los siguientes es una se\u00f1al de alarma de maltrato f\u00edsico infantil?","o":["Historia del accidente coherente con el tipo y localizaci\u00f3n de la lesi\u00f3n.","Hematomas en diferentes estadios evolutivos o en zonas no expuestas ni protegidas.","Rasgu\u00f1os superficiales leves en zonas expuestas.","Presencia de molluscum contagiosum."],"c":2,"e":"Las se\u00f1ales de alarma de maltrato f\u00edsico incluyen: lesiones en distintos estadios evolutivos (diferentes tiempos = diferentes episodios), localizaci\u00f3n en zonas protegidas o no habituales (tronco, nalgas, muslos, cara, orejas), patr\u00f3n de lesiones que sugiere objeto (cintur\u00f3n, encendedor), historia inconsistente con el mecanismo y retraso en buscar atenci\u00f3n m\u00e9dica."},{"n":"47","q":"Sobre la dificultad respiratoria del prematuro (enfermedad de membrana hialina), se\u00f1ale la afirmaci\u00f3n correcta:","o":["El riesgo aumenta con la administraci\u00f3n de corticoides maternos prenatales.","Es menos frecuente en partos por ces\u00e1rea que en partos vaginales.","Es m\u00e1s frecuente en embarazos \u00fanicos que en gestaciones m\u00faltiples.","Existe una deficiencia de surfactante pulmonar por inmadurez, que es su causa principal."],"c":4,"e":"La enfermedad de membrana hialina se debe a d\u00e9ficit de surfactante pulmonar por inmadurez del pulm\u00f3n. Factores que AUMENTAN el riesgo: prematuridad, sexo masculino, ces\u00e1rea electiva (sin trabajo de parto), gestaci\u00f3n m\u00faltiple, diabetes materna. Los corticoides prenatales REDUCEN el riesgo (inducen maduraci\u00f3n pulmonar). El parto vaginal con trabajo de parto tiene efecto protector."},{"n":"48","q":"\u00bfCu\u00e1l es el tratamiento de elecci\u00f3n en la bronquiolitis aguda que requiere hospitalizaci\u00f3n?","o":["Broncodilatadores de rutina (salbutamol o adrenalina).","Anticuerpos monoclonales frente a VRS.","Manejo sintom\u00e1tico: vigilancia, oxigenoterapia e hidrataci\u00f3n.","Corticoides sist\u00e9micos."],"c":3,"e":"La bronquiolitis aguda (generalmente por VRS) no tiene tratamiento espec\u00edfico. El manejo es exclusivamente de soporte: oxigenoterapia si saturaci\u00f3n <90-92%, hidrataci\u00f3n, aspiraci\u00f3n de secreciones. Los broncodilatadores, corticoides y antibi\u00f3ticos NO est\u00e1n recomendados de forma rutinaria porque no han demostrado mejor\u00eda cl\u00ednica significativa en ensayos cl\u00ednicos. El palivizumab es preventivo, no terap\u00e9utico."},{"n":"49","q":"Sobre el trastorno del espectro autista (TEA) en edad pedi\u00e1trica, se\u00f1ale la afirmaci\u00f3n correcta:","o":["La prevalencia es igual en ambos sexos.","Las comorbilidades son excepcionales en el TEA.","Los s\u00edntomas aparecen en las primeras fases del desarrollo pero pueden no manifestarse plenamente hasta que la demanda social supera las capacidades del ni\u00f1o.","No puede diagnosticarse en menores de 36 meses."],"c":3,"e":"El TEA tiene base neurobiol\u00f3gica desde el nacimiento. Los s\u00edntomas est\u00e1n presentes desde las primeras fases del desarrollo, pero en casos leves o con buenas estrategias compensatorias, pueden no hacerse evidentes hasta que las demandas sociales aumentan (inicio escolar). Es m\u00e1s frecuente en varones (ratio 4:1). Las comorbilidades (TDAH, ansiedad, DI, epilepsia) son muy frecuentes."},{"n":"174","q":"Lactante 10 meses con otitis medias recurrentes desde los 6 meses, neumon\u00eda bacteriana previa, Igs muy disminuidas, linfocitos B CD19+ pr\u00e1cticamente ausentes, linfocitos T normales. \u00bfAlteraci\u00f3n gen\u00e9tica m\u00e1s probable?","o":["Mutaci\u00f3n en RAG1 (inmunodeficiencia combinada grave).","Deleci\u00f3n 22q11.2 (s\u00edndrome DiGeorge).","Mutaci\u00f3n en BTK (agammaglobulinemia ligada al X de Bruton).","Deficiencia de ADA."],"c":3,"e":"La agammaglobulinemia de Bruton (XLA) se produce por mutaci\u00f3n en el gen BTK (ligado al X). BTK es esencial para la diferenciaci\u00f3n de c\u00e9lulas pre-B a B \u2192 ausencia de linfocitos B maduros \u2192 pan-hipogammaglobulinemia. Se manifiesta a los 6 meses (cuando desaparecen los anticuerpos maternos) con infecciones bacterianas recurrentes. 'Nunca tuvo am\u00edgdalas grandes' = ausencia de tejido linfoide B-dependiente."},{"n":"176","q":"Lactante 11 meses con tumefacci\u00f3n de rodilla caliente. TP normal (11 s), TTPA 80 s (rango 20-40 s). La prueba de mezclas corrige. \u00bfQu\u00e9 opci\u00f3n diagn\u00f3stica NO se ajusta a estos hallazgos?","o":["D\u00e9ficit de factor VII.","D\u00e9ficit de factor VIII (hemofilia A).","D\u00e9ficit de factor IX (hemofilia B).","Enfermedad de von Willebrand tipo 3."],"c":1,"e":"TTPA alargado + TP normal indica defecto en la v\u00eda intr\u00ednseca (factores VIII, IX, XI, XII) o en el FvW. La prueba de mezclas corrige \u2192 d\u00e9ficit de factor (no inhibidor). El d\u00e9ficit de factor VII alarga \u00daNICAMENTE el TP (factor VII solo participa en la v\u00eda extr\u00ednseca) con TTPA normal \u2192 no se ajusta al cuadro. El d\u00e9ficit de FVIII, FIX y FvW tipo 3 s\u00ed alargan el TTPA con TP normal."},{"n":"177","q":"La exanguinotransfusi\u00f3n se utiliza de forma caracter\u00edstica en el tratamiento de:","o":["P\u00farpura tromb\u00f3tica trombocitop\u00e9nica (PTT) inmunomediada.","S\u00edndrome de Guillain-Barr\u00e9.","Rechazo humoral agudo en trasplante renal.","Enfermedad hemol\u00edtica del reci\u00e9n nacido."],"c":4,"e":"La exanguinotransfusi\u00f3n (recambio de la volemia del neonato por sangre compatible) se usa en la enfermedad hemol\u00edtica grave del reci\u00e9n nacido (eritroblastosis fetal por incompatibilidad Rh o ABO) para eliminar anticuerpos maternos hemolizantes, retirar gl\u00f3bulos rojos sensibilizados y reducir bilirrubina (previniendo kernicterus). En la PTT del adulto se usa plasmaf\u00e9resis. El Guillain-Barr\u00e9 se trata con IGIV o plasmaf\u00e9resis."}],"endo":[{"n":"185","q":"Paciente de 62 a\u00f1os asintom\u00e1tico con masa suprarrenal incidental de 2,5 cm. Sin antecedentes de c\u00e1ncer. \u00bfQu\u00e9 t\u00e9cnica de imagen ser\u00eda la m\u00e1s indicada para caracterizarla inicialmente?","o":["Resonancia magn\u00e9tica con secuencias en fase y fuera de fase.","TC de abdomen sin contraste.","PET-TC con fluorodesoxiglucosa (FDG).","TC de abdomen con contraste intravenoso."],"c":2,"e":"El TC sin contraste (TCSC) es la prueba de elecci\u00f3n inicial para el incidentaloma suprarrenal. Permite medir la densidad en unidades Hounsfield (UH): si <10 UH \u2192 adenoma benigno rico en l\u00edpidos (no requiere m\u00e1s imagen). Si \u226510 UH \u2192 TC con contraste y c\u00e1lculo del porcentaje de lavado absoluto y relativo para diferenciar adenoma lip\u00eddico pobre de met\u00e1stasis/feocromocitoma."},{"n":"186","q":"\u00bfCu\u00e1l es correcta al comparar el tratamiento farmacol\u00f3gico con el quir\u00fargico de la obesidad grave?","o":["El tratamiento farmacol\u00f3gico logra mayor p\u00e9rdida de peso que el quir\u00fargico en obesidad grave.","La cirug\u00eda bari\u00e1trica solo est\u00e1 indicada en obesidad grado I sin comorbilidades.","El tratamiento farmacol\u00f3gico es m\u00e1s eficaz que la cirug\u00eda para mejorar la diabetes tipo 2 en obesidad.","La cirug\u00eda bari\u00e1trica logra mayores reducciones de peso y mejor\u00eda de comorbilidades que el tratamiento farmacol\u00f3gico en obesidad grave."],"c":4,"e":"La cirug\u00eda bari\u00e1trica (bypass g\u00e1strico en Y de Roux, sleeve gastrectom\u00eda) es significativamente m\u00e1s efectiva que el tratamiento farmacol\u00f3gico (incluyendo semaglutida) para conseguir p\u00e9rdidas de peso del 25-35% y remisi\u00f3n de comorbilidades como DM2 (60-80%), HTA y dislipemia en obesidad grado III o grado II con comorbilidades. El tratamiento farmacol\u00f3gico consigue p\u00e9rdidas del 10-15%."},{"n":"187","q":"Paciente con DM2, HbA1c 8,2%, IMC 33, IAM hace 1 a\u00f1o, TFG 52 ml/min, en tratamiento con metformina. \u00bfQu\u00e9 a\u00f1adir?","o":["Insulina basal.","Pioglitazona.","Inhibidor de DPP-4 (sitagliptina).","Inhibidor de SGLT2 (empagliflozina)."],"c":4,"e":"En DM2 con enfermedad cardiovascular establecida (IAM previo), los inhibidores SGLT2 (empagliflozina, dapagliflozina) son la primera opci\u00f3n a a\u00f1adir a metformina seg\u00fan el consenso ADA/EASD 2022, por su beneficio cardiovascular demostrado (reducci\u00f3n de MACE, hospitalizaciones por IC y progresi\u00f3n renal). El TFG 52 ml/min permite el uso de empagliflozina. La pioglitazona puede causar retenci\u00f3n de l\u00edquidos (riesgo en cardiopat\u00eda)."},{"n":"188","q":"\u00bfCu\u00e1l es el rango de glucosa considerado 'Tiempo en Rango' (TIR) durante el embarazo seg\u00fan el perfil gluc\u00e9mico ambulatorio (AGP)?","o":["70\u2013180 mg/dL.","70\u2013140 mg/dL.","63\u2013140 mg/dL.","60\u2013130 mg/dL."],"c":3,"e":"En mujeres embarazadas (DM1 o DM2 en gestaci\u00f3n), el rango objetivo de glucosa es m\u00e1s estrecho que en no gestantes: 63-140 mg/dL (vs. 70-180 mg/dL en no gestantes). El objetivo de TIR en el embarazo es >70% del tiempo en este rango, con <4% por debajo de 63 mg/dL. Este rango m\u00e1s estrecho reduce el riesgo de macrosom\u00eda y complicaciones neonatales."},{"n":"189","q":"Hijo de 8 a\u00f1os de paciente con DM1: anti-GAD y anti-IA2 positivos, glucemia basal 88 mg/dL, HbA1c 5,2%, completamente asintom\u00e1tico. \u00bfConducta m\u00e1s apropiada?","o":["Vigilancia pasiva al estar asintom\u00e1tico con glucemias normales.","Iniciar metformina para preservar la funci\u00f3n de la c\u00e9lula beta.","Clasificar como estadio 1 de DM1 y derivar a endocrinolog\u00eda pedi\u00e1trica para seguimiento y posible inclusi\u00f3n en ensayos de prevenci\u00f3n.","Repetir glucosa anualmente; el desarrollo de la enfermedad es improbable antes de la pubertad."],"c":3,"e":"Clasificaci\u00f3n de estadios de DM1 (ADA/ISPAD 2024): Estadio 1 = \u22652 autoanticuerpos positivos + normoglucemia (riesgo >50% de DM1 en 10 a\u00f1os). El diagn\u00f3stico precoz permite monitorizaci\u00f3n estrecha, educaci\u00f3n familiar y potencial inclusi\u00f3n en ensayos de inmunomodulaci\u00f3n preventiva (teplizumab retrasa la progresi\u00f3n ~3 a\u00f1os). La metformina no tiene indicaci\u00f3n en este contexto."}],"paliat":[{"n":"125","q":"Mujer de 84 a\u00f1os con Alzheimer terminal, dependiente, 3 ingresos por neumon\u00eda aspirativa en 6 meses. Rechaza toda alimentaci\u00f3n. Su hija pide 'que se le ponga algo para alimentarla, aunque sea por una sonda'. \u00bfActuaci\u00f3n m\u00e1s adecuada?","o":["Colocar una gastrostom\u00eda y vigilar que no se la retire.","Iniciar nutrici\u00f3n parenteral perif\u00e9rica y tranquilizar a la hija.","Explicar a la hija que la falta de apetito y degluci\u00f3n son parte del proceso natural, y ofrecer cuidados de confort.","Intentar alimentaci\u00f3n con espesantes e insistir en que la madre abra la boca."],"c":3,"e":"En la demencia avanzada, la nutrici\u00f3n artificial (SNG, gastrostom\u00eda, nutrici\u00f3n parenteral) NO ha demostrado mejorar la supervivencia, la calidad de vida ni prevenir las aspiraciones (Cochrane, Sociedad Americana de Geriatr\u00eda). El rechazo activo de alimentos es parte del proceso de morir en la demencia avanzada. Lo correcto es ofrecer cuidados de confort centrados en aliviar el malestar (higiene oral, posicionamiento, control del dolor)."},{"n":"128","q":"Paciente con adenocarcinoma p\u00e1ncreas metast\u00e1sico en \u00faltimos d\u00edas: agitaci\u00f3n, desorientaci\u00f3n, asterixis, bilirrubina 9 mg/dl, amonio elevado. Recibe morfina sc + dexametasona + midazolam a demanda. \u00bfMedida farmacol\u00f3gica m\u00e1s adecuada?","o":["Aumentar la dosis de dexametasona y a\u00f1adir m\u00e1s midazolam.","Administrar haloperidol endovenoso y valorar retirar f\u00e1rmacos potencialmente implicados (corticoides y morfina).","Iniciar lactulosa y rifaximina para tratar la encefalopat\u00eda hep\u00e1tica.","Sustituir la morfina por buprenorfina sublingual para reducir efectos neurot\u00f3xicos."],"c":2,"e":"El cuadro es un delirium hiperactivo en contexto de encefalopat\u00eda hep\u00e1tica (amonio elevado, asterixis, ictericia). En cuidados paliativos, el haloperidol es el antipsic\u00f3tico de primera l\u00ednea para el delirium. Adem\u00e1s, hay que revisar y retirar f\u00e1rmacos que contribuyen al delirium: los corticoides pueden causar psicosis y la morfina con insuficiencia hep\u00e1tica acumula metabolitos neuroexcitadores. En \u00faltimos d\u00edas de vida, la lactulosa es inc\u00f3moda y tiene poco papel."},{"n":"129","q":"Carcinoma pulm\u00f3n avanzado. Morfina oral 120 mg/12h, 3-4 rescates/d\u00eda, dolor EVA 7/10, mioclon\u00edas, sue\u00f1os v\u00edvidos, confusi\u00f3n intermitente. FGe 40 ml/min. \u00bfEstrategia m\u00e1s adecuada?","o":["Aumentar morfina 25-50% y a\u00f1adir benzodiacepinas para las mioclon\u00edas.","Reducir la morfina a la mitad y a\u00f1adir un AINE o corticoide.","Rotar a fentanilo transd\u00e9rmico con reducci\u00f3n del 30-50% de la dosis equianalg\u00e9sica por tolerancia cruzada incompleta.","Suspender los opioides y sustituir por buprenorfina sublingual a dosis bajas."],"c":3,"e":"El cuadro es neurotoxicidad por morfina: las mioclon\u00edas, confusi\u00f3n y sue\u00f1os v\u00edvidos se deben a acumulaci\u00f3n de morfina-6-glucur\u00f3nido (metabolito activo) con FGe reducido (40 ml/min). La soluci\u00f3n es la rotaci\u00f3n de opioides: cambiar morfina por fentanilo transd\u00e9rmico (sin metabolitos activos con acumulaci\u00f3n renal significativa). La reducci\u00f3n del 30-50% de la dosis equianalg\u00e9sica se aplica por tolerancia cruzada incompleta. Aumentar la morfina empeorar\u00eda la neurotoxicidad."}],"geria":[{"n":"g1","noShuffle":false,"img":null,"q":"Si hablamos de atenci\u00f3n al anciano en Atenci\u00f3n Primaria, elige la respuesta INCORRECTA:","o":["La prescripci\u00f3n en cascada ocurre cuando se prescribe un f\u00e1rmaco para tratar s\u00edntomas originados por otro f\u00e1rmaco pensando que se trata de una condici\u00f3n cl\u00ednica nueva","El deterioro funcional y el aumento del riesgo de enfermedad podr\u00eda considerarse algo normal con el paso de los a\u00f1os, pero la vejez es diversa e influida por factores gen\u00e9ticos, ambientales y socioecon\u00f3micos","Entre las pruebas para la detecci\u00f3n de la fragilidad est\u00e1 la escala de Frail que eval\u00faa cinco dominios: fatiga, resistencia, mide la incapacidad para bajar escaleras, la deambulaci\u00f3n y el aumento de peso","En la consulta podemos detectar la fragilidad con m\u00faltiples pruebas, entre ellas el test de la marcha o el timed up-and-go"],"c":3,"e":"La respuesta incorrecta es la C. La escala FRAIL eval\u00faa: fatiga, resistencia (incapacidad para <b>subir</b> escaleras, no bajarlas), deambulaci\u00f3n, comorbilidades (\u22655) y <b>p\u00e9rdida de peso</b> (&gt;5%), no \u2018aumento\u2019. Dos errores en la opci\u00f3n C hacen que sea la incorrecta."},{"n":"g2","noShuffle":false,"img":null,"q":"Mujer de 84 a\u00f1os con Alzheimer en fase terminal, dependiente total, tres ingresos en 6 meses por neumon\u00eda aspirativa. Rechaza alimentos y l\u00edquidos. La hija pide colocar una sonda. \u00bfCu\u00e1l es la actuaci\u00f3n m\u00e1s adecuada?","o":["Colocar una gastrostom\u00eda para asegurar el aporte nutricional","Iniciar nutrici\u00f3n parenteral perif\u00e9rica","Explicar a la hija que la falta de apetito y degluci\u00f3n son parte del proceso natural y ofrecer cuidados de confort","Intentar alimentaci\u00f3n con espesantes e insistir en que la paciente abra la boca"],"c":3,"e":"En la fase final de la demencia, el rechazo de alimentos es parte del proceso natural de muerte. <b>La nutrici\u00f3n artificial no prolonga la vida ni mejora el confort</b> en estos pacientes; aumenta el riesgo de aspiraci\u00f3n. La respuesta correcta es el enfoque paliativo: cuidados de confort, higiene oral y apoyo emocional a la familia."},{"n":"g3","noShuffle":false,"img":null,"q":"Se\u00f1ale cu\u00e1l de los siguientes se considera un \u2018Hallmark\u2019 o marca del envejecimiento de tipo primario:","o":["Desregulaci\u00f3n en la se\u00f1alizaci\u00f3n de nutrientes","Acortamiento de los tel\u00f3meros","Disfunci\u00f3n mitocondrial","Agotamiento de c\u00e9lulas madre"],"c":2,"e":"Seg\u00fan L\u00f3pez-Ot\u00edn (2013), los hallmarks <b>primarios</b> son los que causan da\u00f1o directamente: inestabilidad gen\u00f3mica, <b>acortamiento de tel\u00f3meros</b>, alteraciones epigen\u00e9ticas y p\u00e9rdida de proteostasis. Disfunci\u00f3n mitocondrial y desregulaci\u00f3n de nutrientes son antagonistas. Agotamiento de c\u00e9lulas madre es integrativo."},{"n":"g4","noShuffle":false,"img":null,"q":"El \u00cdndice de Barthel de un paciente con incontinencia urinaria ocasional y supervisi\u00f3n f\u00edsica para deambular y subir escaleras, independiente para el resto de las ABVD, es:","o":["65","75","85","95"],"c":3,"e":"Base independiente (ba\u00f1o+vestido+aseo+deposici\u00f3n+alimentaci\u00f3n+traslado+WC) = 65 pts. Incontinencia urinaria ocasional = 5 pts (no 10). Deambulaci\u00f3n con supervisi\u00f3n = 10 pts (no 15). Escaleras con supervisi\u00f3n = 5 pts (no 10). Total: <b>65 + 5 + 10 + 5 = 85 puntos</b>."},{"n":"g5","noShuffle":false,"img":null,"q":"Paciente de 68 a\u00f1os con adenocarcinoma de p\u00e1ncreas metast\u00e1sico en \u00faltimos d\u00edas. Agitaci\u00f3n, desorientaci\u00f3n y alucinaciones. Recibe morfina sc, dexametasona y midazolam. Ictericia, asterixis, bilirrubina 9, transaminasas x4 y amonio elevado. \u00bfCu\u00e1l es la medida farmacol\u00f3gica m\u00e1s adecuada?","o":["Aumentar dexametasona y a\u00f1adir midazolam","Administrar haloperidol y valorar ajustar f\u00e1rmacos implicados (corticoides y morfina)","Iniciar lactulosa y rifaximina para tratar encefalopatia hep\u00e1tica","Sustituir morfina por buprenorfina sublingual"],"c":2,"e":"Delirium hipera\u00e9rgico en \u00faltimos d\u00edas por acumulaci\u00f3n de metabolitos de morfina e insuficiencia hep\u00e1tica. <b>Haloperidol</b> es el antipoic\u00f3tico de elecci\u00f3n en delirium paliativo, junto con revisi\u00f3n de f\u00e1rmacos precipitantes. Lactulosa y rifaximina no tienen sentido en \u00faltimos d\u00edas de vida."},{"n":"g6","noShuffle":false,"img":null,"q":"Hombre de 81 a\u00f1os con adenocarcinoma de pr\u00f3stata oligometast\u00e1sico, ECOG 1, fragilidad leve y polifarmacia. Antes de decidir la estrategia terap\u00e9utica, \u00bfqu\u00e9 aspectos deben considerarse prioritariamente?","o":["El nivel de PSA y el n\u00famero de lesiones metast\u00e1sicas","Aplicar el tratamiento m\u00e1s agresivo disponible por haber enfermedad metast\u00e1sica","Comorbilidades, estado funcional y expectativa de vida","La edad cronol\u00f3gica como criterio principal para limitar el tratamiento"],"c":3,"e":"En oncogeriatr\u00eda, la <b>edad biol\u00f3gica</b> (estado funcional, comorbilidades, expectativa de vida) prima sobre la cronol\u00f3gica. La evaluaci\u00f3n geri\u00e1trica integral (EGI) permite individualizar. El PSA orienta la estadificaci\u00f3n, no la tolerancia al tratamiento. Priorizar el tratamiento m\u00e1s agresivo sin evaluaci\u00f3n funcional es un error cl\u00e1sico."},{"n":"g7","noShuffle":false,"img":null,"q":"Paciente de 92 a\u00f1os evaluado seg\u00fan criterios de Fried: p\u00e9rdida de peso de 2 kg el a\u00f1o previo, fuerza prensora normal, no refiere agotamiento, lentitud de marcha y nivel normal de actividad f\u00edsica. \u00bfCu\u00e1l es su nivel de fragilidad?","o":["Robusto","Pre-fr\u00e1gil","Fr\u00e1gil","Discapacitado"],"c":2,"e":"Criterios de Fried: p\u00e9rdida de peso, agotamiento, debilidad muscular, lentitud de marcha y baja actividad. <b>0 criterios = robusto; 1-2 = pre-fr\u00e1gil; \u22653 = fr\u00e1gil.</b> Este paciente cumple 2: <b>p\u00e9rdida de peso</b> y <b>lentitud de marcha</b>. Resultado: <b>pre-fr\u00e1gil</b>."},{"n":"g8","noShuffle":false,"img":null,"q":"Paciente de 87 a\u00f1os con SPPB: aguanta &gt;10s en las tres pruebas de equilibrio, tarda &lt;4,82s en recorrer 4 metros y &lt;11,2s en levantarse de la silla 5 veces. \u00bfCu\u00e1l es su puntuaci\u00f3n SPPB?","o":["12 puntos","10 puntos","8 puntos","6 puntos"],"c":1,"e":"SPPB: 3 subpruebas, m\u00e1x. 4 puntos cada una. <b>Equilibrio</b> (&gt;10s en las 3 posiciones) = 4 pts. <b>Velocidad de marcha</b> (&lt;4,82s) = 4 pts. <b>Test de silla x5</b> (&lt;11,2s) = 4 pts. Total: <b>12 puntos</b> (puntuaci\u00f3n m\u00e1xima)."}],"neuro":[{"n":"78","q":"Sobre los tumores cerebrales metast\u00e1sicos, indique la respuesta correcta:","o":["Son m\u00e1s infrecuentes que los tumores cerebrales primarios (solo el 10% de los tumores cerebrales).","Son tumores t\u00edpicos de la primera y segunda d\u00e9cadas de la vida.","Los tumores que con m\u00e1s frecuencia dan implantes cerebrales son los de p\u00e1ncreas e h\u00edgado.","Cuando existen met\u00e1stasis cerebrales m\u00faltiples, la extirpaci\u00f3n quir\u00fargica completa no suele ser una opci\u00f3n posible."],"c":4,"e":"Las met\u00e1stasis cerebrales son 10 veces m\u00e1s frecuentes que los tumores cerebrales primarios. Son t\u00edpicas del adulto. Los tumores que m\u00e1s frecuentemente metastatizan al cerebro son: pulm\u00f3n (40-50%), mama (15-25%), melanoma (5-20%), colon y ri\u00f1\u00f3n. P\u00e1ncreas e h\u00edgado no son los m\u00e1s frecuentes. Con m\u00faltiples met\u00e1stasis, la extirpaci\u00f3n completa no suele ser factible; el tratamiento es la radiocirug\u00eda estereot\u00e1xica (Gamma Knife) \u00b1 radioterapia holocraneal."},{"n":"79","q":"Con respecto al meningioma cerebral, indique la afirmaci\u00f3n correcta:","o":["Son tumores bien definidos y de localizaci\u00f3n extraaxial, generalmente extirpables de forma completa y esto puede ser curativo.","Los pacientes deben realizarse estudio gen\u00e9tico para la descendencia por la herencia autos\u00f3mica dominante.","No es necesario estudio anatomopatol\u00f3gico completo porque el grado no influye en el tratamiento ni el pron\u00f3stico.","Las recidivas en estos tumores no dependen del grado tumoral y no son frecuentes."],"c":1,"e":"Los meningiomas son tumores extraaxiales (nacen de las c\u00e9lulas aracnoideas), bien delimitados, con plano de clivaje respecto al par\u00e9nquima cerebral \u2192 en muchos casos se puede realizar ex\u00e9resis completa (resecci\u00f3n Simpson grado I-II), lo que puede ser curativo para los grados I. NO son hereditarios (salvo en NF2, poco frecuente). El grado histol\u00f3gico S\u00cd determina el pron\u00f3stico y la necesidad de radioterapia adyuvante."},{"n":"165","q":"\u00bfCu\u00e1l es la tr\u00edada cl\u00ednica caracter\u00edstica de la hidrocefalia normotensiva del adulto?","o":["Trastorno de la marcha, incontinencia urinaria y deterioro cognitivo.","Cefalea, v\u00f3mitos y rigidez de nuca.","Diplop\u00eda, papiledema y tinnitus puls\u00e1til.","V\u00f3mitos, bradicardia y alteraci\u00f3n del nivel de conciencia."],"c":1,"e":"La tr\u00edada de Hakim-Adams de la hidrocefalia normotensiva del adulto es: (1) Alteraci\u00f3n de la marcha: marcha 'magn\u00e9tica' a pasos cortos y lentos, amplia base; (2) Incontinencia urinaria (urgencia miccional); (3) Deterioro cognitivo subcortical (enlentecimiento, dificultad atencional). El tratamiento es la derivaci\u00f3n ventricular (VP). La cefalea y rigidez de nuca orientan a meningitis."}],"uci":[{"n":"25","q":"Paciente encontrado inconsciente en box de urgencias con ritmo de fibrilaci\u00f3n ventricular en el monitor. \u00bfCu\u00e1l debe ser la siguiente acci\u00f3n?","o":["Administrar adrenalina 1 mg iv.","Administrar amiodarona 300 mg iv.","Realizar una desfibrilaci\u00f3n (choque no sincronizado).","Realizar una cardioversi\u00f3n el\u00e9ctrica sincronizada."],"c":3,"e":"La fibrilaci\u00f3n ventricular (FV) o taquicardia ventricular sin pulso (TVSP) en la parada card\u00edaca requiere desfibrilaci\u00f3n inmediata como primera medida (choque no sincronizado, 150-200 J bif\u00e1sico). La cardioversi\u00f3n el\u00e9ctrica sincronizada se usa en taquiarritmias CON pulso. La adrenalina y amiodarona se administran DESPU\u00c9S del primer o tercer choque, respectivamente, mientras se mantiene la RCP. Cada minuto de retraso en la desfibrilaci\u00f3n reduce la supervivencia un 10%."},{"n":"96","q":"La estrategia de control de da\u00f1os en cirug\u00eda de trauma pretende evitar la denominada 'triada letal'. \u00bfCu\u00e1l es?","o":["Hipertermia, acidosis y coagulopat\u00eda.","Acidosis, hipotermia y coagulopat\u00eda.","Hipotermia, alcalosis y coagulopat\u00eda.","Hipertermia, alcalosis y coagulopat\u00eda."],"c":2,"e":"La 'triada de la muerte' en el traumatismo grave es: acidosis metab\u00f3lica (hipoperfusi\u00f3n tisular) + hipotermia (p\u00e9rdida de calor, menor funci\u00f3n enzim\u00e1tica) + coagulopat\u00eda (dilucional y por hipotermia/acidosis). Este c\u00edrculo vicioso es autoperpetuante y letal. La cirug\u00eda de control de da\u00f1os (hemostasia r\u00e1pida + laparostom\u00eda + UCI) interrumpe esta triada antes de proceder a la cirug\u00eda definitiva."},{"n":"196","q":"Var\u00f3n de 23 a\u00f1os encontrado en la calle con bajo nivel de conciencia. FC 40 lpm, TA 90/60 mmHg, pupilas puntiformes. \u00bfCu\u00e1l de los siguientes ant\u00eddotos estar\u00eda m\u00e1s indicado?","o":["Naloxona.","Flumazenilo.","Atropina.","Pralidoxima."],"c":1,"e":"La tr\u00edada cl\u00e1sica de intoxicaci\u00f3n por opioides es: miosis puntiforme bilateral + depresi\u00f3n del nivel de conciencia + depresi\u00f3n respiratoria (aqu\u00ed tambi\u00e9n bradicardia). La naloxona es el antagonista espec\u00edfico de los receptores \u00b5, \u03ba y \u03b4, con efecto inmediato iv (30-90 s). Flumazenilo antagoniza benzodiacepinas (pupilas normales o midri\u00e1ticas). Atropina y pralidoxima son para organofosforados (miosis + broncorrea + fasciculaciones)."},{"n":"197","q":"Paciente de 88 a\u00f1os con EAP hipertensivo (TA 190/70, FC 123, sat O2 89%). \u00bfCu\u00e1l de las siguientes medidas NO est\u00e1 indicada de inicio?","o":["Oxigenoterapia convencional (g
