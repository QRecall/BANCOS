ndo la diseminaci\u00f3n en el tiempo."},{"n":"165","noShuffle":false,"img":null,"q":"Paciente de 75 a\u00f1os con deterioro cognitivo subagudo, trastorno de la marcha e incontinencia urinaria. \u00bfDiagn\u00f3stico m\u00e1s probable?","o":["Hidrocefalia normotensiva (cr\u00f3nica del adulto).","Enfermedad de Parkinson.","Demencia frontotemporal.","Esclerosis lateral amiotr\u00f3fica."],"c":1,"e":"La tr\u00edada de <b>alteraci\u00f3n de la marcha, deterioro cognitivo e incontinencia urinaria</b> (Hakim-Adams) define la <b>hidrocefalia normotensiva</b>, potencialmente reversible con derivaci\u00f3n de LCR."},{"n":"166","noShuffle":false,"img":null,"q":"En la narcolepsia tipo 1, \u00bfqu\u00e9 hallazgo es caracter\u00edstico?","o":["Aumento de hipocretina (orexina) en LCR.","Cataplejia y niveles bajos de hipocretina-1 en LCR.","Ausencia de sue\u00f1o REM al inicio.","Hipersomnia sin alteraci\u00f3n del REM."],"c":2,"e":"La narcolepsia tipo 1 se caracteriza por <b>cataplejia</b> y <b>niveles bajos o indetectables de hipocretina-1 (orexina) en LCR</b>, por p\u00e9rdida de las neuronas hipotal\u00e1micas productoras, con entrada precoz en REM."},{"n":"167","noShuffle":false,"img":null,"q":"Ante un primer episodio de crisis epil\u00e9ptica no provocada en un adulto, \u00bfqu\u00e9 prueba es prioritaria para el diagn\u00f3stico sindr\u00f3mico y etiol\u00f3gico?","o":["Punci\u00f3n lumbar urgente en todos los casos.","TC craneal sin contraste obligatoria en todos.","Electroencefalograma y, salvo causa aguda evidente, resonancia magn\u00e9tica cerebral.","Arteriograf\u00eda cerebral."],"c":3,"e":"Tras una primera crisis no provocada, el estudio incluye <b>electroencefalograma</b> (riesgo de recurrencia) y <b>resonancia magn\u00e9tica cerebral</b> para buscar lesi\u00f3n estructural, salvo que exista una causa aguda evidente que se trate de inmediato."},{"n":"168","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 caracter\u00edstica orienta a una cefalea tensional frente a una migra\u00f1a?","o":["Dolor puls\u00e1til unilateral.","Dolor opresivo bilateral, leve-moderado, sin empeorar con la actividad f\u00edsica.","Fotofobia y v\u00f3mitos intensos.","Aura visual previa."],"c":2,"e":"La <b>cefalea tensional</b> es t\u00edpicamente <b>bilateral, opresiva (en banda), de intensidad leve-moderada</b> y <b>no empeora con la actividad f\u00edsica</b>, a diferencia de la migra\u00f1a (puls\u00e1til, unilateral, con n\u00e1useas, foto/fonofobia y a veces aura)."},{"n":"169","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 criterio cl\u00ednico apoya el diagn\u00f3stico de enfermedad de Parkinson seg\u00fan la MDS?","o":["Inicio sim\u00e9trico de los s\u00edntomas.","Bradicinesia asociada a temblor de reposo o rigidez, con buena respuesta a levodopa.","Ca\u00eddas precoces en el primer a\u00f1o.","Progresi\u00f3n r\u00e1pida con escasa respuesta a levodopa."],"c":2,"e":"El diagn\u00f3stico del p\u00e1rkinson exige <b>bradicinesia</b> m\u00e1s temblor de reposo y/o rigidez, con inicio <b>asim\u00e9trico</b> y <b>buena respuesta a levodopa</b>. Las ca\u00eddas precoces o la mala respuesta orientan a parkinsonismos at\u00edpicos."},{"n":"170","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 caracter\u00edstica define la hiperton\u00eda esp\u00e1stica frente a la rigidez extrapiramidal?","o":["Resistencia uniforme en todo el rango (rueda dentada).","Resistencia dependiente de la velocidad con fen\u00f3meno de navaja.","Hipoton\u00eda con reflejos abolidos.","Ausencia de aumento de reflejos osteotendinosos."],"c":2,"e":"La <b>espasticidad</b> (lesi\u00f3n de la v\u00eda piramidal) es una hiperton\u00eda <b>dependiente de la velocidad</b> con \u201cfen\u00f3meno de navaja\u201d e hiperreflexia. La rigidez extrapiramidal es uniforme (en rueda dentada o tuber\u00eda de plomo)."},{"n":"210","noShuffle":false,"img":null,"q":"Mujer joven con obesidad, cefalea, episodios de oscurecimiento visual y diplop\u00eda; en la exploraci\u00f3n hay papiledema bilateral y paresia del VI par. RM cerebral normal y presi\u00f3n de apertura del LCR elevada. \u00bfDiagn\u00f3stico?","o":["Migra\u00f1a cr\u00f3nica.","Trombosis de senos venosos.","Hipertensi\u00f3n intracraneal idiop\u00e1tica (pseudotumor cerebri).","Tumor de fosa posterior."],"c":3,"e":"Mujer joven obesa con cefalea, papiledema, paresia del VI par y <b>presi\u00f3n de LCR elevada con neuroimagen normal</b> define la <b>hipertensi\u00f3n intracraneal idiop\u00e1tica (pseudotumor cerebri)</b>; el riesgo principal es la p\u00e9rdida visual."}],"reuma":[{"n":"135","noShuffle":false,"img":null,"q":"Var\u00f3n de 25 a\u00f1os con uve\u00edtis anterior, \u00falceras orales recurrentes y p\u00e1pula eritematosa en el sitio de punci\u00f3n de la vacuna antigripal. \u00bfDiagn\u00f3stico?","o":["Sarcoidosis.","S\u00edfilis.","Enfermedad de Beh\u00e7et.","Enfermedad de Crohn."],"c":3,"e":"\u00dalceras orales recurrentes, uve\u00edtis y <b>fen\u00f3meno de patergia</b> (p\u00e1pula tras puntura) son caracter\u00edsticos de la <b>enfermedad de Beh\u00e7et</b>, una vasculitis sist\u00e9mica."},{"n":"136","noShuffle":false,"img":null,"q":"Var\u00f3n de 70 a\u00f1os con rigidez matutina y dolor en cinturas escapular y p\u00e9lvica de 3 meses, anemia normoc\u00edtica y VSG 85; factor reumatoide y anti-CCP negativos. \u00bfDiagn\u00f3stico?","o":["Artritis reumatoide seronegativa.","Polimialgia reum\u00e1tica.","Artritis indiferenciada.","Artrosis."],"c":2,"e":"Dolor y rigidez de cinturas en un mayor de 50 a\u00f1os con marcada elevaci\u00f3n de la VSG y serolog\u00edas negativas definen la <b>polimialgia reum\u00e1tica</b>, que responde de forma r\u00e1pida a corticoides a dosis bajas."},{"n":"179","noShuffle":false,"img":null,"q":"Paciente con artritis psori\u00e1sica sin respuesta a metotrexato. \u00bfQu\u00e9 diana terap\u00e9utica corresponde a un inhibidor de JAK?","o":["TNF-alfa.","Janus cinasas intracelulares que median se\u00f1ales de citocinas.","Interleucina-17 directamente.","Linfocitos B (CD20)."],"c":2,"e":"Los <b>inhibidores de JAK</b> (tofacitinib, upadacitinib) bloquean las <b>Janus cinasas intracelulares</b>, interrumpiendo la se\u00f1alizaci\u00f3n de m\u00faltiples citocinas proinflamatorias; son orales y \u00fatiles en la artritis psori\u00e1sica refractaria."},{"n":"180","noShuffle":false,"img":null,"q":"Paciente oncol\u00f3gico tratado con pembrolizumab que desarrolla artritis inflamatoria de nueva aparici\u00f3n. \u00bfMecanismo m\u00e1s probable?","o":["Infecci\u00f3n articular secundaria.","Toxicidad inmunomediada por inhibici\u00f3n de puntos de control (PD-1).","Dep\u00f3sito de cristales de urato.","Met\u00e1stasis articular."],"c":3,"e":"El pembrolizumab es un <b>inhibidor de PD-1</b> que desinhibe los linfocitos T y puede causar <b>efectos adversos inmunomediados</b>, entre ellos artritis inflamatoria. El tratamiento son corticoides y, si es grave, suspender el f\u00e1rmaco."},{"n":"181","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l es el hallazgo m\u00e1s caracter\u00edstico en el l\u00edquido sinovial de un ataque agudo de gota?","o":["Cristales de pirofosfato c\u00e1lcico con birrefringencia positiva.","Cristales de urato mons\u00f3dico con birrefringencia negativa intensa.","L\u00edquido claro y aceluar.","Cultivo positivo para S. aureus."],"c":2,"e":"En la gota, el l\u00edquido sinovial muestra <b>cristales de urato mons\u00f3dico</b> en forma de aguja, intracelulares, con <b>birrefringencia negativa intensa</b> bajo luz polarizada. El pirofosfato c\u00e1lcico (positiva) corresponde a la condrocalcinosis."},{"n":"182","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 autoanticuerpo es m\u00e1s sensible para el cribado del lupus eritematoso sist\u00e9mico?","o":["Anti-dsDNA.","Anticuerpos antinucleares (ANA).","Anti-Sm.","Anti-Ro/SSA."],"c":3,"e":"Los <b>anticuerpos antinucleares (ANA)</b> son muy <b>sensibles</b> y constituyen la prueba de cribado del LES (un ANA negativo lo hace muy improbable). Los anti-dsDNA y anti-Sm son m\u00e1s espec\u00edficos pero menos sensibles."},{"n":"183","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 manifestaci\u00f3n articular es t\u00edpica de la artritis psori\u00e1sica?","o":["Afectaci\u00f3n sim\u00e9trica exclusiva de peque\u00f1as articulaciones.","Dactilitis (\u201cdedo en salchicha\u201d) y afectaci\u00f3n de interfal\u00e1ngicas distales.","Ausencia de afectaci\u00f3n axial.","N\u00f3dulos reumatoides subcut\u00e1neos."],"c":4,"e":"La artritis psori\u00e1sica se caracteriza por la <b>dactilitis (\u201cdedo en salchicha\u201d)</b>, la afectaci\u00f3n de las <b>interfal\u00e1ngicas distales</b>, la entesitis y la posible afectaci\u00f3n axial; los n\u00f3dulos reumatoides son propios de la artritis reumatoide."},{"n":"184","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 vasculitis se asocia t\u00edpicamente a anticuerpos ANCA y afectaci\u00f3n pulmonar y renal?","o":["Arteritis de c\u00e9lulas gigantes.","Granulomatosis con poliangitis (anti-PR3).","P\u00farpura de Sch\u00f6nlein-Henoch.","Enfermedad de Kawasaki."],"c":4,"e":"La <b>granulomatosis con poliangitis</b> es una vasculitis de peque\u00f1o vaso <b>ANCA positiva (anti-PR3/c-ANCA)</b> con afectaci\u00f3n t\u00edpica de v\u00edas respiratorias altas, pulm\u00f3n (hemorragia alveolar) y ri\u00f1\u00f3n (glomerulonefritis)."}],"derma":[{"n":"9","noShuffle":false,"img":"img9","q":"Var\u00f3n de 18 a\u00f1os (agosto) con lesiones en las manos tras una fiesta de mojitos en la piscina, sin dolor y con leve prurito (ver imagen). \u00bfQu\u00e9 afirmaci\u00f3n sobre el diagn\u00f3stico es FALSA?","o":["Le preguntar\u00e1 si exprimi\u00f3 la lima de los mojitos.","Informar\u00e1 de evoluci\u00f3n favorable, aunque la hiperpigmentaci\u00f3n residual puede ser muy persistente.","La prevenci\u00f3n consiste en evitar el contacto y aplicar fotoprotecci\u00f3n.","El mecanismo m\u00e1s probable es una hipersensibilidad tipo IV mediada por linfocitos T."],"c":4,"e":"Es una <b>fitofotodermatitis</b> (lima + sol): reacci\u00f3n <b>fotot\u00f3xica</b> por furocumarinas, no inmunol\u00f3gica. Por eso es falso atribuirla a hipersensibilidad <b>tipo IV</b> (propia de la dermatitis fotoal\u00e9rgica). Deja hiperpigmentaci\u00f3n residual prolongada."},{"n":"17","noShuffle":false,"img":"img17","q":"Var\u00f3n de 67 a\u00f1os, exfumador del entorno rural, con lesi\u00f3n dolorosa en el labio inferior de mes y medio (ver imagen). \u00bfActitud m\u00e1s adecuada?","o":["Iniciar aciclovir oral supresor.","Iniciar imiquimod t\u00f3pico.","Tomar biopsia para descartar carcinoma invasivo de c\u00e9lulas escamosas del labio inferior.","Sospechar \u00falcera neurop\u00e1tica."],"c":3,"e":"Una lesi\u00f3n labial persistente en un anciano con queilitis act\u00ednica obliga a <b>biopsia</b> para descartar <b>carcinoma epidermoide</b> de labio inferior. No debe tratarse emp\u00edricamente como herpes ni demorar el diagn\u00f3stico."},{"n":"18","noShuffle":false,"img":"img18","q":"Mujer de 62 a\u00f1os, hipertensa y diab\u00e9tica, con dos \u00falceras muy dolorosas en la pierna de 6 meses sin respuesta a antibi\u00f3ticos (ver imagen). \u00bfActitud m\u00e1s adecuada?","o":["Biopsia para estudio microbiol\u00f3gico.","Cultivos seriados y desbridamiento quir\u00fargico.","Eco-Doppler venosa y compresi\u00f3n.","Biopsia para confirmaci\u00f3n y a continuaci\u00f3n prednisona oral (0,5\u20131,5 mg/kg/d\u00eda)."],"c":4,"e":"\u00dalceras muy dolorosas, de bordes viol\u00e1ceos socavados y progresivas pese a antibi\u00f3ticos, sugieren <b>pioderma gangrenoso</b>. Se realiza <b>biopsia</b> (para excluir otras causas) y se inicia <b>corticoterapia sist\u00e9mica</b>. El desbridamiento agresivo lo empeora por patergia."},{"n":"19","noShuffle":false,"img":"img19","q":"Var\u00f3n de 79 a\u00f1os con prurito intenso >6 meses, lesiones polimorfas urticariformes y excoriadas en abdomen y extremidades; biopsia con infiltrado eosinof\u00edlico subepid\u00e9rmico (ver imagen). \u00bfActitud adecuada?","o":["Aumentar antihistam\u00ednicos.","Iniciar prednisona oral 0,5\u20130,75 mg/kg/d\u00eda.","Iniciar ivermectina oral.","Suspender medicamentos e iniciar tratamiento parenteral."],"c":2,"e":"El cuadro corresponde a <b>penfigoide ampolloso</b> (anciano, prurito, lesiones urticariformes, eosin\u00f3filos en la uni\u00f3n dermo-epid\u00e9rmica). El tratamiento de la enfermedad moderada-extensa son los <b>corticoides</b> (prednisona 0,5\u20130,75 mg/kg/d\u00eda o t\u00f3picos potentes)."},{"n":"20","noShuffle":false,"img":"img20","q":"Mujer de 35 a\u00f1os con anticonceptivos orales, lesiones en dorso de manos y cuello tras ingreso por dolor abdominal sin diagn\u00f3stico, con fotosensibilidad y fragilidad cut\u00e1nea (ver imagen). \u00bfDiagn\u00f3stico probable?","o":["Porfiria aguda intermitente.","Porfiria variegata.","Porfiria cut\u00e1nea tarda.","D\u00e9ficit de ALA-deshidratasa."],"c":2,"e":"La combinaci\u00f3n de <b>crisis abdominales agudas</b> (cl\u00ednica neurovisceral) y <b>fotosensibilidad cut\u00e1nea ampollosa</b> define la <b>porfiria variegata</b>. La aguda intermitente no tiene cl\u00ednica cut\u00e1nea y la cut\u00e1nea tarda carece de crisis abdominales."},{"n":"21","noShuffle":false,"img":"img21","q":"Lactante de 8 meses con eritema del \u00e1rea del pa\u00f1al de 2 semanas, ya tratado con emolientes y barrera (ver imagen). \u00bfTratamiento m\u00e1s adecuado?","o":["Suspender cremas y aplicar corticoide de potencia media.","Mantener higiene, secado y ventilaci\u00f3n del \u00e1rea y aplicar antif\u00fangico t\u00f3pico (nistatina o imidazol).","Mantener higiene, secado riguroso y pasta al agua.","Corticoide combinado con antibi\u00f3tico y antif\u00fangico."],"c":2,"e":"La persistencia con lesiones sat\u00e9lite en pliegues indica <b>sobreinfecci\u00f3n por Candida</b>. El tratamiento son las medidas de barrera (secado, ventilaci\u00f3n, cambios frecuentes) junto a un <b>antif\u00fangico t\u00f3pico</b> (nistatina o imidazol\u00edcos)."}],"inf":[{"n":"35","noShuffle":false,"img":null,"q":"Mujer con sepsis biliar y disfunci\u00f3n multiorg\u00e1nica; hemocultivo con sensibilidad a meropenem (antibiograma con resistencia a cefalosporinas). \u00bfTratamiento adecuado?","o":["Mantener piperacilina-tazobactam.","A\u00f1adir un aminogluc\u00f3sido.","Suspender piperacilina-tazobactam e iniciar meropenem.","Iniciar ciprofloxacino."],"c":3,"e":"Ante un patr\u00f3n de resistencias compatible con <b>BLEE/AmpC</b> y sepsis grave, el tratamiento dirigido de elecci\u00f3n es un <b>carbapenem (meropenem)</b>, evitando piperacilina-tazobactam por riesgo de fracaso en infecci\u00f3n grave."},{"n":"36","noShuffle":false,"img":null,"q":"Mujer con neoplasia de mama y quimioterapia, ingresa en UCI con insuficiencia respiratoria; lavado broncoalveolar con Nocardia farcinica. \u00bfActitud correcta?","o":["Voriconazol + TMP-SMX.","TMP-SMX en monoterapia.","TMP-SMX + meropenem.","Trimetoprim-sulfametoxazol + imipenem + amikacina."],"c":4,"e":"La <b>nocardiosis grave o diseminada</b> en inmunodeprimido se trata con combinaci\u00f3n inicial: <b>TMP-SMX + un carbapenem (imipenem) + amikacina</b> hasta conocer sensibilidades. La monoterapia se reserva para formas leves localizadas."},{"n":"37","noShuffle":false,"img":null,"q":"Manejo inicial del shock s\u00e9ptico. \u00bfRespuesta CORRECTA?","o":["Esperar a terminar la reanimaci\u00f3n con fluidos antes de iniciar vasopresores.","La vasopresina es el primer vasopresor.","El objetivo es PAS >90 mmHg.","Si no hay acceso central, pueden iniciarse vasopresores por v\u00eda perif\u00e9rica."],"c":4,"e":"En el shock s\u00e9ptico no debe retrasarse la <b>noradrenalina</b> (primer vasopresor) por falta de v\u00eda central: puede iniciarse por <b>v\u00eda perif\u00e9rica</b>. El objetivo es PAM \u226565 mmHg."},{"n":"38","noShuffle":false,"img":null,"q":"Sobre el diagn\u00f3stico de la infecci\u00f3n por CMV, se\u00f1ale la respuesta INCORRECTA.","o":["La infecci\u00f3n primaria genera IgM que se negativiza en menos de 30 d\u00edas.","El cultivo produce efecto citop\u00e1tico en 7\u201328 d\u00edas.","La carga viral gu\u00eda el tratamiento anticipado.","La PCR en tiempo real es la t\u00e9cnica de elecci\u00f3n."],"c":1,"e":"La IgM frente a CMV puede persistir <b>varios meses</b>, no se negativiza en menos de 30 d\u00edas; ese enunciado es incorrecto. La PCR cuantitativa es la t\u00e9cnica de elecci\u00f3n y gu\u00eda el tratamiento anticipado en trasplantados."},{"n":"39","noShuffle":false,"img":null,"q":"En un paciente VIH, una PCR negativa del complejo M. tuberculosis NO excluye infecci\u00f3n por:","o":["M. bovis.","M. tuberculosis.","Mycobacterium kansasii.","M. africanum."],"c":3,"e":"La PCR del <b>complejo M. tuberculosis</b> detecta M. tuberculosis, M. bovis y M. africanum. <b>M. kansasii</b> es una micobacteria no tuberculosa fuera del complejo, por lo que una PCR negativa no la descarta."},{"n":"40","noShuffle":false,"img":null,"q":"\u00bfDuraci\u00f3n del tratamiento antif\u00fangico en una candidemia no complicada (sin endocarditis ni met\u00e1stasis, paciente asintom\u00e1tico)?","o":["Dos semanas tras el primer hemocultivo negativo.","Dos semanas tras el aislamiento.","Una semana tras el hemocultivo.","Tres semanas."],"c":1,"e":"En la candidemia no complicada se trata durante <b>2 semanas a partir del primer hemocultivo negativo</b> y la resoluci\u00f3n de s\u00edntomas, asegurando el aclaramiento del torrente sangu\u00edneo."}],"hemonc":[{"n":"15","noShuffle":false,"img":"img15","q":"Biopsia (imagen) de un paciente con una enfermedad sist\u00e9mica multiorg\u00e1nica, con atenci\u00f3n a la afectaci\u00f3n neurol\u00f3gica. \u00bfQu\u00e9 hallazgo es m\u00e1s probable?","o":["Hipotensi\u00f3n ortost\u00e1tica sin respuesta cronotr\u00f3pica adecuada.","Nistagmo horizontal.","Edema de papila.","Debilidad muscular proximal sin alteraciones sensitivas."],"c":1,"e":"El dep\u00f3sito amorfo eosin\u00f3filo (rojo Congo +) corresponde a <b>amiloidosis sist\u00e9mica</b>, que produce <b>neuropat\u00eda aut\u00f3noma</b>: hipotensi\u00f3n ortost\u00e1tica sin taquicardia compensadora. Tambi\u00e9n da polineuropat\u00eda sensitivomotora, no debilidad puramente motora."},{"n":"24","noShuffle":false,"img":"img24","q":"Var\u00f3n de 69 a\u00f1os con esplenomegalia, leucoeritroblastosis y trombocitosis previa; aspirado seco; biopsia con reticulina aumentada (imagen); JAK2 V617F y ASXL1 positivos. \u00bfDiagn\u00f3stico?","o":["Mielofibrosis post-trombocitemia esencial.","Aplasia medular.","Leucemia mielomonoc\u00edtica cr\u00f3nica.","Leucemia mieloide cr\u00f3nica."],"c":1,"e":"Trombocitosis previa que evoluciona a esplenomegalia, leucoeritroblastosis, <b>aspirado seco</b> y fibrosis reticul\u00ednica, con <b>JAK2 V617F</b> y mutaci\u00f3n de alto riesgo (ASXL1), define una <b>mielofibrosis</b> (post-trombocitemia esencial). La LMC se asocia a BCR-ABL."},{"n":"131","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l es la t\u00e9cnica de elecci\u00f3n para determinar la expresi\u00f3n de PD-L1 en una muestra tumoral?","o":["Secuenciaci\u00f3n masiva.","Inmunohistoqu\u00edmica.","Western blot.","Hibridaci\u00f3n in situ (FISH)."],"c":2,"e":"La expresi\u00f3n de <b>PD-L1</b> se determina mediante <b>inmunohistoqu\u00edmica</b>, que cuantifica la prote\u00edna en c\u00e9lulas tumorales/inmunes y gu\u00eda la indicaci\u00f3n de inmunoterapia."},{"n":"132","noShuffle":false,"img":null,"q":"Var\u00f3n de 63 a\u00f1os con c\u00e1ncer de pr\u00f3stata resistente a castraci\u00f3n y met\u00e1stasis \u00f3seas, en enzalutamida, con dolor lumbar reciente, incontinencia urinaria y d\u00e9ficit motor (3/5) en pierna izquierda. \u00bfMejor actitud?","o":["Resonancia magn\u00e9tica urgente.","Dexametasona 10 mg.","AINE y reevaluaci\u00f3n en 48 h.","Radiograf\u00eda simple de columna."],"c":1,"e":"Dolor lumbar, d\u00e9ficit motor y disfunci\u00f3n esfinteriana en un paciente con met\u00e1stasis \u00f3seas configuran una <b>compresi\u00f3n medular metast\u00e1sica</b>: urgencia que requiere <b>RM urgente</b> (junto a corticoides) para confirmar y tratar precozmente."},{"n":"133","noShuffle":false,"img":null,"q":"Var\u00f3n de 63 a\u00f1os con miastenia gravis y melanoma estadio IV de alta carga, BRAF V600E positivo. \u00bfTratamiento m\u00e1s razonable seg\u00fan riesgo-beneficio?","o":["Pembrolizumab.","Nivolumab.","Dabrafenib-trametinib.","Nivolumab + ipilimumab."],"c":3,"e":"En un paciente con <b>enfermedad autoinmune (miastenia)</b>, la inmunoterapia anti-PD1 puede desencadenar crisis graves; con <b>BRAF V600E</b> positivo, la <b>terapia dirigida dabrafenib-trametinib</b> ofrece respuesta r\u00e1pida evitando ese riesgo."},{"n":"138","noShuffle":false,"img":null,"q":"Var\u00f3n de 80 a\u00f1os preoperatorio: INR 1, TTPA alargado (47 s), agregaci\u00f3n con ristocetina ligeramente alterada y normal con col\u00e1geno/ADP, sin cl\u00ednica hemorr\u00e1gica. \u00bfCausa?","o":["Heterocigosis para hemofilia A.","Enfermedad de von Willebrand tipo I.","Anticoagulante l\u00fapico.","S\u00edndrome de Bernard-Soulier."],"c":2,"e":"TTPA alargado (por descenso del factor VIII) con <b>agregaci\u00f3n a la ristocetina alterada</b> y normal con otros agonistas es t\u00edpico de la <b>enfermedad de von Willebrand tipo 1</b>, con cl\u00ednica leve o ausente."},{"n":"143","noShuffle":false,"img":null,"q":"Var\u00f3n de 39 a\u00f1os con emisi\u00f3n recidivante de orina rojiza, dolor abdominal de repetici\u00f3n y ahora trombosis venosa mesent\u00e9rica. \u00bfDiagn\u00f3stico de sospecha?","o":["Hemoglobinuria parox\u00edstica nocturna.","S\u00edndrome antifosfol\u00edpido.","Coproporfiria eritropoy\u00e9tica.","Fiebre mediterr\u00e1nea familiar."],"c":1,"e":"La tr\u00edada de <b>hem\u00f3lisis intravascular</b> (orina oscura), <b>trombosis en territorios at\u00edpicos</b> (mesent\u00e9rica) y citopenias es t\u00edpica de la <b>hemoglobinuria parox\u00edstica nocturna</b>, por d\u00e9ficit de prote\u00ednas ancladas por GPI (CD55/CD59)."},{"n":"175","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 complicaci\u00f3n aguda es caracter\u00edstica del tratamiento con c\u00e9lulas CAR-T?","o":["S\u00edndrome de lisis tumoral exclusivamente.","S\u00edndrome de liberaci\u00f3n de citocinas.","Anemia hemol\u00edtica autoinmune.","Reacci\u00f3n injerto contra hu\u00e9sped."],"c":2,"e":"La toxicidad m\u00e1s caracter\u00edstica de las <b>c\u00e9lulas CAR-T</b> es el <b>s\u00edndrome de liberaci\u00f3n de citocinas</b> (fiebre, hipotensi\u00f3n, hipoxia), que se trata con tocilizumab (anti-IL6) y soporte; tambi\u00e9n puede aparecer neurotoxicidad (ICANS)."},{"n":"176","noShuffle":false,"img":null,"q":"En el estudio de la hemofilia A, \u00bfqu\u00e9 prueba diferencia un d\u00e9ficit de factor de la presencia de un inhibidor?","o":["Tiempo de protrombina.","Test de mezclas (correcci\u00f3n del TTPA con plasma normal).","Tiempo de hemorragia.","Recuento plaquetario."],"c":1,"e":"El <b>test de mezclas</b> distingue: si el TTPA alargado <b>se corrige</b> al a\u00f1adir plasma normal, hay d\u00e9ficit de factor; si <b>no se corrige</b>, existe un inhibidor (anticuerpo) frente al factor."},{"n":"177","noShuffle":false,"img":null,"q":"Reci\u00e9n nacido con ictericia grave precoz e incompatibilidad Rh; bilirrubina en ascenso r\u00e1pido pese a fototerapia intensiva. \u00bfTratamiento m\u00e1s adecuado?","o":["Continuar solo fototerapia.","Inmunoglobulina intramuscular anti-D.","Hidrataci\u00f3n y observaci\u00f3n.","Exanguinotransfusi\u00f3n."],"c":4,"e":"En la enfermedad hemol\u00edtica del reci\u00e9n nacido con hiperbilirrubinemia grave y ascenso r\u00e1pido pese a fototerapia intensiva, est\u00e1 indicada la <b>exanguinotransfusi\u00f3n</b> para prevenir el kern\u00edcterus, retirando bilirrubina y anticuerpos."},{"n":"178","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 alteraci\u00f3n de laboratorio es t\u00edpica de la anemia ferrop\u00e9nica?","o":["Ferritina alta y transferrina baja.","Microcitosis con ferritina baja y aumento de la capacidad total de fijaci\u00f3n del hierro.","Macrocitosis con LDH elevada.","Reticulocitosis intensa."],"c":4,"e":"La anemia ferrop\u00e9nica es <b>microc\u00edtica e hipocroma</b>, con <b>ferritina baja</b> (dep\u00f3sitos vac\u00edos), hierro s\u00e9rico bajo y <b>aumento de la transferrina/capacidad total de fijaci\u00f3n del hierro</b>."},{"n":"206","noShuffle":false,"img":null,"q":"Var\u00f3n con adenocarcinoma de recto confirmado por biopsia. \u00bfQu\u00e9 prueba es de elecci\u00f3n para la estadificaci\u00f3n locorregional (T y N) y la planificaci\u00f3n del tratamiento?","o":["TC abdominop\u00e9lvica con contraste.","Ecograf\u00eda abdominal.","Resonancia magn\u00e9tica p\u00e9lvica.","Radiograf\u00eda de t\u00f3rax."],"c":3,"e":"La <b>resonancia magn\u00e9tica p\u00e9lvica</b> es la prueba de elecci\u00f3n para la estadificaci\u00f3n locorregional del c\u00e1ncer de recto (afectaci\u00f3n de la fascia mesorrectal, T y N), clave para decidir la neoadyuvancia. La TC valora la enfermedad a distancia."}],"cot":[{"n":"1","noShuffle":false,"img":"img1","q":"Adolescente de 17 a\u00f1os con dolor de rodilla de tres meses, antecedente de traumatismo leve y esta radiograf\u00eda. \u00bfQu\u00e9 entidad debe considerarse en el diagn\u00f3stico diferencial seg\u00fan la cl\u00ednica y la imagen?","o":["Osteosarcoma.","Osteomielitis subaguda.","Osteocondritis disecante.","Tumor de c\u00e9lulas gigantes."],"c":1,"e":"En un adolescente con dolor persistente y lesi\u00f3n metafisaria agresiva alrededor de la rodilla, el <b>osteosarcoma</b> es la prioridad: tumor \u00f3seo maligno primario m\u00e1s frecuente a esta edad, con localizaci\u00f3n t\u00edpica en la metafisis distal del f\u00e9mur."},{"n":"2","noShuffle":false,"img":"img2","q":"\u00bfQu\u00e9 hallazgo radiogr\u00e1fico es m\u00e1s \u00fatil para diferenciar el osteosarcoma de otras causas de dolor cr\u00f3nico de rodilla en adolescentes?","o":["Lesi\u00f3n l\u00edtica de bordes bien definidos y sin reacci\u00f3n periostal.","Lesi\u00f3n mixta l\u00edtico-escler\u00f3tica con reacci\u00f3n periostal tipo tri\u00e1ngulo de Codman.","Lesi\u00f3n subcondral con colapso de la placa \u00f3sea.","Calcificaciones puntiformes sin masa de partes blandas."],"c":2,"e":"El osteosarcoma muestra patr\u00f3n <b>mixto l\u00edtico-escler\u00f3tico</b> con reacci\u00f3n periostal interrumpida (<b>tri\u00e1ngulo de Codman</b>) y masa de partes blandas. Los bordes bien definidos sugieren benignidad; el colapso subcondral, osteocondritis."},{"n":"89","noShuffle":false,"img":null,"q":"Corredor de 33 a\u00f1os con dolor en cara externa de la rodilla, que aumenta al subir/bajar escaleras y a la palpaci\u00f3n del epic\u00f3ndilo externo. \u00bfSospecha diagn\u00f3stica?","o":["S\u00edndrome de Osgood-Schlatter.","S\u00edndrome de la cintilla iliotibial.","Enfermedad de Sever.","Trocanteritis."],"c":2,"e":"El dolor en la cara externa de la rodilla en corredores, sobre el c\u00f3ndilo femoral externo, es t\u00edpico del <b>s\u00edndrome de la cintilla iliotibial</b> (\u201crodilla del corredor\u201d) por fricci\u00f3n de la banda iliotibial."},{"n":"90","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes es una red flag en la anamnesis y exploraci\u00f3n de una lumbalgia?","o":["Dolor lumbar de patr\u00f3n mec\u00e1nico.","Dolor a la palpaci\u00f3n de espinosas.","Antecedente personal de proceso neopl\u00e1sico.","Paciente de 45 a\u00f1os."],"c":3,"e":"El <b>antecedente de neoplasia</b> es una se\u00f1al de alarma en la lumbalgia (riesgo de met\u00e1stasis vertebral) que obliga a estudio. El dolor mec\u00e1nico y la edad de 45 a\u00f1os son hallazgos banales."},{"n":"91","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de estas lesiones traum\u00e1ticas precisa un tratamiento m\u00e1s precoz para evitar complicaciones locales?","o":["Luxaci\u00f3n traum\u00e1tica posterior de cadera.","Fractura desplazada del cuello femoral del anciano.","Fractura trocant\u00e9rica del anciano.","Fractura de cotilo."],"c":1,"e":"La <b>luxaci\u00f3n posterior de cadera</b> es una urgencia: la reducci\u00f3n debe ser <b>inmediata</b> para evitar la necrosis avascular de la cabeza femoral, cuyo riesgo aumenta con el tiempo de luxaci\u00f3n."},{"n":"92","noShuffle":false,"img":null,"q":"La fractura de Monteggia consiste en:","o":["Fractura de cabeza radial con rotura de la membrana inter\u00f3sea.","Fractura de cabeza radial con luxaci\u00f3n radiocubital distal.","Fractura de c\u00fabito proximal con luxaci\u00f3n de la cabeza del radio.","Fractura de radio distal con luxaci\u00f3n radiocubital distal."],"c":3,"e":"La <b>fractura de Monteggia</b> asocia fractura del <b>c\u00fabito proximal</b> con <b>luxaci\u00f3n de la cabeza del radio</b>. (La de Galeazzi es fractura de radio distal con luxaci\u00f3n radiocubital distal.)"}],"urol":[{"n":"84","noShuffle":false,"img":null,"q":"El s\u00edndrome de Stauffer es un s\u00edndrome paraneopl\u00e1sico caracter\u00edstico de:","o":["C\u00e1ncer de ri\u00f1\u00f3n.","C\u00e1ncer de pr\u00f3stata.","C\u00e1ncer de test\u00edculo.","C\u00e1ncer vesical."],"c":1,"e":"El <b>s\u00edndrome de Stauffer</b> es una disfunci\u00f3n hep\u00e1tica colest\u00e1sica reversible sin met\u00e1stasis hep\u00e1ticas, paraneopl\u00e1sica del <b>carcinoma renal</b>."},{"n":"85","noShuffle":false,"img":null,"q":"Var\u00f3n de 57 a\u00f1os con PSA 15, tacto p\u00e9treo, adenocarcinoma de pr\u00f3stata Gleason 9 y met\u00e1stasis \u00f3seas (>8) y hep\u00e1ticas. \u00bfTratamiento de elecci\u00f3n?","o":["Prostatectom\u00eda radical con linfadenectom\u00eda y resecci\u00f3n de met\u00e1stasis.","Radioterapia p\u00e9lvica y estereot\u00e1ctica de met\u00e1stasis.","Braquiterapia de alta tasa.","Bloqueo androg\u00e9nico (an\u00e1logos LHRH) + enzalutamida + docetaxel."],"c":4,"e":"En el c\u00e1ncer de pr\u00f3stata <b>metast\u00e1sico de alto volumen</b>, el tratamiento es sist\u00e9mico: <b>deprivaci\u00f3n androg\u00e9nica</b> intensificada con un nuevo antiandr\u00f3geno (enzalutamida) y/o <b>docetaxel</b>. La cirug\u00eda o radioterapia radical local no son la opci\u00f3n en enfermedad diseminada."},{"n":"86","noShuffle":false,"img":null,"q":"Indique la afirmaci\u00f3n correcta sobre la cistectom\u00eda radical.","o":["Incluye ex\u00e9resis de vejiga, pr\u00f3stata (en el var\u00f3n) y ganglios ilioobturadores.","Su morbimortalidad es muy baja frente a procedimientos endosc\u00f3picos.","La derivaci\u00f3n urinaria se realiza a los 5 d\u00edas.","Es el tratamiento de elecci\u00f3n del c\u00e1ncer vesical no m\u00fasculo-invasivo de alto grado."],"c":1,"e":"La <b>cistectom\u00eda radical</b> en el var\u00f3n extirpa vejiga, <b>pr\u00f3stata y ves\u00edculas seminales</b>, m\u00e1s linfadenectom\u00eda ilioobturadora, con reconstrucci\u00f3n urinaria en el mismo acto. Es una cirug\u00eda de elevada morbilidad, indicada en el c\u00e1ncer m\u00fasculo-invasivo."},{"n":"87","noShuffle":false,"img":null,"q":"Mujer de 61 a\u00f1os con vejiga hiperactiva sin respuesta a uroterapia, anticolin\u00e9rgicos a dosis m\u00e1ximas ni a la doble terapia con agonista beta-3. \u00bfPlan ahora?","o":["Retirar anticolin\u00e9rgicos y a\u00f1adir agonista beta-3 a dosis m\u00e1ximas.","Inyecci\u00f3n de toxina botul\u00ednica intradetrusor.","Cateterismos intermitentes.","Enterocistoplastia de aumento."],"c":2,"e":"Tras el fracaso del tratamiento conservador y farmacol\u00f3gico de la <b>vejiga hiperactiva</b> refractaria, el siguiente escal\u00f3n es la <b>toxina botul\u00ednica intradetrusor</b> (o la neuromodulaci\u00f3n), reservando la cirug\u00eda de aumento para casos extremos."},{"n":"88","noShuffle":false,"img":null,"q":"Mujer fumadora de 68 a\u00f1os, trabajadora del caucho, con polaquiuria, disuria y hematuria; urocultivo y ecograf\u00eda normales. Indique la afirmaci\u00f3n correcta.","o":["Probable vejiga hiperactiva; soli  prednisona 5\u20137 d\u00edas, glucocorticoide inhalado + LABA, plan escrito y revisi\u00f3n.","Crisis moderada: SABA con ipratropio nebulizado y O2; alta con ICS + LABA, prednisona y plan.","Crisis moderada: a\u00f1adir amoxicilina.","Crisis moderada: traslado hospitalario en ambulancia."],"c":1,"e":"Constantes normales y habla conservada definen una <b>crisis asm\u00e1tica leve</b>. El tratamiento es <b>SABA con c\u00e1mara</b> repetido y, si mejora, alta con <b>corticoide oral corto + ICS/LABA</b>, plan de acci\u00f3n escrito y revisi\u00f3n. No precisa antibi\u00f3tico ni traslado."},{"n":"109","noShuffle":false,"img":null,"q":"Sobre la atenci\u00f3n al anciano en Atenci\u00f3n Primaria, elija la respuesta INCORRECTA.","o":["La prescripci\u00f3n en cascada ocurre al tratar con un f\u00e1rmaco los s\u00edntomas causados por otro, sin reconocerlos como reacci\u00f3n adversa.","La vejez es diversa y sus cambios dependen de factores gen\u00e9ticos, ambientales y socioecon\u00f3micos.","La escala FRAIL eval\u00faa cinco dominios: fatiga, resistencia, incapacidad para bajar escaleras, deambulaci\u00f3n y aumento de peso.","La fragilidad puede detectarse con el test de la marcha o el timed up-and-go."],"c":3,"e":"La escala FRAIL valora fatiga, resistencia (subir escaleras), deambulaci\u00f3n, comorbilidad y <b>p\u00e9rdida de peso</b>, no la incapacidad para bajar escaleras ni el aumento de peso; ese enunciado es incorrecto."},{"n":"110","noShuffle":false,"img":null,"q":"Para calcular el riesgo cardiovascular con SCORE2 (Europa de bajo riesgo/Espa\u00f1a), \u00bfqu\u00e9 variables se necesitan?","o":["Edad, sexo, tabaco, PAS, colesterol total y LDL.","Edad, sexo, tabaco, PAS, colesterol total y lipoprote\u00edna A.","Edad, sexo, tabaco, PAS, colesterol total y colesterol HDL.","Edad, sexo, tabaco, PAS, colesterol total, lipoprote\u00edna A y triglic\u00e9ridos."],"c":3,"e":"El <b>SCORE2</b> utiliza edad, sexo, tabaquismo, presi\u00f3n arterial sist\u00f3lica y <b>colesterol no-HDL</b> (colesterol total y HDL), estimando el riesgo a 10 a\u00f1os de eventos cardiovasculares fatales y no fatales."},{"n":"111","noShuffle":false,"img":null,"q":"Var\u00f3n de 21 a\u00f1os con tos y odinofagia de 48 h, exudado amigdalar, fiebre 38,3 \u00baC y adenopat\u00eda cervical dolorosa. \u00bfRespuesta correcta?","o":["Cuatro criterios de Centor: test r\u00e1pido e iniciar amoxicilina.","Tres criterios de Centor: test r\u00e1pido y, si es positivo, amoxicilina.","Cuadro t\u00edpico de faringitis; sin test, iniciar amoxicilina.","Dos criterios de Centor: test r\u00e1pido y, si es positivo, azitromicina."],"c":2,"e":"Presenta exudado, adenopat\u00eda y fiebre, pero la <b>tos resta</b> (sugiere viral): <b>3 criterios de Centor</b>. La conducta es <b>test r\u00e1pido de estreptococo</b> y, solo si es positivo, antibi\u00f3tico (amoxicilina, no azitromicina de entrada)."},{"n":"112","noShuffle":false,"img":null,"q":"En el tratamiento de la diabetes, \u00bfqu\u00e9 afirmaci\u00f3n es INCORRECTA?","o":["La metformina puede bajar la vitamina B12 y debe suspenderse con filtrado <30 ml/min.","Los iSGLT2 reducen peso y frenan la progresi\u00f3n de la enfermedad renal y la albuminuria.","Los iDPP4 bajan la HbA1c 0,6\u20130,9%, son neutros en peso pero mal tolerados y desaconsejados en ancianos.","La tirzepatida ha demostrado p\u00e9rdida de peso importante y beneficio en la esteatohepatitis (MASH)."],"c":3,"e":"Es FALSO: los <b>iDPP4</b> son f\u00e1rmacos <b>bien tolerados y seguros</b>, especialmente \u00fatiles en ancianos por su bajo riesgo de hipoglucemia, aunque su potencia hipoglucemiante es modesta."},{"n":"113","noShuffle":false,"img":null,"q":"Antonia acude para solicitar la ley de dependencia. \u00bfQu\u00e9 escalas b\u00e1sicas debe usar el m\u00e9dico de familia para valorar el \u00e1rea cognitiva y las actividades b\u00e1sicas de la vida diaria?","o":["Test de Zarit y Apgar familiar.","Escala de Goldberg y Rosemberg.","Escala de Barthel y test de Pfeiffer.","Escala de Norton y escala de Gij\u00f3n."],"c":3,"e":"El <b>\u00edndice de Barthel</b> valora las actividades b\u00e1sicas de la vida diaria y el <b>test de Pfeiffer</b> el deterioro cognitivo. (Zarit mide sobrecarga del cuidador; Norton, riesgo de \u00falceras; Gij\u00f3n, riesgo social.)"},{"n":"114","noShuffle":false,"img":null,"q":"Fidel, con EPOC, triple terapia, un ingreso por agudizaci\u00f3n el \u00faltimo a\u00f1o, disnea mMRC 2 y eosinofilia >300/mm3, ha suspendido los corticoides inhalados. \u00bfQu\u00e9 proponer?","o":["GOLD E; no necesita corticoides inhalados.","Riesgo alto, no agudizador eosinof\u00edlico; retirar corticoide inhalado.","Riesgo alto; retirar corticoide inhalado y poner doble broncodilataci\u00f3n.","Riesgo alto agudizador eosinof\u00edlico; debe mantener la triple terapia."],"c":4,"e":"Un paciente <b>agudizador con eosinofilia \u2265300/mm3</b> se beneficia del corticoide inhalado; por tanto debe <b>mantener la triple terapia</b> (LABA/LAMA/ICS) y explic\u00e1rsele la importancia de no suspenderla."},{"n":"205","noShuffle":false,"img":null,"q":"Respecto a la participaci\u00f3n comunitaria en Atenci\u00f3n Primaria, \u00bfcu\u00e1l es la afirmaci\u00f3n correcta?","o":["Consiste \u00fanicamente en informar a la poblaci\u00f3n de los servicios disponibles.","Implica la intervenci\u00f3n activa de la comunidad en la identificaci\u00f3n de problemas y en la toma de decisiones sobre su salud.","Es competencia exclusiva de la administraci\u00f3n sanitaria.","Se limita a las asociaciones de pacientes cr\u00f3nicos."],"c":2,"e":"La <b>participaci\u00f3n comunitaria</b> supone que la poblaci\u00f3n interviene <b>activamente</b> en la identificaci\u00f3n de sus problemas de salud, en la priorizaci\u00f3n y en la toma de decisiones, principio b\u00e1sico de la Atenci\u00f3n Primaria de salud (Alma-Ata)."}],"prev":[{"n":"26","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes NO es uno de los cinco momentos de la higiene de manos de la OMS?","o":["Antes del contacto con el entorno del paciente.","Antes de tocar al paciente.","Despu\u00e9s de tocar al paciente.","Despu\u00e9s del contacto con el entorno del paciente."],"c":1,"e":"Los cinco momentos OMS son: antes de tocar al paciente, antes de una t\u00e9cnica asept\u00e9ptica, tras riesgo de exposici\u00f3n a fluidos, tras tocar al paciente y tras el contacto con su entorno. <b>\u201cAntes del contacto con el entorno\u201d no existe</b> como momento."},{"n":"27","noShuffle":false,"img":null,"q":"En relaci\u00f3n con el sobrediagn\u00f3stico, se\u00f1ale la afirmaci\u00f3n INCORRECTA.","o":["Es un efecto indeseado de los cribados poblacionales.","Se debe principalmente a falsos positivos en pruebas diagn\u00f3sticas.","Una de sus consecuencias es el sobretratamiento.","Su reducci\u00f3n es objetivo de la prevenci\u00f3n cuaternaria."],"c":2,"e":"El <b>sobrediagn\u00f3stico</b> es la detecci\u00f3n de enfermedad <b>real pero que nunca habr\u00eda dado s\u00edntomas</b>, no un falso positivo. Conlleva sobretratamiento y su prevenci\u00f3n es objetivo de la prevenci\u00f3n cuaternaria."},{"n":"28","noShuffle":false,"img":null,"q":"Evento que ha derivado en muerte o p\u00e9rdida permanente e importante de funci\u00f3n, imprevisto y no ligado a la evoluci\u00f3n natural de la enfermedad. \u00bfC\u00f3mo se denomina?","o":["Cuasi-incidente.","Factor contribuyente.","Infracci\u00f3n.","Evento centinela."],"c":4,"e":"Se trata de un <b>evento centinela</b>: incidente grave e inesperado con da\u00f1o permanente o muerte, que obliga a investigaci\u00f3n inmediata. El cuasi-incidente no llega a alcanzar al paciente."},{"n":"29","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 sesgo se comete al asumir que una asociaci\u00f3n observada a nivel poblacional existe tambi\u00e9n a nivel individual?","o":["Sesgo o falacia ecol\u00f3gica.","Sesgo de atenci\u00f3n o efecto Hawthorne.","Falacia de Neyman.","Sesgo de regresi\u00f3n a la media."],"c":1,"e":"La <b>falacia ecol\u00f3gica</b> consiste en extrapolar a individuos asociaciones medidas en grupos o poblaciones, error t\u00edpico de los estudios ecol\u00f3gicos."},{"n":"30","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l NO se considera infecci\u00f3n relacionada con la asistencia sanitaria?","o":["C. difficile con inicio tras 48 h de ingreso.","Infecci\u00f3n de localizaci\u00f3n quir\u00fargica a los 25 d\u00edas.","ITU a las 72 h de un sondaje colocado en urgencias.","Neumon\u00eda con inicio de s\u00edntomas a las 24 h del ingreso."],"c":4,"e":"Una infecci\u00f3n se considera nosocomial si aparece tras <b>>48 h</b> del ingreso o ligada a un procedimiento. La <b>neumon\u00eda a las 24 h</b> estaba incub\u00e1ndose al ingreso y se considera comunitaria."},{"n":"31","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l NO se considera grupo de riesgo para la vacuna frente al virus de la hepatitis A?","o":["VIH.","Candidatos a trasplante hep\u00e1tico.","Asplenia anat\u00f3mica o disfunci\u00f3n espl\u00e9nica grave.","Enfermedad hep\u00e1tica cr\u00f3nica."],"c":3,"e":"La vacuna VHA se indica en hepatopat\u00eda cr\u00f3nica, candidatos a trasplante hep\u00e1tico, VIH y otros grupos. La <b>asplenia</b> indica vacunas frente a bacterias capsuladas (neumococo, meningococo, Hib), no del VHA."},{"n":"32","noShuffle":false,"img":null,"q":"Seg\u00fan el modelo de Donabedian, \u00bfcu\u00e1l es un indicador de RESULTADO?","o":["Ratio de camas hospitalarias.","Proporci\u00f3n de partos por ces\u00e1rea.","Incidencia de infecciones relacionadas con la asistencia sanitaria.","Ratio de personal m\u00e9dico."],"c":3,"e":"Los indicadores de resultado miden el efecto en la salud del paciente. La <b>incidencia de infecciones nosocomiales</b> es un resultado; camas y personal son estructura, y la proporci\u00f3n de ces\u00e1reas es proceso."},{"n":"33","noShuffle":false,"img":null,"q":"Se\u00f1ale el enunciado INCORRECTO.","o":["La incidencia acumulada depende de la duraci\u00f3n del periodo de medici\u00f3n.","La incidencia acumulada es buena aproximaci\u00f3n cuando la tasa es alta o el periodo largo.","La tasa de incidencia requiere unidad de tiempo.","La prevalencia aumenta con mayor duraci\u00f3n de la enfermedad."],"c":2,"e":"La incidencia acumulada aproxima bien a la tasa cuando esta es <b>baja y el periodo corto</b>; con tasas altas o periodos largos se sobreestima por agotamiento de la poblaci\u00f3n en riesgo. El enunciado 2 invierte la condici\u00f3n."},{"n":"34","noShuffle":false,"img":null,"q":"\u00bfEn cu\u00e1l de estas enfermedades se indican precauciones exclusivamente por gotas?","o":["VRS.","Gripe.","Tuberculosis pulmonar activa.","Sarampi\u00f3n."],"c":2,"e":"La <b>gripe</b> requiere precauciones de gotas. La tuberculosis y el sarampi\u00f3n exigen aislamiento <b>a\u00e9reo</b> y el VRS, precauciones de contacto."}],"fyf":[{"n":"65","noShuffle":false,"img":null,"q":"Var\u00f3n con s\u00edndrome coronario cr\u00f3nico, sin comorbilidades. \u00bfQu\u00e9 f\u00e1rmaco de mantenimiento mejora la supervivencia y previene complicaciones graves?","o":["Nifedipino.","Acenocumarol.","\u00c1cido acetilsalic\u00edlico.","Enalapril."],"c":3,"e":"En el s\u00edndrome coronario cr\u00f3nico, la <b>antiagregaci\u00f3n con AAS</b> reduce los eventos cardiovasculares y mejora el pron\u00f3stico. El nifedipino es sintom\u00e1tico y el acenocumarol no est\u00e1 indicado de rutina en cardiopat\u00eda isqu\u00e9mica estable."},{"n":"66","noShuffle":false,"img":null,"q":"Seg\u00fan la normativa espa\u00f1ola, \u00bfen qu\u00e9 situaci\u00f3n debe estar un medicamento de \u201cprescripci\u00f3n m\u00e9dica restringida\u201d?","o":["Cuando no precisa intervenci\u00f3n de un facultativo.","Cuando contiene una sustancia homeop\u00e1tica.","Cuando se prescribe para una enfermedad cuyo diagn\u00f3stico debe realizarse en medio hospitalario.","Cuando puede generar abuso o dependencia."],"c":3,"e":"La <b>prescripci\u00f3n m\u00e9dica restringida</b> aplica a medicamentos de uso hospitalario, que requieren control especial o cuyo <b>diagn\u00f3stico o seguimiento debe hacerse en el hospital</b>. El riesgo de abuso/dependencia corresponde a los estupefacientes/psic\u00f3tropos."},{"n":"67","noShuffle":false,"img":null,"q":"Sobre el electrocardiograma normal, \u00bfafirmaci\u00f3n correcta?","o":["El QRS representa la repolarizaci\u00f3n ventricular.","La onda T indica la despolarizaci\u00f3n completa del ventr\u00edculo.","La onda P corresponde a la despolarizaci\u00f3n auricular previa a la contracci\u00f3n.","El electrodo en la base del coraz\u00f3n registra positividad durante la despolarizaci\u00f3n ventricular."],"c":3,"e":"La <b>onda P</b> traduce la <b>despolarizaci\u00f3n auricular</b> que precede a la contracci\u00f3n de las aur\u00edculas. El QRS es la despolarizaci\u00f3n ventricular y la onda T, su repolarizaci\u00f3n."},{"n":"68","noShuffle":false,"img":null,"q":"Sobre la regulaci\u00f3n intracelular del calcio, \u00bfafirmaci\u00f3n correcta?","o":["La concentraci\u00f3n citos\u00f3lica de calcio se mantiene baja por bombas ATPasa que lo transportan al ret\u00edculo endopl\u00e1smico.","El IP3 bloquea la liberaci\u00f3n de calcio del ret\u00edculo.","El calcio entra a la c\u00e9lula sobre todo por difusi\u00f3n pasiva.","El calcio intracelular no act\u00faa como segundo mensajero."],"c":1,"e":"El calcio citos\u00f3lico se mantiene muy bajo gracias a <b>bombas ATPasa (SERCA/PMCA)</b> que lo introducen en el ret\u00edculo o lo expulsan. El IP3 <b>libera</b> calcio del ret\u00edculo y el calcio es un segundo mensajero clave."},{"n":"69","noShuffle":false,"img":null,"q":"Sustancia nefrot\u00f3xica filtrada y reabsorbida pasivamente en el t\u00fabulo, con pKa = 5. \u00bfQu\u00e9 actuaci\u00f3n reduce su nefrotoxicidad?","o":["Acidificar la orina con cloruro am\u00f3nico para aumentar la fracci\u00f3n ionizada.","Alcalinizar la orina con bicarbonato s\u00f3dico para aumentar la fracci\u00f3n ionizada y acelerar la diuresis.","Acidificar la orina para reducir la fracci\u00f3n ionizada.","No actuar sobre el pH."],"c":2,"e":"Un \u00e1cido d\u00e9bil (pKa 5) se <b>ioniza al alcalinizar</b> la orina; la forma ionizada no se reabsorbe (atrapamiento i\u00f3nico) y se elimina m\u00e1s. <b>Alcalinizar con bicarbonato</b> aumenta su excreci\u00f3n y reduce la nefrotoxicidad."},{"n":"70","noShuffle":false,"img":null,"q":"Sobre el potencial de placa terminal en la uni\u00f3n neuromuscular, \u00bfafirmaci\u00f3n correcta?","o":["Su amplitud depende de la suma temporal de potenciales de acci\u00f3n.","Se origina por apertura de receptores nicot\u00ednicos de acetilcolina que permiten el flujo de Na+ y, en menor cantidad, de K+.","Se genera al activar canales de Ca2+ dependientes de voltaje.","Se propaga como un potencial de acci\u00f3n independiente."],"c":2,"e":"El potencial de placa terminal se genera al unirse la acetilcolina a los <b>receptores nicot\u00ednicos</b>, que abren un canal cati\u00f3nico con entrada predominante de <b>Na+</b> (y menor salida de K+). Es un potencial local graduado, no autopropagado."},{"n":"71","noShuffle":false,"img":null,"q":"Paciente con morfina oral 60 mg/d\u00eda por dolor oncol\u00f3gico mal controlado. Se sustituye por otro opioide de mayor potencia y afinidad por el receptor, pero menor actividad intr\u00ednseca. Al d\u00eda siguiente inicia la nueva medicaci\u00f3n. \u00bfEfecto esperado?","o":["Aumento del efecto analg\u00e9sico.","Desencadenamiento de un s\u00edndrome de abstinencia opioide.","Marcada dificultad respiratoria.","Ning\u00fan cambio apreciable."],"c":2,"e":"Un agonista parcial de gran afinidad pero baja actividad intr\u00ednseca (tipo buprenorfina) <b>desplaza</b> al agonista completo de los receptores ocupados; al ofrecer menos estimulaci\u00f3n, precipita un <b>s\u00edndrome de abstinencia</b> en un paciente dependiente de morfina."},{"n":"173","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l es la principal funci\u00f3n metab\u00f3lica del ciclo de la urea?","o":["Sintetizar glucosa a partir de amino\u00e1cidos.","Eliminar el amoniaco convirti\u00e9ndolo en urea en el h\u00edgado.","Producir cuerpos cet\u00f3nicos.","Sintetizar \u00e1cidos grasos."],"c":4,"e":"El ciclo de la urea, hep\u00e1tico, transforma el <b>amoniaco</b> (t\u00f3xico, procedente del catabolismo de amino\u00e1cidos) en <b>urea</b>, que se excreta por el ri\u00f1\u00f3n. Su fallo provoca hiperamoniemia y encefalopat\u00eda."}],"legal":[{"n":"72","noShuffle":false,"img":null,"q":"Sobre la emisi\u00f3n del parte de lesiones, \u00bfafirmaci\u00f3n correcta?","o":["Solo se emite si la v\u00edctima lo solicita.","Ante lesiones posiblemente derivadas de agresi\u00f3n, debe emitirse y remitirse al juzgado, incluso sin consentimiento de la v\u00edctima.","Solo es obligatorio si hay ingreso hospitalario.","Si la v\u00edctima niega la agresi\u00f3n, debe mantenerse el secreto y no emitirlo."],"c":2,"e":"El <b>parte de lesiones</b> es una obligaci\u00f3n legal del m\u00e9dico ante cualquier lesi\u00f3n que pueda derivar de un hecho delictivo y debe remitirse al juzgado <b>aunque la v\u00edctima no consienta</b>; constituye una excepci\u00f3n al secreto profesional."},{"n":"73","noShuffle":false,"img":null,"q":"Sobre la Ley Org\u00e1nica 3/2021 de regulaci\u00f3n de la eutanasia, \u00bfafirmaci\u00f3n correcta?","o":["Es necesario consentimiento por representaci\u00f3n para menores de 18 a\u00f1os.","La prestaci\u00f3n puede llevarse a cabo si est\u00e1 recogida por escrito en el documento de instrucciones previas.","El m\u00e9dico responsable decide el lugar del fallecimiento.","La ley no contempla la objeci\u00f3n de conciencia."],"c":2,"e":"La ley exige solicitud del propio paciente, pero si este pierde la capacidad, puede ejecutarse la prestaci\u00f3n si su voluntad consta por escrito en el <b>documento de instrucciones previas</b>. Reconoce la <b>objeci\u00f3n de conciencia</b> y se reserva a mayores de edad."},{"n":"74","noShuffle":false,"img":null,"q":"La deliberaci\u00f3n como proceso en situaciones cl\u00ednicas complejas se define como:","o":["Un m\u00e9todo de toma de decisiones prudentes en condiciones de incertidumbre.","Un procedimiento de negociaci\u00f3n para alcanzar un acuerdo entre partes.","La autorreflexi\u00f3n individual previa a la acci\u00f3n.","La intervenci\u00f3n de un mediador externo ante conflictos."],"c":1,"e":"La <b>deliberaci\u00f3n</b> (Diego Gracia) es un m\u00e9todo de an\u00e1lisis prudente de los problemas \u00e9ticos que, ponderando hechos, valores y deberes, busca la <b>decisi\u00f3n m\u00e1s razonable en condiciones de incertidumbre</b>, no una negociaci\u00f3n ni una mediaci\u00f3n."},{"n":"75","noShuffle":false,"img":null,"q":"Sobre la diferencia entre eutanasia y sedaci\u00f3n paliativa, \u00bfafirmaci\u00f3n correcta?","o":["La sedaci\u00f3n paliativa busca provocar la muerte para evitar el sufrimiento.","La eutanasia se realiza solo en agon\u00eda inminente.","La sedaci\u00f3n paliativa busca aliviar s\u00edntomas refractarios, aunque pueda acortar secundariamente la supervivencia.","En la eutanasia el alivio del sufrimiento es un efecto secundario no buscado."],"c":3,"e":"La <b>sedaci\u00f3n paliativa</b> tiene como fin <b>aliviar s\u00edntomas refractarios</b>, asumiendo que pueda acortar la vida (doctrina del doble efecto). La eutanasia busca intencionadamente la muerte; difieren en la intenci\u00f3n."},{"n":"200","noShuffle":false,"img":null,"q":"Ante una mujer que acude con lesiones y sospecha de violencia de g\u00e9nero, \u00bfcu\u00e1l es la actuaci\u00f3n correcta del m\u00e9dico?","o":["Mantener el secreto y no documentar nada.","Esperar a que ella interponga denuncia.","Atender, documentar las lesiones y emitir el parte de lesiones comunic\u00e1ndolo a la autoridad judicial.","Derivar \u00fanicamente a trabajo social sin m\u00e1s actuaciones."],"c":3,"e":"Ante sospecha de violencia de g\u00e9nero, el m\u00e9dico debe <b>atender, documentar minuciosamente las lesiones y emitir el parte de lesiones al juzgado</b>, adem\u00e1s de valorar el riesgo y activar los recursos de protecci\u00f3n y apoyo."}],"geri":[{"n":"125","noShuffle":false,"img":null,"q":"Mujer de 84 a\u00f1os con Alzheimer terminal, tres neumon\u00edas por aspiraci\u00f3n y rechazo de alimentos. La hija pide colocar una sonda para alimentarla. \u00bfActuaci\u00f3n m\u00e1s adecuada?","o":["Colocar gastrostom\u00eda y vigilar que no se la retire.","Iniciar nutrici\u00f3n parenteral perif\u00e9rica.","Explicar que la falta de apetito y de degluci\u00f3n es parte del proceso natural y ofrecer cuidados de confort.","Alimentaci\u00f3n con espesantes insistiendo a la paciente."],"c":3,"e":"En la demencia avanzada, la <b>nutrici\u00f3n por sonda no mejora supervivencia ni previene aspiraciones</b>; lo adecuado es informar a la familia y centrar la atenci\u00f3n en el <b>confort</b> y la alimentaci\u00f3n por placer."},{"n":"126","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes es un \u201challmark\u201d o marca del envejecimiento de tipo PRIMARIO?","o":["Desregulaci\u00f3n en la se\u00f1alizaci\u00f3n de nutrientes.","Acortamiento de los tel\u00f3meros.","Disfunci\u00f3n mitocondrial.","Agotamiento de c\u00e9lulas madre."],"c":2,"e":"Los hallmarks <b>primarios</b> son los da\u00f1os iniciales: inestabilidad gen\u00f3mica, <b>acortamiento de tel\u00f3meros</b>, alteraciones epigen\u00e9ticas y p\u00e9rdida de proteostasis. La se\u00f1alizaci\u00f3n de nutrientes y la disfunci\u00f3n mitocondrial son antagonistas, y el agotamiento de c\u00e9lulas madre, integrador."},{"n":"127","noShuffle":false,"img":null,"q":"\u00cdndice de Barthel de un paciente con incontinencia urinaria ocasional y supervisi\u00f3n f\u00edsica para deambular y subir escaleras, independiente para el resto. \u00bfPuntuaci\u00f3n?","o":["65.","75.","85.","95."],"c":3,"e":"Restan 5 puntos por incontinencia ocasional, 10 por necesitar supervisi\u00f3n al deambular y 5 al subir escaleras (20 puntos menos sobre 100): el <b>\u00edndice de Barthel es 85</b>, dependencia leve."},{"n":"128","noShuffle":false,"img":null,"q":"Paciente de 68 a\u00f1os con adenocarcinoma pancre\u00e1tico en \u00faltimos d\u00edas, agitaci\u00f3n y alucinaciones; recibe morfina, dexametasona y midazolam; ictericia, asterixis y amonio elevado. \u00bfMedida m\u00e1s adecuada?","o":["Aumentar dexametasona y a\u00f1adir midazolam.","Administrar haloperidol y valorar ajustar f\u00e1rmacos implicados (corticoides y morfina).","Iniciar lactulosa y rifaximina.","Sustituir morfina por buprenorfina sublingual."],"c":2,"e":"El cuadro es un <b>delirium</b> multifactorial (f\u00e1rmacos, fallo hep\u00e1tico). El tratamiento sintom\u00e1tico es el <b>haloperidol</b> y la revisi\u00f3n de f\u00e1rmacos desencadenantes (corticoides, opioides). El midazolam puede empeorar la agitaci\u00f3n."},{"n":"129","noShuffle":false,"img":null,"q":"Paciente con c\u00e1ncer de pulm\u00f3n y morfina oral 120 mg/12 h, dolor persistente (EVA 7), mioclon\u00edas, sue\u00f1os v\u00edvidos y confusi\u00f3n; filtrado glomerular 40. \u00bfEstrategia m\u00e1s adecuada?","o":["Subir morfina 25\u201350% y a\u00f1adir benzodiacepinas.","Reducir morfina a la mitad y a\u00f1adir un coadyuvante no opioide.","Rotar a fentanilo transd\u00e9rmico con dosis equianalg\u00e9sica reducida 30\u201350% por tolerancia cruzada incompleta.","Suspender el opioide y pasar a buprenorfina sublingual a dosis bajas."],"c":3,"e":"Las mioclon\u00edas y la neurotoxicidad por acumulaci\u00f3n de metabolitos de morfina en la insuficiencia renal indican <b>rotaci\u00f3n de opioide</b> a fentanilo (no renal), calculando la dosis equianalg\u00e9sica y <b>reduci\u00e9ndola un 30\u201350%</b> por tolerancia cruzada incompleta."},{"n":"130","noShuffle":false,"img":null,"q":"Var\u00f3n de 81 a\u00f1os con adenocarcinoma de pr\u00f3stata oligometast\u00e1sico (PSA 42, lesi\u00f3n sacra asintom\u00e1tica), ECOG 1, fragilidad leve y polifarmacia. Antes de decidir el tratamiento, \u00bfqu\u00e9 debe valorarse de forma prioritaria?","o":["El PSA y el n\u00famero de met\u00e1stasis.","Aplicar el tratamiento m\u00e1s agresivo disponible.","Comorbilidades, estado funcional y expectativa de vida.","La edad cronol\u00f3gica como criterio principal."],"c":3,"e":"En el anciano oncol\u00f3gico la decisi\u00f3n debe basarse en la <b>valoraci\u00f3n geri\u00e1trica integral</b>: comorbilidades, estado funcional y expectativa de vida, no en la edad cronol\u00f3gica ni solo en par\u00e1metros tumorales."},{"n":"134","noShuffle":false,"img":null,"q":"Paciente de 92 a\u00f1os; criterios de Fried: p\u00e9rdida de 2 kg en el a\u00f1o previo, fuerza prensora normal, sin baja resistencia, lentitud de la marcha y actividad f\u00edsica normal. \u00bfNivel de fragilidad?","o":["Robusto.","Pre-fr\u00e1gil.","Fr\u00e1gil.","Discapacitado."],"c":2,"e":"Cumple <b>un solo criterio de Fried</b> (lentitud de la marcha): la p\u00e9rdida de 2 kg no alcanza el umbral (\u22654,5 kg). Uno o dos criterios definen el estado <b>pre-fr\u00e1gil</b>; tres o m\u00e1s, fragilidad."},{"n":"207","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 valora la Short Physical Performance Battery (SPPB) en la evaluaci\u00f3n del anciano?","o":["Equilibrio, velocidad de la marcha y capacidad de levantarse de una silla.","Funci\u00f3n cognitiva global.","Riesgo nutricional.","Grado de dependencia para las actividades instrumentales."],"c":1,"e":"La <b>SPPB</b> es una bater\u00eda de rendimiento f\u00edsico que eval\u00faa <b>equilibrio, velocidad de la marcha y la prueba de levantarse de la silla</b>; puntuaciones bajas predicen fragilidad, discapacidad y mortalidad."}],"urg":[{"n":"25","noShuffle":false,"img":"img25","q":"Paciente de 56 a\u00f1os monitorizado en urgencias, inconsciente y sin respiraci\u00f3n; se inician compresiones 30:2 y el monitor muestra este ritmo. \u00bfSiguiente acci\u00f3n?","o":["Administrar adrenalina.","Administrar amiodarona.","Realizar una desfibrilaci\u00f3n.","Realizar una cardioversi\u00f3n el\u00e9ctrica."],"c":3,"e":"Ante una parada con ritmo <b>desfibrilable</b> (FV/TV sin pulso), la prioridad es la <b>desfibrilaci\u00f3n inmediata</b>. Adrenalina y amiodarona se a\u00f1aden despu\u00e9s; la cardioversi\u00f3n sincronizada se reserva para arritmias con pulso."},{"n":"196","noShuffle":false,"img":null,"q":"Paciente con intoxicaci\u00f3n por opioides, bradipnea y miosis puntiforme. \u00bfTratamiento de elecci\u00f3n?","o":["Naloxona.","Flumazenilo.","Atropina.","Carb\u00f3n activado en bolo \u00fanico."],"c":1,"e":"La depresi\u00f3n respiratoria con <b>miosis puntiforme</b> indica intoxicaci\u00f3n opioide; el ant\u00eddoto es la <b>naloxona</b>, antagonista competitivo que revierte la depresi\u00f3n respiratoria (vigilando la corta duraci\u00f3n y la posible reintoxicaci\u00f3n)."},{"n":"197","noShuffle":false,"img":null,"q":"Paciente con edema agudo de pulm\u00f3n cardiog\u00e9nico (TA 160/95, SatO2 89%). \u00bfQu\u00e9 medida NO est\u00e1 indicada de inicio seg\u00fan la plantilla oficial?","o":["Oxigenoterapia.","Nitroglicerina intravenosa.","Morfina intravenosa.","Diur\u00e9ticos intravenosos."],"c":1,"e":"En el edema agudo de pulm\u00f3n hipertensivo, los pilares iniciales son <b>vasodilatadores (nitroglicerina)</b>, <b>diur\u00e9ticos</b> y soporte ventilatorio. La oxigenoterapia sistem\u00e1tica se reserva para SatO2 <90%; seg\u00fan la plantilla oficial, se se\u00f1ala como la opci\u00f3n no indicada de inicio."},{"n":"198","noShuffle":false,"img":null,"q":"En la valoraci\u00f3n inicial del paciente politraumatizado, \u00bfqu\u00e9 prioridad sigue el esquema ABCDE?","o":["Control de hemorragias antes que la v\u00eda a\u00e9rea.","V\u00eda a\u00e9rea con control cervical como primer paso.","Exposici\u00f3n completa antes que la ventilaci\u00f3n.","Valoraci\u00f3n neurol\u00f3gica antes que la circulaci\u00f3n."],"c":2,"e":"El esquema <b>ABCDE</b> prioriza la <b>v\u00eda a\u00e9rea (A) con control de la columna cervical</b> como primer paso, seguida de ventilaci\u00f3n (B), circulaci\u00f3n y control de hemorragias (C), d\u00e9ficit neurol\u00f3gico (D) y exposici\u00f3n (E)."},{"n":"199","noShuffle":false,"img":null,"q":"Paciente con traumatismo facial grave y compromiso de la v\u00eda a\u00e9rea con imposibilidad de intubaci\u00f3n orotraqueal. \u00bfActuaci\u00f3n m\u00e1s adecuada?","o":["Insistir en la intubaci\u00f3n orotraqueal repetidamente.","V\u00eda a\u00e9rea quir\u00fargica (cricotirotom\u00eda).","Esperar a la llegada del anestesista.","Ventilaci\u00f3n con mascarilla indefinidamente."],"c":2,"e":"Ante una v\u00eda a\u00e9rea <b>no asegurable</b> (no se puede intubar ni ventilar) por trauma facial, la indicaci\u00f3n es una <b>v\u00eda a\u00e9rea quir\u00fargica urgente (cricotirotom\u00eda)</b> para garantizar la oxigenaci\u00f3n."}],"gen":[{"n":"6","noShuffle":false,"img":"img6","q":"Seg\u00fan los \u00e1rboles geneal\u00f3gicos de las familias A, B y C, se\u00f1ale la opci\u00f3n correcta sobre sus patrones de herencia.","o":["En la familia A, un afectado tiene 25% de riesgo de transmitir la enfermedad.","La familia B corresponde claramente a herencia mitocondrial.","La familia C podr\u00eda representar el patr\u00f3n de una hemofilia A.","En la familia A hay consanguinidad representada."],"c":3,"e":"Un patr\u00f3n con varones afectados, sin transmisi\u00f3n var\u00f3n-var\u00f3n y mujeres portadoras es t\u00edpico de herencia <b>recesiva ligada al X</b>, como la <b>hemofilia A</b> (familia C). La herencia mitocondrial es de transmisi\u00f3n exclusivamente materna a toda la descendencia."},{"n":"104","noShuffle":false,"img":null,"q":"Neonato grande para la edad gestacional con hemangioma facial, macroglosia y onfalocele que desarrolla hipoglucemias. \u00bfAfirmaci\u00f3n FALSA?","o":["Se plantea s\u00edndrome de Beckwith-Wiedemann.","Puede haber antecedente de reproducci\u00f3n asistida o polihidramnios prenatal.","La causa m\u00e1s frecuente es teratog\u00e9nica.","No suele conllevar discapacidad intelectual, salvo complicaciones."],"c":3,"e":"El cuadro es un <b>s\u00edndrome de Beckwith-Wiedemann</b>, de causa <b>gen\u00e9tica/epigen\u00e9tica</b> (alteraciones del imprinting en 11p15), no teratog\u00e9nica. Esa afirmaci\u00f3n es falsa."},{"n":"105","noShuffle":false,"img":null,"q":"Mujer con hijo de 14 a\u00f1os con discapacidad intelectual moderada-grave; Array-CGH y X fr\u00e1gil normales. Desea planificar otra gestaci\u00f3n. \u00bfAfirmaci\u00f3n correcta?","o":["No se sospecha causa gen\u00e9tica y el riesgo de recurrencia es m\u00ednimo.","Puede indicarse diagn\u00f3stico preimplantacional/prenatal espec\u00edfico.","Conviene reevaluar al hijo y considerar un estudio de secuenciaci\u00f3n masiva (exoma cl\u00ednico).","No deber\u00eda planificar m\u00e1s embarazos por alto riesgo."],"c":3,"e":"Ante discapacidad intelectual sin diagn\u00f3stico tras Array-CGH y X fr\u00e1gil normales, el siguiente paso es ampliar el estudio con <b>secuenciaci\u00f3n masiva (exoma cl\u00ednico)</b> para buscar la causa, requisito previo a cualquier diagn\u00f3stico prenatal espec\u00edfico."},{"n":"172","noShuffle":false,"img":null,"q":"En el s\u00edndrome de Beckwith-Wiedemann, \u00bfcu\u00e1l es el mecanismo molecular m\u00e1s frecuente?","o":["Mutaci\u00f3n puntual en un gen autos\u00f3mico recesivo.","Alteraci\u00f3n del imprinting en la regi\u00f3n 11p15.5.","Trisom\u00eda 21.","Expansi\u00f3n de tripletes CGG."],"c":2,"e":"El Beckwith-Wiedemann se debe a <b>alteraciones del imprinting (impronta gen\u00f3mica) en 11p15.5</b>, que afectan a la regulaci\u00f3n de IGF2/H19, con sobrecrecimiento y predisposici\u00f3n tumoral."}],"rhb":[{"n":"16","noShuffle":false,"img":"img16","q":"Mujer de 63 a\u00f1os tratada de c\u00e1ncer de endometrio (histerectom\u00eda, linfadenectom\u00eda, radioterapia), con signo de Stemmer positivo (ver imagen). \u00bfOpci\u00f3n correcta?","o":["Presenta linfangitis; amoxicilina-clavul\u00e1nico.","Tiene un lipedema.","Presenta un linfedema; prenda de presoterapia a medida y drenaje linf\u00e1tico manual.","Sospecha de TVP."],"c":3,"e":"El <b>signo de Stemmer positivo</b> tras linfadenectom\u00eda y radioterapia confirma <b>linfedema secundario</b>. El tratamiento es la terapia descongestiva compleja: <b>drenaje linf\u00e1tico manual y prendas de compresi\u00f3n</b> a medida."},{"n":"145","noShuffle":false,"img":null,"q":"Seg\u00fan el Real Decreto 888/2022, \u00bfa partir de qu\u00e9 grado se reconoce oficialmente la condici\u00f3n de persona con discapacidad en Espa\u00f1a?","o":["25%.","30%.","33%.","45%."],"c":3,"e":"En Espa\u00f1a se reconoce la condici\u00f3n de <b>persona con discapacidad a partir de un grado del 33%</b>, umbral que da acceso a las prestaciones y derechos asociados."},{"n":"146","noShuffle":false,"img":null,"q":"En la prescripci\u00f3n de ayudas para la marcha, \u00bfqu\u00e9 m\u00fasculo NO es prioritario en el control de la marcha asistida?","o":["Flexores de los dedos.","Extensores de mu\u00f1eca.","Pronador redondo.","Tr\u00edceps braquial."],"c":1,"e":"Para usar bastones o andadores son clave los <b>extensores de mu\u00f1eca, el pronador y el tr\u00edceps</b> (que estabilizan y empujan). Los <b>flexores de los dedos</b> tienen un papel menor en la propulsi\u00f3n de la marcha asistida."},{"n":"209","noShuffle":false,"img":null,"q":"Paciente con lesi\u00f3n medular y espasticidad que dificulta la higiene y provoca dolor. Tras medidas f\u00edsicas, \u00bfcu\u00e1l es el tratamiento farmacol\u00f3gico de primera l\u00ednea?","o":["Toxina botul\u00ednica en todos los m\u00fasculos.","Antiesp\u00e1sticos orales (baclofeno o tizanidina).","Bomba intratecal de baclofeno de inicio.","Cirug\u00eda de alargamiento tendinoso."],"c":2,"e":"En la espasticidad generalizada tras lesi\u00f3n medular, tras las medidas f\u00edsicas, el primer escal\u00f3n farmacol\u00f3gico s
