<!--
=============================================================
  MOTOR BANCO MIR — v10
  Novedades respecto a v9:
  - Numeración correlativa fija por sección (no se mezcla)
  - Badge neutro en pestaña "Todos" + mezcla real inter-secciones
  - Temporizador sticky editable en header (play/pausa/reset)
  - Buscador de texto en tiempo real
  - Modo repaso rápido (muestra RC + explicación directamente)
  - Estadísticas de errores recurrentes entre sesiones
=============================================================
-->
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">Banco MIR</title>
<style>
:root{
  --bg:#f4f3ef;--surf:#fff;--bd:#e5e5e5;--bd2:#ddd;
  --txt:#1a1a1a;--txt2:#555;--txt3:#999;--txt4:#666;
  --hdr:#1a1a1a;--hdr-t:#fff;
  --ok-bg:#e6f9ef;--ok-t:#0b6e52;--ok-bd:#2da060;
  --ko-bg:#fdecea;--ko-t:#b91c1c;--ko-bd:#d94f45;
  --sc-ok:#dcf5ed;--sc-ko:#fdecea;--sc-rem:#f0f0f0;--sc-rem-t:#666;
  --exp:#fffbe6;--exp-bd:#f0c04a;--exp-t:#5a4500;
  --prog:#e5e5e5;--prog-fill:#1a56db;
  --star:#ccc;--star-on:#f59e0b;
  --hint:#fafafa;--hint-bd:#eee;
  --tab-bd:#ddd;--tab-t:#555;
  --all-bg:#e8f0fe;--all-t:#1a56db;--all-bd:#1a56db;
  --fab:#1a1a1a;--fab-t:#fff;
  --nota-btn-t:#1a56db;--nota-btn-bd:#1a56db;--nota-btn-bg:var(--surf);
  --timer-bg:#222;--timer-t:#fff;--timer-danger:#ef4444;
}
[data-theme="dark"]{
  --bg:#0f0f1a;--surf:#1e1e30;--bd:#2a2a45;--bd2:#333355;
  --txt:#e8e8f0;--txt2:#aaa;--txt3:#555;--txt4:#888;
  --hdr:#0a0a14;--hdr-t:#e8e8f0;
  --ok-bg:#0b3020;--ok-t:#4ade80;--ok-bd:#166534;
  --ko-bg:#2d0a0a;--ko-t:#f87171;--ko-bd:#7f1d1d;
  --sc-ok:#0b3020;--sc-ko:#2d0a0a;--sc-rem:#252540;--sc-rem-t:#aaa;
  --exp:#1a1500;--exp-bd:#a37f10;--exp-t:#d4b84a;
  --prog:#2a2a45;--prog-fill:#60a5fa;
  --star:#444;--star-on:#f59e0b;
  --hint:#1a1a2e;--hint-bd:#2a2a45;
  --tab-bd:#2a2a45;--tab-t:#aaa;
  --all-bg:#1a2a4a;--all-t:#60a5fa;--all-bd:#3b82f6;
  --fab:#2a2a50;--fab-t:#e8e8f0;
  --nota-btn-t:#60a5fa;--nota-btn-bd:#3b82f6;--nota-btn-bg:var(--surf);
  --timer-bg:#1a1a2e;--timer-t:#e8e8f0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .25s,color .25s}

/* ── Header ── */
header{background:var(--hdr);color:var(--hdr-t);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
header h1{font-size:13.5px;font-weight:600;white-space:nowrap}
.hright{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hmeta{font-size:11px;color:#888}
.hbtn{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:3px 5px;border-radius:5px;transition:background .15s;color:var(--hdr-t)}
.hbtn:hover{background:rgba(255,255,255,.12)}
.sbadge{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:500}
.sbadge.ok{background:#15803d;color:#dcfce7}.sbadge.warn{background:#92400e;color:#fef3c7}

/* ── Temporizador ── */
#timer-wrap{display:flex;align-items:center;gap:4px;background:var(--timer-bg);border-radius:7px;padding:3px 8px;border:1px solid rgba(255,255,255,.1)}
#timer-display{font-size:13px;font-weight:700;font-family:monospace;color:var(--timer-t);min-width:58px;text-align:center;cursor:pointer;border-radius:3px;padding:1px 3px}
#timer-display:hover{background:rgba(255,255,255,.08)}
#timer-display.editing{background:rgba(255,255,255,.15);outline:none;color:var(--timer-t)}
#timer-display.danger{color:var(--timer-danger)}
#timer-wrap button{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:12px;padding:1px 3px;border-radius:3px;line-height:1}
#timer-wrap button:hover{background:rgba(255,255,255,.12);color:#fff}

/* ── Barra de progreso ── */
#prog-wrap{height:3px;background:var(--prog);position:sticky;top:40px;z-index:99}
#prog-bar{height:100%;background:var(--prog-fill);width:0%;transition:width .4s}

/* ── Contenedor ── */
.container{max-width:820px;margin:0 auto;padding:16px 12px}

/* ── Buscador ── */
.search-wrap{position:relative;margin-bottom:13px}
.search-wrap input{width:100%;padding:8px 34px 8px 12px;border:1.5px solid var(--bd2);border-radius:8px;font-size:13px;background:var(--surf);color:var(--txt);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--prog-fill)}
.search-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--txt3);font-size:16px;display:none;line-height:1}
#search-count{font-size:11px;color:var(--txt3);margin-top:4px;display:none}

/* ── Modo repaso ── */
.mode-bar{display:flex;gap:6px;margin-bottom:12px;align-items:center}
.mode-btn{padding:5px 12px;border:1.5px solid var(--bd2);border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;background:var(--surf);color:var(--txt2);transition:all .15s}
.mode-btn:hover{border-color:#999}
.mode-btn.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Tabs ── */
.tabs{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.tab{padding:7px 14px;border:1.5px solid var(--tab-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;background:var(--surf);color:var(--tab-t);transition:all .15s}
.tab:hover{border-color:#999;color:var(--txt)}
.tab.t-all.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Score global ── */
.ph-global{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 15px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-left:4px solid var(--prog-fill)}
.score-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.sc{font-size:12px;font-weight:600;padding:3px 9px;border-radius:6px}
.sc.ok{background:var(--sc-ok);color:var(--ok-t)}.sc.ko{background:var(--sc-ko);color:var(--ko-t)}.sc.rem{background:var(--sc-rem);color:var(--sc-rem-t)}

/* ── Acciones ── */
.global-actions{display:none;margin-bottom:10px;gap:7px;flex-wrap:wrap;align-items:center}
.container[data-tab="all"] .global-actions{display:flex}
.sec-actions{margin:6px 0 15px;display:flex;gap:7px;flex-wrap:wrap}
.reset-btn{padding:7px 14px;background:var(--fab);color:var(--fab-t);border:none;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:opacity .15s}
.reset-btn:hover{opacity:.82}
.nota-btn{padding:7px 14px;background:var(--nota-btn-bg);color:var(--nota-btn-t);border:1.5px solid var(--nota-btn-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:background .15s}
.nota-btn:hover{background:var(--all-bg)}

/* ── Nota box ── */
.nota-box,.global-nota-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:2px solid var(--bd2);font-size:13px;line-height:1.7;display:none}
.nota-box.pass,.global-nota-box.pass{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t)}
.nota-box.fail,.global-nota-box.fail{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t)}
.nota-score{font-size:26px;font-weight:700;display:block;margin-bottom:4px}
.nota-detail{font-size:12px;opacity:.85;font-family:monospace}

/* ── Vista revisión ── */
.review-list{margin-top:12px;border-top:1px solid var(--bd2);padding-top:10px}
.review-title{font-size:12px;font-weight:700;margin-bottom:9px;color:var(--txt)}
.review-sec-label{font-size:11.5px;font-weight:700;color:var(--txt3);margin:8px 0 5px;padding-top:6px;border-top:1px solid var(--bd)}
.review-item{background:var(--surf);border-radius:8px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden}
.review-item summary{padding:9px 12px;cursor:pointer;font-size:12.5px;color:var(--txt);list-style:none;display:flex;gap:8px;align-items:flex-start}
.review-item summary::-webkit-details-marker{display:none}
.review-item summary::before{content:'▶';font-size:9px;color:var(--txt3);flex-shrink:0;margin-top:4px;transition:transform .18s}
details[open] summary::before{transform:rotate(90deg)}
.review-body{padding:0 12px 11px}
.review-ans{font-size:12px;color:var(--ok-t);margin-bottom:7px;font-weight:500}

/* ── Estadísticas ── */
.stats-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--surf);display:none}
.stats-box.show{display:block}
.stats-title{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--txt)}
.stats-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12.5px}
.stats-item:last-child{border-bottom:none}
.stats-bar-wrap{flex:1;background:var(--sc-rem);border-radius:4px;height:6px;overflow:hidden}
.stats-bar{height:100%;background:var(--ko-bd);border-radius:4px;transition:width .4s}
.stats-n{font-size:11px;color:var(--txt3);white-space:nowrap}
.stats-q{flex:2;color:var(--txt);font-size:12px;line-height:1.3}

/* ── Panel secciones ── */
.sec-panel{display:none}.sec-panel.visible{display:block}
.ph{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ph-left{flex:1;display:flex;flex-direction:column;gap:5px}
.ph-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:1px}
.ph-desc{font-size:12px;color:var(--txt4)}
.fbtn{padding:6px 12px;font-size:12px;font-weight:500;border:1.5px solid var(--bd2);border-radius:8px;cursor:pointer;background:var(--surf);color:var(--txt2);transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:#999;color:var(--txt)}.fbtn.on{background:var(--ko-bg);color:#b91c1c;border-color:#f87171}
.no-failed{display:none;text-align:center;padding:16px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin-top:4px}
.no-failed.show{display:block}
.no-results{display:none;text-align:center;padding:20px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin:8px 0}

/* ── Hint ── */
.hint{font-size:11px;color:var(--txt3);margin-bottom:15px;padding:7px 11px;background:var(--hint);border-radius:6px;border:1px solid var(--hint-bd)}

/* ── Tarjeta ── */
.qcard{background:var(--surf);border-radius:10px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden;transition:box-shadow .15s}
.qcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.qcard.kb-focus{outline:2px solid var(--prog-fill);outline-offset:-2px}
.qcard.search-hidden{display:none}
.qhead{padding:11px 13px;cursor:pointer;display:flex;align-items:flex-start;gap:9px}

/* ── Badge numérico ── */
.qnum{font-size:11px;font-weight:700;padding:3px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;background:var(--sc-rem);color:var(--sc-rem-t)}
/* En pestaña "Todos" siempre neutro; en sección aplica color de sección */
.qnum.sec-colored{background:var(--sec-dim);color:var(--sec-col)}

.qtxt{font-size:13px;line-height:1.5;flex:1}
.star-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--star);padding:0 2px;flex-shrink:0;margin-top:2px;line-height:1;transition:color .15s,transform .15s}
.star-btn:hover{transform:scale(1.2)}
.star-btn .si{display:inline}.star-btn .sf{display:none}
.star-btn.on .si{display:none}.star-btn.on .sf{display:inline;color:var(--star-on)}
.chev{font-size:15px;color:var(--bd2);flex-shrink:0;margin-top:2px;transition:transform .2s}
.qhead.open .chev{transform:rotate(180deg)}
.qbody{display:none;padding:0 13px 13px}.qbody.open{display:block}

/* ── Imagen ── */
.clinimg-wrap{margin:9px 0 7px;background:#111;border-radius:8px;overflow:hidden;border:1px solid var(--bd2);text-align:center}
.clinimg{max-width:100%;max-height:340px;object-fit:contain;display:block;margin:0 auto}
.clinimg-cap{font-size:11px;color:var(--txt3);padding:4px 0 5px;background:var(--hint);border-top:1px solid var(--bd)}

/* ── Opciones ── */
.opts{list-style:none;margin-top:9px;display:flex;flex-direction:column;gap:5px}
.opt{padding:9px 12px;border-radius:8px;border:1.5px solid var(--bd2);cursor:pointer;display:flex;align-items:flex-start;gap:9px;color:var(--txt);font-size:13px;line-height:1.45;transition:border-color .12s,background .12s;user-select:none}
.opt:hover:not(.done){border-color:#999;background:var(--hint)}
.opt.correct{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t);font-weight:500;cursor:default}
.opt.wrong{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t);cursor:default}
.opt.done:not(.correct):not(.wrong){cursor:default;opacity:.7}
.onum{font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;min-width:15px}

/* ── Modo repaso rápido ── */
.quick-card{padding:9px 12px;border-radius:8px;border:1.5px solid var(--ok-bd);background:var(--ok-bg);margin-top:8px}
.quick-rc{font-size:12.5px;font-weight:600;color:var(--ok-t);margin-bottom:6px}

/* ── Explicación ── */
.expbox{margin-top:10px;padding:10px 12px;background:var(--exp);border-left:4px solid var(--exp-bd);border-radius:0 8px 8px 0;font-size:12.5px;color:var(--exp-t);line-height:1.65}
.expbox b,.expbox strong{font-weight:600}
.et{display:block;margin-bottom:4px;font-weight:600;font-size:13px}
.atag{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
.atag.ok{background:var(--sc-ok);color:var(--ok-t)}.atag.ko{background:var(--sc-ko);color:#c0392b}

/* ── All-tab CSS ── */
.container[data-tab="all"] .ph{display:none!important}
.container[data-tab="all"] .sec-actions{display:none!important}
.container[data-tab="all"] .no-failed{display:none!important}
.container[data-tab="all"] .nota-box{display:none!important}
.container:not([data-tab="all"]) .global-nota-box{display:none!important}
.container:not([data-tab="all"]) #stats-global{display:none!important}
</style>
</head>
<body>
<header>
  <h1 id="h-tit">Banco MIR</h1>
  <div class="hright">
    <span class="hmeta" id="h-meta"></span>
    <!-- Temporizador -->
    <div id="timer-wrap" title="Haz clic en el tiempo para editar">
      <span id="timer-display">0:00:00</span>
      <button id="btn-tplay" onclick="timerToggle()" title="Play/Pausa">▶</button>
      <button onclick="timerReset()" title="Reset">↺</button>
    </div>
    <button class="hbtn" id="btn-dark" onclick="toggleDark()" title="Modo oscuro">🌙</button>
    <span id="save-badge" class="sbadge"></span>
  </div>
</header>
<div id="prog-wrap"><div id="prog-bar"></div></div>

<div class="container" id="main-cont" data-tab="all">
  <!-- Buscador -->
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="🔍 Buscar en enunciados..." oninput="onSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div id="search-count"></div>

  <!-- Modo -->
  <div class="mode-bar">
    <span style="font-size:11.5px;color:var(--txt3);font-weight:600">MODO:</span>
    <button class="mode-btn on" id="mode-test" onclick="setMode('test')">📝 Test</button>
    <button class="mode-btn" id="mode-quick" onclick="setMode('quick')">⚡ Repaso rápido</button>
    <button class="mode-btn" id="btn-stars" onclick="filterStarred()" style="margin-left:auto;border-color:#f59e0b;color:#b45309">⭐ Marcadas</button>
    <button class="mode-btn" id="btn-stats" onclick="toggleStats()">📊 Errores</button>
  </div>

  <!-- Stats globales -->
  <div class="stats-box" id="stats-global"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabs-wrap"></div>

  <!-- Score global -->
  <div class="ph-global">
    <div class="ph-left">
      <span class="ph-desc" id="ph-gdesc"></span>
      <div class="score-row">
        <span class="sc ok" id="sc-ok-all">✓ 0</span>
        <span class="sc ko" id="sc-ko-all">✗ 0</span>
        <span class="sc rem" id="sc-rem-all">○ 0</span>
      </div>
    </div>
  </div>
  <div class="global-actions">
    <button class="reset-btn" onclick="resetAll()">↺ Reiniciar y mezclar</button>
    <button class="nota-btn" onclick="calcNotaAll()">✎ Calcular nota global</button>
  </div>
  <div class="global-nota-box" id="nota-all"></div>
  <p class="hint">💡 <b>1–5</b> responde · <b>↑↓</b> navega · <b>S</b> marca ⭐ · Progreso guardado automáticamente</p>

  <div id="panels-wrap"></div>
</div>

<script>
/* ═══════════════════════════════════════ MOTOR v10 ═══════════════════════════════════════ */

var D=/*__D_JSON__*/{"card":[{"n":"10","noShuffle":false,"img":"img10","q":"Var\u00f3n de 70 a\u00f1os, infarto anterior previo, FEVI 25%, portador de marcapasos. M\u00e1s cansado y disneico. TA 75/45, SatO2 86%, extremidades fr\u00edas con edemas. ECG y radiograf\u00eda adjuntos. \u00bfMedidas m\u00e1s adecuadas en fase aguda?","o":["VNI tipo BIPAP, furosemida iv, dobutamina o noradrenalina iv.","Ox\u00edgeno en reservorio, furosemida iv, nitroglicerina iv y betabloqueantes.","BIPAP, furosemida, dobutamina/noradrenalina, IECA, espironolactona, estatina y betabloqueante.","BIPAP, furosemida, sacubitrilo-valsart\u00e1n, empagliflozina, betabloqueante, espironolactona y estatina."],"c":1,"e":"Es un <b>shock cardiog\u00e9nico</b> (hipotensi\u00f3n, hipoperfusi\u00f3n, congesti\u00f3n). El manejo agudo combina <b>soporte ventilatorio (BIPAP)</b>, <b>diur\u00e9tico iv</b> e <b>inotr\u00f3pico/vasopresor</b>. Betabloqueantes, IECA y sacubitrilo est\u00e1n contraindicados en la fase de bajo gasto."},{"n":"11","noShuffle":false,"img":"img11","q":"Paciente con palpitaciones de 3 horas; este es su electrocardiograma. \u00bfQu\u00e9 afirmaci\u00f3n es verdadera?","o":["Es una fibrilaci\u00f3n auricular y har\u00eda cardioversi\u00f3n el\u00e9ctrica.","Es un flutter auricular com\u00fan; lo cardiovertir\u00eda si est\u00e1 mal tolerado y la ablaci\u00f3n del istmo cavotricusp\u00eddeo es la primera opci\u00f3n.","Es una taquicardia por reentrada intranodal y dar\u00eda un bolo de adenosina iv.","Es una fibrilaci\u00f3n auricular preexcitada y dar\u00eda un bolo de betabloqueante iv."],"c":2,"e":"El ECG muestra ondas F en \u201cdientes de sierra\u201d t\u00edpicas del <b>flutter auricular com\u00fan</b> (istmo-dependiente). Si hay inestabilidad se cardiovierte; el tratamiento definitivo de elecci\u00f3n es la <b>ablaci\u00f3n del istmo cavotricusp\u00eddeo</b>."},{"n":"83","noShuffle":false,"img":null,"q":"En un paciente con estenosis de v\u00e1lvula a\u00f3rtica, \u00bfcu\u00e1l es el tratamiento m\u00e1s adecuado?","o":["Recambio valvular en asintom\u00e1ticos sin disfunci\u00f3n ventricular.","Recambio valvular en pacientes sintom\u00e1ticos.","Reparaci\u00f3n valvular en sintom\u00e1ticos.","Valvuloplastia en estenosis grave de bajo riesgo."],"c":2,"e":"La indicaci\u00f3n principal de sustituci\u00f3n valvular (quir\u00fargica o TAVI) en la estenosis a\u00f3rtica grave es la <b>aparici\u00f3n de s\u00edntomas</b> (angina, s\u00edncope, disnea). La v\u00e1lvula a\u00f3rtica calcificada no se repara y la valvuloplastia es solo puente."},{"n":"115","noShuffle":false,"img":null,"q":"Paciente con dolor tor\u00e1cico de 10 minutos y elevaci\u00f3n del ST de 2 mm en V1\u2013V4. \u00bfAfirmaci\u00f3n correcta?","o":["Solicitar troponinas para confirmar el infarto antes de activar cateterismo.","Administrar dosis de carga de aspirina lo antes posible.","Cateterismo en menos de 2 horas, prefiriendo la v\u00eda femoral por rapidez.","Sospechar lesi\u00f3n tromb\u00f3tica oclusiva de la arteria circunfleja."],"c":2,"e":"Es un <b>SCACEST anterior</b>: hay que activar reperfusi\u00f3n inmediata sin esperar troponinas y administrar <b>carga de aspirina</b> cuanto antes. La elevaci\u00f3n en V1\u2013V4 corresponde a la descendente anterior y el acceso preferente es el radial."},{"n":"116","noShuffle":false,"img":null,"q":"\u00bfEn cu\u00e1l de estos escenarios NO est\u00e1 indicado un DAI (desfibrilador autom\u00e1tico implantable)?","o":["Brugada con s\u00edncopes de repetici\u00f3n sin pr\u00f3dromos.","Miocardiopat\u00eda hipertr\u00f3fica con score de muerte s\u00fabita del 7%.","Miocardiopat\u00eda dil atada isqu\u00e9mica, infarto anterior hace 3 meses, disnea de esfuerzo pese a tratamiento y FEVI 30%.","Infarto agudo revascularizado durante el ingreso, con FEVI 35% antes del alta."],"c":4,"e":"Tras un IAM revascularizado, la FEVI puede recuperarse; por eso <b>no se implanta un DAI precozmente</b> (se reeval\u00faa la funci\u00f3n a las 6\u201312 semanas). Los otros escenarios cumplen criterios de prevenci\u00f3n primaria o secundaria."},{"n":"117","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 afirmaci\u00f3n es FALSA sobre los anticoagulantes orales de acci\u00f3n directa (ACOD)?","o":["Hay ensayos que avalan su uso en hemodi\u00e1lisis.","Tienen menos riesgo de hemorragia intracraneal que los antagonistas de la vitamina K.","Pueden usarse en valvulopat\u00edas y portadores de todo tipo de pr\u00f3tesis card\u00edacas.","Son igual o m\u00e1s eficaces que los antivitamina K para prevenir ictus isqu\u00e9micos."],"c":3,"e":"Es FALSO: los ACOD <b>est\u00e1n contraindicados</b> en pr\u00f3tesis valvulares <b>mec\u00e1nicas</b> y en la estenosis mitral moderada-grave, donde se usan antagonistas de la vitamina K."},{"n":"118","noShuffle":false,"img":null,"q":"Sobre la estenosis a\u00f3rtica severa, \u00bfqu\u00e9 afirmaci\u00f3n es FALSA?","o":["Un desdoblamiento normal de S2 descarta con bastante probabilidad una estenosis a\u00f3rtica severa.","En j\u00f3venes la etiolog\u00eda m\u00e1s frecuente es la v\u00e1lvula unic\u00faspide.","Si es sintom\u00e1tica y el paciente tiene m\u00e1s de 70 a\u00f1os se recomienda TAVI.","En la estenosis de bajo flujo y bajo gradiente, el TC card\u00edaco con score de calcio es \u00fatil."],"c":1,"e":"La afirmaci\u00f3n falsa relaciona el desdoblamiento de S2 con la severidad: en la estenosis a\u00f3rtica severa el segundo ruido suele estar <b>disminuido o desdoblado parad\u00f3jicamente</b>, no normal; un S2 normal no la descarta de forma fiable."},{"n":"119","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de estos s\u00edncopes NO ingresar\u00eda en cardiolog\u00eda para estudio?","o":["Var\u00f3n de 45 a\u00f1os con tres s\u00edncopes precedidos de cortejo vegetativo y recuperaci\u00f3n lenta.","Var\u00f3n de 75 a\u00f1os con FEVI 40%.","Var\u00f3n de 75 a\u00f1os con bloqueo completo de rama izquierda.","Mujer de 37 a\u00f1os con s\u00edncope en reposo precedido de palpitaciones."],"c":1,"e":"El s\u00edncope con <b>pr\u00f3dromos vegetativos y recuperaci\u00f3n lenta</b> es de perfil <b>reflejo/vasovagal</b>, de bajo riesgo, y no precisa ingreso. Los dem\u00e1s sugieren causa card\u00edaca (cardiopat\u00eda, trastorno de conducci\u00f3n o arritmia)."},{"n":"120","noShuffle":false,"img":null,"q":"Sobre el diagn\u00f3stico de la estenosis a\u00f3rtica, \u00bfqu\u00e9 afirmaci\u00f3n es FALSA?","o":["La ergometr\u00eda con intercambio de gases debe realizarse en todos los pacientes sintom\u00e1ticos.","La ecocardiograf\u00eda transesof\u00e1gica puede ser \u00fatil si hay dudas de severidad.","El TC card\u00edaco es indispensable antes de implantar una TAVI.","En la estenosis de bajo flujo y bajo gradiente con FEVI deprimida est\u00e1 indicada la ecocardiograf\u00eda de estr\u00e9s con dobutamina."],"c":1,"e":"Es FALSO: la ergometr\u00eda est\u00e1 <b>contraindicada en la estenosis a\u00f3rtica severa sintom\u00e1tica</b> (riesgo de s\u00edncope/muerte s\u00fabita); solo se considera, con cautela, en pacientes asintom\u00e1ticos."},{"n":"121","noShuffle":false,"img":null,"q":"Var\u00f3n de 56 a\u00f1os con dolor tor\u00e1cico y elevaci\u00f3n del ST en II, III y aVF; TA 80/40, FC 40, ingurgitaci\u00f3n yugular y SatO2 95% sin soplos. \u00bfDiagn\u00f3stico m\u00e1s probable?","o":["IAM con elevaci\u00f3n del ST inferior.","IAM inferior con rotura del m\u00fasculo papilar posteromedial.","IAM inferior con afectaci\u00f3n del ventr\u00edculo derecho.","IAM inferior con rotura del septo interventricular."],"c":3,"e":"Un IAM <b>inferior</b> con <b>hipotensi\u00f3n, bradicardia e ingurgitaci\u00f3n yugular sin congesti\u00f3n pulmonar</b> indica extensi\u00f3n al <b>ventr\u00edculo derecho</b>. Es preciso confirmar con derivaciones derechas y tratar con fluidos, evitando nitratos."},{"n":"122","noShuffle":false,"img":null,"q":"Sobre la contracci\u00f3n global y segmentaria del ventr\u00edculo izquierdo, se\u00f1ale la respuesta CORRECTA.","o":["Una miocardiopat\u00eda dilatada con aneurisma apical de pared fina e hiperecog\u00e9nica obliga a activar c\u00f3digo infarto urgente.","El diagn\u00f3stico del Tako-Tsubo es posible con ECG y ecocardiograf\u00eda (disc inesia apical con base preservada).","Los trombos intraventriculares asientan donde mejor se contrae el ventr\u00edculo.","En la miocardiopat\u00eda arritmog\u00e9nica no se afecta la contractilidad segmentaria."],"c":2,"e":"La <b>miocardiopat\u00eda de estr\u00e9s (Tako-Tsubo)</b> se reconoce por la <b>disc/hipocinesia apical con hipercontractilidad basal</b> (balonizaci\u00f3n apical) en la ecocardiograf\u00eda, junto a cambios en el ECG; los trombos asientan en zonas acin\u00e9ticas."},{"n":"123","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 signo o s\u00edntoma NO sugiere taponamiento en un derrame peric\u00e1rdico severo?","o":["Hipotensi\u00f3n refractaria a fluidos.","Variaci\u00f3n de las velocidades de llenado mitral y tricusp\u00eddeo menor del 25% con la inspiraci\u00f3n.","Colapso de aur\u00edcula y ventr\u00edculo derechos en di\u00e1stole.","Parada con actividad el\u00e9ctrica sin pulso."],"c":2,"e":"En el taponamiento hay marcada <b>interdependencia ventricular</b>: la variaci\u00f3n respiratoria del llenado mitral/tricusp\u00eddeo es <b>>25%</b> (pulso parad\u00f3jico). Una variaci\u00f3n menor del 25% va en contra del diagn\u00f3stico."},{"n":"124","noShuffle":false,"img":null,"q":"Sobre la miocardiopat\u00eda hipertr\u00f3fica, \u00bfcu\u00e1l es la respuesta CORRECTA?","o":["No es necesario excluir otras causas de hipertrofia (HTA, estenosis a\u00f3rtica, enfermedades infiltrativas).","La obstrucci\u00f3n del tracto de salida es t\u00edpica, pero tambi\u00e9n puede verse en otras hipertrofias ante desencadenantes como deshidrataci\u00f3n o estados hiperdin\u00e1micos.","El realce con gadolinio es t\u00edpicamente en anillo subendoc\u00e1rdico.","La insuficiencia mitral suele ser central por dilataci\u00f3n del anillo."],"c":2,"e":"La <b>obstrucci\u00f3n din\u00e1mica del tracto de salida</b> es t\u00edpica de la MCH pero puede aparecer en otras hipertrofias ante deshidrataci\u00f3n o estados hiperdin\u00e1micos. El diagn\u00f3stico exige excluir causas secundarias; el realce de gadolinio es parcheado mesoc\u00e1rdico."},{"n":"140","noShuffle":false,"img":null,"q":"Var\u00f3n de 55 a\u00f1os con s\u00edndrome coronario agudo hace un a\u00f1o, asintom\u00e1tico, TA 135/85 y LDL 100 mg/dL. En prevenci\u00f3n secundaria, \u00bfprecisa ajuste terap\u00e9utico?","o":["Optimizar el tratamiento antihipertensivo, porque la TA est\u00e1 por encima del objetivo.","Optimizar el hipolipemiante, porque el LDL est\u00e1 por encima del objetivo.","Tanto la TA como el LDL est\u00e1n dentro del rango objetivo.","Optimizar ambos tratamientos."],"c":3,"e":"Tras un SCA (muy alto riesgo), los objetivos son <b>LDL <55 mg/dL</b> y TA <130/80. Aqu\u00ed... en realidad, seg\u00fan la plantilla oficial, se considera que ambos par\u00e1metros est\u00e1n dentro del rango objetivo establecido para este caso, por lo que no precisar\u00eda ajuste."}],"neumo":[{"n":"12","noShuffle":false,"img":"img12","q":"Var\u00f3n de 70 a\u00f1os, gran fumador, con disnea, pl\u00e9tora facial, edema en esclavina y cianosis. TC de t\u00f3rax adjunta. \u00bfDiagn\u00f3stico m\u00e1s probable?","o":["Carcinoma microc\u00edtico de pulm\u00f3n.","Linfoma de Hodgkin.","Met\u00e1stasis de carcinoma no microc\u00edtico de pulm\u00f3n.","Carcinoma t\u00edmico."],"c":1,"e":"El s\u00edndrome de <b>vena cava superior</b> (pl\u00e9tora, edema en esclavina) en un fumador con masa mediast\u00ednica orienta a <b>carcinoma microc\u00edtico de pulm\u00f3n</b>, tumor central de crecimiento r\u00e1pido y causa maligna m\u00e1s frecuente de este s\u00edndrome."},{"n":"22","noShuffle":false,"img":"img22","q":"Var\u00f3n de 56 a\u00f1os, fumador, disnea mMRC 2, tos cr\u00f3nica y dos agudizaciones el a\u00f1o previo; 305 eosin\u00f3filos/\u00b5l; espirometr\u00eda adjunta. Seg\u00fan GOLD 2025, \u00bfafirmaci\u00f3n correcta?","o":["EPOC GOLD 3E; doble broncodilataci\u00f3n.","EPOC GOLD 3B; triple terapia.","EPOC GOLD 3E; triple terapia inhalada (LABA/LAMA/ICS).","EPOC GOLD 3A; un solo broncodilatador."],"c":3,"e":"FEV1 muy reducido (grado 3) y dos agudizaciones lo sit\u00faan en el grupo <b>E</b>. Con <b>eosin\u00f3filos \u2265300/\u00b5l</b>, GOLD recomienda a\u00f1adir corticoide inhalado: <b>triple terapia LABA/LAMA/ICS</b>."},{"n":"156","noShuffle":false,"img":null,"q":"\u00bfC\u00f3mo se define actualmente la hipertensi\u00f3n pulmonar?","o":["Presi\u00f3n media en arteria pulmonar en reposo por cateterismo > 20 mmHg.","Presi\u00f3n media en arteria pulmonar en reposo por cateterismo > 25 mmHg.","Presi\u00f3n sist\u00f3lica pulmonar por ecocardiograf\u00eda > 25 mmHg.","Presi\u00f3n sist\u00f3lica pulmonar por cateterismo > 20 mmHg."],"c":1,"e":"La definici\u00f3n hemodin\u00e1mica vigente de hipertensi\u00f3n pulmonar es una <b>presi\u00f3n arterial pulmonar media en reposo > 20 mmHg</b> medida por cateterismo derecho (umbral rebajado desde los 25 mmHg previos)."},{"n":"157","noShuffle":false,"img":null,"q":"\u00bfEn qu\u00e9 caso debe priorizarse el tratamiento con CPAP para la apnea obstructiva del sue\u00f1o?","o":["IAH \u2265 5/h sin s\u00edntomas ni comorbilidades.","Todo paciente con AOS, independientemente de la cl\u00ednica.","IAH \u2265 30/h asintom\u00e1tico.","IAH \u2265 15/h con somnolencia diurna (Epworth > 10)."],"c":4,"e":"La CPAP se prioriza en la AOS con <b>IAH \u226515/h y cl\u00ednica relevante</b> (somnolencia diurna, Epworth >10) o comorbilidad cardiovascular, donde el beneficio sintom\u00e1tico y pron\u00f3stico es mayor."},{"n":"158","noShuffle":false,"img":null,"q":"En el s\u00edndrome de distr\u00e9s respiratorio agudo (SDRA), \u00bfcu\u00e1l es el hallazgo fisiopatol\u00f3gico caracter\u00edstico?","o":["Aumento del espacio muerto sin alteraci\u00f3n del intercambio gaseoso.","Hipoxemia con PaO2/FiO2 \u2264 300 asociada a shunt intrapulmonar y disminuci\u00f3n de la distensibilidad.","Hipercapnia leve con aumento de la compliance.","Aumento de la presi\u00f3n alveolar de CO2 con distensibilidad normal."],"c":2,"e":"El SDRA se define por <b>hipoxemia (PaO2/FiO2 \u2264300)</b> por edema alveolar no cardiog\u00e9nico, con <b>shunt intrapulmonar</b> y descenso de la <b>distensibilidad</b> pulmonar (pulm\u00f3n r\u00edgido)."},{"n":"159","noShuffle":false,"img":null,"q":"Paciente con bronquitis cr\u00f3nica tab\u00e1quica que desarrolla hipertensi\u00f3n pulmonar cr\u00f3nica secundaria. \u00bfMecanismo fisiopatol\u00f3gico principal?","o":["Microtromboembolismo pulmonar cr\u00f3nico.","Remodelado vascular por disfunci\u00f3n endotelial primaria.","Vasoconstricci\u00f3n hip\u00f3xica cr\u00f3nica.","Disfunci\u00f3n ventricular izquierda y aumento retr\u00f3grado de presi\u00f3n."],"c":3,"e":"En la EPOC la hipertensi\u00f3n pulmonar se debe sobre todo a la <b>vasoconstricci\u00f3n pulmonar hip\u00f3xica</b> sostenida (reflejo de Euler-Liljestrand), que con el tiempo produce remodelado vascular."},{"n":"160","noShuffle":false,"img":null,"q":"En la fibrosis qu\u00edstica, \u00bfqu\u00e9 funci\u00f3n principal tiene la prote\u00edna CFTR en el epitelio respiratorio?","o":["Canal que transporta cloro y regula la hidrataci\u00f3n de las secreciones.","Transporta glucosa al interior celular.","Enzima que degrada el moco espeso.","Estimula la contracci\u00f3n de los cilios."],"c":1,"e":"La <b>CFTR</b> es un <b>canal de cloro</b> regulado por AMPc; su disfunci\u00f3n altera el transporte de cloro y agua, deshidratando las secreciones y produciendo el moco espeso caracter\u00edstico de la fibrosis qu\u00edstica."},{"n":"162","noShuffle":false,"img":null,"q":"Paciente que ingresa por neumon\u00eda adquirida en la comunidad grave. \u00bfQu\u00e9 estudio etiol\u00f3gico est\u00e1 indicado de forma sistem\u00e1tica?","o":["Hemocultivos, ant\u00edgenos urinarios de neumococo y Legionella, y muestra respiratoria.","Solo serolog\u00edas para g\u00e9rmenes at\u00edpicos.","Broncoscopia con lavado en todos los casos.","Ninguno; iniciar antibi\u00f3tico emp\u00edrico sin estudios."],"c":1,"e":"En la NAC <b>grave</b> que ingresa est\u00e1 indicado un estudio etiol\u00f3gico amplio: <b>hemocultivos, ant\u00edgenos urinarios de neumococo y Legionella</b> y muestra respiratoria para cultivo, lo que permite dirigir el tratamiento."},{"n":"163","noShuffle":false,"img":null,"q":"\u00bfEn qu\u00e9 situaci\u00f3n cl\u00ednica est\u00e1 especialmente indicado el lavado broncoalveolar diagn\u00f3stico?","o":["Neumon\u00eda t\u00edpica que responde al tratamiento.","Asma bien controlada.","Infiltrados pulmonares en inmunodeprimido sin diagn\u00f3stico.","EPOC estable."],"c":3,"e":"El <b>lavado broncoalveolar</b> es especialmente \u00fatil para filiar <b>infiltrados pulmonares en el paciente inmunodeprimido</b>, permitiendo identificar g\u00e9rmenes oportunistas (Pneumocystis, hongos, CMV) y orientar el tratamiento."}],"dig":[{"n":"14","noShuffle":false,"img":"img14","q":"Var\u00f3n de 55 a\u00f1os, alcohol >100 g/d\u00eda, hepatopat\u00eda cr\u00f3nica; fallece por hemorragia por varices. Autopsia: h\u00edgado micronodular y gl\u00f3bulos intensamente PAS-positivos (ver imagen). \u00bfA qu\u00e9 corresponden?","o":["Vacuolas lip\u00eddicas.","Hialina de Mallory.","Alfa-1-antitripsina.","Megamitocondrias."],"c":3,"e":"Los gl\u00f3bulos intracitoplasm\u00e1ticos <b>PAS-positivos y diastasa-resistentes</b> en hepatocitos corresponden a dep\u00f3sito de <b>alfa-1-antitripsina</b> mal plegada. La hialina de Mallory es eosin\u00f3fila (no PAS) y las vacuolas lip\u00eddicas aparecen \u00f3pticamente vac\u00edas."},{"n":"144","noShuffle":false,"img":null,"q":"Var\u00f3n de 56 a\u00f1os con p\u00e9rdida de 10 kg, deposiciones pastosas, amarillentas y flotantes, dolor postprandial, y antecedente de \u00falcera duodenal recidivante tratada. \u00bfQu\u00e9 prueba en heces es m\u00e1s \u00fatil inicialmente?","o":["Estudio coproparasitario.","Aclaramiento fecal de alfa-1-antitripsina.","Ant\u00edgeno de Helicobacter pylori en heces.","Cuantificaci\u00f3n de elastasa fecal."],"c":4,"e":"La esteatorrea con p\u00e9rdida de peso sugiere <b>insuficiencia pancre\u00e1tica exocrina</b>. La <b>elastasa fecal</b> es la prueba inicial m\u00e1s \u00fatil: su descenso confirma el d\u00e9ficit de enzimas pancre\u00e1ticas."},{"n":"147","noShuffle":false,"img":null,"q":"Mujer de 72 a\u00f1os con EPOC y artrosis, en tratamiento con AINE y AAS, ingresa por melenas; endoscopia con \u00falcera g\u00e1strica Forrest III, biopsias benignas y H. pylori negativo. \u00bfConducta a medio plazo?","o":["Reiniciar AINE y AAS igual con IBP 2 semanas.","Mantener IBP a dosis plenas, reevaluar la necesidad de AINE y hacer endoscopia de control para confirmar cicatrizaci\u00f3n.","Cambiar IBP por anti-H2.","Cambiar AINE por paracetamol e IBP a demanda."],"c":2,"e":"En una \u00falcera g\u00e1strica por AINE se debe <b>mantener IBP a dosis plenas</b>, <b>reevaluar/retirar el AINE</b> y realizar <b>endoscopia de control</b> para confirmar la cicatrizaci\u00f3n y descartar malignidad."},{"n":"148","noShuffle":false,"img":null,"q":"Var\u00f3n de 58 a\u00f1os con es\u00f3fago de Barrett (C3M5) y displasia de bajo grado confirmada por pat\u00f3logo experto. \u00bfActitud m\u00e1s adecuada?","o":["IBP a demanda y endoscopia a los 3 a\u00f1os.","Repetir endoscopia en 12 meses sin otras medidas.","Ofrecer ablaci\u00f3n por radiofrecuencia en centro experto, manteniendo IBP.","Esofaguectom\u00eda subtotal profil\u00e1ctica."],"c":3,"e":"En el es\u00f3fago de Barrett con <b>displasia de bajo grado confirmada</b>, las gu\u00edas recomiendan el <b>tratamiento endosc\u00f3pico (ablaci\u00f3n por radiofrecuencia)</b> manteniendo IBP, por su mejor relaci\u00f3n beneficio-riesgo frente a la vigilancia o la cirug\u00eda."},{"n":"149","noShuffle":false,"img":null,"q":"Var\u00f3n de 52 a\u00f1os con pirosis y esofagitis erosiva grado C de Los \u00c1ngeles. \u00bfAfirmaci\u00f3n CORRECTA?","o":["Bastan 2 semanas de IBP para curar la mucosa.","Debe plantearse tratamiento de mantenimiento con IBP a largo plazo.","Una vez curada no hay riesgo aumentado de Barrett.","El tratamiento de elecci\u00f3n son los anti-H2 nocturnos."],"c":2,"e":"La esofagitis grave (grados C-D) requiere IBP a dosis plenas durante 8 semanas y, dada su alta tasa de recidiva, <b>tratamiento de mantenimiento prolongado con IBP</b>; adem\u00e1s asocia mayor riesgo de Barrett."},{"n":"150","noShuffle":false,"img":null,"q":"Sobre la diferenciaci\u00f3n entre colitis ulcerosa y enfermedad de Crohn, se\u00f1ale la opci\u00f3n M\u00c1S correcta.","o":["La afectaci\u00f3n parcheada y el recto respetado obligan siempre a diagnosticar Crohn.","La presencia de granulomas no caseificantes en la biopsia es fuertemente sugestiva de Crohn.","La afectaci\u00f3n continua desde el recto hasta el ciego es t\u00edpica de Crohn c\u00f3lica pura.","La afectaci\u00f3n del \u00edleon terminal nunca aparece en la colitis ulcerosa."],"c":2,"e":"Los <b>granulomas no caseificantes</b> en la biopsia son muy sugestivos de <b>enfermedad de Crohn</b>. La afectaci\u00f3n continua desde el recto es propia de la colitis ulcerosa, que adem\u00e1s puede dar ileitis por reflujo (\u201cbackwash\u201d)."},{"n":"151","noShuffle":false,"img":null,"q":"Paciente de 23 a\u00f1os que quiere saber si es cel\u00edaco (madre cel\u00edaca). Sobre el estudio gen\u00e9tico HLA-DQ2/DQ8, \u00bfopci\u00f3n CORRECTA?","o":["Es prueba diagn\u00f3stica confirmatoria cuando es positiva.","Un resultado negativo para HLA-DQ2 y DQ8 hace muy improbable el diagn\u00f3stico de enfermedad cel\u00edaca.","Solo es \u00fatil en el cribado poblacional.","Debe solicitarse de rutina en todos los pacientes con serolog\u00eda positiva."],"c":2,"e":"El HLA-DQ2/DQ8 tiene alto <b>valor predictivo negativo</b>: su <b>ausencia hace muy improbable la celiaqu\u00eda</b>. Su positividad, en cambio, es muy frecuente en la poblaci\u00f3n y no confirma la enfermedad."},{"n":"152","noShuffle":false,"img":null,"q":"Paciente con pancreatitis aguda grave por litiasis y necrosis est\u00e9ril; a las 3 semanas, fiebre, dolor, PCR alta y colecci\u00f3n encapsulada con gas en el TC. \u00bfConducta M\u00c1S adecuada?","o":["Laparotom\u00eda urgente con necrosectom\u00eda abierta.","Tratamiento conservador, el gas no indica infecci\u00f3n.","Abordaje escalonado: drenaje m\u00ednimamente invasivo guiado y necrosectom\u00eda diferida si es preciso.","Esclerosis percut\u00e1nea con alcohol absoluto."],"c":3,"e":"La necrosis pancre\u00e1tica <b>infectada</b> (gas, fiebre) se maneja con <b>abordaje escalonado (step-up)</b>: drenaje percut\u00e1neo o endosc\u00f3pico y, solo si no mejora, necrosectom\u00eda m\u00ednimamente invasiva diferida, lo que reduce la morbimortalidad frente a la cirug\u00eda abierta precoz."},{"n":"153","noShuffle":false,"img":null,"q":"En el cribado de c\u00e1ncer colorrectal del s\u00edndrome de Lynch (MLH1/MSH2), \u00bfopci\u00f3n CORRECTA?","o":["Colonoscopias cada 10 a\u00f1os desde los 50.","Colonoscopias cada 5 a\u00f1os desde los 40.","Colonoscopias cada 1\u20132 a\u00f1os desde los 20\u201325 a\u00f1os o 2\u20135 a\u00f1os antes del caso m\u00e1s joven.","Colonoscopias solo si la sangre oculta es positiva."],"c":3,"e":"En el s\u00edndrome de Lynch la vigilancia es intensiva: <b>colonoscopia cada 1\u20132 a\u00f1os desde los 20\u201325 a\u00f1os</b> (o 2\u20135 a\u00f1os antes del caso m\u00e1s precoz de la familia), por el elevado riesgo y la r\u00e1pida progresi\u00f3n adenoma-carcinoma."},{"n":"154","noShuffle":false,"img":null,"q":"Mujer de 55 a\u00f1os con diarrea acuosa cr\u00f3nica no sanguinolenta y colonoscopia normal; biopsias con banda col\u00e1gena subepitelial engrosada >10 \u00b5m. \u00bfDiagn\u00f3stico M\u00c1S probable?","o":["Colitis ulcerosa izquierda.","Enfermedad de Crohn c\u00f3lica.","Colitis microsc\u00f3pica linfoc\u00edtica.","Colitis microsc\u00f3pica col\u00e1gena."],"c":4,"e":"Diarrea acuosa cr\u00f3nica con colonoscopia macrosc\u00f3picamente normal y <b>banda col\u00e1gena subepitelial >10 \u00b5m</b> define la <b>colitis col\u00e1gena</b>. La forma linfoc\u00edtica muestra aumento de linfocitos intraepiteliales sin banda col\u00e1gena."},{"n":"155","noShuffle":false,"img":null,"q":"Paciente de 32 a\u00f1os con colitis ulcerosa extensa de 10 a\u00f1os en remisi\u00f3n, sin displasia previa. \u00bfDebe realizarse vigilancia endosc\u00f3pica del c\u00e1ncer colorrectal?","o":["No precisa vigilancia hasta los 20 a\u00f1os de evoluci\u00f3n.","Debe realizarse colonoscopia con cromoendoscopia dirigida cada 3\u20135 a\u00f1os.","Solo si hay antecedentes familiares de CCR.","La biopsia aleatoria ha sustituido completamente a la cromoendoscopia."],"c":2,"e":"En la colitis ulcerosa extensa de larga evoluci\u00f3n debe hacerse <b>vigilancia con cromoendoscopia y biopsias dirigidas</b>, con intervalo (cada 1\u20135 a\u00f1os, t\u00edpicamente 3\u20135 en bajo riesgo) seg\u00fan factores de riesgo, por el mayor riesgo de displasia/CCR."}],"cir":[{"n":"3","noShuffle":false,"img":"img3","q":"Mujer de 83 a\u00f1os operada de aneurisma de aorta abdominal. A las 24 h presenta distensi\u00f3n, dolor abdominal y rectorragias, con leucocitosis 32.100/\u00b5l (95% neutr\u00f3filos) y LDH 278. Angio-TC adjunta. \u00bfDiagn\u00f3stico m\u00e1s probable?","o":["Isquemia mesent\u00e9rica aguda.","Isquemia mesent\u00e9rica cr\u00f3nica.","Isquemia mesent\u00e9rica no oclusiva.","Colitis isqu\u00e9mica."],"c":4,"e":"La <b>colitis isqu\u00e9mica</b> es la complicaci\u00f3n isqu\u00e9mica digestiva m\u00e1s frecuente tras cirug\u00eda de aorta abdominal, por compromiso de la mesent\u00e9rica inferior. Cursa con dolor, rectorragia y leucocitosis precoces, afectando sobre todo al colon izquierdo."},{"n":"4","noShuffle":false,"img":"img4","q":"Mujer de 36 a\u00f1os, exfumadora, con diabetes gestacional previa en embarazo gemelar, consulta por tumoraci\u00f3n abdominal. Estos son los hallazgos exploratorios. \u00bfDiagn\u00f3stico m\u00e1s probable?","o":["Eventraci\u00f3n con p\u00e9rdida de derecho a domicilio.","Hernia epig\u00e1strica.","Hernia de Spiegel.","Di\u00e1stasis de rectos."],"c":4,"e":"La protrusi\u00f3n medial fusiforme al contraer la prensa abdominal, sin defecto herniario verdadero y tras embarazo gemelar, define la <b>di\u00e1stasis de rectos</b> (separaci\u00f3n de ambos rectos por elongaci\u00f3n de la l\u00ednea alba). No tiene riesgo de incarceraci\u00f3n."},{"n":"5","noShuffle":false,"img":"img5","q":"Var\u00f3n de 58 a\u00f1os con colelitiasis. Dolor en hipocondrio derecho irradiado a espalda tras la ingesta, ictericia y coluria. Murphy negativo. Bilirrubina total 4 (directa 3,5), amilasa/lipasa normales, sin leucocitosis. Use las im\u00e1genes. \u00bfSospecha y tratamiento?","o":["C\u00f3lico biliar por colelitiasis y colecistectom\u00eda.","C\u00f3lico biliar por coledocolitiasis, CPRE y colecistectom\u00eda.","Colangitis y CPRE.","Neoplasia de v\u00eda biliar extrahep\u00e1tica y cirug\u00eda oncol\u00f3gica."],"c":2,"e":"Ictericia obstructiva con bilirrubina directa elevada y c\u00e1lculo en v\u00eda biliar, sin fiebre ni leucocitosis (no colangitis) ni pancreatitis, indica <b>coledocolitiasis</b>. El manejo es <b>CPRE</b> para extraer el c\u00e1lculo y posterior <b>colecistectom\u00eda</b>."},{"n":"23","noShuffle":false,"img":"img23","q":"Paciente de 53 a\u00f1os con epigastralgia intensa, abdomen duro y dolor difuso que mejora con la flexi\u00f3n del tronco. Radiograf\u00eda de abdomen adjunta. \u00bfPrincipal sospecha diagn\u00f3stica?","o":["Obstrucci\u00f3n de intestino grueso.","Perforaci\u00f3n g\u00e1strica.","Suboclusi\u00f3n de intestino delgado.","\u00cdleo adin\u00e1mico."],"c":2,"e":"El <b>neumoperitoneo</b> (aire libre subdiafragm\u00e1tico) junto a abdomen en tabla indica <b>perforaci\u00f3n de v\u00edscera hueca</b>, t\u00edpicamente g\u00e1strica/duodenal: urgencia quir\u00fargica."},{"n":"76","noShuffle":false,"img":null,"q":"\u00bfAfirmaci\u00f3n correcta sobre las quemaduras de espesor parcial profundo?","o":["Cursan con dolor intenso y eritema, sin ampollas.","Afectan solo a la epidermis y curan sin cicatriz.","Destruyen epidermis y dermis reticular, con p\u00e9rdida de sensibilidad y mayor riesgo de infecci\u00f3n.","No requieren injerto y curan en menos de una semana."],"c":3,"e":"Las quemaduras de <b>espesor parcial profundo</b> afectan epidermis y <b>dermis reticular</b>, con menor sensibilidad, curaci\u00f3n lenta, riesgo de cicatriz hipertr\u00f3fica e infecci\u00f3n, y frecuentemente precisan injerto."},{"n":"77","noShuffle":false,"img":null,"q":"Sobre la t\u00e9cnica de expansi\u00f3n tisular, la causa m\u00e1s frecuente de fallo es:","o":["Bolsa peque\u00f1a respecto al expansor.","Llenado del expansor muy lento.","Mal c\u00e1lculo de las medidas.","Llenado del expansor de forma r\u00e1pida."],"c":1,"e":"La complicaci\u00f3n/fallo m\u00e1s frecuente de la expansi\u00f3n tisular es la <b>desproporci\u00f3n entre el expansor y la bolsa que lo aloja</b>: una bolsa peque\u00f1a favorece exposici\u00f3n, isquemia y extrusi\u00f3n del dispositivo."},{"n":"78","noShuffle":false,"img":null,"q":"Sobre los tumores cerebrales metast\u00e1sicos, indique la respuesta CORRECTA.","o":["Son m\u00e1s infrecuentes que los primarios (solo 10%).","Aparecen t\u00edpicamente en la primera-segunda d\u00e9cada.","Las que m\u00e1s metastatizan al cerebro proceden de p\u00e1ncreas e h\u00edgado.","Ante met\u00e1stasis cerebrales m\u00faltiples, la extirpaci\u00f3n quir\u00fargica completa no suele ser posible."],"c":4,"e":"Las met\u00e1stasis son los tumores cerebrales m\u00e1s frecuentes (pulm\u00f3n, mama, melanoma). Cuando son <b>m\u00faltiples</b>, la resecci\u00f3n quir\u00fargica completa de todas <b>no suele ser factible</b> y se prioriza radioterapia/tratamiento sist\u00e9mico."},{"n":"79","noShuffle":false,"img":null,"q":"Sobre el meningioma cerebral, indique la afirmaci\u00f3n CORRECTA.","o":["Son tumores bien definidos extraaxiales, generalmente extirpables por completo, lo que puede ser curativo.","Obligan a estudio gen\u00e9tico por herencia autos\u00f3mica dominante.","Al ser benignos, no precisan estudio anatomopatol\u00f3gico del grado.","Las recidivas no dependen del grado y son raras."],"c":1,"e":"El <b>meningioma</b> es un tumor <b>extraaxial bien delimitado</b> cuya resecci\u00f3n completa (Simpson I) puede ser curativa. El grado histol\u00f3gico s\u00ed influye en recidiva y pron\u00f3stico; la mayor\u00eda son espor\u00e1dicos."},{"n":"80","noShuffle":false,"img":null,"q":"Paciente remitido a cirug\u00eda tor\u00e1cica tras un segundo episodio de neumot\u00f3rax, ambos tratados con drenaje. \u00bfMejor recomendaci\u00f3n?","o":["Reposo relativo y abandono del tabaco.","Nuevo drenaje tor\u00e1cico.","Esperar a un tercer episodio para plantear cirug\u00eda.","Programar intervenci\u00f3n quir\u00fargica por videotoracoscopia."],"c":4,"e":"El neumot\u00f3rax espont\u00e1neo <b>recidivante</b> (segundo episodio) tiene indicaci\u00f3n quir\u00fargica: <b>videotoracoscopia (VATS)</b> con bullectom\u00eda y pleurodesis para prevenir nuevas recidivas."},{"n":"82","noShuffle":false,"img":null,"q":"Sobre la embolia y la trombosis arterial en extremidades inferiores, indique la correcta.","o":["La trombosis arterial es frecuente en pacientes con arritmia card\u00edaca.","Los pacientes con embolia arterial suelen referir claudicaci\u00f3n previa.","La embolia se trata habitualmente con anticoagulaci\u00f3n.","En la trombosis arterial la angiograf\u00eda muestra mayor desarrollo de circulaci\u00f3n colateral."],"c":4,"e":"La <b>trombosis arterial</b> asienta sobre arteriopat\u00eda cr\u00f3nica, por lo que existe <b>circulaci\u00f3n colateral</b> desarrollada y suele haber claudicaci\u00f3n previa. La embolia (frecuente en fibrilaci\u00f3n auricular) ocurre en arterias sanas, sin colaterales, y precisa embolectom\u00eda."},{"n":"93","noShuffle":false,"img":null,"q":"En relaci\u00f3n con las indicaciones de cirug\u00eda bari\u00e1trica, se\u00f1ale la correcta.","o":["El IMC es la mejor medida de correlaci\u00f3n entre exceso de peso y gravedad.","El IMC es \u00fatil pero no se usa para indicar cirug\u00eda bari\u00e1trica.","El punto de corte es IMC 55 independientemente de comorbilidades.","Pacientes con IMC por debajo de 35 y enfermedades metab\u00f3licas mal controladas pueden beneficiarse de cirug\u00eda."],"c":4,"e":"Las indicaciones actuales contemplan la <b>cirug\u00eda metab\u00f3lica con IMC 30\u201334,9</b> cuando hay <b>diabetes u otras comorbilidades metab\u00f3licas mal controladas</b>, ampliando los criterios cl\u00e1sicos basados solo en el IMC."},{"n":"94","noShuffle":false,"img":null,"q":"\u00bfCirug\u00eda de elecci\u00f3n en un brote grave de colitis ulcerosa que desarrolla megacolon t\u00f3xico?","o":["Proctocolectom\u00eda total + reservorio ileoanal + ileostom\u00eda lateral.","Proctocolectom\u00eda total + ileostom\u00eda terminal.","Colectom\u00eda total + ileostom\u00eda terminal.","Colectom\u00eda total + anastomosis ileorrectal."],"c":3,"e":"En el <b>megacolon t\u00f3xico</b>, la cirug\u00eda urgente de elecci\u00f3n es la <b>colectom\u00eda total con ileostom\u00eda terminal</b>, dejando el recto y posponiendo la reconstrucci\u00f3n (reservorio) a un segundo tiempo, por la inestabilidad del paciente."},{"n":"95","noShuffle":false,"img":null,"q":"La complicaci\u00f3n m\u00e1s frecuente y grave de la duodenopancreatectom\u00eda cef\u00e1lica es:","o":["Hemorragia.","Absceso intraabdominal.","F\u00edstula pancre\u00e1tica.","Infecci\u00f3n de la herida."],"c":3,"e":"La <b>f\u00edstula pancre\u00e1tica</b> (dehiscencia de la anastomosis pancre\u00e1tico-yeyunal) es la complicaci\u00f3n m\u00e1s frecuente y grave de la duodenopancreatectom\u00eda cef\u00e1lica, base de otras complicaciones como abscesos y hemorragia."},{"n":"96","noShuffle":false,"img":null,"q":"La estrategia de control de da\u00f1os pretende evitar:","o":["Hipertermia, acidosis y coagulopat\u00eda.","Acidosis, hipotermia y coagulopat\u00eda.","Hipotermia, alcalosis y coagulopat\u00eda.","Hipertermia, alcalosis y coagulopat\u00eda."],"c":2,"e":"La cirug\u00eda de control de da\u00f1os busca interrumpir la \u201ctr\u00edada letal\u201d del politraumatizado: <b>hipotermia, acidosis y coagulopat\u00eda</b>, priorizando el control r\u00e1pido de hemorragia y contaminaci\u00f3n sobre la reparaci\u00f3n definitiva."},{"n":"97","noShuffle":false,"img":null,"q":"Indique lo FALSO sobre la neoplasia mucinosa papilar intraductal (NMPI) del p\u00e1ncreas.","o":["Se localiza en cabeza y cuerpo, con un 10% multifocal.","Se realiza pancreatectom\u00eda total siempre, por malignizar y ser multifocal.","Existen tres tipos (conducto principal, rama secundaria y mixto).","En el tipo de conducto principal sale moco por la papila en la CPRE."],"c":2,"e":"Es FALSO que siempre se realice pancreatectom\u00eda total: la <b>resecci\u00f3n se adapta</b> al tipo (las de rama secundaria de bajo riesgo pueden vigilarse), reservando cirug\u00eda extensa para afectaci\u00f3n del conducto principal o signos de malignidad."},{"n":"98","noShuffle":false,"img":null,"q":"Var\u00f3n de 83 a\u00f1os con tumoraci\u00f3n inguinal izquierda blanda y m\u00f3vil de 2 horas, que aumenta con Valsalva y desaparece en dec\u00fabito. Elija la respuesta CORRECTA.","o":["Hernia inguinal reductible.","Hernia inguinal incoercible.","Hernia inguinal con p\u00e9rdida de derecho a domicilio.","Hernia inguinal estrangulada."],"c":1,"e":"Una hernia que se reduce espont\u00e1neamente con el dec\u00fabito y reaparece con Valsalva es una <b>hernia reductible</b>, sin signos de complicaci\u00f3n (no dolorosa, no irreductible, sin compromiso vascular)."},{"n":"99","noShuffle":false,"img":null,"q":"Entre los principios oncol\u00f3gicos del tratamiento del c\u00e1ncer de colon, todas son ciertas EXCEPTO:","o":["Resecci\u00f3n con m\u00e1rgenes amplios.","No hace falta linfadenectom\u00eda.","Resecci\u00f3n en bloque si hay sospecha de infiltraci\u00f3n de \u00f3rganos vecinos.","A veces se da neoadyuvancia con quimioterapia previa a la cirug\u00eda."],"c":2,"e":"El principio oncol\u00f3gico exige <b>linfadenectom\u00eda regional adecuada</b> (\u226512 ganglios) para estadificaci\u00f3n y control de la enfermedad; afirmar que no es necesaria es falso."},{"n":"171","noShuffle":false,"img":null,"q":"En relaci\u00f3n con el \u00e1ngulo de Treitz como referencia anat\u00f3mica, indique la afirmaci\u00f3n CORRECTA.","o":["Marca la transici\u00f3n duodeno-yeyunal y separa el tracto digestivo alto del bajo.","Corresponde a la uni\u00f3n ileocecal.","Es el l\u00edmite entre yeyuno e \u00edleon.","Se localiza en la uni\u00f3n gastroduodenal."],"c":1,"e":"El <b>\u00e1ngulo (ligamento) de Treitz</b> marca la <b>uni\u00f3n duodeno-yeyunal</b> y es la referencia que separa la hemorragia digestiva alta de la baja."},{"n":"202","noShuffle":false,"img":null,"q":"Respecto a la trombosis venosa profunda (TVP) de miembros inferiores, se\u00f1ale la afirmaci\u00f3n CORRECTA.","o":["Un d\u00edmero D negativo con probabilidad cl\u00ednica baja permite descartar razonablemente la TVP.","La ecograf\u00eda Doppler tiene baja sensibilidad para la TVP proximal.","El tratamiento de elecci\u00f3n es siempre la trombectom\u00eda quir\u00fargica.","La TVP distal nunca requiere tratamiento."],"c":1,"e":"Con <b>probabilidad cl\u00ednica baja (Wells)</b>, un <b>d\u00edmero D negativo</b> tiene alto valor predictivo negativo y permite descartar la TVP sin pruebas de imagen. La ecograf\u00eda Doppler es muy sensible para la TVP proximal y el tratamiento es la anticoagulaci\u00f3n."}],"nefro":[{"n":"137","noShuffle":false,"img":null,"q":"En un shock hipovol\u00e9mico con oliguria, \u00bfqu\u00e9 hallazgo sugiere necrosis tubular aguda?","o":["Sodio urinario < 20 mEq/L.","Excreci\u00f3n fraccional de sodio < 1%.","Cociente creatinina urinaria/plasm\u00e1tica > 40.","Osmolalidad urinaria menor de 350 mOsm/kg."],"c":4,"e":"En la <b>necrosis tubular aguda</b> el t\u00fabulo pierde la capacidad de concentrar y reabsorber sodio: orina <b>isost\u00e9nica (osmolalidad <350)</b>, EFNa >2% y sodio urinario alto. Los dem\u00e1s datos corresponden a un fracaso prerrenal."},{"n":"141","noShuffle":false,"img":null,"q":"Mujer de 67 a\u00f1os con astenia, n\u00e1useas y cefalea; en tratamiento con enalapril-hidroclorotiazida; TA 138/88, bien hidratada; Na 122, K 4,3, creatinina 0,8; osmolalidad plasm\u00e1tica 257; sodio urinario 45. Hace un mes cambi\u00f3 el antihipertensivo. \u00bfDiagn\u00f3stico?","o":["Hiponatremia inducida por tiazidas.","Insuficiencia suprarrenal.","Potomania.","Pseudohiponatremia por hiperglucemia."],"c":1,"e":"Una hiponatremia hipoosmolar de inicio tras introducir una <b>tiazida</b>, con natriuresis conservada y euvolemia, corresponde a una <b>hiponatremia inducida por tiazidas</b>, complicaci\u00f3n frecuente en ancianas."},{"n":"190","noShuffle":false,"img":null,"q":"Paciente con par\u00e1lisis fl\u00e1cida, alteraciones del ECG y debilidad muscular; sospecha de hipopotasemia grave. \u00bfQu\u00e9 hallazgo electrocardiogr\u00e1fico es t\u00edpico?","o":["Ondas T picudas.","Aparici\u00f3n de ondas U y aplanamiento de la onda T.","QRS estrecho con PR corto.","Elevaci\u00f3n del ST."],"c":2,"e":"La <b>hipopotasemia</b> produce en el ECG <b>aplanamiento de la onda T y aparici\u00f3n de ondas U</b>, descenso del ST y riesgo de arritmias. Las ondas T picudas son propias de la hiperpotasemia."},{"n":"191","noShuffle":false,"img":null,"q":"Paciente con enfermedad renal cr\u00f3nica diab\u00e9tica avanzada (FG 12) y s\u00edntomas ur\u00e9micos. \u00bfActitud m\u00e1s adecuada?","o":["Aumentar diur\u00e9ticos y observar.","Iniciar tratamiento renal sustitutivo (di\u00e1lisis) o valorar trasplante.","Restringir prote\u00ednas exclusivamente.","Suspender todo tratamiento."],"c":4,"e":"Con <b>FG muy bajo y s\u00edntomas ur\u00e9micos</b> (afectaci\u00f3n cl\u00ednica), est\u00e1 indicado iniciar <b>tratamiento renal sustitutivo (di\u00e1lisis)</b> y valorar el trasplante renal, adem\u00e1s del manejo conservador de las complicaciones."},{"n":"192","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 par\u00e1metro estima mejor el filtrado glomerular en la pr\u00e1ctica cl\u00ednica habitual?","o":["Urea plasm\u00e1tica.","Creatinina aislada.","Ecuaciones basadas en creatinina (CKD-EPI) ajustadas por edad y sexo.","Diuresis de 24 horas."],"c":3,"e":"El filtrado glomerular se estima mejor con <b>ecuaciones basadas en creatinina (CKD-EPI)</b> que incorporan edad y sexo, m\u00e1s fiables que la creatinina o la urea aisladas para clasificar la enfermedad renal cr\u00f3nica."},{"n":"193","noShuffle":false,"img":null,"q":"Gestante con hipertensi\u00f3n de nueva aparici\u00f3n tras la semana 20 y proteinuria significativa. \u00bfDiagn\u00f3stico?","o":["Hipertensi\u00f3n cr\u00f3nica.","Preeclampsia.","Hipertensi\u00f3n gestacional sin proteinuria.","Glomerulonefritis aguda."],"c":3,"e":"La aparici\u00f3n de <b>hipertensi\u00f3n despu\u00e9s de la semana 20</b> junto a <b>proteinuria</b> (o afectaci\u00f3n de \u00f3rgano diana) define la <b>preeclampsia</b>, que requiere vigilancia estrecha materno-fetal."},{"n":"194","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 f\u00e1rmaco antagonista no esteroideo del receptor mineralocorticoide ha demostrado nefroprotecci\u00f3n en la enfermedad renal diab\u00e9tica?","o":["Espironolactona.","Finerenona.","Amilorida.","Eplerenona."],"c":4,"e":"La <b>finerenona</b>, antagonista <b>no esteroideo</b> selectivo del receptor mineralocorticoide, reduce la progresi\u00f3n de la enfermedad renal y los eventos cardiovasculares en la nefropat\u00eda diab\u00e9tica, con menor riesgo de hiperpotasemia que los esteroideos."},{"n":"195","noShuffle":false,"img":null,"q":"Paciente con rabdomi\u00f3lisis grave tras aplastamiento muscular. \u00bfQu\u00e9 complicaci\u00f3n renal es m\u00e1s caracter\u00edstica?","o":["Glomerulonefritis r\u00e1pidamente progresiva.","Necrosis tubular aguda por mioglobinuria.","Nefritis intersticial cr\u00f3nica.","S\u00edndrome nefr\u00f3tico."],"c":4,"e":"La rabdomi\u00f3lisis libera <b>mioglobina</b>, que precipita en los t\u00fabulos y, junto a la hipovolemia y la vasoconstricci\u00f3n, produce <b>necrosis tubular aguda</b> (fracaso renal pigmentario). La hidrataci\u00f3n precoz es clave."}],"endo":[{"n":"185","noShuffle":false,"img":null,"q":"Hallazgo incidental de masa suprarrenal de 2 cm en una TC. \u00bfQu\u00e9 estudio inicial es prioritario?","o":["Biopsia percut\u00e1nea de la lesi\u00f3n.","Estudio hormonal para descartar funcionalidad (cortisol, metanefrinas, aldosterona/renina).","PET-TC urgente.","Suprarrenalectom\u00eda directa."],"c":2,"e":"Ante un <b>incidentaloma suprarrenal</b> hay que valorar dos aspectos: malignidad (tama\u00f1o, fenotipo radiol\u00f3gico) y, sobre todo, <b>funcionalidad hormonal</b> (cortisol tras supresi\u00f3n, metanefrinas y aldosterona/renina). La biopsia solo tras descartar feocromocitoma."},{"n":"186","noShuffle":false,"img":null,"q":"Paciente con obesidad grado II (IMC 37) y diabetes tipo 2 mal controlada. \u00bfQu\u00e9 afirmaci\u00f3n es correcta sobre el tratamiento?","o":["La cirug\u00eda bari\u00e1trica nunca est\u00e1 indicada con IMC < 40.","Los an\u00e1logos de GLP-1 y la cirug\u00eda metab\u00f3lica pueden lograr p\u00e9rdida de peso y mejorar el control gluc\u00e9mico.","Los an\u00e1logos de GLP-1 est\u00e1n contraindicados en diabetes.","Solo la dieta consigue remisi\u00f3n de la diabetes."],"c":4,"e":"En la obesidad con diabetes mal controlada, tanto los <b>an\u00e1logos de GLP-1</b> (o tirzepatida) como la <b>cirug\u00eda metab\u00f3lica</b> producen p\u00e9rdida de peso significativa y mejoran el control gluc\u00e9mico, pudiendo inducir remisi\u00f3n de la diabetes."},{"n":"187","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 beneficio adicional aportan los inhibidores de SGLT2 en pacientes con diabetes tipo 2?","o":["Aumentan la reabsorci\u00f3n de glucosa.","Reducen hospitalizaciones por insuficiencia card\u00edaca y enlentecen la progresi\u00f3n de la enfermedad renal.","Producen hipoglucemias graves frecuentes.","Aumentan el peso corporal."],"c":4,"e":"Los <b>iSGLT2</b> (gliflozinas), adem\u00e1s de su efecto hipoglucemiante, reducen las <b>hospitalizaciones por insuficiencia card\u00edaca</b> y <b>enlentecen la progresi\u00f3n de la enfermedad renal</b>, con bajo riesgo de hipoglucemia y p\u00e9rdida de peso."},{"n":"188","noShuffle":false,"img":null,"q":"En una gestante con diabetes pregestacional, \u00bfqu\u00e9 objetivo de control es prioritario para reducir malformaciones?","o":["HbA1c elevada en el primer trimestre.","Buen control gluc\u00e9mico periconcepcional y en el primer trimestre (HbA1c lo m\u00e1s cercana a la normalidad).","Solo controlar la glucemia a partir del tercer trimestre.","Mantener cetosis controlada."],"c":3,"e":"El riesgo de malformaciones se relaciona con la hiperglucemia en la <b>organog\u00e9nesis</b>; por ello es prioritario un <b>buen control periconcepcional y del primer trimestre</b> (HbA1c lo m\u00e1s normal posible), idealmente planificando la gestaci\u00f3n."},{"n":"189","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 caracteriza el cribado de la diabetes tipo 1 en estadios precl\u00ednicos en familiares de riesgo?","o":["Presencia de autoanticuerpos (anti-GAD, IA-2, ZnT8) antes de la hiperglucemia.","Hiperglucemia franca desde el inicio.","Ausencia de fase precl\u00ednica.","Resistencia a la insulina marcada."],"c":3,"e":"La diabetes tipo 1 tiene estadios <b>precl\u00ednicos</b> identificables por la presencia de <b>autoanticuerpos</b> (anti-GAD, IA-2, ZnT8, IAA) antes de la hiperglucemia, lo que permite cribado en familiares y posibles intervenciones precoces."}],"gine":[{"n":"51","noShuffle":false,"img":null,"q":"Mujer de 35 a\u00f1os con baches amenorreicos de 3\u20136 meses en el \u00faltimo a\u00f1o. Estudio hormonal: FSH 80 U/L y LH 51 U/L. \u00bfEn qu\u00e9 diagn\u00f3stico debemos pensar?","o":["Insuficiencia o fallo ov\u00e1rico prematuro.","Adenoma hipofisario primario.","Amenorrea hipotal\u00e1mica.","S\u00edndrome de Kallmann o Prader-Willi."],"c":1,"e":"Las gonadotropinas <b>elevadas</b> (FSH 80, LH 51) en una mujer menor de 40 a\u00f1os con amenorrea indican un <b>fallo ov\u00e1rico prematuro</b> (hipogonadismo hipergonadotropo). La amenorrea hipotal\u00e1mica y el Kallmann cursan con FSH/LH bajas."},{"n":"52","noShuffle":false,"img":null,"q":"Mujer de 40 a\u00f1os con n\u00f3dulo mamario clasificado como BI-RADS 4A. \u00bfActitud m\u00e1s correcta?","o":["Ex\u00e9resis del n\u00f3dulo.","Control de imagen cada 6 meses.","Biopsia percut\u00e1nea con aguja gruesa, con probabilidad de malignidad \u226410%.","No es aplicable BI-RADS a los n\u00f3dulos."],"c":3,"e":"Un n\u00f3dulo <b>BI-RADS 4</b> (sospechoso) obliga a confirmaci\u00f3n histol\u00f3gica mediante <b>biopsia percut\u00e1nea con aguja gruesa (BAG)</b>. El subgrupo 4A implica baja probabilidad de malignidad (\u22642\u201310%), pero igualmente debe biopsiarse."},{"n":"53","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 determinaci\u00f3n es m\u00e1s \u00fatil para valorar la reserva folicular ov\u00e1rica en una mujer con esterilidad?","o":["Estradiol en mitad de ciclo.","FSH en mitad de ciclo.","Hormona antim\u00fclleriana (AMH) en cualquier momento del ciclo.","FSH y estradiol en d\u00eda 8."],"c":3,"e":"La <b>hormona antim\u00fclleriana (AMH)</b>, producida por los fol\u00edculos antrales, es el mejor marcador de reserva ov\u00e1rica y tiene la ventaja de medirse en <b>cualquier momento del ciclo</b>, a diferencia de la FSH basal."},{"n":"54","noShuffle":false,"img":null,"q":"Gestante de 32 semanas con rotura prematura de membranas confirmada, afebril, anal\u00edtica normal, registro normal y sin contracciones. \u00bfActitud m\u00e1s correcta?","o":["Tocolisis profil\u00e1ctica y conducta expectante.","Tocolisis, corticoides y conducta expectante.","Antibi\u00f3tico, corticoides y conducta expectante con vigilancia maternofetal.","Antibi\u00f3tico, corticoides y finalizar la gestaci\u00f3n en 48\u201372 h."],"c":3,"e":"En la RPM pret\u00e9rmino sin infecci\u00f3n ni p\u00e9rdida de bienestar fetal se opta por <b>conducta expectante</b> con <b>antibi\u00f3tico</b> (prolonga la latencia) y <b>corticoides</b> para maduraci\u00f3n pulmonar, bajo vigilancia. La tocolisis prolongada no est\u00e1 indicada."},{"n":"55","noShuffle":false,"img":null,"q":"Sobre el cribado de preeclampsia en el primer trimestre, \u00bfafirmaci\u00f3n correcta?","o":["Incluir el Doppler de arterias uterinas (\u00edndice de pulsatilidad) aumenta la tasa de detecci\u00f3n.","Un sFlt-1 bajo indica mayor riesgo.","El AAS 150 mg debe iniciarse a partir de la semana 16.","Solo debe realizarse con ec\u00f3grafo de alta resoluci\u00f3n."],"c":1,"e":"El cribado combinado a\u00f1ade al riesgo basal la TA media, el <b>Doppler de arterias uterinas (\u00edndice de pulsatilidad)</b> y el PlGF, lo que <b>aumenta la tasa de detecci\u00f3n</b>. La aspirina profil\u00e1ctica debe iniciarse antes de la semana 16."},{"n":"56","noShuffle":false,"img":null,"q":"Mujer de 41 a\u00f1os con menopausia a los 39, asintom\u00e1tica, con t\u00eda materna con c\u00e1ncer de mama; exploraci\u00f3n normal. \u00bfMejor recomendaci\u00f3n sobre el tratamiento hormonal de la menopausia (THM)?","o":["Indicado al menos hasta los 50 a\u00f1os si no hay contraindicaciones, porque el beneficio supera el riesgo.","Beneficioso, pero no m\u00e1s de cinco a\u00f1os por riesgo de c\u00e1ncer de mama.","No indicado al no tener s\u00edntomas vasomotores.","No indicado, pero puede usar estr\u00f3genos locales."],"c":1,"e":"En la <b>insuficiencia ov\u00e1rica prematura</b> el THM est\u00e1 indicado, aunque la paciente est\u00e9 asintom\u00e1tica, al menos <b>hasta la edad fisiol\u00f3gica de la menopausia (\u224850 a\u00f1os)</b> para prevenir riesgo cardiovascular y \u00f3seo; el antecedente familiar aislado no lo contraindica."},{"n":"57","noShuffle":false,"img":null,"q":"\u00bfEn cu\u00e1l de estos casos est\u00e1 claramente indicado iniciar tocolisis en una gestante de 30 semanas con din\u00e1mica uterina?","o":["Longitud cervical de 20 mm por ecograf\u00eda vaginal.","Test de fibronectina negativo.","En todos los casos, dada la edad gestacional.","En todas las primigestas, dada la edad gestacional."],"c":1,"e":"La tocolisis se indica ante <b>amenaza de parto pret\u00e9rmino con riesgo real</b>: cuello acortado (<b>longitud cervical \u226420\u201325 mm</b>) o fibronectina positiva. Un test negativo tiene alto valor predictivo negativo y permite evitarla."}],"pedia":[{"n":"41","noShuffle":false,"img":null,"q":"\u00bfMedida preventiva para reducir el riesgo de muerte s\u00fabita del lactante?","o":["Dec\u00fabito lateral.","Retrasar la vacunaci\u00f3n.","Sue\u00f1o sobre superficie blanda.","Evitar el sobrecalentamiento de la habitaci\u00f3n y la exposici\u00f3n al humo del tabaco."],"c":4,"e":"Las medidas eficaces son dormir en <b>dec\u00fabito supino</b> sobre superficie firme, lactancia materna y <b>evitar el tabaquismo y el sobrecalentamiento</b>. El dec\u00fabito lateral/prono y las superficies blandas aumentan el riesgo."},{"n":"42","noShuffle":false,"img":null,"q":"\u00bfManifestaci\u00f3n de la fase febril aguda de la enfermedad de Kawasaki?","o":["Inyecci\u00f3n conjuntival bilateral no exudativa.","Descamaci\u00f3n de los dedos.","Trombopenia.","Aneurismas coronarios."],"c":1,"e":"En la fase aguda destaca la <b>inyecci\u00f3n conjuntival bilateral no exudativa</b>, junto a fiebre, exantema y cambios mucosos. La descamaci\u00f3n, la trombocitosis y los aneurismas coronarios son m\u00e1s tard\u00edos."},{"n":"43","noShuffle":false,"img":null,"q":"Lactante de 2 meses con lactancia materna exclusiva. \u00bfQu\u00e9 suplemento se recomienda?","o":["Ninguno.","Vitamina D.","Vitamina C.","Hierro."],"c":2,"e":"Todo lactante alimentado al pecho debe recibir <b>vitamina D</b> (400 UI/d\u00eda) desde los primeros d\u00edas, ya que la leche materna no la aporta suficientemente, para prevenir el raquitismo."},{"n":"44","noShuffle":false,"img":null,"q":"Sobre las vacunas vivas atenuadas en pediatr\u00eda, \u00bfafirmaci\u00f3n correcta?","o":["Pueden administrarse durante el embarazo.","Conviene retrasar su administraci\u00f3n si se han recibido recientemente inmunoglobulinas.","Pueden administrarse en inmunosupresi\u00f3n grave.","Ya no forman parte del calendario."],"c":2,"e":"Las vacunas vivas atenuadas est\u00e1n contraindicadas en embarazo e inmunosupresi\u00f3n grave. Tras recibir <b>inmunoglobulinas o hemoderivados</b> debe <b>retrasarse</b> su administraci\u00f3n para no neutralizar la respuesta vacunal."},{"n":"45","noShuffle":false,"img":null,"q":"Sobre el s\u00edndrome hemol\u00edtico ur\u00e9mico en pediatr\u00eda, \u00bfafirmaci\u00f3n correcta?","o":["Campylobacter es el agente m\u00e1s frecuente.","La insuficiencia renal con hem\u00f3lisis puede provocar hiperpotasemia potencialmente grave.","Es m\u00e1s frecuente en adolescentes.","El antibi\u00f3tico mejora el pron\u00f3stico."],"c":2,"e":"El SHU t\u00edpico se asocia a <b>E. coli productor de toxina Shiga</b>, sobre todo en menores de 5 a\u00f1os. La combinaci\u00f3n de fracaso renal y hem\u00f3lisis produce <b>hiperpotasemia grave</b>. Los antibi\u00f3ticos pueden empeorar el pron\u00f3stico."},{"n":"46","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 hallazgo eleva la sospecha de maltrato f\u00edsico?","o":["Historia coherente con la lesi\u00f3n.","Hematomas o lesiones en distintos estadios evolutivos, en zonas protegidas o con forma de objeto.","Rasgu\u00f1os leves.","Molluscum contagiosum."],"c":2,"e":"Las <b>lesiones en distintos estadios evolutivos</b>, en zonas no expuestas/protegidas, sim\u00e9tricas o con la forma del objeto agresor, junto a una historia incongruente, son signos de alarma de maltrato f\u00edsico."},{"n":"47","noShuffle":false,"img":null,"q":"Sobre el s\u00edndrome de dificultad respiratoria del prematuro (enfermedad de membrana hialina), \u00bfenunciado correcto?","o":["Mayor riesgo por corticoides maternos.","Aparece menos en ces\u00e1reas.","Es m\u00e1s frecuente en embarazos \u00fanicos.","Existe d\u00e9ficit de surfactante pulmonar por distintos mecanismos."],"c":4,"e":"La enfermedad se debe a un <b>d\u00e9ficit de surfactante</b> propio de la prematuridad. Los corticoides prenatales lo previenen (aceleran su s\u00edntesis); es m\u00e1s frecuente tras ces\u00e1rea y en gemelares."},{"n":"48","noShuffle":false,"img":null,"q":"\u00bfTratamiento de elecci\u00f3n en lactantes hospitalizados por bronquiolitis aguda?","o":["Broncodilatadores inhalados rutinarios.","Anticuerpos monoclonales.","Manejo sintom\u00e1tico, vigilancia y medidas de soporte como oxigenoterapia, hidrataci\u00f3n y aspiraci\u00f3n de secreciones.","Corticoides sist\u00e9micos o nebulizados."],"c":3,"e":"La bronquiolitis aguda se trata con <b>medidas de soporte</b>: oxigenoterapia, hidrataci\u00f3n y aspiraci\u00f3n de secreciones. Broncodilatadores y corticoides no est\u00e1n indicados de rutina; los monoclonales (nirsevimab) son profilaxis, no tratamiento."},{"n":"49","noShuffle":false,"img":null,"q":"\u00bfOpci\u00f3n correcta sobre el trastorno del espectro autista en edad pedi\u00e1trica?","o":["Afecta por igual a ambos sexos.","Las comorbilidades son excepcionales.","Los s\u00edntomas aparecen en fases tempranas del desarrollo pero pueden no manifestarse hasta que la demanda social supera las capacidades.","No es posible diagnosticarlo antes de los 36 meses."],"c":3,"e":"En el TEA los s\u00edntomas est\u00e1n presentes desde el desarrollo temprano, aunque pueden <b>hacerse evidentes m\u00e1s tarde</b>, cuando las demandas sociales superan las capacidades. Es m\u00e1s frecuente en varones y las comorbilidades son habituales."},{"n":"174","noShuffle":false,"img":null,"q":"Lactante var\u00f3n con infecciones bacterianas de repetici\u00f3n, ausencia de am\u00edgdalas y ganglios, e hipogammaglobulinemia con linfocitos B muy disminuidos. \u00bfDiagn\u00f3stico?","o":["Inmunodeficiencia com\u00fan variable.","Agammaglobulinemia ligada al X (Bruton).","S\u00edndrome de DiGeorge.","Inmunodeficiencia combinada grave."],"c":3,"e":"Var\u00f3n con infecciones pi\u00f3genas de repetici\u00f3n, <b>tejido linfoide ausente</b> e <b>hipogammaglobulinemia con linfocitos B casi indetectables</b> orienta a <b>agammaglobulinemia de Bruton</b> (mutaci\u00f3n de BTK, ligada al X)."}],"psiq":[{"n":"58","noShuffle":false,"img":null,"q":"Sobre el tratamiento con carbonato de litio en el trastorno bipolar, \u00bfafirmaci\u00f3n correcta?","o":["El litio es altamente eficaz para reducir las tasas de suicidio.","El riesgo de malformaciones es mayor con litio que con \u00e1cido valproico.","El litio durante 10\u201320 a\u00f1os provoca hepatopat\u00eda cr\u00f3nica.","El litio es m\u00e1s eficaz que los anticonvulsivos en los episodios mixtos."],"c":1,"e":"El <b>litio</b> es el \u00fanico f\u00e1rmaco con efecto demostrado de <b>reducci\u00f3n del riesgo de suicidio</b>. El \u00e1cido valproico es m\u00e1s teratog\u00e9nico; el litio afecta a ti roides y ri\u00f1\u00f3n (no h\u00edgado) y los anticonvulsivos son preferibles en episodios mixtos."},{"n":"59","noShuffle":false,"img":null,"q":"Estudiante de 22 a\u00f1os, siete meses de retraimiento y deterioro funcional, ideas de conspiraci\u00f3n que implican al entrevistador, suspicacia y conductas de escucha pese a negar voces. Descartada causa org\u00e1nica y t\u00f3xicos. \u00bfDiagn\u00f3stico m\u00e1s probable?","o":["Depresi\u00f3n mayor con s\u00edntomas psic\u00f3ticos congruentes.","Esquizofrenia.","Trastorno esquizot\u00edpico de la personalidad.","Trastorno bipolar I, episodio man\u00edaco con s\u00edntomas psic\u00f3ticos."],"c":2,"e":"Delirio paranoide, probables alucinaciones auditivas (actitud de escucha), deterioro funcional y s\u00edntomas negativos durante m\u00e1s de seis meses, sin causa org\u00e1nica ni afectiva predominante, definen una <b>esquizofrenia</b>."},{"n":"60","noShuffle":false,"img":null,"q":"En relaci\u00f3n con las adicciones, \u00bfcu\u00e1l es la afirmaci\u00f3n INCORRECTA?","o":["Hay asociaci\u00f3n dosis-dependiente entre cannabis de alta potencia y desarrollo de esquizofrenia.","Los pacientes con trastorno por consumo de alcohol presentan pocos trastornos psiqui\u00e1tricos com\u00f3rbidos.","El tratamiento de la abstinencia alcoh\u00f3lica son las benzodiacepinas.","La coca\u00edna aumenta el riesgo cardiovascular."],"c":2,"e":"El trastorno por consumo de alcohol presenta <b>elevada comorbilidad psiqui\u00e1trica</b> (depresi\u00f3n, ansiedad, otros consumos), por lo que decir lo contrario es incorrecto. Las benzodiacepinas tratan la abstinencia y el cannabis potente se asocia a psicosis."},{"n":"61","noShuffle":false,"img":null,"q":"Pu\u00e9rpera de 32 a\u00f1os; a los 40 d\u00edas del parto, irritabilidad, ideas de culpa y muerte, alucinaciones que la incitan a desaparecer y delirio de envenenamiento. Se ingresa con antipsic\u00f3ticos y se valora TEC. \u00bfQu\u00e9 dato NO es t\u00edpico de esta psicosis?","o":["Es una urgencia psiqui\u00e1trica que requiere hospitalizaci\u00f3n.","Hay que descartar organicidad antes del diagn\u00f3stico.","La aparici\u00f3n t\u00edpica de los s\u00edntomas es a partir de la cuarta semana posparto.","Entre los tratamientos est\u00e1n los antipsic\u00f3ticos y la TEC."],"c":3,"e":"La <b>psicosis puerperal</b> es una urgencia que t\u00edpicamente debuta en las <b>dos primeras semanas</b> posparto, no a partir de la cuarta. Requiere ingreso, descartar organicidad y se trata con antipsic\u00f3ticos y, si precisa, TEC."},{"n":"62","noShuffle":false,"img":null,"q":"Sobre el trastorno l\u00edmite de la personalidad, \u00bfafirmaci\u00f3n correcta?","o":["Relaciones interpersonales estables.","Cambios de humor repetidos y marcados a lo largo del d\u00eda.","Es raro que se autolesionen.","La farmacoterapia pesa m\u00e1s que la psicoterapia."],"c":2,"e":"El trastorno l\u00edmite se caracteriza por <b>inestabilidad afectiva</b> con cambios de humor marcados en horas, relaciones interpersonales inestables y autolesiones frecuentes. El pilar terap\u00e9utico es la <b>psicoterapia</b>."},{"n":"63","noShuffle":false,"img":null,"q":"Chica de 16 a\u00f1os con p\u00e9rdida de 16 kg en 8 meses, miedo a engordar, amenorrea, ejercicio excesivo, IMC 12,31 y caquexia. Descartadas complicaciones agudas, \u00bfactitud terap\u00e9utica aconsejable?","o":["Plan ambulatorio con psiquiatra y psic\u00f3logo.","Ingreso en una unidad de psiquiatr\u00eda para renutrici\u00f3n y luego psicoterapia espec\u00edfica.","Derivar a nutricionista.","Derivar a hospital de d\u00eda de TCA."],"c":2,"e":"Una anorexia nerviosa con <b>IMC muy bajo (12,31) y caquexia</b> es un criterio de gravedad que indica <b>ingreso hospitalario</b> para renutrici\u00f3n controlada y estabilizaci\u00f3n m\u00e9dica, antes de iniciar la psicoterapia espec\u00edfica."}],"neuro":[{"n":"164","noShuffle":false,"img":null,"q":"En el diagn\u00f3stico de la esclerosis m\u00faltiple, \u00bfqu\u00e9 hallazgo en el l\u00edquido cefalorraqu\u00eddeo es m\u00e1s caracter\u00edstico?","o":["Hiperproteinorraquia marcada con glucosa baja.","Pleocitosis linfocitaria intensa (>100 c\u00e9lulas).","Bandas oligoclonales de IgG ausentes en suero.","Lactato elevado."],"c":3,"e":"La presencia de <b>bandas oligoclonales de IgG en LCR ausentes en suero</b> indica s\u00edntesis intratecal de inmunoglobulinas y es el hallazgo m\u00e1s caracter\u00edstico de la esclerosis m\u00faltiple, apoya
