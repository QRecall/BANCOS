<!--
=============================================================
  MOTOR BANCO MIR — v10
  Novedades respecto a v9:
  - Numeración correlativa fija por sección (no se mezcla)
  - Badge neutro en pestaña "Todos" + mezcla real inter-secciones
  - Temporizador sticky editable en header (play/pausa/reset)
  - Buscador de texto en tiempo real
  - Modo repaso rápido (muestra RC + explicación directamente)
  - Estadísticas de errores recurrentes entre sesiones
=============================================================
-->
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">Banco MIR</title>
<style>
:root{
  --bg:#f4f3ef;--surf:#fff;--bd:#e5e5e5;--bd2:#ddd;
  --txt:#1a1a1a;--txt2:#555;--txt3:#999;--txt4:#666;
  --hdr:#1a1a1a;--hdr-t:#fff;
  --ok-bg:#e6f9ef;--ok-t:#0b6e52;--ok-bd:#2da060;
  --ko-bg:#fdecea;--ko-t:#b91c1c;--ko-bd:#d94f45;
  --sc-ok:#dcf5ed;--sc-ko:#fdecea;--sc-rem:#f0f0f0;--sc-rem-t:#666;
  --exp:#fffbe6;--exp-bd:#f0c04a;--exp-t:#5a4500;
  --prog:#e5e5e5;--prog-fill:#1a56db;
  --star:#ccc;--star-on:#f59e0b;
  --hint:#fafafa;--hint-bd:#eee;
  --tab-bd:#ddd;--tab-t:#555;
  --all-bg:#e8f0fe;--all-t:#1a56db;--all-bd:#1a56db;
  --fab:#1a1a1a;--fab-t:#fff;
  --nota-btn-t:#1a56db;--nota-btn-bd:#1a56db;--nota-btn-bg:var(--surf);
  --timer-bg:#222;--timer-t:#fff;--timer-danger:#ef4444;
}
[data-theme="dark"]{
  --bg:#0f0f1a;--surf:#1e1e30;--bd:#2a2a45;--bd2:#333355;
  --txt:#e8e8f0;--txt2:#aaa;--txt3:#555;--txt4:#888;
  --hdr:#0a0a14;--hdr-t:#e8e8f0;
  --ok-bg:#0b3020;--ok-t:#4ade80;--ok-bd:#166534;
  --ko-bg:#2d0a0a;--ko-t:#f87171;--ko-bd:#7f1d1d;
  --sc-ok:#0b3020;--sc-ko:#2d0a0a;--sc-rem:#252540;--sc-rem-t:#aaa;
  --exp:#1a1500;--exp-bd:#a37f10;--exp-t:#d4b84a;
  --prog:#2a2a45;--prog-fill:#60a5fa;
  --star:#444;--star-on:#f59e0b;
  --hint:#1a1a2e;--hint-bd:#2a2a45;
  --tab-bd:#2a2a45;--tab-t:#aaa;
  --all-bg:#1a2a4a;--all-t:#60a5fa;--all-bd:#3b82f6;
  --fab:#2a2a50;--fab-t:#e8e8f0;
  --nota-btn-t:#60a5fa;--nota-btn-bd:#3b82f6;--nota-btn-bg:var(--surf);
  --timer-bg:#1a1a2e;--timer-t:#e8e8f0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .25s,color .25s}

/* ── Header ── */
header{background:var(--hdr);color:var(--hdr-t);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
header h1{font-size:13.5px;font-weight:600;white-space:nowrap}
.hright{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hmeta{font-size:11px;color:#888}
.hbtn{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:3px 5px;border-radius:5px;transition:background .15s;color:var(--hdr-t)}
.hbtn:hover{background:rgba(255,255,255,.12)}
.sbadge{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:500}
.sbadge.ok{background:#15803d;color:#dcfce7}.sbadge.warn{background:#92400e;color:#fef3c7}

/* ── Temporizador ── */
#timer-wrap{display:flex;align-items:center;gap:4px;background:var(--timer-bg);border-radius:7px;padding:3px 8px;border:1px solid rgba(255,255,255,.1)}
#timer-display{font-size:13px;font-weight:700;font-family:monospace;color:var(--timer-t);min-width:58px;text-align:center;cursor:pointer;border-radius:3px;padding:1px 3px}
#timer-display:hover{background:rgba(255,255,255,.08)}
#timer-display.editing{background:rgba(255,255,255,.15);outline:none;color:var(--timer-t)}
#timer-display.danger{color:var(--timer-danger)}
#timer-wrap button{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:12px;padding:1px 3px;border-radius:3px;line-height:1}
#timer-wrap button:hover{background:rgba(255,255,255,.12);color:#fff}

/* ── Barra de progreso ── */
#prog-wrap{height:3px;background:var(--prog);position:sticky;top:40px;z-index:99}
#prog-bar{height:100%;background:var(--prog-fill);width:0%;transition:width .4s}

/* ── Contenedor ── */
.container{max-width:820px;margin:0 auto;padding:16px 12px}

/* ── Buscador ── */
.search-wrap{position:relative;margin-bottom:13px}
.search-wrap input{width:100%;padding:8px 34px 8px 12px;border:1.5px solid var(--bd2);border-radius:8px;font-size:13px;background:var(--surf);color:var(--txt);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--prog-fill)}
.search-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--txt3);font-size:16px;display:none;line-height:1}
#search-count{font-size:11px;color:var(--txt3);margin-top:4px;display:none}

/* ── Modo repaso ── */
.mode-bar{display:flex;gap:6px;margin-bottom:12px;align-items:center}
.mode-btn{padding:5px 12px;border:1.5px solid var(--bd2);border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;background:var(--surf);color:var(--txt2);transition:all .15s}
.mode-btn:hover{border-color:#999}
.mode-btn.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Tabs ── */
.tabs{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.tab{padding:7px 14px;border:1.5px solid var(--tab-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;background:var(--surf);color:var(--tab-t);transition:all .15s}
.tab:hover{border-color:#999;color:var(--txt)}
.tab.t-all.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Score global ── */
.ph-global{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 15px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-left:4px solid var(--prog-fill)}
.score-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.sc{font-size:12px;font-weight:600;padding:3px 9px;border-radius:6px}
.sc.ok{background:var(--sc-ok);color:var(--ok-t)}.sc.ko{background:var(--sc-ko);color:var(--ko-t)}.sc.rem{background:var(--sc-rem);color:var(--sc-rem-t)}

/* ── Acciones ── */
.global-actions{display:none;margin-bottom:10px;gap:7px;flex-wrap:wrap;align-items:center}
.container[data-tab="all"] .global-actions{display:flex}
.sec-actions{margin:6px 0 15px;display:flex;gap:7px;flex-wrap:wrap}
.reset-btn{padding:7px 14px;background:var(--fab);color:var(--fab-t);border:none;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:opacity .15s}
.reset-btn:hover{opacity:.82}
.nota-btn{padding:7px 14px;background:var(--nota-btn-bg);color:var(--nota-btn-t);border:1.5px solid var(--nota-btn-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:background .15s}
.nota-btn:hover{background:var(--all-bg)}

/* ── Nota box ── */
.nota-box,.global-nota-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:2px solid var(--bd2);font-size:13px;line-height:1.7;display:none}
.nota-box.pass,.global-nota-box.pass{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t)}
.nota-box.fail,.global-nota-box.fail{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t)}
.nota-score{font-size:26px;font-weight:700;display:block;margin-bottom:4px}
.nota-detail{font-size:12px;opacity:.85;font-family:monospace}

/* ── Vista revisión ── */
.review-list{margin-top:12px;border-top:1px solid var(--bd2);padding-top:10px}
.review-title{font-size:12px;font-weight:700;margin-bottom:9px;color:var(--txt)}
.review-sec-label{font-size:11.5px;font-weight:700;color:var(--txt3);margin:8px 0 5px;padding-top:6px;border-top:1px solid var(--bd)}
.review-item{background:var(--surf);border-radius:8px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden}
.review-item summary{padding:9px 12px;cursor:pointer;font-size:12.5px;color:var(--txt);list-style:none;display:flex;gap:8px;align-items:flex-start}
.review-item summary::-webkit-details-marker{display:none}
.review-item summary::before{content:'▶';font-size:9px;color:var(--txt3);flex-shrink:0;margin-top:4px;transition:transform .18s}
details[open] summary::before{transform:rotate(90deg)}
.review-body{padding:0 12px 11px}
.review-ans{font-size:12px;color:var(--ok-t);margin-bottom:7px;font-weight:500}

/* ── Estadísticas ── */
.stats-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--surf);display:none}
.stats-box.show{display:block}
.stats-title{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--txt)}
.stats-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12.5px}
.stats-item:last-child{border-bottom:none}
.stats-bar-wrap{flex:1;background:var(--sc-rem);border-radius:4px;height:6px;overflow:hidden}
.stats-bar{height:100%;background:var(--ko-bd);border-radius:4px;transition:width .4s}
.stats-n{font-size:11px;color:var(--txt3);white-space:nowrap}
.stats-q{flex:2;color:var(--txt);font-size:12px;line-height:1.3}

/* ── Panel secciones ── */
.sec-panel{display:none}.sec-panel.visible{display:block}
.ph{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ph-left{flex:1;display:flex;flex-direction:column;gap:5px}
.ph-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:1px}
.ph-desc{font-size:12px;color:var(--txt4)}
.fbtn{padding:6px 12px;font-size:12px;font-weight:500;border:1.5px solid var(--bd2);border-radius:8px;cursor:pointer;background:var(--surf);color:var(--txt2);transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:#999;color:var(--txt)}.fbtn.on{background:var(--ko-bg);color:#b91c1c;border-color:#f87171}
.no-failed{display:none;text-align:center;padding:16px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin-top:4px}
.no-failed.show{display:block}
.no-results{display:none;text-align:center;padding:20px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin:8px 0}

/* ── Hint ── */
.hint{font-size:11px;color:var(--txt3);margin-bottom:15px;padding:7px 11px;background:var(--hint);border-radius:6px;border:1px solid var(--hint-bd)}

/* ── Tarjeta ── */
.qcard{background:var(--surf);border-radius:10px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden;transition:box-shadow .15s}
.qcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.qcard.kb-focus{outline:2px solid var(--prog-fill);outline-offset:-2px}
.qcard.search-hidden{display:none}
.qhead{padding:11px 13px;cursor:pointer;display:flex;align-items:flex-start;gap:9px}

/* ── Badge numérico ── */
.qnum{font-size:11px;font-weight:700;padding:3px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;background:var(--sc-rem);color:var(--sc-rem-t)}
/* En pestaña "Todos" siempre neutro; en sección aplica color de sección */
.qnum.sec-colored{background:var(--sec-dim);color:var(--sec-col)}

.qtxt{font-size:13px;line-height:1.5;flex:1}
.star-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--star);padding:0 2px;flex-shrink:0;margin-top:2px;line-height:1;transition:color .15s,transform .15s}
.star-btn:hover{transform:scale(1.2)}
.star-btn .si{display:inline}.star-btn .sf{display:none}
.star-btn.on .si{display:none}.star-btn.on .sf{display:inline;color:var(--star-on)}
.chev{font-size:15px;color:var(--bd2);flex-shrink:0;margin-top:2px;transition:transform .2s}
.qhead.open .chev{transform:rotate(180deg)}
.qbody{display:none;padding:0 13px 13px}.qbody.open{display:block}

/* ── Imagen ── */
.clinimg-wrap{margin:9px 0 7px;background:#111;border-radius:8px;overflow:hidden;border:1px solid var(--bd2);text-align:center}
.clinimg{max-width:100%;max-height:340px;object-fit:contain;display:block;margin:0 auto}
.clinimg-cap{font-size:11px;color:var(--txt3);padding:4px 0 5px;background:var(--hint);border-top:1px solid var(--bd)}

/* ── Opciones ── */
.opts{list-style:none;margin-top:9px;display:flex;flex-direction:column;gap:5px}
.opt{padding:9px 12px;border-radius:8px;border:1.5px solid var(--bd2);cursor:pointer;display:flex;align-items:flex-start;gap:9px;color:var(--txt);font-size:13px;line-height:1.45;transition:border-color .12s,background .12s;user-select:none}
.opt:hover:not(.done){border-color:#999;background:var(--hint)}
.opt.correct{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t);font-weight:500;cursor:default}
.opt.wrong{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t);cursor:default}
.opt.done:not(.correct):not(.wrong){cursor:default;opacity:.7}
.onum{font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;min-width:15px}

/* ── Modo repaso rápido ── */
.quick-card{padding:9px 12px;border-radius:8px;border:1.5px solid var(--ok-bd);background:var(--ok-bg);margin-top:8px}
.quick-rc{font-size:12.5px;font-weight:600;color:var(--ok-t);margin-bottom:6px}

/* ── Explicación ── */
.expbox{margin-top:10px;padding:10px 12px;background:var(--exp);border-left:4px solid var(--exp-bd);border-radius:0 8px 8px 0;font-size:12.5px;color:var(--exp-t);line-height:1.65}
.expbox b,.expbox strong{font-weight:600}
.et{display:block;margin-bottom:4px;font-weight:600;font-size:13px}
.atag{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
.atag.ok{background:var(--sc-ok);color:var(--ok-t)}.atag.ko{background:var(--sc-ko);color:#c0392b}

/* ── All-tab CSS ── */
.container[data-tab="all"] .ph{display:none!important}
.container[data-tab="all"] .sec-actions{display:none!important}
.container[data-tab="all"] .no-failed{display:none!important}
.container[data-tab="all"] .nota-box{display:none!important}
.container:not([data-tab="all"]) .global-nota-box{display:none!important}
.container:not([data-tab="all"]) #stats-global{display:none!important}
</style>
</head>
<body>
<header>
  <h1 id="h-tit">Banco MIR</h1>
  <div class="hright">
    <span class="hmeta" id="h-meta"></span>
    <!-- Temporizador -->
    <div id="timer-wrap" title="Haz clic en el tiempo para editar">
      <span id="timer-display">0:00:00</span>
      <button id="btn-tplay" onclick="timerToggle()" title="Play/Pausa">▶</button>
      <button onclick="timerReset()" title="Reset">↺</button>
    </div>
    <button class="hbtn" id="btn-dark" onclick="toggleDark()" title="Modo oscuro">🌙</button>
    <span id="save-badge" class="sbadge"></span>
  </div>
</header>
<div id="prog-wrap"><div id="prog-bar"></div></div>

<div class="container" id="main-cont" data-tab="all">
  <!-- Buscador -->
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="🔍 Buscar en enunciados..." oninput="onSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div id="search-count"></div>

  <!-- Modo -->
  <div class="mode-bar">
    <span style="font-size:11.5px;color:var(--txt3);font-weight:600">MODO:</span>
    <button class="mode-btn on" id="mode-test" onclick="setMode('test')">📝 Test</button>
    <button class="mode-btn" id="mode-quick" onclick="setMode('quick')">⚡ Repaso rápido</button>
    <button class="mode-btn" id="btn-stars" onclick="filterStarred()" style="margin-left:auto;border-color:#f59e0b;color:#b45309">⭐ Marcadas</button>
    <button class="mode-btn" id="btn-stats" onclick="toggleStats()">📊 Errores</button>
  </div>

  <!-- Stats globales -->
  <div class="stats-box" id="stats-global"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabs-wrap"></div>

  <!-- Score global -->
  <div class="ph-global">
    <div class="ph-left">
      <span class="ph-desc" id="ph-gdesc"></span>
      <div class="score-row">
        <span class="sc ok" id="sc-ok-all">✓ 0</span>
        <span class="sc ko" id="sc-ko-all">✗ 0</span>
        <span class="sc rem" id="sc-rem-all">○ 0</span>
      </div>
    </div>
  </div>
  <div class="global-actions">
    <button class="reset-btn" onclick="resetAll()">↺ Reiniciar y mezclar</button>
    <button class="nota-btn" onclick="calcNotaAll()">✎ Calcular nota global</button>
  </div>
  <div class="global-nota-box" id="nota-all"></div>
  <p class="hint">💡 <b>1–5</b> responde · <b>↑↓</b> navega · <b>S</b> marca ⭐ · Progreso guardado automáticamente</p>

  <div id="panels-wrap"></div>
</div>

<script>
/* ═══════════════════════════════════════ MOTOR v10 ═══════════════════════════════════════ */

var KEY=/*__KEY__*/'seminario_geria_pdt_v10';
var META=/*__META_JSON__*/{"titulo":"Seminario Geriatr\u00eda","subtitulo":"Fragilidad \u00b7 Valoraci\u00f3n Geri\u00e1trica \u00b7 Casos Cl\u00ednicos \u00b7 Demograf\u00eda","examen":"Seminario PDT \u00b7 CEU Valencia \u00b7 Geriatr\u00eda","secciones":{"frag":{"label":"Fragilidad y Sarcopenia","emoji":"\ud83d\udcaa","color":"#b45309","colorDim":"#fef3c7","desc":"Definici\u00f3n \u00b7 Fenotipo de Fried \u00b7 Reversibilidad \u00b7 Ejercicio f\u00edsico \u00b7 Sarcopenia"},"vgi":{"label":"VGI y Escalas","emoji":"\ud83d\udccb","color":"#0f766e","colorDim":"#ccfbf1","desc":"Barthel \u00b7 Pfeiffer \u00b7 Lawton \u00b7 Tinetti \u00b7 SPPB \u00b7 Velocidad de marcha"},"casos":{"label":"Casos Cl\u00ednicos","emoji":"\ud83c\udfe5","color":"#7c3aed","colorDim":"#ede9fe","desc":"Delirium \u00b7 Adecuaci\u00f3n terap\u00e9utica \u00b7 Fractura de cadera \u00b7 Demencia"},"demo":{"label":"Demograf\u00eda y Conceptos","emoji":"\ud83c\udf0d","color":"#0369a1","colorDim":"#e0f2fe","desc":"Envejecimiento \u00b7 Esperanza de vida \u00b7 Edad biol\u00f3gica vs cronol\u00f3gica"}}};
var D=/*__D_JSON__*/{"frag":[{"n":"1","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de estos tipos de ancianos tiene peor estado de salud?","o":["Paciente geri\u00e1trico","Persona mayor sana","Persona mayor enferma","Anciano fr\u00e1gil"],"c":1,"e":"El <b>paciente geri\u00e1trico</b> es el que presenta peor estado de salud global: combina pluripatolog\u00eda, polifarmacia, deterioro funcional, deterioro cognitivo y problem\u00e1tica social simult\u00e1neamente. El anciano fr\u00e1gil tiene vulnerabilidad aumentada pero a\u00fan no ha desarrollado dependencia. La persona mayor enferma tiene patolog\u00eda pero conserva mejor su funci\u00f3n. El paciente geri\u00e1trico representa la situaci\u00f3n m\u00e1s compleja y de mayor carga asistencial."},{"n":"2","noShuffle":false,"img":null,"q":"Respecto a la fragilidad, se\u00f1ala la FALSA:","o":["Existe dificultad o dependencia para realizar las ABVD necesarias para el autocuidado","Se caracteriza por disminuci\u00f3n de la fuerza y resistencia, con incremento de la vulnerabilidad frente a agentes estresores de baja intensidad","Producida por alteraci\u00f3n en m\u00faltiples sistemas interrelacionados que disminuye la reserva homeost\u00e1tica y la capacidad de adaptaci\u00f3n","Predispone al anciano a eventos adversos de salud, con mayor probabilidad de dependencia e incluso muerte"],"c":1,"e":"La afirmaci\u00f3n falsa es la A. La <b>fragilidad NO implica dependencia</b> para las ABVD: el paciente fr\u00e1gil est\u00e1 en una situaci\u00f3n de <b>pre-dependencia reversible</b>, con reserva homeost\u00e1tica disminuida pero todav\u00eda sin dependencia establecida. La dependencia para ABVD define al paciente geri\u00e1trico o dependiente, no al fr\u00e1gil. Esta distinci\u00f3n es clave: la fragilidad es el estadio intermedio, identificable y potencialmente reversible."},{"n":"3","noShuffle":false,"img":null,"q":"Medir fragilidad es medir la reserva del organismo en un momento concreto. Se\u00f1ale la correcta:","o":["Un paciente FR\u00c1GIL es muy probable que ya no pueda recuperar su situaci\u00f3n funcional previa","El paciente Robusto caer\u00e1 en estado de fragilidad ante un agente estresor, independientemente de su intensidad","Un paciente PRE-FR\u00c1GIL sufre deterioro ante un agente agresor y no podr\u00e1 recuperar su situaci\u00f3n basal","Un paciente DEPENDIENTE, ante un proceso de enfermedad, no va a aumentar m\u00e1s su situaci\u00f3n de deterioro"],"c":1,"e":"La A es correcta: el paciente <b>fr\u00e1gil tiene una reserva homeost\u00e1tica tan disminuida</b> que ante un agente estresor (infecci\u00f3n, ca\u00edda, hospitalizaci\u00f3n) experimenta un deterioro desproporcionado y tiene alta probabilidad de no recuperar su situaci\u00f3n funcional previa. Las dem\u00e1s son falsas: el robusto s\u00ed puede resistir estresores leves; el pre-fr\u00e1gil s\u00ed puede recuperarse; el dependiente puede empeorar a\u00fan m\u00e1s."},{"n":"4","noShuffle":false,"img":null,"q":"Respecto a la fragilidad, se\u00f1ala la CIERTA:","o":["Existe dependencia para realizar las ABVD necesarias para el autocuidado","Se caracteriza por disminuci\u00f3n de la fuerza y resistencia, con incremento de la vulnerabilidad frente a agentes estresores de baja intensidad","El paciente fr\u00e1gil hace referencia a un paciente con dependencia y cerca del final de vida","No es necesario identificar fragilidad porque suele revertir por s\u00ed misma"],"c":2,"e":"La definici\u00f3n correcta de fragilidad (Fried 2001) es la B: <b>s\u00edndrome cl\u00ednico caracterizado por disminuci\u00f3n de la fuerza, resistencia y funci\u00f3n fisiol\u00f3gica</b>, que aumenta la vulnerabilidad frente a agentes estresores de baja intensidad. No implica dependencia (A falsa), no equivale a final de vida (C falsa), y no revierte sola sin intervenci\u00f3n (D falsa). Identificarla permite intervenir y revertirla."},{"n":"5","noShuffle":false,"img":null,"q":"Respecto al s\u00edndrome de fragilidad, se\u00f1ale la respuesta falsa:","o":["Su sustrato fisiopatol\u00f3gico es la sarcopenia","Se asocia a eventos adversos en salud en el paciente mayor","Es posible revertirla o, en su defecto, evitar su progresi\u00f3n a dependencia","Consideramos fr\u00e1giles a todos los mayores de 65 a\u00f1os"],"c":4,"e":"La afirmaci\u00f3n falsa es la D. La fragilidad <b>no afecta a todos los mayores de 65 a\u00f1os</b>: su prevalencia en la comunidad es aproximadamente del <b>15%</b> (con variaciones seg\u00fan la escala empleada). La sarcopenia s\u00ed es su principal sustrato fisiopatol\u00f3gico (A correcta). Se asocia a ca\u00eddas, ingresos, institucionalizaci\u00f3n y muerte (B correcta). Y es reversible o al menos modulable con intervenci\u00f3n adecuada (C correcta)."},{"n":"6","noShuffle":false,"img":null,"q":"Se\u00f1ale la respuesta incorrecta respecto al s\u00edndrome de fragilidad:","o":["Se trata de una condici\u00f3n frecuente, con una prevalencia aproximada del 15%","Indica una situaci\u00f3n cercana al final de vida","Consiste en un estado de vulnerabilidad funcional que predispone a la dependencia","Se puede revertir"],"c":2,"e":"La afirmaci\u00f3n incorrecta es la B. La fragilidad <b>no equivale a final de vida</b>: es un estado de vulnerabilidad funcional <b>reversible</b> mediante ejercicio f\u00edsico, optimizaci\u00f3n nutricional y revisi\u00f3n farmacol\u00f3gica. Confundir fragilidad con terminalidad lleva a nihilismo terap\u00e9utico y privar\u00eda al paciente de intervenciones beneficiosas. La prevalencia del 15%, la predisposici\u00f3n a dependencia y la reversibilidad son afirmaciones correctas."},{"n":"7","noShuffle":false,"img":null,"q":"Respecto al s\u00edndrome de fragilidad, se\u00f1ale la respuesta falsa:","o":["Est\u00e1 relacionado con eventos adversos en salud como ingreso, ca\u00eddas, deterioro funcional y muerte","Es un estadio intermedio entre la m\u00e1xima capacidad intr\u00ednseca y la dependencia, con posibilidad de identificarla y revertirla","La fragilidad entendida como fenotipo fue descrita por Kenneth Rockwood","Existe otra interpretaci\u00f3n diferente al fenotipo: la fragilidad como ac\u00famulo de d\u00e9ficits"],"c":3,"e":"La afirmaci\u00f3n falsa es la C. El <b>fenotipo de fragilidad fue descrito por Linda P. Fried</b> (Cardiovascular Health Study, 2001) con 5 criterios: p\u00e9rdida de peso, agotamiento, debilidad muscular, lentitud de marcha y baja actividad f\u00edsica. <b>Kenneth Rockwood</b> describi\u00f3 el modelo alternativo: el <b>Frailty Index o ac\u00famulo de d\u00e9ficits</b> (opci\u00f3n D, que es correcta). Ambos modelos son complementarios."},{"n":"8","noShuffle":false,"img":null,"q":"Respecto a la sarcopenia, indique la respuesta incorrecta:","o":["Puede considerarse la insuficiencia de \u00f3rgano que predispone al s\u00edndrome de fragilidad","La sarcopenia primaria est\u00e1 presente en todos los individuos en mayor o menor grado a partir de una determinada edad","La sarcopenia secundaria se produce en el contexto de un proceso intercurrente que motiva inmovilizaci\u00f3n transitoria o definitiva","No ha podido demostrarse su relaci\u00f3n con el estado nutricional del individuo"],"c":4,"e":"La respuesta incorrecta es la D. La sarcopenia tiene una <b>relaci\u00f3n directa con el estado nutricional</b>: la malnutrici\u00f3n proteico-cal\u00f3rica es uno de sus principales factores causales. La intervenci\u00f3n nutricional (aporte proteico adecuado) junto al ejercicio es la base del tratamiento. Las dem\u00e1s son correctas: sarcopenia es la 'insuficiencia muscular' que subyace a la fragilidad, existe una forma primaria (envejecimiento) y secundaria (inmovilizaci\u00f3n, enfermedad cr\u00f3nica)."},{"n":"9","noShuffle":false,"img":null,"q":"La prescripci\u00f3n de ejercicio f\u00edsico en el paciente mayor. Se\u00f1ale la respuesta falsa:","o":["Ha demostrado eficacia para revertir fragilidad y mejorar la capacidad intr\u00ednseca","Solo se puede llevar a cabo en un n\u00famero reducido y seleccionado de pacientes mayores","Es recomendable la realizaci\u00f3n de programas multicomponente que incluyan ejercicio aer\u00f3bico, resistencia muscular, equilibrio y flexibilidad","Es necesario individualizar la indicaci\u00f3n a cada tipolog\u00eda de paciente para garantizar el cumplimiento y evitar riesgos"],"c":2,"e":"La afirmaci\u00f3n falsa es la B. El ejercicio f\u00edsico puede prescribirse a <b>pr\u00e1cticamente todos los pacientes mayores</b>, independientemente de su situaci\u00f3n funcional, adaptando la intensidad y modalidad. Los programas <b>multicomponente</b> (aer\u00f3bico + resistencia + equilibrio + flexibilidad) son los que han demostrado mayor eficacia para revertir fragilidad. La individualizaci\u00f3n es clave pero no justifica la exclusi\u00f3n de pacientes."}],"vgi":[{"n":"10","noShuffle":true,"img":null,"q":"\u00bfCu\u00e1ndo hay que realizar el \u00edndice de Barthel a una paciente de 88 a\u00f1os que ingresa por neumon\u00eda aspirativa?","o":["Todas son correctas","Barthel basal","Barthel al ingreso en el hospital","Barthel al alta hospitalaria"],"c":1,"e":"La respuesta correcta es que <b>todas las situaciones son correctas</b>. El Barthel debe realizarse en tres momentos clave: (1) <b>Basal</b> (situaci\u00f3n funcional previa al ingreso, referencia para objetivos), (2) <b>Al ingreso</b> (situaci\u00f3n real en el momento del ingreso, cuantifica el impacto de la enfermedad aguda), y (3) <b>Al alta</b> (para valorar la recuperaci\u00f3n funcional, planificar destino y rehabilitaci\u00f3n). Los tres son imprescindibles en geriatr\u00eda."},{"n":"11","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes escalas utilizar\u00edas para realizar el cribado de deterioro cognitivo?","o":["Test de Pfeiffer","\u00cdndice de Barthel","\u00cdndice de Lawton y Brody","Test de Tinetti"],"c":1,"e":"El <b>Test de Pfeiffer (SPMSQ)</b> es el instrumento de cribado cognitivo m\u00e1s utilizado en geriatr\u00eda por su rapidez (10 preguntas). El Barthel eval\u00faa <b>actividades b\u00e1sicas de la vida diaria</b> (ABVD). El Lawton y Brody eval\u00faa <b>actividades instrumentales</b> (AIVD). El Tinetti eval\u00faa <b>marcha y equilibrio</b> (riesgo de ca\u00eddas). Para cognici\u00f3n: Pfeiffer (cribado) o MEC/MMSE (evaluaci\u00f3n m\u00e1s completa)."},{"n":"12","noShuffle":false,"img":null,"q":"El test de velocidad de la marcha:","o":["Se considera lenta si es menor de 0,8 m/s","Se considera lenta si es mayor de 0,8 m/s","Se considera lenta si es mayor de 8 m/s","Se considera lenta si es menor de 8 m/s"],"c":1,"e":"La velocidad de marcha se considera <b>patol\u00f3gicamente lenta por debajo de 0,8 m/s</b> (algunos estudios utilizan 1 m/s como umbral). Es uno de los 5 criterios de fragilidad de Fried y tambi\u00e9n forma parte del SPPB. Una velocidad &lt;0,8 m/s se asocia a mayor riesgo de ca\u00eddas, hospitalizaci\u00f3n, institucionalizaci\u00f3n y mortalidad. Se mide recorriendo 4 metros a paso habitual."},{"n":"13","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de estos tipos de pacientes tiene mayor capacidad intr\u00ednseca?","o":["Paciente Geri\u00e1trico","Paciente Robusto","Paciente Mayor Enfermo","Paciente Fr\u00e1gil"],"c":2,"e":"La <b>capacidad intr\u00ednseca</b> (OMS) es el conjunto de capacidades f\u00edsicas y mentales del individuo. El <b>Paciente Robusto</b> tiene la mayor capacidad intr\u00ednseca: conserva su reserva homeost\u00e1tica, tolera bien los agentes estresores y se recupera sin deterioro residual. El paciente fr\u00e1gil tiene capacidad reducida, el mayor enfermo tiene patolog\u00eda pero puede conservarla relativamente, y el geri\u00e1trico tiene la mayor complejidad y menor reserva."},{"n":"14","noShuffle":false,"img":null,"q":"Un paciente con \u00cdndice de Barthel de 80/100 tiene una dependencia:","o":["Moderada","Leve","Grave","Total"],"c":2,"e":"Clasificaci\u00f3n del \u00cdndice de Barthel: 100 = independiente; 91-99 = dependencia m\u00ednima; <b>61-90 = dependencia leve</b>; 41-60 = dependencia moderada; 21-40 = dependencia grave/severa; \u226420 = dependencia total. Un Barthel de 80 corresponde a <b>dependencia leve</b>: el paciente realiza la mayor\u00eda de las ABVD pero necesita ayuda en algunas actividades concretas."},{"n":"15","noShuffle":false,"img":null,"q":"La Valoraci\u00f3n Geri\u00e1trica Integral se obtiene mediante:","o":["Una valoraci\u00f3n multidimensional de las \u00e1reas cl\u00ednica, funcional, cognitiva, emocional, nutricional y s\u00edndromes geri\u00e1tricos","Una simple anal\u00edtica","No es necesario evaluar la existencia de s\u00edndromes geri\u00e1tricos","Solo es \u00fatil si el paciente es fr\u00e1gil"],"c":1,"e":"La <b>Valoraci\u00f3n Geri\u00e1trica Integral (VGI)</b> es una evaluaci\u00f3n multidimensional estructurada que incluye: <b>\u00e1rea cl\u00ednica</b> (pluripatolog\u00eda, polifarmacia), <b>funcional</b> (Barthel, Lawton), <b>cognitiva</b> (Pfeiffer, MMSE), <b>emocional</b> (Yesavage), <b>nutricional</b> (MNA) y <b>s\u00edndromes geri\u00e1tricos</b> (ca\u00eddas, \u00falceras, delirium). Es \u00fatil en cualquier paciente mayor, no solo en los fr\u00e1giles, y permite tomar decisiones individualizadas."},{"n":"16","noShuffle":false,"img":null,"q":"Se\u00f1ale la respuesta incorrecta respecto a qu\u00e9 escala es la m\u00e1s utilizada para medir capacidad funcional para actividades b\u00e1sicas de la vida diaria:","o":["Lawton y Brody","Barthel","Pfeiffer","SPPB"],"c":1,"e":"El <b>\u00cdndice de Barthel</b> es la escala m\u00e1s utilizada para medir la capacidad funcional en <b>ABVD</b> (ba\u00f1arse, vestirse, aseo, alimentaci\u00f3n, traslados, deambulaci\u00f3n, escaleras, continencia). El <b>Lawton y Brody</b> mide las <b>AIVD</b> (actividades instrumentales: usar tel\u00e9fono, compras, cocinar, transporte...), m\u00e1s complejas. El Pfeiffer eval\u00faa cognici\u00f3n y el SPPB eval\u00faa rendimiento f\u00edsico."},{"n":"17","noShuffle":false,"img":null,"q":"Cu\u00e1l de los siguientes NO es un s\u00edndrome geri\u00e1trico:","o":["Ca\u00eddas","Demencia","Estre\u00f1imiento","V\u00e9rtigo"],"c":4,"e":"Los <b>s\u00edndromes geri\u00e1tricos</b> reconocidos incluyen: ca\u00eddas, delirium, deterioro cognitivo/demencia, incontinencia, \u00falceras por presi\u00f3n, malnutrici\u00f3n, depresi\u00f3n, fragilidad, sarcopenia, polifarmacia y estre\u00f1imiento (frecuente en mayores y con repercusi\u00f3n funcional). El <b>v\u00e9rtigo</b> es un s\u00edntoma/signo cl\u00ednico no incluido en las clasificaciones de s\u00edndromes geri\u00e1tricos como entidad independiente."},{"n":"18","noShuffle":false,"img":null,"q":"Un paciente de 90 a\u00f1os, tras un test de Pfeiffer obtiene puntuaci\u00f3n de 3. \u00bfCu\u00e1l es la respuesta correcta respecto a la evaluaci\u00f3n cognitiva en situaci\u00f3n aguda?","o":["En situaci\u00f3n aguda no es recomendable evaluar la situaci\u00f3n cognitiva; es preferible preguntar a familiares sobre su estado previo","Obtener una puntuaci\u00f3n de 3 significa que no tiene deterioro cognitivo","El test de Pfeiffer es \u00fatil para valorar la situaci\u00f3n emocional del paciente mayor","El test de Pfeiffer no es un instrumento habitual de la VGI"],"c":1,"e":"En situaci\u00f3n <b>aguda</b>, el rendimiento en el Pfeiffer puede estar distorsionado por el delirium o la propia enfermedad, no reflejando el estado cognitivo basal real. Por ello es preferible <b>recabar informaci\u00f3n de familiares sobre el estado cognitivo previo</b>. Puntuaci\u00f3n 3 en Pfeiffer = deterioro cognitivo leve (no equivale a normalidad). El Pfeiffer eval\u00faa cognici\u00f3n (no emoci\u00f3n) y S\u00cd es parte habitual de la VGI."}],"casos":[{"n":"19","noShuffle":false,"img":null,"q":"Antonio, 89 a\u00f1os, hipertenso, diab\u00e9tico, con IRC y antecedente de ictus hace 3 a\u00f1os. Ingresa por neumon\u00eda y acidosis respiratoria. \u00bfQu\u00e9 actitud le parece la m\u00e1s correcta?","o":["Ingreso en UCI","Ingreso en planta con medidas convencionales sea cual sea el pron\u00f3stico","Sedaci\u00f3n","Completar\u00eda una VGI para tomar decisiones y adecuar el esfuerzo terap\u00e9utico"],"c":4,"e":"La respuesta correcta es D. Ante un paciente pluripatol\u00f3gico de 89 a\u00f1os, la decisi\u00f3n terap\u00e9utica no puede basarse en la edad cronol\u00f3gica ni en la patolog\u00eda aguda aislada. La <b>VGI permite conocer la situaci\u00f3n funcional basal, cognitiva y el pron\u00f3stico</b> para <b>adecuar el esfuerzo terap\u00e9utico</b>: puede que proceda UCI, planta o confort, pero siempre tras una evaluaci\u00f3n individualizada. El ingreso en UCI o la sedaci\u00f3n sin evaluaci\u00f3n previa ser\u00edan decisiones prematuras."},{"n":"20","noShuffle":false,"img":null,"q":"Se presenta un paciente con p\u00e9rdida de memoria de 6 meses de evoluci\u00f3n. Se\u00f1ale la respuesta incorrecta:","o":["Realizar\u00eda una Valoraci\u00f3n Geri\u00e1trica Integral","Si presenta alteraciones en funciones ejecutivas probablemente se trate de una demencia","Dentro de la evaluaci\u00f3n cognitiva realizar\u00eda un test de Pfeiffer y un MMSE","En caso de tratarse de una demencia, a\u00f1adir\u00eda un f\u00e1rmaco anticolin\u00e9rgico para enlentecer el proceso"],"c":4,"e":"La respuesta incorrecta es D. Los <b>f\u00e1rmacos anticolin\u00e9rgicos est\u00e1n CONTRAINDICADOS en la demencia</b>: bloquean la acetilcolina, el neurotransmisor deficitario en la enfermedad de Alzheimer, empeorando la funci\u00f3n cognitiva. El tratamiento farmacol\u00f3gico de la demencia son los <b>inhibidores de la acetilcolinesterasa</b> (donepezilo, rivastigmina, galantamina), que aumentan la disponibilidad de acetilcolina. Las opciones A, B y C son correctas."},{"n":"21","noShuffle":false,"img":null,"q":"Paciente de 96 a\u00f1os con sepsis urinaria, inestabilidad hemodin\u00e1mica y fracaso respiratorio. \u00bfCu\u00e1l es la primera medida a adoptar?","o":["Ingreso en UCI para iniciar drogas vasoactivas y ventilaci\u00f3n mec\u00e1nica","Informar de la gravedad a familiares y adoptar todas las medidas posibles en sala asumiendo posible mala evoluci\u00f3n","Aplicar sedaci\u00f3n terminal si presenta signos de sufrimiento cl\u00ednico","Hablar con los familiares para recabar una VGI que permita decidir qu\u00e9 intensidad terap\u00e9utica aplicar"],"c":4,"e":"La D es la actitud correcta. <b>La edad no es criterio de exclusi\u00f3n de UCI</b>, pero tampoco es criterio de ingreso autom\u00e1tico. En un paciente de 96 a\u00f1os con sepsis grave, la <b>VGI previa es imprescindible</b> para conocer situaci\u00f3n funcional basal, voluntades anticipadas y pron\u00f3stico realista antes de decidir la intensidad terap\u00e9utica. La sedaci\u00f3n terminal (C) solo est\u00e1 indicada en situaci\u00f3n de agon\u00eda con sufrimiento refractario, no como primera medida ante una sepsis potencialmente tratable."},{"n":"22","noShuffle":false,"img":null,"q":"Paciente de 87 a\u00f1os con ca\u00eddas recurrentes y polifarmacia vasodilatadora para HTA. PA sist\u00f3lica 105 mmHg. \u00bfQu\u00e9 medida NO es necesario adoptar en primera consulta?","o":["Electrocardiograf\u00eda de 12 derivaciones","Evaluaci\u00f3n neurol\u00f3gica","Estudio anal\u00edtico","PA sist\u00f3lica 105 mmHg: retirar\u00eda f\u00e1rmacos hipotensores"],"c":1,"e":"El ECG no es estrictamente necesario en la primera consulta cuando la causa de las ca\u00eddas es claramente <b>farmacol\u00f3gica-hipotensora</b> (PA 105 + vasodilatadores). Las medidas prioritarias son: evaluaci\u00f3n neurol\u00f3gica (marcha, equilibrio, focalidad), anal\u00edtica (descartar causas reversibles) y <b>deprescripci\u00f3n de hipotensores</b> que causan hipotensi\u00f3n ortost\u00e1tica. El ECG puede complementar el estudio posteriormente si persisten dudas sobre causa cardiol\u00f3gica."},{"n":"23","noShuffle":false,"img":null,"q":"Paciente de 87 a\u00f1os con deterioro cognitivo de 15 d\u00edas de evoluci\u00f3n, curso fluctuante. M\u00faltiples comorbilidades. \u00bfCu\u00e1l es la respuesta correcta?","o":["Posiblemente presente un diagn\u00f3stico oculto que se est\u00e9 manifestando como un delirium","Presenta un cuadro de demencia","Pedir\u00eda como primera medida un TAC cerebral urgente","Le dir\u00eda a la familia que es normal porque ya es muy mayor"],"c":1,"e":"El <b>inicio agudo y el curso fluctuante</b> son las caracter\u00edsticas definitorias del <b>delirium</b>, no de la demencia (que es cr\u00f3nica y progresiva). El delirium casi siempre tiene una <b>causa subyacente tratable</b> (infecci\u00f3n, retenci\u00f3n urinaria, f\u00e1rmacos, alteraci\u00f3n metab\u00f3lica). La actitud correcta es identificar y tratar esa causa. El TAC no es la primera medida salvo sospecha de patolog\u00eda estructural. El deterioro nunca es 'normal'."},{"n":"24","noShuffle":false,"img":null,"q":"Paciente de 93 a\u00f1os con fractura subcapital de cadera derecha tras ca\u00edda. \u00bfCu\u00e1l es la actitud inicial m\u00e1s correcta?","o":["Es muy mayor: sedaci\u00f3n","Completar VGI, profilaxis de s\u00edndromes geri\u00e1tricos (especialmente delirium), estabilizar y realizar intervenci\u00f3n quir\u00fargica preferiblemente en las primeras 48 horas","Realizar\u00eda un test de Barthel para conocer su situaci\u00f3n cognitiva","Retirar\u00eda f\u00e1rmacos hipotensores y sedantes porque probablemente causaron la ca\u00edda"],"c":2,"e":"La B es la respuesta correcta. En fractura de cadera en el anciano, la cirug\u00eda en las <b>primeras 24-48 horas</b> reduce la mortalidad y las complicaciones. Pero antes es imprescindible la <b>VGI</b> para conocer el estado basal y tomar decisiones, junto con la <b>profilaxis activa de delirium</b> (orientaci\u00f3n, movilizaci\u00f3n precoz, hidrataci\u00f3n, evitar f\u00e1rmacos de riesgo), que aparece en el 30-60% de los ancianos con fractura de cadera. El Barthel mide funci\u00f3n, no cognici\u00f3n (C incorrecta)."},{"n":"25","noShuffle":false,"img":null,"q":"Marcel R\u00e9my tiene 99 a\u00f1os y escala una v\u00eda vertical de 16 metros en un roc\u00f3dromo. Se\u00f1ale la FALSA:","o":["Si Marcel necesitara una cirug\u00eda valvular a\u00f3rtica, probablemente se la practicar\u00eda","La capacidad intr\u00ednseca de Marcel es muy baja","La edad biol\u00f3gica de Marcel es inferior a su edad cronol\u00f3gica","A pesar de su excelente capacidad intr\u00ednseca, considerar\u00eda a Marcel un paciente fr\u00e1gil por superar los 80 a\u00f1os"],"c":2,"e":"La afirmaci\u00f3n falsa es la B. Marcel, con 99 a\u00f1os escalando v\u00edas verticales, tiene una <b>capacidad intr\u00ednseca extraordinariamente alta</b>, no baja. Su edad biol\u00f3gica es muy inferior a su edad cronol\u00f3gica (C correcta). Si precisara cirug\u00eda, su excelente reserva funcional la har\u00eda planteable (A correcta). La D tambi\u00e9n es falsa (la fragilidad no se define por la edad cronol\u00f3gica), pero la m\u00e1s flagrantemente incorrecta es la B dado el contexto cl\u00ednico descrito."}],"demo":[{"n":"26","noShuffle":false,"img":null,"q":"El envejecimiento de la poblaci\u00f3n (se\u00f1ale la falsa):","o":["Es un proceso din\u00e1mico, progresivo e irreversible","La media de ambos sexos de esperanza de vida actual se sit\u00faa en 78 a\u00f1os","Aproximadamente 3 de cada 4 pacientes en el entorno sanitario ser\u00e1n mayores de 65 a\u00f1os, salvo pediatr\u00eda o ginecolog\u00eda","Todas las especialidades, salvo excepciones, atender\u00e1n mayoritariamente a pacientes mayores"],"c":2,"e":"La afirmaci\u00f3n falsa es la B. La <b>esperanza de vida en Espa\u00f1a se sit\u00faa en torno a los 83 a\u00f1os</b> (una de las m\u00e1s altas del mundo), no en 78. La cifra de 78 corresponde a d\u00e9cadas anteriores o a medias globales menos favorables. Las dem\u00e1s afirmaciones son correctas: el envejecimiento es progresivo e irreversible, los mayores de 65 representan la mayor\u00eda de la demanda asistencial en casi todas las especialidades."},{"n":"27","noShuffle":false,"img":null,"q":"Respecto al envejecimiento demogr\u00e1fico, se\u00f1ale la respuesta incorrecta:","o":["Es un proceso progresivo que va a seguir aumentando","Se estima que Espa\u00f1a ser\u00e1 el pa\u00eds m\u00e1s envejecido del mundo en 2040","3 de cada 4 pacientes que contactan con el sistema sanitario son mayores de 70 a\u00f1os","La edad cronol\u00f3gica es el dato m\u00e1s importante en la toma de decisiones en el paciente mayor"],"c":4,"e":"La respuesta incorrecta es la D. La <b>edad cronol\u00f3gica NO es el par\u00e1metro m\u00e1s relevante</b> para la toma de decisiones cl\u00ednicas en geriatr\u00eda. Lo que determina las decisiones es la <b>edad biol\u00f3gica</b>, determinada por la capacidad funcional, cognitiva y el estado nutricional (VGI). Dos pacientes de 85 a\u00f1os pueden tener pron\u00f3sticos y necesidades radicalmente distintos. Basar las decisiones en la fecha de nacimiento lleva a errores tanto de sobretratamiento como de infratratamiento."},{"n":"28","noShuffle":false,"img":null,"q":"Se\u00f1ale la respuesta incorrecta respecto a edad cronol\u00f3gica y biol\u00f3gica:","o":["La edad cronol\u00f3gica viene reflejada por la fecha de nacimiento y la biol\u00f3gica por la capacidad intr\u00ednseca","La VGI nos ayuda a determinar cu\u00e1l es la edad biol\u00f3gica del individuo","Cualquiera de los dos par\u00e1metros, cronol\u00f3gico o biol\u00f3gico, es igualmente \u00fatil en la toma de decisiones en el paciente mayor","La edad cronol\u00f3gica y biol\u00f3gica suelen no coincidir"],"c":3,"e":"La respuesta incorrecta es la C. Los dos par\u00e1metros <b>no son igualmente \u00fatiles</b>: la <b>edad biol\u00f3gica</b> (capacidad funcional, reserva homeost\u00e1tica, determinada mediante VGI) es la que debe guiar las decisiones cl\u00ednicas. La edad cronol\u00f3gica por s\u00ed sola tiene escaso valor predictivo individual. Usar la fecha de nacimiento como criterio principal genera inequidad y decisiones err\u00f3neas. La VGI es precisamente la herramienta para determinar esa edad biol\u00f3gica."}]};
var IMGS=/*__IMGS_JSON__*/{};

/* ── Estado ── */
var canSave=typeof localStorage!=='undefined';
var saved={};try{saved=JSON.parse(localStorage.getItem(KEY)||'null')||{};}catch(e){}
var state   =saved.state   ||{};
var qOrd    =saved.qOrd    ||{};
var oOrd    =saved.oOrd    ||{};
var starred =saved.starred ||{};
var failHist=saved.failHist||{};  // {qid: count} entre sesiones
var darkMode=saved.dark    ||false;
var timerSec=saved.timerSec||0;   // segundos configurados
var SECS=Object.keys(META.secciones||{});
var fFailed={};
var qIdx={};           // {sec: {n: q}}
var qNums={};          // {sec: {n: numero_correlativo}}
var allOrder=null;     // orden mezclado inter-secciones para pestaña Todos
var activeCid=null;
var currentTab='all';
var currentMode='test';
var saveTimer=null;
var starsFilter=false;
var statsVisible=false;
var timerRunning=false;
var timerRemaining=timerSec;
var timerInterval=null;

/* ── INIT ── */
(function init(){
  SECS.forEach(function(s){fFailed[s]=false;});
  injectSecCSS();
  buildHeader();
  buildTabs();
  buildPanels();
  buildIdx();
  buildNums();
  buildAllOrder();
  SECS.forEach(render);
  renderAll();
  updateScores();
  updateProg();
  applyTheme();
  initTimer();
  setBadge(canSave?'Guardado':'Sin guardado',canSave?'ok':'warn');
  document.addEventListener('keydown',handleKey);
  var si=document.getElementById('search-input');
  if(si)si.addEventListener('keydown',function(e){if(e.key==='Escape'){clearSearch();}});
})();

/* ── CSS dinámico ── */
function injectSecCSS(){
  var css='';
  SECS.forEach(function(s){
    var m=META.secciones[s]||{};
    var c=m.color||'#1a56db',cd=m.colorDim||'#e8f0fe';
    css+='.tab.t-'+s+'.on{background:'+cd+';color:'+c+';border-color:'+c+'}\n';
    css+='.ph.s-'+s+'{border-left:4px solid '+c+'}\n';
    // Variables CSS por sección para el badge coloreado
    css+='#panel-'+s+' .qnum.sec-colored{background:'+cd+';color:'+c+'}\n';
  });
  var st=document.createElement('style');st.textContent=css;document.head.appendChild(st);
}

/* ── Header ── */
function buildHeader(){
  var total=SECS.reduce(function(a,s){return a+(D[s]?D[s].length:0);},0);
  var t=document.getElementById('h-tit');if(t)t.textContent=META.titulo||'Banco MIR';
  var pt=document.getElementById('page-title');if(pt)pt.textContent=META.titulo||'Banco MIR';
  var m=document.getElementById('h-meta');
  if(m){var p=[];if(total)p.push(total+' preguntas');if(META.examen)p.push(META.examen);m.textContent=p.join(' · ');}
  var d=document.getElementById('ph-gdesc');if(d)d.textContent=META.subtitulo||'';
  var r=document.getElementById('sc-rem-all');if(r)r.textContent='○ '+total;
}

/* ── Tabs ── */
function buildTabs(){
  var total=SECS.reduce(function(a,s){return a+(D[s]?D[s].length:0);},0);
  var h='<button class="tab t-all on" onclick="showTab(\'all\')">📋 Todos ('+total+')</button>';
  SECS.forEach(function(s){
    var m=META.secciones[s]||{},cnt=D[s]?D[s].length:0;
    h+='<button class="tab t-'+s+'" onclick="showTab(\''+s+'\')">'+(m.emoji?m.emoji+' ':'')+escH(m.label||s)+' ('+cnt+')</button>';
  });
  var w=document.getElementById('tabs-wrap');if(w)w.innerHTML=h;
}

/* ── Paneles ── */
function buildPanels(){
  var h='<div id="panel-all" class="sec-panel visible"><div id="qs-all"></div><div class="no-results" id="nr-all">No se encontraron preguntas</div></div>';
  SECS.forEach(function(s){
    var m=META.secciones[s]||{},cnt=D[s]?D[s].length:0;
    h+='<div id="panel-'+s+'" class="sec-panel">';
    h+='<div class="ph s-'+s+'">';
    h+='<div class="ph-left">';

    if(m.desc)h+='<span class="ph-desc">'+escH(m.desc)+'</span>';
    h+='<div class="score-row">';
    h+='<span class="sc ok" id="sc-ok-'+s+'">✓ 0</span>';
    h+='<span class="sc ko" id="sc-ko-'+s+'">✗ 0</span>';
    h+='<span class="sc rem" id="sc-rem-'+s+'">○ '+cnt+'</span>';
    h+='</div></div>';
    h+='<button class="fbtn" id="fb-'+s+'" onclick="toggleFail(\''+s+'\')">Solo falladas</button>';
    h+='</div>';
    h+='<div id="qs-'+s+'"></div>';
    h+='<div class="no-failed" id="nf-'+s+'">Aún no has fallado ninguna 🎉</div>';
    h+='<div class="no-results" id="nr-'+s+'">No se encontraron preguntas</div>';
    h+='<div class="sec-actions">';
    h+='<button class="reset-btn" onclick="resetSec(\''+s+'\')">↺ Reiniciar</button>';
    h+='<button class="nota-btn" onclick="calcNota(\''+s+'\')">✎ Calcular nota</button>';
    h+='</div>';
    h+='<div class="nota-box" id="nota-'+s+'"></div>';
    h+='</div>';
  });
  var pw=document.getElementById('panels-wrap');if(pw)pw.innerHTML=h;
}

/* ── Índice O(1) + numeración fija ── */
function buildIdx(){
  SECS.forEach(function(s){
    qIdx[s]={};
    if(D[s])D[s].forEach(function(q){qIdx[s][q.n]=q;});
  });
}
function buildNums(){
  // Numeración correlativa fija: 1, 2, 3... por sección
  SECS.forEach(function(s){
    qNums[s]={};
    if(D[s])D[s].forEach(function(q,i){qNums[s][q.n]=i+1;});
  });
}
function getNum(sec,n){return qNums[sec]?qNums[sec][n]||n:n;}
function findQ(qid){
  var d=qid.indexOf('-'),s=qid.substring(0,d),n=qid.substring(d+1);
  return(qIdx[s]&&qIdx[s][n])||null;
}
function getSecFromQid(qid){return qid.substring(0,qid.indexOf('-'));}
function getNFromQid(qid){return qid.substring(qid.indexOf('-')+1);}

/* ── Orden inter-secciones para Todos ── */
function buildAllOrder(){
  var all=[];
  SECS.forEach(function(s){if(D[s])D[s].forEach(function(q){all.push({sec:s,n:q.n});});});
  if(!qOrd['__all__'])qOrd['__all__']=shuffle(all.map(function(x){return x.sec+'|'+x.n;}));
  allOrder=qOrd['__all__'].map(function(key){
    var p=key.indexOf('|'),sec=key.substring(0,p),n=key.substring(p+1);
    return{sec:sec,n:n,q:qIdx[sec]&&qIdx[sec][n]};
  }).filter(function(x){return x.q;});
}

/* ── Utilidades ── */
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function getQOrd(s,qs){if(!qOrd[s])qOrd[s]=shuffle(qs.map(function(q){return q.n;}));return qOrd[s];}
function getOOrd(qid){
  var q=findQ(qid);var n=q&&q.o?q.o.length:4;
  if(q&&q.noShuffle){var a=[];for(var i=0;i<n;i++)a.push(i);return a;}
  if(!oOrd[qid]){var a=[];for(var i=0;i<n;i++)a.push(i);oOrd[qid]=shuffle(a);}
  return oOrd[qid];
}
function imgHtml(key){
  if(!IMGS[key]){console.warn('IMGS: clave no encontrada →',key);return'';}
  return'<div class="clinimg-wrap"><img src="'+IMGS[key]+'" class="clinimg" alt="Imagen clínica" loading="lazy"><div class="clinimg-cap">Imagen clínica</div></div>';
}

/* ── localStorage debounce ── */
function saveLocal(){
  if(!canSave)return;
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    try{
      localStorage.setItem(KEY,JSON.stringify({state:state,qOrd:qOrd,oOrd:oOrd,starred:starred,failHist:failHist,dark:darkMode,timerSec:timerSec}));
      setBadge('Guardado','ok');
    }catch(e){setBadge('Sin guardado','warn');}
  },300);
}
function setBadge(t,c){var b=document.getElementById('save-badge');if(b){b.textContent=t;b.className='sbadge '+c;}}

/* ── Construcción de tarjeta ── */
function buildCard(q,sec,inAll,allPos){
  var qid=sec+'-'+q.n;
  var cid=(inAll?'A-':'S-')+qid;
  var num=inAll?(allPos+1):getNum(sec,q.n);
  var oo=getOOrd(qid);
  var sOpts=oo.map(function(i){return q.o[i];});
  var nc=oo.indexOf(q.c-1)+1;
  var ans=state[qid];
  var cc=ans?(ans.r?' answered-ok':' answered-wrong'):'';
  var badgeCls='qnum'+(inAll?'':' sec-colored');
  var h='<div class="qcard s-'+sec+cc+'" id="card-'+cid+'">';
  h+='<div class="qhead" id="h-'+cid+'" data-cid="'+cid+'" data-qid="'+qid+'" data-sec="'+sec+'" onclick="tog(this.dataset.cid)">';
  h+='<span class="'+badgeCls+'">'+num+'</span>';
  h+='<span class="qtxt">'+q.q+(ans?'<span class="atag '+(ans.r?'ok':'ko')+'">'+(ans.r?'✓ acertada':'✗ fallada')+'</span>':'')+'</span>';
  h+='<button class="star-btn'+(starred[qid]?' on':'')+'\" id="star-'+cid+'" onclick="event.stopPropagation();toggleStar(\''+qid+'\')" title="Marcar (S)"><span class="si">\u2606</span><span class="sf">\u2605</span></button>';
  h+='<span class="chev">▾</span>';
  h+='</div>';
  h+='<div class="qbody" id="b-'+cid+'">';
  if(q.img)h+=imgHtml(q.img);
  if(currentMode==='quick'){
    h+='<div class="quick-card"><div class="quick-rc">✓ Respuesta correcta: opción '+nc+' — '+escH(q.o[q.c-1])+'</div><div class="expbox">'+q.e+'</div></div>';
  } else {
    h+='<ul class="opts" id="opts-'+cid+'">';
    h+=sOpts.map(function(o,i){
      var p=i+1,oc='opt';
      if(ans){oc+=' done';if(p===nc)oc+=' correct';else if(p===ans.c&&!ans.r)oc+=' wrong';}
      return'<li class="'+oc+'" data-qid="'+qid+'" data-pos="'+p+'" data-sec="'+sec+'" onclick="answer(this.dataset.qid,+this.dataset.pos,this.dataset.sec)"><span class="onum">'+p+'.</span><span>'+o+'</span></li>';
    }).join('');
    h+='</ul>';
    if(ans){h+='<div class="expbox"><span class="et">'+(ans.r?'✓ Correcto':'✗ Incorrecto — Respuesta correcta: opción '+nc)+'</span>'+q.e+'</div>';}
  }
  h+='</div></div>';
  return h;
}

/* ── Render sección ── */
function render(sec){
  var qs=D[sec];if(!qs)return;
  var ord=getQOrd(sec,qs);
  var sorted=ord.map(function(n){return qIdx[sec]&&qIdx[sec][n];}).filter(Boolean);
  var el=document.getElementById('qs-'+sec);
  if(el)el.innerHTML=sorted.map(function(q){return buildCard(q,sec,false,0);}).join('');
}

/* ── Render Todos (mezcla inter-secciones) ── */
function renderAll(){
  if(!allOrder)buildAllOrder();
  var el=document.getElementById('qs-all');
  if(el)el.innerHTML=allOrder.map(function(x,i){return buildCard(x.q,x.sec,true,i);}).join('');
}

/* ── Toggle open/close ── */
function tog(cid){
  var b=document.getElementById('b-'+cid),h=document.getElementById('h-'+cid);
  if(!b||!h)return;
  var opening=!b.classList.contains('open');
  b.classList.toggle('open');h.classList.toggle('open');
  if(opening){
    if(activeCid&&activeCid!==cid){var pc=document.getElementById('card-'+activeCid);if(pc)pc.classList.remove('kb-focus');}
    activeCid=cid;
    var card=document.getElementById('card-'+cid);if(card)card.classList.add('kb-focus');
  }else{
    if(activeCid===cid){activeCid=null;var card=document.getElementById('card-'+cid);if(card)card.classList.remove('kb-focus');}
  }
}

/* ── Responder ── */
function answer(qid,pos,sec){
  if(state[qid])return;
  var q=findQ(qid);if(!q)return;
  var oo=getOOrd(qid);
  var nc=oo.indexOf(q.c-1)+1;
  var isRight=pos===nc;
  state[qid]={c:pos,r:isRight};
  // Registro de errores
  if(!isRight){failHist[qid]=(failHist[qid]||0)+1;}
  saveLocal();
  // Actualizar todas las instancias del card (panel sección + panel all)
  // Actualizar opciones en todas las instancias del card
  ['A-'+qid,'S-'+qid].forEach(function(cid){
    var optsEl=document.querySelectorAll('#opts-'+cid+' .opt');
    optsEl.forEach(function(el,i){
      el.classList.add('done');
      if(i+1===nc)el.classList.add('correct');
      else if(i+1===pos&&!isRight)el.classList.add('wrong');
    });
    var bdy=document.getElementById('b-'+cid);
    if(bdy){
      var eb=bdy.querySelector('.expbox');
      if(!eb){eb=document.createElement('div');eb.className='expbox';bdy.appendChild(eb);}
      eb.innerHTML='<span class="et">'+(isRight?'✓ Correcto':'✗ Incorrecto — Respuesta correcta: opción '+nc)+'</span>'+q.e;
    }
    var hd=document.getElementById('h-'+cid);
    if(hd){var qt=hd.querySelector('.qtxt');if(qt&&!qt.querySelector('.atag')){var at=document.createElement('span');at.className='atag '+(isRight?'ok':'ko');at.innerHTML=isRight?'✓ acertada':'✗ fallada';qt.appendChild(at);}}
    var card=document.getElementById('card-'+cid);
    if(card)card.classList.add(isRight?'answered-ok':'answered-wrong');
  });
  updateScores();updateProg();
  if(fFailed[sec]&&isRight){
    var fcard=document.getElementById('card-S-'+qid);
    if(fcard)fcard.style.display='none';
    refreshNF(sec);
  }
}

/* ── Estrella ── */
function toggleStar(qid){
  starred[qid]=!starred[qid];
  ['A-'+qid,'S-'+qid].forEach(function(cid){
    var btn=document.getElementById('star-'+cid);
    if(btn)btn.classList.toggle('on',starred[qid]);
  });
  saveLocal();
}
function filterStarred(){
  starsFilter=!starsFilter;
  var btn=document.getElementById('btn-stars');
  if(btn){btn.style.background=starsFilter?'#fef3c7':'';btn.style.fontWeight=starsFilter?'700':'';}
  document.querySelectorAll('.qcard').forEach(function(card){
    if(starsFilter){
      var hd=card.querySelector('.qhead');
      var qid=hd?hd.dataset.qid:'';
      card.style.display=starred[qid]?'':'none';
    }else{card.style.display='';}
  });
}

/* ── Filtro falladas ── */
function refreshNF(sec){
  var c=document.getElementById('qs-'+sec);if(!c||!fFailed[sec])return;
  var n=c.querySelectorAll('.qcard.answered-wrong').length;
  var m=document.getElementById('nf-'+sec);if(m)m.classList.toggle('show',n===0);
}
function toggleFail(sec){
  fFailed[sec]=!fFailed[sec];
  var btn=document.getElementById('fb-'+sec);
  if(btn){btn.classList.toggle('on',fFailed[sec]);btn.textContent=fFailed[sec]?'← Ver todas':'Solo falladas';}
  var c=document.getElementById('qs-'+sec);if(!c)return;
  var nf=0;
  c.querySelectorAll('.qcard').forEach(function(card){
    if(fFailed[sec]){var show=card.classList.contains('answered-wrong');card.style.display=show?'':'none';if(show)nf++;}
    else{card.style.display='';}
  });
  var m=document.getElementById('nf-'+sec);if(m)m.classList.toggle('show',fFailed[sec]&&nf===0);
}

/* ── Scores y progreso ── */
function updateScores(){
  var tok=0,tok2=0,tok3=0;
  SECS.forEach(function(sec){
    var ok=0,ko=0;
    if(D[sec])D[sec].forEach(function(q){var a=state[sec+'-'+q.n];if(a){if(a.r)ok++;else ko++;}});
    var tot=D[sec]?D[sec].length:0,rem=tot-ok-ko;
    tok+=ok;tok2+=ko;tok3+=rem;
    var eok=document.getElementById('sc-ok-'+sec),eko=document.getElementById('sc-ko-'+sec),erm=document.getElementById('sc-rem-'+sec);
    if(eok)eok.textContent='✓ '+ok;if(eko)eko.textContent='✗ '+ko;if(erm)erm.textContent='○ '+rem;
  });
  var eok=document.getElementById('sc-ok-all'),eko=document.getElementById('sc-ko-all'),erm=document.getElementById('sc-rem-all');
  if(eok)eok.textContent='✓ '+tok;if(eko)eko.textContent='✗ '+tok2;if(erm)erm.textContent='○ '+tok3;
}
function updateProg(){
  var total=0,done=Object.keys(state).length;
  SECS.forEach(function(s){if(D[s])total+=D[s].length;});
  var pct=total>0?Math.round(done/total*100):0;
  var bar=document.getElementById('prog-bar');if(bar)bar.style.width=pct+'%';
}

/* ── Tabs ── */
function showTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  var tb=document.querySelector('.tab.t-'+t);if(tb)tb.classList.add('on');
  var mc=document.getElementById('main-cont');if(mc)mc.setAttribute('data-tab',t);
  var panelAll=document.getElementById('panel-all');
  if(panelAll)panelAll.classList.toggle('visible',t==='all');
  SECS.forEach(function(s){
    var p=document.getElementById('panel-'+s);
    if(p)p.classList.toggle('visible',t===s);
  });
  var gnb=document.getElementById('nota-all');if(gnb){gnb.style.display='none';gnb.className='global-nota-box';}
  clearSearch();
}

/* ── Reset ── */
function resetSec(sec){
  if(D[sec])D[sec].forEach(function(q){var qid=sec+'-'+q.n;delete state[qid];delete oOrd[qid];});
  delete qOrd[sec];fFailed[sec]=false;activeCid=null;
  var btn=document.getElementById('fb-'+sec);if(btn){btn.classList.remove('on');btn.textContent='Solo falladas';}
  var nb=document.getElementById('nota-'+sec);if(nb){nb.style.display='none';nb.className='nota-box';}
  saveLocal();render(sec);
  var m=document.getElementById('nf-'+sec);if(m)m.classList.remove('show');
  updateScores();updateProg();
  // Reconstruir panel all para reflejar cambios
  buildAllOrder();renderAll();
}
function resetAll(){
  Object.keys(state).forEach(function(k){delete state[k];});
  Object.keys(oOrd).forEach(function(k){delete oOrd[k];});
  Object.keys(qOrd).forEach(function(k){delete qOrd[k];});
  activeCid=null;starsFilter=false;allOrder=null;
  var bs=document.getElementById('btn-stars');if(bs){bs.style.background='';bs.style.fontWeight='';}
  SECS.forEach(function(s){
    fFailed[s]=false;
    var btn=document.getElementById('fb-'+s);if(btn){btn.classList.remove('on');btn.textContent='Solo falladas';}
    var nb=document.getElementById('nota-'+s);if(nb){nb.style.display='none';nb.className='nota-box';}
  });
  saveLocal();
  SECS.forEach(render);
  buildAllOrder();renderAll();
  var gnb=document.getElementById('nota-all');if(gnb){gnb.style.display='none';gnb.className='global-nota-box';}
  updateScores();updateProg();
}

/* ── Nota y revisión ── */
function buildRevList(sec){
  var qs=D[sec];if(!qs)return'';
  var failed=qs.filter(function(q){var a=state[sec+'-'+q.n];return a&&!a.r;});
  if(!failed.length)return'';
  var html='<div class="review-list"><div class="review-title">📋 '+failed.length+' pregunta'+(failed.length>1?'s':'')+' fallada'+(failed.length>1?'s':'')+' — repasa aquí:</div>';
  failed.forEach(function(q){
    var qid=sec+'-'+q.n;var oo=getOOrd(qid);var nc=oo.indexOf(q.c-1)+1;
    html+='<details class="review-item"><summary><span><b>'+getNum(sec,q.n)+'.</b> '+q.q+'</span></summary>';
    html+='<div class="review-body"><div class="review-ans">✓ Opción '+nc+': '+escH(q.o[q.c-1]||'')+'</div>';
    html+='<div class="expbox">'+q.e+'</div></div></details>';
  });
  return html+'</div>';
}
function calcNota(sec){
  var qs=D[sec];if(!qs)return;
  var total=qs.length,ok=0,ko=0,skip=0;
  qs.forEach(function(q){var a=state[sec+'-'+q.n];if(!a)skip++;else if(a.r)ok++;else ko++;});
  var nota=Math.max(0,(ok-ko/3)/total*10),str=nota.toFixed(2),pass=nota>=5;
  var box=document.getElementById('nota-'+sec);if(!box)return;
  box.className='nota-box '+(pass?'pass':'fail');
  box.innerHTML='<span class="nota-score">'+(pass?'✓':'✗')+' '+str+' / 10</span>'
    +'<div class="nota-detail">Aciertos: '+ok+' | Fallos: '+ko+' | Sin responder: '+skip+'<br>'
    +'('+ok+' − '+ko+'/3) / '+total+' × 10 = '+str+'</div>'
    +buildRevList(sec);
  box.style.display='block';
}
function calcNotaAll(){
  var total=0,ok=0,ko=0,skip=0;
  SECS.forEach(function(sec){
    var qs=D[sec];if(!qs)return;
    total+=qs.length;
    qs.forEach(function(q){var a=state[sec+'-'+q.n];if(!a)skip++;else if(a.r)ok++;else ko++;});
  });
  var nota=Math.max(0,(ok-ko/3)/total*10),str=nota.toFixed(2),pass=nota>=5;
  var box=document.getElementById('nota-all');if(!box)return;
  box.className='global-nota-box '+(pass?'pass':'fail');
  var html='<span class="nota-score">'+(pass?'✓':'✗')+' '+str+' / 10 (global)</span>'
    +'<div class="nota-detail">Aciertos: '+ok+' | Fallos: '+ko+' | Sin responder: '+skip+'<br>'
    +'('+ok+' − '+ko+'/3) / '+total+' × 10 = '+str+'</div>';
  SECS.forEach(function(sec){
    var rv=buildRevList(sec);
    if(rv){var m=META.secciones[sec]||{};html+='<div class="review-sec-label">'+(m.emoji?m.emoji+' ':'')+escH(m.label||sec)+'</div>'+rv;}
  });
  box.innerHTML=html;box.style.display='block';
}

/* ── Estadísticas de errores ── */
function toggleStats(){
  statsVisible=!statsVisible;
  var btn=document.getElementById('btn-stats');
  if(btn){btn.style.background=statsVisible?'var(--ko-bg)':'';btn.style.color=statsVisible?'var(--ko-t)':'';}
  var box=document.getElementById('stats-global');
  if(!box)return;
  if(!statsVisible){box.classList.remove('show');return;}
  var entries=Object.entries(failHist).filter(function(e){return e[1]>0;});
  if(!entries.length){box.innerHTML='<div class="stats-title">📊 Sin errores registrados todavía</div>';box.classList.add('show');return;}
  entries.sort(function(a,b){return b[1]-a[1];});
  var top=entries.slice(0,10);
  var maxV=top[0][1];
  var html='<div class="stats-title">📊 Preguntas más falladas (acumulado entre sesiones)</div>';
  top.forEach(function(e,i){
    var qid=e[0],count=e[1];
    var q=findQ(qid);if(!q)return;
    var sec=getSecFromQid(qid),n=getNFromQid(qid);
    var m=META.secciones[sec]||{};
    var pct=Math.round(count/maxV*100);
    html+='<div class="stats-item">';
    html+='<span class="stats-n" style="min-width:18px;color:var(--ko-t);font-weight:700">'+(i+1)+'.</span>';
    html+='<span class="stats-q">'+(m.emoji?m.emoji+' ':'')+getNum(sec,n)+'. '+q.q.substring(0,60)+(q.q.length>60?'…':'')+'</span>';
    html+='<div class="stats-bar-wrap"><div class="stats-bar" style="width:'+pct+'%"></div></div>';
    html+='<span class="stats-n">'+count+'✗</span>';
    html+='</div>';
  });
  box.innerHTML=html;box.classList.add('show');
}

/* ── Buscador ── */
function onSearch(val){
  var v=val.trim().toLowerCase();
  var clr=document.getElementById('search-clear');
  var cnt=document.getElementById('search-count');
  if(clr)clr.style.display=v?'block':'none';
  var found=0,total=0;
  document.querySelectorAll('.qcard').forEach(function(card){
    total++;
    if(!v){card.classList.remove('search-hidden');found++;}
    else{
      var qtxt=card.querySelector('.qtxt');
      var match=qtxt&&qtxt.textContent.toLowerCase().indexOf(v)!==-1;
      card.classList.toggle('search-hidden',!match);
      if(match)found++;
    }
  });
  if(cnt){
    if(v){cnt.textContent=found+' de '+total+' preguntas';cnt.style.display='block';}
    else{cnt.style.display='none';}
  }
  // Mostrar "sin resultados" por panel
  ['all'].concat(SECS).forEach(function(s){
    var panel=document.getElementById('panel-'+s);if(!panel||!panel.classList.contains('visible'))return;
    var cards=panel.querySelectorAll('.qcard:not(.search-hidden)');
    var nr=document.getElementById('nr-'+s);if(nr)nr.style.display=cards.length===0&&v?'block':'none';
  });
}
function clearSearch(){
  var si=document.getElementById('search-input');if(si)si.value='';
  onSearch('');
}

/* ── Modo ── */
function setMode(mode){
  currentMode=mode;
  document.getElementById('mode-test').classList.toggle('on',mode==='test');
  document.getElementById('mode-quick').classList.toggle('on',mode==='quick');
  // Rerenderizar todo
  SECS.forEach(render);renderAll();
}

/* ── Modo oscuro ── */
function applyTheme(){
  document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');
  var btn=document.getElementById('btn-dark');if(btn)btn.textContent=darkMode?'☀️':'🌙';
}
function toggleDark(){darkMode=!darkMode;applyTheme();saveLocal();}

/* ── Temporizador ── */
function initTimer(){
  timerRemaining=timerSec;
  renderTimer();
  var disp=document.getElementById('timer-display');
  if(disp){
    disp.addEventListener('click',function(){startEditTimer();});
  }
}
function fmtTime(s){
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return h+':'+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;
}
function renderTimer(){
  var disp=document.getElementById('timer-display');
  if(!disp)return;
  disp.textContent=fmtTime(timerRemaining);
  disp.classList.toggle('danger',timerSec>0&&timerRemaining===0);
}
function timerToggle(){
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('btn-tplay').textContent='▶';
  }else{
    if(timerRemaining<=0&&timerSec>0)timerRemaining=timerSec;
    timerRunning=true;
    document.getElementById('btn-tplay').textContent='⏸';
    timerInterval=setInterval(function(){
      if(timerRemaining>0){timerRemaining--;renderTimer();}
      else{clearInterval(timerInterval);timerRunning=false;document.getElementById('btn-tplay').textContent='▶';renderTimer();}
    },1000);
  }
}
function timerReset(){
  clearInterval(timerInterval);timerRunning=false;
  timerRemaining=timerSec;
  document.getElementById('btn-tplay').textContent='▶';
  renderTimer();
}
function startEditTimer(){
  var disp=document.getElementById('timer-display');if(!disp)return;
  if(timerRunning){timerToggle();}
  var old=fmtTime(timerRemaining);
  disp.contentEditable='true';disp.classList.add('editing');
  disp.textContent=old;
  disp.focus();
  var range=document.createRange();range.selectNodeContents(disp);
  var sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  function commit(){
    disp.contentEditable='false';disp.classList.remove('editing');
    var txt=disp.textContent.trim();
    var parts=txt.split(':').map(Number);
    var secs=0;
    if(parts.length===3)secs=parts[0]*3600+parts[1]*60+parts[2];
    else if(parts.length===2)secs=parts[0]*60+parts[1];
    else if(parts.length===1)secs=parts[0]*60;
    if(!isNaN(secs)&&secs>=0){timerSec=secs;timerRemaining=secs;saveLocal();}
    renderTimer();
  }
  disp.addEventListener('blur',commit,{once:true});
  disp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();disp.blur();}});
}

/* ── Helpers cid ── */
function cidToQid(cid){return cid.replace(/^[AS]-/,'');}

/* ── Teclado ── */
function handleKey(e){
  var tg=e.target.tagName;
  if(tg==='INPUT'||tg==='TEXTAREA'||e.target.contentEditable==='true')return;
  var k=e.key;
  if(k>='1'&&k<='5'){
    if(activeCid&&!state[cidToQid(activeCid)]){
      var aqid=cidToQid(activeCid);
      var pos=parseInt(k),q=findQ(aqid);
      if(q&&pos<=q.o.length){e.preventDefault();answer(aqid,pos,getSecFromQid(aqid));}
    }
  }else if(k==='ArrowDown'||k==='ArrowUp'){
    e.preventDefault();navigateQ(k==='ArrowDown'?1:-1);
  }else if(k==='s'||k==='S'){
    if(activeCid)toggleStar(cidToQid(activeCid));
  }
}
function navigateQ(dir){
  var cards=Array.from(document.querySelectorAll('.sec-panel.visible .qcard')).filter(function(c){return c.style.display!=='none'&&!c.classList.contains('search-hidden');});
  var cids=cards.map(function(c){return c.id.replace('card-','');});
  if(!cids.length)return;
  var idx=activeCid?cids.indexOf(activeCid):-1;
  var nidx=Math.max(0,Math.min(cids.length-1,idx+dir));
  var ncid=cids[nidx];if(!ncid||ncid===activeCid)return;
  if(activeCid){var ob=document.getElementById('b-'+activeCid);var oh=document.getElementById('h-'+activeCid);if(ob)ob.classList.remove('open');if(oh)oh.classList.remove('open');var oc=document.getElementById('card-'+activeCid);if(oc)oc.classList.remove('kb-focus');}
  activeCid=ncid;
  var nb=document.getElementById('b-'+ncid);var nh=document.getElementById('h-'+ncid);
  if(nb)nb.classList.add('open');if(nh)nh.classList.add('open');
  var nc2=document.getElementById('card-'+ncid);if(nc2){nc2.classList.add('kb-focus');nc2.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
</script>
