<!--
=============================================================
  MOTOR BANCO MIR — v10
  Novedades respecto a v9:
  - Numeración correlativa fija por sección (no se mezcla)
  - Badge neutro en pestaña "Todos" + mezcla real inter-secciones
  - Temporizador sticky editable en header (play/pausa/reset)
  - Buscador de texto en tiempo real
  - Modo repaso rápido (muestra RC + explicación directamente)
  - Estadísticas de errores recurrentes entre sesiones
=============================================================
-->
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">Banco MIR</title>
<style>
:root{
  --bg:#f4f3ef;--surf:#fff;--bd:#e5e5e5;--bd2:#ddd;
  --txt:#1a1a1a;--txt2:#555;--txt3:#999;--txt4:#666;
  --hdr:#1a1a1a;--hdr-t:#fff;
  --ok-bg:#e6f9ef;--ok-t:#0b6e52;--ok-bd:#2da060;
  --ko-bg:#fdecea;--ko-t:#b91c1c;--ko-bd:#d94f45;
  --sc-ok:#dcf5ed;--sc-ko:#fdecea;--sc-rem:#f0f0f0;--sc-rem-t:#666;
  --exp:#fffbe6;--exp-bd:#f0c04a;--exp-t:#5a4500;
  --prog:#e5e5e5;--prog-fill:#1a56db;
  --star:#ccc;--star-on:#f59e0b;
  --hint:#fafafa;--hint-bd:#eee;
  --tab-bd:#ddd;--tab-t:#555;
  --all-bg:#e8f0fe;--all-t:#1a56db;--all-bd:#1a56db;
  --fab:#1a1a1a;--fab-t:#fff;
  --nota-btn-t:#1a56db;--nota-btn-bd:#1a56db;--nota-btn-bg:var(--surf);
  --timer-bg:#222;--timer-t:#fff;--timer-danger:#ef4444;
}
[data-theme="dark"]{
  --bg:#0f0f1a;--surf:#1e1e30;--bd:#2a2a45;--bd2:#333355;
  --txt:#e8e8f0;--txt2:#aaa;--txt3:#555;--txt4:#888;
  --hdr:#0a0a14;--hdr-t:#e8e8f0;
  --ok-bg:#0b3020;--ok-t:#4ade80;--ok-bd:#166534;
  --ko-bg:#2d0a0a;--ko-t:#f87171;--ko-bd:#7f1d1d;
  --sc-ok:#0b3020;--sc-ko:#2d0a0a;--sc-rem:#252540;--sc-rem-t:#aaa;
  --exp:#1a1500;--exp-bd:#a37f10;--exp-t:#d4b84a;
  --prog:#2a2a45;--prog-fill:#60a5fa;
  --star:#444;--star-on:#f59e0b;
  --hint:#1a1a2e;--hint-bd:#2a2a45;
  --tab-bd:#2a2a45;--tab-t:#aaa;
  --all-bg:#1a2a4a;--all-t:#60a5fa;--all-bd:#3b82f6;
  --fab:#2a2a50;--fab-t:#e8e8f0;
  --nota-btn-t:#60a5fa;--nota-btn-bd:#3b82f6;--nota-btn-bg:var(--surf);
  --timer-bg:#1a1a2e;--timer-t:#e8e8f0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .25s,color .25s}

/* ── Header ── */
header{background:var(--hdr);color:var(--hdr-t);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
header h1{font-size:13.5px;font-weight:600;white-space:nowrap}
.hright{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hmeta{font-size:11px;color:#888}
.hbtn{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:3px 5px;border-radius:5px;transition:background .15s;color:var(--hdr-t)}
.hbtn:hover{background:rgba(255,255,255,.12)}
.sbadge{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:500}
.sbadge.ok{background:#15803d;color:#dcfce7}.sbadge.warn{background:#92400e;color:#fef3c7}

/* ── Temporizador ── */
#timer-wrap{display:flex;align-items:center;gap:4px;background:var(--timer-bg);border-radius:7px;padding:3px 8px;border:1px solid rgba(255,255,255,.1)}
#timer-display{font-size:13px;font-weight:700;font-family:monospace;color:var(--timer-t);min-width:58px;text-align:center;cursor:pointer;border-radius:3px;padding:1px 3px}
#timer-display:hover{background:rgba(255,255,255,.08)}
#timer-display.editing{background:rgba(255,255,255,.15);outline:none;color:var(--timer-t)}
#timer-display.danger{color:var(--timer-danger)}
#timer-wrap button{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:12px;padding:1px 3px;border-radius:3px;line-height:1}
#timer-wrap button:hover{background:rgba(255,255,255,.12);color:#fff}

/* ── Barra de progreso ── */
#prog-wrap{height:3px;background:var(--prog);position:sticky;top:40px;z-index:99}
#prog-bar{height:100%;background:var(--prog-fill);width:0%;transition:width .4s}

/* ── Contenedor ── */
.container{max-width:820px;margin:0 auto;padding:16px 12px}

/* ── Buscador ── */
.search-wrap{position:relative;margin-bottom:13px}
.search-wrap input{width:100%;padding:8px 34px 8px 12px;border:1.5px solid var(--bd2);border-radius:8px;font-size:13px;background:var(--surf);color:var(--txt);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--prog-fill)}
.search-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--txt3);font-size:16px;display:none;line-height:1}
#search-count{font-size:11px;color:var(--txt3);margin-top:4px;display:none}

/* ── Modo repaso ── */
.mode-bar{display:flex;gap:6px;margin-bottom:12px;align-items:center}
.mode-btn{padding:5px 12px;border:1.5px solid var(--bd2);border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;background:var(--surf);color:var(--txt2);transition:all .15s}
.mode-btn:hover{border-color:#999}
.mode-btn.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Tabs ── */
.tabs{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.tab{padding:7px 14px;border:1.5px solid var(--tab-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;background:var(--surf);color:var(--tab-t);transition:all .15s}
.tab:hover{border-color:#999;color:var(--txt)}
.tab.t-all.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Score global ── */
.ph-global{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 15px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-left:4px solid var(--prog-fill)}
.score-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.sc{font-size:12px;font-weight:600;padding:3px 9px;border-radius:6px}
.sc.ok{background:var(--sc-ok);color:var(--ok-t)}.sc.ko{background:var(--sc-ko);color:var(--ko-t)}.sc.rem{background:var(--sc-rem);color:var(--sc-rem-t)}

/* ── Acciones ── */
.global-actions{display:none;margin-bottom:10px;gap:7px;flex-wrap:wrap;align-items:center}
.container[data-tab="all"] .global-actions{display:flex}
.sec-actions{margin:6px 0 15px;display:flex;gap:7px;flex-wrap:wrap}
.reset-btn{padding:7px 14px;background:var(--fab);color:var(--fab-t);border:none;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:opacity .15s}
.reset-btn:hover{opacity:.82}
.nota-btn{padding:7px 14px;background:var(--nota-btn-bg);color:var(--nota-btn-t);border:1.5px solid var(--nota-btn-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:background .15s}
.nota-btn:hover{background:var(--all-bg)}

/* ── Nota box ── */
.nota-box,.global-nota-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:2px solid var(--bd2);font-size:13px;line-height:1.7;display:none}
.nota-box.pass,.global-nota-box.pass{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t)}
.nota-box.fail,.global-nota-box.fail{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t)}
.nota-score{font-size:26px;font-weight:700;display:block;margin-bottom:4px}
.nota-detail{font-size:12px;opacity:.85;font-family:monospace}

/* ── Vista revisión ── */
.review-list{margin-top:12px;border-top:1px solid var(--bd2);padding-top:10px}
.review-title{font-size:12px;font-weight:700;margin-bottom:9px;color:var(--txt)}
.review-sec-label{font-size:11.5px;font-weight:700;color:var(--txt3);margin:8px 0 5px;padding-top:6px;border-top:1px solid var(--bd)}
.review-item{background:var(--surf);border-radius:8px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden}
.review-item summary{padding:9px 12px;cursor:pointer;font-size:12.5px;color:var(--txt);list-style:none;display:flex;gap:8px;align-items:flex-start}
.review-item summary::-webkit-details-marker{display:none}
.review-item summary::before{content:'▶';font-size:9px;color:var(--txt3);flex-shrink:0;margin-top:4px;transition:transform .18s}
details[open] summary::before{transform:rotate(90deg)}
.review-body{padding:0 12px 11px}
.review-ans{font-size:12px;color:var(--ok-t);margin-bottom:7px;font-weight:500}

/* ── Estadísticas ── */
.stats-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--surf);display:none}
.stats-box.show{display:block}
.stats-title{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--txt)}
.stats-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12.5px}
.stats-item:last-child{border-bottom:none}
.stats-bar-wrap{flex:1;background:var(--sc-rem);border-radius:4px;height:6px;overflow:hidden}
.stats-bar{height:100%;background:var(--ko-bd);border-radius:4px;transition:width .4s}
.stats-n{font-size:11px;color:var(--txt3);white-space:nowrap}
.stats-q{flex:2;color:var(--txt);font-size:12px;line-height:1.3}

/* ── Panel secciones ── */
.sec-panel{display:none}.sec-panel.visible{display:block}
.ph{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ph-left{flex:1;display:flex;flex-direction:column;gap:5px}
.ph-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:1px}
.ph-desc{font-size:12px;color:var(--txt4)}
.fbtn{padding:6px 12px;font-size:12px;font-weight:500;border:1.5px solid var(--bd2);border-radius:8px;cursor:pointer;background:var(--surf);color:var(--txt2);transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:#999;color:var(--txt)}.fbtn.on{background:var(--ko-bg);color:#b91c1c;border-color:#f87171}
.no-failed{display:none;text-align:center;padding:16px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin-top:4px}
.no-failed.show{display:block}
.no-results{display:none;text-align:center;padding:20px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin:8px 0}

/* ── Hint ── */
.hint{font-size:11px;color:var(--txt3);margin-bottom:15px;padding:7px 11px;background:var(--hint);border-radius:6px;border:1px solid var(--hint-bd)}

/* ── Tarjeta ── */
.qcard{background:var(--surf);border-radius:10px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden;transition:box-shadow .15s}
.qcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.qcard.kb-focus{outline:2px solid var(--prog-fill);outline-offset:-2px}
.qcard.search-hidden{display:none}
.qhead{padding:11px 13px;cursor:pointer;display:flex;align-items:flex-start;gap:9px}

/* ── Badge numérico ── */
.qnum{font-size:11px;font-weight:700;padding:3px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;background:var(--sc-rem);color:var(--sc-rem-t)}
/* En pestaña "Todos" siempre neutro; en sección aplica color de sección */
.qnum.sec-colored{background:var(--sec-dim);color:var(--sec-col)}

.qtxt{font-size:13px;line-height:1.5;flex:1}
.star-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--star);padding:0 2px;flex-shrink:0;margin-top:2px;line-height:1;transition:color .15s,transform .15s}
.star-btn:hover{transform:scale(1.2)}
.star-btn .si{display:inline}.star-btn .sf{display:none}
.star-btn.on .si{display:none}.star-btn.on .sf{display:inline;color:var(--star-on)}
.chev{font-size:15px;color:var(--bd2);flex-shrink:0;margin-top:2px;transition:transform .2s}
.qhead.open .chev{transform:rotate(180deg)}
.qbody{display:none;padding:0 13px 13px}.qbody.open{display:block}

/* ── Imagen ── */
.clinimg-wrap{margin:9px 0 7px;background:#111;border-radius:8px;overflow:hidden;border:1px solid var(--bd2);text-align:center}
.clinimg{max-width:100%;max-height:340px;object-fit:contain;display:block;margin:0 auto}
.clinimg-cap{font-size:11px;color:var(--txt3);padding:4px 0 5px;background:var(--hint);border-top:1px solid var(--bd)}

/* ── Opciones ── */
.opts{list-style:none;margin-top:9px;display:flex;flex-direction:column;gap:5px}
.opt{padding:9px 12px;border-radius:8px;border:1.5px solid var(--bd2);cursor:pointer;display:flex;align-items:flex-start;gap:9px;color:var(--txt);font-size:13px;line-height:1.45;transition:border-color .12s,background .12s;user-select:none}
.opt:hover:not(.done){border-color:#999;background:var(--hint)}
.opt.correct{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t);font-weight:500;cursor:default}
.opt.wrong{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t);cursor:default}
.opt.done:not(.correct):not(.wrong){cursor:default;opacity:.7}
.onum{font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;min-width:15px}

/* ── Modo repaso rápido ── */
.quick-card{padding:9px 12px;border-radius:8px;border:1.5px solid var(--ok-bd);background:var(--ok-bg);margin-top:8px}
.quick-rc{font-size:12.5px;font-weight:600;color:var(--ok-t);margin-bottom:6px}

/* ── Explicación ── */
.expbox{margin-top:10px;padding:10px 12px;background:var(--exp);border-left:4px solid var(--exp-bd);border-radius:0 8px 8px 0;font-size:12.5px;color:var(--exp-t);line-height:1.65}
.expbox b,.expbox strong{font-weight:600}
.et{display:block;margin-bottom:4px;font-weight:600;font-size:13px}
.atag{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
.atag.ok{background:var(--sc-ok);color:var(--ok-t)}.atag.ko{background:var(--sc-ko);color:#c0392b}

/* ── All-tab CSS ── */
.container[data-tab="all"] .ph{display:none!important}
.container[data-tab="all"] .sec-actions{display:none!important}
.container[data-tab="all"] .no-failed{display:none!important}
.container[data-tab="all"] .nota-box{display:none!important}
.container:not([data-tab="all"]) .global-nota-box{display:none!important}
.container:not([data-tab="all"]) #stats-global{display:none!important}
</style>
</head>
<body>
<header>
  <h1 id="h-tit">Banco MIR</h1>
  <div class="hright">
    <span class="hmeta" id="h-meta"></span>
    <!-- Temporizador -->
    <div id="timer-wrap" title="Haz clic en el tiempo para editar">
      <span id="timer-display">0:00:00</span>
      <button id="btn-tplay" onclick="timerToggle()" title="Play/Pausa">▶</button>
      <button onclick="timerReset()" title="Reset">↺</button>
    </div>
    <button class="hbtn" id="btn-dark" onclick="toggleDark()" title="Modo oscuro">🌙</button>
    <span id="save-badge" class="sbadge"></span>
  </div>
</header>
<div id="prog-wrap"><div id="prog-bar"></div></div>

<div class="container" id="main-cont" data-tab="all">
  <!-- Buscador -->
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="🔍 Buscar en enunciados..." oninput="onSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div id="search-count"></div>

  <!-- Modo -->
  <div class="mode-bar">
    <span style="font-size:11.5px;color:var(--txt3);font-weight:600">MODO:</span>
    <button class="mode-btn on" id="mode-test" onclick="setMode('test')">📝 Test</button>
    <button class="mode-btn" id="mode-quick" onclick="setMode('quick')">⚡ Repaso rápido</button>
    <button class="mode-btn" id="btn-stars" onclick="filterStarred()" style="margin-left:auto;border-color:#f59e0b;color:#b45309">⭐ Marcadas</button>
    <button class="mode-btn" id="btn-stats" onclick="toggleStats()">📊 Errores</button>
  </div>

  <!-- Stats globales -->
  <div class="stats-box" id="stats-global"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabs-wrap"></div>

  <!-- Score global -->
  <div class="ph-global">
    <div class="ph-left">
      <span class="ph-desc" id="ph-gdesc"></span>
      <div class="score-row">
        <span class="sc ok" id="sc-ok-all">✓ 0</span>
        <span class="sc ko" id="sc-ko-all">✗ 0</span>
        <span class="sc rem" id="sc-rem-all">○ 0</span>
      </div>
    </div>
  </div>
  <div class="global-actions">
    <button class="reset-btn" onclick="resetAll()">↺ Reiniciar y mezclar</button>
    <button class="nota-btn" onclick="calcNotaAll()">✎ Calcular nota global</button>
  </div>
  <div class="global-nota-box" id="nota-all"></div>
  <p class="hint">💡 <b>1–5</b> responde · <b>↑↓</b> navega · <b>S</b> marca ⭐ · Progreso guardado automáticamente</p>

  <div id="panels-wrap"></div>
</div>

<script>
/* ═══════════════════════════════════════ MOTOR v10 ═══════════════════════════════════════ */

var KEY=/*__KEY__*/'mir_micro_inm_2024_v1';
var META=/*__META_JSON__*/{"titulo":"Microbiolog\u00eda e Inmunolog\u00eda 2024","subtitulo":"Examen Final \u00b7 Microbiolog\u00eda \u00b7 Inmunolog\u00eda","examen":"Examen Final Micro-Inm \u00b7 2024","secciones":{"micro":{"label":"Microbiolog\u00eda","emoji":"\ud83e\udda0","color":"#0b7c5a","colorDim":"#dcf5ed","desc":"Bacterias \u00b7 Virus \u00b7 Hongos \u00b7 Par\u00e1sitos \u00b7 T\u00e9cnicas"},"inm":{"label":"Inmunolog\u00eda","emoji":"\ud83d\udee1\ufe0f","color":"#1d4ed8","colorDim":"#dbeafe","desc":"Inmunidad innata \u00b7 Adaptativa \u00b7 Anticuerpos \u00b7 Vacunas \u00b7 Inmunodeficiencias"}}};
var D=/*__D_JSON__*/{"micro":[{"n":"1","noShuffle":false,"img":null,"q":"La virulencia de un microorganismo:","o":["Hace referencia a su capacidad para producir enfermedad en un hu\u00e9sped.","Es una caracter\u00edstica propia de cada especie.","Aparece tanto en microorganismos pat\u00f3genos como no pat\u00f3genos.","Es mayor cuanto menor es el n\u00famero de microorganismos necesarios para producir infecci\u00f3n."],"c":4,"e":"La <b>virulencia</b> mide la gravedad/severidad de la infecci\u00f3n. Cuanto menor in\u00f3culo se necesita para infectar, mayor es la virulencia del microorganismo. No confundir con <b>patogenicidad</b> (capacidad de producir enfermedad)."},{"n":"2","noShuffle":false,"img":null,"q":"Ante un neonato con cuadro de sepsis y meningitis donde observamos en el LCR bacilos gram +, la sospecha diagn\u00f3stica ser\u00eda de sepsis neonatal por:","o":["Streptococcus agalactiae.","Listeria monocytogenes.","Neisseria meningitidis.","Clostridium perfringens."],"c":2,"e":"<b>Listeria monocytogenes</b> es el \u00fanico bacilo gram+ del listado. Causa enfermedad neonatal de inicio tard\u00edo (>7 d\u00edas) con meningitis y sepsis. S. agalactiae es coco gram+; N. meningitidis es coco gram-."},{"n":"3","noShuffle":false,"img":null,"q":"Sobre la historia de la microbiolog\u00eda (pregunta impugnada):","o":["Semmelweis se considera el creador de los antis\u00e9pticos.","Fleming realiz\u00f3 el experimento clave para demostrar que la teor\u00eda de la generaci\u00f3n espont\u00e1nea era err\u00f3nea.","Pasteur cre\u00f3 el concepto de cultivo puro.","Koch descubri\u00f3 la penicilina."],"c":1,"e":"<b>Semmelweis</b> estableci\u00f3 los procesos antis\u00e9pticos (lavado de manos). Lister describe el efecto antis\u00e9ptico del fenol. Pasteur refut\u00f3 la generaci\u00f3n espont\u00e1nea; Koch cre\u00f3 el cultivo puro; Fleming descubri\u00f3 la penicilina."},{"n":"4","noShuffle":false,"img":null,"q":"Los virus clase VII de Baltimore:","o":["Tienen genoma de RNA simple cadena.","Para obtener RNA mensajero se genera un DNA doble cadena intermedio.","Su genoma se puede usar directamente como RNA mensajero.","Un ejemplo es el virus de la Hepatitis B."],"c":4,"e":"Los virus <b>clase VII (Baltimore)</b> tienen genoma DNA circular incompleto (ej. VHB) y usan una retrotranscriptasa para replicarse mediante un intermediario ARN. El VHB es el prototipo de esta clase."},{"n":"5","noShuffle":false,"img":null,"q":"Sobre los factores de virulencia producidos por Helicobacter pylori:","o":["La ureasa permite la migraci\u00f3n a trav\u00e9s de la mucosa g\u00e1strica.","La mucinasa neutraliza los \u00e1cidos g\u00e1stricos del est\u00f3mago.","La citotoxina vacuolizante A (VacA) induce la activaci\u00f3n de la apoptosis en las c\u00e9lulas epiteliales.","Todas son correctas."],"c":3,"e":"<b>VacA</b> (citotoxina vacuolizante) induce vacuolizaci\u00f3n y apoptosis en el epitelio g\u00e1strico. La ureasa neutraliza el \u00e1cido; la mucinasa facilita la penetraci\u00f3n mucosa. CagA inyectada por T4SS induce cambios morfol\u00f3gicos tipo colibr\u00ed."},{"n":"6","noShuffle":false,"img":null,"q":"Un ni\u00f1o de 5 a\u00f1os presenta dolor far\u00edngeo, am\u00edgdalas enrojecidas con halo blanquecino y exantema difuso en t\u00f3rax que se extiende a extremidades. \u00bfDiagn\u00f3stico?","o":["Escarlatina.","Varicela.","Tosferina.","Parotiditis viral."],"c":1,"e":"<b>Escarlatina</b> causada por <i>S. pyogenes</i>: faringoamigdalitis con exotoxinas pir\u00f3genas que producen el exantema en papel de lija, eritema generalizado y lengua en fresa. El halo blanquecino amigdalar es bacteriano."},{"n":"7","noShuffle":false,"img":null,"q":"La hidatidosis es una enfermedad infecciosa provocada por:","o":["Taenia saginata.","Echinococcus granulosus.","Trypanosoma cruzi.","Enterobius vermicularis."],"c":2,"e":"<b>Echinococcus granulosus</b> (cestodo) provoca el quiste hidat\u00eddico, principalmente hep\u00e1tico y pulmonar. T. saginata causa teniasis intestinal; T. cruzi causa enfermedad de Chagas; Enterobius causa oxiuriasis."},{"n":"8","noShuffle":false,"img":null,"q":"En 2009 hubo una pandemia de gripe porcina (H1N1). Esta cepa apareci\u00f3 porque:","o":["La RNA polimerasa del virus de la gripe tiene una elevada tasa de error.","El genoma del virus est\u00e1 segmentado, lo cual provoca reorganizaciones de los genomas de distintas cepas.","Por la acumulaci\u00f3n de mutaciones puntuales.","Por la capacidad de llevar a cabo recombinaci\u00f3n hom\u00f3loga."],"c":2,"e":"El <b>genoma segmentado</b> del virus influenza permite el <b>reordenamiento gen\u00e9tico</b> (reassortment) entre cepas de diferentes hu\u00e9spedes (humana, porcina, aviar), generando nuevas variantes pand\u00e9micas con HA/NA no reconocidas por la inmunidad previa."},{"n":"9","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes estructuras condiciona la morfolog\u00eda y rigidez de las bacterias?","o":["Pared bacteriana.","Membrana citoplasm\u00e1tica.","C\u00e1psula.","Fimbrias."],"c":1,"e":"La <b>pared bacteriana</b> (peptidoglicano) determina la forma y rigidez bacteriana, y protege frente a la lisis osm\u00f3tica. La membrana regula el transporte; la c\u00e1psula protege de la fagocitosis; las fimbrias median la adherencia."},{"n":"10","noShuffle":false,"img":null,"q":"Un paciente presenta infiltrados pulmonares bilaterales. En la tinci\u00f3n \u00e1cido-alcohol resistencia del lavado broncoalveolar se observan microorganismos alargados, ramificados y te\u00f1idos d\u00e9bilmente. \u00bfCu\u00e1l es el pat\u00f3geno m\u00e1s probable?","o":["Klebsiella pneumoniae.","Aspergillus fumigatus.","Mycobacterium tuberculosis.","Nocardia asteroides."],"c":4,"e":"<b>Nocardia asteroides</b> es \u00e1cido-alcohol resistente d\u00e9bil y muestra morfolog\u00eda filamentosa ramificada. Se diferencia de <i>Mycobacterium</i> (tinci\u00f3n intensa, no ramificada). Provoca neumon\u00eda en inmunodeprimidos con infiltrados bilaterales."},{"n":"11","noShuffle":false,"img":null,"q":"Sobre la clorhexidina:","o":["No se recomienda su uso en neonatos.","Se utiliza para la desinfecci\u00f3n de la piel sana previa a extracciones sangu\u00edneas.","No se inactiva con materia org\u00e1nica.","Funciona como bacteriost\u00e1tico."],"c":3,"e":"La <b>clorhexidina</b> no se inactiva con materia org\u00e1nica (puede aplicarse en piel sucia). Es bactericida (desnaturaliza prote\u00ednas). Se usa en neonatos y embarazadas por baja absorci\u00f3n cut\u00e1nea. En jab\u00f3n solo para lavado prequir\u00fargico."},{"n":"12","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de estos componentes de la pared celular NO es diana de f\u00e1rmacos antif\u00fangicos?","o":["Ergosterol.","Quitina.","Glucano.","Lipopolisac\u00e1rido."],"c":4,"e":"El <b>lipopolisac\u00e1rido</b> (LPS) es exclusivo de bacterias gram-negativas y no forma parte de la pared f\u00fangica. Los antif\u00fangicos act\u00faan sobre ergosterol (polienos, azoles), glucanos (equinocandinas) y quitina (nikkomicinas)."},{"n":"13","noShuffle":false,"img":null,"q":"Respecto a Haemophilus influenzae:","o":["Los serotipos aparecen en base a la producci\u00f3n o no de diferentes toxinas.","Es una bacteria en forma de espiroqueta.","Las infecciones localizadas como otitis o bronquitis est\u00e1n producidas generalmente por serotipos diferentes al serotipo b.","La vacunaci\u00f3n es poco \u00fatil porque no cubre el serotipo b."],"c":3,"e":"Las infecciones localizadas (otitis, sinusitis, bronquitis) est\u00e1n producidas por <b>cepas no capsuladas</b> (no tipables), distintas al serotipo b. El serotipo b capsulado causa infecciones invasivas (meningitis, epiglotitis) y est\u00e1 cubierto por la vacuna Hib."},{"n":"14","noShuffle":false,"img":null,"q":"Un neonato presenta microcefalia, hepatoesplenomegalia y retraso motor. La madre present\u00f3 una sintomatolog\u00eda semejante a la mononucleosis durante el tercer trimestre del embarazo. \u00bfDiagn\u00f3stico m\u00e1s probable?","o":["Infecci\u00f3n cong\u00e9nita por Citomegalovirus.","Infecci\u00f3n cong\u00e9nita por Parvovirus B19.","Infecci\u00f3n cong\u00e9nita por Virus Epstein-Barr.","Infecci\u00f3n cong\u00e9nita por Virus del Herpes."],"c":1,"e":"<b>CMV cong\u00e9nito</b>: adquirido in \u00fatero, causa microcefalia, hepatoesplenomegalia, calcificaciones periventriculares y sordera. La madre suele ser asintom\u00e1tica o con s\u00edndrome mononucle\u00f3sico. Mayor gravedad en primoinfecci\u00f3n materna en primer trimestre."},{"n":"15","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes helmintos es un nematodo?","o":["Trichinella spiralis.","Fasciola hepatica.","Echinococcus granulosus.","Schistosoma mansoni."],"c":1,"e":"<b>Trichinella spiralis</b> es un nematodo (gusano redondo). Junto con Anisakis causan bromanematodosis por ingesti\u00f3n de larvas en carne contaminada. Fasciola es trematodo, Echinococcus es cestodo, Schistosoma es trematodo."},{"n":"16","noShuffle":false,"img":null,"q":"La causa m\u00e1s frecuente de neumon\u00eda bacteriana t\u00edpica es:","o":["Staphylococcus aureus.","Mycoplasma pneumoniae.","Streptococcus pneumoniae.","Klebsiella pneumoniae."],"c":3,"e":"<b>Streptococcus pneumoniae</b> (neumococo) es la causa m\u00e1s frecuente de neumon\u00eda bacteriana t\u00edpica lobar. S. aureus y Klebsiella son t\u00edpicas pero menos frecuentes. Mycoplasma es la principal causa de neumon\u00eda <b>at\u00edpica</b>."},{"n":"17","noShuffle":false,"img":null,"q":"Virus de la hepatitis para el cual no existen vacunas y que tiende a producir una enfermedad infecciosa cr\u00f3nica:","o":["Hepatitis A.","Hepatitis B.","Hepatitis C.","Hepatitis D."],"c":3,"e":"<b>Hepatitis C</b> no tiene vacuna disponible y cronifica en el 70-80% de los casos, con riesgo de cirrosis y CHC. Es la principal causa de hepatopat\u00eda cr\u00f3nica terminal y trasplante hep\u00e1tico. VHD requiere coinfecci\u00f3n con VHB."},{"n":"18","noShuffle":false,"img":null,"q":"Aproximadamente 36h despu\u00e9s de un picnic vecinal, 14 personas presentaron diarrea con retortijones, febr\u00edcula, 8-10 deposiciones/d\u00eda. Dos casos con heces sanguinolentas. Un adulto present\u00f3 artralgias en manos, tobillos y rodillas persistentes una semana. \u00bfMicroorganismo causante m\u00e1s probable?","o":["Bacillus cereus.","Campylobacter jejuni.","Salmonella ent\u00e9rica.","Staphylococcus aureus."],"c":2,"e":"<b>Campylobacter jejuni</b> se caracteriza por diarrea sanguinolenta y <b>artritis reactiva</b> postinfecciosa, clave diagn\u00f3stica del caso. Periodo de incubaci\u00f3n 24-72h. S. aureus act\u00faa en 2-4h; Bacillus cereus no produce diarrea hem\u00e1tica."},{"n":"19","noShuffle":false,"img":null,"q":"Respecto a la imagen sobre la t\u00e9cnica de inmunocromatograf\u00eda para la detecci\u00f3n de ant\u00edgenos en una muestra (indicada como M):","o":["Los anticuerpos situados en 1 y 2 van a reconocer al ant\u00edgeno.","Los anticuerpos situados en 2 y 3 van a reconocer al ant\u00edgeno.","Los anticuerpos situados en 1 y 3 van a reconocer al ant\u00edgeno.","2 corresponde a la banda control y 3 a la banda de lectura."],"c":1,"e":"En la inmunocromatograf\u00eda, los anticuerpos en posici\u00f3n 1 (marcados, m\u00f3viles) y 2 (fijos, banda de lectura) reconocen el <b>ant\u00edgeno</b>. La posici\u00f3n 3 es la banda control, que reconoce los anticuerpos marcados independientemente del ant\u00edgeno."},{"n":"20","noShuffle":false,"img":null,"q":"En la malaria, la forma del plasmodio transmitida del mosquito al hombre es:","o":["Esporozo\u00edto.","Merozo\u00edto.","Gametocito.","Esquizonte."],"c":1,"e":"El <b>esporozo\u00edto</b> es inoculado por el mosquito Anopheles. Infecta hepatocitos donde forma esquizontes hep\u00e1ticos que liberan merozo\u00edtos. Estos infectan eritrocitos y generan gametocitos, que el mosquito absorbe cerrando el ciclo."},{"n":"21","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes enfermedades infecciosas NO se transmite por la picadura de una garrapata?","o":["Enfermedad de Lyme.","Leptospirosis.","Fiebre exantem\u00e1tica de las monta\u00f1as rocosas.","Erliquiosis."],"c":2,"e":"La <b>leptospirosis</b> se transmite por contacto con agua u orina de animales salvajes o dom\u00e9sticos infectados por <i>Leptospira interrogans</i>. La enfermedad de Lyme, la FEMR y la erliquiosis son transmitidas por garrapata."},{"n":"22","noShuffle":false,"img":null,"q":"\u00bfEn qu\u00e9 punto del ciclo infectivo del VIH act\u00faa la transcriptasa inversa?","o":["Al inicio, para que el genoma viral se inserte en el genoma de la c\u00e9lula hospedadora.","Una vez generado el RNA mensajero, para producir los genomas de futuros viriones.","Al inicio, para dar lugar al RNA mensajero a partir del cual se sintetizar\u00e1 una poliprote\u00edna.","Durante la maduraci\u00f3n de los viriones, generando las dos copias del genoma."],"c":1,"e":"La <b>transcriptasa inversa</b> act\u00faa al inicio: retrotranscribe el ARN viral a ADN bicatenario, que se integra en el genoma celular como provirus. Es diana de los ITIAN y ITINAN. Sin este paso, no hay inserci\u00f3n ni replicaci\u00f3n."},{"n":"23","noShuffle":false,"img":null,"q":"Un ni\u00f1o de tres a\u00f1os ingresa por s\u00edndrome hemol\u00edtico-ur\u00e9mico aparecido despu\u00e9s de tres d\u00edas de diarrea sanguinolenta. \u00bfAgente causal m\u00e1s probable?","o":["Escherichia coli.","Rotavirus.","Enterococcus faecalis.","Proteus mirabilis."],"c":1,"e":"<b>E. coli enterohemorr\u00e1gico</b> (ECEH, O157:H7) produce toxina Shiga que causa diarrea sanguinolenta y <b>SUH</b> (anemia hemol\u00edtica microangiop\u00e1tica, trombocitopenia, IRA). Es la causa m\u00e1s frecuente de SUH en pediatr\u00eda."},{"n":"24","noShuffle":false,"img":null,"q":"El sistema MALDI-TOF se utiliza para:","o":["Estudio de sensibilidad a antibi\u00f3ticos.","Detecci\u00f3n automatizada de anticuerpos frente al microorganismo causal.","Detecci\u00f3n de patrones proteicos espec\u00edficos del microorganismo causal.","Detecci\u00f3n de secuencias de DNA espec\u00edficas del microorganismo."],"c":3,"e":"<b>MALDI-TOF</b> (ionizaci\u00f3n por desorci\u00f3n l\u00e1ser asistida por matriz) identifica microorganismos mediante su <b>perfil proteico</b> (espectro de masas), especialmente prote\u00ednas ribos\u00f3micas. Es r\u00e1pido, preciso y ha revolucionado la identificaci\u00f3n microbiol\u00f3gica rutinaria."},{"n":"25","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes relaciones entre microorganismo y enfermedad infecciosa es incorrecta?","o":["Hongos \u2013 aspergilosis.","Bacterias \u2013 lepra.","Virus \u2013 dengue.","Helmintos \u2013 enfermedad del sue\u00f1o."],"c":4,"e":"La <b>enfermedad del sue\u00f1o</b> (tripanosomiasis africana) est\u00e1 causada por <i>Trypanosoma brucei</i>, que es un <b>protozoo</b>, no un helminto. Los helmintos son gusanos (nematodos, trematodos, cestodos)."},{"n":"26","noShuffle":false,"img":null,"q":"El linfogranuloma ven\u00e9reo est\u00e1 provocado por:","o":["Chlamydia trachomatis.","Treponema pallidum ssp. pallidum.","Neisseria gonorrhoeae.","Giardia duodenalis."],"c":1,"e":"<b>Chlamydia trachomatis</b> serotipos L1-L3 causa el linfogranuloma ven\u00e9reo: \u00falcera genital indolora seguida de linfadenopat\u00eda inguinal supurativa y s\u00edntomas sist\u00e9micos. T. pallidum causa s\u00edfilis; N. gonorrhoeae causa uretritis/gonorrea."},{"n":"27","noShuffle":false,"img":null,"q":"\u00bfC\u00f3mo puedo distinguir especies del g\u00e9nero Streptococcus de especies del g\u00e9nero Staphylococcus?","o":["Haciendo el test de la catalasa.","Haciendo el test de la oxidasa.","Haciendo una resiembra en agar-sangre.","Haciendo una tinci\u00f3n de Gram."],"c":1,"e":"El <b>test de la catalasa</b> diferencia ambos g\u00e9neros: <i>Staphylococcus</i> es catalasa <b>positivo</b> (descompone H\u2082O\u2082 con burbujeo); <i>Streptococcus</i> es catalasa negativo. Ambos son cocos gram+ y no se diferencian por Gram ni por oxidasa."},{"n":"28","noShuffle":false,"img":null,"q":"El medio MacConkey es un medio:","o":["Solo selectivo para enterobacterias.","Solo diferencial para enterobacterias.","Selectivo y diferencial para enterobacterias.","Universal para todos los microorganismos."],"c":3,"e":"MacConkey es <b>selectivo</b> (sales biliares y cristal violeta inhiben gram+ y no enterobacterias) y <b>diferencial</b> (distingue fermentadoras de lactosa \u2014colonias rosas\u2014 de no fermentadoras \u2014colonias incoloras\u2014). Es el medio de referencia para enterobacterias."},{"n":"29","noShuffle":false,"img":null,"q":"En la tinci\u00f3n de Gram, \u00bfcu\u00e1l es la funci\u00f3n de la safranina?","o":["Te\u00f1ir a las c\u00e9lulas que han sido decoloradas previamente con el agente decolorante.","Reforzar el color que han adquirido las bacterias con el primer colorante.","Formar un complejo con el lugol, mordiente que facilita su fijaci\u00f3n a las c\u00e9lulas.","Decolorar las bacterias que tienen una segunda bicapa lip\u00eddica."],"c":1,"e":"La <b>safranina</b> es el colorante de contraste (rojo-rosa) que ti\u00f1e las bacterias <b>gram negativas</b> previamente decoloradas con acetona-alcohol. Las gram positivas retienen el cristal violeta-lugol y aparecen violetas. El lugol act\u00faa como mordiente."},{"n":"30","noShuffle":false,"img":null,"q":"Indica la opci\u00f3n incorrecta sobre la t\u00e9cnica de titulaci\u00f3n de IgG total realizada en las pr\u00e1cticas:","o":["Necesitas una muestra de suero del paciente.","Necesitas los ant\u00edgenos frente a los cuales van dirigidos los anticuerpos.","Necesitas realizar una curva patr\u00f3n.","Detectas anticuerpos policlonales."],"c":2,"e":"En la <b>titulaci\u00f3n de IgG total</b> se cuantifica la cantidad global de IgG sin especificidad antig\u00e9nica, por lo que <b>no se necesita ant\u00edgeno</b>. Se utiliza suero, curva patr\u00f3n de IgG conocida, y se detectan todos los anticuerpos IgG (policlonales)."},{"n":"31","noShuffle":true,"img":null,"q":"Seg\u00fan la imagen, la CMI del antibi\u00f3tico testado para un determinado microorganismo es:","o":["0.5","0.75","1.0","1.5"],"c":3,"e":"La <b>CMI</b> (concentraci\u00f3n m\u00ednima inhibitoria) es la menor concentraci\u00f3n de antibi\u00f3tico que inhibe el crecimiento visible. En las curvas de crecimiento, corresponde al punto en que la DO deja de incrementarse de forma sostenida respecto al control."},{"n":"32","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes es un condicionante para la t\u00e9cnica de citometr\u00eda de flujo?","o":["La muestra tiene que tratarse de una poblaci\u00f3n celular en suspensi\u00f3n.","La muestra tiene que tratarse de una poblaci\u00f3n celular homog\u00e9nea.","La muestra tiene que estar marcada con fluorocromos.","Se obtiene informaci\u00f3n de un \u00fanico par\u00e1metro en cada an\u00e1lisis."],"c":1,"e":"La <b>citometr\u00eda de flujo</b> requiere c\u00e9lulas en <b>suspensi\u00f3n</b> individual para pasar en fila por el haz l\u00e1ser. No requiere homogeneidad; puede analizar m\u00faltiples par\u00e1metros simult\u00e1neamente (FSC, SSC, fluorescencias). Los marcadores fluorescentes son habituales pero no siempre obligatorios."},{"n":"33","noShuffle":false,"img":null,"q":"Mujer de 28 a\u00f1os sexualmente activa con vaginitis y flujo anormal de 3 d\u00edas. Muestra sembrada en medios para bacterias y hongos causantes de ETS. Tras 24h no hay crecimiento. \u00bfDiagn\u00f3stico?","o":["Tricomoniasis.","Clamidiasis.","Candidiasis.","A y B podr\u00edan ser correctas."],"c":4,"e":"<b>Trichomonas vaginalis</b> es un protozoo que no crece en medios de cultivo est\u00e1ndar (requiere medios espec\u00edficos). <b>Chlamydia trachomatis</b> es intracelular obligada y no crece en agar. Ambas justifican cultivo negativo con cl\u00ednica compatible."},{"n":"34","noShuffle":false,"img":null,"q":"Los prebi\u00f3ticos:","o":["Se definen como sustratos que mejoran el crecimiento de la microbiota intestinal.","Son microorganismos que refuerzan la microbiota intestinal.","Est\u00e1n presentes en alimentos l\u00e1cteos fermentados.","Se utilizan para el tratamiento de infecciones por Clostridium difficile."],"c":1,"e":"Los <b>prebi\u00f3ticos</b> son sustratos no digeribles (fibras, oligosac\u00e1ridos) que estimulan selectivamente el crecimiento de bacterias beneficiosas de la microbiota. Los <b>probi\u00f3ticos</b> son los microorganismos vivos; los l\u00e1cteos fermentados contienen probi\u00f3ticos."},{"n":"35","noShuffle":false,"img":null,"q":"Respecto a la transferencia horizontal de informaci\u00f3n gen\u00e9tica mediante transducci\u00f3n:","o":["Se requiere el contacto entre las bacterias.","En el proceso act\u00faa un virus como v\u00eda de transferencia.","Material gen\u00e9tico libre se incorpora en la bacteria.","Interviene una estructura celular denominada pelo sexual."],"c":2,"e":"En la <b>transducci\u00f3n</b>, un <b>bacteri\u00f3fago</b> incorpora DNA bacteriano y lo transfiere a otra bacteria al infectarla. La conjugaci\u00f3n requiere contacto directo y pelo sexual; la transformaci\u00f3n usa DNA libre. La transducci\u00f3n no requiere contacto c\u00e9lula-c\u00e9lula."}],"inm":[{"n":"36","noShuffle":false,"img":null,"q":"En referencia a las c\u00e9lulas NK:","o":["Expresan en su superficie CD16 que reconoce el ant\u00edgeno presentado por MHC.","Se consideran c\u00e9lulas esenciales de la respuesta inmunitaria adaptativa.","Liberan gr\u00e1nulos favoreciendo la eliminaci\u00f3n de la c\u00e9lula diana por el mecanismo de receptor de muerte.","Pueden eliminar la c\u00e9lula diana a trav\u00e9s de la citotoxicidad dependiente de anticuerpos."],"c":4,"e":"Las <b>NK</b> pueden actuar mediante <b>ADCC</b> (citotoxicidad dependiente de anticuerpos) a trav\u00e9s de CD16 (Fc\u03b3RIII), que reconoce anticuerpos IgG unidos a c\u00e9lulas diana. Tambi\u00e9n act\u00faan de forma independiente de anticuerpos al detectar ausencia de MHC-I."},{"n":"37","noShuffle":false,"img":null,"q":"En la maduraci\u00f3n de los linfocitos B, el reordenamiento de los genes que codifican la cadena pesada por recombinaci\u00f3n som\u00e1tica:","o":["Se induce como respuesta a un ant\u00edgeno concreto.","Se produce en los ganglios linf\u00e1ticos.","Es independiente de ant\u00edgeno.","B y C son correctas."],"c":1,"e":"El reordenamiento V(D)J de la cadena pesada de inmunoglobulinas <b>no requiere ant\u00edgeno</b>; ocurre en m\u00e9dula \u00f3sea de forma ant\u00edgeno-independiente. La maduraci\u00f3n ant\u00edgeno-dependiente (hipermutaci\u00f3n som\u00e1tica, cambio de clase) sucede en \u00f3rganos linfoides secundarios."},{"n":"38","noShuffle":false,"img":null,"q":"La IgA:","o":["Es muy abundante en secreciones tales como saliva, moco y l\u00e1grimas.","Es la \u00fanica que atraviesa la placenta.","Se encuentra exclusivamente en forma pentam\u00e9rica.","Est\u00e1 presente en la superficie de linfocitos B."],"c":1,"e":"La <b>IgA secretora</b> es la inmunoglobulina predominante en secreciones (saliva, moco, l\u00e1grimas, calostro). La IgG atraviesa la placenta; la IgM es pentam\u00e9rica; la IgM (y IgD) se expresa en superficie de linfocitos B naive."},{"n":"39","noShuffle":false,"img":null,"q":"\u00bfEn qu\u00e9 se diferencia la dermatitis at\u00f3pica de la dermatitis por contacto?","o":["La at\u00f3pica es una hipersensibilidad de tipo IV, mientras que la de contacto es de tipo I.","La at\u00f3pica est\u00e1 mediada por IgG, mientras que la de contacto est\u00e1 mediada por IgE.","La at\u00f3pica est\u00e1 mediada por linfocitos Th1, mientras que la de contacto est\u00e1 mediada por Th2.","Los al\u00e9rgenos que provocan la at\u00f3pica son variados, mientras que la de contacto est\u00e1 provocada por sustancias qu\u00edmicas reactivas o colorantes en contacto con la piel."],"c":4,"e":"La <b>dermatitis at\u00f3pica</b> es hipersensibilidad tipo I (IgE, Th2) por al\u00e9rgenos ambientales variados. La <b>dermatitis de contacto</b> es tipo IV (retardada, mediada por linfocitos Th1) ante haptenos o sustancias qu\u00edmicas que contactan la piel."},{"n":"40","noShuffle":false,"img":null,"q":"Las cadenas del complejo CD3 est\u00e1n implicadas en:","o":["El reconocimiento del ant\u00edgeno unido a MHC.","La transducci\u00f3n de se\u00f1ales al interior de la c\u00e9lula T.","La presentaci\u00f3n de ant\u00edgenos al linfocito T.","El reordenamiento de genes del TCR."],"c":2,"e":"El complejo <b>CD3</b> (cadenas \u03b3, \u03b4, \u03b5, \u03b6) est\u00e1 acoplado al TCR y transduce la se\u00f1al de activaci\u00f3n al interior celular tras el reconocimiento del p\u00e9ptido-MHC. Sin CD3, el TCR no genera se\u00f1al intracelular y el linfocito T no se activa."},{"n":"41","noShuffle":false,"img":null,"q":"Las mol\u00e9culas HLA de clase II:","o":["Unen preferentemente p\u00e9ptidos de prote\u00ednas intracelulares.","Unen p\u00e9ptidos m\u00e1s largos que las mol\u00e9culas de clase I.","Necesitan la acci\u00f3n del proteasoma para presentar el ant\u00edgeno.","Presentan p\u00e9ptidos a los linfocitos T citot\u00f3xicos."],"c":2,"e":"Las mol\u00e9culas <b>HLA-II</b> tienen una hendidura pept\u00eddica abierta que permite unir p\u00e9ptidos de 13-25 aa (m\u00e1s largos que los 8-10 aa de HLA-I). Presentan ant\u00edgenos <b>ex\u00f3genos</b> a linfocitos <b>CD4+</b>. El proteasoma procesa ant\u00edgenos para HLA-I."},{"n":"42","noShuffle":false,"img":null,"q":"A la consulta de un pediatra llega un ni\u00f1o con inmunodeficiencia e historial de enfermedades infecciosas frecuentes. Los an\u00e1lisis muestran niveles anormalmente altos de IgM y muy bajos de IgG e IgA. \u00bfQu\u00e9 inmunodeficiencia presenta con mayor probabilidad?","o":["Agammaglobulinemia ligada al X.","S\u00edndrome de DiGeorge.","Deficiencia de CD40L.","Inmunodeficiencia combinada grave."],"c":3,"e":"La <b>deficiencia de CD40L</b> (s\u00edndrome de hiper-IgM ligado al X) impide la interacci\u00f3n CD40-CD40L entre LB y LT, bloqueando el cambio de clase de Ig. Resultado: IgM elevada con IgG e IgA muy bajas. Agammaglobulinemia y SCID presentan todas las Ig bajas."},{"n":"43","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 manifestaciones cl\u00ednicas se asocian con el per\u00edodo de latencia cl\u00ednica por el VIH?","o":["Fiebre y cefaleas.","Aparici\u00f3n de infecciones oportunistas.","Disminuci\u00f3n progresiva de los linfocitos CD4+ sangu\u00edneos.","Concentraci\u00f3n de CD4+ inferior a 200 c\u00e9lulas/\u00b5L."],"c":3,"e":"Durante la <b>latencia cl\u00ednica</b> del VIH el paciente es asintom\u00e1tico o presenta s\u00edntomas leves, pero hay replicaci\u00f3n viral activa continua y <b>disminuci\u00f3n progresiva de CD4+</b>. Las infecciones oportunistas y CD4 <200 caracterizan la fase SIDA."},{"n":"44","noShuffle":false,"img":null,"q":"Con respecto a las citocinas:","o":["Son prote\u00ednas de membrana que tienen todas las c\u00e9lulas del sistema inmune.","Son prote\u00ednas que solo activan a la misma c\u00e9lula que las produce.","Son prote\u00ednas producidas por los pat\u00f3genos que invaden el organismo.","Son peque\u00f1as prote\u00ednas que sintetizan las c\u00e9lulas del sistema inmune en respuesta a est\u00edmulos."],"c":4,"e":"Las <b>citocinas</b> son peque\u00f1as glicoprote\u00ednas solubles secretadas por c\u00e9lulas inmunitarias en respuesta a est\u00edmulos. Act\u00faan de forma autocrina, paracrina o endocrina. Incluyen interleucinas, TNF, IFN y factores estimuladores de colonias."},{"n":"45","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes relaciones entre c\u00e9lula del sistema inmune y funci\u00f3n es correcta?","o":["Mastocito \u2013 Secreci\u00f3n de histamina.","Neutr\u00f3filos \u2013 Presentaci\u00f3n antig\u00e9nica.","Linfocito T \u2013 Eliminaci\u00f3n de microorganismos por fagocitosis.","C\u00e9lula dendr\u00edtica \u2013 Citotoxicidad."],"c":1,"e":"Los <b>mastocitos</b> contienen gr\u00e1nulos preformados de histamina que liberan en respuesta a IgE (hipersensibilidad tipo I) o est\u00edmulos f\u00edsicos. Los neutr\u00f3filos fagocitan; los linfocitos T median la inmunidad celular; las dendr\u00edticas presentan ant\u00edgenos."},{"n":"46","noShuffle":false,"img":null,"q":"El rechazo hiperagudo consiste en:","o":["Los linfocitos T maduros del receptor reconocen como extra\u00f1as las c\u00e9lulas del donante y reaccionan contra ellas.","Los linfocitos T maduros del donante reconocen como extra\u00f1as las c\u00e9lulas del receptor y reaccionan contra ellas.","Anticuerpos preformados en el receptor reconocen como extra\u00f1as las c\u00e9lulas del donante y reaccionan contra ellas.","Anticuerpos preformados en el receptor reconocen como extra\u00f1os los eritrocitos del donante (incompatibilidad ABO) y reaccionan contra ellos."],"c":4,"e":"El <b>rechazo hiperagudo</b> ocurre en minutos: anticuerpos <b>preexistentes</b> del receptor (por incompatibilidad ABO, transfusiones o trasplantes previos) se unen al endotelio del injerto, activando complemento y trombosis. Es irreversible."},{"n":"47","noShuffle":false,"img":null,"q":"Las caracter\u00edsticas de la respuesta inmune adaptativa son:","o":["Especificidad y rapidez.","Especificidad y memoria.","Efectividad y memoria.","Efectividad y rapidez."],"c":2,"e":"La respuesta inmune <b>adaptativa</b> se caracteriza por <b>especificidad</b> (reconoce ant\u00edgenos concretos) y <b>memoria</b> (respuesta m\u00e1s r\u00e1pida y potente en exposiciones secundarias). La rapidez es propia de la respuesta innata."},{"n":"48","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 \u00f3rgano o tejido drena los ant\u00edgenos de la sangre?","o":["Bazo.","M\u00e9dula \u00f3sea.","Ganglio linf\u00e1tico.","MALT."],"c":1,"e":"El <b>bazo</b> filtra la sangre y captura ant\u00edgenos circulantes, siendo el principal \u00f3rgano de respuesta frente a ant\u00edgenos sangu\u00edneos. Los ganglios drenan la linfa tisular; el MALT protege mucosas; la m\u00e9dula \u00f3sea produce c\u00e9lulas inmunes."},{"n":"49","noShuffle":true,"img":null,"q":"Las c\u00e9lulas tumorales pueden evadir la respuesta inmunitaria mediante:","o":["Reducci\u00f3n de la expresi\u00f3n de ant\u00edgenos tumorales.","Aumento de la expresi\u00f3n de HLA-I.","Inhibici\u00f3n de la s\u00edntesis de citocinas como TGF-\u03b2 o IL-10.","Todas son correctas."],"c":1,"e":"Los tumores evaden la inmunidad reduciendo la expresi\u00f3n de <b>ant\u00edgenos tumorales</b> y de <b>HLA-I</b> (no son reconocidos por CD8+). Adem\u00e1s, secretan citocinas inmunosupresoras (TGF-\u03b2, IL-10). El aumento de HLA-I facilitar\u00eda su eliminaci\u00f3n."},{"n":"50","noShuffle":false,"img":null,"q":"En una vacuna atenuada:","o":["El pat\u00f3geno est\u00e1 muerto.","Se requiere de un virus no pat\u00f3geno como portador.","Se genera inmunidad frente a un \u00fanico ant\u00edgeno.","El pat\u00f3geno est\u00e1 vivo, pero ha perdido la capacidad para provocar la enfermedad."],"c":4,"e":"Las vacunas <b>atenuadas</b> contienen pat\u00f3genos vivos con virulencia reducida (p.ej. triple v\u00edrica, fiebre amarilla). Generan inmunidad duradera, humoral y celular. Las inactivadas usan pat\u00f3geno muerto; las de subunidades, ant\u00edgenos espec\u00edficos."},{"n":"51","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 funci\u00f3n ejerce el IFN-\u03b3 en la respuesta inmune frente a pat\u00f3genos?","o":["Activa los macr\u00f3fagos y favorece la eliminaci\u00f3n de las bacterias que sobreviven en su interior.","Interfiere en la replicaci\u00f3n v\u00edrica.","Promueve la apoptosis de las c\u00e9lulas infectadas por virus.","Favorece la activaci\u00f3n del complemento."],"c":1,"e":"El <b>IFN-\u03b3</b> (producido por Th1 y NK) activa los <b>macr\u00f3fagos</b>, potenciando su capacidad microbicida intracelular (burst oxidativo, fagolisosoma). Es esencial frente a micobacterias e intracelulares. IFN-\u03b1/\u03b2 inhiben la replicaci\u00f3n viral."},{"n":"52","noShuffle":false,"img":null,"q":"En relaci\u00f3n con los mecanismos de tolerancia:","o":["Tiene lugar tanto en la c\u00e9lula de la inmunidad innata como de la adaptativa.","Los linfocitos T autorreactivos se eliminan por selecci\u00f3n negativa en la m\u00e9dula t\u00edmica.","Tras el proceso de selecci\u00f3n positiva, salen a la circulaci\u00f3n los linfocitos TCD4+/TCD8+.","En la corteza del timo se eliminan aquellos linfocitos T con TCR que reconocen MHC propias."],"c":2,"e":"La <b>selecci\u00f3n negativa</b> (tolerancia central) ocurre en la <b>m\u00e9dula t\u00edmica</b>: los linfocitos T con alta afinidad por p\u00e9ptidos propios-MHC son eliminados por apoptosis. La selecci\u00f3n positiva ocurre en la corteza: selecciona los que reconocen MHC propias."},{"n":"53","noShuffle":false,"img":null,"q":"Sobre los distintos tipos de t\u00e9cnicas ELISA:","o":["En el ELISA competitivo, la concentraci\u00f3n de ant\u00edgeno es directamente proporcional al color desarrollado.","Para cuantificar una toxina bacteriana se puede utilizar el ELISA indirecto.","Para cuantificar anticuerpos frente a VIH se puede utilizar el ELISA en s\u00e1ndwich.","Para cuantificar ant\u00edgenos de SARS-CoV-2 se puede utilizar el ELISA competitivo."],"c":1,"e":"En el <b>ELISA competitivo</b>, el ant\u00edgeno de la muestra compite con el ant\u00edgeno marcado por el anticuerpo. A mayor ant\u00edgeno en la muestra, menor se\u00f1al: la relaci\u00f3n es <b>inversamente proporcional</b>. Para Ag se usa s\u00e1ndwich; para Ac, ELISA indirecto."},{"n":"54","noShuffle":false,"img":null,"q":"Completa los espacios: Un _______ puede ser reconocido por m\u00e1s de un ________ que se unir\u00e1 de forma espec\u00edfica a un _______.","o":["Anticuerpo / ant\u00edgeno / ep\u00edtopo.","Ant\u00edgeno / anticuerpo / ep\u00edtopo.","Anticuerpo / ep\u00edtopo / ant\u00edgeno.","Ep\u00edtopo / anticuerpo / ant\u00edgeno."],"c":2,"e":"Un <b>ant\u00edgeno</b> puede ser reconocido por varios <b>anticuerpos</b> diferentes, pero cada anticuerpo reconoce espec\u00edficamente un \u00fanico determinante antig\u00e9nico o <b>ep\u00edtopo</b>. Un ant\u00edgeno suele tener m\u00faltiples ep\u00edtopos distintos."},{"n":"55","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes componentes del sistema inmune es especialmente relevante para la respuesta inmunitaria frente a bacterias extracelulares?","o":["C\u00e9lulas NK.","IgE.","Complemento.","Linfocitos T citot\u00f3xicos."],"c":3,"e":"El <b>complemento</b> (v\u00edas alternativa y de lectinas) es crucial frente a bacterias extracelulares: opsonizaci\u00f3n, lisis directa (MAC) y quimiotaxis. Las NK y los CD8+ act\u00faan frente a virus e intracelulares; la IgE frente a par\u00e1sitos."},{"n":"56","noShuffle":false,"img":null,"q":"Identifique un marcador exclusivo de monocitos:","o":["CD3.","CD45.","CD19.","CD14."],"c":4,"e":"<b>CD14</b> es el correceptor del LPS (junto con TLR4) y marcador de superficie de <b>monocitos y macr\u00f3fagos</b>. CD3 marca linfocitos T; CD19 marca linfocitos B; CD45 es pan-leucocitario (expresado en todos los leucocitos)."},{"n":"57","noShuffle":false,"img":null,"q":"La prueba de detecci\u00f3n de autoanticuerpos antinucleares (ANA) se utiliza para diagnosticar trastornos autoinmunes como:","o":["Miastenia gravis.","Enfermedad de Graves.","Lupus eritematoso sist\u00e9mico.","Enfermedad del suero."],"c":3,"e":"Los <b>ANA</b> (anticuerpos antinucleares) son marcadores diagn\u00f3sticos del <b>lupus eritematoso sist\u00e9mico</b> y otras enfermedades autoinmunes sist\u00e9micas. La miastenia gravis usa anti-AChR; Graves, anti-TSHr; la enfermedad del suero es por inmunocomplejos."},{"n":"58","noShuffle":false,"img":null,"q":"La inmunoterapia CAR-T utilizada para tratar tumores consiste en administrar:","o":["Anticuerpos frente a ant\u00edgenos presentes en las c\u00e9lulas tumorales.","Vacunas de ant\u00edgenos tumorales.","Linfocitos T de otros pacientes que padecen el mismo tipo de c\u00e1ncer.","Linfocitos T del mismo paciente modificados en el laboratorio."],"c":4,"e":"Las c\u00e9lulas <b>CAR-T</b> son linfocitos T del <b>propio paciente</b> modificados gen\u00e9ticamente para expresar un receptor quim\u00e9rico (CAR) que reconoce ant\u00edgenos tumorales espec\u00edficos sin depender de MHC. Son aut\u00f3logas, no alog\u00e9nicas."},{"n":"59","noShuffle":false,"img":null,"q":"Las vacunas:","o":["Tienen como objetivo generar anticuerpos.","Tienen como objetivo generar linfocitos T y B de memoria.","No est\u00e1n recomendadas en inmunodeprimidos.","Incluyen aloant\u00edgenos para potenciar la respuesta inmunitaria."],"c":2,"e":"El objetivo fundamental de las vacunas es inducir <b>memoria inmunol\u00f3gica</b> (linfocitos T y B de memoria) que permita una respuesta r\u00e1pida y potente ante el pat\u00f3geno real. Las vacunas inactivadas s\u00ed se usan en inmunodeprimidos; las vivas atenuadas, con precauci\u00f3n."},{"n":"60","noShuffle":false,"img":null,"q":"La principal diferencia entre la t\u00e9cnica de precipitaci\u00f3n y la t\u00e9cnica de aglutinaci\u00f3n es:","o":["En la t\u00e9cnica de aglutinaci\u00f3n, el ant\u00edgeno tiene que estar unido a una superficie celular.","En la t\u00e9cnica de precipitaci\u00f3n se emplean marcadores.","La t\u00e9cnica de aglutinaci\u00f3n detecta \u00fanicamente ant\u00edgenos, mientras que la precipitaci\u00f3n puede detectar ant\u00edgenos y anticuerpos.","La t\u00e9cnica de aglutinaci\u00f3n es cuantitativa."],"c":1,"e":"La <b>aglutinaci\u00f3n</b> requiere ant\u00edgenos particulados o unidos a superficies celulares (eritrocitos, bacterias, l\u00e1tex). La <b>precipitaci\u00f3n</b> detecta ant\u00edgenos solubles. Ambas pueden detectar Ag o Ac; la aglutinaci\u00f3n es semicuantitativa (t\u00edtulo)."},{"n":"R1","noShuffle":false,"img":null,"q":"En una enfermedad infecciosa:","o":["Siempre existe un per\u00edodo de incubaci\u00f3n.","La aparici\u00f3n/desaparici\u00f3n de s\u00edntomas significa presencia/ausencia de microorganismos.","No tiene por qu\u00e9 aparecer alteraciones fisiol\u00f3gicas en el individuo.","Siempre existe un per\u00edodo de convalecencia."],"c":1,"e":"En toda enfermedad infecciosa existe un <b>per\u00edodo de incubaci\u00f3n</b> (desde la entrada del pat\u00f3geno hasta los primeros s\u00edntomas). No siempre hay convalecencia; los s\u00edntomas no se correlacionan necesariamente con la presencia del microorganismo."},{"n":"R2","noShuffle":false,"img":null,"q":"La primera defensa frente a las infecciones es o son:","o":["Los fagocitos.","El complemento.","Las barreras fisicoqu\u00edmicas.","Linfocitos T."],"c":3,"e":"Las <b>barreras fisicoqu\u00edmicas</b> (piel, mucosas, pH \u00e1cido g\u00e1strico, cilios, lisozima) constituyen la primera l\u00ednea de defensa. Si el pat\u00f3geno las supera, interviene la inmunidad innata (complemento, fagocitos) y despu\u00e9s la adaptativa (linfocitos)."}]};
var IMGS=/*__IMGS_JSON__*/{};

/* ── Estado ── */
var canSave=typeof localStorage!=='undefined';
var saved={};try{saved=JSON.parse(localStorage.getItem(KEY)||'null')||{};}catch(e){}
var state   =saved.state   ||{};
var qOrd    =saved.qOrd    ||{};
var oOrd    =saved.oOrd    ||{};
var starred =saved.starred ||{};
var failHist=saved.failHist||{};  // {qid: count} entre sesiones
var darkMode=saved.dark    ||false;
var timerSec=saved.timerSec||0;   // segundos configurados
var SECS=Object.keys(META.secciones||{});
var fFailed={};
var qIdx={};           // {sec: {n: q}}
var qNums={};          // {sec: {n: numero_correlativo}}
var allOrder=null;     // orden mezclado inter-secciones para pestaña Todos
var activeCid=null;
var currentTab='all';
var currentMode='test';
var saveTimer=null;
var starsFilter=false;
var statsVisible=false;
var timerRunning=false;
var timerRemaining=timerSec;
var timerInterval=null;

/* ── INIT ── */
(function init(){
  SECS.forEach(function(s){fFailed[s]=false;});
  injectSecCSS();
  buildHeader();
  buildTabs();
  buildPanels();
  buildIdx();
  buildNums();
  buildAllOrder();
  SECS.forEach(render);
  renderAll();
  updateScores();
  updateProg();
  applyTheme();
  initTimer();
  setBadge(canSave?'Guardado':'Sin guardado',canSave?'ok':'warn');
  document.addEventListener('keydown',handleKey);
  var si=document.getElementById('search-input');
  if(si)si.addEventListener('keydown',function(e){if(e.key==='Escape'){clearSearch();}});
})();

/* ── CSS dinámico ── */
function injectSecCSS(){
  var css='';
  SECS.forEach(function(s){
    var m=META.secciones[s]||{};
    var c=m.color||'#1a56db',cd=m.colorDim||'#e8f0fe';
    css+='.tab.t-'+s+'.on{background:'+cd+';color:'+c+';border-color:'+c+'}\n';
    css+='.ph.s-'+s+'{border-left:4px solid '+c+'}\n';
    // Variables CSS por sección para el badge coloreado
    css+='#panel-'+s+' .qnum.sec-colored{background:'+cd+';color:'+c+'}\n';
  });
  var st=document.createElement('style');st.textContent=css;document.head.appendChild(st);
}

/* ── Header ── */
function buildHeader(){
  var total=SECS.reduce(function(a,s){return a+(D[s]?D[s].length:0);},0);
  var t=document.getElementById('h-tit');if(t)t.textContent=META.titulo||'Banco MIR';
  var pt=document.getElementById('page-title');if(pt)pt.textContent=META.titulo||'Banco MIR';
  var m=document.getElementById('h-meta');
  if(m){var p=[];if(total)p.push(total+' preguntas');if(META.examen)p.push(META.examen);m.textContent=p.join(' · ');}
  var d=document.getElementById('ph-gdesc');if(d)d.textContent=META.subtitulo||'';
  var r=document.getElementById('sc-rem-all');if(r)r.textContent='○ '+total;
}

/* ── Tabs ── */
function buildTabs(){
  var total=SECS.reduce(function(a,s){return a+(D[s]?D[s].length:0);},0);
  var h='<button class="tab t-all on" onclick="showTab(\'all\')">📋 Todos ('+total+')</button>';
  SECS.forEach(function(s){
    var m=META.secciones[s]||{},cnt=D[s]?D[s].length:0;
    h+='<button class="tab t-'+s+'" onclick="showTab(\''+s+'\')">'+(m.emoji?m.emoji+' ':'')+escH(m.label||s)+' ('+cnt+')</button>';
  });
  var w=document.getElementById('tabs-wrap');if(w)w.innerHTML=h;
}

/* ── Paneles ── */
function buildPanels(){
  var h='<div id="panel-all" class="sec-panel visible"><div id="qs-all"></div><div class="no-results" id="nr-all">No se encontraron preguntas</div></div>';
  SECS.forEach(function(s){
    var m=META.secciones[s]||{},cnt=D[s]?D[s].length:0;
    h+='<div id="panel-'+s+'" class="sec-panel">';
    h+='<div class="ph s-'+s+'">';
    h+='<div class="ph-left">';
    h+='<span class="ph-label">'+(m.emoji?m.emoji+'&nbsp;':'')+escH(m.label||s)+'</span>';
    if(m.desc)h+='<span class="ph-desc">'+escH(m.desc)+'</span>';
    h+='<div class="score-row">';
    h+='<span class="sc ok" id="sc-ok-'+s+'">✓ 0</span>';
    h+='<span class="sc ko" id="sc-ko-'+s+'">✗ 0</span>';
    h+='<span class="sc rem" id="sc-rem-'+s+'">○ '+cnt+'</span>';
    h+='</div></div>';
    h+='<button class="fbtn" id="fb-'+s+'" onclick="toggleFail(\''+s+'\')">Solo falladas</button>';
    h+='</div>';
    h+='<div id="qs-'+s+'"></div>';
    h+='<div class="no-failed" id="nf-'+s+'">Aún no has fallado ninguna 🎉</div>';
    h+='<div class="no-results" id="nr-'+s+'">No se encontraron preguntas</div>';
    h+='<div class="sec-actions">';
    h+='<button class="reset-btn" onclick="resetSec(\''+s+'\')">↺ Reiniciar</button>';
    h+='<button class="nota-btn" onclick="calcNota(\''+s+'\')">✎ Calcular nota</button>';
    h+='</div>';
    h+='<div class="nota-box" id="nota-'+s+'"></div>';
    h+='</div>';
  });
  var pw=document.getElementById('panels-wrap');if(pw)pw.innerHTML=h;
}

/* ── Índice O(1) + numeración fija ── */
function buildIdx(){
  SECS.forEach(function(s){
    qIdx[s]={};
    if(D[s])D[s].forEach(function(q){qIdx[s][q.n]=q;});
  });
}
function buildNums(){
  // Numeración correlativa fija: 1, 2, 3... por sección
  SECS.forEach(function(s){
    qNums[s]={};
    if(D[s])D[s].forEach(function(q,i){qNums[s][q.n]=i+1;});
  });
}
function getNum(sec,n){return qNums[sec]?qNums[sec][n]||n:n;}
function findQ(qid){
  var d=qid.indexOf('-'),s=qid.substring(0,d),n=qid.substring(d+1);
  return(qIdx[s]&&qIdx[s][n])||null;
}
function getSecFromQid(qid){return qid.substring(0,qid.indexOf('-'));}
function getNFromQid(qid){return qid.substring(qid.indexOf('-')+1);}

/* ── Orden inter-secciones para Todos ── */
function buildAllOrder(){
  var all=[];
  SECS.forEach(function(s){if(D[s])D[s].forEach(function(q){all.push({sec:s,n:q.n});});});
  if(!qOrd['__all__'])qOrd['__all__']=shuffle(all.map(function(x){return x.sec+'|'+x.n;}));
  allOrder=qOrd['__all__'].map(function(key){
    var p=key.indexOf('|'),sec=key.substring(0,p),n=key.substring(p+1);
    return{sec:sec,n:n,q:qIdx[sec]&&qIdx[sec][n]};
  }).filter(function(x){return x.q;});
}

/* ── Utilidades ── */
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function getQOrd(s,qs){if(!qOrd[s])qOrd[s]=shuffle(qs.map(function(q){return q.n;}));return qOrd[s];}
function getOOrd(qid){
  var q=findQ(qid);var n=q&&q.o?q.o.length:4;
  if(q&&q.noShuffle){var a=[];for(var i=0;i<n;i++)a.push(i);return a;}
  if(!oOrd[qid]){var a=[];for(var i=0;i<n;i++)a.push(i);oOrd[qid]=shuffle(a);}
  return oOrd[qid];
}
function imgHtml(key){
  if(!IMGS[key]){console.warn('IMGS: clave no encontrada →',key);return'';}
  return'<div class="clinimg-wrap"><img src="'+IMGS[key]+'" class="clinimg" alt="Imagen clínica" loading="lazy"><div class="clinimg-cap">Imagen clínica</div></div>';
}

/* ── localStorage debounce ── */
function saveLocal(){
  if(!canSave)return;
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    try{
      localStorage.setItem(KEY,JSON.stringify({state:state,qOrd:qOrd,oOrd:oOrd,starred:starred,failHist:failHist,dark:darkMode,timerSec:timerSec}));
      setBadge('Guardado','ok');
    }catch(e){setBadge('Sin guardado','warn');}
  },300);
}
function setBadge(t,c){var b=document.getElementById('save-badge');if(b){b.textContent=t;b.className='sbadge '+c;}}

/* ── Construcción de tarjeta ── */
function buildCard(q,sec,inAll,allPos){
  var qid=sec+'-'+q.n;
  var cid=(inAll?'A-':'S-')+qid;
  var num=inAll?(allPos+1):getNum(sec,q.n);
  var oo=getOOrd(qid);
  var sOpts=oo.map(function(i){return q.o[i];});
  var nc=oo.indexOf(q.c-1)+1;
  var ans=state[qid];
  var cc=ans?(ans.r?' answered-ok':' answered-wrong'):'';
  var badgeCls='qnum'+(inAll?'':' sec-colored');
  var h='<div class="qcard s-'+sec+cc+'" id="card-'+cid+'">';
  h+='<div class="qhead" id="h-'+cid+'" data-cid="'+cid+'" data-qid="'+qid+'" data-sec="'+sec+'" onclick="tog(this.dataset.cid)">';
  h+='<span class="'+badgeCls+'">'+num+'</span>';
  h+='<span class="qtxt">'+q.q+(ans?'<span class="atag '+(ans.r?'ok':'ko')+'">'+(ans.r?'✓ acertada':'✗ fallada')+'</span>':'')+'</span>';
  h+='<button class="star-btn'+(starred[qid]?' on':'')+'\" id="star-'+cid+'" onclick="event.stopPropagation();toggleStar(\''+qid+'\')" title="Marcar (S)"><span class="si">\u2606</span><span class="sf">\u2605</span></button>';
  h+='<span class="chev">▾</span>';
  h+='</div>';
  h+='<div class="qbody" id="b-'+cid+'">';
  if(q.img)h+=imgHtml(q.img);
  if(currentMode==='quick'){
    h+='<div class="quick-card"><div class="quick-rc">✓ Respuesta correcta: opción '+nc+' — '+escH(q.o[q.c-1])+'</div><div class="expbox">'+q.e+'</div></div>';
  } else {
    h+='<ul class="opts" id="opts-'+cid+'">';
    h+=sOpts.map(function(o,i){
      var p=i+1,oc='opt';
      if(ans){oc+=' done';if(p===nc)oc+=' correct';else if(p===ans.c&&!ans.r)oc+=' wrong';}
      return'<li class="'+oc+'" data-qid="'+qid+'" data-pos="'+p+'" data-sec="'+sec+'" onclick="answer(this.dataset.qid,+this.dataset.pos,this.dataset.sec)"><span class="onum">'+p+'.</span><span>'+o+'</span></li>';
    }).join('');
    h+='</ul>';
    if(ans){h+='<div class="expbox"><span class="et">'+(ans.r?'✓ Correcto':'✗ Incorrecto — Respuesta correcta: opción '+nc)+'</span>'+q.e+'</div>';}
  }
  h+='</div></div>';
  return h;
}

/* ── Render sección ── */
function render(sec){
  var qs=D[sec];if(!qs)return;
  var ord=getQOrd(sec,qs);
  var sorted=ord.map(function(n){return qIdx[sec]&&qIdx[sec][n];}).filter(Boolean);
  var el=document.getElementById('qs-'+sec);
  if(el)el.innerHTML=sorted.map(function(q){return buildCard(q,sec,false,0);}).join('');
}

/* ── Render Todos (mezcla inter-secciones) ── */
function renderAll(){
  if(!allOrder)buildAllOrder();
  var el=document.getElementById('qs-all');
  if(el)el.innerHTML=allOrder.map(function(x,i){return buildCard(x.q,x.sec,true,i);}).join('');
}

/* ── Toggle open/close ── */
function tog(cid){
  var b=document.getElementById('b-'+cid),h=document.getElementById('h-'+cid);
  if(!b||!h)return;
  var opening=!b.classList.contains('open');
  b.classList.toggle('open');h.classList.toggle('open');
  if(opening){
    if(activeCid&&activeCid!==cid){var pc=document.getElementById('card-'+activeCid);if(pc)pc.classList.remove('kb-focus');}
    activeCid=cid;
    var card=document.getElementById('card-'+cid);if(card)card.classList.add('kb-focus');
  }else{
    if(activeCid===cid){activeCid=null;var card=document.getElementById('card-'+cid);if(card)card.classList.remove('kb-focus');}
  }
}

/* ── Responder ── */
function answer(qid,pos,sec){
  if(state[qid])return;
  var q=findQ(qid);if(!q)return;
  var oo=getOOrd(qid);
  var nc=oo.indexOf(q.c-1)+1;
  var isRight=pos===nc;
  state[qid]={c:pos,r:isRight};
  // Registro de errores
  if(!isRight){failHist[qid]=(failHist[qid]||0)+1;}
  saveLocal();
  // Actualizar todas las instancias del card (panel sección + panel all)
  // Actualizar opciones en todas las instancias del card
  ['A-'+qid,'S-'+qid].forEach(function(cid){
    var optsEl=document.querySelectorAll('#opts-'+cid+' .opt');
    optsEl.forEach(function(el,i){
      el.classList.add('done');
      if(i+1===nc)el.classList.add('correct');
      else if(i+1===pos&&!isRight)el.classList.add('wrong');
    });
    var bdy=document.getElementById('b-'+cid);
    if(bdy){
      var eb=bdy.querySelector('.expbox');
      if(!eb){eb=document.createElement('div');eb.className='expbox';bdy.appendChild(eb);}
      eb.innerHTML='<span class="et">'+(isRight?'✓ Correcto':'✗ Incorrecto — Respuesta correcta: opción '+nc)+'</span>'+q.e;
    }
    var hd=document.getElementById('h-'+cid);
    if(hd){var qt=hd.querySelector('.qtxt');if(qt&&!qt.querySelector('.atag')){var at=document.createElement('span');at.className='atag '+(isRight?'ok':'ko');at.innerHTML=isRight?'✓ acertada':'✗ fallada';qt.appendChild(at);}}
    var card=document.getElementById('card-'+cid);
    if(card)card.classList.add(isRight?'answered-ok':'answered-wrong');
  });
  updateScores();updateProg();
  if(fFailed[sec]&&isRight){
    var fcard=document.getElementById('card-S-'+qid);
    if(fcard)fcard.style.display='none';
    refreshNF(sec);
  }
}

/* ── Estrella ── */
function toggleStar(qid){
  starred[qid]=!starred[qid];
  ['A-'+qid,'S-'+qid].forEach(function(cid){
    var btn=document.getElementById('star-'+cid);
    if(btn)btn.classList.toggle('on',starred[qid]);
  });
  saveLocal();
}
function filterStarred(){
  starsFilter=!starsFilter;
  var btn=document.getElementById('btn-stars');
  if(btn){btn.style.background=starsFilter?'#fef3c7':'';btn.style.fontWeight=starsFilter?'700':'';}
  document.querySelectorAll('.qcard').forEach(function(card){
    if(starsFilter){
      var hd=card.querySelector('.qhead');
      var qid=hd?hd.dataset.qid:'';
      card.style.display=starred[qid]?'':'none';
    }else{card.style.display='';}
  });
}

/* ── Filtro falladas ── */
function refreshNF(sec){
  var c=document.getElementById('qs-'+sec);if(!c||!fFailed[sec])return;
  var n=c.querySelectorAll('.qcard.answered-wrong').length;
  var m=document.getElementById('nf-'+sec);if(m)m.classList.toggle('show',n===0);
}
function toggleFail(sec){
  fFailed[sec]=!fFailed[sec];
  var btn=document.getElementById('fb-'+sec);
  if(btn){btn.classList.toggle('on',fFailed[sec]);btn.textContent=fFailed[sec]?'← Ver todas':'Solo falladas';}
  var c=document.getElementById('qs-'+sec);if(!c)return;
  var nf=0;
  c.querySelectorAll('.qcard').forEach(function(card){
    if(fFailed[sec]){var show=card.classList.contains('answered-wrong');card.style.display=show?'':'none';if(show)nf++;}
    else{card.style.display='';}
  });
  var m=document.getElementById('nf-'+sec);if(m)m.classList.toggle('show',fFailed[sec]&&nf===0);
}

/* ── Scores y progreso ── */
function updateScores(){
  var tok=0,tok2=0,tok3=0;
  SECS.forEach(function(sec){
    var ok=0,ko=0;
    if(D[sec])D[sec].forEach(function(q){var a=state[sec+'-'+q.n];if(a){if(a.r)ok++;else ko++;}});
    var tot=D[sec]?D[sec].length:0,rem=tot-ok-ko;
    tok+=ok;tok2+=ko;tok3+=rem;
    var eok=document.getElementById('sc-ok-'+sec),eko=document.getElementById('sc-ko-'+sec),erm=document.getElementById('sc-rem-'+sec);
    if(eok)eok.textContent='✓ '+ok;if(eko)eko.textContent='✗ '+ko;if(erm)erm.textContent='○ '+rem;
  });
  var eok=document.getElementById('sc-ok-all'),eko=document.getElementById('sc-ko-all'),erm=document.getElementById('sc-rem-all');
  if(eok)eok.textContent='✓ '+tok;if(eko)eko.textContent='✗ '+tok2;if(erm)erm.textContent='○ '+tok3;
}
function updateProg(){
  var total=0,done=Object.keys(state).length;
  SECS.forEach(function(s){if(D[s])total+=D[s].length;});
  var pct=total>0?Math.round(done/total*100):0;
  var bar=document.getElementById('prog-bar');if(bar)bar.style.width=pct+'%';
}

/* ── Tabs ── */
function showTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  var tb=document.querySelector('.tab.t-'+t);if(tb)tb.classList.add('on');
  var mc=document.getElementById('main-cont');if(mc)mc.setAttribute('data-tab',t);
  var panelAll=document.getElementById('panel-all');
  if(panelAll)panelAll.classList.toggle('visible',t==='all');
  SECS.forEach(function(s){
    var p=document.getElementById('panel-'+s);
    if(p)p.classList.toggle('visible',t===s);
  });
  var gnb=document.getElementById('nota-all');if(gnb){gnb.style.display='none';gnb.className='global-nota-box';}
  clearSearch();
}

/* ── Reset ── */
function resetSec(sec){
  if(D[sec])D[sec].forEach(function(q){var qid=sec+'-'+q.n;delete state[qid];delete oOrd[qid];});
  delete qOrd[sec];fFailed[sec]=false;activeCid=null;
  var btn=document.getElementById('fb-'+sec);if(btn){btn.classList.remove('on');btn.textContent='Solo falladas';}
  var nb=document.getElementById('nota-'+sec);if(nb){nb.style.display='none';nb.className='nota-box';}
  saveLocal();render(sec);
  var m=document.getElementById('nf-'+sec);if(m)m.classList.remove('show');
  updateScores();updateProg();
  // Reconstruir panel all para reflejar cambios
  buildAllOrder();renderAll();
}
function resetAll(){
  Object.keys(state).forEach(function(k){delete state[k];});
  Object.keys(oOrd).forEach(function(k){delete oOrd[k];});
  Object.keys(qOrd).forEach(function(k){delete qOrd[k];});
  activeCid=null;starsFilter=false;allOrder=null;
  var bs=document.getElementById('btn-stars');if(bs){bs.style.background='';bs.style.fontWeight='';}
  SECS.forEach(function(s){
    fFailed[s]=false;
    var btn=document.getElementById('fb-'+s);if(btn){btn.classList.remove('on');btn.textContent='Solo falladas';}
    var nb=document.getElementById('nota-'+s);if(nb){nb.style.display='none';nb.className='nota-box';}
  });
  saveLocal();
  SECS.forEach(render);
  buildAllOrder();renderAll();
  var gnb=document.getElementById('nota-all');if(gnb){gnb.style.display='none';gnb.className='global-nota-box';}
  updateScores();updateProg();
}

/* ── Nota y revisión ── */
function buildRevList(sec){
  var qs=D[sec];if(!qs)return'';
  var failed=qs.filter(function(q){var a=state[sec+'-'+q.n];return a&&!a.r;});
  if(!failed.length)return'';
  var html='<div class="review-list"><div class="review-title">📋 '+failed.length+' pregunta'+(failed.length>1?'s':'')+' fallada'+(failed.length>1?'s':'')+' — repasa aquí:</div>';
  failed.forEach(function(q){
    var qid=sec+'-'+q.n;var oo=getOOrd(qid);var nc=oo.indexOf(q.c-1)+1;
    html+='<details class="review-item"><summary><span><b>'+getNum(sec,q.n)+'.</b> '+q.q+'</span></summary>';
    html+='<div class="review-body"><div class="review-ans">✓ Opción '+nc+': '+escH(q.o[q.c-1]||'')+'</div>';
    html+='<div class="expbox">'+q.e+'</div></div></details>';
  });
  return html+'</div>';
}
function calcNota(sec){
  var qs=D[sec];if(!qs)return;
  var total=qs.length,ok=0,ko=0,skip=0;
  qs.forEach(function(q){var a=state[sec+'-'+q.n];if(!a)skip++;else if(a.r)ok++;else ko++;});
  var nota=Math.max(0,(ok-ko/3)/total*10),str=nota.toFixed(2),pass=nota>=5;
  var box=document.getElementById('nota-'+sec);if(!box)return;
  box.className='nota-box '+(pass?'pass':'fail');
  box.innerHTML='<span class="nota-score">'+(pass?'✓':'✗')+' '+str+' / 10</span>'
    +'<div class="nota-detail">Aciertos: '+ok+' | Fallos: '+ko+' | Sin responder: '+skip+'<br>'
    +'('+ok+' − '+ko+'/3) / '+total+' × 10 = '+str+'</div>'
    +buildRevList(sec);
  box.style.display='block';
}
function calcNotaAll(){
  var total=0,ok=0,ko=0,skip=0;
  SECS.forEach(function(sec){
    var qs=D[sec];if(!qs)return;
    total+=qs.length;
    qs.forEach(function(q){var a=state[sec+'-'+q.n];if(!a)skip++;else if(a.r)ok++;else ko++;});
  });
  var nota=Math.max(0,(ok-ko/3)/total*10),str=nota.toFixed(2),pass=nota>=5;
  var box=document.getElementById('nota-all');if(!box)return;
  box.className='global-nota-box '+(pass?'pass':'fail');
  var html='<span class="nota-score">'+(pass?'✓':'✗')+' '+str+' / 10 (global)</span>'
    +'<div class="nota-detail">Aciertos: '+ok+' | Fallos: '+ko+' | Sin responder: '+skip+'<br>'
    +'('+ok+' − '+ko+'/3) / '+total+' × 10 = '+str+'</div>';
  SECS.forEach(function(sec){
    var rv=buildRevList(sec);
    if(rv){var m=META.secciones[sec]||{};html+='<div class="review-sec-label">'+(m.emoji?m.emoji+' ':'')+escH(m.label||sec)+'</div>'+rv;}
  });
  box.innerHTML=html;box.style.display='block';
}

/* ── Estadísticas de errores ── */
function toggleStats(){
  statsVisible=!statsVisible;
  var btn=document.getElementById('btn-stats');
  if(btn){btn.style.background=statsVisible?'var(--ko-bg)':'';btn.style.color=statsVisible?'var(--ko-t)':'';}
  var box=document.getElementById('stats-global');
  if(!box)return;
  if(!statsVisible){box.classList.remove('show');return;}
  var entries=Object.entries(failHist).filter(function(e){return e[1]>0;});
  if(!entries.length){box.innerHTML='<div class="stats-title">📊 Sin errores registrados todavía</div>';box.classList.add('show');return;}
  entries.sort(function(a,b){return b[1]-a[1];});
  var top=entries.slice(0,10);
  var maxV=top[0][1];
  var html='<div class="stats-title">📊 Preguntas más falladas (acumulado entre sesiones)</div>';
  top.forEach(function(e,i){
    var qid=e[0],count=e[1];
    var q=findQ(qid);if(!q)return;
    var sec=getSecFromQid(qid),n=getNFromQid(qid);
    var m=META.secciones[sec]||{};
    var pct=Math.round(count/maxV*100);
    html+='<div class="stats-item">';
    html+='<span class="stats-n" style="min-width:18px;color:var(--ko-t);font-weight:700">'+(i+1)+'.</span>';
    html+='<span class="stats-q">'+(m.emoji?m.emoji+' ':'')+getNum(sec,n)+'. '+q.q.substring(0,60)+(q.q.length>60?'…':'')+'</span>';
    html+='<div class="stats-bar-wrap"><div class="stats-bar" style="width:'+pct+'%"></div></div>';
    html+='<span class="stats-n">'+count+'✗</span>';
    html+='</div>';
  });
  box.innerHTML=html;box.classList.add('show');
}

/* ── Buscador ── */
function onSearch(val){
  var v=val.trim().toLowerCase();
  var clr=document.getElementById('search-clear');
  var cnt=document.getElementById('search-count');
  if(clr)clr.style.display=v?'block':'none';
  var found=0,total=0;
  document.querySelectorAll('.qcard').forEach(function(card){
    total++;
    if(!v){card.classList.remove('search-hidden');found++;}
    else{
      var qtxt=card.querySelector('.qtxt');
      var match=qtxt&&qtxt.textContent.toLowerCase().indexOf(v)!==-1;
      card.classList.toggle('search-hidden',!match);
      if(match)found++;
    }
  });
  if(cnt){
    if(v){cnt.textContent=found+' de '+total+' preguntas';cnt.style.display='block';}
    else{cnt.style.display='none';}
  }
  // Mostrar "sin resultados" por panel
  ['all'].concat(SECS).forEach(function(s){
    var panel=document.getElementById('panel-'+s);if(!panel||!panel.classList.contains('visible'))return;
    var cards=panel.querySelectorAll('.qcard:not(.search-hidden)');
    var nr=document.getElementById('nr-'+s);if(nr)nr.style.display=cards.length===0&&v?'block':'none';
  });
}
function clearSearch(){
  var si=document.getElementById('search-input');if(si)si.value='';
  onSearch('');
}

/* ── Modo ── */
function setMode(mode){
  currentMode=mode;
  document.getElementById('mode-test').classList.toggle('on',mode==='test');
  document.getElementById('mode-quick').classList.toggle('on',mode==='quick');
  // Rerenderizar todo
  SECS.forEach(render);renderAll();
}

/* ── Modo oscuro ── */
function applyTheme(){
  document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');
  var btn=document.getElementById('btn-dark');if(btn)btn.textContent=darkMode?'☀️':'🌙';
}
function toggleDark(){darkMode=!darkMode;applyTheme();saveLocal();}

/* ── Temporizador ── */
function initTimer(){
  timerRemaining=timerSec;
  renderTimer();
  var disp=document.getElementById('timer-display');
  if(disp){
    disp.addEventListener('click',function(){startEditTimer();});
  }
}
function fmtTime(s){
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return h+':'+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;
}
function renderTimer(){
  var disp=document.getElementById('timer-display');
  if(!disp)return;
  disp.textContent=fmtTime(timerRemaining);
  disp.classList.toggle('danger',timerSec>0&&timerRemaining===0);
}
function timerToggle(){
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('btn-tplay').textContent='▶';
  }else{
    if(timerRemaining<=0&&timerSec>0)timerRemaining=timerSec;
    timerRunning=true;
    document.getElementById('btn-tplay').textContent='⏸';
    timerInterval=setInterval(function(){
      if(timerRemaining>0){timerRemaining--;renderTimer();}
      else{clearInterval(timerInterval);timerRunning=false;document.getElementById('btn-tplay').textContent='▶';renderTimer();}
    },1000);
  }
}
function timerReset(){
  clearInterval(timerInterval);timerRunning=false;
  timerRemaining=timerSec;
  document.getElementById('btn-tplay').textContent='▶';
  renderTimer();
}
function startEditTimer(){
  var disp=document.getElementById('timer-display');if(!disp)return;
  if(timerRunning){timerToggle();}
  var old=fmtTime(timerRemaining);
  disp.contentEditable='true';disp.classList.add('editing');
  disp.textContent=old;
  disp.focus();
  var range=document.createRange();range.selectNodeContents(disp);
  var sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  function commit(){
    disp.contentEditable='false';disp.classList.remove('editing');
    var txt=disp.textContent.trim();
    var parts=txt.split(':').map(Number);
    var secs=0;
    if(parts.length===3)secs=parts[0]*3600+parts[1]*60+parts[2];
    else if(parts.length===2)secs=parts[0]*60+parts[1];
    else if(parts.length===1)secs=parts[0]*60;
    if(!isNaN(secs)&&secs>=0){timerSec=secs;timerRemaining=secs;saveLocal();}
    renderTimer();
  }
  disp.addEventListener('blur',commit,{once:true});
  disp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();disp.blur();}});
}

/* ── Helpers cid ── */
function cidToQid(cid){return cid.replace(/^[AS]-/,'');}

/* ── Teclado ── */
function handleKey(e){
  var tg=e.target.tagName;
  if(tg==='INPUT'||tg==='TEXTAREA'||e.target.contentEditable==='true')return;
  var k=e.key;
  if(k>='1'&&k<='5'){
    if(activeCid&&!state[cidToQid(activeCid)]){
      var aqid=cidToQid(activeCid);
      var pos=parseInt(k),q=findQ(aqid);
      if(q&&pos<=q.o.length){e.preventDefault();answer(aqid,pos,getSecFromQid(aqid));}
    }
  }else if(k==='ArrowDown'||k==='ArrowUp'){
    e.preventDefault();navigateQ(k==='ArrowDown'?1:-1);
  }else if(k==='s'||k==='S'){
    if(activeCid)toggleStar(cidToQid(activeCid));
  }
}
function navigateQ(dir){
  var cards=Array.from(document.querySelectorAll('.sec-panel.visible .qcard')).filter(function(c){return c.style.display!=='none'&&!c.classList.contains('search-hidden');});
  var cids=cards.map(function(c){return c.id.replace('card-','');});
  if(!cids.length)return;
  var idx=activeCid?cids.indexOf(activeCid):-1;
  var nidx=Math.max(0,Math.min(cids.length-1,idx+dir));
  var ncid=cids[nidx];if(!ncid||ncid===activeCid)return;
  if(activeCid){var ob=document.getElementById('b-'+activeCid);var oh=document.getElementById('h-'+activeCid);if(ob)ob.classList.remove('open');if(oh)oh.classList.remove('open');var oc=document.getElementById('card-'+activeCid);if(oc)oc.classList.remove('kb-focus');}
  activeCid=ncid;
  var nb=document.getElementById('b-'+ncid);var nh=document.getElementById('h-'+ncid);
  if(nb)nb.classList.add('open');if(nh)nh.classList.add('open');
  var nc2=document.getElementById('card-'+ncid);if(nc2){nc2.classList.add('kb-focus');nc2.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
</script>
