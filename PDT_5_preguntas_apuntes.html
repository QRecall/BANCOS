ego la nefrectom\u00eda","La desinserci\u00f3n abierta est\u00e1 indicada en tumores distales, realizando primero la nefrectom\u00eda y luego la disecci\u00f3n del tramo distal con rodete vesical","Los pacientes con ganglios positivos en imagen (cN+) son contraindicaci\u00f3n absoluta para la nefroureterectom\u00eda","Los resultados oncol\u00f3gicos de la v\u00eda laparosc\u00f3pica son superiores a los de la t\u00e9cnica abierta"],"c":1,"e":"En los tumores del tracto urinario superior PROXIMAL se realiza: desinserci\u00f3n endosc\u00f3pica del meato ureteral primero y luego nefrectom\u00eda laparosc\u00f3pica. Para tumores DISTALES: nefrectom\u00eda primero y luego desinserci\u00f3n abierta del tramo distal con rodete vesical. Los resultados laparosc\u00f3picos son equivalentes (no superiores) a los abiertos.","ai":false},{"n":"nt4","q":"\u00bfCu\u00e1l de los siguientes factores de riesgo del TUTS indicar\u00eda la realizaci\u00f3n de nefroureterectom\u00eda radical?","o":["Tumor de bajo grado","Presencia de hidronefrosis en la TC","Tama\u00f1o tumoral <1 cm","Citolog\u00eda de orina negativa para carcinoma de alto grado"],"c":2,"e":"La presencia de hidronefrosis en la TC es un factor de alto riesgo del TUTS (indica obstrucci\u00f3n del tracto por el tumor con mayor probabilidad de invasi\u00f3n o high grade) y junto con la citolog\u00eda positiva de alto grado, tama\u00f1o >2cm o multifocalidad, es indicaci\u00f3n de nefroureterectom\u00eda radical en lugar de manejo endosc\u00f3pico conservador.","ai":false},{"n":"np1","q":"Var\u00f3n de 58 a\u00f1os, STUI obstructivos (IPSS 9), mala tolerancia al tratamiento m\u00e9dico, pr\u00f3stata de 107cc, residuo postmiccional 87ml. Biopsia negativa para malignidad. \u00bfOpci\u00f3n quir\u00fargica m\u00e1s adecuada?","o":["Adenomectom\u00eda transvertical o retrop\u00fabica abierta","Fotovaporizaci\u00f3n con l\u00e1ser verde (KTP)","Resecci\u00f3n transuretral de pr\u00f3stata (RTU-P)","Fotovaporizaci\u00f3n con l\u00e1ser tulio (TmLRP) o enucleaci\u00f3n con l\u00e1ser Holmium (HoLEP)"],"c":4,"e":"Para pr\u00f3statas >80-100cc, la RTU-P tiene alto riesgo de s\u00edndrome de reabsorci\u00f3n por el largo tiempo de resecci\u00f3n necesario. Para grandes pr\u00f3statas (>80cc) se prefieren t\u00e9cnicas con l\u00e1ser (HoLEP, TmLRP) o adenomectom\u00eda abierta. El HoLEP permite enuclear pr\u00f3statas de cualquier tama\u00f1o con menor sangrado, menor estancia hospitalaria y menor tasa de reintervenci\u00f3n.","ai":false},{"n":"np2","q":"\u00bfCu\u00e1l complicaci\u00f3n postquir\u00fargica NO se corresponde con la adenomectom\u00eda prost\u00e1tica retrop\u00fabica (cirug\u00eda abierta)?","o":["S\u00edndrome de reabsorci\u00f3n secundario a hiponatremia","Hematuria postoperatoria","Eyaculaci\u00f3n retr\u00f3grada","Esclerosis de la celda prost\u00e1tica"],"c":1,"e":"El s\u00edndrome de reabsorci\u00f3n (hiponatremia dilucional por absorci\u00f3n de l\u00edquido de irrigaci\u00f3n hipot\u00f3nico a trav\u00e9s de los senos venosos prost\u00e1ticos abiertos) es una complicaci\u00f3n EXCLUSIVA de la RTU-P endosc\u00f3pica. La adenomectom\u00eda abierta utiliza suero fisiol\u00f3gico y NO produce este s\u00edndrome. Las dem\u00e1s complicaciones pueden ocurrir en ambas t\u00e9cnicas.","ai":false},{"n":"np3","q":"Paciente de 61 a\u00f1os, PSA 8.2 ng/mL, PSA libre 14%, adenocarcinoma Gleason 3+4 (ISUP 2), lesi\u00f3n PI-RADS 5 en l\u00f3bulo derecho que infiltra focalmente la c\u00e1psula prost\u00e1tica. \u00bfOpci\u00f3n quir\u00fargica m\u00e1s indicada?","o":["Prostatectom\u00eda radical intrafascial con preservaci\u00f3n bilateral de bandeletas neurovasculares","Prostatectom\u00eda radical extrafascial sin preservaci\u00f3n de bandeleta neurovascular izquierda","Prostatectom\u00eda radical extrafascial con preservaci\u00f3n bilateral de bandeletas","Prostatectom\u00eda radical extrafascial con linfadenectom\u00eda p\u00e9lvica extendida"],"c":4,"e":"La infiltraci\u00f3n capsular focal (pT3a) obliga a cirug\u00eda EXTRAFASCIAL para garantizar m\u00e1rgenes libres. Con Gleason 3+4 (ISUP 2), PSA >8 ng/mL y extensi\u00f3n extraprost\u00e1tica, la probabilidad de ganglios positivos supera el 5%, indicando linfadenectom\u00eda p\u00e9lvica extendida. La preservaci\u00f3n de bandeletas queda en segundo plano ante la extensi\u00f3n extraprost\u00e1tica.","ai":false},{"n":"np4","q":"Respecto a los cabestrillos suburetrales sint\u00e9ticos como tratamiento de la IU de esfuerzo femenina, se\u00f1ala la opci\u00f3n FALSA:","o":["Es el tratamiento de elecci\u00f3n para la IU de esfuerzo","Los retrop\u00fabicos tienen mayor riesgo de perforaci\u00f3n vesical que los transobturadores","Los transobturadores tienen mayor riesgo de dolor cr\u00f3nico y dispareunia que los retrop\u00fabicos","Los cabestrillos de incisi\u00f3n \u00fanica (mini-slings) tienen una tasa de complicaciones similar a los cabestrillos convencionales"],"c":4,"e":"Los cabestrillos de incisi\u00f3n \u00fanica (mini-slings) tienen MENOR tasa de complicaciones perioperatorias (menos dolor, menor tiempo quir\u00fargico, menos sangrado) pero tambi\u00e9n tienen una tasa de curaci\u00f3n a largo plazo INFERIOR a los cabestrillos convencionales. Por tanto, no son equivalentes en eficacia terap\u00e9utica.","ai":false},{"n":"np5","q":"Respecto a la cirug\u00eda de la HBP, indique la respuesta FALSA:","o":["La retenci\u00f3n urinaria aguda recurrente, litiasis vesical e insuficiencia renal obstructiva son indicaciones absolutas de cirug\u00eda desobstructiva","La enucleaci\u00f3n prost\u00e1tica con l\u00e1ser Holmium tiene resultados equivalentes a la adenomectom\u00eda abierta con menor sangrado y hospitalizaci\u00f3n","En la RTU-P es imprescindible la resecci\u00f3n ordenada con hemostasia cuidadosa teniendo como referencias el cuello vesical y el veru montanum","El s\u00edndrome de reabsorci\u00f3n est\u00e1 relacionado con el tiempo de resecci\u00f3n, el peso de tejido resecado y el sangrado abundante"],"c":1,"e":"Seg\u00fan el solucionario del PDF, la opci\u00f3n A es se\u00f1alada como falsa, posiblemente por imprecisiones en la formulaci\u00f3n de las indicaciones absolutas de cirug\u00eda de HBP (la retenci\u00f3n cr\u00f3nica por rebosamiento, el residuo postmiccional aislado sin da\u00f1o renal y la incontinencia por rebosamiento no siempre son indicaciones absolutas).","ai":true},{"n":"nh1","noShuffle":true,"img":null,"q":"Se\u00f1ale la respuesta verdadera respecto a la hematuria:","o":["La glomerulonefritis puede producir hematuria macrosc\u00f3pica o microsc\u00f3pica","Existen pigmentos y f\u00e1rmacos que pueden dar coloraci\u00f3n rojiza en la orina sin hematuria real","La uretrorragi\u00e1 se caracteriza por emisi\u00f3n de sangre por el meato uretral independientemente de la micci\u00f3n","Todas las anteriores son correctas"],"c":4,"e":"Las tres afirmaciones son correctas. <b>La GN puede dar hematuria macro o microsc\u00f3pica.</b> Pigmentos (remolacha, mioglobina) y f\u00e1rmacos (rifampicina, fenolftale\u00edna) producen pseudohematuria sin hem\u00e1t\u00ebes reales. La <b>uretrorragi\u00e1</b> es sangrado por el meato independiente de la micci\u00f3n."},{"n":"nh2","noShuffle":false,"img":null,"q":"Respecto a la hematuria, se\u00f1ale la respuesta incorrecta:","o":["La glomerulonefritis puede producir tanto hematuria macrosc\u00f3pica como microsc\u00f3pica","La proteinuria es muy infrecuente en la hematuria por glomerulonefritis","El estudio morfol\u00f3gico de los hem\u00e1t\u00ebes en el sedimento urinario es clave para definir el origen de la hematuria","Algunos laxantes pueden producir pseudohematuria"],"c":2,"e":"La afirmaci\u00f3n incorrecta es la B. La <b>proteinuria es FRECUENTE</b> en la hematuria glomerular: la GN cursa con proteinuria significativa, cilindros hem\u00e1ticos y hem\u00e1t\u00ebes dism\u00f3rficos. Los laxantes con fenolftale\u00edna s\u00ed producen pseudohematuria."},{"n":"nh3","noShuffle":false,"img":null,"q":"Todas las siguientes caracter\u00edsticas son t\u00edpicas de la hematuria de origen nefrol\u00f3gico, EXCEPTO:","o":["Presencia de hem\u00e1t\u00ebes dism\u00f3rficos &gt;80%","Proteinuria significativa (&gt;1 g/24h)","Presencia de cilindros hem\u00e1ticos","Asintom\u00e1tica"],"c":4,"e":"La hematuria <b>asintom\u00e1tica</b> es caracter\u00edstica del origen <b>urol\u00f3gico</b> (tumor renal o vesical), no nefrol\u00f3gico. La hematuria glomerular suele acompa\u00f1arse de edema, HTA u oliguria. Hem\u00e1t\u00ebes dism\u00f3rficos &gt;80%, proteinuria y cilindros hem\u00e1ticos son el patr\u00f3n glomerular cl\u00e1sico."}],"pal":[{"n":"pa1","q":"Paciente en fase de \u00faltimas horas con morfina en perfusi\u00f3n, disnea controlada, que presenta estertores h\u00famedos (respiraci\u00f3n estertorosa). \u00bfQu\u00e9 f\u00e1rmaco debemos asociar?","o":["Aumentar la dosis de morfina","Butilbromuro de escopolamina (buscapina)","Ondansetr\u00f3n","Haloperidol en gotas"],"c":2,"e":"Los estertores h\u00famedos en la agon\u00eda se producen por acumulaci\u00f3n de secreciones salivales y bronquiales en la v\u00eda a\u00e9rea superior que el paciente ya no puede movilizar. El tratamiento de elecci\u00f3n es el butilbromuro de escopolamina (anticolin\u00e9rgico): reduce la producci\u00f3n de secreciones bronquiales y salivales. La morfina controla la disnea pero no act\u00faa sobre las secreciones; el haloperidol se usa para el delirium.","ai":false}],"mi":[{"n":"mv1","q":"En la insuficiencia respiratoria, todas son contraindicaci\u00f3n de VMNI MENOS UNA:","o":["Trauma facial grave","Parada cardiorrespiratoria","Obstrucci\u00f3n de la v\u00eda a\u00e9rea superior","Paciente en lista de espera de trasplante pulmonar"],"c":4,"e":"El paciente en espera de trasplante pulmonar ES UNA INDICACI\u00d3N de VMNI (como puente al trasplante), no una contraindicaci\u00f3n. La VMNI puede mantener al paciente estable evitando la intubaci\u00f3n y permitiendo llegar al trasplante. Las contraindicaciones incluyen: PCR, trauma/cirug\u00eda facial reciente, obstrucci\u00f3n de v\u00eda a\u00e9rea superior e incapacidad para cooperar.","ai":false},{"n":"mv2","q":"El principal objetivo de la PEEP en la ventilaci\u00f3n mec\u00e1nica invasiva es:","o":["Hoy en d\u00eda no est\u00e1 indicado el uso de PEEP en la VM","Favorecer el intercambio gaseoso","Disminuir las presiones en el pulm\u00f3n","Evitar el colapso alveolar al final de la espiraci\u00f3n"],"c":4,"e":"La PEEP mantiene presi\u00f3n positiva al final de la espiraci\u00f3n, evitando el colapso alveolar c\u00edclico (microatelectasias) y manteniendo la capacidad residual funcional. Esto mejora indirectamente el intercambio gaseoso y permite reducir la FiO2 necesaria. Es el pilar del tratamiento ventilatorio del SDRA donde previene el da\u00f1o pulmonar por apertura-cierre repetido de alv\u00e9olos.","ai":false},{"n":"mc1","q":"Averigua el modo de estimulaci\u00f3n del marcapasos definitivo que lleva el paciente (la imagen muestra estimulaci\u00f3n auricular y ventricular sincronizada con inhibici\u00f3n por actividad propia):","o":["VDD","VVI","DDD","No lleva marcapasos"],"c":3,"e":"El modo DDD estimula y sensa tanto la aur\u00edcula (D) como el ventr\u00edculo (D) y tiene respuesta dual de inhibici\u00f3n y disparo (D). Es el modo m\u00e1s fisiol\u00f3gico al mantener la sincron\u00eda auriculoventricular. El modo VVI solo estimula y sensa el ventr\u00edculo, perdiendo la sincron\u00eda AV. El VDD sensa la aur\u00edcula pero solo estimula el ventr\u00edculo.","ai":false},{"n":"mc2","q":"Tras observar un ritmo anormal en el monitor, el primer paso a realizar es:","o":["Desfibrilar a 200J inmediatamente","Comprobar el pulso del paciente"],"c":2,"e":"Ante cualquier ritmo alarmante en el monitor, el PRIMER PASO es siempre comprobar el pulso del paciente: puede ser un artefacto (movimiento, electrodo suelto) o una disociaci\u00f3n electromec\u00e1nica (actividad el\u00e9ctrica sin pulso, que NO se desfibrilar\u00e1). Solo si hay FV/TVSP confirmada SIN pulso se desfibrilar\u00e1 de inmediato.","ai":false},{"n":"mc3","q":"De las siguientes indicaciones de cardioversi\u00f3n SINCRONIZADA de emergencia, se\u00f1ale la correcta:","o":["Una taquicardia de complejo QRS estrecho sin pulso","Una taquicardia de QRS estrecho regular, estable, que no responde a adenosina y amiodarona","Una taquicardia de QRS estrecho con paciente hemodin\u00e1micamente inestable","Una taquicardia de QRS estrecho regular, estable, que no responde a adenosina y procainamida"],"c":3,"e":"La cardioversi\u00f3n SINCRONIZADA de emergencia est\u00e1 indicada en taquiarritmias CON pulso pero con inestabilidad hemodin\u00e1mica (hipotensi\u00f3n, s\u00edncope, dolor tor\u00e1cico isqu\u00e9mico, IC aguda). La taquicardia sin pulso requiere desfibrilaci\u00f3n NO sincronizada. Las taquicardias estables se tratan primero con f\u00e1rmacos antiarr\u00edtmicos.","ai":false},{"n":"mc4","q":"\u00bfCu\u00e1l de estas patolog\u00edas NO es una indicaci\u00f3n del uso del bal\u00f3n de contrapulsaci\u00f3n a\u00f3rtico (BCIA)?","o":["Shock cardiog\u00e9nico","Angina inestable refractaria al tratamiento m\u00e9dico","Fallo ventricular refractario","Embolismo pulmonar agudo"],"c":4,"e":"El BCIA aumenta el gasto card\u00edaco y la perfusi\u00f3n coronaria actuando sobre el ventr\u00edculo IZQUIERDO. El embolismo pulmonar agudo es fundamentalmente un problema del ventr\u00edculo DERECHO: el BCIA no act\u00faa sobre el VD y no est\u00e1 indicado en el tromboembolismo pulmonar. Las otras tres opciones s\u00ed son indicaciones cl\u00e1sicas del BCIA.","ai":false},{"n":"ms1","q":"Paciente con traumatismo tor\u00e1cico, hipotensi\u00f3n, taquicardia y pulso parad\u00f3jico. \u00bfQu\u00e9 NO deber\u00edamos hacer?","o":["Pericardiocentesis urgente","Aportar volumen","Realizar diagn\u00f3stico diferencial con neumot\u00f3rax a tensi\u00f3n","Aportar ventilaci\u00f3n mec\u00e1nica con presi\u00f3n positiva"],"c":4,"e":"La VM con presi\u00f3n positiva est\u00e1 CONTRAINDICADA en el taponamiento card\u00edaco: al aumentar la presi\u00f3n intrator\u00e1cica, reduce a\u00fan m\u00e1s el retorno venoso al VD y el llenado del ventr\u00edculo, agravando el taponamiento. El tratamiento es la pericardiocentesis de urgencia. El diagn\u00f3stico diferencial con neumot\u00f3rax a tensi\u00f3n (que tambi\u00e9n cursa con hipotensi\u00f3n y distensi\u00f3n yugular) es obligatorio.","ai":false},{"n":"ms2","q":"En las primeras horas de un shock s\u00e9ptico, \u00bfqu\u00e9 NO se debe hacer?","o":["Administrar corticoides de forma rutinaria","Iniciar terapia con drogas vasoactivas si hay hipotensi\u00f3n refractaria a fluidos","Drenar el foco infeccioso si es accesible","Iniciar terapia antibi\u00f3tica emp\u00edrica precoz (en la primera hora)"],"c":1,"e":"Los corticoides (hidrocortisona 200 mg/d\u00eda) solo est\u00e1n indicados en el shock s\u00e9ptico REFRACTARIO a la reanimaci\u00f3n con fluidos y a dosis adecuadas de vasopresores (noradrenalina >0.25 mcg/kg/min). No deben administrarse de forma rutinaria en las primeras horas. Los vasopresores, el control del foco y los antibi\u00f3ticos precoces S\u00cd son prioritarios.","ai":false},{"n":"ms3","q":"Paciente politraumatizado: TCE grave, Glasgow 6, midriasis arreactiva derecha, inestabilidad hemodin\u00e1mica sin sangrado externo, bradipnea. \u00bfOrden de las cuatro primeras actuaciones?","o":["Intubaci\u00f3n, ventilaci\u00f3n, fluidoterapia, b\u00fasqueda del origen del sangrado","C\u00e1nula orofar\u00edngea, oxigenaci\u00f3n, fluidoterapia, TAC craneal","Intubaci\u00f3n, fluidoterapia, TAC craneal, b\u00fasqueda del origen del sangrado","Intubaci\u00f3n, ventilaci\u00f3n, fluidoterapia, TAC craneal"],"c":4,"e":"La secuencia ABCDE del ATLS: primero asegurar v\u00eda a\u00e9rea (intubaci\u00f3n orotraqueal dado el bajo Glasgow) + ventilaci\u00f3n (la bradipnea indica hipoventilaci\u00f3n), luego fluidoterapia para la inestabilidad hemodin\u00e1mica, y finalmente TC craneal para valorar el TCE grave. El TC se realiza tras estabilizar la v\u00eda a\u00e9rea y la hemodin\u00e1mica.","ai":false},{"n":"ms4","q":"\u00bfQu\u00e9 medidas se deben tomar en las primeras horas ante un enfermo en UCI con fiebre, disnea, tos con expectoraci\u00f3n purulenta y leucocitosis?","o":["Determinaci\u00f3n de lactato","Hemocultivos antes de iniciar antibi\u00f3tico","Iniciar antibi\u00f3tico emp\u00edrico de amplio espectro","Todas las anteriores"],"c":4,"e":"El bundle de sepsis incluye en la primera hora: medici\u00f3n del lactato s\u00e9rico, extracci\u00f3n de hemocultivos ANTES del antibi\u00f3tico (clave para el diagn\u00f3stico microbiol\u00f3gico), administraci\u00f3n de antibi\u00f3ticos de amplio espectro y fluidoterapia si hay hipotensi\u00f3n o lactato >2 mmol/L. Las tres medidas son correctas y deben realizarse conjuntamente.","ai":false},{"n":"ms5","q":"\u00bfCu\u00e1l de estos valores NO se tiene en cuenta para calcular el SOFA (Sequential Organ Failure Assessment)?","o":["Creatinina 1.3 mg/dl","PAM <70 mmHg con Dopamina >5 mcg/kg/min","INR >1.5","Bilirrubina 1.2 mg/dl"],"c":3,"e":"El SOFA eval\u00faa 6 \u00f3rganos: respiratorio (PaO2/FiO2), coagulaci\u00f3n (PLAQUETAS, no INR), hep\u00e1tico (bilirrubina), hemodin\u00e1mico (PAM y vasopresores), neurol\u00f3gico (GCS) y renal (creatinina o diuresis). El INR/TP NO forma parte del SOFA. La coagulaci\u00f3n en el SOFA se eval\u00faa con el recuento de plaquetas.","ai":false}],"nc":[{"n":"nt_1","q":"El tumor intracerebral primario maligno m\u00e1s frecuente en el adulto es:","o":["Met\u00e1stasis cerebral","Oligodendroglioma anapl\u00e1sico","Astrocitoma anapl\u00e1sico","Glioblastoma multiforme"],"c":4,"e":"El glioblastoma multiforme (GBM, glioma grado IV de la OMS) es el tumor cerebral PRIMARIO maligno m\u00e1s frecuente en adultos (mediana de edad al diagn\u00f3stico 65 a\u00f1os). Tiene un pron\u00f3stico muy desfavorable (supervivencia media ~15 meses con tratamiento multimodal). En el total de tumores intracraneales (primarios + secundarios), las met\u00e1stasis son las m\u00e1s frecuentes.","ai":false},{"n":"nt_2","q":"Respecto a la cl\u00ednica de los tumores infratentoriales, indique la respuesta FALSA:","o":["Hipertensi\u00f3n intracraneal por hidrocefalia comunicante","Diplop\u00eda por afectaci\u00f3n de pares craneales","Ataxia de la marcha","Dismetr\u00eda de los miembros"],"c":1,"e":"Los tumores infratentoriales causan hidrocefalia OBSTRUCTIVA (no comunicante): comprimen el IV ventr\u00edculo o el acueducto de Silvio bloqueando la circulaci\u00f3n del LCR. La hidrocefalia comunicante se produce por alteraci\u00f3n de la reabsorci\u00f3n o hipersecreci\u00f3n de LCR. Los tumores de fosa posterior producen signos cerebelosos (ataxia, dismetr\u00eda) y diplopia por afectaci\u00f3n de pares craneales.","ai":false},{"n":"nt_3","q":"El sitio de aparici\u00f3n m\u00e1s frecuente de las met\u00e1stasis cerebrales es:","o":["Vermis cerebeloso","Hemisferios cerebelosos","Hemisferios cerebrales","Tronco encef\u00e1lico"],"c":3,"e":"Las met\u00e1stasis cerebrales se localizan preferentemente en los HEMISFERIOS CEREBRALES (80%), en la uni\u00f3n c\u00f3rtico-subcortical donde los \u00e9mbolos tumorales quedan atrapados por el cambio de calibre vascular. El cerebelo (15%) es el segundo lugar. Los tumores que m\u00e1s metastatizan al cerebro son pulm\u00f3n, mama y melanoma.","ai":false},{"n":"nt_4","q":"Paciente de 54 a\u00f1os con hipoacusia neurosensorial izquierda de 2 a\u00f1os, ac\u00fafenos y mareos. \u00bfTipo de tumor m\u00e1s probable?","o":["Glioblastoma protuberancial","Neurinoma del VIII par craneal (schwannoma vestibular)","Meningioma del seno cavernoso","Neurinoma protuberancial"],"c":2,"e":"El neurinoma del VIII par (schwannoma vestibular) presenta la triada cl\u00e1sica: hipoacusia neurosensorial unilateral progresiva + ac\u00fafenos + v\u00e9rtigo/mareos. Es el tumor m\u00e1s frecuente del \u00e1ngulo pontocerebeloso (~80%). Se diagnostica con RM craneal con gadolinio (la secuencia de elecci\u00f3n es la CISS/FIESTA para el conducto auditivo interno).","ai":false},{"n":"nt_5","q":"\u00bfCu\u00e1l es el m\u00e9todo diagn\u00f3stico de elecci\u00f3n para la valoraci\u00f3n de patolog\u00eda tumoral intracraneal?","o":["TC cerebral con contraste","AngioTC cerebral","RMN cerebral","PET cerebral"],"c":3,"e":"La RM cerebral es la t\u00e9cnica de imagen de elecci\u00f3n para el estudio de la patolog\u00eda tumoral intracraneal: mayor resoluci\u00f3n de contraste de partes blandas, mejor caracterizaci\u00f3n del tumor (grado, extensi\u00f3n, l\u00edmites), detecci\u00f3n de lesiones de menor tama\u00f1o y valoraci\u00f3n de la respuesta al tratamiento. El TC es de primera l\u00ednea en urgencias.","ai":false},{"n":"nt_6","q":"Respecto al astrocitoma piloqu\u00edstico juvenil (grado I OMS), responda la correcta:","o":["Habitualmente aparece en la l\u00ednea media de los hemisferios cerebrales","Habitualmente es qu\u00edstico con un n\u00f3dulo mural","Aparece en la l\u00ednea media del cerebro en adultos","Es de alto grado de malignidad"],"c":2,"e":"El astrocitoma piloqu\u00edstico (Grado I OMS) es el tumor cerebral m\u00e1s frecuente en ni\u00f1os y adolescentes. Habitualmente es QU\u00cdSTICO (n\u00f3dulo mural vascularizado + quiste perif\u00e9rico), de localizaci\u00f3n preferente en cerebelo y v\u00eda \u00f3ptica. Es el tumor glial de MEJOR pron\u00f3stico (potencialmente curable con cirug\u00eda completa).","ai":false},{"n":"nt_7","q":"La radiocirug\u00eda ha demostrado ser eficaz en las siguientes lesiones, EXCEPTO:","o":["Met\u00e1stasis cerebrales \u00fanicas o m\u00faltiples","Meningiomas peque\u00f1os irresecables","Neurinomas del ac\u00fastico (schwannoma vestibular)","Aneurismas cerebrales"],"c":4,"e":"La radiocirug\u00eda estereot\u00e1xica (Gamma Knife, CyberKnife) es eficaz para met\u00e1stasis cerebrales, meningiomas peque\u00f1os, neurinomas del ac\u00fastico, MAVs peque\u00f1as y tumores hipofisarios. Los ANEURISMAS cerebrales NO son indicaci\u00f3n de radiocirug\u00eda: se tratan con embolizaci\u00f3n endovascular (coils de Guglielmi) o clipaje neuroquir\u00fargico.","ai":false},{"n":"nt_8","q":"El tratamiento de elecci\u00f3n en los tumores de la base del cr\u00e1neo, siempre que sea posible, es:","o":["Radioterapia estereot\u00e1ctica fraccionada","Radiocirug\u00eda (Gamma Knife)","Cirug\u00eda exer\u00e9tica (resecci\u00f3n quir\u00fargica)","Quimioterapia citorreductora"],"c":3,"e":"La cirug\u00eda exer\u00e9tica es el tratamiento de elecci\u00f3n en los tumores de la base del cr\u00e1neo siempre que sea t\u00e9cnicamente factible: permite obtener diagn\u00f3stico histol\u00f3gico definitivo y es potencialmente curativa. La radioterapia (estereot\u00e1ctica fraccionada o radiocirug\u00eda) se reserva para tumores irresecables o como tratamiento adyuvante.","ai":false},{"n":"nt_9","q":"Mujer de 31 a\u00f1os con amenorrea y galactorrea de meses de evoluci\u00f3n. Prolactina 1345 mUI/L. Lesi\u00f3n hipofisaria de 1.7 cm en RM. \u00bfTumor m\u00e1s probable?","o":["Craneofaringioma","Adenoma hipofisario no funcionante","Macroadenoma secretor de prolactina (prolactinoma)","Met\u00e1stasis selar"],"c":3,"e":"El prolactinoma (adenoma secretor de prolactina) es el tumor hipofisario m\u00e1s frecuente. La triada de prolactina muy elevada + amenorrea + galactorrea + lesi\u00f3n >1cm (macroadenoma) es diagn\u00f3stica de macroadenoma prolactinoma. El tratamiento de elecci\u00f3n es M\u00c9DICO con agonistas dopamin\u00e9rgicos (cabergolina o bromocriptina), que reducen el tumor y normalizan la prolactina.","ai":false},{"n":"nv1","q":"Sobre la etiolog\u00eda de la hemorragia subaracnoidea espont\u00e1nea, \u00bfcu\u00e1l NO ser\u00eda habitual?","o":["Aneurisma cerebral roto","Hemorragia intratumoral","Malformaci\u00f3n arteriovenosa (MAV)","Hemorragia pretruncal no aneurism\u00e1tica (perimesencef\u00e1lica)"],"c":2,"e":"La causa m\u00e1s frecuente de HSA espont\u00e1nea es la rotura de un aneurisma cerebral (~80%). Otras causas son las MAV (~5-10%), la HSA pretruncal/perimesencef\u00e1lica (idiop\u00e1tica, benigna) y la disecci\u00f3n arterial. La hemorragia intratumoral causa hemorragia intracerebral PARENQUIMATOSA, no subaracnoidea de forma caracter\u00edstica.","ai":false},{"n":"nv2","q":"Paciente con HSA espont\u00e1nea ingresada en UCI. \u00bfCu\u00e1l de estas NO es una complicaci\u00f3n de la hemorragia subaracnoidea espont\u00e1nea?","o":["Vasoespasmo cerebral tard\u00edo (isquemia tard\u00eda)","Resangrado del aneurisma (m\u00e1ximo riesgo primeras 24h)","Hidrocefalia aguda obstructiva","Hipernatremia"],"c":4,"e":"Las complicaciones de la HSA son: resangrado (riesgo m\u00e1ximo en las primeras 24h), vasoespasmo cerebral tard\u00edo (d\u00edas 4-14, principal causa de morbimortalidad tard\u00eda), hidrocefalia, convulsiones, hiponatremia (por SIADH o s\u00edndrome cerebral perdedor de sal), disfunci\u00f3n card\u00edaca e infecciones. La HIPERNATREMIA no es una complicaci\u00f3n caracter\u00edstica de la HSA.","ai":false},{"n":"nv3","q":"Paciente de 22 a\u00f1os con epilepsia parcial compleja refractaria al tratamiento m\u00e9dico. Para la valoraci\u00f3n preoperatoria, \u00bfqu\u00e9 estudio ser\u00eda de m\u00e1ximo inter\u00e9s?","o":["PET cerebral","SPECT cerebral","Registro de la presi\u00f3n intracraneal","Video-EEG"],"c":4,"e":"El Video-EEG es la prueba fundamental en la evaluaci\u00f3n prequir\u00fargica de la epilepsia refractaria: permite correlacionar los cambios el\u00e9ctricos (EEG) con las manifestaciones cl\u00ednicas de las crisis (v\u00eddeo) y localizar con precisi\u00f3n la zona de inicio ictal. Es imprescindible para determinar si el foco epilept\u00f3geno es resecable sin d\u00e9ficit inaceptable.","ai":false}],"ce":[{"n":"ct_1","q":"Respecto al n\u00f3dulo tiroideo, son signos sugestivos de malignidad todos A EXCEPCI\u00d3N DE:","o":["L\u00edmites imprecisos o irregulares","Calcificaciones en la lesi\u00f3n (especialmente microcalcificaciones)","Presencia de adenopat\u00edas cervicales ipsilaterales sospechosas","Anillo hipoecoico perif\u00e9rico completo (halo)"],"c":4,"e":"El anillo hipoecoico perif\u00e9rico o 'halo sonogr\u00e1fico' es una caracter\u00edstica ecogr\u00e1fica de BENIGNIDAD: representa la c\u00e1psula fibrosa y el tejido tiroideo comprimido alrededor de un n\u00f3dulo benigno. Los signos de malignidad incluyen: microcalcificaciones, l\u00edmites imprecisos, hipoecogenicidad marcada, mayor altura que anchura y adenopat\u00edas sospechosas.","ai":false},{"n":"ct_2","q":"Respecto al tratamiento quir\u00fargico de la Enfermedad de Graves-Basedow, todos los enunciados son CORRECTOS EXCEPTO:","o":["Ante bocio grande y sospecha de carcinoma el tratamiento de elecci\u00f3n es la tiroidectom\u00eda total","La indicaci\u00f3n quir\u00fargica m\u00e1s frecuente en el Graves-Basedow es el crecimiento importante de la gl\u00e1ndula","Actualmente la cirug\u00eda como primera estrategia terap\u00e9utica ha ido perdiendo relevancia","La tiroidectom\u00eda subtotal bilateral + istmectom\u00eda dejando un remanente mayor de 8-10g es la t\u00e9cnica de elecci\u00f3n"],"c":4,"e":"El remanente debe ser de 4-8g (NO mayor de 8-10g), ya que un remanente mayor tiene alta tasa de recidiva del hipertiroidismo. La t\u00e9cnica actual de elecci\u00f3n es la tiroidectom\u00eda TOTAL o casi total, que elimina el riesgo de recidiva. La tiroidectom\u00eda subtotal est\u00e1 pr\u00e1cticamente abandonada por su alta tasa de recidiva a largo plazo.","ai":false},{"n":"ct_3","q":"Respecto a los hallazgos de laboratorio de un n\u00f3dulo tiroideo, todas las respuestas son ciertas EXCEPTO:","o":["La mayor\u00eda de los n\u00f3dulos tiroideos son normotiroideos con TSH, T4 y T3 normales","La determinaci\u00f3n de la tiroglobulina (TG) tiene especificidad para diferenciar n\u00f3dulo benigno de maligno","Cuando se asocia con tiroiditis de Hashimoto los anticuerpos antitiroideos est\u00e1n elevados","En el 5% de los casos la TSH est\u00e1 inhibida con T3-T4 normales (hipertiroidismo subcl\u00ednico)"],"c":2,"e":"La tiroglobulina (TG) NO tiene especificidad para diferenciar un n\u00f3dulo tiroideo benigno de uno maligno: se eleva tanto en condiciones benignas (bocio, tiroiditis) como malignas. La TG es \u00fatil solo como marcador de SEGUIMIENTO del carcinoma diferenciado de tiroides tras tiroidectom\u00eda total y ablaci\u00f3n con I-131.","ai":false},{"n":"ct_4","q":"\u00bfCu\u00e1l de estos enunciados es VERDADERO respecto a la anatom\u00eda quir\u00fargica del cuello?","o":["Los puntos cr\u00edticos de lesi\u00f3n del nervio lar\u00edngeo recurrente son: cerca de la arteria tiroidea inferior, el ligamento de Berry y el cuerno posterior del cart\u00edlago tiroideo","La entrada del nervio lar\u00edngeo recurrente en la laringe representa una posici\u00f3n poco constante para su identificaci\u00f3n","En la enfermedad multiglandular paratiroidea se realizar\u00e1 paratiroidectom\u00eda total SIN timectom\u00eda","La complicaci\u00f3n m\u00e1s frecuente de un vaciamiento central (grupo VI) es la par\u00e1lisis recurrencial transitoria"],"c":1,"e":"Los tres puntos de mayor riesgo de lesi\u00f3n del nervio lar\u00edngeo recurrente son: la proximidad a la arteria tiroidea inferior (que puede cruzar anterior o posterior al nervio), el ligamento de Berry (donde el nervio puede estar \u00edntimamente adherido o incluso penetrar en el tiroides) y el cuerno posterior del cart\u00edlago tiroideo (punto de entrada a la laringe).","ai":false},{"n":"ct_5","q":"Respecto al enfoque quir\u00fargico del Bocio Multinodular (BMN) recidivado, todos los enunciados son FALSOS EXCEPTO:","o":["La par\u00e1lisis recurrencial es una complicaci\u00f3n poco frecuente en el BMN recidivado","La tiroidectom\u00eda total o casi total es siempre la t\u00e9cnica de elecci\u00f3n","Si la primera intervenci\u00f3n fue conservadora, el abordaje por l\u00ednea media no debe plantearse","No es necesaria laringoscopia preoperatoria sistem\u00e1tica en el BMN recidivado"],"c":2,"e":"En el BMN recidivado, la tiroidectom\u00eda total o casi total es la t\u00e9cnica de elecci\u00f3n porque elimina todo el tejido tiroideo funcionante y minimiza el riesgo de nueva recidiva. La cirug\u00eda de revisi\u00f3n tiene mayor riesgo de par\u00e1lisis recurrencial e hipoparatiroidismo, por lo que la laringoscopia preoperatoria es OBLIGATORIA (a diferencia de la cirug\u00eda primaria).","ai":false},{"n":"ct_6","q":"\u00bfCu\u00e1l de las siguientes caracter\u00edsticas NO es t\u00edpica del carcinoma PAPILAR de tiroides?","o":["Presenta una incidencia bimodal (pico en 2\u00aa-3\u00aa d\u00e9cada y en edad media)","Es caracter\u00edstico la presencia de calcificaciones en 'reloj de arena' (cuerpos de psamoma)","Se disemina r\u00e1pidamente por v\u00eda hem\u00e1tica","La determinaci\u00f3n de tiroglobulina es \u00fatil en el seguimiento"],"c":3,"e":"El carcinoma papilar de tiroides se disemina preferentemente por v\u00eda LINF\u00c1TICA (a ganglios cervicales regionales e ipsilaterales), lo que lo diferencia del carcinoma folicular que se disemina por V\u00cdA HEM\u00c1TICA (met\u00e1stasis a pulm\u00f3n y hueso). Los cuerpos de psamoma (calcificaciones en 'reloj de arena') son pr\u00e1cticamente patognom\u00f3nicos del papilar.","ai":false},{"n":"ct_7","q":"Todas estas \u00e1reas son susceptibles de lesi\u00f3n del nervio lar\u00edngeo recurrente durante la cirug\u00eda tiroidea, EXCEPTO:","o":["Recorrido de la arteria tiroidea inferior a nivel del espacio crico-tiroideo","Tercio medio del ligamento de Berry","Recorrido de la arteria tiroidea MEDIA en la entrada a la gl\u00e1ndula tiroides","Polo inferior de la gl\u00e1ndula tiroides"],"c":3,"e":"La 'arteria tiroidea media' (de Neubauer) es una variante anat\u00f3mica muy infrecuente (presente solo en el 2-12% de la poblaci\u00f3n) y NO es una referencia anat\u00f3mica est\u00e1ndar en la cirug\u00eda tiroidea. Las \u00e1reas habituales de riesgo de lesi\u00f3n del nervio lar\u00edngeo recurrente son: la arteria tiroidea inferior, el ligamento de Berry y el polo inferior de la gl\u00e1ndula.","ai":false},{"n":"ct_8","q":"Mujer de 26 a\u00f1os con n\u00f3dulo tiroideo palpable. PAAF muestra sustancia amiloide en el estroma. Ganglio cervical palpable ipsilateral. \u00bfTratamiento preferido?","o":["Extirpaci\u00f3n del l\u00f3bulo afectado + istmo + disecci\u00f3n cervical del lado del ganglio","Extirpaci\u00f3n del l\u00f3bulo afectado + istmo + parte del l\u00f3bulo contrario + ganglio","Extirpaci\u00f3n del l\u00f3bulo afectado + istmo + ganglio solamente","Tiroidectom\u00eda total + disecci\u00f3n cervical modificada del lado del ganglio"],"c":4,"e":"La sustancia amiloide en el estroma del n\u00f3dulo tiroideo es diagn\u00f3stica de CARCINOMA MEDULAR DE TIROIDES (CMT): las c\u00e9lulas C parafoliculares producen calcitonina que se polimeriza como amiloide. El CMT se trata con tiroidectom\u00eda TOTAL (puede ser multifocal y bilateral, especialmente en formas hereditarias) m\u00e1s disecci\u00f3n cervical del compartimento afectado con ganglios sospechosos.","ai":false},{"n":"ct_9","q":"\u00bfCu\u00e1l de las siguientes caracter\u00edsticas del carcinoma medular de tiroides es INCORRECTA?","o":["Es un tumor derivado del epitelio tiroideo folicular","Se asocia a mutaciones en el proto-oncogen RET","Histol\u00f3gicamente es t\u00edpica la presencia de sustancia amiloide en el estroma","Produce calcitonina como marcador tumoral espec\u00edfico"],"c":1,"e":"El carcinoma medular de tiroides deriva de las C\u00c9LULAS C PARAFOLICULARES (c\u00e9lulas calcitonina-secretoras), NO del epitelio folicular. Las c\u00e9lulas C tienen origen en la cresta neural (c\u00e9lulas neuroendocrinas). Por eso produce calcitonina (no tiroglobulina) y el estroma muestra dep\u00f3sito de amiloide (calcitonina polimerizada). El gen RET est\u00e1 mutado en el 98% de los casos hereditarios.","ai":false},{"n":"ct_10","q":"\u00bfA qu\u00e9 nivel ganglionar (clasificaci\u00f3n americana de estaciones ganglionares del cuello) pertenece un ganglio inferior al cart\u00edlago cricoides, superior a la clav\u00edcula y en plano profundo al m\u00fasculo ECM?","o":["Nivel IV","Nivel I","Nivel II","Nivel III"],"c":1,"e":"El nivel IV corresponde a los ganglios yugulares inferiores: localizados a lo largo de la vena yugular interna, entre el nivel de la bifurcaci\u00f3n de la car\u00f3tida (l\u00edmite con nivel III) y la clav\u00edcula, en plano profundo al ECM. La localizaci\u00f3n 'inferior al cricoides, superior a la clav\u00edcula, profundo al ECM' define exactamente el nivel IV.","ai":false},{"n":"ct_11","q":"Con respecto a la anatom\u00eda del cuello, indique la FALSA:","o":["El nervio lar\u00edngeo superior se encarga de la inervaci\u00f3n de la musculatura cricotiroidea","El curso del nervio lar\u00edngeo recurrente es variable excepto en su tramo final justo en la entrada a la laringe","La prolongaci\u00f3n lateral y dorsal del par\u00e9nquima tiroideo (proceso de Zuckerkandl) oculta con frecuencia el trayecto final del nervio lar\u00edngeo recurrente","En el lado derecho la arteria tiroidea inferior sigue paralela al nervio lar\u00edngeo recurrente en m\u00e1s del 70% de los casos"],"c":4,"e":"En el lado derecho, la arteria tiroidea inferior CRUZA POR DELANTE del nervio lar\u00edngeo recurrente en la mayor\u00eda de los casos (no sigue paralela en el 70%). Esta relaci\u00f3n cruzada y variable es precisamente el motivo por el que la zona de la arteria tiroidea inferior es una de las zonas de mayor riesgo de lesi\u00f3n nerviosa durante la cirug\u00eda tiroidea.","ai":false},{"n":"cp_1","q":"\u00bfCu\u00e1l de las siguientes causas de hiperparatiroidismo secundario (HPTS) tiene indicaci\u00f3n quir\u00fargica?","o":["S\u00edndromes malabsortivos intestinales","Insuficiencia renal cr\u00f3nica","D\u00e9ficit de vitamina D","Dieta pobre en calcio"],"c":2,"e":"El HPTS por insuficiencia renal cr\u00f3nica puede requerir paratiroidectom\u00eda cuando no responde al tratamiento m\u00e9dico (cinacalcet, vitamina D activa, f\u00f3sforo) o cuando hay hipercalcemia sintom\u00e1tica, calcificaciones extraesquel\u00e9ticas graves u osteodistrofia renal avanzada. Las otras causas de HPTS se tratan corrigiendo la causa subyacente (vitamina D, malabsorci\u00f3n, dieta).","ai":false},{"n":"cp_2","q":"Var\u00f3n de 52 a\u00f1os con hipercalcemia severa (19.5 mg/dl) y sospecha de carcinoma paratiroideo. \u00bfCu\u00e1les ser\u00edan los pasos a seguir?","o":["Tratamiento m\u00e9dico de la hipercalcemia \u00fanicamente, sin estudio de extensi\u00f3n por no ser hipercalcemia muy grave","Corregir calcemia y solo estudio anal\u00edtico con fosfatasas alcalinas (FFAA)","FFAA >200 UI/L no obliga a estudio radiol\u00f3gico de extensi\u00f3n para determinar osteopenia","Ante sospecha de carcinoma paratiroideo (hipercalcemia >12.5 mg/dl y FFAA elevadas), solicitar ecograf\u00eda paratiroidea/tiroidea +/- gammagraf\u00eda SESTAMIBI Tc-99m"],"c":4,"e":"Ante sospecha de carcinoma paratiroideo (hipercalcemia grave >12-14 mg/dl + FFAA muy elevadas + eventual masa cervical palpable), el estudio de localizaci\u00f3n incluye ecograf\u00eda cervical (tiroides y paratiroides) + gammagraf\u00eda con SESTAMIBI-Tc-99m. La hipercalcemia de 19.5 mg/dl es una emergencia que requiere suero salino iv + bifosfonatos iv urgentes.","ai":false},{"n":"cp_3","q":"Respecto a la determinaci\u00f3n intraoperatoria de PTH (PTHio), \u00bfqu\u00e9 enunciado es CIERTO?","o":["Constituye un soporte importante para la validaci\u00f3n de la paratiroidectom\u00eda selectiva","Permite la comprobaci\u00f3n de los cambios en su concentraci\u00f3n plasm\u00e1tica tras la ex\u00e9resis del tejido paratiroideo patol\u00f3gico","La ca\u00edda de la PTH por encima del 50% a los 10 minutos de la ex\u00e9resis del tejido paratiroideo patol\u00f3gico es indicativo de tratamiento quir\u00fargico efectivo","Todos los enunciados citados son ciertos"],"c":4,"e":"La PTHio es fundamental en la cirug\u00eda paratiroidea m\u00ednimamente invasiva y selectiva. Una ca\u00edda de la PTH >50% a los 10 minutos de la ex\u00e9resis (criterio de Miami) indica \u00e9xito quir\u00fargico: confirma que se ha extirpado todo el tejido hiperfuncionante. Si no cae suficientemente, hay que buscar otro adenoma o enfermedad multiglandular. Los tres primeros enunciados son correctos.","ai":false},{"n":"cp_4","q":"\u00bfCu\u00e1l de los siguientes enunciados es FALSO?","o":["En la paratiroidectom\u00eda por HPT recidivado no es necesaria la monitorizaci\u00f3n repetida del calcio en plasma","La hipocalcemia postoperatoria es una de las complicaciones m\u00e1s frecuentes tras la cirug\u00eda de tiroides y/o paratiroides","La hipocalcemia postoperatoria se traduce cl\u00ednicamente en tetania y alcalosis respiratoria","La hipocalcemia postoperatoria se debe a una disminuci\u00f3n del calcio ionizado, que es la fracci\u00f3n activa del calcio plasm\u00e1tico"],"c":1,"e":"En la paratiroidectom\u00eda por HPT RECIDIVADO s\u00ed es NECESARIA la monitorizaci\u00f3n estrecha y repetida del calcio plasm\u00e1tico en el postoperatorio, ya que el riesgo de hipocalcemia grave es mayor que en la cirug\u00eda primaria (mayor manipulaci\u00f3n, mayor riesgo de lesi\u00f3n de las gl\u00e1ndulas paratiroides restantes y de 'bone hunger').","ai":false},{"n":"cs1","q":"\u00bfCu\u00e1l de los siguientes par\u00e1metros es importante revisar ANTES de resecar un gastrinoma?","o":["Catecolaminas s\u00e9ricas","Calcio s\u00e9rico","Calcitonina s\u00e9rica","Ant\u00edgeno carcinoembrionario (CEA) s\u00e9rico"],"c":2,"e":"El gastrinoma puede ser parte del s\u00edndrome MEN1 (Neoplasia Endocrina M\u00faltiple tipo 1), que asocia: hiperparatiroidismo primario (hipercalcemia) + tumores pancre\u00e1ticos neuroendocrinos (gastrinoma, insulinoma) + adenomas hipofisarios. El CALCIO s\u00e9rico debe revisarse porque el hiperparatiroidismo concurrente puede agravar la hipergastrinemia (el PTH estimula la secreci\u00f3n de gastrina).","ai":false},{"n":"cs2","q":"Respecto a las v\u00edas de abordaje en la cirug\u00eda de las gl\u00e1ndulas suprarrenales, todos los enunciados son FALSOS EXCEPTO:","o":["La v\u00eda de elecci\u00f3n actualmente es la transperitoneal anterior mediante t\u00e9cnica laparosc\u00f3pica","La v\u00eda preferida es la retroperitoneal mediante t\u00e9cnica abierta","La v\u00eda de elecci\u00f3n actualmente es la transperitoneal LATERAL mediante t\u00e9cnica laparosc\u00f3pica","La v\u00eda de elecci\u00f3n actualmente es la transperitoneal lateral mediante t\u00e9cnica abierta"],"c":3,"e":"El abordaje est\u00e1ndar actual en la suprarrenalectom\u00eda es la v\u00eda LAPAROSC\u00d3PICA TRANSPERITONEAL LATERAL (paciente en dec\u00fabito lateral, abordaje por flanco): menor sangrado, menor dolor postoperatorio, recuperaci\u00f3n m\u00e1s r\u00e1pida y resultados oncol\u00f3gicos equivalentes a la cirug\u00eda abierta en lesiones benignas y en feocromocitomas <6cm.","ai":false},{"n":"cs3","q":"Son caracter\u00edsticas de la t\u00e9cnica ideal de una cirug\u00eda de la obesidad TODAS EXCEPTO:","o":["Reproducible","Irreversible","Pocos efectos secundarios","Proporcionar buena calidad de vida"],"c":2,"e":"Una t\u00e9cnica quir\u00fargica ideal debe ser REVERSIBLE cuando sea posible o al menos revisable (convertible en otra t\u00e9cnica). La irreversibilidad es una caracter\u00edstica negativa, no positiva. Las caracter\u00edsticas ideales son: reproducible, reversible, morbimortalidad baja, pocos efectos secundarios, que induzca p\u00e9rdida de peso duradera y mejore la calidad de vida.","ai":false},{"n":"cs4","q":"\u00bfCu\u00e1l de las siguientes NO es una contraindicaci\u00f3n para la cirug\u00eda de la obesidad?","o":["Patolog\u00eda suprarrenal como causa tratable del exceso de peso","Adicci\u00f3n activa a drogas o alcohol","Obesidad de m\u00e1s de 5 a\u00f1os de evoluci\u00f3n","Oposici\u00f3n de la familia del paciente"],"c":3,"e":"La OBESIDAD DE M\u00c1S DE 5 A\u00d1OS de evoluci\u00f3n NO es una contraindicaci\u00f3n para la cirug\u00eda bari\u00e1trica; al contrario, la cronicidad de la obesidad refractaria al tratamiento m\u00e9dico es un criterio a FAVOR de la indicaci\u00f3n quir\u00fargica. Las contraindicaciones incluyen: causa endocrina tratable (suprarrenal), adicci\u00f3n activa a drogas/alcohol e incapacidad para el seguimiento postoperatorio.","ai":false}],"rt":[{"n":"rt1","q":"En un paciente con c\u00e1ncer de pulm\u00f3n sin comorbilidad, la combinaci\u00f3n de quimioterapia y radioterapia es el tratamiento de primera elecci\u00f3n en:","o":["C\u00e1ncer de c\u00e9lula no peque\u00f1a (CPNCP) estadio I","N\u00f3dulo pulmonar solitario sin confirmaci\u00f3n histol\u00f3gica","C\u00e1ncer de c\u00e9lula no peque\u00f1a (CPNCP) estadio II","C\u00e1ncer de pulm\u00f3n de c\u00e9lula peque\u00f1a (CPCP o microc\u00edtico)"],"c":4,"e":"El c\u00e1ncer de pulm\u00f3n microc\u00edtico (CPCP) es altamente radiosensible y quimiosensible: el tratamiento est\u00e1ndar en estadio limitado es la quimiorradioterapia concurrente (cisplatino-etop\u00f3sido + radioterapia tor\u00e1cica). En el CPNCP estadios I y II, el tratamiento de elecci\u00f3n es la cirug\u00eda (lobectom\u00eda). El n\u00f3dulo solitario requiere confirmaci\u00f3n histol\u00f3gica antes de cualquier tratamiento.","ai":false}]};

/* ── Estado ── */
var canSave=typeof localStorage!=='undefined';
var saved={};try{saved=JSON.parse(localStorage.getItem(KEY)||'null')||{};}catch(e){}
var state   =saved.state   ||{};
var qOrd    =saved.qOrd    ||{};
var oOrd    =saved.oOrd    ||{};
var starred =saved.starred ||{};
var failHist=saved.failHist||{};  // {qid: count} entre sesiones
var darkMode=saved.dark    ||false;
var timerSec=saved.timerSec||0;   // segundos configurados
var SECS=Object.keys(META.secciones||{});
var fFailed={};
var qIdx={};           // {sec: {n: q}}
var qNums={};          // {sec: {n: numero_correlativo}}
var allOrder=null;     // orden mezclado inter-secciones para pestaña Todos
var activeCid=null;
var currentTab='all';
var currentMode='test';
var saveTimer=null;
var starsFilter=false;
var statsVisible=false;
var timerRunning=false;
var timerRemaining=timerSec;
var timerInterval=null;

/* ── INIT ── */
(function init(){
  SECS.forEach(function(s){fFailed[s]=false;});
  injectSecCSS();
  buildHeader();
  buildTabs();
  buildPanels();
  buildIdx();
  buildNums();
  buildAllOrder();
  SECS.forEach(render);
  renderAll();
  updateScores();
  updateProg();
  applyTheme();
  initTimer();
  setBadge(canSave?'Guardado':'Sin guardado',canSave?'ok':'warn');
  document.addEventListener('keydown',handleKey);
  var si=document.getElementById('search-input');
  if(si)si.addEventListener('keydown',function(e){if(e.key==='Escape'){clearSearch();}});
})();

/* ── CSS dinámico ── */
function injectSecCSS(){
  var css='';
  SECS.forEach(function(s){
    var m=META.secciones[s]||{};
    var c=m.color||'#1a56db',cd=m.colorDim||'#e8f0fe';
    css+='.tab.t-'+s+'.on{background:'+cd+';color:'+c+';border-color:'+c+'}\n';
    css+='.ph.s-'+s+'{border-left:4px solid '+c+'}\n';
    // Variables CSS por sección para el badge coloreado
    css+='#panel-'+s+' .qnum.sec-colored{background:'+cd+';color:'+c+'}\n';
  });
  var st=document.createElement('style');st.textContent=css;document.head.appendChild(st);
}

/* ── Header ── */
function buildHeader(){
  var total=SECS.reduce(function(a,s){return a+(D[s]?D[s].length:0);},0);
  var t=document.getElementById('h-tit');if(t)t.textContent=META.titulo||'Banco MIR';
  var pt=document.getElementById('page-title');if(pt)pt.textContent=META.titulo||'Banco MIR';
  var m=document.getElementById('h-meta');
  if(m){var p=[];if(total)p.push(total+' preguntas');if(META.examen)p.push(META.examen);m.textContent=p.join(' · ');}
  var d=document.getElementById('ph-gdesc');if(d)d.textContent=META.subtitulo||'';
  var r=document.getElementById('sc-rem-all');if(r)r.textContent='○ '+total;
}

/* ── Tabs ── */
function buildTabs(){
  var total=SECS.reduce(function(a,s){return a+(D[s]?D[s].length:0);},0);
  var h='<button class="tab t-all on" onclick="showTab(\'all\')">📋 Todos ('+total+')</button>';
  SECS.forEach(function(s){
    var m=META.secciones[s]||{},cnt=D[s]?D[s].length:0;
    h+='<button class="tab t-'+s+'" onclick="showTab(\''+s+'\')">'+(m.emoji?m.emoji+' ':'')+escH(m.label||s)+' ('+cnt+')</button>';
  });
  var w=document.getElementById('tabs-wrap');if(w)w.innerHTML=h;
}

/* ── Paneles ── */
function buildPanels(){
  var h='<div id="panel-all" class="sec-panel visible"><div id="qs-all"></div><div class="no-results" id="nr-all">No se encontraron preguntas</div></div>';
  SECS.forEach(function(s){
    var m=META.secciones[s]||{},cnt=D[s]?D[s].length:0;
    h+='<div id="panel-'+s+'" class="sec-panel">';
    h+='<div class="ph s-'+s+'">';
    h+='<div class="ph-left">';
    h+='<span class="ph-label">'+(m.emoji?m.emoji+'&nbsp;':'')+escH(m.label||s)+'</span>';
    if(m.desc)h+='<span class="ph-desc">'+escH(m.desc)+'</span>';
    h+='<div class="score-row">';
    h+='<span class="sc ok" id="sc-ok-'+s+'">✓ 0</span>';
    h+='<span class="sc ko" id="sc-ko-'+s+'">✗ 0</span>';
    h+='<span class="sc rem" id="sc-rem-'+s+'">○ '+cnt+'</span>';
    h+='</div></div>';
    h+='<button class="fbtn" id="fb-'+s+'" onclick="toggleFail(\''+s+'\')">Solo falladas</button>';
    h+='</div>';
    h+='<div id="qs-'+s+'"></div>';
    h+='<div class="no-failed" id="nf-'+s+'">Aún no has fallado ninguna 🎉</div>';
    h+='<div class="no-results" id="nr-'+s+'">No se encontraron preguntas</div>';
    h+='<div class="sec-actions">';
    h+='<button class="reset-btn" onclick="resetSec(\''+s+'\')">↺ Reiniciar</button>';
    h+='<button class="nota-btn" onclick="calcNota(\''+s+'\')">✎ Calcular nota</button>';
    h+='</div>';
    h+='<div class="nota-box" id="nota-'+s+'"></div>';
    h+='</div>';
  });
  var pw=document.getElementById('panels-wrap');if(pw)pw.innerHTML=h;
}

/* ── Índice O(1) + numeración fija ── */
function buildIdx(){
  SECS.forEach(function(s){
    qIdx[s]={};
    if(D[s])D[s].forEach(function(q){qIdx[s][q.n]=q;});
  });
}
function buildNums(){
  // Numeración correlativa fija: 1, 2, 3... por sección
  SECS.forEach(function(s){
    qNums[s]={};
    if(D[s])D[s].forEach(function(q,i){qNums[s][q.n]=i+1;});
  });
}
function getNum(sec,n){return qNums[sec]?qNums[sec][n]||n:n;}
function findQ(qid){
  var d=qid.indexOf('-'),s=qid.substring(0,d),n=qid.substring(d+1);
  return(qIdx[s]&&qIdx[s][n])||null;
}
function getSecFromQid(qid){return qid.substring(0,qid.indexOf('-'));}
function getNFromQid(qid){return qid.substring(qid.indexOf('-')+1);}

/* ── Orden inter-secciones para Todos ── */
function buildAllOrder(){
  var all=[];
  SECS.forEach(function(s){if(D[s])D[s].forEach(function(q){all.push({sec:s,n:q.n});});});
  if(!qOrd['__all__'])qOrd['__all__']=shuffle(all.map(function(x){return x.sec+'|'+x.n;}));
  allOrder=qOrd['__all__'].map(function(key){
    var p=key.indexOf('|'),sec=key.substring(0,p),n=key.substring(p+1);
    return{sec:sec,n:n,q:qIdx[sec]&&qIdx[sec][n]};
  }).filter(function(x){return x.q;});
}

/* ── Utilidades ── */
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function getQOrd(s,qs){if(!qOrd[s])qOrd[s]=shuffle(qs.map(function(q){return q.n;}));return qOrd[s];}
function getOOrd(qid){
  var q=findQ(qid);var n=q&&q.o?q.o.length:4;
  if(q&&q.noShuffle){var a=[];for(var i=0;i<n;i++)a.push(i);return a;}
  if(!oOrd[qid]){var a=[];for(var i=0;i<n;i++)a.push(i);oOrd[qid]=shuffle(a);}
  return oOrd[qid];
}
function imgHtml(key){
  if(!IMGS[key]){console.warn('IMGS: clave no encontrada →',key);return'';}
  return'<div class="clinimg-wrap"><img src="'+IMGS[key]+'" class="clinimg" alt="Imagen clínica" loading="lazy"><div class="clinimg-cap">Imagen clínica</div></div>';
}

/* ── localStorage debounce ── */
function saveLocal(){
  if(!canSave)return;
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    try{
      localStorage.setItem(KEY,JSON.stringify({state:state,qOrd:qOrd,oOrd:oOrd,starred:starred,failHist:failHist,dark:darkMode,timerSec:timerSec}));
      setBadge('Guardado','ok');
    }catch(e){setBadge('Sin guardado','warn');}
  },300);
}
function setBadge(t,c){var b=document.getElementById('save-badge');if(b){b.textContent=t;b.className='sbadge '+c;}}

/* ── Construcción de tarjeta ── */
function buildCard(q,sec,inAll,allPos){
  var qid=sec+'-'+q.n;
  var cid=(inAll?'A-':'S-')+qid;
  var num=inAll?(allPos+1):getNum(sec,q.n);
  var oo=getOOrd(qid);
  var sOpts=oo.map(function(i){return q.o[i];});
  var nc=oo.indexOf(q.c-1)+1;
  var ans=state[qid];
  var cc=ans?(ans.r?' answered-ok':' answered-wrong'):'';
  var badgeCls='qnum'+(inAll?'':' sec-colored');
  var h='<div class="qcard s-'+sec+cc+'" id="card-'+cid+'">';
  h+='<div class="qhead" id="h-'+cid+'" data-cid="'+cid+'" data-qid="'+qid+'" data-sec="'+sec+'" onclick="tog(this.dataset.cid)">';
  h+='<span class="'+badgeCls+'">'+num+'</span>';
  h+='<span class="qtxt">'+q.q+(ans?'<span class="atag '+(ans.r?'ok':'ko')+'">'+(ans.r?'✓ acertada':'✗ fallada')+'</span>':'')+'</span>';
  h+='<button class="star-btn'+(starred[qid]?' on':'')+'\" id="star-'+cid+'" onclick="event.stopPropagation();toggleStar(\''+qid+'\')" title="Marcar (S)"><span class="si">\u2606</span><span class="sf">\u2605</span></button>';
  h+='<span class="chev">▾</span>';
  h+='</div>';
  h+='<div class="qbody" id="b-'+cid+'">';
  if(q.img)h+=imgHtml(q.img);
  if(currentMode==='quick'){
    h+='<div class="quick-card"><div class="quick-rc">✓ Respuesta correcta: opción '+nc+' — '+escH(q.o[q.c-1])+'</div><div class="expbox">'+q.e+'</div></div>';
  } else {
    h+='<ul class="opts" id="opts-'+cid+'">';
    h+=sOpts.map(function(o,i){
      var p=i+1,oc='opt';
      if(ans){oc+=' done';if(p===nc)oc+=' correct';else if(p===ans.c&&!ans.r)oc+=' wrong';}
      return'<li class="'+oc+'" data-qid="'+qid+'" data-pos="'+p+'" data-sec="'+sec+'" onclick="answer(this.dataset.qid,+this.dataset.pos,this.dataset.sec)"><span class="onum">'+p+'.</span><span>'+o+'</span></li>';
    }).join('');
    h+='</ul>';
    if(ans){h+='<div class="expbox"><span class="et">'+(ans.r?'✓ Correcto':'✗ Incorrecto — Respuesta correcta: opción '+nc)+'</span>'+q.e+'</div>';}
  }
  h+='</div></div>';
  return h;
}

/* ── Render sección ── */
function render(sec){
  var qs=D[sec];if(!qs)return;
  var ord=getQOrd(sec,qs);
  var sorted=ord.map(function(n){return qIdx[sec]&&qIdx[sec][n];}).filter(Boolean);
  var el=document.getElementById('qs-'+sec);
  if(el)el.innerHTML=sorted.map(function(q){return buildCard(q,sec,false,0);}).join('');
}

/* ── Render Todos (mezcla inter-secciones) ── */
function renderAll(){
  if(!allOrder)buildAllOrder();
  var el=document.getElementById('qs-all');
  if(el)el.innerHTML=allOrder.map(function(x,i){return buildCard(x.q,x.sec,true,i);}).join('');
}

/* ── Toggle open/close ── */
function tog(cid){
  var b=document.getElementById('b-'+cid),h=document.getElementById('h-'+cid);
  if(!b||!h)return;
  var opening=!b.classList.contains('open');
  b.classList.toggle('open');h.classList.toggle('open');
  if(opening){
    if(activeCid&&activeCid!==cid){var pc=document.getElementById('card-'+activeCid);if(pc)pc.classList.remove('kb-focus');}
    activeCid=cid;
    var card=document.getElementById('card-'+cid);if(card)card.classList.add('kb-focus');
  }else{
    if(activeCid===cid){activeCid=null;var card=document.getElementById('card-'+cid);if(card)card.classList.remove('kb-focus');}
  }
}

/* ── Responder ── */
function answer(qid,pos,sec){
  if(state[qid])return;
  var q=findQ(qid);if(!q)return;
  var oo=getOOrd(qid);
  var nc=oo.indexOf(q.c-1)+1;
  var isRight=pos===nc;
  state[qid]={c:pos,r:isRight};
  // Registro de errores
  if(!isRight){failHist[qid]=(failHist[qid]||0)+1;}
  saveLocal();
  // Actualizar todas las instancias del card (panel sección + panel all)
  // Actualizar opciones en todas las instancias del card
  ['A-'+qid,'S-'+qid].forEach(function(cid){
    var optsEl=document.querySelectorAll('#opts-'+cid+' .opt');
    optsEl.forEach(function(el,i){
      el.classList.add('done');
      if(i+1===nc)el.classList.add('correct');
      else if(i+1===pos&&!isRight)el.classList.add('wrong');
    });
    var bdy=document.getElementById('b-'+cid);
    if(bdy){
      var eb=bdy.querySelector('.expbox');
      if(!eb){eb=document.createElement('div');eb.className='expbox';bdy.appendChild(eb);}
      eb.innerHTML='<span class="et">'+(isRight?'✓ Correcto':'✗ Incorrecto — Respuesta correcta: opción '+nc)+'</span>'+q.e;
    }
    var hd=document.getElementById('h-'+cid);
    if(hd){var qt=hd.querySelector('.qtxt');if(qt&&!qt.querySelector('.atag')){var at=document.createElement('span');at.className='atag '+(isRight?'ok':'ko');at.innerHTML=isRight?'✓ acertada':'✗ fallada';qt.appendChild(at);}}
    var card=document.getElementById('card-'+cid);
    if(card)card.classList.add(isRight?'answered-ok':'answered-wrong');
  });
  updateScores();updateProg();
  if(fFailed[sec]&&isRight){
    var fcard=document.getElementById('card-S-'+qid);
    if(fcard)fcard.style.display='none';
    refreshNF(sec);
  }
}

/* ── Estrella ── */
function toggleStar(qid){
  starred[qid]=!starred[qid];
  ['A-'+qid,'S-'+qid].forEach(function(cid){
    var btn=document.getElementById('star-'+cid);
    if(btn)btn.classList.toggle('on',starred[qid]);
  });
  saveLocal();
}
function filterStarred(){
  starsFilter=!starsFilter;
  var btn=document.getElementById('btn-stars');
  if(btn){btn.style.background=starsFilter?'#fef3c7':'';btn.style.fontWeight=starsFilter?'700':'';}
  document.querySelectorAll('.qcard').forEach(function(card){
    if(starsFilter){
      var hd=card.querySelector('.qhead');
      var qid=hd?hd.dataset.qid:'';
      card.style.display=starred[qid]?'':'none';
    }else{card.style.display='';}
  });
}

/* ── Filtro falladas ── */
function refreshNF(sec){
  var c=document.getElementById('qs-'+sec);if(!c||!fFailed[sec])return;
  var n=c.querySelectorAll('.qcard.answered-wrong').length;
  var m=document.getElementById('nf-'+sec);if(m)m.classList.toggle('show',n===0);
}
function toggleFail(sec){
  fFailed[sec]=!fFailed[sec];
  var btn=document.getElementById('fb-'+sec);
  if(btn){btn.classList.toggle('on',fFailed[sec]);btn.textContent=fFailed[sec]?'← Ver todas':'Solo falladas';}
  var c=document.getElementById('qs-'+sec);if(!c)return;
  var nf=0;
  c.querySelectorAll('.qcard').forEach(function(card){
    if(fFailed[sec]){var show=card.classList.contains('answered-wrong');card.style.display=show?'':'none';if(show)nf++;}
    else{card.style.display='';}
  });
  var m=document.getElementById('nf-'+sec);if(m)m.classList.toggle('show',fFailed[sec]&&nf===0);
}

/* ── Scores y progreso ── */
function updateScores(){
  var tok=0,tok2=0,tok3=0;
  SECS.forEach(function(sec){
    var ok=0,ko=0;
    if(D[sec])D[sec].forEach(function(q){var a=state[sec+'-'+q.n];if(a){if(a.r)ok++;else ko++;}});
    var tot=D[sec]?D[sec].length:0,rem=tot-ok-ko;
    tok+=ok;tok2+=ko;tok3+=rem;
    var eok=document.getElementById('sc-ok-'+sec),eko=document.getElementById('sc-ko-'+sec),erm=document.getElementById('sc-rem-'+sec);
    if(eok)eok.textContent='✓ '+ok;if(eko)eko.textContent='✗ '+ko;if(erm)erm.textContent='○ '+rem;
  });
  var eok=document.getElementById('sc-ok-all'),eko=document.getElementById('sc-ko-all'),erm=document.getElementById('sc-rem-all');
  if(eok)eok.textContent='✓ '+tok;if(eko)eko.textContent='✗ '+tok2;if(erm)erm.textContent='○ '+tok3;
}
function updateProg(){
  var total=0,done=Object.keys(state).length;
  SECS.forEach(function(s){if(D[s])total+=D[s].length;});
  var pct=total>0?Math.round(done/total*100):0;
  var bar=document.getElementById('prog-bar');if(bar)bar.style.width=pct+'%';
}

/* ── Tabs ── */
function showTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  var tb=document.querySelector('.tab.t-'+t);if(tb)tb.classList.add('on');
  var mc=document.getElementById('main-cont');if(mc)mc.setAttribute('data-tab',t);
  var panelAll=document.getElementById('panel-all');
  if(panelAll)panelAll.classList.toggle('visible',t==='all');
  SECS.forEach(function(s){
    var p=document.getElementById('panel-'+s);
    if(p)p.classList.toggle('visible',t===s);
  });
  var gnb=document.getElementById('nota-all');if(gnb){gnb.style.display='none';gnb.className='global-nota-box';}
  clearSearch();
}

/* ── Reset ── */
function resetSec(sec){
  if(D[sec])D[sec].forEach(function(q){var qid=sec+'-'+q.n;delete state[qid];delete oOrd[qid];});
  delete qOrd[sec];fFailed[sec]=false;activeCid=null;
  var btn=document.getElementById('fb-'+sec);if(btn){btn.classList.remove('on');btn.textContent='Solo falladas';}
  var nb=document.getElementById('nota-'+sec);if(nb){nb.style.display='none';nb.className='nota-box';}
  saveLocal();render(sec);
  var m=document.getElementById('nf-'+sec);if(m)m.classList.remove('show');
  updateScores();updateProg();
  // Reconstruir panel all para reflejar cambios
  buildAllOrder();renderAll();
}
function resetAll(){
  Object.keys(state).forEach(function(k){delete state[k];});
  Object.keys(oOrd).forEach(function(k){delete oOrd[k];});
  Object.keys(qOrd).forEach(function(k){delete qOrd[k];});
  activeCid=null;starsFilter=false;allOrder=null;
  var bs=document.getElementById('btn-stars');if(bs){bs.style.background='';bs.style.fontWeight='';}
  SECS.forEach(function(s){
    fFailed[s]=false;
    var btn=document.getElementById('fb-'+s);if(btn){btn.classList.remove('on');btn.textContent='Solo falladas';}
    var nb=document.getElementById('nota-'+s);if(nb){nb.style.display='none';nb.className='nota-box';}
  });
  saveLocal();
  SECS.forEach(render);
  buildAllOrder();renderAll();
  var gnb=document.getElementById('nota-all');if(gnb){gnb.style.display='none';gnb.className='global-nota-box';}
  updateScores();updateProg();
}

/* ── Nota y revisión ── */
function buildRevList(sec){
  var qs=D[sec];if(!qs)return'';
  var failed=qs.filter(function(q){var a=state[sec+'-'+q.n];return a&&!a.r;});
  if(!failed.length)return'';
  var html='<div class="review-list"><div class="review-title">📋 '+failed.length+' pregunta'+(failed.length>1?'s':'')+' fallada'+(failed.length>1?'s':'')+' — repasa aquí:</div>';
  failed.forEach(function(q){
    var qid=sec+'-'+q.n;var oo=getOOrd(qid);var nc=oo.indexOf(q.c-1)+1;
    html+='<details class="review-item"><summary><span><b>'+getNum(sec,q.n)+'.</b> '+q.q+'</span></summary>';
    html+='<div class="review-body"><div class="review-ans">✓ Opción '+nc+': '+escH(q.o[q.c-1]||'')+'</div>';
    html+='<div class="expbox">'+q.e+'</div></div></details>';
  });
  return html+'</div>';
}
function calcNota(sec){
  var qs=D[sec];if(!qs)return;
  var total=qs.length,ok=0,ko=0,skip=0;
  qs.forEach(function(q){var a=state[sec+'-'+q.n];if(!a)skip++;else if(a.r)ok++;else ko++;});
  var nota=Math.max(0,(ok-ko/3)/total*10),str=nota.toFixed(2),pass=nota>=5;
  var box=document.getElementById('nota-'+sec);if(!box)return;
  box.className='nota-box '+(pass?'pass':'fail');
  box.innerHTML='<span class="nota-score">'+(pass?'✓':'✗')+' '+str+' / 10</span>'
    +'<div class="nota-detail">Aciertos: '+ok+' | Fallos: '+ko+' | Sin responder: '+skip+'<br>'
    +'('+ok+' − '+ko+'/3) / '+total+' × 10 = '+str+'</div>'
    +buildRevList(sec);
  box.style.display='block';
}
function calcNotaAll(){
  var total=0,ok=0,ko=0,skip=0;
  SECS.forEach(function(sec){
    var qs=D[sec];if(!qs)return;
    total+=qs.length;
    qs.forEach(function(q){var a=state[sec+'-'+q.n];if(!a)skip++;else if(a.r)ok++;else ko++;});
  });
  var nota=Math.max(0,(ok-ko/3)/total*10),str=nota.toFixed(2),pass=nota>=5;
  var box=document.getElementById('nota-all');if(!box)return;
  box.className='global-nota-box '+(pass?'pass':'fail');
  var html='<span class="nota-score">'+(pass?'✓':'✗')+' '+str+' / 10 (global)</span>'
    +'<div class="nota-detail">Aciertos: '+ok+' | Fallos: '+ko+' | Sin responder: '+skip+'<br>'
    +'('+ok+' − '+ko+'/3) / '+total+' × 10 = '+str+'</div>';
  SECS.forEach(function(sec){
    var rv=buildRevList(sec);
    if(rv){var m=META.secciones[sec]||{};html+='<div class="review-sec-label">'+(m.emoji?m.emoji+' ':'')+escH(m.label||sec)+'</div>'+rv;}
  });
  box.innerHTML=html;box.style.display='block';
}

/* ── Estadísticas de errores ── */
function toggleStats(){
  statsVisible=!statsVisible;
  var btn=document.getElementById('btn-stats');
  if(btn){btn.style.background=statsVisible?'var(--ko-bg)':'';btn.style.color=statsVisible?'var(--ko-t)':'';}
  var box=document.getElementById('stats-global');
  if(!box)return;
  if(!statsVisible){box.classList.remove('show');return;}
  var entries=Object.entries(failHist).filter(function(e){return e[1]>0;});
  if(!entries.length){box.innerHTML='<div class="stats-title">📊 Sin errores registrados todavía</div>';box.classList.add('show');return;}
  entries.sort(function(a,b){return b[1]-a[1];});
  var top=entries.slice(0,10);
  var maxV=top[0][1];
  var html='<div class="stats-title">📊 Preguntas más falladas (acumulado entre sesiones)</div>';
  top.forEach(function(e,i){
    var qid=e[0],count=e[1];
    var q=findQ(qid);if(!q)return;
    var sec=getSecFromQid(qid),n=getNFromQid(qid);
    var m=META.secciones[sec]||{};
    var pct=Math.round(count/maxV*100);
    html+='<div class="stats-item">';
    html+='<span class="stats-n" style="min-width:18px;color:var(--ko-t);font-weight:700">'+(i+1)+'.</span>';
    html+='<span class="stats-q">'+(m.emoji?m.emoji+' ':'')+getNum(sec,n)+'. '+q.q.substring(0,60)+(q.q.length>60?'…':'')+'</span>';
    html+='<div class="stats-bar-wrap"><div class="stats-bar" style="width:'+pct+'%"></div></div>';
    html+='<span class="stats-n">'+count+'✗</span>';
    html+='</div>';
  });
  box.innerHTML=html;box.classList.add('show');
}

/* ── Buscador ── */
function onSearch(val){
  var v=val.trim().toLowerCase();
  var clr=document.getElementById('search-clear');
  var cnt=document.getElementById('search-count');
  if(clr)clr.style.display=v?'block':'none';
  var found=0,total=0;
  document.querySelectorAll('.qcard').forEach(function(card){
    total++;
    if(!v){card.classList.remove('search-hidden');found++;}
    else{
      var qtxt=card.querySelector('.qtxt');
      var match=qtxt&&qtxt.textContent.toLowerCase().indexOf(v)!==-1;
      card.classList.toggle('search-hidden',!match);
      if(match)found++;
    }
  });
  if(cnt){
    if(v){cnt.textContent=found+' de '+total+' preguntas';cnt.style.display='block';}
    else{cnt.style.display='none';}
  }
  // Mostrar "sin resultados" por panel
  ['all'].concat(SECS).forEach(function(s){
    var panel=document.getElementById('panel-'+s);if(!panel||!panel.classList.contains('visible'))return;
    var cards=panel.querySelectorAll('.qcard:not(.search-hidden)');
    var nr=document.getElementById('nr-'+s);if(nr)nr.style.display=cards.length===0&&v?'block':'none';
  });
}
function clearSearch(){
  var si=document.getElementById('search-input');if(si)si.value='';
  onSearch('');
}

/* ── Modo ── */
function setMode(mode){
  currentMode=mode;
  document.getElementById('mode-test').classList.toggle('on',mode==='test');
  document.getElementById('mode-quick').classList.toggle('on',mode==='quick');
  // Rerenderizar todo
  SECS.forEach(render);renderAll();
}

/* ── Modo oscuro ── */
function applyTheme(){
  document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');
  var btn=document.getElementById('btn-dark');if(btn)btn.textContent=darkMode?'☀️':'🌙';
}
function toggleDark(){darkMode=!darkMode;applyTheme();saveLocal();}

/* ── Temporizador ── */
function initTimer(){
  timerRemaining=timerSec;
  renderTimer();
  var disp=document.getElementById('timer-display');
  if(disp){
    disp.addEventListener('click',function(){startEditTimer();});
  }
}
function fmtTime(s){
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return h+':'+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;
}
function renderTimer(){
  var disp=document.getElementById('timer-display');
  if(!disp)return;
  disp.textContent=fmtTime(timerRemaining);
  disp.classList.toggle('danger',timerSec>0&&timerRemaining===0);
}
function timerToggle(){
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('btn-tplay').textContent='▶';
  }else{
    if(timerRemaining<=0&&timerSec>0)timerRemaining=timerSec;
    timerRunning=true;
    document.getElementById('btn-tplay').textContent='⏸';
    timerInterval=setInterval(function(){
      if(timerRemaining>0){timerRemaining--;renderTimer();}
      else{clearInterval(timerInterval);timerRunning=false;document.getElementById('btn-tplay').textContent='▶';renderTimer();}
    },1000);
  }
}
function timerReset(){
  clearInterval(timerInterval);timerRunning=false;
  timerRemaining=timerSec;
  document.getElementById('btn-tplay').textContent='▶';
  renderTimer();
}
function startEditTimer(){
  var disp=document.getElementById('timer-display');if(!disp)return;
  if(timerRunning){timerToggle();}
  var old=fmtTime(timerRemaining);
  disp.contentEditable='true';disp.classList.add('editing');
  disp.textContent=old;
  disp.focus();
  var range=document.createRange();range.selectNodeContents(disp);
  var sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  function commit(){
    disp.contentEditable='false';disp.classList.remove('editing');
    var txt=disp.textContent.trim();
    var parts=txt.split(':').map(Number);
    var secs=0;
    if(parts.length===3)secs=parts[0]*3600+parts[1]*60+parts[2];
    else if(parts.length===2)secs=parts[0]*60+parts[1];
    else if(parts.length===1)secs=parts[0]*60;
    if(!isNaN(secs)&&secs>=0){timerSec=secs;timerRemaining=secs;saveLocal();}
    renderTimer();
  }
  disp.addEventListener('blur',commit,{once:true});
  disp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();disp.blur();}});
}

/* ── Helpers cid ── */
function cidToQid(cid){return cid.replace(/^[AS]-/,'');}

/* ── Teclado ── */
function handleKey(e){
  var tg=e.target.tagName;
  if(tg==='INPUT'||tg==='TEXTAREA'||e.target.contentEditable==='true')return;
  var k=e.key;
  if(k>='1'&&k<='5'){
    if(activeCid&&!state[cidToQid(activeCid)]){
      var aqid=cidToQid(activeCid);
      var pos=parseInt(k),q=findQ(aqid);
      if(q&&pos<=q.o.length){e.preventDefault();answer(aqid,pos,getSecFromQid(aqid));}
    }
  }else if(k==='ArrowDown'||k==='ArrowUp'){
    e.preventDefault();navigateQ(k==='ArrowDown'?1:-1);
  }else if(k==='s'||k==='S'){
    if(activeCid)toggleStar(cidToQid(activeCid));
  }
}
function navigateQ(dir){
  var cards=Array.from(document.querySelectorAll('.sec-panel.visible .qcard')).filter(function(c){return c.style.display!=='none'&&!c.classList.contains('search-hidden');});
  var cids=cards.map(function(c){return c.id.replace('card-','');});
  if(!cids.length)return;
  var idx=activeCid?cids.indexOf(activeCid):-1;
  var nidx=Math.max(0,Math.min(cids.length-1,idx+dir));
  var ncid=cids[nidx];if(!ncid||ncid===activeCid)return;
  if(activeCid){var ob=document.getElementById('b-'+activeCid);var oh=document.getElementById('h-'+activeCid);if(ob)ob.classList.remove('open');if(oh)oh.classList.remove('open');var oc=document.getElementById('card-'+activeCid);if(oc)oc.classList.remove('kb-focus');}
  activeCid=ncid;
  var nb=document.getElementById('b-'+ncid);var nh=document.getElementById('h-'+ncid);
  if(nb)nb.classList.add('open');if(nh)nh.classList.add('open');
  var nc2=document.getElementById('card-'+ncid);if(nc2){nc2.classList.add('kb-focus');nc2.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
</script>
