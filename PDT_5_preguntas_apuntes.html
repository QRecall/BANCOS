<!--
=============================================================
  MOTOR BANCO MIR — v10
  Novedades respecto a v9:
  - Numeración correlativa fija por sección (no se mezcla)
  - Badge neutro en pestaña "Todos" + mezcla real inter-secciones
  - Temporizador sticky editable en header (play/pausa/reset)
  - Buscador de texto en tiempo real
  - Modo repaso rápido (muestra RC + explicación directamente)
  - Estadísticas de errores recurrentes entre sesiones
=============================================================
-->
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">Banco MIR</title>
<style>
:root{
  --bg:#f4f3ef;--surf:#fff;--bd:#e5e5e5;--bd2:#ddd;
  --txt:#1a1a1a;--txt2:#555;--txt3:#999;--txt4:#666;
  --hdr:#1a1a1a;--hdr-t:#fff;
  --ok-bg:#e6f9ef;--ok-t:#0b6e52;--ok-bd:#2da060;
  --ko-bg:#fdecea;--ko-t:#b91c1c;--ko-bd:#d94f45;
  --sc-ok:#dcf5ed;--sc-ko:#fdecea;--sc-rem:#f0f0f0;--sc-rem-t:#666;
  --exp:#fffbe6;--exp-bd:#f0c04a;--exp-t:#5a4500;
  --prog:#e5e5e5;--prog-fill:#1a56db;
  --star:#ccc;--star-on:#f59e0b;
  --hint:#fafafa;--hint-bd:#eee;
  --tab-bd:#ddd;--tab-t:#555;
  --all-bg:#e8f0fe;--all-t:#1a56db;--all-bd:#1a56db;
  --fab:#1a1a1a;--fab-t:#fff;
  --nota-btn-t:#1a56db;--nota-btn-bd:#1a56db;--nota-btn-bg:var(--surf);
  --timer-bg:#222;--timer-t:#fff;--timer-danger:#ef4444;
}
[data-theme="dark"]{
  --bg:#0f0f1a;--surf:#1e1e30;--bd:#2a2a45;--bd2:#333355;
  --txt:#e8e8f0;--txt2:#aaa;--txt3:#555;--txt4:#888;
  --hdr:#0a0a14;--hdr-t:#e8e8f0;
  --ok-bg:#0b3020;--ok-t:#4ade80;--ok-bd:#166534;
  --ko-bg:#2d0a0a;--ko-t:#f87171;--ko-bd:#7f1d1d;
  --sc-ok:#0b3020;--sc-ko:#2d0a0a;--sc-rem:#252540;--sc-rem-t:#aaa;
  --exp:#1a1500;--exp-bd:#a37f10;--exp-t:#d4b84a;
  --prog:#2a2a45;--prog-fill:#60a5fa;
  --star:#444;--star-on:#f59e0b;
  --hint:#1a1a2e;--hint-bd:#2a2a45;
  --tab-bd:#2a2a45;--tab-t:#aaa;
  --all-bg:#1a2a4a;--all-t:#60a5fa;--all-bd:#3b82f6;
  --fab:#2a2a50;--fab-t:#e8e8f0;
  --nota-btn-t:#60a5fa;--nota-btn-bd:#3b82f6;--nota-btn-bg:var(--surf);
  --timer-bg:#1a1a2e;--timer-t:#e8e8f0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .25s,color .25s}

/* ── Header ── */
header{background:var(--hdr);color:var(--hdr-t);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
header h1{font-size:13.5px;font-weight:600;white-space:nowrap}
.hright{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hmeta{font-size:11px;color:#888}
.hbtn{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:3px 5px;border-radius:5px;transition:background .15s;color:var(--hdr-t)}
.hbtn:hover{background:rgba(255,255,255,.12)}
.sbadge{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:500}
.sbadge.ok{background:#15803d;color:#dcfce7}.sbadge.warn{background:#92400e;color:#fef3c7}

/* ── Temporizador ── */
#timer-wrap{display:flex;align-items:center;gap:4px;background:var(--timer-bg);border-radius:7px;padding:3px 8px;border:1px solid rgba(255,255,255,.1)}
#timer-display{font-size:13px;font-weight:700;font-family:monospace;color:var(--timer-t);min-width:58px;text-align:center;cursor:pointer;border-radius:3px;padding:1px 3px}
#timer-display:hover{background:rgba(255,255,255,.08)}
#timer-display.editing{background:rgba(255,255,255,.15);outline:none;color:var(--timer-t)}
#timer-display.danger{color:var(--timer-danger)}
#timer-wrap button{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:12px;padding:1px 3px;border-radius:3px;line-height:1}
#timer-wrap button:hover{background:rgba(255,255,255,.12);color:#fff}

/* ── Barra de progreso ── */
#prog-wrap{height:3px;background:var(--prog);position:sticky;top:40px;z-index:99}
#prog-bar{height:100%;background:var(--prog-fill);width:0%;transition:width .4s}

/* ── Contenedor ── */
.container{max-width:820px;margin:0 auto;padding:16px 12px}

/* ── Buscador ── */
.search-wrap{position:relative;margin-bottom:13px}
.search-wrap input{width:100%;padding:8px 34px 8px 12px;border:1.5px solid var(--bd2);border-radius:8px;font-size:13px;background:var(--surf);color:var(--txt);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--prog-fill)}
.search-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--txt3);font-size:16px;display:none;line-height:1}
#search-count{font-size:11px;color:var(--txt3);margin-top:4px;display:none}

/* ── Modo repaso ── */
.mode-bar{display:flex;gap:6px;margin-bottom:12px;align-items:center}
.mode-btn{padding:5px 12px;border:1.5px solid var(--bd2);border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;background:var(--surf);color:var(--txt2);transition:all .15s}
.mode-btn:hover{border-color:#999}
.mode-btn.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Tabs ── */
.tabs{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.tab{padding:7px 14px;border:1.5px solid var(--tab-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;background:var(--surf);color:var(--tab-t);transition:all .15s}
.tab:hover{border-color:#999;color:var(--txt)}
.tab.t-all.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Score global ── */
.ph-global{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 15px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-left:4px solid var(--prog-fill)}
.score-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.sc{font-size:12px;font-weight:600;padding:3px 9px;border-radius:6px}
.sc.ok{background:var(--sc-ok);color:var(--ok-t)}.sc.ko{background:var(--sc-ko);color:var(--ko-t)}.sc.rem{background:var(--sc-rem);color:var(--sc-rem-t)}

/* ── Acciones ── */
.global-actions{display:none;margin-bottom:10px;gap:7px;flex-wrap:wrap;align-items:center}
.container[data-tab="all"] .global-actions{display:flex}
.sec-actions{margin:6px 0 15px;display:flex;gap:7px;flex-wrap:wrap}
.reset-btn{padding:7px 14px;background:var(--fab);color:var(--fab-t);border:none;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:opacity .15s}
.reset-btn:hover{opacity:.82}
.nota-btn{padding:7px 14px;background:var(--nota-btn-bg);color:var(--nota-btn-t);border:1.5px solid var(--nota-btn-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:background .15s}
.nota-btn:hover{background:var(--all-bg)}

/* ── Nota box ── */
.nota-box,.global-nota-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:2px solid var(--bd2);font-size:13px;line-height:1.7;display:none}
.nota-box.pass,.global-nota-box.pass{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t)}
.nota-box.fail,.global-nota-box.fail{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t)}
.nota-score{font-size:26px;font-weight:700;display:block;margin-bottom:4px}
.nota-detail{font-size:12px;opacity:.85;font-family:monospace}

/* ── Vista revisión ── */
.review-list{margin-top:12px;border-top:1px solid var(--bd2);padding-top:10px}
.review-title{font-size:12px;font-weight:700;margin-bottom:9px;color:var(--txt)}
.review-sec-label{font-size:11.5px;font-weight:700;color:var(--txt3);margin:8px 0 5px;padding-top:6px;border-top:1px solid var(--bd)}
.review-item{background:var(--surf);border-radius:8px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden}
.review-item summary{padding:9px 12px;cursor:pointer;font-size:12.5px;color:var(--txt);list-style:none;display:flex;gap:8px;align-items:flex-start}
.review-item summary::-webkit-details-marker{display:none}
.review-item summary::before{content:'▶';font-size:9px;color:var(--txt3);flex-shrink:0;margin-top:4px;transition:transform .18s}
details[open] summary::before{transform:rotate(90deg)}
.review-body{padding:0 12px 11px}
.review-ans{font-size:12px;color:var(--ok-t);margin-bottom:7px;font-weight:500}

/* ── Estadísticas ── */
.stats-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--surf);display:none}
.stats-box.show{display:block}
.stats-title{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--txt)}
.stats-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12.5px}
.stats-item:last-child{border-bottom:none}
.stats-bar-wrap{flex:1;background:var(--sc-rem);border-radius:4px;height:6px;overflow:hidden}
.stats-bar{height:100%;background:var(--ko-bd);border-radius:4px;transition:width .4s}
.stats-n{font-size:11px;color:var(--txt3);white-space:nowrap}
.stats-q{flex:2;color:var(--txt);font-size:12px;line-height:1.3}

/* ── Panel secciones ── */
.sec-panel{display:none}.sec-panel.visible{display:block}
.ph{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ph-left{flex:1;display:flex;flex-direction:column;gap:5px}
.ph-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:1px}
.ph-desc{font-size:12px;color:var(--txt4)}
.fbtn{padding:6px 12px;font-size:12px;font-weight:500;border:1.5px solid var(--bd2);border-radius:8px;cursor:pointer;background:var(--surf);color:var(--txt2);transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:#999;color:var(--txt)}.fbtn.on{background:var(--ko-bg);color:#b91c1c;border-color:#f87171}
.no-failed{display:none;text-align:center;padding:16px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin-top:4px}
.no-failed.show{display:block}
.no-results{display:none;text-align:center;padding:20px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin:8px 0}

/* ── Hint ── */
.hint{font-size:11px;color:var(--txt3);margin-bottom:15px;padding:7px 11px;background:var(--hint);border-radius:6px;border:1px solid var(--hint-bd)}

/* ── Tarjeta ── */
.qcard{background:var(--surf);border-radius:10px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden;transition:box-shadow .15s}
.qcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.qcard.kb-focus{outline:2px solid var(--prog-fill);outline-offset:-2px}
.qcard.search-hidden{display:none}
.qhead{padding:11px 13px;cursor:pointer;display:flex;align-items:flex-start;gap:9px}

/* ── Badge numérico ── */
.qnum{font-size:11px;font-weight:700;padding:3px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;background:var(--sc-rem);color:var(--sc-rem-t)}
/* En pestaña "Todos" siempre neutro; en sección aplica color de sección */
.qnum.sec-colored{background:var(--sec-dim);color:var(--sec-col)}

.qtxt{font-size:13px;line-height:1.5;flex:1}
.star-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--star);padding:0 2px;flex-shrink:0;margin-top:2px;line-height:1;transition:color .15s,transform .15s}
.star-btn:hover{transform:scale(1.2)}
.star-btn .si{display:inline}.star-btn .sf{display:none}
.star-btn.on .si{display:none}.star-btn.on .sf{display:inline;color:var(--star-on)}
.chev{font-size:15px;color:var(--bd2);flex-shrink:0;margin-top:2px;transition:transform .2s}
.qhead.open .chev{transform:rotate(180deg)}
.qbody{display:none;padding:0 13px 13px}.qbody.open{display:block}

/* ── Imagen ── */
.clinimg-wrap{margin:9px 0 7px;background:#111;border-radius:8px;overflow:hidden;border:1px solid var(--bd2);text-align:center}
.clinimg{max-width:100%;max-height:340px;object-fit:contain;display:block;margin:0 auto}
.clinimg-cap{font-size:11px;color:var(--txt3);padding:4px 0 5px;background:var(--hint);border-top:1px solid var(--bd)}

/* ── Opciones ── */
.opts{list-style:none;margin-top:9px;display:flex;flex-direction:column;gap:5px}
.opt{padding:9px 12px;border-radius:8px;border:1.5px solid var(--bd2);cursor:pointer;display:flex;align-items:flex-start;gap:9px;color:var(--txt);font-size:13px;line-height:1.45;transition:border-color .12s,background .12s;user-select:none}
.opt:hover:not(.done){border-color:#999;background:var(--hint)}
.opt.correct{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t);font-weight:500;cursor:default}
.opt.wrong{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t);cursor:default}
.opt.done:not(.correct):not(.wrong){cursor:default;opacity:.7}
.onum{font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;min-width:15px}

/* ── Modo repaso rápido ── */
.quick-card{padding:9px 12px;border-radius:8px;border:1.5px solid var(--ok-bd);background:var(--ok-bg);margin-top:8px}
.quick-rc{font-size:12.5px;font-weight:600;color:var(--ok-t);margin-bottom:6px}

/* ── Explicación ── */
.expbox{margin-top:10px;padding:10px 12px;background:var(--exp);border-left:4px solid var(--exp-bd);border-radius:0 8px 8px 0;font-size:12.5px;color:var(--exp-t);line-height:1.65}
.expbox b,.expbox strong{font-weight:600}
.et{display:block;margin-bottom:4px;font-weight:600;font-size:13px}
.atag{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
.atag.ok{background:var(--sc-ok);color:var(--ok-t)}.atag.ko{background:var(--sc-ko);color:#c0392b}

/* ── All-tab CSS ── */
.container[data-tab="all"] .ph{display:none!important}
.container[data-tab="all"] .sec-actions{display:none!important}
.container[data-tab="all"] .no-failed{display:none!important}
.container[data-tab="all"] .nota-box{display:none!important}
.container:not([data-tab="all"]) .global-nota-box{display:none!important}
.container:not([data-tab="all"]) #stats-global{display:none!important}
</style>
</head>
<body>
<header>
  <h1 id="h-tit">Banco MIR</h1>
  <div class="hright">
    <span class="hmeta" id="h-meta"></span>
    <!-- Temporizador -->
    <div id="timer-wrap" title="Haz clic en el tiempo para editar">
      <span id="timer-display">0:00:00</span>
      <button id="btn-tplay" onclick="timerToggle()" title="Play/Pausa">▶</button>
      <button onclick="timerReset()" title="Reset">↺</button>
    </div>
    <button class="hbtn" id="btn-dark" onclick="toggleDark()" title="Modo oscuro">🌙</button>
    <span id="save-badge" class="sbadge"></span>
  </div>
</header>
<div id="prog-wrap"><div id="prog-bar"></div></div>

<div class="container" id="main-cont" data-tab="all">
  <!-- Buscador -->
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="🔍 Buscar en enunciados..." oninput="onSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div id="search-count"></div>

  <!-- Modo -->
  <div class="mode-bar">
    <span style="font-size:11.5px;color:var(--txt3);font-weight:600">MODO:</span>
    <button class="mode-btn on" id="mode-test" onclick="setMode('test')">📝 Test</button>
    <button class="mode-btn" id="mode-quick" onclick="setMode('quick')">⚡ Repaso rápido</button>
    <button class="mode-btn" id="btn-stars" onclick="filterStarred()" style="margin-left:auto;border-color:#f59e0b;color:#b45309">⭐ Marcadas</button>
    <button class="mode-btn" id="btn-stats" onclick="toggleStats()">📊 Errores</button>
  </div>

  <!-- Stats globales -->
  <div class="stats-box" id="stats-global"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabs-wrap"></div>

  <!-- Score global -->
  <div class="ph-global">
    <div class="ph-left">
      <span class="ph-desc" id="ph-gdesc"></span>
      <div class="score-row">
        <span class="sc ok" id="sc-ok-all">✓ 0</span>
        <span class="sc ko" id="sc-ko-all">✗ 0</span>
        <span class="sc rem" id="sc-rem-all">○ 0</span>
      </div>
    </div>
  </div>
  <div class="global-actions">
    <button class="reset-btn" onclick="resetAll()">↺ Reiniciar y mezclar</button>
    <button class="nota-btn" onclick="calcNotaAll()">✎ Calcular nota global</button>
  </div>
  <div class="global-nota-box" id="nota-all"></div>
  <p class="hint">💡 <b>1–5</b> responde · <b>↑↓</b> navega · <b>S</b> marca ⭐ · Progreso guardado automáticamente</p>

  <div id="panels-wrap"></div>
</div>

<script>
/* ═══════════════════════════════════════ MOTOR v10 ═══════════════════════════════════════ */

var META=/*__META_JSON__*/{"titulo":"PDT CEU \u2014 Banco de Preguntas","subtitulo":"Radiodiagn\u00f3stico \u00b7 Cir. Pedi\u00e1trica \u00b7 Nefrourolog\u00eda \u00b7 Med. Intensiva \u00b7 Neurocirug\u00eda \u00b7 Cir. Endocrina \u00b7 Radioterapia","examen":"PDT \u00b7 CEU San Pablo","secciones":{"rad":{"label":"Radiodiagn\u00f3stico","emoji":"\ud83d\uddbc\ufe0f","color":"#0d5986","colorDim":"#dbeafe","desc":"Radiolog\u00eda pedi\u00e1trica \u00b7 Adultos y trauma \u00b7 Urol\u00f3gica y ginecol\u00f3gica"},"cirped":{"label":"Cir. Pedi\u00e1trica","emoji":"\ud83d\udc76","color":"#0f766e","colorDim":"#ccfbf1","desc":"Malformaciones \u00b7 Patolog\u00eda intestinal \u00b7 Tumores pedi\u00e1tricos"},"nef":{"label":"Nefrourolog\u00eda","emoji":"\ud83d\udd2c","color":"#7c3aed","colorDim":"#ede9fe","desc":"Litiasis y f\u00edstulas \u00b7 Tumores urol\u00f3gicos \u00b7 Pr\u00f3stata e IU \u00b7 Hematuria"},"pal":{"label":"Paliativos","emoji":"\ud83c\udf3f","color":"#15803d","colorDim":"#dcfce7","desc":"Cuidados paliativos \u00b7 Control de s\u00edntomas"},"mi":{"label":"Med. Intensiva","emoji":"\u26a1","color":"#b45309","colorDim":"#fef3c7","desc":"Ventilaci\u00f3n mec\u00e1nica \u00b7 Cardiohemodinn\u00e1mica \u00b7 Shock y trauma"},"nc":{"label":"Neurocirug\u00eda","emoji":"\ud83e\udde0","color":"#374151","colorDim":"#e2e8f0","desc":"Tumores SNC \u00b7 Hemorragia subaracnoidea \u00b7 Epilepsia refractaria"},"ce":{"label":"Cir. Endocrina","emoji":"\u2697\ufe0f","color":"#9a3412","colorDim":"#ffedd5","desc":"Tiroides \u00b7 Paratiroides \u00b7 Suprarrenales y bari\u00e1trica"},"rt":{"label":"Radioterapia","emoji":"\u2622\ufe0f","color":"#6b21a8","colorDim":"#f3e8ff","desc":"Indicaciones en oncolog\u00eda"}}};
var D=/*__D_JSON__*/{"rad":[{"n":"rp1","q":"Respecto a la malformaci\u00f3n de Arnold-Chiari tipo I, todo es cierto EXCEPTO:","o":["Descenso amigdalar >5mm a trav\u00e9s de la l\u00ednea basio-opistion","Asocia retropulsi\u00f3n de la odontoides","En ocasiones asocia hidrosiringomielia","Conlleva un aumento del volumen de la fosa posterior y del LCR"],"c":4,"e":"La Chiari I se produce por una fosa posterior PEQUE\u00d1A que empuja las am\u00edgdalas hacia abajo; no hay aumento sino reducci\u00f3n del volumen de la fosa posterior. Las otras tres afirmaciones son correctas.","ai":false},{"n":"rp2","q":"Respecto a las lesiones qu\u00edsticas del cuello, se\u00f1ala la opci\u00f3n INCORRECTA:","o":["Para confirmar su diagn\u00f3stico es necesaria una gammagraf\u00eda tiroidea","La lesi\u00f3n cong\u00e9nita m\u00e1s frecuente es el quiste del conducto tirogloso","Los quistes braquiales m\u00e1s frecuentes provienen del 2\u00ba arco","Si los quistes se infectan pueden doler y crecer"],"c":1,"e":"El diagn\u00f3stico de los quistes cervicales (tirogloso, branquiales) se realiza con cl\u00ednica y ECOGRAF\u00cdA, no con gammagraf\u00eda tiroidea. La gammagraf\u00eda tiroidea eval\u00faa la funci\u00f3n del tejido tiroideo, no las lesiones qu\u00edsticas.","ai":false},{"n":"rp3","q":"Como complicaciones del S\u00edndrome de Distr\u00e9s Respiratorio del prematuro est\u00e1n todos los siguientes A EXCEPCI\u00d3N DE:","o":["Displasia broncopulmonar","Neumon\u00eda qu\u00edmica","Hemorragia pulmonar","Enfisema intersticial"],"c":2,"e":"La displasia broncopulmonar, la hemorragia pulmonar y el enfisema intersticial son complicaciones reales del SDR neonatal. La neumon\u00eda qu\u00edmica no es una complicaci\u00f3n caracter\u00edstica de la enfermedad de membrana hialina.","ai":false},{"n":"rp4","q":"Las t\u00e9cnicas diagn\u00f3sticas baritadas se utilizan en el diagn\u00f3stico de las siguientes patolog\u00edas A EXCEPCI\u00d3N DE:","o":["\u00cdleo meconial","V\u00f3lvulo del intestino medio","F\u00edstula traqueoesof\u00e1gica","Atresia yeyunal"],"c":3,"e":"En la f\u00edstula traqueoesof\u00e1gica el contraste baritado est\u00e1 contraindicado por riesgo de aspiraci\u00f3n bronquial grave. Se prefiere contraste hidrosoluble o directamente endoscopia/broncoscopia para el diagn\u00f3stico.","ai":false},{"n":"rp5","q":"En la imagen de disrafismo espinal cerrado con lipoma y cono medular anclado, se\u00f1ala la opci\u00f3n FALSA:","o":["Es la anomal\u00eda cong\u00e9nita m\u00e1s com\u00fan de los disrafismos cerrados","Se ve un lipoma asociado a un cono medular anclado","Es una secuencia potenciada en T1","Se necesitan estudios con contraste para alcanzar el diagn\u00f3stico"],"c":4,"e":"El lipoma con disrafismo oculto se diagnostica perfectamente con RM sin contraste en secuencias T1 (la grasa da se\u00f1al hiperintensa). El contraste no es necesario para el diagn\u00f3stico rutinario de esta malformaci\u00f3n.","ai":false},{"n":"rp6","q":"Respecto a los quistes braquiales del 2\u00ba arco, todas las afirmaciones son ciertas A EXCEPCI\u00d3N DE:","o":["Pueden llegar a la edad adulta sin dar sintomatolog\u00eda","Se localizan en el \u00e1rea submandibular, posteriores al m\u00fasculo ECM","La pared del quiste puede sangrar e infectarse","Si se origina f\u00edstula o seno en vez de quiste, el diagn\u00f3stico es m\u00e1s temprano"],"c":2,"e":"Los quistes del 2\u00ba arco braquial se localizan LATERALMENTE en el cuello, a lo largo del borde ANTERIOR (no posterior) del ECM. Pueden permanecer asintom\u00e1ticos hasta la edad adulta y tienden a infectarse.","ai":false},{"n":"rp7","q":"El tratamiento del quiste tirogloso consiste en:","o":["Antibi\u00f3tico oral en caso de infecci\u00f3n local","Punci\u00f3n y drenaje urgente en caso de infecci\u00f3n complicada","Ex\u00e9resis quir\u00fargica (intervenci\u00f3n de Sistrunk) como tratamiento definitivo programado","Todas las opciones son correctas"],"c":4,"e":"El manejo es escalonado: antibi\u00f3tico si infecci\u00f3n leve, drenaje si absceso complicado, y cirug\u00eda definitiva (Sistrunk: ex\u00e9resis del quiste + cuerpo del hioides + trayecto hasta base de lengua) en fase fr\u00eda. Las tres son correctas.","ai":false},{"n":"rp8","q":"Ante un RN con cl\u00ednica de distr\u00e9s respiratorio, \u00bfqu\u00e9 exploraci\u00f3n radiol\u00f3gica realizaremos en primer lugar?","o":["Ecograf\u00eda tor\u00e1cica","Radiolog\u00eda simple de abdomen","Radiolog\u00eda simple de t\u00f3rax","TAC tor\u00e1cico"],"c":3,"e":"La Rx simple de t\u00f3rax AP es siempre la primera prueba radiol\u00f3gica en el RN con distr\u00e9s: r\u00e1pida, accesible, sin radiaci\u00f3n significativa, y aporta informaci\u00f3n clave (patr\u00f3n pulmonar, cardiomegalia, neumot\u00f3rax, hernia diafragm\u00e1tica).","ai":false},{"n":"rp9","q":"RN prematuro con hemorragia intraventricular y dilataci\u00f3n ventricular en ecograf\u00eda. \u00bfA qu\u00e9 grado de la clasificaci\u00f3n de Papile corresponder\u00eda?","o":["Grado I: hemorragia subependimaria","Grado II: intraventricular sin dilataci\u00f3n ventricular","Grado III: intraventricular CON dilataci\u00f3n ventricular","Grado IV: extensi\u00f3n al par\u00e9nquima cerebral"],"c":4,"e":"Clasificaci\u00f3n de Papile: I=subependimaria, II=IV sin dilataci\u00f3n, III=IV CON dilataci\u00f3n ventricular, IV=extensi\u00f3n parenquimatosa. La dilataci\u00f3n ventricular define el grado III, pero el solucionario del examen indica Grado IV para la imagen espec\u00edfica mostrada.","ai":true},{"n":"rp10","q":"RN de 20 d\u00edas con hipertricosis en fosa lumbar. Para descartar disrafismo espinal, pedir\u00e1:","o":["TAC","Ecograf\u00eda","Resonancia magn\u00e9tica","Radiograf\u00eda simple"],"c":2,"e":"En menores de 6 meses, la no osificaci\u00f3n del arco posterior vertebral permite explorar la m\u00e9dula espinal con ECOGRAF\u00cdA sin radiaci\u00f3n. En mayores de 6 meses, cuando los arcos est\u00e1n osificados, se necesita RM.","ai":false},{"n":"rp11","q":"RN prematuro de 31 semanas con enfermedad de membrana hialina. \u00bfCu\u00e1l hallazgo radiol\u00f3gico NO esperar\u00eda encontrar?","o":["Broncograma a\u00e9reo","Patr\u00f3n reticulonodular (vidrio esmerilado)","Pulm\u00f3n peque\u00f1o / no expandido","Pulm\u00f3n expandido (hiperinsuflado)"],"c":4,"e":"En la enfermedad de membrana hialina el pulm\u00f3n NO puede expandirse (d\u00e9ficit de surfactante = atelectasia difusa). Lo esperado es pulm\u00f3n peque\u00f1o, broncograma a\u00e9reo y patr\u00f3n reticulonodular. Un 'pulm\u00f3n expandido' es lo contrario de lo esperado.","ai":false},{"n":"rp12","q":"Ante la sospecha de obstrucci\u00f3n intestinal en un ni\u00f1o de 4 meses, \u00bfqu\u00e9 prueba inicial pedir\u00edas?","o":["Ecograf\u00eda abdominal","Radiograf\u00eda simple de abdomen","Resonancia magn\u00e9tica","Punci\u00f3n lumbar"],"c":2,"e":"La Rx simple de abdomen es la primera prueba ante obstrucci\u00f3n intestinal en pediatr\u00eda: muestra niveles hidroa\u00e9reos, dilataci\u00f3n de asas y distribuci\u00f3n del gas, orientando sobre el nivel y la causa de la obstrucci\u00f3n.","ai":false},{"n":"rp13","q":"Respecto a los procesos infecciosos del par\u00e9nquima pulmonar del ni\u00f1o, se\u00f1ala la respuesta FALSA:","o":["Un proceso neum\u00f3nico puede complicarse con derrame pleural tabicado","En bronquiolitis es t\u00edpica la imagen en 'coraz\u00f3n velloso'","Existe menor prevalencia de neumon\u00eda redonda en ni\u00f1os respecto a adultos","La tuberculosis miliar puede acontecer en la infancia"],"c":3,"e":"La neumon\u00eda redonda (esf\u00e9rica) es M\u00c1S frecuente en ni\u00f1os que en adultos, no menos. Se presenta como opacidad redondeada bien delimitada en l\u00f3bulos inferiores y puede confundirse con una masa pulmonar.","ai":false},{"n":"rp14","q":"Ante un ni\u00f1o con estenosis hipertr\u00f3fica del p\u00edloro, se\u00f1ala la opci\u00f3n ERR\u00d3NEA respecto al estudio ecogr\u00e1fico:","o":["Doppler color mostrar\u00e1 incremento del flujo en el canal pil\u00f3rico","Antes de operar hay que confirmar con estudio baritado para valorar el grado de obstrucci\u00f3n","La falta de relajaci\u00f3n del canal en tiempo real ayuda al diagn\u00f3stico","Tras la intervenci\u00f3n pueden persistir alteradas las medidas del canal pil\u00f3rico"],"c":2,"e":"La ecograf\u00eda es el GOLD STANDARD para el diagn\u00f3stico de estenosis hipertr\u00f3fica del p\u00edloro y NO necesita confirmaci\u00f3n con estudio baritado. El tr\u00e1nsito baritado est\u00e1 completamente obsoleto para este diagn\u00f3stico.","ai":false},{"n":"rp15","q":"Lactante de 15 meses con dolor abdominal c\u00f3lico y sangre en heces. Alta sospecha de invaginaci\u00f3n intestinal. Se\u00f1ala la opci\u00f3n FALSA:","o":["El tratamiento con enema se har\u00e1 en todos los casos porque no tiene contraindicaciones","Podemos prescindir de la radiograf\u00eda si la ECO es diagn\u00f3stica","Es la segunda causa de obstrucci\u00f3n intestinal en pediatr\u00eda","La localizaci\u00f3n m\u00e1s frecuente es ileocecal"],"c":1,"e":"El enema tiene contraindicaciones absolutas: perforaci\u00f3n intestinal, peritonitis y shock. No puede aplicarse en todos los casos. La ECO con sensibilidad y especificidad >95% puede sustituir a la Rx como primera prueba.","ai":false},{"n":"rp16","q":"Son criterios diagn\u00f3sticos de la Neurofibromatosis tipo 1 (Von Recklinghausen) todos los siguientes, EXCEPTO:","o":["Glioma de la v\u00eda \u00f3ptica","Schwannoma vestibular bilateral","Un neurofibroma plexiforme","Lesi\u00f3n \u00f3sea t\u00edpica como la displasia esfenoidal"],"c":2,"e":"El schwannoma vestibular BILATERAL es criterio diagn\u00f3stico exclusivo de la Neurofibromatosis tipo 2 (NF2), no de la NF1. Los criterios de NF1 incluyen: manchas caf\u00e9 con leche \u22656, neurofibromas \u22652, ef\u00e9lides axilares, glioma \u00f3ptico, n\u00f3dulos de Lisch, lesiones \u00f3seas y familiar de 1er grado.","ai":false},{"n":"ra1","q":"\u00bfCu\u00e1l de estas NO es una lesi\u00f3n potencialmente mortal de forma inmediata en el politraumatismo?","o":["Hemorragia intestinal masiva","Neumot\u00f3rax a tensi\u00f3n","Taponamiento card\u00edaco","Traumatismo lar\u00edngeo directo"],"c":4,"e":"Las 6 lesiones tor\u00e1cicas inmediatamente mortales del ATLS son: neumot\u00f3rax a tensi\u00f3n, hemot\u00f3rax masivo, taponamiento card\u00edaco, t\u00f3rax inestable, rotura a\u00f3rtica y rotura diafragm\u00e1tica. El traumatismo lar\u00edngeo puede ser grave pero no pertenece a este grupo cl\u00e1sico de lesiones inmediatamente letales.","ai":false},{"n":"ra2","q":"\u00bfCu\u00e1l de las siguientes pruebas NO est\u00e1 indicada en un paciente con inestabilidad hemodin\u00e1mica?","o":["Rx AP de t\u00f3rax","Rx lateral de la columna cervical","Rx lateral del cr\u00e1neo","Rx AP de pelvis"],"c":3,"e":"En el paciente inestable se priorizan Rx AP de t\u00f3rax (descartar neumot\u00f3rax/hemot\u00f3rax) y AP de pelvis (descartar fractura hemorr\u00e1gica). La Rx lateral de cr\u00e1neo no aporta informaci\u00f3n urgente que cambie el manejo inmediato.","ai":false},{"n":"ra3","q":"Rx de t\u00f3rax en politraumatizado. Todos hacen sospechar lesi\u00f3n de la aorta tor\u00e1cica A EXCEPCI\u00d3N DE:","o":["P\u00e9rdida del contorno del bot\u00f3n a\u00f3rtico","Casquete apical izquierdo (hematoma apical)","Ensanchamiento mediast\u00ednico","Fractura de las \u00faltimas costillas"],"c":4,"e":"La fractura de las \u00faltimas costillas orienta a lesi\u00f3n espl\u00e9nica o hep\u00e1tica, no a\u00f3rtica. Los signos de lesi\u00f3n a\u00f3rtica en Rx de t\u00f3rax son: ensanchamiento mediast\u00ednico, p\u00e9rdida del bot\u00f3n a\u00f3rtico, casquete apical izquierdo y desviaci\u00f3n traqueal hacia la derecha.","ai":false},{"n":"ra4","q":"Respecto al traumatismo abdominal cerrado, \u00bfcu\u00e1l afirmaci\u00f3n es FALSA?","o":["Una laceraci\u00f3n espl\u00e9nica frecuentemente se asocia a fractura de los \u00faltimos arcos costales","Un vector de fuerza lateral puede lesionar el par\u00e9nquima espl\u00e9nico","El estallido del bazo corresponde a un grado III de la clasificaci\u00f3n AAST","El bazo es el \u00f3rgano intraabdominal m\u00e1s frecuentemente afectado en trauma cerrado"],"c":3,"e":"Seg\u00fan la clasificaci\u00f3n AAST, el estallido del bazo (>25% del par\u00e9nquima destruido) corresponde al GRADO V, no al III. El Grado III es una laceraci\u00f3n de profundidad >3cm o un hematoma subcapsular que afecta >50% del bazo.","ai":false},{"n":"ra5","q":"Sobre la ecograf\u00eda FAST en el paciente politraumatizado inestable, \u00bfcu\u00e1l NO es correcta?","o":["Es la t\u00e9cnica de elecci\u00f3n en pacientes inestables","No se necesita personal ejercitado para su realizaci\u00f3n","Puede realizarse simult\u00e1neamente a las maniobras de reanimaci\u00f3n","Su principal utilidad es detectar l\u00edquido libre intraperitoneal"],"c":2,"e":"La ECO FAST requiere personal ENTRENADO en la t\u00e9cnica e interpretaci\u00f3n de las im\u00e1genes. Es la t\u00e9cnica de elecci\u00f3n en el inestable (sobre el TC), puede hacerse en paralelo a la reanimaci\u00f3n y detecta l\u00edquido libre y hemopericardio.","ai":false},{"n":"ra6","q":"Dentro de las exploraciones radiogr\u00e1ficas de rutina en el politraumatizado, \u00bfcu\u00e1l NO se encuentra en el protocolo inicial?","o":["Radiograf\u00eda lateral cervical","Radiolog\u00eda AP cervical","Radiograf\u00eda AP de t\u00f3rax","Radiograf\u00eda AP de pelvis"],"c":2,"e":"La serie b\u00e1sica inicial del ATLS incluye Rx AP de t\u00f3rax, AP de pelvis y LATERAL cervical (para ver C1-C7). La Rx AP cervical no forma parte del protocolo inicial porque la proyecci\u00f3n lateral tiene mayor rendimiento diagn\u00f3stico en el trauma agudo.","ai":false},{"n":"ra7","q":"En un paciente con traumatismo tor\u00e1cico con hallazgos cr\u00edticos en la Rx, \u00bfcu\u00e1l debe ser la actitud del radi\u00f3logo?","o":["Realizar parrilla costal urgente","Realizar TCM de t\u00f3rax urgente","Notificar el hallazgo al cl\u00ednico peticionario de inmediato o realizar tratamiento urgente si es factible","A\u00f1adir una proyecci\u00f3n en dec\u00fabito lateral izquierdo"],"c":3,"e":"El radi\u00f3logo debe comunicar inmediatamente los hallazgos cr\u00edticos (neumot\u00f3rax, hemot\u00f3rax, rotura a\u00f3rtica) al cl\u00ednico responsable. Si tiene competencia para el tratamiento intervencionista urgente puede actuar directamente. La notificaci\u00f3n inmediata es siempre la prioridad absoluta.","ai":false},{"n":"ra8","q":"Respecto al traumatismo craneoencef\u00e1lico, todas las afirmaciones son ERR\u00d3NEAS A EXCEPCI\u00d3N DE:","o":["Las contusiones hemorr\u00e1gicas se localizan preferentemente en las regiones frontobasales y fosa temporal","Son lesiones extraaxiales los hematomas epidurales, subdurales, intraparenquimatosos e intraventriculares","El TC tiene mayor rendimiento diagn\u00f3stico que la RM para la lesi\u00f3n axonal difusa","Los hematomas subdurales tienen apariencia hipodensa y forma biconvexa"],"c":1,"e":"Las contusiones cerebrales en el TCE se localizan preferentemente en las regiones FRONTOBASALES y FOSA TEMPORAL (zonas de golpe-contragolpe, donde el cerebro choca con las irregularidades \u00f3seas). Los subdurales son cresc\u00e9nticos (no biconvexos); la RM es superior al TC para la lesi\u00f3n axonal difusa.","ai":false},{"n":"ra9","q":"En la Rx de t\u00f3rax del politraumatizado hay que descartar patolog\u00edas de riesgo vital, MENOS UNA. Ind\u00edquela:","o":["Taponamiento card\u00edaco","Neumot\u00f3rax masivo o a tensi\u00f3n","Laceraci\u00f3n pulmonar aislada","Rotura de la aorta"],"c":3,"e":"Las lesiones tor\u00e1cicas de riesgo vital inmediato son: neumot\u00f3rax a tensi\u00f3n, hemot\u00f3rax masivo, taponamiento card\u00edaco, rotura a\u00f3rtica, t\u00f3rax inestable y rotura diafragm\u00e1tica. La laceraci\u00f3n pulmonar aislada sin neumot\u00f3rax ni hemot\u00f3rax no suele ser inmediatamente mortal.","ai":false},{"n":"ra10","q":"Paciente con TCE y Glasgow 8. TC craneal: \u00bfqu\u00e9 hallazgo NO puede identificarse con claridad?","o":["Hematoma epidural","Contusiones hemorr\u00e1gicas frontobasales","Lesi\u00f3n axonal difusa","Herniaci\u00f3n subfalciana"],"c":3,"e":"La lesi\u00f3n axonal difusa (LAD) es la lesi\u00f3n que PEOR detecta el TC: las lesiones microsc\u00f3picas por cizallamiento axonal son invisibles en TC. La RM con secuencias FLAIR, T2* y difusi\u00f3n es mucho m\u00e1s sensible. El TC detecta bien los hematomas y los desplazamientos de l\u00ednea media.","ai":false},{"n":"ru1","q":"Ante la sospecha de torsi\u00f3n testicular, se\u00f1ala la opci\u00f3n FALSA:","o":["Una orquiepididimitis puede simular una torsi\u00f3n intermitente con hiperemia en el Doppler","Con el paso de las horas la ecoestructura del teste es m\u00e1s heterog\u00e9nea","Es una urgencia quir\u00fargica siendo el Doppler + ECO la t\u00e9cnica m\u00e1s correcta","El Doppler reflejar\u00e1 SIEMPRE ausencia de flujo intratesticular en todos los casos"],"c":4,"e":"La ausencia de flujo en el Doppler es muy sugestiva de torsi\u00f3n pero NO est\u00e1 presente en el 100% de los casos: en torsiones incompletas o muy precoces puede haber flujo residual. Ante alta sospecha cl\u00ednica se debe operar aunque el Doppler no sea concluyente.","ai":false},{"n":"ru2","q":"Ante un incidentaloma adrenal, todas las afirmaciones son FALSAS A EXCEPCI\u00d3N DE:","o":["La detecci\u00f3n de grasa macrosc\u00f3pica en TC sin contraste es altamente sugestiva de mielolipoma adrenal","En TC basal, valores <10 UH indican dudosa benignidad y se necesitan otras t\u00e9cnicas","Una ca\u00edda de se\u00f1al en RM en masa adrenal indica patolog\u00eda maligna","No debemos realizar TC con contraste ante sospecha de feocromocitoma por riesgo de crisis"],"c":1,"e":"La grasa macrosc\u00f3pica (densidades negativas en UH en TC sin contraste) en una masa adrenal es pr\u00e1cticamente diagn\u00f3stica de mielolipoma, un tumor benigno. Opci\u00f3n B es falsa: <10 UH indica adenoma benigno rico en l\u00edpidos, no dudosa benignidad. Opci\u00f3n C es falsa: la ca\u00edda de se\u00f1al en RM indica l\u00edpidos intracelulares = adenoma benigno.","ai":false},{"n":"ru3","q":"Var\u00f3n de 24 a\u00f1os, pielonefritis aguda sin respuesta al tratamiento a las 72h. \u00bfCu\u00e1l de estos hallazgos encontrar\u00eda MENOS probablemente en la ECO renal?","o":["Estudio completamente normal","\u00c1rea de hipoperfusi\u00f3n en el Doppler-Color","Aumento del tama\u00f1o renal","Engrosamiento del urotelio renal"],"c":2,"e":"Las \u00e1reas de hipoperfusi\u00f3n focal en el Doppler son hallazgos ESPERADOS en la pielonefritis grave o complicada que no responde al tratamiento (nefritis focal bacteriana, abscesificaci\u00f3n). Por tanto, es el hallazgo que menos sorprender\u00eda encontrar, no el que menos probablemente se ver\u00eda.","ai":true},{"n":"ru4","q":"\u00bfCu\u00e1l de las siguientes NO es una indicaci\u00f3n de RM prost\u00e1tica?","o":["Estadificaci\u00f3n del c\u00e1ncer de pr\u00f3stata","Prostatitis cr\u00f3nica","Elevaci\u00f3n del PSA despu\u00e9s de prostatectom\u00eda radical","Discrepancia cl\u00ednico-biopsia"],"c":2,"e":"La RM multiparam\u00e9trica prost\u00e1tica est\u00e1 indicada para estadificaci\u00f3n del c\u00e1ncer, detecci\u00f3n con PSA elevado y biopsias negativas, recidiva bioqu\u00edmica post-prostatectom\u00eda y discordancia cl\u00ednico-biopsia. La prostatitis cr\u00f3nica se maneja cl\u00ednicamente sin necesidad de RM como rutina.","ai":false},{"n":"ru5","q":"\u00bfCu\u00e1l es la t\u00e9cnica m\u00e1s sensible para el diagn\u00f3stico de la cistitis enfisematosa?","o":["Radiograf\u00eda simple de abdomen/pelvis","Ecograf\u00eda p\u00e9lvica","TC abdominop\u00e9lvico","Resonancia magn\u00e9tica p\u00e9lvica"],"c":3,"e":"La cistitis enfisematosa (gas en la pared vesical) se diagnostica mejor con TC: detecta peque\u00f1as cantidades de gas intramural con m\u00e1xima sensibilidad y permite valorar la extensi\u00f3n y complicaciones. Se asocia a pacientes diab\u00e9ticos con ITU por g\u00e9rmenes fermentadores.","ai":false},{"n":"ru6","q":"\u00bfCu\u00e1l de los siguientes criterios le har\u00eda sospechar malignidad en un quiste ov\u00e1rico?","o":["Pared fina y regular","Contenido homog\u00e9neo anecog\u00e9nico","Polos s\u00f3lidos o papilas internas con vascularizaci\u00f3n en Doppler","Lesi\u00f3n unilocular sin tabiques"],"c":3,"e":"Los criterios ecogr\u00e1ficos de sospecha de malignidad ov\u00e1rica son: pared gruesa e irregular, tabiques internos gruesos, componentes s\u00f3lidos o papilas internas con vascularizaci\u00f3n en Doppler y tama\u00f1o >5-7cm. Los quistes simples (pared fina, contenido homog\u00e9neo, uniloculares) son benignos.","ai":false},{"n":"ru7","q":"Para valorar la permeabilidad tub\u00e1rica en una paciente con problemas de fertilidad, \u00bfqu\u00e9 prueba realizar\u00eda?","o":["Resonancia magn\u00e9tica","Ecograf\u00eda transvaginal","Histerosalpingograf\u00eda","Tomograf\u00eda computarizada"],"c":3,"e":"La histerosalpingograf\u00eda (HSG) es la prueba est\u00e1ndar para valorar la permeabilidad tub\u00e1rica: inyecci\u00f3n de contraste radiopaco a trav\u00e9s del cuello uterino y observaci\u00f3n de su paso por las trompas bajo fluoroscopia. Detecta obstrucci\u00f3n tub\u00e1rica, sinecias uterinas y anomal\u00edas de la cavidad uterina.","ai":false}],"cirped":[{"n":"cm1","q":"Lactante de 3 meses con hernia umbilical sin signos de complicaci\u00f3n. \u00bfQu\u00e9 actitud tomar\u00eda?","o":["Indicar\u00eda cirug\u00eda urgente","Indicar\u00eda cirug\u00eda programada","No indicar\u00eda cirug\u00eda: es fisiol\u00f3gica y hay que esperar al cierre espont\u00e1neo","Solicitar\u00eda ecograf\u00eda para confirmar"],"c":3,"e":"La hernia umbilical es fisiol\u00f3gica en lactantes y cierra espont\u00e1neamente antes de los 4-5 a\u00f1os en la mayor\u00eda de los casos. Solo se indica cirug\u00eda si persiste m\u00e1s all\u00e1 de los 4-5 a\u00f1os, si es muy grande (>2cm) o si aparecen complicaciones (incarceraci\u00f3n, estrangulamiento).","ai":false},{"n":"cm2","q":"En relaci\u00f3n a los problemas de la fisura labiopalatina, \u00bfcu\u00e1l de estos enunciados NO es correcto?","o":["Generalmente tienen problemas de alimentaci\u00f3n","Mayor riesgo de otitis y problemas de audici\u00f3n","Pueden presentar voz nasal y retraso en el lenguaje","A menudo tienen alteraciones en la dentici\u00f3n"],"c":1,"e":"Los pacientes con fisura labiopalatina pueden tener dificultades de alimentaci\u00f3n en los casos severos (especialmente los de paladar hendido, que no pueden crear presi\u00f3n negativa para mamar), pero no 'generalmente' en todos los casos. Las otras tres asociaciones (otitis serosa, alteraciones del habla y dentarias) son muy frecuentes.","ai":false},{"n":"cm3","q":"La secuencia temporal recomendada para el manejo de la fisura labiopalatina es:","o":["NAM (1-3m), queilorrafia (3m), uranoestafilorrafia (6-12m), operaciones adicionales (>4-5 a\u00f1os)","Queilorrafia (al nacimiento), uranoestafilorrafia (3m), operaciones adicionales (1 a\u00f1o)","NAM (1-3m), uranoestafilorrafia (3m), queilorrafia (6-12m), operaciones adicionales (>4-5 a\u00f1os)","NAM (1-12m), queilorrafia + uranoestafilorrafia (1-2 a\u00f1os), operaciones adicionales (2 a\u00f1os)"],"c":1,"e":"El protocolo est\u00e1ndar es: NAM (1-3 meses de modelado preoperatorio del cart\u00edlago nasal y alv\u00e9olo), queilorrafia a los ~3 meses, uranoestafilorrafia a los 6-12 meses (antes del inicio del habla), y operaciones secundarias (injertos \u00f3seos, rinoplastia) a partir de los 4-5 a\u00f1os.","ai":false},{"n":"cm4","q":"\u00bfCu\u00e1l de las siguientes afirmaciones sobre el quiste tirogloso es CIERTA?","o":["Es una tumoraci\u00f3n cervical rara en edad infantil","Se localiza m\u00e1s frecuentemente en la zona cervical lateral","Es una masa fija y firmemente adherida a planos profundos","Su tratamiento es la intervenci\u00f3n de Sistrunk: ex\u00e9resis del quiste + resecci\u00f3n parcial del hioides"],"c":4,"e":"El quiste tirogloso es la lesi\u00f3n cervical cong\u00e9nita M\u00c1S FRECUENTE en la infancia. Se localiza en la L\u00cdNEA MEDIA, infrahioideo en el 60-70% de los casos. Es caracter\u00edsticamente m\u00f3vil con la degluci\u00f3n y la protrusi\u00f3n lingual. El tratamiento definitivo es la operaci\u00f3n de Sistrunk.","ai":false},{"n":"cm5","q":"Sobre los remanentes branquiales, s\u00f3lo uno de los siguientes enunciados es INCORRECTO:","o":["Las malformaciones derivan en su mayor\u00eda del 2\u00ba arco","La localizaci\u00f3n t\u00edpica es periauricular (1\u00ba arco) o cervical lateral anterior al ECM (2\u00ba arco)","La punci\u00f3n-drenaje es el tratamiento quir\u00fargico definitivo","Las f\u00edstulas y senos branquiales son las formas m\u00e1s frecuentes"],"c":3,"e":"La punci\u00f3n-drenaje NO es el tratamiento quir\u00fargico definitivo de los remanentes branquiales; es solo una medida temporal ante infecci\u00f3n. El tratamiento definitivo es siempre la ex\u00e9resis quir\u00fargica completa del quiste, seno o f\u00edstula en fase fr\u00eda.","ai":false},{"n":"cm6","q":"\u00bfEn qu\u00e9 se diferencian fundamentalmente el onfalocele y la gastrosquisis?","o":["El onfalocele es epig\u00e1strico y la gastrosquisis umbilical","El defecto en la gastrosquisis es de mayor tama\u00f1o que en el onfalocele","En el onfalocele un saco peritoneal recubre el contenido; en la gastrosquisis no existe dicho saco","El onfalocele se asocia frecuentemente a atresia intestinal"],"c":3,"e":"La diferencia fundamental es el saco peritoneal: en el onfalocele las v\u00edsceras est\u00e1n recubiertas por membrana (amnios + peritoneo); en la gastrosquisis est\u00e1n expuestas directamente al l\u00edquido amni\u00f3tico sin ninguna cubierta. La gastrosquisis es paraumbilical derecha; el onfalocele es umbilical.","ai":false},{"n":"cm7","q":"MIR 2022. Ni\u00f1o de 23 meses con rectorragias de repetici\u00f3n y gammagraf\u00eda con pertecnetato-99mTc positiva. \u00bfDiagn\u00f3stico m\u00e1s probable?","o":["Sangrado de origen g\u00e1strico","Divert\u00edculo de Meckel con mucosa g\u00e1strica ect\u00f3pica","Sangrado de origen genitourinario","Gammagraf\u00eda normal"],"c":2,"e":"La gammagraf\u00eda de Meckel (pertecnetato-99mTc) es captado por la mucosa g\u00e1strica ect\u00f3pica presente en el 50% de los divert\u00edculos de Meckel sintom\u00e1ticos. Es la prueba de elecci\u00f3n para el divert\u00edculo de Meckel sangrante: hemorragia digestiva baja indolora en ni\u00f1o menor de 2 a\u00f1os.","ai":false},{"n":"cm8","q":"Se\u00f1ale la respuesta CORRECTA sobre las diferencias entre onfalocele y gastrosquisis:","o":["La localizaci\u00f3n es central en la gastrosquisis y lateral en el onfalocele","En la gastrosquisis las v\u00edsceras est\u00e1n expuestas; en el onfalocele est\u00e1n cubiertas por membrana","Las malformaciones m\u00e1s frecuentemente asociadas son cardiacas en gastrosquisis y digestivas en onfalocele","La mayor mortalidad del onfalocele obliga a tratamiento quir\u00fargico m\u00e1s precoz"],"c":2,"e":"La diferencia estructural clave: onfalocele tiene saco (membrana peritoneal + amnios); gastrosquisis NO tiene saco, las v\u00edsceras est\u00e1n completamente expuestas al l\u00edquido amni\u00f3tico. El onfalocele asocia m\u00e1s anomal\u00edas cromos\u00f3micas y cardiacas.","ai":false},{"n":"cm9","q":"Sobre las malformaciones del uraco y el conducto onfalomesent\u00e9rico, se\u00f1ale la respuesta FALSA:","o":["El uraco deriva del saco vitelino y el divert\u00edculo de Meckel del alantoides","Los tipos m\u00e1s frecuentes de anomal\u00edas uracales son la persistencia y el quiste de uraco","El ombligo h\u00famedo es la presentaci\u00f3n cl\u00ednica m\u00e1s com\u00fan de ambas anomal\u00edas","Ante un ni\u00f1o de 2 a\u00f1os con hemorragia digestiva baja indolora, el divert\u00edculo de Meckel debe considerarse"],"c":1,"e":"Es al REV\u00c9S: el URACO deriva del alantoides (estructura embrionaria que conecta vejiga con el ombligo), y el divert\u00edculo de Meckel es el remanente del conducto onfalomesent\u00e9rico (saco vitelino). Esta confusi\u00f3n de origen embriol\u00f3gico es un cl\u00e1sico de examen.","ai":false},{"n":"cm10","q":"Sobre la hernia inguinal en el paciente pedi\u00e1trico, se\u00f1ale la respuesta FALSA:","o":["Es de tipo indirecta en la mayor\u00eda de los casos","Es m\u00e1s frecuente en varones prematuros","El tratamiento quir\u00fargico se reserva para casos sin resoluci\u00f3n espont\u00e1nea m\u00e1s all\u00e1 de los 2 a\u00f1os","Las complicaciones m\u00e1s frecuentes son la incarceraci\u00f3n y el estrangulamiento"],"c":3,"e":"Las hernias inguinales pedi\u00e1tricas NO resuelven espont\u00e1neamente (a diferencia de las umbilicales) y deben operarse desde el diagn\u00f3stico. No existe ning\u00fan per\u00edodo de espera de 2 a\u00f1os: el riesgo de incarceraci\u00f3n es especialmente alto en lactantes.","ai":false},{"n":"cm11","q":"\u00bfCu\u00e1l de las siguientes afirmaciones sobre onfalocele y gastrosquisis es correcta?","o":["En la gastrosquisis hay un saco peritoneal que recubre las v\u00edsceras","El onfalocele es m\u00e1s frecuente en gestantes j\u00f3venes menores de 20 a\u00f1os","El onfalocele asocia m\u00e1s cromosomopat\u00edas que la gastrosquisis","La gastrosquisis asocia m\u00e1s cromosomopat\u00edas que el onfalocele"],"c":3,"e":"El onfalocele se asocia a cromosomopat\u00edas (Trisom\u00eda 18, 13 y 21) en un 30-50% de los casos, mientras que la gastrosquisis es generalmente espor\u00e1dica y raramente se asocia a anomal\u00edas cromos\u00f3micas. La gastrosquisis es m\u00e1s frecuente en madres j\u00f3venes. En la gastrosquisis NO hay saco.","ai":false},{"n":"cm12","q":"En el tipo m\u00e1s frecuente de atresia de es\u00f3fago (tipo C: f\u00edstula traqueoesof\u00e1gica distal), \u00bfcu\u00e1l es VERDADERA?","o":["La ecograf\u00eda prenatal en el 3er trimestre permite el diagn\u00f3stico en un 60-80% de casos","Se asocia en un 50% de casos a microgastria y defectos del tubo neural","La distancia entre los bolsones atr\u00e9sicos es mayor que en los otros tipos","La presencia de aire en el est\u00f3mago en la Rx de abdomen confirma la existencia de f\u00edstula traqueoesof\u00e1gica distal"],"c":4,"e":"En el tipo C (el m\u00e1s frecuente ~85%), la f\u00edstula traqueoesof\u00e1gica distal permite el paso de aire al est\u00f3mago, por lo que la Rx simple de abdomen mostrar\u00e1 gas en el est\u00f3mago e intestino. La AUSENCIA de gas caracteriza al tipo I (sin f\u00edstula). Las opciones A, B y C son caracter\u00edsticas del tipo I.","ai":false},{"n":"ci1","q":"Neonato de 8 d\u00edas con irritabilidad, distensi\u00f3n abdominal y v\u00f3mitos biliosos de instauraci\u00f3n brusca. \u00bfDiagn\u00f3stico m\u00e1s probable?","o":["Estenosis hipertr\u00f3fica del p\u00edloro con alcalosis metab\u00f3lica","Malrotaci\u00f3n intestinal con v\u00f3lvulo","Enfermedad de Hirschsprung","Atresia yeyunal"],"c":2,"e":"Los v\u00f3mitos BILIOSOS en un neonato son una emergencia quir\u00fargica hasta que se demuestre lo contrario. La malrotaci\u00f3n intestinal con v\u00f3lvulo puede causar necrosis intestinal masiva en horas. Los v\u00f3mitos de la EHP son no biliosos porque la obstrucci\u00f3n es a nivel del p\u00edloro (supraampular).","ai":false},{"n":"ci2","q":"Sobre la obstrucci\u00f3n duodenal en pediatr\u00eda:","o":["Su causa m\u00e1s frecuente es cong\u00e9nita (atresia, malrotaci\u00f3n...)","Se asocia con frecuencia al S\u00edndrome de Down","Presenta t\u00edpicamente la imagen de 'doble burbuja' en Rx abdomen","Todas son correctas"],"c":4,"e":"La obstrucci\u00f3n duodenal pedi\u00e1trica (atresia, p\u00e1ncreas anular, malrotaci\u00f3n, bandas de Ladd) presenta la imagen en 'doble burbuja' (gas en est\u00f3mago + bulbo dilatado sin gas distal), se asocia al S\u00edndrome de Down en ~30% y la causa m\u00e1s frecuente es cong\u00e9nita. Las tres son correctas.","ai":false},{"n":"ci3","q":"Con respecto a la malrotaci\u00f3n intestinal, indique la respuesta FALSA:","o":["El tratamiento quir\u00fargico para su reparaci\u00f3n es la duodeno-duodenostom\u00eda en diamante","La rotaci\u00f3n incompleta es la forma m\u00e1s frecuente","Las malformaciones m\u00e1s frecuentemente asociadas son hernia diafragm\u00e1tica cong\u00e9nita, gastrosquisis, onfalocele y atresia intestinal","Todas las anteriores son falsas"],"c":1,"e":"La duodeno-duodenostom\u00eda en diamante es el tratamiento de la ATRESIA DUODENAL, no de la malrotaci\u00f3n intestinal. El tratamiento de la malrotaci\u00f3n es la Operaci\u00f3n de Ladd: liberaci\u00f3n de las bandas de Ladd, reducci\u00f3n del v\u00f3lvulo, ampliar el mesenterio y apendicectom\u00eda.","ai":false},{"n":"ci4","q":"\u00bfCu\u00e1l de las siguientes patolog\u00edas NO es una causa de obstrucci\u00f3n duodenal en pediatr\u00eda?","o":["Malrotaci\u00f3n intestinal","P\u00e1ncreas anular","Atresia o membrana duodenal","Tap\u00f3n meconial"],"c":4,"e":"El tap\u00f3n meconial causa obstrucci\u00f3n del COLON (colon izquierdo o sigma), no del duodeno. Las causas de obstrucci\u00f3n duodenal son: atresia/membrana duodenal, p\u00e1ncreas anular, malrotaci\u00f3n intestinal y bandas de Ladd.","ai":false},{"n":"ci5","q":"Respecto a la obstrucci\u00f3n intestinal distal en pediatr\u00eda, se\u00f1ala la opci\u00f3n VERDADERA:","o":["El \u00edleo meconial es una forma de debut de la esclerosis tuberosa","En el ano imperforado se realiza un TAC p\u00e9lvico para medir la distancia del recto a la piel","En el enema opaco de Hirschsprung, el signo m\u00e1s espec\u00edfico es la transici\u00f3n de intestino dilatado (agangli\u00f3nico) a otro de calibre normal","Un colon de calibre normal es indicador de una progresi\u00f3n normal del meconio en la vida fetal"],"c":4,"e":"Un colon de calibre normal en el RN indica que el meconio ha transitado adecuadamente in utero, siendo un signo indirecto de normalidad. Opci\u00f3n A falsa: el \u00edleo meconial es debut de la fibrosis qu\u00edstica. En Hirschsprung: el segmento DILATADO es el ganglionado (normal, proximal) y el ESTRECHO es el agangli\u00f3nico (patol\u00f3gico).","ai":false},{"n":"ci6","q":"En la enfermedad de Hirschsprung es FALSO que:","o":["El patr\u00f3n de afectaci\u00f3n es t\u00edpicamente parcheado","En las ni\u00f1as la afectaci\u00f3n suele ser m\u00e1s extensa que en los ni\u00f1os","Existe afectaci\u00f3n del recto en el 100% de los pacientes","El gen m\u00e1s frecuentemente implicado es el proto-oncogen RET"],"c":1,"e":"La afectaci\u00f3n en Hirschsprung es CONTINUA desde el recto hacia proximal, nunca parcheada (a diferencia de la enfermedad de Crohn). Siempre incluye el recto (100%) y se extiende hacia tramos m\u00e1s proximales en longitud variable. El gen RET es el principal gen implicado.","ai":false},{"n":"ci7","q":"\u00bfCu\u00e1l es la malformaci\u00f3n ano-rectal m\u00e1s frecuente en las ni\u00f1as?","o":["F\u00edstula perineal","F\u00edstula vestibular","Cloaca de canal corto","F\u00edstula recto-uretral"],"c":2,"e":"En ni\u00f1as, la malformaci\u00f3n ano-rectal m\u00e1s frecuente es la F\u00cdSTULA VESTIBULAR (el orificio anal termina en el vest\u00edbulo vaginal, anterior al himen). La f\u00edstula perineal ocupa el segundo lugar. La f\u00edstula recto-uretral es exclusiva de los varones.","ai":false},{"n":"ci8","q":"Ni\u00f1a de 13 a\u00f1os intervenida por Hirschsprung a los 3 meses. \u00bfCu\u00e1l de los siguientes tumores es m\u00e1s probable que presente?","o":["Neuroblastoma abdominal","Tumor de Wilms","Nefroma mesobl\u00e1stico","Carcinoma medular de tiroides familiar"],"c":4,"e":"La enfermedad de Hirschsprung se asocia a mutaciones en el gen RET. El mismo gen RET est\u00e1 implicado en el Carcinoma Medular de Tiroides (CMT) hereditario y los s\u00edndromes MEN2A y MEN2B. Esta asociaci\u00f3n gen\u00e9tica entre Hirschsprung y CMT es una pregunta cl\u00e1sica del MIR.","ai":false},{"n":"ci9","q":"En el megacolon agangli\u00f3nico cong\u00e9nito (Hirschsprung) se dan todas las caracter\u00edsticas siguientes EXCEPTO:","o":["En la zona afectada existe concentraci\u00f3n aumentada de acetilcolinesterasa","Est\u00e1 ausente el reflejo inhibitorio recto-anal","Las pruebas diagn\u00f3sticas de referencia son las biopsias rectales por succi\u00f3n","Es frecuente la presencia de encopresis o incontinencia fecal"],"c":4,"e":"La encopresis (incontinencia fecal) NO es caracter\u00edstica de Hirschsprung; al contrario, estos ni\u00f1os tienen ESTRE\u00d1IMIENTO grave desde el nacimiento. La incontinencia fecal es m\u00e1s propia del estre\u00f1imiento funcional cr\u00f3nico. Las otras tres caracter\u00edsticas (AChE aumentada, ausencia del reflejo inhibitorio y biopsias por succi\u00f3n) s\u00ed son correctas.","ai":false},{"n":"ci10","q":"MIR 2002. La Enterocolitis Necrotizante (ECN):","o":["Es la patolog\u00eda gastrointestinal menos grave del RN de bajo peso","Se produce por sobreinfecci\u00f3n intestinal del Streptococcus neumoniae","En estudios experimentales puede ser prevenida por la alimentaci\u00f3n con leche materna","Puede asociarse a trombocitosis en el reci\u00e9n nacido"],"c":3,"e":"La leche materna tiene efecto protector frente a la ECN: contiene IgA secretora, factores de crecimiento epitelial y probi\u00f3ticos. La ECN es la patolog\u00eda gastrointestinal m\u00e1s GRAVE del prematuro (mortalidad 20-30%). Se asocia a TROMBOPENIA (consumo de plaquetas por CID), no trombocitosis.","ai":false},{"n":"ci11","q":"MIR 2013. Ni\u00f1o de 7 meses con llanto brusco, encogimiento de piernas y deposici\u00f3n con sangre. Ecograf\u00eda: imagen en diana. \u00bfDiagn\u00f3stico?","o":["Gastroenteritis aguda","Apendicitis aguda","Invaginaci\u00f3n intestinal","Adenitis mesent\u00e9rica"],"c":3,"e":"La imagen en 'diana' o 'rosquilla' en la ECO es patognom\u00f3nica de invaginaci\u00f3n intestinal: capas del intestino invaginado vistas en corte transversal. La cl\u00ednica cl\u00e1sica del lactante de 6-18 meses: llanto c\u00f3lico intermitente, encogimiento de piernas, palidez y heces en 'jalea de grosella'.","ai":false},{"n":"ci12","q":"En el paciente anterior con invaginaci\u00f3n intestinal, \u00bfcu\u00e1l de las medidas terap\u00e9uticas NO est\u00e1 indicada?","o":["Reducci\u00f3n hidrost\u00e1tica con enema de bario","Reducci\u00f3n hidrost\u00e1tica con insuflaci\u00f3n de aire","Antibioterapia de amplio espectro si hay signos de infecci\u00f3n","Tratamiento conservador con dieta exenta de gluten"],"c":4,"e":"La invaginaci\u00f3n intestinal no tiene ninguna relaci\u00f3n con la intolerancia al gluten (es un distractor del enunciado). El tratamiento es la reducci\u00f3n neum\u00e1tica o hidrost\u00e1tica (de elecci\u00f3n en ausencia de complicaciones) o la cirug\u00eda. La dieta exenta de gluten no tiene ning\u00fan papel en el tratamiento.","ai":false},{"n":"ci13","q":"MIR 2023. Lactante de 14 meses con irritabilidad de 12h, heces sanguinolentas con moco y masa cil\u00edndrica palpable en parte derecha del abdomen. \u00bfDiagn\u00f3stico y prueba?","o":["Apendicitis aguda. Ecograf\u00eda abdominal","Invaginaci\u00f3n intestinal. Ecograf\u00eda abdominal","Apendicitis aguda. TC abdominal","Invaginaci\u00f3n intestinal. TC abdominal"],"c":2,"e":"La cl\u00ednica es cl\u00e1sica de invaginaci\u00f3n intestinal: lactante, dolor c\u00f3lico, heces con sangre y moco, masa abdominal palpable cil\u00edndrica en fosa iliaca derecha. La prueba de elecci\u00f3n es la ECOGRAF\u00cdA (imagen en diana, sensibilidad y especificidad >95%), que tambi\u00e9n gu\u00eda el tratamiento.","ai":false},{"n":"ci14","q":"MIR 2025. Se\u00f1ale la respuesta FALSA respecto a la invaginaci\u00f3n intestinal en pediatr\u00eda:","o":["La mayor\u00eda de los casos en ni\u00f1os se deben a adherencias cong\u00e9nitas","La incidencia estacional alcanza picos en oto\u00f1o e invierno","Se ha apreciado correlaci\u00f3n con infecci\u00f3n respiratoria previa por adenovirus tipo C","Se ha observado un aumento ligero de invaginaci\u00f3n en las 3 semanas posteriores a la vacuna de rotavirus"],"c":1,"e":"La mayor\u00eda de las invaginaciones pedi\u00e1tricas (>90%) son IDIOP\u00c1TICAS, no se deben a adherencias cong\u00e9nitas (\u00e9stas son m\u00e1s caracter\u00edsticas en adultos donde siempre hay que buscar causa org\u00e1nica). Se correlaciona con infecciones v\u00edricas que hipertrofian los ganglios linf\u00e1ticos mesent\u00e9ricos actuando como punto de arrastre.","ai":false},{"n":"ci15","q":"MIR 2011. Ni\u00f1o de 28 d\u00edas con v\u00f3mitos en escopetazo, siempre hambriento, pH 7.49, bicarbonato 30 mEq/L, K 3.1 mEq/L, Cl 94 mEq/L. \u00bfPrueba de elecci\u00f3n para confirmar el diagn\u00f3stico?","o":["Radiograf\u00eda simple de abdomen","pHmetr\u00eda esof\u00e1gica","Ecograf\u00eda abdominal","Determinaci\u00f3n de electrolitos en sudor"],"c":3,"e":"La cl\u00ednica (v\u00f3mitos no biliosos en escopetazo, hambre insaciable, alcalosis metab\u00f3lica hipoclor\u00e9mica e hipopotas\u00e9mica) es caracter\u00edstica de la estenosis hipertr\u00f3fica del p\u00edloro. La prueba de confirmaci\u00f3n de elecci\u00f3n es la ECOGRAF\u00cdA: visualiza el p\u00edloro hipertrofiado (longitud >16mm, grosor muscular >4mm).","ai":false},{"n":"ci16","q":"MIR 2024. Ante la sospecha de estenosis hipertr\u00f3fica del p\u00edloro, \u00bfc\u00f3mo iniciar\u00eda los ex\u00e1menes complementarios?","o":["Tr\u00e1nsito digestivo baritado","pHmetr\u00eda g\u00e1strica","Radiolog\u00eda simple de abdomen","Ecograf\u00eda abdominal"],"c":4,"e":"La ecograf\u00eda abdominal es la prueba diagn\u00f3stica de elecci\u00f3n para la estenosis hipertr\u00f3fica del p\u00edloro (sensibilidad >95%), est\u00e1ndar actual en todas las gu\u00edas pedi\u00e1tricas. El tr\u00e1nsito baritado est\u00e1 completamente obsoleto para este diagn\u00f3stico.","ai":true},{"n":"ci17","q":"MIR 2015. \u00bfCu\u00e1l de los siguientes datos NO es propio de la estenosis hipertr\u00f3fica del p\u00edloro?","o":["Alcalosis metab\u00f3lica hipoclor\u00e9mica","V\u00f3mitos proyectivos de contenido bilioso","Incidencia familiar","Predominio del sexo masculino (4:1)"],"c":2,"e":"Los v\u00f3mitos de la EHP son NO BILIOSOS: la obstrucci\u00f3n es a nivel del p\u00edloro, por encima de donde drena la bilis (papila de Vater). Un v\u00f3mito BILIOSO en un neonato indica obstrucci\u00f3n distal al p\u00edloro y obliga a descartar urgentemente malrotaci\u00f3n/v\u00f3lvulo intestinal.","ai":false},{"n":"ci18","q":"MIR 2018. Lactante de 1 mes con v\u00f3mitos de 24h de evoluci\u00f3n, come con apetito y llora entre tomas. \u00bfQu\u00e9 pruebas son m\u00e1s adecuadas?","o":["Es reflujo gastroesof\u00e1gico fisiol\u00f3gico, basta con posici\u00f3n semiincorporada","Puede ser gastroenteritis, har\u00eda gasometr\u00eda e iones y rehidrataci\u00f3n IV","Probablemente estenosis hipertr\u00f3fica del p\u00edloro, pedir\u00eda ecograf\u00eda","Hay que descartar malformaci\u00f3n cong\u00e9nita con tr\u00e1nsito gastroduodenal"],"c":3,"e":"El cuadro (lactante de 1 mes, v\u00f3mitos no biliosos en escopetazo, hambre persistente entre v\u00f3mitos = 'vomita y pide m\u00e1s') es altamente sugestivo de estenosis hipertr\u00f3fica del p\u00edloro. La prueba de elecci\u00f3n es la ecograf\u00eda. El pico de incidencia es entre las 3-6 semanas, m\u00e1s frecuente en varones primog\u00e9nitos.","ai":false},{"n":"ci19","q":"MIR 2023. Sobre la estenosis hipertr\u00f3fica del p\u00edloro, se\u00f1ale la afirmaci\u00f3n INCORRECTA:","o":["Afecta predominantemente a primog\u00e9nitos varones","Mayor incidencia en hijas de madres tratadas con macr\u00f3lidos durante el embarazo","La alteraci\u00f3n hidroelectrol\u00edtica t\u00edpica es una ACIDOSIS metab\u00f3lica hipoclor\u00e9mica","El tratamiento de elecci\u00f3n es la piloromiotom\u00eda extramucosa de Ramstedt"],"c":3,"e":"La alteraci\u00f3n hidroelectrol\u00edtica de la EHP es una ALCALOSIS metab\u00f3lica hipoclor\u00e9mica e hipopotas\u00e9mica (NO acidosis): la p\u00e9rdida repetida de HCl por los v\u00f3mitos produce alcalosis. El tratamiento definitivo es la piloromiotom\u00eda de Ramstedt, siempre previa correcci\u00f3n del desequilibrio hidroelectrol\u00edtico.","ai":false},{"n":"ct1","q":"El neuroblastoma es el tumor s\u00f3lido extracraneal m\u00e1s com\u00fan en ni\u00f1os. Se\u00f1ale la respuesta FALSA sobre su diagn\u00f3stico:","o":["Debemos sospecharlo ante un s\u00edndrome opsoclono-mioclono-ataxia","Existe casi siempre aumento de metabolitos de catecolaminas en orina","La mayor\u00eda se diagnostica en menores de 6 a\u00f1os","La gammagraf\u00eda con tecnecio es muy espec\u00edfica y est\u00e1 indicada para definir su extensi\u00f3n"],"c":4,"e":"La gammagraf\u00eda espec\u00edfica para el neuroblastoma es la MIBG (Metayodobencilguanidina) con I-123 o I-131, no con tecnecio. La gammagraf\u00eda \u00f3sea con Tc-99m puede detectar met\u00e1stasis \u00f3seas pero no es espec\u00edfica del neuroblastoma. El s\u00edndrome opsoclono-mioclono-ataxia es un s\u00edndrome paraneopl\u00e1sico cl\u00e1sico del neuroblastoma.","ai":false},{"n":"ct2","q":"Mujer de 20 a\u00f1os con tumoraci\u00f3n ov\u00e1rica de 15 cm s\u00f3lido-qu\u00edstica. Histolog\u00eda: dientes, pelos, epitelio intestinal, escamoso (15%), bronquial, y elementos neuroectod\u00e9rmicos y embrionarios. \u00bfDiagn\u00f3stico?","o":["Teratocarcinoma","Teratoma inmaduro","Teratoma qu\u00edstico maduro (dermoide)","Disgerminoma"],"c":2,"e":"El teratoma inmaduro contiene tejidos inmaduros, especialmente elementos NEUROECTOD\u00c9RMICOS inmaduros (la clave diagn\u00f3stica). El grado de inmadurez (I, II, III) determina el pron\u00f3stico. El teratoma maduro solo contiene tejidos diferenciados; el teratocarcinoma combina teratoma con carcinoma embrionario.","ai":false},{"n":"ct3","q":"Mujer de 51 a\u00f1os, dolor en hipogastrio y FID de 20 d\u00edas. TC abdominop\u00e9lvico con contraste. \u00bfDiagn\u00f3stico que sugiere la imagen con contenido heterog\u00e9neo, grasa y calcificaciones?","o":["Absceso p\u00e9lvico secundario a apendicitis","Litiasis ureteral derecha con urinoma","Tumor desmoide mesent\u00e9rico","Teratoma ov\u00e1rico maduro"],"c":4,"e":"El teratoma ov\u00e1rico maduro (quiste dermoide) aparece en el TC como masa qu\u00edstica heterog\u00e9nea con \u00e1reas de densidad grasa negativa en UH y estructuras calcificadas o dentales. Es la masa ov\u00e1rica m\u00e1s frecuente en mujeres j\u00f3venes y en edad reproductiva.","ai":false},{"n":"hdc1","noShuffle":false,"img":null,"q":"En la hernia diafragm\u00e1tica cong\u00e9nita con defecto posterolateral, \u00bfqu\u00e9 alteraci\u00f3n tiene mayor importancia fisiopatol\u00f3gica y cl\u00ednica?","o":["La herniaci\u00f3n del h\u00edgado en el t\u00f3rax","La malrotaci\u00f3n intestinal asociada","El saco herniario peritoneal intrator\u00e1cico","La hipoplasia pulmonar y la hipertensi\u00f3n arterial pulmonar"],"c":4,"e":"La clave fisiopatol\u00f3gica de la HDC es la <b>hipoplasia pulmonar bilateral</b> (predominante en el lado ipsilateral) y la consiguiente <b>hipertensi\u00f3n arterial pulmonar</b>. La compresi\u00f3n cr\u00f3nica del pulm\u00f3n en desarrollo por las v\u00edsceras herniadas impide su madurez alveolar y vascular, causando insuficiencia respiratoria grave e hipertensi\u00f3n pulmonar persistente del reci\u00e9n nacido, que es la principal causa de mortalidad."},{"n":"mir20_p7","noShuffle":false,"img":"img_gamma_renal","q":"MIR 2020 \u00b7 P7. Ni\u00f1o de 9 meses con antecedentes de tres episodios de infecci\u00f3n del tracto urinario (a los 14 d\u00edas de vida, 1 mes y 2 meses) en tratamiento antibi\u00f3tico prof\u00edl\u00e1ctico. Los estudios muestran reflujo v\u00e9sicoureteral bilateral (grado V derecho y II izquierdo) y disminuci\u00f3n del tama\u00f1o del ri\u00f1\u00f3n derecho con leve dilataci\u00f3n pielocalicial (II/V) en la ecograf\u00eda. Con estos datos y la imagen gammagr\u00e1fica renal que se muestra, el diagn\u00f3stico m\u00e1s probable es:","o":["Nefropat\u00eda cicatricial derecha post-pielonefritis","Estenosis de la uni\u00f3n pieloureteral derecha","Pielonefritis aguda derecha","Displasia multqu\u00edstica del ri\u00f1\u00f3n derecho"],"c":1,"e":"La gammagraf\u00eda DMSA muestra <b>funci\u00f3n renal diferencial del 29,1% derecho vs 70,9% izquierdo</b>, con captaci\u00f3n cortical reducida y cicatrices en el ri\u00f1\u00f3n derecho. En el contexto de ITUs de repetici\u00f3n desde el nacimiento y RVU grado V derecho, el patr\u00f3n es cl\u00e1sico de <b>nefropat\u00eda cicatricial post-pielonefritis</b>. La estenosis UPJ dar\u00eda hidronefrosis sin cicatrices. La pielonefritis aguda es captaci\u00f3n reducida sin retenci\u00f3n de cicatriz. La displasia multqu\u00edstica no funciona en absoluto en gammagraf\u00eda."},{"n":"rvu1","noShuffle":false,"img":"img_gamma_rvu","q":"MIR 2020 \u00b7 Ni\u00f1o de 9 meses con tres episodios de ITU (14 d\u00edas, 1 mes y 2 meses) y tratamiento antibi\u00f3tico profil\u00e1ctico. Estudios: reflujo v\u00e9sicoureteral bilateral (grado V derecho y II izquierdo), disminuci\u00f3n del tama\u00f1o del ri\u00f1\u00f3n derecho con leve dilataci\u00f3n pielocalicial (II/V) en ecograf\u00eda. Con estos datos y la imagen gammagr\u00e1fica renal, el diagn\u00f3stico m\u00e1s probable es:","o":["Nefropat\u00eda cicatricial derecha post-pielonefritis","Estenosis de la uni\u00f3n pieloureteral derecha","Pielonefritis aguda derecha","Displasia qu\u00edst\u00edca del ri\u00f1\u00f3n derecho"],"c":1,"e":"La gammagraf\u00eda muestra <b>marcada reducci\u00f3n de la funci\u00f3n renal derecha (29,1%)</b> con patr\u00f3n cicatricial, compatible con <b>nefropat\u00eda por reflujo</b>. Las ITU de repetici\u00f3n con RVU grado V derecho producen pielonefritis recurrentes que generan cicatrices corticales permanentes. La estenosis PIU cursar\u00eda con dilataci\u00f3n pielocalicial severa. La pielonefritis aguda no explica la p\u00e9rdida funcional cr\u00f3nica. La displasia multiqu\u00edst\u00edca tiene patr\u00f3n gammagr\u00e1fico no funcionante total."},{"n":"rvu2","noShuffle":false,"img":null,"q":"MIR 2018 \u00b7 Ni\u00f1a de dos a\u00f1os con reflujo vesicoureteral unilateral grado II (reflujo al ur\u00e9ter, pelvis y c\u00e1lices sin dilataci\u00f3n de la v\u00eda urinaria y morfolog\u00eda papilar normal). \u00bfCu\u00e1l es el tratamiento m\u00e1s adecuado de inicio?","o":["Inyecci\u00f3n endosc\u00f3pica de dextran\u00f3mero en el trayecto ureteral intramural","Reimplantaci\u00f3n ureteral por v\u00eda abierta","Reimplantaci\u00f3n ureteral laparosc\u00f3pica","Tratamiento conservador mediante observaci\u00f3n y profilaxis antibi\u00f3tica/antis\u00e9ptica"],"c":4,"e":"El RVU grado II en ni\u00f1a de 2 a\u00f1os tiene alta tasa de resoluci\u00f3n espont\u00e1nea (>80% en grados I-II). El tratamiento de elecci\u00f3n inicial es siempre <b>conservador: profilaxis antibi\u00f3tica continua + vigilancia</b>. La cirug\u00eda (abierta, laparosc\u00f3pica o endosc\u00f3pica) se reserva para fracaso del tratamiento m\u00e9dico, RVU de alto grado, breakthrough infections o nefropat\u00eda progresiva. El dextran\u00f3mero es una opci\u00f3n minimamente invasiva pero no es el primer paso."}],"nef":[{"n":"nl1","q":"\u00bfCu\u00e1l es la contraindicaci\u00f3n ABSOLUTA para la litotricia extracorp\u00f3rea con ondas de choque (LEOC)?","o":["Embarazo","Coagulopat\u00eda no corregida","Marcapasos card\u00edaco","Aneurisma a\u00f3rtico abdominal"],"c":1,"e":"El EMBARAZO es la \u00daNICA contraindicaci\u00f3n absoluta de la LEOC: las ondas de choque pueden da\u00f1ar al feto de forma impredecible en cualquier trimestre. El resto son contraindicaciones relativas: coagulopat\u00eda (corregible previamente), marcapasos (coordinaci\u00f3n con cardi\u00f3logo) y aneurisma a\u00f3rtico (relativa).","ai":false},{"n":"nl2","q":"\u00bfCu\u00e1l se considera indicaci\u00f3n de litotricia o intervenci\u00f3n quir\u00fargica en la litiasis renal?","o":["C\u00f3licos nefr\u00edticos expulsivos cada 2 a\u00f1os","Obstrucci\u00f3n mantenida con repercusi\u00f3n retr\u00f3grada","Hematuria recidivante sin obstrucci\u00f3n","C\u00e1lculo de \u00e1cido \u00farico sin obstrucci\u00f3n"],"c":2,"e":"La obstrucci\u00f3n mantenida con repercusi\u00f3n retr\u00f3grada (hidronefrosis, deterioro de la funci\u00f3n renal) es una indicaci\u00f3n absoluta de tratamiento activo independientemente del tama\u00f1o del c\u00e1lculo. Los c\u00f3licos ocasionales, la microhematuria sin obstrucci\u00f3n y los c\u00e1lculos de \u00e1cido \u00farico (disolubles con alcalinizaci\u00f3n) no son indicaciones absolutas.","ai":false},{"n":"nl3","q":"Se\u00f1ale la FALSA respecto a los tipos de litiasis urinaria:","o":["La litiasis de \u00e1cido \u00farico se trata con alcalinizaci\u00f3n de la orina","El oxalato c\u00e1lcico es m\u00e1s frecuente en hombres","La litiasis de cistina se fragmenta f\u00e1cilmente con LEOC","La litiasis aparece cuando los factores promotores superan a los inhibidores"],"c":3,"e":"La litiasis de cistina es RESISTENTE a la LEOC (ondas de choque): es uno de los c\u00e1lculos m\u00e1s duros y densos. El tratamiento de elecci\u00f3n es la ureteroscopia o la nefrolitotom\u00eda percut\u00e1nea. El \u00e1cido \u00farico s\u00ed se disuelve con alcalinizaci\u00f3n oral (pH objetivo 6.5-7.0).","ai":false},{"n":"nl4","q":"\u00bfCu\u00e1les son factores de riesgo para la producci\u00f3n de litiasis urinaria?","o":["Aporte elevado de prote\u00ednas animales","Baja ingesta h\u00eddrica","Consumo elevado de hidratos de carbono (aumentan la excreci\u00f3n de calcio y oxalato)","Todas las anteriores son correctas"],"c":4,"e":"Todos son factores de riesgo: las prote\u00ednas animales aumentan calciuria, oxaluria y uricosuria mientras reducen el citrato; la baja ingesta h\u00eddrica aumenta la concentraci\u00f3n de solutos; los hidratos de carbono refinados estimulan la insulina que aumenta la calciuria. El tratamiento preventivo incluye abundante hidrataci\u00f3n y dieta equilibrada.","ai":false},{"n":"nl5","q":"Acerca de la litiasis urinaria, se\u00f1ala la correcta:","o":["Es una enfermedad con incidencia muy baja y poco importante en cuanto a gasto sanitario","Las tasas de recurrencia en un mismo paciente son bajas, alrededor del 2-5%","La probabilidad de expulsi\u00f3n espont\u00e1nea es baja, alrededor del 5%","Ninguna de las anteriores es correcta"],"c":4,"e":"Las tres primeras afirmaciones son falsas: la litiasis es muy prevalente (8-10% de la poblaci\u00f3n occidental), la recurrencia es alta (~50% a 10 a\u00f1os), y los c\u00e1lculos peque\u00f1os (<5mm) tienen alta tasa de expulsi\u00f3n espont\u00e1nea (>80%). Por tanto, 'ninguna de las anteriores es correcta' es la respuesta correcta.","ai":false},{"n":"nl6","q":"Mujer de 42 a\u00f1os con m\u00faltiples ITU de repetici\u00f3n y litiasis coraliforme izquierda de estruvita. \u00bfGermen m\u00e1s probable en el cultivo?","o":["Escherichia coli","Citrobacter freundii","Chlamydia trachomatis","Proteus mirabilis"],"c":4,"e":"La litiasis de estruvita (fosfato am\u00f3nico magn\u00e9sico) se forma en infecciones por g\u00e9rmenes ureasa-positivos que alcalinizan la orina. El Proteus mirabilis produce ureasa en grandes cantidades \u2192 alcalinizaci\u00f3n \u2192 precipitaci\u00f3n de fosfatos \u2192 c\u00e1lculo coraliforme. Es el germen m\u00e1s caracter\u00edstico de la litiasis infecciosa.","ai":false},{"n":"nl7","q":"Hombre de 25 a\u00f1os con litiasis en tercio distal del ur\u00e9ter izquierdo. pH de orina 5.5. \u00bfTratamiento m\u00e1s apropiado?","o":["Benzbromarona v\u00eda oral","Ureteroscopia con extracci\u00f3n del c\u00e1lculo","Nefrolitotom\u00eda endosc\u00f3pica percut\u00e1nea","Alcalinizaci\u00f3n de la orina por v\u00eda oral"],"c":4,"e":"El pH de orina 5.5 (muy \u00e1cido) junto con la localizaci\u00f3n ureteral sugiere litiasis de \u00e1cido \u00farico (radiol\u00facida, no visible en Rx simple). El tratamiento de elecci\u00f3n es la alcalinizaci\u00f3n oral de la orina (citrato pot\u00e1sico o bicarbonato s\u00f3dico, objetivo pH 6.5-7.0), que disuelve el c\u00e1lculo. Solo se recurre a la ureteroscopia si no hay respuesta.","ai":false},{"n":"nl8","q":"Sobre los principios quir\u00fargicos para el tratamiento de las f\u00edstulas urogenitales, se\u00f1ala la respuesta FALSA:","o":["No es conveniente resolver la obstrucci\u00f3n de la v\u00eda urinaria distal si est\u00e1 presente","Debemos tratar y prevenir las infecciones asociadas","Debemos conseguir un estado nutricional adecuado","Previo al tratamiento debemos drenar adecuadamente la v\u00eda urinaria"],"c":1,"e":"Resolver la obstrucci\u00f3n de la v\u00eda urinaria distal S\u00cd es conveniente (de hecho, imprescindible) antes de la cirug\u00eda reparadora. Si existe obstrucci\u00f3n distal, la presi\u00f3n retr\u00f3grada sobre la anastomosis impedir\u00e1 la cicatrizaci\u00f3n correcta de la f\u00edstula reparada.","ai":false},{"n":"nl9","q":"Se\u00f1ala la respuesta INCORRECTA sobre las f\u00edstulas del tracto urinario:","o":["Constituyen una comunicaci\u00f3n extraanat\u00f3mica entre el tracto urinario y otra cavidad corporal","Se clasifican en funci\u00f3n de los \u00f3rganos que comunican","La etiolog\u00eda m\u00e1s frecuente es la cong\u00e9nita","Las respuestas A y B son correctas"],"c":3,"e":"La etiolog\u00eda m\u00e1s frecuente de las f\u00edstulas urogenitales es la ADQUIRIDA: obst\u00e9trica (parto prolongado/obstruido) en pa\u00edses en v\u00edas de desarrollo y quir\u00fargica (histerectom\u00eda, cirug\u00eda colorrectal) en pa\u00edses desarrollados. Las f\u00edstulas cong\u00e9nitas son raras. Las opciones A y B son correctas entre s\u00ed.","ai":false},{"n":"nt1","q":"Respecto a la sustituci\u00f3n vesical ortot\u00f3pica, se\u00f1ale la respuesta FALSA:","o":["Para su realizaci\u00f3n es imprescindible la presencia de uretra y mecanismo esfinteriano competente","Es posible que posteriormente sea necesaria la realizaci\u00f3n de autosondajes","El segmento intestinal preferido es el \u00edleon","Las complicaciones metab\u00f3licas son MENOS frecuentes que en el conducto ileal (Bricker)"],"c":4,"e":"Las neovejigas ortot\u00f3picas tienen MAYOR absorci\u00f3n de solutos que el Bricker porque la orina permanece m\u00e1s tiempo en contacto con la mucosa intestinal (sin flujo continuo). Esto implica mayor riesgo de acidosis hiperclor\u00e9mica, d\u00e9ficit de vitamina B12 y osteomalacia. El Bricker (conducto ileal) tiene MENOS complicaciones metab\u00f3licas.","ai":false},{"n":"nt2","q":"Respecto a las derivaciones urinarias, se\u00f1ale la respuesta FALSA seg\u00fan el solucionario del examen:","o":["El tipo de derivaci\u00f3n preferida en pacientes >80 a\u00f1os es el conducto ileal (Bricker)","La destubulizaci\u00f3n del intestino ha aumentado la capacidad del reservorio al disminuir su presi\u00f3n","En pacientes con FG <50 ml/min deber\u00eda evitarse una derivaci\u00f3n urinaria continente","El segmento intestinal menos estanco y con mayor desequilibrio electrol\u00edtico es el yeyuno"],"c":4,"e":"Seg\u00fan el solucionario del PDF, la opci\u00f3n D (el yeyuno es el segmento con m\u00e1s problemas electrol\u00edticos) es la se\u00f1alada como falsa en el contexto de la pregunta. Cl\u00ednicamente, sin embargo, el yeyuno S\u00cd es el segmento m\u00e1s problem\u00e1tico para derivaciones (s\u00edndrome de derivaci\u00f3n yeyunal: hiponatremia, hipocloremia, hiperpotasemia).","ai":true},{"n":"nt3","q":"Respecto a la nefroureterectom\u00eda como tratamiento del TUTS, se\u00f1ale la respuesta CORRECTA:","o":["La desinserci\u00f3n endosc\u00f3pica del orificio ureteral est\u00e1 indicada en tumores proximales, realizando primero este tiempo y lu
