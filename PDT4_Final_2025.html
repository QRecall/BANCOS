nitaria","emoji":"\ud83c\udfe5","color":"#1d4ed8","colorDim":"#dbeafe","desc":"Medicamentos seguros \u00b7 V\u00edas cl\u00ednicas \u00b7 Salud y sanidad"},"piel":{"label":"Piel","emoji":"\ud83e\udde4","color":"#9d174d","colorDim":"#fdf2f8","desc":"C\u00e9lulas de la piel \u00b7 Sistema inmunol\u00f3gico cut\u00e1neo"}}};
var D=/*__D_JSON__*/{"nucmed":[{"n":"1","noShuffle":false,"img":null,"q":"El Iodo 131 es:","o":["Un radiof\u00e1rmaco empleado para las radiosinoviortesis (RSO) de rodilla","Un radiof\u00e1rmaco empleado en el tratamiento del carcinoma diferenciado tiroideo recurrente o metast\u00e1sico","Un radiof\u00e1rmaco empleado en el tratamiento paliativo del dolor \u00f3seo metast\u00e1sico","El radiof\u00e1rmaco de elecci\u00f3n para el tratamiento de los linfomas no hodgkin"],"c":2,"e":"El <b>Iodo-131</b> es el radiof\u00e1rmaco de elecci\u00f3n para el tratamiento del <b>carcinoma diferenciado tiroideo</b> recurrente o metast\u00e1sico. La RSO de rodilla utiliza Itrio-90 o Renio-186; el dolor \u00f3seo metast\u00e1sico usa Estr\u00f3ncio-89 o Radio-223; los linfomas no-Hodgkin usan Iodo-131 conjugado con anticuerpos (Rituximab marcado), pero no como indicaci\u00f3n principal del I-131 libre."},{"n":"2","noShuffle":false,"img":null,"q":"Se\u00f1ale cu\u00e1l de las siguientes es una indicaci\u00f3n para realizar un PET-TAC con 18F-FDG en una paciente diagnosticada de carcinoma de mama:","o":["Carcinoma in situ de mama","Carcinoma de mama de 1 cm","Carcinoma de mama localmente avanzado con infiltraci\u00f3n ganglionar axilar cl\u00ednica o confirmada histol\u00f3gicamente","Ausencia de elevaci\u00f3n de marcadores tumorales durante el seguimiento, con pruebas de imagen diagn\u00f3sticas convencionales sin hallazgos"],"c":3,"e":"El <b>PET-TAC con 18F-FDG</b> en mama est\u00e1 indicado en <b>estadios localmente avanzados</b> con afectaci\u00f3n ganglionar confirmada, para estadificaci\u00f3n inicial y detecci\u00f3n de enfermedad a distancia. No se indica en carcinoma in situ, tumores peque\u00f1os sin factores de riesgo, ni en seguimiento sin hallazgos cl\u00ednicos ni anal\u00edticos."},{"n":"3","noShuffle":false,"img":null,"q":"La preparaci\u00f3n ideal de un paciente diagnosticado de carcinoma diferenciado tiroideo al que se le va realizar un rastreo diagn\u00f3stico con 131I es la siguiente:","o":["Paciente con la gl\u00e1ndula tiroidea intacta","No se necesita preparaci\u00f3n","Paciente tiroidectomizado que toma por v\u00eda oral hormona tiroidea y dieta rica en iodo","Paciente tiroidectomizado estimulado con TSH recombinante humana (TSHrh) o al que se le ha retirado el tratamiento hormonal sustitutivo tiroideo (L-T4) 4 semanas antes"],"c":4,"e":"Para el rastreo con <b>I-131</b> es imprescindible maximizar la captura tiroidea: el paciente debe estar <b>tiroidectomizado</b> y con <b>TSH elevada</b>, lograda mediante TSHrh exog\u00e9na o retirada de L-T4 4 semanas antes. Adem\u00e1s se requiere dieta baja en iodo (no rica). Tener gl\u00e1ndula intacta o no preparar al paciente reducir\u00eda gravemente la sensibilidad del rastreo."},{"n":"4","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes es causa de un falso positivo en la detecci\u00f3n de tumores mediante la PET-TAC?","o":["Enfermedades granulomatosas cr\u00f3nicas (tuberculosis, sarcoidosis, granulomas necrotizantes...) o procesos inflamatorios e infecciosos","Tumores diferenciados con caracter\u00edsticas similares al tejido del que provienen","Enfermedad milim\u00e9trica o menor al tama\u00f1o de resoluci\u00f3n del equipo PET-TAC","Tumores con baja afinidad por la 18F-FDG"],"c":1,"e":"Los <b>falsos positivos</b> en PET-TAC ocurren cuando procesos no tumorales captan 18F-FDG: <b>inflamaci\u00f3n, infecci\u00f3n y granulomas</b> (TBC, sarcoidosis) son causas cl\u00e1sicas. Los tumores diferenciados de baja captaci\u00f3n y la enfermedad milim\u00e9trica son causa de <b>falsos negativos</b>."},{"n":"5","noShuffle":false,"img":null,"q":"Se\u00f1ale cu\u00e1l de las siguientes NO es una indicaci\u00f3n para realizar un PET-TAC con 18F-FDG en una paciente diagnosticada de carcinoma de mama:","o":["Carcinoma de mama localmente avanzado","Elevaci\u00f3n de marcadores tumorales con pruebas de imagen convencionales sin hallazgos patol\u00f3gicos","Carcinoma in situ de mama","Elevaci\u00f3n de marcadores tumorales y dudas diagn\u00f3sticas en las pruebas de imagen"],"c":3,"e":"El <b>carcinoma in situ</b> (DCIS/LCIS) no es indicaci\u00f3n de PET-TAC porque no tiene potencial metast\u00e1sico establecido y la probabilidad de captaci\u00f3n significativa es m\u00ednima. Las dem\u00e1s opciones (estadio avanzado, elevaci\u00f3n de marcadores, dudas en imagen) s\u00ed son indicaciones reconocidas."},{"n":"7","noShuffle":false,"img":null,"q":"Todas son indicaciones para solicitar una gammagraf\u00eda \u00f3sea excepto:","o":["Enfermedad inflamatoria osteoarticular","Diagn\u00f3stico diferencial entre infecci\u00f3n y aflojamiento de pr\u00f3tesis articular","Detecci\u00f3n precoz de met\u00e1stasis \u00f3seas en paciente con un carcinoma prost\u00e1tico","Detecci\u00f3n de lesiones en el Mieloma M\u00faltiple"],"c":4,"e":"La <b>gammagraf\u00eda \u00f3sea</b> detecta lesiones con actividad osteoblastica aumentada. El <b>mieloma m\u00faltiple</b> produce lesiones <b>osteol\u00edticas puras</b> sin actividad osteoblastica, por lo que la gammagraf\u00eda es habitualmente negativa (\u2018agujeros frios\u2019). Para mieloma se prefiere <b>PET-TAC, RM de cuerpo entero o serie \u00f3sea</b>."}],"loco":[{"n":"6","noShuffle":false,"img":null,"q":"Todas las siguientes opciones son indicaciones del estudio ecogr\u00e1fico en la patolog\u00eda musculoesquel\u00e9tica a excepci\u00f3n de:","o":["Valoraci\u00f3n del edema \u00f3seo en las osteonecrosis","Presencia de derrame articular","Valoraci\u00f3n de lesiones m\u00fasculo-tendinosas","Como gu\u00eda para punci\u00f3n"],"c":1,"e":"La <b>ecograf\u00eda no penetra el hueso</b> y no puede valorar el edema \u00f3seo en osteonecrosis: para ello se utiliza <b>RM</b>. S\u00ed es \u00fatil para derrame articular, lesiones m\u00fasculo-tendinosas y como gu\u00eda de punci\u00f3n por su resoluci\u00f3n en tejidos blandos."},{"n":"8","noShuffle":true,"img":"img_q08","q":"Di siguiendo el v\u00e9rtice de la angulaci\u00f3n de la fractura y tomando la flecha como l\u00ednea media del cuerpo, si es:","o":["Angulaci\u00f3n neutra","Angulaci\u00f3n en valgo","Imposibilidad de medici\u00f3n por ser una fractura con acabalgamiento","Angulaci\u00f3n en varo"],"c":4,"e":"El <b>v\u00e9rtice de la fractura apunta hacia la l\u00ednea media</b> (medial), lo que define una <b>angulaci\u00f3n en varo</b>. En valgo el v\u00e9rtice apuntar\u00eda lateralmente. La descripci\u00f3n de la angulaci\u00f3n se hace por la direcci\u00f3n del v\u00e9rtice del \u00e1ngulo fracturario respecto al eje del cuerpo."},{"n":"9","noShuffle":false,"img":null,"q":"Respecto a las fracturas de estr\u00e9s o por sobrecarga se\u00f1ala la opci\u00f3n correcta:","o":["Son fracturas por fatiga aquellas que se producen sobre un hueso con deficiencia mineral o disminuci\u00f3n de la resistencia el\u00e1stica","Inicialmente solo se produce edema \u00f3seo siendo el TAC la t\u00e9cnica de elecci\u00f3n para su visualizaci\u00f3n","Una de las zonas donde m\u00e1s se producen este tipo de fracturas es en el cuello femoral","Las fracturas por insuficiencia se producen sobre un hueso normal que sufre una actividad repetida (deportistas) sobre todo en zona de carga"],"c":3,"e":"Las fracturas de estr\u00e9s se producen frecuentemente en el <b>cuello femoral</b>, metatarsianos y tibia. Las <b>fracturas por fatiga</b> son sobre hueso normal sometido a actividad repetida (deportistas); las <b>por insuficiencia</b> son sobre hueso patol\u00f3gico. El edema \u00f3seo inicial se detecta mejor con <b>RM</b>, no TAC."},{"n":"10","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l es el signo radiol\u00f3gico m\u00e1s precoz que acontece en la osteomielitis aguda?","o":["Osteoporosis focal","Destrucci\u00f3n focal del hueso cortical","Reacci\u00f3n peri\u00f3stica","Tumefacci\u00f3n de partes blandas"],"c":4,"e":"El signo m\u00e1s precoz de la <b>osteomielitis aguda</b> en Rx es la <b>tumefacci\u00f3n de partes blandas</b> (1\u00aa semana). La osteoporosis focal aparece hacia los 7-10 d\u00edas; la destrucci\u00f3n cortical y la reacci\u00f3n peri\u00f3stica son signos m\u00e1s tard\u00edos (2-3 semanas)."},{"n":"11","noShuffle":false,"img":"img_q11","q":"\u00bfCu\u00e1l es el diagn\u00f3stico m\u00e1s probable de la lesi\u00f3n litica con margen escleroso en la cortical posterolateral distal de la tibia?","o":["Displasia fibrosa","Encondroma","Defecto fibroso cortical o fibroma no osificante","Osteocondroma"],"c":3,"e":"El <b>defecto fibroso cortical / fibroma no osificante</b> es la lesi\u00f3n \u00f3sea benigna m\u00e1s frecuente en ni\u00f1os. Se presenta como lesi\u00f3n l\u00edtica excentralmetaf\u00edsaria con margen escleroso, en la <b>cortical de la tibia distal posterolateral</b>. No requiere biopsia si tiene imagen caracter\u00edstica."},{"n":"12","noShuffle":false,"img":"img_q12","q":"Respecto a la descripci\u00f3n de la siguiente lesi\u00f3n \u00f3sea (tumor de c\u00e9lulas gigantes), se\u00f1ala cu\u00e1l no te parece correcta:","o":["Presenta matriz condral","Lesi\u00f3n osteol\u00edtica sin anillo escleroso","Expansi\u00f3n \u00f3sea y adelgazamiento de cortical","Se localiza en la regi\u00f3n epifisaria"],"c":1,"e":"El <b>tumor de c\u00e9lulas gigantes</b> (TCG) es estromal, sin <b>matriz condral</b> (esa ser\u00eda del condrosarcoma o encondroma). El TCG es osteol\u00edtico, epifisario, expansivo, sin borde escleroso, con adelgazamiento cortical. Afecta t\u00edpicamente la ep\u00edfisis de huesos largos en adultos j\u00f3venes."},{"n":"26","noShuffle":false,"img":"img_q26","q":"Respecto a la lesi\u00f3n \u00f3sea que aparece en la siguiente imagen se\u00f1ala la opci\u00f3n falsa:","o":["Presenta una matriz en \u2018vidrio deslustrado\u2019","Puede romper la cortical y asociar una masa de partes blandas","Puede presentarse de dos formas: monos\u00f3tica y poliost\u00f3tica","Es una lesi\u00f3n central, expansiva e intramedular"],"c":2,"e":"La <b>displasia fibrosa</b> presenta matriz en \u2018vidrio deslustrado\u2019, es central e intramedular, puede ser monos\u00f3tica o poliost\u00f3tica. <b>No rompe la cortical ni asocia masa de partes blandas</b> (eso ser\u00eda propio de tumores malignos como el osteosarcoma). El adelgazamiento cortical s\u00ed es posible."},{"n":"30","noShuffle":false,"img":null,"q":"Una lesi\u00f3n focal en la ep\u00edfisis tibial proximal con patr\u00f3n geogr\u00e1fico de borde escleroso es una lesi\u00f3n con patr\u00f3n de tipo:","o":["Ib y no es necesario hacer m\u00e1s estudios","II y realizar\u00edamos una RM","III y realizar\u00edamos una RM","Ia y la cl\u00ednica del paciente manda"],"c":4,"e":"El <b>patr\u00f3n geogr\u00e1fico con borde escleroso bien definido</b> corresponde al tipo <b>Ia</b> (Lodwick), el de menor agresividad. Indica lesi\u00f3n benigna de crecimiento lento. La actitud depende de la cl\u00ednica del paciente: en lesiones incidentales asintom\u00e1ticas puede no requerir m\u00e1s estudios."},{"n":"76","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l no es una caracter\u00edstica de las espondiloartropat\u00edas?","o":["Marcada desmineralizaci\u00f3n periarticular","Tendencia a la anquilosis \u00f3sea","Rigidez matutina y mejor\u00eda con el ejercicio f\u00edsico","Proliferaci\u00f3n \u00f3sea"],"c":1,"e":"Las <b>espondiloartropat\u00edas</b> (EA, artritis psoris\u00edtica) se caracterizan por <b>proliferaci\u00f3n \u00f3sea</b>, anquilosis, entesitis y rigidez matutina que mejora con el ejercicio. La <b>desmineralizaci\u00f3n periarticular</b> es t\u00edpica de la <b>artritis reumatoide</b>, no de las espondiloartropat\u00edas."}],"rxdig":[{"n":"13","noShuffle":false,"img":null,"q":"Respecto a las indicaciones de la Radiolog\u00eda convencional abdominal se\u00f1ala la opci\u00f3n falsa:","o":["Primera prueba a realizar ante un dolor abdominal difuso","Solo el 10% de las radiograf\u00edas de abdomen alcanzan un diagn\u00f3stico","La mayor\u00eda de los pacientes con patolog\u00eda abdominal van a necesitar una segunda prueba de imagen","Una radiograf\u00eda abdominal normal no excluye patolog\u00eda"],"c":1,"e":"La <b>Rx abdominal</b> no es la primera prueba ante dolor abdominal difuso: actualmente la <b>ecograf\u00eda</b> o el <b>TC</b> tienen mayor rendimiento diagn\u00f3stico. La Rx solo alcanza diagn\u00f3stico en el 10% de casos, la mayor\u00eda precisar\u00e1n pruebas adicionales, y una Rx normal no excluye patolog\u00eda."},{"n":"14","noShuffle":false,"img":null,"q":"Todas las siguientes afirmaciones sobre el esofagograma son ciertas a excepci\u00f3n de:","o":["Es la \u00fanica prueba que me permite estudiar la anatom\u00eda y la funci\u00f3n del es\u00f3fago","Es m\u00e1s r\u00e1pida y menos invasiva que la endoscopia","Me permite valorar complicaciones postoperatorias (fugas anastom\u00f3ticas) tras la ingesta del material baritado","No requiere sedaci\u00f3n"],"c":1,"e":"El <b>esofagograma</b> estudia anatom\u00eda y funci\u00f3n del es\u00f3fago, pero <b>no es la \u00fanica prueba</b>: la <b>manometr\u00eda</b> tambi\u00e9n estudia la funci\u00f3n y la endoscopia la anatom\u00eda. S\u00ed es cierto que es r\u00e1pido, no invasivo, no precisa sedaci\u00f3n y permite valorar complicaciones postquir\u00fargicas."},{"n":"15","noShuffle":false,"img":null,"q":"Todos los siguientes signos ecogr\u00e1ficos favorecen el diagn\u00f3stico de una colecistitis aguda a excepci\u00f3n de:","o":["Murphy ecogr\u00e1fico positivo","Distenci\u00f3n vesicular (>5 cm eje transversal y >10 cm eje longitudinal)","Aerobilia","L\u00edquido pericolecist\u00edtico"],"c":3,"e":"La <b>aerobilia</b> (gas en v\u00eda biliar) no es signo de colecistitis aguda: orienta hacia <b>\u00edleo biliar, f\u00edstula colecistodudoenal o CPRE/cirug\u00eda previa</b>. Los signos ecogr\u00e1ficos de colecistitis son Murphy ecogr\u00e1fico, pared engrosada, l\u00edquido pericolecist\u00edtico y distenci\u00f3n vesicular."},{"n":"16","noShuffle":false,"img":null,"q":"Ante un dolor en hipocondrio derecho realizamos una ecograf\u00eda abdominal, como causas de engrosamiento de la pared vesicular nos encontramos todas las siguientes a excepci\u00f3n de:","o":["Colecistitis aguda","Insuficiencia cardiaca","Hepatitis aguda","Hiperproteinemia"],"c":4,"e":"El engrosamiento de pared vesicular puede ser secundario a: colecistitis aguda, insuficiencia cardiaca (hipertensi\u00f3n venosa), hepatitis aguda, hipoalbuminemia, cirrosis y ascitis. La <b>hiperproteinemia</b> no causa engrosamiento de pared vesicular; s\u00ed lo hace la <b>hipoproteinemia</b> (hipoalbuminemia)."},{"n":"18","noShuffle":false,"img":"img_q18","q":"Paciente con E. de Crohn al que le realizamos una Entero-RM. Todos los signos radiol\u00f3gicos que aparecen en la imagen nos indican E. de Crohn a excepci\u00f3n de uno. Se\u00f1\u00e1lalo:","o":["Hiperemia de la mucosa (realce parietal)","Absceso adyacente al asa","Engrosamiento de la pared intestinal","Separaci\u00f3n de asas"],"c":2,"e":"El <b>absceso adyacente al asa</b> es una <b>complicaci\u00f3n</b> de la enfermedad de Crohn (perforaci\u00f3n contenida), no un signo primario de actividad. Los signos t\u00edpicos activos en Entero-RM son: realce parietal (hiperemia), engrosamiento de pared y separaci\u00f3n de asas por edema del mesenterio."},{"n":"28","noShuffle":false,"img":null,"q":"En relaci\u00f3n con la aproximaci\u00f3n radiol\u00f3gica al abdomen agudo, \u00bfcu\u00e1l de las siguientes afirmaciones es incorrecta?","o":["En una radiograf\u00eda de abdomen en la que se observa una dilataci\u00f3n de asas intestinales (>3 cm), de disposici\u00f3n centroabdominal y con presencia de v\u00e1lvulas conniventes, sospecharemos una obstrucci\u00f3n de intestino delgado","Algunos de los hallazgos ecogr\u00e1ficos que podemos observar en una apendicitis aguda son: ap\u00e9ndice engrosado de di\u00e1metro >7 mm, no compresible con la sonda ecogr\u00e1fica y signo ecogr\u00e1fico de McBurney +","En la radiograf\u00eda de abdomen de un paciente con una obstrucci\u00f3n de intestino grueso, visualizaremos dilataci\u00f3n de las asas de intestino delgado si la v\u00e1lvula ileocecal es competente","La disminuci\u00f3n en el realce parietal de las asas o la neumatosis intestinal son hallazgos de TC que nos deben hacer sospechar que en una obstrucci\u00f3n intestinal existe sufrimiento de las asas intestinales afectas"],"c":3,"e":"Si la <b>v\u00e1lvula ileocecal es competente</b> en una obstrucci\u00f3n de colon, el intestino delgado <b>no se dilata</b> porque la v\u00e1lvula impide el reflujo de contenido. Solo cuando la v\u00e1lvula es <b>incompetente</b> se produce dilataci\u00f3n retrograda del intestino delgado. La opci\u00f3n c invierte el concepto."},{"n":"49","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 signo radiol\u00f3gico es m\u00e1s caracter\u00edstico de sufrimiento de asa en una obstrucci\u00f3n?","o":["Distenci\u00f3n difusa de intestino delgado","Niveles hidroa\u00e9reos m\u00faltiples","Imagen en \u2018grano de caf\u00e9\u2019","Asa fija en radiograf\u00eda seriada"],"c":4,"e":"El <b>asa fija</b> en radiograf\u00edas seriadas indica un asa que no cambia de posici\u00f3n ni morfolog\u00eda, signo de <b>sufrimiento isqu\u00e9mico</b>. La imagen en \u2018grano de caf\u00e9\u2019 es del v\u00f3lvulo de sigma. La distenci\u00f3n y los niveles son signos gen\u00e9ricos de obstrucci\u00f3n, no espec\u00edficos de sufrimiento."},{"n":"60","noShuffle":false,"img":"img_q60","q":"En esta imagen se aprecian calcificaciones en hipocondrio derecho. \u00bfCu\u00e1l ser\u00eda su origen?","o":["Colelitiasis multiple","Litiasis renal","Mioma calcificado","Ves\u00edcula en porcelana"],"c":1,"e":"Las calcificaciones en <b>hipocondrio derecho</b> en proyecci\u00f3n AP con morfolog\u00eda facetada y m\u00faltiples son caracter\u00edsticas de <b>colelitiasis m\u00faltiple</b>. La ves\u00edcula en porcelana muestra calcificaci\u00f3n de toda la pared. La litiasis renal se sit\u00faa m\u00e1s lateralmente. Los miomas se localizan en pelvis menor."},{"n":"64","noShuffle":false,"img":null,"q":"En un paciente con sospecha de obstrucci\u00f3n intestinal en el que en la radiograf\u00eda simple se observa una imagen \u2018en grano de caf\u00e9\u2019. \u00bfCu\u00e1l ser\u00eda el diagn\u00f3stico m\u00e1s probable y la actitud a seguir?","o":["\u00cdleo biliar. Laparotom\u00eda exploradora","Obstrucci\u00f3n por bridas. Laparotom\u00eda urgente","Neoplasia de recto. Laparotom\u00eda urgente","V\u00f3lvulo de sigma. Devolvulaci\u00f3n por t\u00e9cnicas endosc\u00f3picas"],"c":4,"e":"La imagen en <b>\u2018grano de caf\u00e9\u2019</b> en Rx de abdomen es patognom\u00f3nica del <b>v\u00f3lvulo de sigma</b>. El tratamiento inicial de elecci\u00f3n es la <b>devolvulaci\u00f3n endosc\u00f3pica</b> (colonoscopia r\u00edgida o flexible), reservando la cirug\u00eda para fracasos, isquemia o perforaci\u00f3n."},{"n":"84","noShuffle":false,"img":"img_q84","q":"Paciente de 82 a\u00f1os que acude a urgencias por dolor abdominal y ausencia de deposiciones, paciente encamado. Se realiza la siguiente radiograf\u00eda abdominal. Se\u00f1ala la opci\u00f3n verdadera:","o":["No tomamos ninguna actitud terap\u00e9utica, resoluci\u00f3n espont\u00e1nea ya que es un trastorno funcional del colon","La imagen corresponde a una hernia paraduodenal izquierda","Para confirmar el diagn\u00f3stico es necesario realizar una placa en dec\u00fabito lateral","Este tipo de patolog\u00eda es m\u00e1s frecuente que ocurra en el colon sigmoide que en el ciego"],"c":4,"e":"La imagen corresponde a un <b>v\u00f3lvulo</b>. El <b>v\u00f3lvulo de sigma</b> es m\u00e1s frecuente en pa\u00edses occidentales (80-85% de los v\u00f3lvulos de colon) que el de ciego. No es un trastorno funcional: requiere actuaci\u00f3n urgente. La placa en dec\u00fabito no es necesaria para el diagn\u00f3stico de v\u00f3lvulo."}],"hepat":[{"n":"17","noShuffle":false,"img":null,"q":"En paciente inmunodeprimido con dolor en FID y neutropenia debemos descartar una tiflitis. Todas las afirmaciones siguientes son verdaderas a excepci\u00f3n de:","o":["Es necesario que el hemat\u00f3logo contacte con el Servicio de Cirug\u00eda pues el tratamiento es quir\u00farjico","Est\u00e1n implicados varios microorganismos como Candida, CMV y E. Coli","El proceso inflamatorio se puede extender al ciego, colon ascendente, ileon terminal y al ap\u00e9ndice","La grasa adyacente al ciego presentar\u00e1 cambios inflamatorios"],"c":1,"e":"La <b>tiflitis</b> (colitis neutrop\u00e9nica) se trata inicialmente de forma <b>conservadora</b> con antibioter\u00e1pia de amplio espectro, reposo digestivo y soporte nutricional. La cirug\u00eda se reserva para complicaciones (perforaci\u00f3n, hemorragia refractaria). Afirmar que el tratamiento es siempre quir\u00farjico es incorrecto."},{"n":"20","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 secuencias de RM son m\u00e1s sensibles a la sobrecarga f\u00e9rrica en el h\u00edgado?","o":["T1","STIR","Secuencia en fase y fuera de fase","T2 (eco de gradiente)"],"c":4,"e":"Las secuencias <b>T2 con eco de gradiente</b> son las m\u00e1s sensibles para detectar sobrecarga f\u00e9rrica hep\u00e1tica: el hierro genera <b>efecto susc\u00edpto</b> que provoca ca\u00edda de se\u00f1al en T2*. Las secuencias en fase/fuera de fase detectan grasa, no hierro. STIR es para edema y supresi\u00f3n grasa."},{"n":"21","noShuffle":false,"img":null,"q":"Son criterios de irresecabilidad desde el punto de vista de la imagen ante un paciente con un ADC pancre\u00e1tico todos los siguientes a excepci\u00f3n de:","o":["N\u00f3dulos peritoneales","Invasi\u00f3n del Tronco Celiaco >180\u00b0","Presencia de derrame pleural bilateral","Invasi\u00f3n venosa masiva de la vena mesent\u00e9rica o de la porta"],"c":3,"e":"El <b>derrame pleural bilateral</b> aislado no es criterio de irresecabilidad en adenocarcinoma pancre\u00e1tico. Los criterios de irresecabilidad por imagen son: met\u00e1stasis a distancia, n\u00f3dulos peritoneales, invasi\u00f3n arterial >180\u00b0 (tronco cel\u00edaco, AMS) e <b>invasi\u00f3n venosa masiva</b> no reconstruible."},{"n":"27","noShuffle":false,"img":"img_q27","q":"Mujer de 36 a\u00f1os remitida para estudio de lesi\u00f3n focal hep\u00e1tica detectada incidentalmente. No existen antecedentes de enfermedad oncol\u00f3gica. Se adjunta estudio de RM tras la administraci\u00f3n de contraste hepatoespec\u00edfico. Se\u00f1ala la opci\u00f3n verdadera:","o":["Hiperplasia Nodular Focal","Carcinoma Fibrolamelar","Hemangioma","Hepatocarcinoma"],"c":1,"e":"La <b>Hiperplasia Nodular Focal (HNF)</b> en RM con contraste hepatoespec\u00edfico muestra <b>hipercaptaci\u00f3n en fase arterial</b> y retenci\u00f3n del contraste en fase hepatobiliar (isoitnensa o hiperintensa), con cicatriz central caracter\u00edstica. Es la lesi\u00f3n benigna m\u00e1s frecuente en mujeres j\u00f3venes sin antecedentes onc\u00f3l\u00f3gicos."},{"n":"29","noShuffle":false,"img":"img_q29","q":"\u00bfQu\u00e9 lesi\u00f3n focal hep\u00e1tica se visualiza en la imagen adjunta?","o":["Quiste hep\u00e1tico simple","Hiperplasia nodular focal","Hepatocarcinoma","Adenoma hep\u00e1tico"],"c":3,"e":"El <b>hepatocarcinoma (CHC)</b> en TC muestra el patr\u00f3n t\u00edpico de <b>wash-in</b> (hipercaptaci\u00f3n arterial) y <b>wash-out</b> (lavado en fase portal/tard\u00eda), con c\u00e1psula. Es diagn\u00f3stico no invasivo en cirr\u00f3ticos. El quiste es hipodenso sin realce; la HNF tiene cicatriz; el adenoma es heterog\u00e9neo."},{"n":"55","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 hallazgo en imagen es caracter\u00edstico de la hiperplasia nodular focal (HNF) en una mujer joven con masa hep\u00e1tica?","o":["Hipocaptaci\u00f3n en fase arterial y ausencia de cicatriz central","Lesi\u00f3n heterog\u00e9nea con calcificaciones centrales","Imagen qu\u00edtsica con ves\u00edculas hijas","Masa homog\u00e9nea hipervascular con cicatriz central en RM"],"c":4,"e":"La <b>HNF</b> en RM muestra una masa homog\u00e9nea con intensa <b>hipercaptaci\u00f3n arterial</b> y una caracter\u00edstica <b>cicatriz central estellada</b> (hipointensa en T1, hiperintensa en T2) con realce tard\u00edo. Las ves\u00edculas hijas son del quiste hidatid\u00edco; las calcificaciones centrales son inespec\u00edficas."},{"n":"74","noShuffle":false,"img":"img_q74","q":"Mujer de 42 a\u00f1os con adenocarcinoma de recto sigma. Estudio de extensi\u00f3n con TC y posteriormente RM con contraste hepatoespec\u00edfico. La figura a es sin contraste, la b es fase arterial... y la f la m\u00e1s tard\u00eda. Se\u00f1ale la respuesta correcta en relaci\u00f3n con las im\u00e1genes mostradas:","o":["Hiperplasia Nodular Focal","Met\u00e1stasis \u00danica","Adenoma","Hepatocarcinoma fibrolamelar"],"c":1,"e":"Aunque hay antecedente onc\u00f3l\u00f3gico, la RM con contraste hepatoespec\u00edfico permite diferenciar: la <b>HNF</b> retiene el contraste en fase hepatobiliar tard\u00eda (hiperintensa), mientras que las met\u00e1stasis son hipointensas en esa fase. El patr\u00f3n descrito (hipercaptaci\u00f3n arterial + retenci\u00f3n tard\u00eda) es diagn\u00f3stico de <b>HNF</b>."},{"n":"82","noShuffle":false,"img":null,"q":"Dentro de las indicaciones de la RM de cuerpo entero se encuentran todas las siguientes a excepci\u00f3n de:","o":["Diagn\u00f3stico, estadiaje y pron\u00f3stico de mieloma m\u00faltiple (MM)","Diagn\u00f3stico y estudio de extensi\u00f3n de los paragangliomas","Met\u00e1stasis de tumores con avidez por el sistema esquel\u00e9tico","Diagn\u00f3stico, estadificaci\u00f3n y pron\u00f3stico de la leucemia mieloide aguda"],"c":4,"e":"La <b>RM de cuerpo entero</b> est\u00e1 indicada en mieloma m\u00faltiple, paragangliomas, s\u00edndromes de predisposici\u00f3n tumoral y met\u00e1stasis \u00f3seas. La <b>leucemia mieloide aguda</b> se estadifica mediante <b>biopsia de m\u00e9dula \u00f3sea y citometr\u00eda de flujo</b>, no RM de cuerpo entero."},{"n":"83","noShuffle":false,"img":null,"q":"Paciente var\u00f3n de 64 a\u00f1os en seguimiento por cirrosis hep\u00e1tica. Se\u00f1ala la opci\u00f3n incorrecta:","o":["En el seguimiento debemos realizar una ecograf\u00eda hep\u00e1tica y anal\u00edtica (alfa-fetoprote\u00edna) cada 6 meses","Si al realizar una ecograf\u00eda nos encontramos con una lesi\u00f3n focal hep\u00e1tica, la t\u00e9cnica de elecci\u00f3n de 2\u00aa l\u00ednea es el TAC","Es criterio de diagn\u00f3stico de CHC no invasivo en paciente cirr\u00f3tico: marcada captaci\u00f3n en fase arterial y lavado temprano en fase portal","En RM hep\u00e1tica el CHC es m\u00e1s frecuente que se presente como lesi\u00f3n hipointensa en T1 e hiperintensa en T2"],"c":2,"e":"Ante lesi\u00f3n focal hep\u00e1tica en cirr\u00f3tico, la t\u00e9cnica de elecci\u00f3n de 2\u00aa l\u00ednea es la <b>RM con contraste hepatoespec\u00edfico</b> (no el TAC), ya que ofrece mayor especificidad para CHC y mejor caracterizaci\u00f3n de lesiones dudosas. El TAC din\u00e1mico es una alternativa, pero la RM es preferible."}],"diges":[{"n":"19","noShuffle":false,"img":null,"q":"Respecto a la estadificaci\u00f3n del c\u00e1ncer rectal marca la opci\u00f3n verdadera:","o":["Se considera un margen de resecci\u00f3n circunferencial (MRC) positivo cuando la distancia entre la fascia mesorrectal y el margen del tumor m\u00e1s pr\u00f3ximo a ella es menor o igual a 1 mm","Adenopat\u00edas en la cadena il\u00edaca externa se considera un N2","La invasi\u00f3n del peritoneo visceral es un T3d","La RM nos permite diferenciar con seguridad los estadios T1 y T2"],"c":1,"e":"El <b>MRC positivo</b> en c\u00e1ncer rectal se define cuando la distancia entre el tumor y la fascia mesorrectal es <b>\u22641 mm</b>, lo que implica riesgo elevado de recidiva local. Las adenopat\u00edas il\u00edacas externas son M1 (distancia). La invasi\u00f3n del peritoneo es T4a. La RM no distingue fiablemente T1 de T2."},{"n":"31","noShuffle":false,"img":null,"q":"Ante un absceso hep\u00e1tico, \u00bfcu\u00e1l no es indicaci\u00f3n de tratamiento quir\u00farjico?","o":["Posible rotura del absceso a cavidad abdominal","Ante microabscesos hep\u00e1ticos diseminados","Ante foco primario que necesite cirug\u00eda (colecistitis...)","Ante fracaso del intervencionismo y tratamiento m\u00e9dico (Localizaciones posteriores o superiores)"],"c":2,"e":"Los <b>microabscesos hep\u00e1ticos diseminados</b> (por ejemplo en candidiasis hepatoespl\u00e9nica) se tratan con <b>antif\u00fanf\u00edcos sist\u00e9micos</b>, no cirug\u00eda. Las indicaciones quir\u00fargicas son: rotura inminente, foco primario quir\u00farjico, fracaso del drenaje percutaneo o localizaciones no accesibles."},{"n":"32","noShuffle":false,"img":null,"q":"Ante un paciente con ictericia indolora, lesiones de rascado, p\u00e9rdida de peso, heces blancas y orina oscura, con aumento de enzimas de colestasis. \u00bfCu\u00e1l es la actitud correcta?","o":["Ante la sospecha de un colangiocarcinoma solicitar\u00edamos un TAC abdominal y una colangioresonancia, pero nunca solicitar\u00eda una biopsia","Como no tiene cl\u00ednica de proceso obstructivo de la v\u00eda biliar dejar\u00eda pasar el tiempo hasta que vuelva a su coloraci\u00f3n normal","Ante la sospecha de hepatitis lo dejar\u00eda en reposo","Ante la sospecha de un colangiocarcinoma solicitar\u00edamos una Eco y posteriormente TAC abdominal y una colangioresonancia"],"c":4,"e":"El cuadro de <b>ictericia obstructiva indolora</b> con heces acolia y coluria sugiere <b>colangiocarcinoma o carcinoma de cabeza de p\u00e1ncreas</b>. La secuencia diagn\u00f3stica es: <b>ecograf\u00eda abdominal \u2192 TC \u2192 colangiorresonancia</b>. La biopsia s\u00ed puede ser necesaria si hay dudas de resecabilidad."},{"n":"33","noShuffle":false,"img":null,"q":"El procedimiento inicial de elecci\u00f3n para investigar una posible obstrucci\u00f3n de las v\u00edas biliares es:","o":["Ecograf\u00eda hepatobiliar","Colangiopancreatograf\u00eda retr\u00f3grada endosc\u00f3pica (CPRE)","Colangio Resonancia Magn\u00e9tica","Tomograf\u00eda computerizada TC abdominal"],"c":1,"e":"La <b>ecograf\u00eda hepatobiliar</b> es la primera prueba ante sospecha de obstrucci\u00f3n biliar: es r\u00e1pida, disponible, sin radiaci\u00f3n y permite detectar dilataci\u00f3n de la v\u00eda biliar y litiasis. La CPRE es terap\u00e9utica, la colangio-RM es de segunda l\u00ednea, y el TC se usa para estadificaci\u00f3n."},{"n":"43","noShuffle":false,"img":null,"q":"En el dolor abdominal de tipo visceral, \u00bfcu\u00e1l de las siguientes caracter\u00edsticas cl\u00ednicas es m\u00e1s com\u00fan?","o":["Dolor localizado e intenso en hipogastrio","Dolor difuso, periumbilical, dif\u00edcil de localizar","Dolor con irradiaci\u00f3n a espalda y empeora con la tos","Dolor mec\u00e1nico que cede con el reposo"],"c":2,"e":"El <b>dolor visceral</b> se origina en v\u00edsceras huecas o c\u00e1psulas de \u00f3rganos s\u00f3lidos; es <b>difuso, mal localizado, c\u00f3lico o sordo</b>, frecuentemente periumbilical. El dolor parietal (peritonitis) s\u00ed es localizado e intenso. El dolor pancre\u00e1tico irradia a espalda. El mec\u00e1nico cede con reposo."},{"n":"44","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes pruebas funcionales se utiliza espec\u00edficamente para el diagn\u00f3stico de enfermedad por reflujo gastroesof\u00e1gico (ERGE)?","o":["Manometr\u00eda rectal","Estudio de tr\u00e1nsito col\u00f3nico","Ecoendoscopia transrectal","Phmetr\u00eda esof\u00e1gica"],"c":4,"e":"La <b>pHmetr\u00eda esof\u00e1gica de 24 horas</b> es el gold standard para el diagn\u00f3stico de <b>ERGE</b>: mide episodios de reflujo \u00e1cido, correlacion\u00e1ndolos con los s\u00edntomas. La manometr\u00eda y ecoendoscopia rectal son para patologa colorrectal; el tr\u00e1nsito col\u00f3nico estudia el estre\u00f1imiento."},{"n":"45","noShuffle":false,"img":null,"q":"Una paciente gastrectomizada consulta por n\u00e1useas, distensi\u00f3n abdominal y v\u00f3mitos no biliosos. \u00bfQu\u00e9 complicaci\u00f3n posquir\u00farjica debe sospecharse?","o":["Obstrucci\u00f3n por tumor recidivante","F\u00edstula de anastomosis","Infecci\u00f3n intraabdominal","Estenosis de la anastomosis"],"c":4,"e":"La <b>estenosis de la anastomosis</b> tras gastrectom\u00eda se manifiesta con n\u00e1useas, distensi\u00f3n y v\u00f3mitos <b>no biliosos</b> (el contenido no puede pasar). Los v\u00f3mitos biliosos orientar\u00edan a obstrucci\u00f3n del asa aferente. La f\u00edstula y la infecci\u00f3n dar\u00edan fiebre y s\u00edntomas s\u00e9pticos."},{"n":"46","noShuffle":false,"img":null,"q":"Una paciente de 70 a\u00f1os con hernia hiatal es sometida a cirug\u00eda de urgencia por v\u00f3mitos persistentes, distensi\u00f3n y dolor epig\u00e1strico. En la exploraci\u00f3n destaca imposibilidad de sondaje nasog\u00e1strico. \u00bfCu\u00e1l es el diagn\u00f3stico m\u00e1s probable?","o":["Obstrucci\u00f3n pil\u00f3rica","\u00dalcera g\u00e1strica perforada","V\u00f3lvulo g\u00e1strico agudo","Hemorragia digestiva alta"],"c":3,"e":"La <b>imposibilidad de sondaje nasog\u00e1strico</b> en paciente con hernia hiatal y cl\u00ednica obstructiva alta es la clave del <b>v\u00f3lvulo g\u00e1strico agudo</b> (t\u00edpico de la hernia paraesof\u00e1gica). Es la tr\u00edada de Borchardt: v\u00f3mitos infructuosos, distensi\u00f3n epig\u00e1strica e imposibilidad de pasar la SNG."},{"n":"47","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l es el mecanismo principal de eliminaci\u00f3n bacteriana en el peritoneo durante una peritonitis localizada?","o":["Fagocitosis por eosin\u00f3filos","Absorci\u00f3n translinf\u00e1tica subdiafragm\u00e1tica","Producci\u00f3n de citocinas proinflamatorias","Activaci\u00f3n del complemento en el omento"],"c":2,"e":"En la peritonitis localizada, el principal mecanismo de eliminaci\u00f3n bacteriana es la <b>absorci\u00f3n translinf\u00e1tica subdiafragm\u00e1tica</b>: los linfatices del diafragma drenan el contenido peritoneal hacia la circulaci\u00f3n. Los macrof\u00e1gos y el omento contribuyen al aislamiento, pero la v\u00eda linf\u00e1tica es la principal de aclaramiento."},{"n":"48","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes hallazgos cl\u00ednicos es m\u00e1s sugestivo de \u00edleo paral\u00edtico y no de obstrucci\u00f3n mec\u00e1nica?","o":["N\u00e1useas con ruidos hidroa\u00e9reos met\u00e1licos","Dolor abdominal de tipo c\u00f3lico","Emisi\u00f3n de gases sin deposiciones","Distensi\u00f3n abdominal sin ruidos intestinales"],"c":4,"e":"El <b>\u00edleo paral\u00edtico</b> se caracteriza por <b>distensi\u00f3n abdominal con silencio abdominal</b> (ausencia de ruidos). En la obstrucci\u00f3n mec\u00e1nica hay ruidos met\u00e1licos aumentados y dolor c\u00f3lico. La emisi\u00f3n de gases puede ocurrir en ambas; los ruidos met\u00e1licos son exclusivos de la obstrucci\u00f3n mec\u00e1nica."},{"n":"50","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes afirmaciones es correcta respecto a la estricturoplastia en enfermedad de Crohn?","o":["Contraindicada en enfermedad yeyunal","Elevada tasa de recurrencia en el mismo sitio","Indicaci\u00f3n exclusiva en enfermedad del colon","\u00datil para evitar resecciones intestinales amplias"],"c":4,"e":"La <b>estricturoplastia</b> en Crohn permite resolver estenosis fibr\u00f3ticas <b>conservando intestino</b>, evitando resecciones amplias que comprometan la funci\u00f3n absortiva. Es especialmente \u00fatil en enfermedad duodeno-yeyunal o en pacientes con s\u00edndrome de intestino corto previo. La tasa de recurrencia local es baja."},{"n":"51","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l es la localizaci\u00f3n m\u00e1s frecuente del v\u00f3lvulo de colon en pa\u00edses occidentales?","o":["Sigma","Ciego","Colon transverso","\u00c1ngulo espl\u00e9nico"],"c":1,"e":"El <b>v\u00f3lvulo de sigma</b> representa el 75-85% de los v\u00f3lvulos de colon en pa\u00edses occidentales, favorecido por el sigma largo y redundante. El v\u00f3lvulo de ciego es m\u00e1s frecuente en pa\u00edses en v\u00edas de desarrollo. El tratamiento inicial es la devolvulaci\u00f3n endosc\u00f3pica."},{"n":"52","noShuffle":false,"img":null,"q":"Un paciente con diverticulitis aguda y absceso de 5 cm sin mejor\u00eda cl\u00ednica tras antibioter\u00e1pia intravenosa. \u00bfCu\u00e1l es el siguiente paso m\u00e1s adecuado?","o":["Cirug\u00eda de Hartmann urgente","Observaci\u00f3n y control evolutivo","Colonoscopia urgente","Drenaje percutaneo guiado m\u00e1s antibi\u00f3ticos"],"c":4,"e":"En diverticulitis con absceso >3 cm sin respuesta a antibi\u00f3ticos, el siguiente paso es el <b>drenaje percutaneo ecoguiado o por TC</b> m\u00e1s antibi\u00f3ticos. La cirug\u00eda de Hartmann se reserva para peritonitis difusa, perforaci\u00f3n libre o fracaso del drenaje. La colonoscopia est\u00e1 contraindicada en fase aguda."},{"n":"53","noShuffle":false,"img":null,"q":"Un hombre de 64 a\u00f1os consulta por astenia progresiva y heces oscuras. La anal\u00edtica revela anemia ferrop\u00e9nica. \u00bfQu\u00e9 prueba diagn\u00f3stica debe realizarse inicialmente?","o":["Enema opaco","RM p\u00e9lvica","PET-CT","Colonoscopia completa con biopsia"],"c":4,"e":"Ante <b>anemia ferrop\u00e9nica</b> y heces oscuras en var\u00f3n >50 a\u00f1os, la prueba inicial es la <b>colonoscopia completa</b>, que permite visualizar directamente toda la mucosa y biopsiar lesiones sospechosas. El c\u00e1ncer colorrectal es la causa m\u00e1s importante a descartar. El enema opaco y el PET son de segunda l\u00ednea."},{"n":"54","noShuffle":false,"img":null,"q":"Una mujer con antecedentes de p\u00f3lipos adenomatosos m\u00faltiples tiene mutaci\u00f3n en el gen APC. \u00bfCu\u00e1l es el riesgo de desarrollar c\u00e1ncer colorrectal si no se interviene quir\u00farjicamente?","o":["<30%","Casi 100% antes de los 40 a\u00f1os","50%","Similar al riesgo poblacional"],"c":2,"e":"La <b>poliposis adenomatosa familiar (PAF)</b> por mutaci\u00f3n en <b>APC</b> tiene un riesgo de c\u00e1ncer colorrectal pr\u00e1cticamente del <b>100%</b> antes de los 40 a\u00f1os si no se trata. Por ello, la colectom\u00eda profilaxis es obligatoria en la segunda-tercera d\u00e9cada de vida, tras el diagn\u00f3stico gen\u00e9tico."},{"n":"57","noShuffle":false,"img":null,"q":"En pacientes con ictericia obstructiva por c\u00e1ncer de p\u00e1ncreas potencialmente resecable, \u00bfcu\u00e1ndo est\u00e1 indicado el drenaje biliar preoperatorio?","o":["En todos los pacientes con bilirrubina >3 mg/dL","Siempre antes de cirug\u00eda","Solo si hay contraindicaci\u00f3n anest\u00e9sica","Si hay colangitis, deterioro hep\u00e1tico o retraso quir\u00farjico >2 semanas"],"c":4,"e":"El drenaje biliar preoperatorio <b>no est\u00e1 indicado de forma rutinaria</b> en c\u00e1ncer pancre\u00e1tico resecable: aumenta las complicaciones infecciosas. Se indica solo ante <b>colangitis, disfunci\u00f3n hep\u00e1tica grave o retraso >2 semanas</b> hasta la cirug\u00eda. La cirug\u00eda directa sin drenaje previo tiene mejores resultados."},{"n":"65","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l es el criterio principal de irresecabilidad en el colangiocarcinoma perihiliar?","o":["Ictericia persistente","Afectaci\u00f3n ganglionar regional","Afectaci\u00f3n bilateral de radicales secundarios biliares con compromiso portal contralateral","Met\u00e1stasis ganglionares paraa\u00f3rticas"],"c":3,"e":"El criterio principal de <b>irresecabilidad</b> en el colangiocarcinoma perihiliar es la <b>afectaci\u00f3n bilateral de radicales biliares secundarios con compromiso portal contralateral</b>, que impide una reseci\u00f3n con m\u00e1rgenes libres y deja insuficiente remanente hep\u00e1tico. Las met\u00e1stasis paraaorticas y la ictericia aislada no son criterios absolutos."},{"n":"66","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes hallazgos cl\u00ednicos es m\u00e1s caracter\u00edstico del v\u00f3lvulo de sigma?","o":["Diarrea con sangre","Ruidos hidroa\u00e9reos aumentados y dolor epig\u00e1strico","Hipertermia y hepatoesplenomegalia","Distensi\u00f3n abdominal, timpanismo y ampolla rectal vac\u00eda"],"c":4,"e":"El <b>v\u00f3lvulo de sigma</b> se presenta con <b>distensi\u00f3n abdominal intensa, timpanismo</b> y <b>ampolla rectal vac\u00eda</b> al tacto rectal (el contenido no puede pasar). La triada cl\u00e1sica incluye dolor, distensi\u00f3n y estre\u00f1imiento absoluto. No suele haber diarrea sangrante ni hepatoesplenomegalia."},{"n":"67","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l es el tratamiento inicial m\u00e1s adecuado para una peritonitis secundaria diseminada con signos de sepsis?","o":["Analg\u00e9sicos y reposo digestivo","Antibioter\u00e1pia de amplio espectro y cirug\u00eda urgente","Drenaje ecoguiado y observaci\u00f3n","Corticoides y laparostom\u00eda"],"c":2,"e":"La <b>peritonitis secundaria diseminada</b> con sepsis requiere <b>antibioter\u00e1pia de amplio espectro + cirug\u00eda urgente</b> para controlar el foco. El drenaje ecoguiado es para peritonitis localizada. Los corticoides est\u00e1n contraindicados. El reposo solo es v\u00e1lido en peritonitis prim\u00e1rias leves."},{"n":"68","noShuffle":false,"img":null,"q":"Un paciente con diagn\u00f3stico reciente de adenocarcinoma esof\u00e1gico en el tercio inferior sin met\u00e1stasis. \u00bfQu\u00e9 t\u00e9cnica quir\u00farjica est\u00e1 indicada como primera opci\u00f3n?","o":["Esofaguectom\u00eda transhiatal","Esofaguectom\u00eda con t\u00e9cnica de McKeown","Esofaguectom\u00eda total con coloplastia","Esofaguectom\u00eda con t\u00e9cnica de Ivor-Lewis"],"c":4,"e":"Para el adenocarcinoma del <b>tercio inferior</b> del es\u00f3fago, la t\u00e9cnica de elecci\u00f3n es <b>Ivor-Lewis</b> (toracotom\u00eda derecha + laparotom\u00eda), que permite una adecuada linfadenectom\u00eda y anastomosis intratoracica. McKeown es para tercios medio y proximal. La transhiatal se usa cuando no se puede realizar toracotom\u00eda."},{"n":"71","noShuffle":false,"img":null,"q":"El signo del psoas:","o":["Es la descompresi\u00f3n de la fosa il\u00edaca derecha","Dolor al toser","Dolor p\u00e9lvico a la rotaci\u00f3n interna del muslo derecho flexionado","Es dolor a la extensi\u00f3n del muslo derecho positivo. Orienta hacia apendicitis retrocecal"],"c":4,"e":"El <b>signo del psoas</b> es el dolor provocado por la <b>extensi\u00f3n del muslo derecho</b> con el paciente en dec\u00fabito lateral izquierdo, por irritaci\u00f3n del m\u00fasculo psoas-il\u00edaco. Es positivo en <b>apendicitis retrocecal</b>. El signo del obturador (rotaci\u00f3n interna) orienta a apendicitis p\u00e9lvica. Blumberg es la descompresi\u00f3n."},{"n":"75","noShuffle":false,"img":null,"q":"Son signos radiol\u00f3gicos de enfermedad establecida en el estudio baritado (tr\u00e1nsito gastrointestinal completo) en un paciente con E. de Crohn todos los siguientes a excepci\u00f3n de:","o":["F\u00edstulas","\u00dalceras aftoides","Estenosis","Separaci\u00f3n de asas"],"c":2,"e":"Las <b>\u00falceras aftoides</b> son el signo m\u00e1s <b>precoz</b> de la enfermedad de Crohn en el estudio baritado, no de enfermedad establecida. Los signos de enfermedad establecida son: estenosis (\u2018signo de la cuerda\u2019), f\u00edstulas y separaci\u00f3n de asas por engrosamiento mesenterico y edema."},{"n":"79","noShuffle":false,"img":null,"q":"Un var\u00f3n de 25 a\u00f1os acude con dolor abdominal que se inici\u00f3 en epigastrio y migr\u00f3 a fosa il\u00edaca derecha. Presenta n\u00e1useas, fiebre de 38,2 \u00b0C y Blumberg positivo. \u00bfCu\u00e1l es el diagn\u00f3stico m\u00e1s probable?","o":["Apendicitis aguda","Colecistitis aguda","Gastroenteritis viral","Diverticulitis"],"c":1,"e":"La triada de <b>dolor que migra de epigastrio a FID + fiebre + Blumberg positivo</b> es la presentaci\u00f3n cl\u00e1sica de la <b>apendicitis aguda</b>. La colecistitis afecta al hipocondrio derecho. La gastroenteritis no da Blumberg. La diverticulitis es m\u00e1s frecuente en sigma y en mayores."},{"n":"81","noShuffle":false,"img":null,"q":"La tr\u00edada de Charcot:","o":["Se define con dolor, ictericia y prurito","Se define como ictericia fiebre y prurito","Se define como ictericia, prurito y leucocitosis","Se define como dolor, ictericia y fiebre"],"c":4,"e":"La <b>tr\u00edada de Charcot</b> (colangitis aguda) se define como: <b>dolor en hipocondrio derecho + ictericia + fiebre</b>. La p\u00e9ntada de Reynolds a\u00f1ade hipotensi\u00f3n y alteraci\u00f3n del nivel de conciencia. El prurito es un s\u00edntoma de colestasis cr\u00f3nica, no parte de la tr\u00edada de Charcot."},{"n":"85","noShuffle":false,"img":null,"q":"Un paciente con adenocarcinoma de p\u00e1ncreas en estadio irresecable desarrolla obstrucci\u00f3n duodenal. La v\u00eda endosc\u00f3pica ha fallado. \u00bfQu\u00e9 intervenci\u00f3n quir\u00farjica paliativa est\u00e1 indicada?","o":["Pancreatectom\u00eda subtotal","Colocaci\u00f3n de pr\u00f3tesis biliar","Esofagogastrostom\u00eda","Gastroenteroanastomosis quir\u00farjica"],"c":4,"e":"Ante obstrucci\u00f3n duodenal por ADC pancre\u00e1tico irresecable con fracaso endosc\u00f3pico, la paliaci\u00f3n quir\u00farjica es la <b>gastroenteroanastomosis</b> (bypass g\u00e1strico): conecta el est\u00f3mago al yeyuno proximal, saltando la obstrucci\u00f3n. La pancreatectom\u00eda est\u00e1 contraindicada en estadio irresecable. La pr\u00f3tesis biliar trata la ictericia, no la obstrucci\u00f3n duodenal."}],"mama":[{"n":"22","noShuffle":false,"img":"img_q22","q":"Se\u00f1ale la afirmaci\u00f3n correcta relacionada con la lesi\u00f3n que se muestra en esta mamograf\u00eda:","o":["Es una lesi\u00f3n qu\u00edtsica","Requiere un control precoz en aproximadamente 3 meses","Es prioritario realizar una biopsia por estereotaxia de forma preferente","Lesi\u00f3n nodular bien circunscrita"],"c":4,"e":"La imagen muestra una <b>lesi\u00f3n nodular bien circunscrita</b> con bordes definidos, caracter\u00edstica de lesi\u00f3n benigna (fibroadenoma o quiste). Para confirmar si es qu\u00edtsica o s\u00f3lida se necesita ecograf\u00eda. No requiere biopsia inmediata si es BIRADS 3 (seguimiento). Solo afirmaci\u00f3n correcta: <b>lesi\u00f3n nodular bien circunscrita</b>."},{"n":"23","noShuffle":false,"img":null,"q":"Paciente de 66 a\u00f1os asintom\u00e1tica. En mamograf\u00eda se visualizan microcalcificaciones. \u00bfCu\u00e1les son m\u00e1s sospechosas de malignidad?","o":["Groseras o \u2018palomitas de ma\u00edz\u2019","Calcificaciones en \u2018lechada de cal\u2019","Pleom\u00f3rficas finas","Distr\u00f3ficas"],"c":3,"e":"Las microcalcificaciones <b>pleom\u00f3rficas finas</b> (heterog\u00e9neas en forma y tama\u00f1o, <0,5 mm) son altamente sospechosas de malignidad (BIRADS 4-5) y requieren biopsia. Las \u2018palomitas\u2019 y distr\u00f3ficas son benignas. Las \u2018lechada de cal\u2019 son dependen de la proyecci\u00f3n y tambi\u00e9n benignas."},{"n":"24","noShuffle":false,"img":"img_q24","q":"\u00bfCu\u00e1l es la localizaci\u00f3n exacta de la lesi\u00f3n que visualizamos se\u00f1alada con una estrella?","o":["Cuadrante superointerno de la mama derecha","L\u00ednea intercuadr\u00e1ntica inferior de la mama derecha","Cuadrante inferoexterno de la mama derecha","Cuadrante superoexterno de la mama derecha"],"c":3,"e":"En la proyecci\u00f3n oblicua (OBL/MLO) de la mama derecha, la estrella se sit\u00faa en la parte <b>inferior y externa</b>. Combinando proyecci\u00f3n CC (cr\u00e1neocaudal) y OBL, la lesi\u00f3n queda en el <b>cuadrante inferoexterno de la mama derecha</b>. La correcci\u00f3n es esencial para guiar la biopsia o cirug\u00eda."},{"n":"37","noShuffle":false,"img":null,"q":"Respecto a la embriolog\u00eda de la gl\u00e1ndula mamaria, se\u00f1ale la opci\u00f3n correcta:","o":["La cresta mamaria se desarrolla exclusivamente en la regi\u00f3n tor\u00e1cica del embri\u00f3n","La mama adulta deriva del segundo campo glandular de las crestas mamarias","Los primordios secundarios de la gl\u00e1ndula mamaria aparecen en la 5\u00aa semana y permanecen activos hasta la gestaci\u00f3n tard\u00eda","La canalizaci\u00f3n de los primordios secundarios para formar los conductos galact\u00f3foros ocurre hacia el final de la gestaci\u00f3n"],"c":4,"e":"La <b>canalizaci\u00f3n de los primordios secundarios</b> que origina los conductos galact\u00f3foros ocurre en el <b>tercer trimestre de la gestaci\u00f3n</b>, bajo influencia hormonal materna. La cresta mamaria (semana 4-6) se extiende de axila a ingle en todo el embri\u00f3n, no solo en el t\u00f3rax."},{"n":"40","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes afirmaciones sobre la vascularizaci\u00f3n de la mama es FALSA?","o":["La arteria mamaria interna es la principal responsable del aporte arterial al polo superointerno de la mama","La arteria mamaria externa, rama de la arteria axilar, aporta sangre a trav\u00e9s de la arteria mamaria lateral","El ped\u00edculo posterior, proveniente de las arterias intercostales, contribuye directamente a la irrigaci\u00f3n del tejido glandular","La vascularizaci\u00f3n cut\u00e1nea periareolar est\u00e1 asegurada por un c\u00edrculo arterial formado por ramas terminales de los ped\u00edculos anteriores"],"c":2,"e":"La <b>arteria mamaria lateral</b> (o tor\u00e1cica lateral) es rama directa de la <b>arteria axilar</b>, no de la \u2018arteria mamaria externa\u2019. La mamaria interna aporta al polo interno, las intercostales al polo posterior, y la tor\u00e1cica lateral al polo externo. La terminolog\u00eda de la opci\u00f3n b es incorrecta."},{"n":"58","noShuffle":false,"img":null,"q":"En el embarazo y lactancia la prueba de imagen mamaria de elecci\u00f3n es:","o":["Ecograf\u00eda mama","RM mama","Mamograf\u00eda con contraste","Mamograf\u00eda"],"c":1,"e":"La <b>ecograf\u00eda mamaria</b> es la prueba de elecci\u00f3n en el embarazo y lactancia porque no usa radiaci\u00f3n ionizante y permite caracterizar masas en tejido glandular denso. La mamograf\u00eda se evita por la radiaci\u00f3n; la RM con gadolinio est\u00e1 contraindicada en el embarazo; la mamograf\u00eda con contraste no est\u00e1 indicada."},{"n":"59","noShuffle":false,"img":null,"q":"Ante una lesi\u00f3n BIRADS 5. \u00bfCu\u00e1l es la actitud m\u00e1s adecuada?","o":["Realizar una biopsia","Realizar TC tor\u00e1cico con contraste","Seguimiento radiol\u00f3gico","No hay que hacer nada. Una lesi\u00f3n con esta categor\u00eda se considera benigna"],"c":1,"e":"Una lesi\u00f3n <b>BIRADS 5</b> tiene una probabilidad de malignidad >95%. La actitud es realizar <b>biopsia</b> antes de la cirug\u00eda para confirmaci\u00f3n histol\u00f3gica y planificar el tratamiento. El seguimiento se reserva para BIRADS 3; el BIRADS 4 tambi\u00e9n requiere biopsia. BIRADS 1-2 son lesiones benignas sin acci\u00f3n."},{"n":"69","noShuffle":false,"img":null,"q":"Respecto a la mastitis de la lactancia, se\u00f1ale la afirmaci\u00f3n INCORRECTA:","o":["La supresi\u00f3n inmediata y definitiva de la lactancia es una indicaci\u00f3n terap\u00e9utica obligada en todos los casos de mastitis con absceso","La v\u00eda principal de entrada de los g\u00e9rmenes es la intraductal, a trav\u00e9s de los conductos galact\u00f3foros","La ecograf\u00eda mamaria tiene como objetivo principal confirmar la sospecha cl\u00ednica y establecer la necesidad de drenaje si existe colecci\u00f3n","Staphylococcus aureus es el germen aislado con mayor frecuencia en los cultivos"],"c":1,"e":"En mastitis con absceso <b>no es obligatoria la supresi\u00f3n definitiva de la lactancia</b>: puede continuarse la lactancia en la mama contralateral y, en algunos casos, incluso en la mama afecta tras drenaje. La supresi\u00f3n definitiva solo se indica en casos seleccionados. La lactancia no empeora el pron\u00f3stico."},{"n":"72","noShuffle":false,"img":null,"q":"Paciente mujer de 48 a\u00f1os con m\u00faltiples met\u00e1stasis de primario desconocido. Se realiza RM multiparamtrica de mama. \u00bfQu\u00e9 patr\u00f3n de curva cin\u00e9tica favorece el diagn\u00f3stico de benignidad?","o":["Patr\u00f3n de realce progresivo o persistente","Patr\u00f3n de captaci\u00f3n inicial en meseta seguida de la fase de meseta prolongada","Captaci\u00f3n r\u00e1pida con reducci\u00f3n del realce hacia la \u00faltima parte del estudio","El realce r\u00e1pido y lavado tard\u00edo"],"c":1,"e":"El <b>patr\u00f3n de realce progresivo o persistente</b> (tipo I) en curva cin\u00e9tica de RM mamaria es caracter\u00edstico de lesiones <b>benignas</b>. El patr\u00f3n en meseta (tipo II) es indeterminado. El lavado (tipo III: captaci\u00f3n r\u00e1pida y ca\u00edda posterior) es el m\u00e1s sospechoso de malignidad."},{"n":"77","noShuffle":false,"img":null,"q":"Respecto a las lesiones epiteliales benignas de la mama, se\u00f1ale la opci\u00f3n correcta:","o":["Las lesiones no proliferativas, como los quistes simples y los galactoceles, incrementan de forma significativa el riesgo de desarrollar c\u00e1ncer de mama","Las lesiones proliferativas sin atipia, como la hiperplasia ductal usual y la adenosis esclerosante, no modifican el riesgo de c\u00e1ncer de mama","La distinci\u00f3n entre lesiones proliferativas sin atipia y lesiones no proliferativas se basa en la presencia de atipia citol\u00f3gica evidente","Las lesiones proliferativas sin atipia se caracterizan por una mayor proliferaci\u00f3n celular ducto-lobulillar sin alteraci\u00f3n citol\u00f3gica, y confieren un riesgo relativo de c\u00e1ncer de mama de 1,5 a 2 veces superior al de la poblaci\u00f3n general"],"c":4,"e":"Las <b>lesiones proliferativas sin atipia</b> (hiperplasia ductal usual, adenosis esclerosante) tienen un <b>riesgo relativo de 1,5-2 veces</b> el poblacional. Las no proliferativas (quistes simples, galactoceles) no aumentan el riesgo. La atipia citol\u00f3gica distingue las lesiones proliferativas con atipia (RR 4-5x) de las sin atipia."},{"n":"80","noShuffle":false,"img":null,"q":"En relaci\u00f3n con el \u00edndice de proliferaci\u00f3n celular Ki-67 en el c\u00e1ncer de mama, indique la afirmaci\u00f3n correcta:","o":["Un valor elevado de Ki-67 se asocia con un bajo riesgo de met\u00e1stasis y mejor pron\u00f3stico","El \u00edndice Ki-67 carece de utilidad en la toma de decisiones terap\u00e9uticas en pacientes con c\u00e1ncer de mama","La determinaci\u00f3n del \u00edndice Ki-67 solo tiene inter\u00e9s en tumores de tipo HER2 enriquecido, sin utilidad en otros subtipos moleculares","Un valor elevado de Ki-67 refleja una mayor actividad proliferativa tumoral y se asocia con tumores de mayor grado histol\u00f3gico y peor pron\u00f3stico"],"c":4,"e":"El <b>Ki-67 elevado</b> indica alta actividad proliferativa, asociado a tumores de <b>mayor grado histol\u00f3gico</b> (grado 3), subtipo Luminal B o triple negativo, y <b>peor pron\u00f3stico</b>. Es \u00fatil para decidir quimioterapia en luminales. El umbral de corte es 20-30% seg\u00fan las gu\u00edas."}],"oncol":[{"n":"25","noShuffle":false,"img":null,"q":"En la neumotoxicidad inducida por agentes quimioter\u00e1picos podemos ver todos los siguientes hallazgos a excepci\u00f3n de:","o":["Adenopat\u00edas mediastin\u00ednicas","Neumonia eosin\u00f3fila","NOC","Da\u00f1o alveolar difuso"],"c":1,"e":"La <b>neumotoxicidad por quimioterapia</b> incluye: da\u00f1o alveolar difuso, neumon\u00eda eosin\u00f3fila, NOC (neumon\u00eda organizada criptog\u00e9nica) y fibrosis pulmonar. Las <b>adenopat\u00edas mediastin\u00ednicas</b> no son un hallazgo de neumotoxicidad quimioter\u00e1pica, sino m\u00e1s propio de linfoma o sarcoidosis."},{"n":"34","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes afirmaciones NO es cierta en relaci\u00f3n a las t\u00e9cnicas de radioterapia de intensidad modulada (IMRT-VMAT)?","o":["Permite una conformaci\u00f3n extrema y en tiempo real de los vol\u00famenes de tratamiento","Consigue reducir las dosis de radiaci\u00f3n en los \u00f3rganos de riesgo adyacentes al volumen de tratamiento","No exigen una verificaci\u00f3n diaria del posicionamiento del paciente","Para la ejecuci\u00f3n de estas t\u00e9cnicas se precisa de un colimador multil\u00e1minas"],"c":3,"e":"Las t\u00e9cnicas <b>IMRT/VMAT</b> son de alta precisi\u00f3n y <b>s\u00ed exigen verificaci\u00f3n diaria del posicionamiento</b> (image-guided radiotherapy, IGRT) mediante imagen portal, CBCT o kilovoltaje. Precisamente la complejidad de estas t\u00e9cnicas hace m\u00e1s necesario, no menos, el control diario de posici\u00f3n."},{"n":"35","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes NO es una escala para valoraci\u00f3n de toxicidad en radioterapia?","o":["LENT/SOMA","EORTC/RTOG","CTCAE","NCCN Guidelines"],"c":4,"e":"Las <b>NCCN Guidelines</b> son gu\u00edas cl\u00ednicas de oncolog\u00eda, no una escala de toxicidad. Las escalas de toxicidad en radioterapia son: <b>LENT/SOMA</b> (efectos tard\u00edos), <b>EORTC/RTOG</b> (aguda y tard\u00eda) y <b>CTCAE</b> (Common Terminology Criteria for Adverse Events), esta \u00faltima la m\u00e1s utilizada actualmente."},{"n":"36","noShuffle":false,"img":null,"q":"Con respecto a la radiocirug\u00eda cerebral, \u00bfcu\u00e1l de las siguientes afirmaciones NO es correcta?","o":["La radiocirug\u00eda cerebral permite administrar dosis altas a vol\u00famenes peque\u00f1os durante un intervalo corto de tiempo","Es un tratamiento complejo en el que se utilizan m\u00faltiples haces o arcos","No se emplea en el tratamiento de algunos tumores cerebrales benignos como los meningiomas o el neurinoma del ac\u00fastico","Una de sus indicaciones es el tratamiento de las met\u00e1stasis cerebrales"],"c":3,"e":"La <b>radiocirug\u00eda cerebral</b> (Gamma Knife, CyberKnife, LINAC) <b>s\u00ed se emplea en tumores benignos</b> como meningiomas y schwannomas vestibulares (neurinoma del ac\u00fastico), siendo una alternativa a la cirug\u00eda en casos seleccionados. Afirmar que no se emplea en estos tumores es <b>incorrecto</b>."},{"n":"70","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las fases del ciclo celular es la m\u00e1s sensible a los efectos de la radiaci\u00f3n?","o":["Fase S","Fase G2/M","Fase G1/S","Fase M"],"c":2,"e":"La fase <b>G2/M</b> (mitosis y el final de G2) es la m\u00e1s <b>radiosensible</b>: las c\u00e9lulas en mitosis tienen el ADN m\u00e1s condensado y los mecanismos de reparaci\u00f3n son menos eficientes. La fase S tard\u00eda es la m\u00e1s radioresistente. Este principio justifica la radioterapia fraccionada."},{"n":"73","noShuffle":false,"img":null,"q":"Respecto a las categor\u00edas de respuesta en el RECIST 1.1 se\u00f1ala cu\u00e1l es la opci\u00f3n err\u00f3nea:","o":["En la evaluaci\u00f3n de las lesiones diana se considera respuesta completa la desaparici\u00f3n de todas las lesiones diana o adenopat\u00edas de menos de 10 mm de eje corto","En la evaluaci\u00f3n de las lesiones diana se considera progresi\u00f3n de la enfermedad a la aparici\u00f3n de una o m\u00e1s lesiones nuevas","En la evaluaci\u00f3n de las lesiones no diana se considera respuesta completa a la normalizaci\u00f3n de los marcadores tumorales y desaparici\u00f3n de lesiones no diana","En la evaluaci\u00f3n de las lesiones diana se considera respuesta parcial a una disminuci\u00f3n de al menos un 20% en la suma de los di\u00e1metros mayores de las lesiones diana con respecto a la obtenida en el estudio basal"],"c":4,"e":"Seg\u00fan <b>RECIST 1.1</b>, la <b>respuesta parcial</b> se define como una disminuci\u00f3n \u2265<b>30%</b> (no 20%) en la suma de los di\u00e1metros mayores de las lesiones diana respecto al basal. El 20% de incremento define la <b>progresi\u00f3n</b>. La confusi\u00f3n entre ambos porcentajes es un error cl\u00e1sico."},{"n":"56","noShuffle":false,"img":null,"q":"Un var\u00f3n de 65 a\u00f1os con masa en cabeza pancre\u00e1tica. \u00bfCu\u00e1l es la prueba m\u00e1s \u00fatil para estadificar la resecabilidad?","o":["RM abdominal","TC helicoidal con contraste y reconstrucci\u00f3n vascular","PET-TC","CPRE con cepillado"],"c":2,"e":"El <b>TC helicoidal con protocolo pancre\u00e1tico</b> es la prueba de elecci\u00f3n para estadificar resecabilidad del ADC pancre\u00e1tico: permite valorar la relaci\u00f3n tumoral con AMS, tronco cel\u00edaco y porta, clasificando en resecable, borderline e irresecable. La CPRE es diagn\u00f3stica-terap\u00e9utica; la RM es alternativa."}],"cirug":[{"n":"62","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes es la hernia m\u00e1s frecuente de la pared abdominal, luego de la inguinal?","o":["Epig\u00e1strica","Umbilical","Spiegel","Jean Louis Petit"],"c":2,"e":"La <b>hernia umbilical</b> es la segunda hernia m\u00e1s frecuente de la pared abdominal tras la inguinal. Es especialmente frecuente en mujeres multip\u00e1ras, obesidad y ascitis. La hernia epig\u00e1strica es la tercera. Spiegel y Petit son hernias raras."},{"n":"63","noShuffle":false,"img":null,"q":"En relaci\u00f3n a los tumores de la pared abdominal, \u00bfcu\u00e1l de las siguientes NO es verdad?","o":["Los lipomas son los m\u00e1s frecuentes","Son tumores poco frecuentes","El endometrioma de pared se trata con estr\u00f3genos a altas dosis","Las pruebas de imagen, como TC o RM son \u00fatiles para la correcta delimitaci\u00f3n"],"c":3,"e":"El <b>endometrioma de pared abdominal</b> (endometriosis en cicatriz) se trata con <b>escisi\u00f3n quir\u00farjica</b>, no con estr\u00f3genos (estos estimular\u00edan su crecimiento). Los anticonceptivos combinados pueden usarse para suprimir los s\u00edntomas temporalmente, pero no son el tratamiento definitivo."},{"n":"78","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes afirmaciones es correcta en las hernias inguinales?","o":["Las hernias inguino-crurales se exploran con el paciente en dec\u00fabito supino","Las adenopat\u00edas inguinales son diagn\u00f3stico diferencial","Siempre se debe solicitar una tomograf\u00eda de abdomen con contraste","La hernia estrangulada no es una urgencia quir\u00farjica"],"c":2,"e":"Las <b>adenopat\u00edas inguinales</b> son un diagn\u00f3stico diferencial importante de la hernia inguinal, junto con el quiste del cord\u00f3n o hidrocele. Las hernias se exploran de pie (no en dec\u00fabito). El TC no es rutinario. La hernia <b>estrangulada s\u00ed es urgencia quir\u00farjica</b> (riesgo de necrosis intestinal)."}],"gsan":[{"n":"38","noShuffle":false,"img":null,"q":"En relaci\u00f3n con las recomendaciones internacionales para promover el uso seguro de los medicamentos, se\u00f1ale la opci\u00f3n correcta:","o":["La implantaci\u00f3n de procedimientos estandarizados solo es necesaria para medicamentos de uso com\u00fan, no para medicamentos de alto riesgo","La conciliaci\u00f3n de la medicaci\u00f3n es un proceso destinado exclusivamente a pacientes ingresados en unidades de cuidados intensivos","Una pr\u00e1ctica segura esencial es evitar el uso de bombas de infusi\u00f3n de flujo libre, dado el riesgo asociado de administraci\u00f3n incontrolada de medicaci\u00f3n","La estandarizaci\u00f3n de las abreviaturas m\u00e9dicas pretende reducir la carga documental, aunque no tiene impacto sobre la seguridad del paciente"],"c":3,"e":"El uso de <b>bombas de infusi\u00f3n de flujo libre</b> sin sistema antierror es una fuente importante de errores de medicaci\u00f3n. Una pr\u00e1ctica segura esencial es su <b>evitaci\u00f3n</b>, sustituy\u00e9ndolas por bombas con librer\u00edas de f\u00e1rmacos y l\u00edmites de dosis programados. La conciliaci\u00f3n aplica a todos los pacientes en transici\u00f3n asistencial."},{"n":"39","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes procesos asistenciales ser\u00eda un ejemplo adecuado para el desarrollo de una v\u00eda cl\u00ednica?","o":["Elaboraci\u00f3n de un protocolo de vacunaci\u00f3n en Atenci\u00f3n Primaria","Seguimiento ambulatorio de pacientes con hipertensi\u00f3n arterial esencial","Redacci\u00f3n de un informe pericial en medicina legal","Manejo integral del paciente con hernia umbilical"],"c":4,"e":"Las <b>v\u00edas cl\u00ednicas</b> se aplican a procesos asistenciales <b>frecuentes, predecibles y estandarizables</b> (cirug\u00eda programada, patolog\u00eda aguda definida). El manejo de la <b>hernia umbilical</b> es un proceso quir\u00farjico electivo con fases claras (preoperatorio, cirug\u00eda, alta). Un informe pericial o el seguimiento cr\u00f3nico no son adecuados para v\u00edas cl\u00ednicas."},{"n":"41","noShuffle":false,"img":null,"q":"En relaci\u00f3n con las recomendaciones internacionales para promover el uso seguro de los medicamentos, se\u00f1ale la opci\u00f3n correcta:","o":["Una pr\u00e1ctica segura esencial es evitar el uso de bombas de infusi\u00f3n de flujo libre, dado el riesgo asociado de administraci\u00f3n incontrolada de medicaci\u00f3n","La implantaci\u00f3n de procedimientos estandarizados solo es necesaria para medicamentos de uso com\u00fan, no para medicamentos de alto riesgo","La conciliaci\u00f3n de la medicaci\u00f3n es un proceso destinado exclusivamente a pacientes ingresados en unidades de cuidados intensivos","La estandarizaci\u00f3n de las abreviaturas m\u00e9dicas pretende reducir la carga documental, aunque no tiene impacto sobre la seguridad del paciente"],"c":1,"e":"Igual que en la pregunta 38: evitar las <b>bombas de flujo libre</b> es una pr\u00e1ctica segura esencial reconocida internacionalmente (OMS, ISMP). Los procedimientos estandarizados son m\u00e1s necesarios para f\u00e1rmacos de <b>alto riesgo</b>; la conciliaci\u00f3n aplica a toda transici\u00f3n asistencial; las abreviaturas estandarizadas s\u00ed impactan en la seguridad."},{"n":"42","noShuffle":false,"img":null,"q":"En relaci\u00f3n con los conceptos de salud y sanidad, se\u00f1ale la opci\u00f3n correcta:","o":["Salud y sanidad son t\u00e9rminos equivalentes que hacen referencia a la ausencia de enfermedad en un individuo","La sanidad representa los servicios organizados para promover, proteger y restaurar la salud de la poblaci\u00f3n, mientras que la salud es un estado de completo bienestar f\u00edsico, mental y social","La salud se refiere a los servicios e instituciones encargados de preservar el bienestar de la poblaci\u00f3n, mientras que la sanidad hace referencia al estado f\u00edsico y mental de las personas","La contribuci\u00f3n de la sanidad a la salud de la poblaci\u00f3n supera el 70%, siendo el factor determinante principal de la salud"],"c":2,"e":"<b>Salud</b> (OMS, 1948): estado de completo bienestar f\u00edsico, mental y social. <b>Sanidad</b>: conjunto de servicios organizados por la administraci\u00f3n para promover, proteger y restaurar la salud. La sanidad contribuye s\u00f3lo al 10-20% del nivel de salud; los determinantes sociales y estilos de vida son m\u00e1s influyentes."}],"piel":[{"n":"61","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes c\u00e9lulas pertenece al sistema inmunol\u00f3gico en la piel?","o":["Queratinocito","Mastocito","Fibroblasto","Melanocito"],"c":2,"e":"El <b>mastocito</b> es una c\u00e9lula del sistema inmunol\u00f3gico residente en la piel: libera histamina, heparina y citocinas en respuesta a est\u00edmulos al\u00e9rgicos o inflamatorios. Los queratinocitos son epiteliales; los fibroblastos son del tejido conectivo; los melanocitos producen melanina."}]};
