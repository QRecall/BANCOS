macr\u00f3fagos espumosos PAS+ resistentes a diastasa</b> en la l\u00e1mina propia. Afecta a varones de mediana edad; sin tratamiento es mortal."},{"n":"4","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes caracter\u00edsticas corresponde a la COLITIS ULCEROSA y NO a la enfermedad de Crohn?","o":["Afectaci\u00f3n transmural y discontinua","Afectaci\u00f3n continua mucosa con recto","Granulomas epitelioides no caseificantes","F\u00edstulas y mucosa en empedrado"],"c":2,"e":"La colitis ulcerosa afecta <b>solo la mucosa</b>, de forma <b>continua</b> desde el recto en sentido proximal, limitada al colon. La transmuralidad, la afectaci\u00f3n discontinua ('saltos'), los granulomas, las f\u00edstulas y el empedrado son de Crohn."},{"n":"5","noShuffle":false,"img":null,"q":"La presencia de granulomas epitelioides no caseificantes e inflamaci\u00f3n transmural en el intestino orienta a:","o":["La colitis ulcerosa extensa","La enfermedad de Crohn","La colitis isqu\u00e9mica cr\u00f3nica","La apendicitis aguda"],"c":2,"e":"La enfermedad de <b>Crohn</b> es transmural, segmentaria y discontinua, puede afectar de la boca al ano (t\u00edpico el \u00edleon), con <b>granulomas epitelioides</b>, fisuras profundas, f\u00edstulas y mucosa en 'empedrado'."},{"n":"6","noShuffle":false,"img":null,"q":"El carcinoma colorrectal hereditario no polip\u00f3sico (s\u00edndrome de Lynch) se debe a:","o":["La mutaci\u00f3n germinal del gen APC","El fallo de los genes reparadores","La mutaci\u00f3n activadora de c-KIT","La infecci\u00f3n cr\u00f3nica por H. pylori"],"c":2,"e":"El <b>s\u00edndrome de Lynch</b> (HNPCC) se debe a mutaciones en genes <b>reparadores (MMR: MLH1, MSH2...)</b>, con <b>inestabilidad de microsat\u00e9lites</b>. Da carcinoma colorrectal de predominio derecho a edad temprana. La poliposis adenomatosa familiar se debe a APC."},{"n":"7","noShuffle":false,"img":null,"q":"La secuencia cl\u00e1sica de carcinog\u00e9nesis del carcinoma colorrectal espor\u00e1dico es:","o":["Metaplasia \u2192 displasia \u2192 carcinoma sin alteraci\u00f3n gen\u00e9tica","Adenoma \u2192 carcinoma por acumulaci\u00f3n de mutaciones","Infecci\u00f3n v\u00edrica directa","Hiperplasia neuroendocrina"],"c":2,"e":"La mayor\u00eda de carcinomas colorrectales siguen la secuencia <b>adenoma-carcinoma</b> con acumulaci\u00f3n escalonada de mutaciones: <b>APC</b> (inicio), <b>KRAS</b> y <b>TP53</b> (progresi\u00f3n). De ah\u00ed el valor del cribado y la polipectom\u00eda."},{"noShuffle":false,"img":null,"q":"La diverticulitis del colon es una complicaci\u00f3n de la diverticulosis que consiste en:","o":["La malignizaci\u00f3n de los divert\u00edculos","La inflamaci\u00f3n de los divert\u00edculos","La isquemia mesent\u00e9rica aguda","La atrofia de las vellosidades"],"c":2,"e":"La <b>diverticulitis</b> es la inflamaci\u00f3n de divert\u00edculos (falsos divert\u00edculos del sigma, por pulsi\u00f3n en dieta pobre en fibra). Puede complicarse con perforaci\u00f3n, absceso, f\u00edstula o peritonitis.","n":"8"},{"noShuffle":false,"img":null,"q":"La colitis isqu\u00e9mica afecta preferentemente las zonas 'frontera' (watershed) del colon, sobre todo:","o":["El recto distal y medio","\u00c1ngulo espl\u00e9nico y sigma","El ciego de forma exclusiva","El ap\u00e9ndice cecal"],"c":2,"e":"La <b>colitis isqu\u00e9mica</b> es la forma m\u00e1s frecuente de isquemia intestinal y afecta las \u00e1reas frontera entre territorios vasculares: <b>\u00e1ngulo espl\u00e9nico</b> y uni\u00f3n rectosigmoidea. El recto suele respetarse por su doble irrigaci\u00f3n.","n":"9"},{"noShuffle":false,"img":null,"q":"La colitis col\u00e1gena y la colitis linfocitaria (colitis microsc\u00f3pica) cursan con:","o":["Diarrea acuosa con endoscopia normal","\u00dalceras profundas con f\u00edstulas","Sangrado rectal masivo agudo","M\u00faltiples pseudop\u00f3lipos inflamatorios"],"c":1,"e":"La <b>colitis microsc\u00f3pica</b> (col\u00e1gena y linfocitaria) causa <b>diarrea acuosa cr\u00f3nica</b> con mucosa endosc\u00f3picamente normal; el diagn\u00f3stico es histol\u00f3gico (banda de col\u00e1geno subepitelial o linfocitosis intraepitelial). Predomina en mujeres.","n":"10"},{"noShuffle":false,"img":null,"q":"El p\u00f3lipo col\u00f3nico con mayor potencial de malignizaci\u00f3n es:","o":["El p\u00f3lipo hiperpl\u00e1sico","El adenoma velloso","El p\u00f3lipo inflamatorio","El p\u00f3lipo juvenil aislado"],"c":2,"e":"El <b>adenoma velloso</b> (sobre todo si es grande y con displasia de alto grado) tiene el mayor riesgo de malignizaci\u00f3n. Los p\u00f3lipos hiperpl\u00e1sicos son habitualmente benignos. La secuencia adenoma-carcinoma justifica la polipectom\u00eda.","n":"11"},{"noShuffle":false,"img":null,"q":"El tumor neuroendocrino bien diferenciado del intestino (carcinoide), cuando metastatiza al h\u00edgado, puede producir el s\u00edndrome carcinoide por liberaci\u00f3n de:","o":["Gastrina","Serotonina","Insulina","Calcitonina"],"c":2,"e":"El tumor carcinoide secreta <b>serotonina</b>; con met\u00e1stasis hep\u00e1ticas aparece el <b>s\u00edndrome carcinoide</b> (rubor, diarrea, broncoespasmo, fibrosis valvular derecha). Marcador urinario: 5-HIAA.","n":"12"}],"higado":[{"n":"1","noShuffle":false,"img":null,"q":"La cirrosis se define morfol\u00f3gicamente como:","o":["Esteatosis macrovesicular difusa grave","N\u00f3dulos regenerativos con fibrosis","Necrosis masiva sin fibrosis","Inflamaci\u00f3n portal aislada leve"],"c":2,"e":"La <b>cirrosis</b> es la transformaci\u00f3n difusa del par\u00e9nquima en <b>n\u00f3dulos regenerativos</b> separados por <b>bandas fibrosas</b>. Causas principales: hepatitis B y C cr\u00f3nicas, h\u00edgado graso no alcoh\u00f3lico y hepatopat\u00eda alcoh\u00f3lica."},{"n":"2","noShuffle":false,"img":null,"q":"En la esteatohepatitis alcoh\u00f3lica, los cuerpos hialinos intracitoplasm\u00e1ticos caracter\u00edsticos son:","o":["Cuerpos de Councilman apopt\u00f3ticos","Cuerpos de Mallory-Denk","Cuerpos de Psammoma calcificados","Cuerpos de Verocay"],"c":2,"e":"Los <b>cuerpos de Mallory-Denk</b> (hialina alcoh\u00f3lica, agregados de citoqueratina) aparecen en la esteatohepatitis junto a hepatocitos en globo (balonizaci\u00f3n) e infiltrado neutrof\u00edlico. No son exclusivos del alcohol (tambi\u00e9n NASH)."},{"n":"3","noShuffle":false,"img":null,"q":"El marcador s\u00e9rico m\u00e1s \u00fatil en el seguimiento del carcinoma hepatocelular es:","o":["El ant\u00edgeno CEA carcinoembrionario","La alfa-fetoprote\u00edna","El ant\u00edgeno CA 19-9","El ant\u00edgeno PSA prost\u00e1tico"],"c":2,"e":"La <b>alfa-fetoprote\u00edna (AFP)</b> es el marcador del carcinoma hepatocelular. El CA 19-9 se asocia a colangiocarcinoma/p\u00e1ncreas, el CEA a colorrectal y el PSA a pr\u00f3stata."},{"n":"4","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes NO es factor de riesgo del carcinoma hepatocelular?","o":["Hepatitis B y C cr\u00f3nicas","Hemocromatosis hereditaria y cirrosis","H\u00edgado graso no alcoh\u00f3lico (NASH)","Colelitiasis de colesterol"],"c":4,"e":"La colelitiasis se asocia al carcinoma de ves\u00edcula, no al hepatocelular. El CHC se relaciona con <b>hepatitis B/C</b>, <b>cirrosis</b> de cualquier causa, hemocromatosis, d\u00e9ficit de \u03b11-antitripsina, alcohol y NASH."},{"n":"5","noShuffle":false,"img":null,"q":"El colangiocarcinoma es histol\u00f3gicamente:","o":["Un carcinoma escamoso queratinizante","Un adenocarcinoma con mucina","Un tumor neuroendocrino diferenciado","Un sarcoma de partes blandas"],"c":2,"e":"El <b>colangiocarcinoma</b> es un <b>adenocarcinoma productor de mucina</b> del epitelio de los conductos biliares. Sus factores de riesgo (colangitis esclerosante, hepatolitiasis, par\u00e1sitos) causan inflamaci\u00f3n cr\u00f3nica y colestasis."},{"n":"6","noShuffle":false,"img":null,"q":"Enfermedad de Wilson. La alteraci\u00f3n fundamental es el dep\u00f3sito de:","o":["Hierro","Cobre","Calcio","Melanina"],"c":2,"e":"La enfermedad de Wilson es un trastorno autos\u00f3mico recesivo del metabolismo del <b>cobre</b>, que se acumula en h\u00edgado (cirrosis), cerebro (ganglios basales) y c\u00f3rnea (anillo de Kayser-Fleischer)."},{"noShuffle":false,"img":null,"q":"El virus de la hepatitis que NUNCA cronifica y se transmite por v\u00eda fecal-oral es:","o":["VHA","VHB","VHC","VHD"],"c":1,"e":"El <b>VHA</b> (picornavirus) se transmite por v\u00eda fecal-oral (agua/alimentos) y produce hepatitis aguda autolimitada que <b>nunca cronifica</b>. IgM anti-VHA marca infecci\u00f3n aguda.","n":"7"},{"noShuffle":false,"img":null,"q":"El virus de la hepatitis con mayor tendencia a la cronificaci\u00f3n (hasta 80-90%) es:","o":["VHA","VHB","VHC","VHE"],"c":3,"e":"El <b>VHC</b> cronifica en el 80-90% de los infectados y es causa importante de cirrosis y hepatocarcinoma. El VHB cronifica en ~10% de los adultos.","n":"8"},{"noShuffle":false,"img":null,"q":"El patr\u00f3n de hepatitis cr\u00f3nica con hepatocitos en 'vidrio esmerilado' (ac\u00famulo de HBsAg) es t\u00edpico de:","o":["La hepatitis A aguda autolimitada","La hepatitis B cr\u00f3nica","El h\u00edgado graso no alcoh\u00f3lico","La hemocromatosis hereditaria"],"c":2,"e":"Los hepatocitos en <b>vidrio esmerilado</b> (ret\u00edculo endopl\u00e1smico repleto de HBsAg) son caracter\u00edsticos de la <b>hepatitis B cr\u00f3nica</b>. Se confirman con inmunohistoqu\u00edmica para HBsAg.","n":"9"},{"noShuffle":false,"img":null,"q":"La congesti\u00f3n hep\u00e1tica cr\u00f3nica por insuficiencia cardiaca derecha produce el aspecto macrosc\u00f3pico de:","o":["H\u00edgado en 'clavos de cobre'","H\u00edgado en 'nuez moscada'","H\u00edgado graso amarillo","H\u00edgado verde colest\u00e1sico"],"c":2,"e":"La congesti\u00f3n pasiva cr\u00f3nica da el <b>h\u00edgado en nuez moscada</b>: \u00e1reas centrolobulillares congestivas-oscuras alternando con periportales p\u00e1lidas. Si progresa \u2192 fibrosis (cirrosis cardiaca).","n":"10"},{"noShuffle":false,"img":null,"q":"El tumor hep\u00e1tico BENIGNO m\u00e1s frecuente es:","o":["Adenoma hepatocelular","Hemangioma cavernoso","Hiperplasia nodular focal","Hepatoblastoma"],"c":2,"e":"El <b>hemangioma cavernoso</b> es el tumor hep\u00e1tico benigno m\u00e1s frecuente. El adenoma hepatocelular se asocia a anticonceptivos orales (riesgo de hemorragia); la hiperplasia nodular focal tiene cicatriz central estrellada.","n":"11"}],"pancreasbil":[{"n":"1","noShuffle":false,"img":null,"q":"En la pancreatitis aguda, la necrosis grasa peripancre\u00e1tica se produce por:","o":["La isquemia coagulativa difusa","La acci\u00f3n de las lipasas","La infecci\u00f3n bacteriana sobrea\u00f1adida","El dep\u00f3sito de amiloide"],"c":2,"e":"En la pancreatitis aguda, las <b>lipasas activadas</b> digieren la grasa peripancre\u00e1tica produciendo <b>necrosis grasa con saponificaci\u00f3n</b> (jabones c\u00e1lcicos, focos blanquecinos). Causas frecuentes: litiasis biliar y alcohol."},{"n":"2","noShuffle":false,"img":null,"q":"El pseudoquiste pancre\u00e1tico:","o":["Est\u00e1 tapizado por epitelio propio","Es secuela sin epitelio propio","Es siempre una lesi\u00f3n maligna","Deriva de las c\u00e9lulas de los islotes"],"c":2,"e":"El <b>pseudoquiste</b> es una colecci\u00f3n secuela de pancreatitis (aguda o cr\u00f3nica) <b>sin revestimiento epitelial</b> (de ah\u00ed 'pseudo'), con pared de tejido fibroso y de granulaci\u00f3n que contiene l\u00edquido rico en enzimas."},{"n":"3","noShuffle":false,"img":null,"q":"Paciente de 65 a\u00f1os con ictericia obstructiva indolora y p\u00e9rdida de peso. La masa m\u00e1s probable se localiza en:","o":["La cola del p\u00e1ncreas","La cabeza del p\u00e1ncreas","El cuerpo g\u00e1strico distal","El \u00edleon terminal"],"c":2,"e":"El <b>adenocarcinoma de la cabeza del p\u00e1ncreas</b> obstruye el col\u00e9doco distal a su paso por la cabeza, dando <b>ictericia obstructiva</b> (a menudo indolora, con ves\u00edcula palpable: signo de Courvoisier). P\u00e9simo pron\u00f3stico."},{"n":"4","noShuffle":false,"img":null,"q":"El carcinoma de ves\u00edcula biliar se asocia en la gran mayor\u00eda de los casos a:","o":["La litiasis biliar cr\u00f3nica","La infecci\u00f3n cr\u00f3nica por el VHB","El reflujo duodenog\u00e1strico","El d\u00e9ficit de \u03b11-antitripsina"],"c":1,"e":"El carcinoma de ves\u00edcula se asocia a <b>colelitiasis</b> en ~95% de los casos (inflamaci\u00f3n cr\u00f3nica/ves\u00edcula 'en porcelana'). Suele ser un adenocarcinoma de diagn\u00f3stico tard\u00edo y mal pron\u00f3stico."},{"noShuffle":false,"img":null,"q":"Las dos causas m\u00e1s frecuentes de pancreatitis aguda son:","o":["Hipercalcemia y trauma","Litiasis biliar y alcohol","F\u00e1rmacos y virus","Hipertrigliceridemia e idiop\u00e1tica"],"c":2,"e":"La <b>litiasis biliar</b> y el <b>alcohol</b> causan ~80% de las pancreatitis agudas. Cursa con dolor epig\u00e1strico, elevaci\u00f3n de amilasa/lipasa y, morfol\u00f3gicamente, necrosis grasa con saponificaci\u00f3n.","n":"5"},{"noShuffle":false,"img":null,"q":"Los c\u00e1lculos biliares m\u00e1s frecuentes en pa\u00edses desarrollados son los de:","o":["Pigmento (bilirrubinato)","Colesterol","Carbonato c\u00e1lcico","Cistina"],"c":2,"e":"Los c\u00e1lculos de <b>colesterol</b> son los m\u00e1s frecuentes (asociados a las '4 F': female, forty, fat, fertile). Los pigmentarios (bilirrubinato c\u00e1lcico) se asocian a hem\u00f3lisis cr\u00f3nica e infecciones biliares.","n":"6"},{"noShuffle":false,"img":null,"q":"El marcador s\u00e9rico m\u00e1s utilizado en el adenocarcinoma de p\u00e1ncreas es:","o":["AFP","CA 19-9","PSA","Calcitonina"],"c":2,"e":"El <b>CA 19-9</b> es el marcador del adenocarcinoma ductal de p\u00e1ncreas (y v\u00edas biliares), \u00fatil en seguimiento. La mayor\u00eda de estos tumores portan mutaci\u00f3n de <b>KRAS</b> y tienen muy mal pron\u00f3stico.","n":"7"}],"glomerulo":[{"n":"1","noShuffle":false,"img":null,"q":"La causa m\u00e1s frecuente de s\u00edndrome nefr\u00f3tico en NI\u00d1OS es:","o":["Nefropat\u00eda membranosa","Enfermedad de cambios m\u00ednimos","Glomerulonefritis postinfecciosa","Nefropat\u00eda IgA"],"c":2,"e":"La <b>enfermedad de cambios m\u00ednimos</b> es la causa m\u00e1s frecuente de s\u00edndrome nefr\u00f3tico infantil. Al microscopio \u00f3ptico el glom\u00e9rulo es normal; en microscop\u00eda electr\u00f3nica hay <b>borramiento difuso de los pedicelos</b> de los podocitos. Responde a corticoides."},{"n":"2","noShuffle":false,"img":null,"q":"En la enfermedad de cambios m\u00ednimos, el hallazgo en microscop\u00eda electr\u00f3nica es:","o":["Dep\u00f3sitos subepiteliales en espiga","Borramiento de los pedicelos","Semilunas epiteliales extensas","Dobles contornos de membrana basal"],"c":2,"e":"El sello ultraestructural de la enfermedad de cambios m\u00ednimos es el <b>borramiento difuso de los pedicelos podocitarios</b>, con microscop\u00eda \u00f3ptica e inmunofluorescencia normales. La lesi\u00f3n podocitaria explica la proteinuria selectiva."},{"n":"3","noShuffle":false,"img":null,"q":"La nefropat\u00eda membranosa se caracteriza por:","o":["Dep\u00f3sitos subepiteliales en espiga","Dep\u00f3sitos mesangiales de IgA","Semilunas en m\u00e1s del 50% de glom\u00e9rulos","Glom\u00e9rulos \u00f3pticamente normales"],"c":1,"e":"La nefropat\u00eda membranosa muestra <b>dep\u00f3sitos inmunes subepiteliales</b> de IgG a lo largo de la membrana basal, que da el patr\u00f3n en <b>'espiga y c\u00fapula'</b> con plata. Es causa frecuente de s\u00edndrome nefr\u00f3tico en adultos (anti-PLA2R)."},{"n":"4","noShuffle":false,"img":null,"q":"Var\u00f3n joven con episodios de hematuria macrosc\u00f3pica coincidentes con infecciones respiratorias. La inmunofluorescencia muestra dep\u00f3sitos mesangiales de IgA. El diagn\u00f3stico es:","o":["Nefropat\u00eda de cambios m\u00ednimos","Enfermedad de Berger (IgA)","Nefropat\u00eda membranosa idiop\u00e1tica","S\u00edndrome de Goodpasture"],"c":2,"e":"La <b>nefropat\u00eda IgA (enfermedad de Berger)</b> es la glomerulonefritis m\u00e1s frecuente del mundo. Cursa con hematuria recurrente sinfar\u00edngea y <b>dep\u00f3sitos mesangiales de IgA</b>. Es causa de s\u00edndrome nefr\u00edtico."},{"n":"5","noShuffle":false,"img":null,"q":"La glomerulonefritis con SEMILUNAS (r\u00e1pidamente progresiva) implica:","o":["Semilunas de epitelio parietal","El dep\u00f3sito de amiloide glomerular","El borramiento aislado de pedicelos","El engrosamiento difuso de la basal"],"c":1,"e":"La GN r\u00e1pidamente progresiva se define por <b>semilunas</b> (proliferaci\u00f3n de epitelio parietal en el espacio de Bowman) en >50% de glom\u00e9rulos y ca\u00edda r\u00e1pida del filtrado. Incluye el s\u00edndrome de Goodpasture (anti-MBG)."},{"n":"6","noShuffle":false,"img":null,"q":"La glomerulonefritis postinfecciosa (postestreptoc\u00f3cica) muestra caracter\u00edsticamente:","o":["Dep\u00f3sitos en 'jorobas' (humps)","Patr\u00f3n de espiga y c\u00fapula","Borramiento difuso de pedicelos","Dep\u00f3sitos lineales de IgG en basal"],"c":1,"e":"La GN postestreptoc\u00f3cica produce un s\u00edndrome nefr\u00edtico 1-3 semanas tras la infecci\u00f3n, con <b>dep\u00f3sitos subepiteliales en 'joroba' (humps)</b>, hipercelularidad endocapilar e inmunofluorescencia granular ('cielo estrellado')."},{"n":"7","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes glomerulopat\u00edas cursa t\u00edpicamente con s\u00edndrome NEFR\u00cdTICO (hematuria, HTA, oliguria) y no nefr\u00f3tico?","o":["Enfermedad de cambios m\u00ednimos","Nefropat\u00eda membranosa","Glomerulonefritis postinfecciosa","Glomeruloesclerosis focal y segmentaria"],"c":3,"e":"El s\u00edndrome <b>nefr\u00edtico</b> (hematuria, HTA, oliguria, cilindros hem\u00e1ticos) es propio de la GN <b>postinfecciosa</b>, la IgA y las formas proliferativas/con semilunas. Cambios m\u00ednimos, membranosa y GEFS dan s\u00edndrome nefr\u00f3tico."},{"noShuffle":false,"img":null,"q":"Causa cada vez m\u00e1s frecuente de s\u00edndrome nefr\u00f3tico en adultos, asociada a VIH y hero\u00edna, con esclerosis de parte de algunos glom\u00e9rulos y proteinuria NO selectiva:","o":["Enfermedad de cambios m\u00ednimos pura","Glomeruloesclerosis focal","Nefropat\u00eda membranosa primaria","Nefropat\u00eda IgA mesangial"],"c":2,"e":"La <b>GEFS</b> esclerosa segmentos de algunos glom\u00e9rulos (focal y segmentaria); da s\u00edndrome nefr\u00f3tico con proteinuria <b>no selectiva</b>, hematuria e HTA. Puede ser primaria (lesi\u00f3n podocitaria) o secundaria (VIH, hero\u00edna, obesidad). Mal pron\u00f3stico.","n":"8"},{"noShuffle":false,"img":null,"q":"La glomerulonefritis membranoproliferativa se caracteriza por:","o":["Borramiento aislado de los pedicelos","Dobles contornos 'en ra\u00edl de tren'","Glom\u00e9rulos \u00f3pticamente normales","Semilunas en todos los glom\u00e9rulos"],"c":2,"e":"La GN <b>membranoproliferativa</b> muestra <b>dobles contornos</b> de la membrana basal ('en ra\u00edl de tren') por interposici\u00f3n mesangial, con hipercelularidad. Cursa con cuadro mixto nefr\u00f3tico-nefr\u00edtico y consumo de complemento.","n":"9"},{"noShuffle":false,"img":null,"q":"El s\u00edndrome de Goodpasture combina hemorragia pulmonar y glomerulonefritis por anticuerpos:","o":["Anti-membrana basal (MBG)","Anti-ADN de doble cadena nativo","Anti-receptor de PLA2R","Anti-mieloperoxidasa (MPO)"],"c":1,"e":"El s\u00edndrome de <b>Goodpasture</b> se debe a anticuerpos <b>anti-membrana basal glomerular</b> (anti-col\u00e1geno IV), con dep\u00f3sito <b>lineal</b> de IgG en inmunofluorescencia. Da GN r\u00e1pidamente progresiva con semilunas y hemorragia alveolar.","n":"10"},{"noShuffle":false,"img":null,"q":"La nefropat\u00eda l\u00fapica de clase IV (proliferativa difusa) suele presentarse con:","o":["Glom\u00e9rulos completamente normales","Cuadro grave con asas de alambre","Solo hematuria microsc\u00f3pica leve","Amiloidosis glomerular asociada"],"c":2,"e":"La nefritis l\u00fapica <b>clase IV (proliferativa difusa)</b> es la m\u00e1s grave: dep\u00f3sitos subendoteliales abundantes ('<b>asas de alambre</b>'), proliferaci\u00f3n y a menudo semilunas. Inmunofluorescencia 'full house' (IgG, IgA, IgM, C3, C1q).","n":"11"},{"noShuffle":false,"img":null,"q":"La lesi\u00f3n renal de la nefropat\u00eda diab\u00e9tica avanzada con n\u00f3dulos PAS-positivos se denomina:","o":["Glomeruloesclerosis nodular","La nefritis intersticial cr\u00f3nica","La necrosis cortical bilateral","La GN postinfecciosa aguda"],"c":1,"e":"La <b>glomeruloesclerosis nodular de Kimmelstiel-Wilson</b> (n\u00f3dulos mesangiales PAS+) es t\u00edpica de la nefropat\u00eda diab\u00e9tica avanzada, junto con el engrosamiento difuso de la membrana basal y la arterioloesclerosis hialina.","n":"12"}],"rinontu":[{"noShuffle":false,"img":null,"q":"Seg\u00fan el temario, el carcinoma de c\u00e9lulas renales (de Grawitz) se presenta cl\u00e1sicamente con la tr\u00edada:","o":["Fiebre, anemia y p\u00e9rdida de peso","Hematuria, dolor lumbar y masa","Disuria, polaquiuria y urgencia","Edema, HTA y proteinuria intensa"],"c":2,"e":"El carcinoma de c\u00e9lulas renales se presenta con la tr\u00edada diagn\u00f3stica cl\u00e1sica de <b>hematuria + dolor en flanco + masa palpable</b> (hoy poco frecuente; el s\u00edntoma m\u00e1s constante es la <b>hematuria</b>). Tambi\u00e9n llamado tumor de Grawitz.","n":"1"},{"noShuffle":false,"img":null,"q":"El subtipo m\u00e1s frecuente de carcinoma de c\u00e9lulas renales, asociado a alteraci\u00f3n del gen VHL (cromosoma 3p), es:","o":["Carcinoma papilar","Carcinoma de c\u00e9lulas claras","Carcinoma crom\u00f3fobo","Carcinoma de ductos colectores"],"c":2,"e":"El <b>carcinoma de c\u00e9lulas claras</b> es el subtipo m\u00e1s frecuente; deriva del t\u00fabulo proximal, tiene citoplasma claro (gluc\u00f3geno/l\u00edpidos) y se asocia a alteraci\u00f3n del gen <b>VHL (3p)</b>, espor\u00e1dico o en el s\u00edndrome de von Hippel-Lindau.","n":"2"},{"noShuffle":false,"img":null,"q":"El carcinoma renal PAPILAR se subdivide histol\u00f3gicamente en:","o":["Tipo I y tipo II","Nodular y difuso","Mucinoso y seroso","Cl\u00e1sico y espermatoc\u00edtico"],"c":1,"e":"El <b>carcinoma papilar</b> renal se clasifica en <b>tipo I</b> (papilas con c\u00e9lulas de citoplasma escaso) y <b>tipo II</b> (papilas con c\u00e9lulas de citoplasma eosin\u00f3filo y mayor atipia/peor pron\u00f3stico). Suele ser multifocal.","n":"3"},{"noShuffle":false,"img":null,"q":"El carcinoma renal MEDULAR, descrito en el temario, se asocia caracter\u00edsticamente a:","o":["La diabetes mellitus tipo 2","La drepanocitosis falciforme","El tabaquismo intenso cr\u00f3nico","La litiasis c\u00e1lcica recidivante"],"c":2,"e":"El <b>carcinoma medular renal</b> es un tumor raro y muy agresivo que aparece t\u00edpicamente en j\u00f3venes con <b>rasgo o enfermedad drepanoc\u00edtica</b> (c\u00e9lulas falciformes). Nace en la regi\u00f3n medular/papilar del ri\u00f1\u00f3n.","n":"4"},{"noShuffle":false,"img":null,"q":"La transformaci\u00f3n 'sarcomatoide' que puede sufrir cualquier subtipo de carcinoma renal implica:","o":["Indica un mejor pron\u00f3stico","\u00c1reas fusocelulares agresivas","Significa diferenciaci\u00f3n benigna","P\u00e9rdida de capacidad metast\u00e1sica"],"c":2,"e":"El patr\u00f3n <b>sarcomatoide</b> (c\u00e9lulas fusiformes tipo sarcoma) puede aparecer en cualquier subtipo de carcinoma renal e indica <b>desdiferenciaci\u00f3n con peor pron\u00f3stico</b> y mayor agresividad.","n":"5"},{"noShuffle":false,"img":null,"q":"El ANGIOMIOLIPOMA renal es un tumor benigno compuesto por:","o":["Epitelio tubular puro renal","Vasos, m\u00fasculo liso y grasa","Blastema y epitelio inmaduro","C\u00e9lulas oncoc\u00edticas eosin\u00f3filas"],"c":2,"e":"El <b>angiomiolipoma</b> es un tumor benigno formado por <b>vasos, m\u00fasculo liso y grasa</b>; se asocia a la esclerosis tuberosa y, si es grande, tiene riesgo de hemorragia retroperitoneal.","n":"6"},{"noShuffle":false,"img":null,"q":"El ONCOCITOMA renal es un tumor benigno caracterizado por:","o":["C\u00e9lulas claras con red vascular","C\u00e9lulas oncoc\u00edticas eosin\u00f3filas","Papilas con macr\u00f3fagos espumosos","Blastema indiferenciado trif\u00e1sico"],"c":2,"e":"El <b>oncocitoma</b> es un tumor renal benigno de <b>c\u00e9lulas oncoc\u00edticas eosin\u00f3filas</b> (repletas de mitocondrias), con frecuente <b>cicatriz central</b> estrellada. Su diagn\u00f3stico diferencial es con el carcinoma crom\u00f3fobo.","n":"7"},{"noShuffle":false,"img":null,"q":"El adenoma papilar renal se define, seg\u00fan criterio de tama\u00f1o, como una lesi\u00f3n papilar de:","o":["M\u00e1s de 5 cm","Menos de aproximadamente 1,5 cm","Cualquier tama\u00f1o con met\u00e1stasis","M\u00e1s de 10 cm"],"c":2,"e":"El <b>adenoma papilar</b> es una lesi\u00f3n benigna peque\u00f1a (cl\u00e1sicamente <b>< 1,5 cm</b>), formada por t\u00fabulos y papilas; hallazgo incidental frecuente. Por encima de ese tama\u00f1o se considera carcinoma papilar.","n":"8"},{"noShuffle":false,"img":null,"q":"El tumor renal maligno m\u00e1s frecuente de la infancia, con triple componente (blastema, epitelio y estroma), es:","o":["Carcinoma de c\u00e9lulas claras","Tumor de Wilms","Oncocitoma","Carcinoma medular"],"c":2,"e":"El <b>tumor de Wilms (nefroblastoma)</b> es el tumor renal m\u00e1s frecuente de la infancia (2-5 a\u00f1os); es <b>trif\u00e1sico</b> (blastema indiferenciado + epitelio + estroma) y se asocia a mutaciones de WT1. Buen pron\u00f3stico con tratamiento.","n":"9"},{"noShuffle":false,"img":null,"q":"El carcinoma urotelial (de pelvis renal y vejiga) tiene como principal factor de riesgo:","o":["La litiasis renal de repetici\u00f3n","El tabaco y las aminas","La diabetes mellitus mal controlada","Las infecciones v\u00edricas cr\u00f3nicas"],"c":2,"e":"El <b>carcinoma urotelial</b> (v\u00eda urinaria, pelvis renal, ur\u00e9ter, vejiga) se asocia sobre todo al <b>tabaco</b> y a las <b>aminas arom\u00e1ticas</b> industriales. Debuta con hematuria indolora, es multifocal y recidivante.","n":"10"}],"prostatest":[{"n":"1","noShuffle":false,"img":null,"q":"La hiperplasia nodular prost\u00e1tica (HBP) se origina caracter\u00edsticamente en:","o":["La zona perif\u00e9rica","La zona de transici\u00f3n","La c\u00e1psula","Las ves\u00edculas seminales"],"c":2,"e":"La <b>HBP</b> se origina en la <b>zona de transici\u00f3n</b> periuretral (de ah\u00ed los s\u00edntomas obstructivos), mientras que el <b>adenocarcinoma</b> nace t\u00edpicamente en la <b>zona perif\u00e9rica</b>. La HBP no es lesi\u00f3n premaligna."},{"n":"2","noShuffle":false,"img":null,"q":"El sistema de Gleason en el adenocarcinoma de pr\u00f3stata eval\u00faa:","o":["El nivel s\u00e9rico total de PSA libre","El patr\u00f3n arquitectural glandular","El tama\u00f1o total de la pr\u00f3stata","La afectaci\u00f3n ganglionar regional"],"c":2,"e":"El <b>Gleason</b> grad\u00faa el <b>patr\u00f3n arquitectural glandular</b> (se suman los dos patrones predominantes). Es el factor pron\u00f3stico histol\u00f3gico m\u00e1s potente, superior a edad, PSA o estadio aislados."},{"n":"3","noShuffle":false,"img":null,"q":"El adenocarcinoma de pr\u00f3stata se localiza con mayor frecuencia en:","o":["La zona de transici\u00f3n","La zona perif\u00e9rica","La uretra prost\u00e1tica","El verumontanum"],"c":2,"e":"El adenocarcinoma prost\u00e1tico asienta sobre todo en la <b>zona perif\u00e9rica</b> posterior, por eso es accesible al <b>tacto rectal</b>. El PSA elevado, el tacto y la biopsia forman la tr\u00edada diagn\u00f3stica."},{"n":"4","noShuffle":false,"img":null,"q":"El tumor testicular maligno m\u00e1s frecuente, radiosensible y de buen pron\u00f3stico, con c\u00e9lulas de citoplasma claro en nidos y estroma linfocitario, es:","o":["Carcinoma embrionario","Seminoma","Teratoma","Coriocarcinoma"],"c":2,"e":"El <b>seminoma</b> es el tumor germinal testicular m\u00e1s frecuente (pico ~40 a\u00f1os), formado por c\u00e9lulas uniformes de citoplasma claro en nidos con tabiques de linfocitos. Es muy <b>radiosensible</b> y de buen pron\u00f3stico."},{"n":"5","noShuffle":false,"img":null,"q":"Tumor testicular germinal no seminomatoso que produce alfa-fetoprote\u00edna y muestra cuerpos de Schiller-Duval:","o":["Seminoma","Tumor del saco vitelino","Tumor de c\u00e9lulas de Leydig","Linfoma"],"c":2,"e":"El <b>tumor del saco vitelino (seno endod\u00e9rmico)</b> es el tumor testicular m\u00e1s frecuente en ni\u00f1os; produce <b>alfa-fetoprote\u00edna</b> y muestra los caracter\u00edsticos <b>cuerpos de Schiller-Duval</b> (estructuras perivasculares)."},{"n":"6","noShuffle":false,"img":null,"q":"La criptorquidia (test\u00edculo no descendido) se asocia a mayor riesgo de:","o":["El hidrocele benigno simple","Tumores germinales y atrofia","La orquitis bacteriana aguda","El varicocele izquierdo cr\u00f3nico"],"c":2,"e":"La <b>criptorquidia</b> aumenta el riesgo de <b>tumores germinales</b> (tambi\u00e9n en el test\u00edculo contralateral) y de atrofia tubular con infertilidad. La orquidopexia precoz reduce, pero no elimina, el riesgo."},{"noShuffle":false,"img":null,"q":"El ant\u00edgeno prost\u00e1tico espec\u00edfico (PSA):","o":["Es exclusivo del c\u00e1ncer prost\u00e1tico","Sube tambi\u00e9n en HBP y prostatitis","Solo se eleva si hay met\u00e1stasis","Es un marcador de tumor testicular"],"c":2,"e":"El <b>PSA</b> es \u00f3rgano-espec\u00edfico pero NO c\u00e1ncer-espec\u00edfico: se eleva tambi\u00e9n en HBP, prostatitis y tras manipulaci\u00f3n. El c\u00e1ncer produce ~10 veces m\u00e1s PSA por gramo, pero el diagn\u00f3stico exige biopsia.","n":"7"},{"noShuffle":false,"img":null,"q":"Marcadores s\u00e9ricos elevados en el coriocarcinoma testicular:","o":["Alfa-fetoprote\u00edna","Beta-hCG","Calcitonina","CA 19-9"],"c":2,"e":"El <b>coriocarcinoma</b> produce <b>beta-hCG</b> elevada (deriva del sincitiotrofoblasto). Es muy agresivo con diseminaci\u00f3n hemat\u00f3gena precoz. La AFP marca el tumor del saco vitelino.","n":"8"},{"noShuffle":false,"img":null,"q":"El tumor testicular de c\u00e9lulas de Leydig puede producir:","o":["Producir hipogonadismo central","Hormonas esteroideas sexuales","Producir beta-hCG elevada","Producir alfa-fetoprote\u00edna s\u00e9rica"],"c":2,"e":"El tumor de <b>c\u00e9lulas de Leydig</b> es un tumor de los cordones sexuales/estroma que puede secretar <b>andr\u00f3genos o estr\u00f3genos</b> (pubertad precoz en ni\u00f1os, ginecomastia en adultos). Contiene cristaloides de Reinke.","n":"9"}],"cervix":[{"n":"1","noShuffle":false,"img":null,"q":"El agente etiol\u00f3gico fundamental del carcinoma de cuello uterino es:","o":["El virus del herpes simple tipo 2","El virus del papiloma humano","El citomegalovirus humano","La Chlamydia trachomatis"],"c":2,"e":"El <b>VPH de alto riesgo (16 y 18)</b> es la causa principal del carcinoma de c\u00e9rvix. Infecta las c\u00e9lulas basales inmaduras en la <b>uni\u00f3n escamoso-cil\u00edndrica</b>; sus oncoprote\u00ednas E6 y E7 inactivan p53 y Rb."},{"n":"2","noShuffle":false,"img":null,"q":"La zona del cuello uterino m\u00e1s vulnerable a la infecci\u00f3n por VPH y origen de la mayor\u00eda de los carcinomas es:","o":["El endoc\u00e9rvix glandular puro","La uni\u00f3n escamoso-cil\u00edndrica","El exoc\u00e9rvix maduro","El istmo uterino"],"c":2,"e":"La <b>zona de transformaci\u00f3n (uni\u00f3n escamoso-cil\u00edndrica)</b>, con su epitelio metapl\u00e1sico escamoso, es donde el VPH infecta y donde surgen las lesiones intraepiteliales (SIL/CIN) y el carcinoma escamoso."},{"n":"3","noShuffle":false,"img":null,"q":"Las oncoprote\u00ednas E6 y E7 del VPH de alto riesgo act\u00faan inactivando, respectivamente:","o":["KRAS y APC","p53 y Rb","BRCA1 y BRCA2","c-KIT y BCL2"],"c":2,"e":"La oncoprote\u00edna <b>E6</b> degrada <b>p53</b> y la <b>E7</b> inactiva <b>Rb</b>, eliminando dos frenos clave del ciclo celular. Por eso el VPH de alto riesgo es carcinog\u00e9nico en el c\u00e9rvix."},{"n":"4","noShuffle":false,"img":null,"q":"La lesi\u00f3n precursora del adenocarcinoma de endometrio tipo I (endometrioide) es:","o":["La atrofia endometrial senil","La hiperplasia at\u00edpica endometrial","El p\u00f3lipo endometrial fibroso grande","La metaplasia escamosa cervical"],"c":2,"e":"El adenocarcinoma endometrioide (tipo I) surge de la <b>hiperplasia endometrial at\u00edpica</b> en contexto de <b>hiperestrogenismo</b> (obesidad, anovulaci\u00f3n, tamoxifeno, nuliparidad). Suele ser bien diferenciado y de buen pron\u00f3stico."},{"n":"5","noShuffle":false,"img":null,"q":"El tumor m\u00e1s frecuente del \u00fatero, benigno y de m\u00fasculo liso, es:","o":["El leiomiosarcoma uterino","El leiomioma o mioma","El adenocarcinoma endometrial","El carcinosarcoma uterino"],"c":2,"e":"El <b>leiomioma</b> ('mioma') es el tumor uterino (y p\u00e9lvico) m\u00e1s frecuente; benigno, de m\u00fasculo liso, hormonodependiente, bien delimitado y con fasc\u00edculos entrelazados. El leiomiosarcoma es raro y maligno (atipia, mitosis, necrosis)."},{"noShuffle":false,"img":null,"q":"La c\u00e9lula caracter\u00edstica del efecto citop\u00e1tico del VPH, con halo perinuclear y n\u00facleo at\u00edpico, es:","o":["El coilocito","La c\u00e9lula de Reed-Sternberg","La c\u00e9lula en anillo de sello","El cuerpo de psammoma"],"c":1,"e":"El <b>coilocito</b> (halo perinuclear claro y n\u00facleo arrugado/at\u00edpico) es el sello citol\u00f3gico de la infecci\u00f3n por VPH en la lesi\u00f3n escamosa intraepitelial de bajo grado (L-SIL/CIN 1).","n":"6"},{"noShuffle":false,"img":null,"q":"El segundo tipo histol\u00f3gico de c\u00e1ncer de c\u00e9rvix, originado en el epitelio glandular endocervical y tambi\u00e9n ligado al VPH, es:","o":["Carcinoma de c\u00e9lulas peque\u00f1as","Adenocarcinoma cervical","Sarcoma botrioides","Carcinoma basocelular"],"c":2,"e":"El <b>adenocarcinoma cervical</b> (endocervical) es el segundo tipo tras el escamoso, tambi\u00e9n asociado al VPH de alto riesgo. Tiene variantes mucinosa, endometrioide y serosa.","n":"7"},{"noShuffle":false,"img":null,"q":"La adenomiosis se define como:","o":["Endometrio fuera de la cavidad uterina","Endometrio dentro del miometrio","Hiperplasia endometrial con atipia","P\u00f3lipo endometrial pediculado"],"c":2,"e":"La <b>adenomiosis</b> es la presencia de tejido endometrial (gl\u00e1ndulas + estroma) <b>dentro del miometrio</b>, que produce \u00fatero aumentado y dismenorrea. La <b>endometriosis</b> es endometrio fuera del \u00fatero (ovario, peritoneo).","n":"8"},{"noShuffle":false,"img":null,"q":"La endometriosis ov\u00e1rica que forma quistes con contenido hemorr\u00e1gico achocolatado se denomina:","o":["Cistoadenoma seroso","Quiste de chocolate","Teratoma","Cuerpo l\u00fateo"],"c":2,"e":"El <b>endometrioma</b> ('quiste de chocolate') es endometriosis ov\u00e1rica con sangrado c\u00edclico que acumula sangre degradada marr\u00f3n. La endometriosis causa dolor, dismenorrea e infertilidad.","n":"9"}],"ovario":[{"n":"1","noShuffle":false,"img":null,"q":"Los tumores ov\u00e1ricos m\u00e1s frecuentes, derivados del epitelio de superficie, incluyen el subtipo m\u00e1s com\u00fan que es:","o":["El tumor de c\u00e9lulas de la granulosa","El tumor seroso","El teratoma maduro","El disgerminoma"],"c":2,"e":"Los tumores <b>epiteliales serosos</b> son los m\u00e1s frecuentes del ovario (cistoadenoma \u2192 borderline \u2192 cistoadenocarcinoma seroso). Los de alto grado se asocian a BRCA y muestran <b>cuerpos de psammoma</b>."},{"n":"2","noShuffle":false,"img":null,"q":"Mujer joven con tumor ov\u00e1rico qu\u00edstico que contiene pelo, sebo, dientes y epitelios de las tres hojas embrionarias. El diagn\u00f3stico es:","o":["El cistoadenoma mucinoso ov\u00e1rico","El teratoma qu\u00edstico maduro","El disgerminoma radiosensible","El tumor de Brenner transicional"],"c":2,"e":"El <b>teratoma qu\u00edstico maduro (quiste dermoide)</b> es el tumor de c\u00e9lulas germinales m\u00e1s frecuente; benigno, contiene tejidos de las <b>tres capas germinales</b> (pelo, sebo, dientes, piel). Raro: transformaci\u00f3n maligna escamosa."},{"n":"3","noShuffle":false,"img":null,"q":"Una met\u00e1stasis ov\u00e1rica bilateral de un adenocarcinoma g\u00e1strico con c\u00e9lulas en anillo de sello se denomina:","o":["Tumor de Brenner","Tumor de Krukenberg","Tumor de la granulosa","Disgerminoma"],"c":2,"e":"El <b>tumor de Krukenberg</b> es una met\u00e1stasis ov\u00e1rica (habitualmente bilateral) de un adenocarcinoma con <b>c\u00e9lulas en anillo de sello</b>, t\u00edpicamente de origen <b>g\u00e1strico</b> o colorrectal."},{"n":"4","noShuffle":false,"img":null,"q":"El marcador s\u00e9rico cl\u00e1sicamente asociado al carcinoma seroso de ovario es:","o":["AFP","CA-125","PSA","Calcitonina"],"c":2,"e":"El <b>CA-125</b> es el marcador del carcinoma epitelial seroso de ovario, \u00fatil en seguimiento y respuesta al tratamiento (poco espec\u00edfico para cribado). La AFP/\u03b2-hCG marcan tumores germinales."},{"noShuffle":false,"img":null,"q":"Un tumor ovariano epitelial 'borderline' (de bajo potencial maligno) se caracteriza por:","o":["Invasi\u00f3n franca destructiva del estroma","Atipia sin invasi\u00f3n del estroma","Met\u00e1stasis presentes al diagn\u00f3stico","C\u00e9lulas en anillo de sello difusas"],"c":2,"e":"Los tumores <b>borderline</b> muestran proliferaci\u00f3n y atipia epitelial <b>sin invasi\u00f3n estromal destructiva</b>; tienen pron\u00f3stico intermedio, mejor que el carcinoma invasor, y aparecen en mujeres m\u00e1s j\u00f3venes.","n":"5"},{"noShuffle":false,"img":null,"q":"El tumor de c\u00e9lulas de la granulosa del ovario puede producir estr\u00f3genos y mostrar:","o":["Cuerpos de psammoma","Cuerpos de Call-Exner","Cuerpos de Schiller-Duval","Cristaloides de Reinke"],"c":2,"e":"El <b>tumor de c\u00e9lulas de la granulosa</b> (cordones sexuales/estroma) secreta <b>estr\u00f3genos</b> (pubertad precoz, hiperplasia/c\u00e1ncer endometrial, hemorragia postmenop\u00e1usica) y muestra <b>cuerpos de Call-Exner</b>.","n":"6"},{"noShuffle":false,"img":null,"q":"El disgerminoma es el equivalente ov\u00e1rico del seminoma testicular y se caracteriza por:","o":["Produce alfa-fetoprote\u00edna elevada","Radiosensible con c\u00e9lulas claras","Contiene las tres capas germinales","Secreta estr\u00f3genos en exceso"],"c":2,"e":"El <b>disgerminoma</b> es el tumor germinal maligno m\u00e1s frecuente del ovario; equivalente al seminoma, <b>radiosensible</b>, con c\u00e9lulas grandes de citoplasma claro y tabiques linfocitarios. Marcador: LDH (a veces \u03b2-hCG).","n":"7"},{"noShuffle":false,"img":null,"q":"El tumor de Brenner del ovario est\u00e1 formado por:","o":["Epitelio transicional (urotelial)","C\u00e9lulas de la granulosa neopl\u00e1sicas","Tejido de las tres hojas embrionarias","C\u00e9lulas en anillo de sello mucosas"],"c":1,"e":"El <b>tumor de Brenner</b> es un tumor epitelial ov\u00e1rico de <b>epitelio transicional (urotelial)</b> en nidos sobre estroma fibroso denso. Suele ser benigno e incidental.","n":"8"}],"mama":[{"n":"1","noShuffle":false,"img":null,"q":"El tumor benigno de mama m\u00e1s frecuente en mujeres j\u00f3venes, m\u00f3vil y bien delimitado, es:","o":["Carcinoma ductal in situ","Fibroadenoma","Carcinoma lobulillar","Tumor Phyllodes maligno"],"c":2,"e":"El <b>fibroadenoma</b> es el tumor benigno mamario m\u00e1s frecuente en j\u00f3venes: n\u00f3dulo m\u00f3vil, bien delimitado, de doble componente (estroma + gl\u00e1ndulas). El tumor Phyllodes es su pariente de estroma m\u00e1s celular y potencialmente maligno."},{"n":"2","noShuffle":false,"img":null,"q":"El comedocarcinoma es una variante de:","o":["Carcinoma ductal in situ","Carcinoma lobulillar invasivo cl\u00e1sico","Fibroadenoma juvenil mamario","Enfermedad fibroqu\u00edstica benigna"],"c":1,"e":"El <b>comedocarcinoma</b> es una variante de <b>carcinoma ductal in situ (CDIS)</b> de alto grado con <b>necrosis central</b> (material que se exprime como un comed\u00f3n) y microcalcificaciones visibles en mamograf\u00eda."},{"n":"3","noShuffle":false,"img":null,"q":"El carcinoma lobulillar (in situ e invasivo) se caracteriza t\u00edpicamente por la p\u00e9rdida de expresi\u00f3n de:","o":["Receptores de estr\u00f3geno","E-cadherina","Citoqueratina","Actina"],"c":2,"e":"La p\u00e9rdida de <b>E-cadherina</b> es t\u00edpica del carcinoma lobulillar y explica su patr\u00f3n infiltrante en 'fila india' y su multifocalidad/bilateralidad. El CLIS es marcador de riesgo de carcinoma en ambas mamas."},{"n":"4","noShuffle":false,"img":null,"q":"En el carcinoma de mama, los factores predictivos que gu\u00edan el tratamiento son la expresi\u00f3n de:","o":["CA-125 y AFP en suero","Receptores hormonales y HER2","PSA y fosfatasa \u00e1cida prost\u00e1tica","CD117 (c-KIT) y DOG1"],"c":2,"e":"La determinaci\u00f3n de <b>receptores hormonales (RE/RP)</b> y de <b>HER2</b> es clave: define el uso de hormonoterapia (tamoxifeno) y de anti-HER2 (trastuzumab). El triple negativo (RE/RP/HER2 negativos) tiene peor pron\u00f3stico."},{"n":"5","noShuffle":false,"img":null,"q":"La enfermedad de Paget del pez\u00f3n se asocia a:","o":["Un fibroadenoma subyacente benigno","Un carcinoma ductal subyacente","Una mastitis aguda bacteriana","Una necrosis grasa traum\u00e1tica"],"c":2,"e":"La <b>enfermedad de Paget</b> del pez\u00f3n es una lesi\u00f3n eccematosa con <b>c\u00e9lulas de Paget</b> (c\u00e9lulas de adenocarcinoma) en la epidermis, que indica un <b>carcinoma ductal subyacente</b> (in situ o invasivo)."},{"noShuffle":false,"img":null,"q":"La enfermedad fibroqu\u00edstica de la mama:","o":["Es una lesi\u00f3n claramente maligna","Es una alteraci\u00f3n benigna com\u00fan","Evoluciona siempre a carcinoma","Es exclusiva de la postmenopausia"],"c":2,"e":"La <b>enfermedad fibroqu\u00edstica</b> es la alteraci\u00f3n mamaria benigna m\u00e1s frecuente (quistes, fibrosis, adenosis). El riesgo de c\u00e1ncer depende del grado de hiperplasia: la hiperplasia at\u00edpica s\u00ed aumenta el riesgo.","n":"6"},{"noShuffle":false,"img":null,"q":"El carcinoma de mama invasivo m\u00e1s frecuente, que forma nidos/cordones con desmoplasia (consistencia dura), es:","o":["Carcinoma lobulillar invasivo","Carcinoma ductal infiltrante","Carcinoma medular","Carcinoma mucinoso"],"c":2,"e":"El <b>carcinoma ductal infiltrante (de tipo no especial, NST)</b> es el m\u00e1s frecuente (~75%); forma nidos y cordones con marcada <b>desmoplasia</b> que le da consistencia p\u00e9trea y retracci\u00f3n.","n":"7"},{"noShuffle":false,"img":null,"q":"El patr\u00f3n infiltrante 'en fila india' por p\u00e9rdida de E-cadherina corresponde al:","o":["El carcinoma ductal infiltrante","El carcinoma lobulillar invasivo","El carcinoma tubular bien diferenciado","El comedocarcinoma in situ"],"c":2,"e":"El <b>carcinoma lobulillar invasivo</b> infiltra en <b>'fila india'</b> por p\u00e9rdida de <b>E-cadherina</b>; tiende a ser multic\u00e9ntrico y bilateral, y a veces dif\u00edcil de detectar por imagen.","n":"8"},{"noShuffle":false,"img":null,"q":"El subtipo molecular de c\u00e1ncer de mama 'triple negativo' (RE-, RP-, HER2-) se caracteriza por:","o":["Excelente respuesta a hormonoterapia","Peor pron\u00f3stico sin diana hormonal","Crecimiento muy lento e indolente","Baja edad sin relevancia cl\u00ednica"],"c":2,"e":"El <b>triple negativo</b> carece de dianas hormonales y de HER2, por lo que no se beneficia de hormonoterapia ni trastuzumab; tiene <b>peor pron\u00f3stico</b> y se asocia a mutaciones BRCA1.","n":"9"}],"endocrino":[{"n":"1","noShuffle":false,"img":null,"q":"El carcinoma de tiroides m\u00e1s frecuente, con n\u00facleos en 'vidrio esmerilado' (ojos de Orphan Annie), pseudoinclusiones y cuerpos de psammoma, es:","o":["Carcinoma folicular","Carcinoma papilar","Carcinoma medular","Carcinoma anapl\u00e1sico"],"c":2,"e":"El <b>carcinoma papilar</b> es el m\u00e1s frecuente (buen pron\u00f3stico, diseminaci\u00f3n linf\u00e1tica). Diagn\u00f3stico por rasgos <b>nucleares</b>: n\u00facleos claros en 'vidrio esmerilado' (Orphan Annie), pseudoinclusiones, hendiduras y <b>cuerpos de psammoma</b>."},{"n":"2","noShuffle":false,"img":null,"q":"El carcinoma medular de tiroides deriva de las c\u00e9lulas C parafoliculares y produce:","o":["Tiroglobulina","Calcitonina","TSH","Insulina"],"c":2,"e":"El <b>carcinoma medular</b> deriva de las <b>c\u00e9lulas C parafoliculares</b>, secreta <b>calcitonina</b> y muestra <b>estroma amiloide</b> (calcitonina depositada). Puede ser espor\u00e1dico o asociarse a MEN 2 (mutaci\u00f3n RET)."},{"n":"3","noShuffle":false,"img":null,"q":"Mujer joven con hipertiroidismo, bocio difuso y exoftalmos. El diagn\u00f3stico es:","o":["Tiroiditis de Hashimoto","Enfermedad de Graves-Basedow","Bocio multinodular t\u00f3xico","Carcinoma anapl\u00e1sico tiroideo"],"c":2,"e":"La <b>enfermedad de Graves</b> es la causa m\u00e1s frecuente de hipertiroidismo: bocio difuso, oftalmopat\u00eda (exoftalmos) y anticuerpos estimulantes del receptor de TSH (TSI). Histolog\u00eda: hiperplasia folicular con papilas y coloide festoneado."},{"n":"4","noShuffle":false,"img":null,"q":"Una tiroiditis cr\u00f3nica autoinmune con infiltrado linfocitario, centros germinales y c\u00e9lulas de H\u00fcrthle, que causa hipotiroidismo, es:","o":["Enfermedad de Graves","Tiroiditis de Hashimoto","Tiroiditis de De Quervain","Bocio coloide simple"],"c":2,"e":"La <b>tiroiditis de Hashimoto</b> es la causa m\u00e1s frecuente de hipotiroidismo en zonas con yodo suficiente: infiltrado linfoplasmocitario con <b>centros germinales</b> y <b>c\u00e9lulas de H\u00fcrthle</b> (ox\u00edfilas). Anticuerpos anti-TPO y anti-tiroglobulina."},{"n":"5","noShuffle":false,"img":null,"q":"Tumor de la m\u00e9dula suprarrenal derivado de c\u00e9lulas cromafines, productor de catecolaminas e hipertensi\u00f3n parox\u00edstica:","o":["Adenoma cortical","Feocromocitoma","Neuroblastoma metast\u00e1sico","Mielolipoma"],"c":2,"e":"El <b>feocromocitoma</b> deriva de las <b>c\u00e9lulas cromafines</b> de la m\u00e9dula suprarrenal, secreta <b>catecolaminas</b> y causa HTA (cl\u00e1sicamente parox\u00edstica con cefalea, sudoraci\u00f3n y palpitaciones). 'Regla del 10' y asociaci\u00f3n a MEN 2."},{"n":"6","noShuffle":false,"img":null,"q":"El adenoma hipofisario m\u00e1s frecuente es el:","o":["Adenoma corticotropo (ACTH)","Prolactinoma (lactotropo)","Adenoma somatotropo (GH)","Adenoma tirotropo (TSH)"],"c":2,"e":"El <b>prolactinoma</b> es el adenoma hipofisario funcionante m\u00e1s frecuente: causa galactorrea y amenorrea en mujeres y disfunci\u00f3n sexual en hombres. El de GH da acromegalia/gigantismo y el de ACTH, enfermedad de Cushing."},{"noShuffle":false,"img":null,"q":"El carcinoma folicular de tiroides se distingue del adenoma folicular por:","o":["Por sus rasgos nucleares claros","Por la invasi\u00f3n capsular/vascular","Por los cuerpos de psammoma","Por el estroma amiloide cong\u00f3filo"],"c":2,"e":"El <b>carcinoma folicular</b> se diagnostica por <b>invasi\u00f3n de la c\u00e1psula y/o vascular</b>, no por la citolog\u00eda (la PAAF no puede distinguirlo del adenoma). Disemina por v\u00eda hemat\u00f3gena (hueso, pulm\u00f3n).","n":"7"},{"noShuffle":false,"img":null,"q":"El carcinoma anapl\u00e1sico (indiferenciado) de tiroides se caracteriza por:","o":["Tener un pron\u00f3stico excelente","Ser muy agresivo en ancianos","Producir mucha calcitonina","Responder bien al yodo radiactivo"],"c":2,"e":"El <b>carcinoma anapl\u00e1sico</b> es raro pero de los tumores m\u00e1s letales: ancianos, masa cervical de crecimiento r\u00e1pido, c\u00e9lulas muy pleom\u00f3rficas/fusiformes. No capta yodo y tiene p\u00e9simo pron\u00f3stico.","n":"8"},{"noShuffle":false,"img":null,"q":"El hiperparatiroidismo primario se debe con m\u00e1s frecuencia a:","o":["Carcinoma paratiroideo","Adenoma paratiroideo \u00fanico","Hiperplasia de las cuatro gl\u00e1ndulas","Met\u00e1stasis"],"c":2,"e":"El <b>adenoma paratiroideo</b> \u00fanico es la causa m\u00e1s frecuente (~85%) de hiperparatiroidismo primario, con hipercalcemia, hipofosfatemia y lesiones \u00f3seas (oste\u00edtis fibrosa qu\u00edstica).","n":"9"},{"noShuffle":false,"img":null,"q":"El s\u00edndrome de Cushing por adenoma corticosuprarrenal o hiperplasia se debe a exceso de:","o":["Aldosterona","Cortisol","Catecolaminas","Andr\u00f3genos"],"c":2,"e":"El <b>s\u00edndrome de Cushing</b> resulta del exceso de <b>cortisol</b> (obesidad central, cara de luna llena, estr\u00edas, HTA, diabetes). Causas: iatr\u00f3gena, enfermedad de Cushing (adenoma hipofisario ACTH), adenoma suprarrenal o ACTH ect\u00f3pico.","n":"10"},{"noShuffle":false,"img":null,"q":"El tumor de la m\u00e9dula suprarrenal maligno m\u00e1s frecuente de la infancia, derivado de la cresta neural, con rosetas de Homer-Wright, es:","o":["Feocromocitoma","Neuroblastoma","Adenoma cortical","Mielolipoma"],"c":2,"e":"El <b>neuroblastoma</b> es un tumor maligno embrionario de c\u00e9lulas de la cresta neural (m\u00e9dula suprarrenal/ganglios simp\u00e1ticos) t\u00edpico de ni\u00f1os peque\u00f1os; muestra <b>rosetas de Homer-Wright</b>, eleva catecolaminas urinarias y se asocia a amplificaci\u00f3n de N-MYC.","n":"11"},{"noShuffle":false,"img":null,"q":"El adenoma somatotropo hipofisario (productor de GH) causa:","o":["Galactorrea y amenorrea persistente","Acromegalia o gigantismo","Enfermedad de Cushing hipofisaria","Hipotiroidismo central"],"c":2,"e":"El <b>adenoma de GH (somatotropo)</b> produce <b>acromegalia</b> en el adulto (crecimiento de manos, pies, mand\u00edbula, v\u00edsceras) y <b>gigantismo</b> si ocurre antes del cierre epifisario.","n":"12"}],"hemato":[{"n":"1","noShuffle":false,"img":null,"q":"La c\u00e9lula diagn\u00f3stica del linfoma de Hodgkin, binucleada 'en ojos de b\u00faho', positiva para CD15 y CD30, es:","o":["La c\u00e9lula de Burkitt","La c\u00e9lula de Reed-Sternberg","El linfocito velloso","La c\u00e9lula de S\u00e9zary cerebriforme"],"c":2,"e":"La <b>c\u00e9lula de Reed-Sternberg</b> (binucleada, 'ojos de b\u00faho', <b>CD15+ y CD30+</b>) es diagn\u00f3stica del <b>linfoma de Hodgkin</b>. Es minoritaria dentro de un fondo inflamatorio reactivo; su ausencia descarta el diagn\u00f3stico."},{"n":"2","noShuffle":false,"img":null,"q":"El linfoma no Hodgkin m\u00e1s frecuente en adultos, agresivo, es:","o":["El linfoma folicular indolente","El linfoma B de c\u00e9lulas grandes","El linfoma de la zona marginal (MALT)","El linfoma del manto agresivo"],"c":2,"e":"El <b>linfoma B difuso de c\u00e9lulas grandes (LBDCG)</b> es el linfoma no Hodgkin m\u00e1s frecuente y un linfoma <b>agresivo</b> (potencialmente curable). El folicular es el indolente m\u00e1s com\u00fan."},{"n":"3","noShuffle":false,"img":null,"q":"Ni\u00f1o africano con masa mandibular de r\u00e1pido crecimiento; histolog\u00eda con patr\u00f3n en 'cielo estrellado' y traslocaci\u00f3n de c-MYC (t8;14). El diagn\u00f3stico es:","o":["Linfoma de Hodgkin","Linfoma de Burkitt","Leucemia linf\u00e1tica cr\u00f3nica","Mieloma m\u00faltiple"],"c":2,"e":"El <b>linfoma de Burkitt</b> es muy agresivo, con alt\u00edsimo \u00edndice proliferativo y patr\u00f3n en <b>'cielo estrellado'</b> (macr\u00f3fagos entre c\u00e9lulas tumorales). Se asocia a traslocaci\u00f3n de <b>c-MYC (t8;14)</b> y al VEB (forma end\u00e9mica africana)."},{"n":"4","noShuffle":false,"img":null,"q":"Var\u00f3n mayor con dolores \u00f3seos, lesiones l\u00edticas, hipercalcemia y prote\u00edna monoclonal con cadenas ligeras en orina (Bence-Jones). El diagn\u00f3stico es:","o":["Linfoma folicular","Mieloma m\u00faltiple","Leucemia mieloide aguda","Linfoma de Hodgkin"],"c":2,"e":"El <b>mieloma m\u00faltiple</b> es una proliferaci\u00f3n clonal de <b>c\u00e9lulas plasm\u00e1ticas</b> en m\u00e9dula \u00f3sea: lesiones \u00f3seas l\u00edticas ('sacabocados'), hipercalcemia, insuficiencia renal, anemia y componente monoclonal (proteinuria de <b>Bence-Jones</b>)."},{"n":"5","noShuffle":false,"img":null,"q":"Diferencia conceptual entre leucemia y linfoma:","o":["Son exactamente lo mismo","Leucemia en sangre; linfoma s\u00f3lido","El linfoma es siempre benigno","La leucemia nunca afecta la sangre"],"c":2,"e":"La <b>leucemia</b> afecta predominantemente <b>m\u00e9dula \u00f3sea y sangre perif\u00e9rica</b>; el <b>linfoma</b> forma masas s\u00f3lidas en ganglios u \u00f3rganos. Ambos son malignos y pueden solaparse (un linfoma puede 'leucemizarse')."},{"noShuffle":false,"img":null,"q":"El linfoma no Hodgkin INDOLENTE m\u00e1s frecuente, con patr\u00f3n nodular y translocaci\u00f3n t(14;18) que sobreexpresa BCL2, es:","o":["Linfoma de Burkitt","Linfoma folicular","Linfoma B difuso de c\u00e9lulas grandes","Linfoma del manto"],"c":2,"e":"El <b>linfoma folicular</b> es el linfoma indolente m\u00e1s frecuente; patr\u00f3n nodular, fenotipo de centro germinal (CD10+, BCL6+) y <b>t(14;18)</b> que sobreexpresa <b>BCL2</b> (inhibidor de apoptosis). El BCL2+ lo distingue de la hiperplasia folicular reactiva.","n":"6"},{"noShuffle":false,"img":null,"q":"El linfoma del manto se asocia a la translocaci\u00f3n:","o":["t(8;14) \u2013 oncog\u00e9n c-MYC","t(11;14) \u2013 ciclina D1","t(14;18) \u2013 prote\u00edna BCL2","t(9;22) \u2013 BCR-ABL"],"c":2,"e":"El <b>linfoma del manto</b> porta la <b>t(11;14)</b>, que sobreexpresa <b>ciclina D1 (CCND1)</b> y es CD5+. Es agresivo y de mal pron\u00f3stico pese a tener morfolog\u00eda de c\u00e9lula peque\u00f1a.","n":"7"},{"noShuffle":false,"img":null,"q":"Las c\u00e9lulas leuc\u00e9micas con bastones de Auer en el citoplasma indican:","o":["Leucemia linfobl\u00e1stica aguda","Leucemia mieloide aguda","Leucemia linf\u00e1tica cr\u00f3nica","Tricoleucemia"],"c":2,"e":"Los <b>bastones de Auer</b> (agregados de gr\u00e1nulos azur\u00f3filos) son patognom\u00f3nicos de blastos <b>mieloides</b>, presentes en la <b>leucemia mieloide aguda</b>. Ayudan a diferenciarla de la linfobl\u00e1stica.","n":"8"},{"noShuffle":false,"img":null,"q":"La leucemia aguda m\u00e1s frecuente en la infancia es:","o":["Leucemia mieloide aguda","Leucemia linfobl\u00e1stica aguda","Leucemia linf\u00e1tica cr\u00f3nica B","Tricoleucemia de adultos"],"c":2,"e":"La <b>leucemia linfobl\u00e1stica aguda (LLA)</b> es la neoplasia maligna m\u00e1s frecuente de la infancia (pico 2-5 a\u00f1os); buena respuesta al tratamiento. La LLC es de adultos mayores.","n":"9"},{"noShuffle":false,"img":null,"q":"La micosis fungoide y su fase leuc\u00e9mica (s\u00edndrome de S\u00e9zary) son:","o":["Linfomas B de zona marginal","Linfomas T cut\u00e1neos CD4+","Leucemias mieloides cr\u00f3nicas","Carcinomas cut\u00e1neos basales"],"c":2,"e":"La <b>micosis fungoide</b> es un <b>linfoma T cut\u00e1neo</b> (CD4+) con c\u00e9lulas cerebriformes que infiltran la epidermis (microabscesos de Pautrier); su diseminaci\u00f3n sangu\u00ednea es el <b>s\u00edndrome de S\u00e9zary</b>.","n":"10"},{"noShuffle":false,"img":null,"q":"Los subtipos del linfoma de Hodgkin cl\u00e1sico incluyen como m\u00e1s frecuente:","o":["Predominio linfoc\u00edtico","Esclerosis nodular","Depleci\u00f3n linfoc\u00edtica","Celularidad mixta"],"c":2,"e":"La <b>esclerosis nodular</b> es el subtipo m\u00e1s frecuente del Hodgkin cl\u00e1sico (mujeres j\u00f3venes, mediastino), con bandas de col\u00e1geno y c\u00e9lulas lacunares. Todos los cl\u00e1sicos tienen c\u00e9lulas de Reed-Sternberg CD15+/CD30+.","n":"11"}],"locomotor":[{"n":"1","noShuffle":false,"img":null,"q":"El tumor \u00f3seo maligno primario m\u00e1s frecuente, que aparece en la met\u00e1fisis de huesos largos de adolescentes y forma osteoide neopl\u00e1sico, es:","o":["Condrosarcoma","Osteosarcoma","Sarcoma de Ewing","Tumor de c\u00e9lulas gigantes"],"c":2,"e":"El <b>osteosarcoma</b> es el sarcoma \u00f3seo primario m\u00e1s frecuente; pico en adolescentes, <b>met\u00e1fisis</b> de huesos largos (rodilla). Define el diagn\u00f3stico la producci\u00f3n de <b>osteoide neopl\u00e1sico</b>; radiolog\u00eda con tri\u00e1ngulo de Codman."},{"n":"2","noShuffle":false,"img":null,"q":"El tumor \u00f3seo BENIGNO m\u00e1s frecuente, una excrecencia con casquete de cart\u00edlago en continuidad con la cortical, es:","o":["Osteosarcoma","Osteocondroma","Condrosarcoma","Sarcoma de Ewing"],"c":2,"e":"El <b>osteocondroma</b> es el tumor \u00f3seo benigno m\u00e1s frecuente: excrecencia metafisaria con <b>casquete de cart\u00edlago</b> y tallo \u00f3seo continuo con la cortical. Las formas m\u00faltiples (exostosis hereditaria) se asocian a mutaci\u00f3n EXT1/EXT2."},{"n":"3","noShuffle":false,"img":null,"q":"El liposarcoma mixoide se caracteriza por:","o":["Producir osteoide neopl\u00e1sico","Matriz mixoide con lipoblastos","Empalizadas nucleares de Verocay","C\u00e9lulas en anillo de sello"],"c":2,"e":"El <b>liposarcoma</b> es uno de los sarcomas de partes blandas m\u00e1s frecuentes del adulto; la variante <b>mixoide</b> muestra matriz bas\u00f3fila, <b>lipoblastos</b> y una red vascular capilar plexiforme ('alambre de gallinero')."},{"n":"4","noShuffle":false,"img":null,"q":"El tumor benigno de la vaina nerviosa con \u00e1reas Antoni A (empalizadas nucleares de Verocay) y Antoni B es:","o":["Neurofibroma","Schwannoma","Leiomioma","Fibrosarcoma"],"c":2,"e":"El <b>schwannoma</b> es un tumor benigno encapsulado de c\u00e9lulas de Schwann, con \u00e1reas celulares <b>Antoni A</b> (empalizadas nucleares = <b>cuerpos de Verocay</b>) y \u00e1reas laxas Antoni B. S-100 positivo."},{"noShuffle":false,"img":null,"q":"El sarcoma de Ewing es un tumor \u00f3seo maligno de la infancia/adolescencia que:","o":["Producir osteoide neopl\u00e1sico","C\u00e9lulas peque\u00f1as azules, t(11;22)","Formar un casquete de cart\u00edlago hialino","Ser un tumor benigno indolente"],"c":2,"e":"El <b>sarcoma de Ewing</b> es un tumor de <b>c\u00e9lulas peque\u00f1as redondas azules</b> con <b>t(11;22)</b> (EWS-FLI1), CD99+, en di\u00e1fisis de huesos largos; reacci\u00f3n peri\u00f3stica 'en capas de cebolla'. Muy agresivo.","n":"5"},{"noShuffle":false,"img":null,"q":"El tumor \u00f3seo de c\u00e9lulas gigantes ('tumor pardo' no; osteoclastoma) se localiza t\u00edpicamente en:","o":["La di\u00e1fisis de los huesos largos","La ep\u00edfisis de la rodilla","El cr\u00e1neo y los huesos planos","Las costillas y el estern\u00f3n"],"c":2,"e":"El <b>tumor de c\u00e9lulas gigantes (osteoclastoma)</b> asienta en la <b>ep\u00edfisis</b> de huesos largos (rodilla) del adulto joven; localmente agresivo, con c\u00e9lulas gigantes multinucleadas tipo osteoclasto. Aspecto radiol\u00f3gico 'en pompas de jab\u00f3n'.","n":"6"},{"noShuffle":false,"img":null,"q":"Los cristales de urato monos\u00f3dico, con birrefringencia negativa, en una articulaci\u00f3n inflamada definen:","o":["Condrocalcinosis (pseudogota)","Gota","Artritis reumatoide","Artrosis"],"c":2,"e":"La <b>gota</b> se debe al dep\u00f3sito de cristales de <b>urato monos\u00f3dico</b> (aciculares, birrefringencia <b>negativa</b>), que forman tofos y artritis aguda (t\u00edpica del primer dedo del pie). La pseudogota es por pirofosfato c\u00e1lcico (birrefringencia positiva).","n":"7"},{"noShuffle":false,"img":null,"q":"La artritis reumatoide se caracteriza histol\u00f3gicamente por:","o":["Pannus sinovial inflamatorio","Dep\u00f3sito de cristales de urato","Osteofitos sin signos inflamatorios","Necrosis caseosa articular"],"c":1,"e":"La <b>artritis reumatoide</b> es una poliartritis autoinmune con <b>pannus</b> (sinovial proliferativa inflamatoria) que destruye cart\u00edlago y hueso. Cursa con factor reumatoide y anti-CCP; afecta peque\u00f1as articulaciones de forma sim\u00e9trica.","n":"8"}],"dermato":[{"noShuffle":false,"img":null,"q":"Seg\u00fan el temario, la dermatitis espongi\u00f3tica cuyo prototipo es el ECCEMA se caracteriza histol\u00f3gicamente por:","o":["Acantolisis suprabasal extensa","Espongiosis epid\u00e9rmica","Vasculitis leucocitocl\u00e1stica","Granulomas d\u00e9rmicos profundos"],"c":2,"e":"La <b>dermatitis espongi\u00f3tica (eccema)</b> se define por la <b>espongiosis</b>: edema entre los queratinocitos que separa las c\u00e9lulas epid\u00e9rmicas. Se acompa\u00f1a de hallazgos inespec\u00edficos como acantosis e hiperqueratosis.","n":"1"},{"noShuffle":false,"img":null,"q":"La PSORIASIS es el prototipo de dermatitis psoriasiforme; sus hallazgos histol\u00f3gicos incluyen:","o":["Espongiosis con ves\u00edculas intraepid\u00e9rmicas","Acantosis con microabscesos de Munro","Acantolisis suprabasal extensa","Ves\u00edcula subepid\u00e9rmica tensa"],"c":2,"e":"La <b>psoriasis</b> muestra <b>acantosis</b> regular, <b>paraqueratosis confluente</b> y ac\u00famulos de neutr\u00f3filos: <b>microabscesos de Munro</b> en la c\u00f3rnea y p\u00fastulas espongiformes de Kogoj en la epidermis.","n":"2"},{"noShuffle":false,"img":null,"q":"La dermatitis de interfase (liquenoide), cuyo prototipo es el LIQUEN PLANO, se caracteriza por:","o":["Espongiosis epid\u00e9rmica difusa pura","Infiltrado liquenoide 'en banda'","Acantolisis suprabasal completa","Vasculitis de peque\u00f1o vaso"],"c":2,"e":"La <b>dermatitis de interfase (liquen plano)</b> muestra un infiltrado linfocitario <b>'en banda'</b> en la uni\u00f3n dermoepid\u00e9rmica, <b>alteraci\u00f3n vacuolar de los queratinocitos basales</b> y queratinocitos apopt\u00f3ticos; en fases cr\u00f3nicas, incontinencia pigmentaria.","n":"3"},{"noShuffle":false,"img":null,"q":"El P\u00c9NFIGO VULGAR (dermatitis ves\u00edculo-ampollosa) se caracteriza por:","o":["Ves\u00edcula subepid\u00e9rmica","Acantolisis SUPRABASAL","Espongiosis","Paraqueratosis confluente"],"c":2,"e":"El <b>p\u00e9nfigo vulgar</b> produce <b>acantolisis suprabasal</b>: una ampolla <b>intraepid\u00e9rmica</b> por autoanticuerpos contra desmogle\u00edna (desmosomas). El penfigoide ampolloso y la dermatitis herpetiforme dan ampolla <b>subepid\u00e9rmica</b>.","n":"4"},{"noShuffle":false,"img":null,"q":"La diferencia clave entre el p\u00e9nfigo vulgar y el penfigoide ampolloso es la localizaci\u00f3n de la ampolla:","o":["Ambas dan ampolla subepid\u00e9rmica","P\u00e9nfigo intraepid\u00e9rmico; penfigoide subepid\u00e9rmico","Ambas dan ampolla intraepid\u00e9rmica","P\u00e9nfigo subepid\u00e9rmico; penfigoide intraepid\u00e9rmico"],"c":2,"e":"En el <b>p\u00e9nfigo vulgar</b> la ampolla es <b>intraepid\u00e9rmica</b> (acantolisis suprabasal). En el <b>penfigoide ampolloso</b> y la dermatitis herpetiforme la ampolla es <b>subepid\u00e9rmica</b> (despegamiento de toda la epidermis).","n":"5"},{"noShuffle":false,"img":null,"q":"El nevus melanoc\u00edtico es una neoplasia melanoc\u00edtica benigna; el nevus DISPL\u00c1SICO (at\u00edpico) se define por:","o":["Cumplir todos los criterios de melanoma","Atipia sin criterios de melanoma","Ser siempre una lesi\u00f3n maligna","Carecer por completo de melanocitos"],"c":2,"e":"El <b>nevus displ\u00e1sico/at\u00edpico</b> presenta cierta atipia arquitectural y citol\u00f3gica pero <b>sin criterios concluyentes de melanoma</b>; cl\u00ednicamente es un marcador de riesgo y, en s\u00edndromes m\u00faltiples, de predisposici\u00f3n a melanoma.","n":"6"},{"noShuffle":false,"img":null,"q":"En el melanoma cut\u00e1neo, los dos par\u00e1metros histol\u00f3gicos de profundidad que recoge el temario son:","o":["El grado de Gleason y el TNM cl\u00ednico","Nivel de Clark y Breslow","El \u00edndice Ki67 y las mitosis","La asimetr\u00eda y los bordes"],"c":2,"e":"El melanoma se eval\u00faa con el <b>nivel de Clark</b> (capa anat\u00f3mica invadida) y, sobre todo, el <b>\u00edndice de Breslow</b> (espesor tumoral vertical en mm), que es el factor pron\u00f3stico m\u00e1s importante.","n":"7"},{"noShuffle":false,"img":null,"q":"La enfermedad de Bowen corresponde a:","o":["Un melanoma in situ epid\u00e9rmico","Un carcinoma escamoso in situ","Un nevus azul d\u00e9rmico profundo","Una dermatitis granulomatosa"],"c":2,"e":"La <b>enfermedad de Bowen</b> es un <b>carcinoma escamoso (epidermoide) in situ</b>: atipia de queratinocitos en todo el grosor epid\u00e9rmico con paraqueratosis y disqueratosis, sin invasi\u00f3n de la membrana basal.","n":"8"},{"noShuffle":false,"img":null,"q":"El carcinoma BASOCELULAR descrito en el temario muestra:","o":["Perlas c\u00f3rneas y puentes intercelulares","Nidos basaloides con empalizada","Acantolisis suprabasal extensa","Espongiosis epid\u00e9rmica difusa"],"c":2,"e":"El <b>carcinoma basocelular</b> forma <b>nidos de c\u00e9lulas basaloides con empalizada perif\u00e9rica</b>; cl\u00ednicamente es una lesi\u00f3n <b>nodular indolora de crecimiento lento</b> en zonas fotoexpuestas. Crece localmente y casi nunca metastatiza.","n":"9"},{"noShuffle":false,"img":null,"q":"El carcinoma epidermoide (escamoso) cut\u00e1neo infiltrante se caracteriza por:","o":["Empalizada basaloide perif\u00e9rica densa","Queratinizaci\u00f3n con perlas c\u00f3rneas","Espongiosis epid\u00e9rmica difusa","Ves\u00edcula subepid\u00e9rmica tensa"],"c":2,"e":"El <b>carcinoma epidermoide infiltrante</b> muestra nidos de c\u00e9lulas escamosas at\u00edpicas con <b>queratinizaci\u00f3n (perlas c\u00f3rneas)</b> que invaden la dermis. Mayor riesgo metast\u00e1sico que el basocelular; factores de mal pron\u00f3stico: grosor, Clark \u2265IV, invasi\u00f3n perineural.","n":"10"},{"noShuffle":false,"img":null,"q":"La micosis fungoide, incluida en el temario entre las neoplasias linfoides cut\u00e1neas, es:","o":["Una infecci\u00f3n cut\u00e1nea por hongos","Un linfoma T cut\u00e1neo (CD4+)","Un carcinoma basocelular nodular","Una dermatitis espongi\u00f3tica cr\u00f3nica"],"c":2,"e":"Pese a su nombre, la <b>micosis fungoide</b> es un <b>linfoma T cut\u00e1neo</b> (no una micosis); las c\u00e9lulas T at\u00edpicas infiltran la epidermis (microabscesos de Pautrier). Su diseminaci\u00f3n sangu\u00ednea es el <b>s\u00edndrome de S\u00e9zary</b>.","n":"11"}],"neuro":[{"n":"1","noShuffle":false,"img":null,"q":"El tumor cerebral primario maligno m\u00e1s frecuente del adulto, grado IV, con necrosis en pseudoempalizada y proliferaci\u00f3n microvascular, es:","o":["Meningioma","Glioblastoma","Oligodendroglioma","Ependimoma"],"c":2,"e":"El <b>glioblastoma</b> (astrocitoma grado IV) es el tumor primario maligno m\u00e1s frecuente y agresivo del SNC adulto. Histolog\u00eda: <b>necrosis en pseudoempalizada</b> y <b>proliferaci\u00f3n microvascular</b>. Cruza la l\u00ednea media ('en alas de mariposa')."},{"n":"2","noShuffle":false,"img":null,"q":"Tumor extraaxial benigno, m\u00e1s frecuente en mujeres, derivado de las c\u00e9lulas aracnoideas, con remolinos y cuerpos de psammoma:","o":["Glioblastoma","Meningioma","Meduloblastoma","Schwannoma"],"c":2,"e":"El <b>meningioma</b> es un tumor benigno <b>extraaxial</b> de las c\u00e9lulas meningoteliales (aracnoides), m\u00e1s frecuente en mujeres, con patr\u00f3n en <b>remolinos (whorls)</b> y <b>cuerpos de psammoma</b>. Comprime, no infiltra."},{"n":"3","noShuffle":false,"img":null,"q":"Tumor maligno cerebeloso de la infancia, embrionario (de c\u00e9lulas peque\u00f1as azules), grado IV:","o":["Astrocitoma piloc\u00edtico","Meduloblastoma","Meningioma","Oligodendroglioma"],"c":2,"e":"El <b>meduloblastoma</b> es un tumor embrionario maligno (grado IV) del <b>cerebelo</b> infantil, formado por c\u00e9lulas peque\u00f1as y azules con rosetas de Homer-Wright. Tiende a diseminar por el LCR."},{"n":"4","noShuffle":false,"img":null,"q":"El astrocitoma piloc\u00edtico (frecuente en ni\u00f1os, buen pron\u00f3stico) muestra caracter\u00edsticamente:","o":["Necrosis en pseudoempalizada","Fibras de Rosenthal","Cuerpos de psammoma","C\u00e9lulas en anillo de sello"],"c":2,"e":"El <b>astrocitoma piloc\u00edtico</b> es un glioma de bajo grado (grado I) t\u00edpico de ni\u00f1os/cerebelo, bien delimitado y curable con cirug\u00eda; muestra <b>fibras de Rosenthal</b> y cuerpos granulares eosin\u00f3filos."},{"noShuffle":false,"img":null,"q":"El edema cerebral por alteraci\u00f3n de la barrera hematoencef\u00e1lica (tumores, abscesos) es de tipo:","o":["Citot\u00f3xico","Vasog\u00e9nico","Intersticial","Hidrost\u00e1tico"],"c":2,"e":"El edema <b>vasog\u00e9nico</b> se debe a la rotura de la barrera hematoencef\u00e1lica con paso de l\u00edquido al espacio extracelular (tumores, abscesos, traumatismos). El <b>citot\u00f3xico</b> es por lesi\u00f3n celular (isquemia/hipoxia).","n":"5"},{"noShuffle":false,"img":null,"q":"El oligodendroglioma se caracteriza histol\u00f3gicamente por:","o":["Necrosis en pseudoempalizada extensa","C\u00e9lulas 'en huevo frito', 1p/19q","Cuerpos de psammoma laminados","Rosetas de Homer-Wright t\u00edpicas"],"c":2,"e":"El <b>oligodendroglioma</b> muestra c\u00e9lulas mon\u00f3tonas '<b>en huevo frito</b>' (halo perinuclear), red capilar 'en alambre de gallinero' y calcificaciones; la <b>codeleci\u00f3n 1p/19q</b> es diagn\u00f3stica y de buen pron\u00f3stico.","n":"6"},{"noShuffle":false,"img":null,"q":"El schwannoma vestibular bilateral es caracter\u00edstico de:","o":["Neurofibromatosis tipo 1","Neurofibromatosis tipo 2","Esclerosis tuberosa","Von Hippel-Lindau"],"c":2,"e":"Los <b>schwannomas vestibulares (ac\u00fasticos) bilaterales</b> definen la <b>neurofibromatosis tipo 2</b> (gen NF2/merlina). La NF1 se asocia a neurofibromas, manchas caf\u00e9 con leche y gliomas \u00f3pticos.","n":"7"},{"noShuffle":false,"img":null,"q":"La met\u00e1stasis es la causa m\u00e1s frecuente de tumor intracraneal en el adulto; los primarios que m\u00e1s metastatizan al SNC incluyen:","o":["Pr\u00f3stata, tiroides y mama","Pulm\u00f3n, mama y melanoma","Colon y p\u00e1ncreas","Vejiga y ri\u00f1\u00f3n"],"c":2,"e":"Las <b>met\u00e1stasis</b> superan en frecuencia a los tumores cerebrales primarios. Los que m\u00e1s diseminan al SNC son <b>pulm\u00f3n, mama y melanoma</b> (y ri\u00f1\u00f3n, colon), t\u00edpicamente en la uni\u00f3n c\u00f3rtico-subcortical, m\u00faltiples y bien delimitados.","n":"8"}],"cabcuello":[{"n":"1","noShuffle":false,"img":null,"q":"La lesi\u00f3n premaligna m\u00e1s frecuente de la cavidad oral es:","o":["El liquen plano","La leucoplasia","El mucocele","La candidiasis"],"c":2,"e":"La <b>leucoplasia</b> (placa blanca que no se desprende y no corresponde a otra entidad) es la lesi\u00f3n premaligna oral m\u00e1s frecuente; un porcentaje progresa a <b>carcinoma escamoso</b>. La eritroplasia, menos frecuente, tiene mayor riesgo de malignizaci\u00f3n."},{"n":"2","noShuffle":false,"img":null,"q":"El tumor m\u00e1s frecuente de las gl\u00e1ndulas salivales (sobre todo par\u00f3tida), benigno y de estroma mixto condromixoide, es:","o":["Tumor de Warthin","Adenoma pleomorfo","Carcinoma mucoepidermoide","Carcinoma adenoide qu\u00edstico"],"c":2,"e":"El <b>adenoma pleomorfo (tumor mixto benigno)</b> es el tumor salival m\u00e1s frecuente, t\u00edpico de la <b>par\u00f3tida</b>; mezcla componente epitelial y mesenquimal (condromixoide). Riesgo de recidiva si se extirpa incompleto y rara transformaci\u00f3n maligna."},{"n":"3","noShuffle":false,"img":null,"q":"El tumor de Warthin (cistoadenoma papilar linfomatoso) se caracteriza por:","o":["Estroma condroide y mixoide hialino","Oncocitos sobre estroma linfoide","C\u00e9lulas en anillo de sello","Empalizadas nucleares de Verocay"],"c":2,"e":"El <b>tumor de Warthin</b> es el segundo tumor benigno m\u00e1s frecuente de la par\u00f3tida (casi exclusivo de ella, a veces bilateral); muestra <b>epitelio oncoc\u00edtico en doble capa</b> sobre <b>estroma linfoide</b> con centros germinales. Asociado al tabaco."}],"respira":[{"n":"1","noShuffle":false,"img":null,"q":"El enfisema centroacinar (centrolobulillar) se asocia fundamentalmente a:","o":["D\u00e9ficit de \u03b11-antitripsina","Tabaquismo","Asbesto","Infecci\u00f3n tuberculosa"],"c":2,"e":"El <b>enfisema centroacinar</b> afecta la parte central del acino y se asocia al <b>tabaco</b> (predomina en l\u00f3bulos superiores). El <b>panacinar</b> se asocia al <b>d\u00e9ficit de \u03b11-antitripsina</b> (predomina en bases)."},{"n":"2","noShuffle":false,"img":null,"q":"Carcinoma de pulm\u00f3n de localizaci\u00f3n CENTRAL, asociado intensamente al tabaco, con perlas c\u00f3rneas y puentes intercelulares, y que produce hipercalcemia paraneopl\u00e1sica (PTHrP):","o":["Adenocarcinoma","Carcinoma escamoso","Carcinoma microc\u00edtico","Carcinoide"],"c":2,"e":"El <b>carcinoma escamoso</b> de pulm\u00f3n es <b>central</b>, muy ligado al tabaco, con queratinizaci\u00f3n (<b>perlas c\u00f3rneas</b>) y s\u00edndrome paraneopl\u00e1sico de <b>hipercalcemia</b> por PTHrP."},{"n":"3","noShuffle":false,"img":null,"q":"Carcinoma pulmonar central, muy agresivo, de c\u00e9lulas peque\u00f1as, fuertemente asociado al tabaco y a s\u00edndromes paraneopl\u00e1sicos (SIADH, Cushing):","o":["El adenocarcinoma perif\u00e9rico","El carcinoma microc\u00edtico","El carcinoma escamoso central","El mesotelioma pleural"],"c":2,"e":"El <b>carcinoma microc\u00edtico (de c\u00e9lulas peque\u00f1as)</b> es central, muy agresivo, de origen neuroendocrino, casi siempre en fumadores. Da paraneopl\u00e1sicos como <b>SIADH</b> (hiponatremia) y <b>Cushing</b> ect\u00f3pico. Se trata con quimio/radioterapia, no cirug\u00eda."},{"n":"4","noShuffle":false,"img":null,"q":"El carcinoma de pulm\u00f3n m\u00e1s frecuente, de localizaci\u00f3n perif\u00e9rica y el m\u00e1s com\u00fan en NO fumadores, es:","o":["Adenocarcinoma","Carcinoma escamoso","Carcinoma microc\u00edtico","Carcinoma de c\u00e9lulas grandes"],"c":1,"e":"El <b>adenocarcinoma</b> es el carcinoma pulmonar m\u00e1s frecuente, de localizaci\u00f3n <b>perif\u00e9rica</b>, derivado de gl\u00e1ndulas mucosas; es el tipo m\u00e1s com\u00fan en <b>no fumadores</b> y mujeres. Puede dar acropaquias paraneopl\u00e1sicas."},{"n":"5","noShuffle":false,"img":null,"q":"La exposici\u00f3n a asbesto se asocia de forma caracter\u00edstica al desarrollo de:","o":["Carcinoide bronquial","Mesotelioma pleural","Sarcoidosis","Enfisema panacinar"],"c":2,"e":"El <b>asbesto</b> se asocia al <b>mesotelioma</b> pleural maligno y a la asbestosis (con <b>cuerpos ferruginosos</b>). El tabaco multiplica sin\u00e9rgicamente el riesgo de carcinoma broncog\u00e9nico en expuestos al asbesto."},{"noShuffle":false,"img":null,"q":"El enfisema panacinar (panlobulillar), que predomina en bases pulmonares, se asocia a:","o":["El tabaquismo cr\u00f3nico intenso","El d\u00e9ficit de \u03b11-AT","La exposici\u00f3n al asbesto","La infecci\u00f3n tuberculosa"],"c":2,"e":"El <b>enfisema panacinar</b> (destrucci\u00f3n uniforme del acino, predominio en bases) se asocia al <b>d\u00e9ficit de \u03b11-antitripsina</b>, que deja la elastasa sin freno. El centroacinar (v\u00e9rtices) se asocia al tabaco.","n":"6"},{"noShuffle":false,"img":null,"q":"La bronquitis cr\u00f3nica se define cl\u00ednicamente por:","o":["Disnea s\u00fabita y sibilancias","Tos cr\u00f3nica \u22653 meses, 2 a\u00f1os","Hemoptisis aislada recurrente","Dolor pleur\u00edtico inspiratorio"],"c":2,"e":"La <b>bronquitis cr\u00f3nica</b> es una definici\u00f3n cl\u00ednica: <b>tos productiva \u22653 meses al a\u00f1o durante 2 a\u00f1os consecutivos</b>. Histol\u00f3gicamente hay hiperplasia de gl\u00e1ndulas mucosas (\u00edndice de Reid aumentado).","n":"7"},{"noShuffle":false,"img":null,"q":"El asbesto (asbestosis) produce, como hallazgo histol\u00f3gico caracter\u00edstico:","o":["Cuerpos de psammoma calcificados","Cuerpos ferruginosos y fibrosis","Granulomas no caseificantes","Cuerpos de Mallory hep\u00e1ticos"],"c":2,"e":"La <b>asbestosis</b> muestra <b>cuerpos ferruginosos</b> (fibras de asbesto recubiertas de hierro), fibrosis intersticial y <b>placas pleurales</b>. Aumenta el riesgo de mesotelioma y carcinoma broncog\u00e9nico.","n":"8"},{"noShuffle":false,"img":null,"q":"La sarcoidosis pulmonar se caracteriza por:","o":["Granulomas caseificantes extensos","Granulomas no caseificantes","Cuerpos ferruginosos pleurales","Pus abundante con neutr\u00f3filos"],"c":2,"e":"La <b>sarcoidosis</b> es una enfermedad sist\u00e9mica con <b>granulomas no caseificantes</b>, adenopat\u00edas hiliares bilaterales y posibles cuerpos de Schaumann y asteroides. Diagn\u00f3stico de exclusi\u00f3n (descartar TBC).","n":"9"}],"tecnicas":[{"n":"1","noShuffle":false,"img":null,"q":"La inmunohistoqu\u00edmica se basa en:","o":["La reacci\u00f3n ant\u00edgeno-anticuerpo","La amplificaci\u00f3n en cadena del ADN","La tinci\u00f3n con rojo Congo polarizado","El cariotipo de las c\u00e9lulas tumorales"],"c":1,"e":"La <b>inmunohistoqu\u00edmica</b> detecta ant\u00edgenos celulares mediante una <b>reacci\u00f3n ant\u00edgeno-anticuerpo</b> visualizada con un crom\u00f3geno. Sirve para clasificar tumores indiferenciados y localizar el origen de met\u00e1stasis."},{"n":"2","noShuffle":false,"img":null,"q":"Para confirmar el origen EPITELIAL de un tumor indiferenciado, el marcador inmunohistoqu\u00edmico m\u00e1s \u00fatil es:","o":["Vimentina","Citoqueratinas","CD45 (ant\u00edgeno com\u00fan leucocitario)","S-100"],"c":2,"e":"Las <b>citoqueratinas</b> marcan estirpe <b>epitelial</b> (carcinomas). La vimentina marca mes\u00e9nquima, el <b>CD45</b> linfomas/leucemias y la <b>S-100</b> melanoma y tumores neurales. Es el panel b\u00e1sico del tumor indiferenciado."},{"n":"3","noShuffle":false,"img":null,"q":"Ante una tumoraci\u00f3n de gl\u00e1ndula salival, tiroides o mama, la t\u00e9cnica citol\u00f3gica de primera l\u00ednea para obtener c\u00e9lulas es:","o":["La citolog\u00eda exfoliativa cervical","La punci\u00f3n-aspiraci\u00f3n (PAAF)","La biopsia incisional amplia","Las improntas de autopsia"],"c":2,"e":"La <b>PAAF (punci\u00f3n-aspiraci\u00f3n con aguja fina)</b> es una t\u00e9cnica r\u00e1pida, barata y poco invasiva para muestrear masas palpables o guiadas por imagen (tiroides, mama, salival, ganglio). Aporta diagn\u00f3stico citol\u00f3gico previo a la cirug\u00eda."},{"n":"4","noShuffle":false,"img":null,"q":"La citolog\u00eda cervicovaginal (test de Papanicolaou) es una citolog\u00eda de tipo:","o":["Una citolog\u00eda por punci\u00f3n (PAAF)","Exfoliativa, de cribado cervical","Una citolog\u00eda intraoperatoria","Una citolog\u00eda de l\u00edquidos serosos"],"c":2,"e":"El <b>Papanicolaou</b> es una <b>citolog\u00eda exfoliativa</b> de cribado del c\u00e1ncer de c\u00e9rvix: detecta lesiones escamosas intraepiteliales (SIL) y el efecto citop\u00e1tico del VPH (coilocitos) antes de que aparezca carcinoma invasor."},{"noShuffle":false,"img":null,"q":"Para identificar un tumor de origen MELANOC\u00cdTICO (melanoma) en inmunohistoqu\u00edmica se usan marcadores como:","o":["Las citoqueratinas de amplio espectro","La S-100, Melan-A y HMB-45","El CD45 leucocitario com\u00fan","La desmina del m\u00fasculo"],"c":2,"e":"El melanoma expresa <b>S-100, Melan-A (MART-1) y HMB-45</b>. \u00datil cuando es amelan\u00f3tico o indiferenciado. Las citoqueratinas marcan carcinoma; CD45, linfoma; desmina/actina, m\u00fasculo.","n":"5"},{"noShuffle":false,"img":null,"q":"Los marcadores neuroendocrinos usados para identificar tumores como el carcinoide o el microc\u00edtico son:","o":["La vimentina y el CD34 vascular","Cromogranina y sinaptofisina","Las CK7 y CK20 epiteliales","Los receptores de estr\u00f3geno"],"c":2,"e":"La <b>cromogranina A</b> y la <b>sinaptofisina</b> son los marcadores neuroendocrinos cl\u00e1sicos (tambi\u00e9n CD56). Identifican carcinoides, carcinoma microc\u00edtico de pulm\u00f3n, feocromocitoma y otros tumores neuroendocrinos.","n":"6"},{"noShuffle":false,"img":null,"q":"La t\u00e9cnica de hibridaci\u00f3n in situ fluorescente (FISH) se usa habitualmente para:","o":["Para te\u00f1ir l\u00edpidos tisulares","Para detectar amplificaciones g\u00e9nicas","Para medir el pH del tejido","Para sustituir la hematoxilina-eosina"],"c":2,"e":"La <b>FISH</b> detecta alteraciones cromos\u00f3micas (amplificaciones como <b>HER2</b>, translocaciones como las de sarcomas/linfomas) usando sondas fluorescentes sobre el ADN del tejido.","n":"7"},{"noShuffle":false,"img":null
