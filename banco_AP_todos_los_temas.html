<!--
=============================================================
  MOTOR BANCO MIR — v10
  Novedades respecto a v9:
  - Numeración correlativa fija por sección (no se mezcla)
  - Badge neutro en pestaña "Todos" + mezcla real inter-secciones
  - Temporizador sticky editable en header (play/pausa/reset)
  - Buscador de texto en tiempo real
  - Modo repaso rápido (muestra RC + explicación directamente)
  - Estadísticas de errores recurrentes entre sesiones
=============================================================
-->
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">Banco MIR</title>
<style>
:root{
  --bg:#f4f3ef;--surf:#fff;--bd:#e5e5e5;--bd2:#ddd;
  --txt:#1a1a1a;--txt2:#555;--txt3:#999;--txt4:#666;
  --hdr:#1a1a1a;--hdr-t:#fff;
  --ok-bg:#e6f9ef;--ok-t:#0b6e52;--ok-bd:#2da060;
  --ko-bg:#fdecea;--ko-t:#b91c1c;--ko-bd:#d94f45;
  --sc-ok:#dcf5ed;--sc-ko:#fdecea;--sc-rem:#f0f0f0;--sc-rem-t:#666;
  --exp:#fffbe6;--exp-bd:#f0c04a;--exp-t:#5a4500;
  --prog:#e5e5e5;--prog-fill:#1a56db;
  --star:#ccc;--star-on:#f59e0b;
  --hint:#fafafa;--hint-bd:#eee;
  --tab-bd:#ddd;--tab-t:#555;
  --all-bg:#e8f0fe;--all-t:#1a56db;--all-bd:#1a56db;
  --fab:#1a1a1a;--fab-t:#fff;
  --nota-btn-t:#1a56db;--nota-btn-bd:#1a56db;--nota-btn-bg:var(--surf);
  --timer-bg:#222;--timer-t:#fff;--timer-danger:#ef4444;
}
[data-theme="dark"]{
  --bg:#0f0f1a;--surf:#1e1e30;--bd:#2a2a45;--bd2:#333355;
  --txt:#e8e8f0;--txt2:#aaa;--txt3:#555;--txt4:#888;
  --hdr:#0a0a14;--hdr-t:#e8e8f0;
  --ok-bg:#0b3020;--ok-t:#4ade80;--ok-bd:#166534;
  --ko-bg:#2d0a0a;--ko-t:#f87171;--ko-bd:#7f1d1d;
  --sc-ok:#0b3020;--sc-ko:#2d0a0a;--sc-rem:#252540;--sc-rem-t:#aaa;
  --exp:#1a1500;--exp-bd:#a37f10;--exp-t:#d4b84a;
  --prog:#2a2a45;--prog-fill:#60a5fa;
  --star:#444;--star-on:#f59e0b;
  --hint:#1a1a2e;--hint-bd:#2a2a45;
  --tab-bd:#2a2a45;--tab-t:#aaa;
  --all-bg:#1a2a4a;--all-t:#60a5fa;--all-bd:#3b82f6;
  --fab:#2a2a50;--fab-t:#e8e8f0;
  --nota-btn-t:#60a5fa;--nota-btn-bd:#3b82f6;--nota-btn-bg:var(--surf);
  --timer-bg:#1a1a2e;--timer-t:#e8e8f0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .25s,color .25s}

/* ── Header ── */
header{background:var(--hdr);color:var(--hdr-t);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
header h1{font-size:13.5px;font-weight:600;white-space:nowrap}
.hright{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hmeta{font-size:11px;color:#888}
.hbtn{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:3px 5px;border-radius:5px;transition:background .15s;color:var(--hdr-t)}
.hbtn:hover{background:rgba(255,255,255,.12)}
.sbadge{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:500}
.sbadge.ok{background:#15803d;color:#dcfce7}.sbadge.warn{background:#92400e;color:#fef3c7}

/* ── Temporizador ── */
#timer-wrap{display:flex;align-items:center;gap:4px;background:var(--timer-bg);border-radius:7px;padding:3px 8px;border:1px solid rgba(255,255,255,.1)}
#timer-display{font-size:13px;font-weight:700;font-family:monospace;color:var(--timer-t);min-width:58px;text-align:center;cursor:pointer;border-radius:3px;padding:1px 3px}
#timer-display:hover{background:rgba(255,255,255,.08)}
#timer-display.editing{background:rgba(255,255,255,.15);outline:none;color:var(--timer-t)}
#timer-display.danger{color:var(--timer-danger)}
#timer-wrap button{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:12px;padding:1px 3px;border-radius:3px;line-height:1}
#timer-wrap button:hover{background:rgba(255,255,255,.12);color:#fff}

/* ── Barra de progreso ── */
#prog-wrap{height:3px;background:var(--prog);position:sticky;top:40px;z-index:99}
#prog-bar{height:100%;background:var(--prog-fill);width:0%;transition:width .4s}

/* ── Contenedor ── */
.container{max-width:820px;margin:0 auto;padding:16px 12px}

/* ── Buscador ── */
.search-wrap{position:relative;margin-bottom:13px}
.search-wrap input{width:100%;padding:8px 34px 8px 12px;border:1.5px solid var(--bd2);border-radius:8px;font-size:13px;background:var(--surf);color:var(--txt);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--prog-fill)}
.search-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--txt3);font-size:16px;display:none;line-height:1}
#search-count{font-size:11px;color:var(--txt3);margin-top:4px;display:none}

/* ── Modo repaso ── */
.mode-bar{display:flex;gap:6px;margin-bottom:12px;align-items:center}
.mode-btn{padding:5px 12px;border:1.5px solid var(--bd2);border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;background:var(--surf);color:var(--txt2);transition:all .15s}
.mode-btn:hover{border-color:#999}
.mode-btn.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Tabs ── */
.tabs{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.tab{padding:7px 14px;border:1.5px solid var(--tab-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;background:var(--surf);color:var(--tab-t);transition:all .15s}
.tab:hover{border-color:#999;color:var(--txt)}
.tab.t-all.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Score global ── */
.ph-global{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 15px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-left:4px solid var(--prog-fill)}
.score-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.sc{font-size:12px;font-weight:600;padding:3px 9px;border-radius:6px}
.sc.ok{background:var(--sc-ok);color:var(--ok-t)}.sc.ko{background:var(--sc-ko);color:var(--ko-t)}.sc.rem{background:var(--sc-rem);color:var(--sc-rem-t)}

/* ── Acciones ── */
.global-actions{display:none;margin-bottom:10px;gap:7px;flex-wrap:wrap;align-items:center}
.container[data-tab="all"] .global-actions{display:flex}
.sec-actions{margin:6px 0 15px;display:flex;gap:7px;flex-wrap:wrap}
.reset-btn{padding:7px 14px;background:var(--fab);color:var(--fab-t);border:none;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:opacity .15s}
.reset-btn:hover{opacity:.82}
.nota-btn{padding:7px 14px;background:var(--nota-btn-bg);color:var(--nota-btn-t);border:1.5px solid var(--nota-btn-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:background .15s}
.nota-btn:hover{background:var(--all-bg)}

/* ── Nota box ── */
.nota-box,.global-nota-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:2px solid var(--bd2);font-size:13px;line-height:1.7;display:none}
.nota-box.pass,.global-nota-box.pass{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t)}
.nota-box.fail,.global-nota-box.fail{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t)}
.nota-score{font-size:26px;font-weight:700;display:block;margin-bottom:4px}
.nota-detail{font-size:12px;opacity:.85;font-family:monospace}

/* ── Vista revisión ── */
.review-list{margin-top:12px;border-top:1px solid var(--bd2);padding-top:10px}
.review-title{font-size:12px;font-weight:700;margin-bottom:9px;color:var(--txt)}
.review-sec-label{font-size:11.5px;font-weight:700;color:var(--txt3);margin:8px 0 5px;padding-top:6px;border-top:1px solid var(--bd)}
.review-item{background:var(--surf);border-radius:8px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden}
.review-item summary{padding:9px 12px;cursor:pointer;font-size:12.5px;color:var(--txt);list-style:none;display:flex;gap:8px;align-items:flex-start}
.review-item summary::-webkit-details-marker{display:none}
.review-item summary::before{content:'▶';font-size:9px;color:var(--txt3);flex-shrink:0;margin-top:4px;transition:transform .18s}
details[open] summary::before{transform:rotate(90deg)}
.review-body{padding:0 12px 11px}
.review-ans{font-size:12px;color:var(--ok-t);margin-bottom:7px;font-weight:500}

/* ── Estadísticas ── */
.stats-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--surf);display:none}
.stats-box.show{display:block}
.stats-title{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--txt)}
.stats-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12.5px}
.stats-item:last-child{border-bottom:none}
.stats-bar-wrap{flex:1;background:var(--sc-rem);border-radius:4px;height:6px;overflow:hidden}
.stats-bar{height:100%;background:var(--ko-bd);border-radius:4px;transition:width .4s}
.stats-n{font-size:11px;color:var(--txt3);white-space:nowrap}
.stats-q{flex:2;color:var(--txt);font-size:12px;line-height:1.3}

/* ── Panel secciones ── */
.sec-panel{display:none}.sec-panel.visible{display:block}
.ph{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ph-left{flex:1;display:flex;flex-direction:column;gap:5px}
.ph-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:1px}
.ph-desc{font-size:12px;color:var(--txt4)}
.fbtn{padding:6px 12px;font-size:12px;font-weight:500;border:1.5px solid var(--bd2);border-radius:8px;cursor:pointer;background:var(--surf);color:var(--txt2);transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:#999;color:var(--txt)}.fbtn.on{background:var(--ko-bg);color:#b91c1c;border-color:#f87171}
.no-failed{display:none;text-align:center;padding:16px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin-top:4px}
.no-failed.show{display:block}
.no-results{display:none;text-align:center;padding:20px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin:8px 0}

/* ── Hint ── */
.hint{font-size:11px;color:var(--txt3);margin-bottom:15px;padding:7px 11px;background:var(--hint);border-radius:6px;border:1px solid var(--hint-bd)}

/* ── Tarjeta ── */
.qcard{background:var(--surf);border-radius:10px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden;transition:box-shadow .15s}
.qcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.qcard.kb-focus{outline:2px solid var(--prog-fill);outline-offset:-2px}
.qcard.search-hidden{display:none}
.qhead{padding:11px 13px;cursor:pointer;display:flex;align-items:flex-start;gap:9px}

/* ── Badge numérico ── */
.qnum{font-size:11px;font-weight:700;padding:3px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;background:var(--sc-rem);color:var(--sc-rem-t)}
/* En pestaña "Todos" siempre neutro; en sección aplica color de sección */
.qnum.sec-colored{background:var(--sec-dim);color:var(--sec-col)}

.qtxt{font-size:13px;line-height:1.5;flex:1}
.star-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--star);padding:0 2px;flex-shrink:0;margin-top:2px;line-height:1;transition:color .15s,transform .15s}
.star-btn:hover{transform:scale(1.2)}
.star-btn .si{display:inline}.star-btn .sf{display:none}
.star-btn.on .si{display:none}.star-btn.on .sf{display:inline;color:var(--star-on)}
.chev{font-size:15px;color:var(--bd2);flex-shrink:0;margin-top:2px;transition:transform .2s}
.qhead.open .chev{transform:rotate(180deg)}
.qbody{display:none;padding:0 13px 13px}.qbody.open{display:block}

/* ── Imagen ── */
.clinimg-wrap{margin:9px 0 7px;background:#111;border-radius:8px;overflow:hidden;border:1px solid var(--bd2);text-align:center}
.clinimg{max-width:100%;max-height:340px;object-fit:contain;display:block;margin:0 auto}
.clinimg-cap{font-size:11px;color:var(--txt3);padding:4px 0 5px;background:var(--hint);border-top:1px solid var(--bd)}

/* ── Opciones ── */
.opts{list-style:none;margin-top:9px;display:flex;flex-direction:column;gap:5px}
.opt{padding:9px 12px;border-radius:8px;border:1.5px solid var(--bd2);cursor:pointer;display:flex;align-items:flex-start;gap:9px;color:var(--txt);font-size:13px;line-height:1.45;transition:border-color .12s,background .12s;user-select:none}
.opt:hover:not(.done){border-color:#999;background:var(--hint)}
.opt.correct{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t);font-weight:500;cursor:default}
.opt.wrong{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t);cursor:default}
.opt.done:not(.correct):not(.wrong){cursor:default;opacity:.7}
.onum{font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;min-width:15px}

/* ── Modo repaso rápido ── */
.quick-card{padding:9px 12px;border-radius:8px;border:1.5px solid var(--ok-bd);background:var(--ok-bg);margin-top:8px}
.quick-rc{font-size:12.5px;font-weight:600;color:var(--ok-t);margin-bottom:6px}

/* ── Explicación ── */
.expbox{margin-top:10px;padding:10px 12px;background:var(--exp);border-left:4px solid var(--exp-bd);border-radius:0 8px 8px 0;font-size:12.5px;color:var(--exp-t);line-height:1.65}
.expbox b,.expbox strong{font-weight:600}
.et{display:block;margin-bottom:4px;font-weight:600;font-size:13px}
.atag{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
.atag.ok{background:var(--sc-ok);color:var(--ok-t)}.atag.ko{background:var(--sc-ko);color:#c0392b}

/* ── All-tab CSS ── */
.container[data-tab="all"] .ph{display:none!important}
.container[data-tab="all"] .sec-actions{display:none!important}
.container[data-tab="all"] .no-failed{display:none!important}
.container[data-tab="all"] .nota-box{display:none!important}
.container:not([data-tab="all"]) .global-nota-box{display:none!important}
.container:not([data-tab="all"]) #stats-global{display:none!important}
</style>
</head>
<body>
<header>
  <h1 id="h-tit">Banco MIR</h1>
  <div class="hright">
    <span class="hmeta" id="h-meta"></span>
    <!-- Temporizador -->
    <div id="timer-wrap" title="Haz clic en el tiempo para editar">
      <span id="timer-display">0:00:00</span>
      <button id="btn-tplay" onclick="timerToggle()" title="Play/Pausa">▶</button>
      <button onclick="timerReset()" title="Reset">↺</button>
    </div>
    <button class="hbtn" id="btn-dark" onclick="toggleDark()" title="Modo oscuro">🌙</button>
    <span id="save-badge" class="sbadge"></span>
  </div>
</header>
<div id="prog-wrap"><div id="prog-bar"></div></div>

<div class="container" id="main-cont" data-tab="all">
  <!-- Buscador -->
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="🔍 Buscar en enunciados..." oninput="onSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div id="search-count"></div>

  <!-- Modo -->
  <div class="mode-bar">
    <span style="font-size:11.5px;color:var(--txt3);font-weight:600">MODO:</span>
    <button class="mode-btn on" id="mode-test" onclick="setMode('test')">📝 Test</button>
    <button class="mode-btn" id="mode-quick" onclick="setMode('quick')">⚡ Repaso rápido</button>
    <button class="mode-btn" id="btn-stars" onclick="filterStarred()" style="margin-left:auto;border-color:#f59e0b;color:#b45309">⭐ Marcadas</button>
    <button class="mode-btn" id="btn-stats" onclick="toggleStats()">📊 Errores</button>
  </div>

  <!-- Stats globales -->
  <div class="stats-box" id="stats-global"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabs-wrap"></div>

  <!-- Score global -->
  <div class="ph-global">
    <div class="ph-left">
      <span class="ph-desc" id="ph-gdesc"></span>
      <div class="score-row">
        <span class="sc ok" id="sc-ok-all">✓ 0</span>
        <span class="sc ko" id="sc-ko-all">✗ 0</span>
        <span class="sc rem" id="sc-rem-all">○ 0</span>
      </div>
    </div>
  </div>
  <div class="global-actions">
    <button class="reset-btn" onclick="resetAll()">↺ Reiniciar y mezclar</button>
    <button class="nota-btn" onclick="calcNotaAll()">✎ Calcular nota global</button>
  </div>
  <div class="global-nota-box" id="nota-all"></div>
  <p class="hint">💡 <b>1–5</b> responde · <b>↑↓</b> navega · <b>S</b> marca ⭐ · Progreso guardado automáticamente</p>

  <div id="panels-wrap"></div>
</div>

<script>
/* ═══════════════════════════════════════ MOTOR v10 ═══════════════════════════════════════ */

var D=/*__D_JSON__*/{"metab":[{"n":"1","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes afirmaciones sobre la amiloidosis es FALSA?","o":["El amiloide muestra birrefringencia verde-manzana con rojo Congo bajo luz polarizada.","Todas las formas de amiloide comparten la misma prote\u00edna precursora.","Ultraestructuralmente est\u00e1 formado por fibrillas con conformaci\u00f3n \u03b2-plegada.","La amiloidosis AA se asocia a procesos inflamatorios cr\u00f3nicos."],"c":2,"e":"Es falso: el amiloide es un grupo de prote\u00ednas distintas con un patr\u00f3n com\u00fan. <b>AL</b> deriva de cadenas ligeras de Ig, <b>AA</b> de la prote\u00edna SAA (inflamaci\u00f3n cr\u00f3nica). Lo com\u00fan es la estructura <b>\u03b2-plegada</b> y la tinci\u00f3n con <b>rojo Congo</b>."},{"n":"2","noShuffle":false,"img":null,"q":"La sustancia amiloide se identifica histol\u00f3gicamente de elecci\u00f3n mediante:","o":["Tinci\u00f3n de PAS para gluc\u00f3geno","Rojo Congo con luz polarizada","Azul de Prusia (t\u00e9cnica de Perls)","Tinci\u00f3n tricr\u00f3mica de Masson"],"c":2,"e":"El <b>rojo Congo</b> ti\u00f1e el amiloide y muestra la caracter\u00edstica <b>birrefringencia verde-manzana</b> con luz polarizada. El azul de Prusia es para hierro/hemosiderina y el PAS para gluc\u00f3geno/membranas basales."},{"n":"3","noShuffle":false,"img":null,"q":"Mujer con mieloma m\u00faltiple que desarrolla s\u00edndrome nefr\u00f3tico y miocardiopat\u00eda restrictiva. El tipo de amiloide m\u00e1s probable es:","o":["AA","A\u03b22-microglobulina","AL","ATTR"],"c":3,"e":"En discrasias de c\u00e9lulas plasm\u00e1ticas (mieloma) el amiloide es <b>AL</b>, derivado de <b>cadenas ligeras de inmunoglobulina</b>. La AA se asocia a inflamaci\u00f3n cr\u00f3nica y la A\u03b22m a hemodi\u00e1lisis prolongada."},{"n":"4","noShuffle":false,"img":null,"q":"En la diabetes mellitus, la lesi\u00f3n renal m\u00e1s caracter\u00edstica es:","o":["La necrosis tubular aguda isqu\u00e9mica","La glomeruloesclerosis nodular","La glomerulonefritis postinfecciosa aguda","La amiloidosis glomerular difusa"],"c":2,"e":"La <b>glomeruloesclerosis nodular (Kimmelstiel-Wilson)</b> con n\u00f3dulos PAS+ es la lesi\u00f3n renal t\u00edpica de la nefropat\u00eda diab\u00e9tica, junto con el engrosamiento difuso de la membrana basal glomerular."},{"n":"5","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes NO es un cambio morfol\u00f3gico propio de la diabetes mellitus de larga evoluci\u00f3n?","o":["La arterioloesclerosis hialina arteriolar","La microangiopat\u00eda con engrosamiento basal","La aterosclerosis acelerada de grandes vasos","La esteatosis hep\u00e1tica inespec\u00edfica"],"c":4,"e":"La esteatosis es inespec\u00edfica y no es la lesi\u00f3n definitoria de la diabetes. S\u00ed son t\u00edpicas la <b>arterioloesclerosis hialina</b>, la <b>microangiopat\u00eda</b> (engrosamiento de membranas basales) y la <b>aterosclerosis acelerada</b>."},{"n":"6","noShuffle":false,"img":null,"q":"La acumulaci\u00f3n de grasa hepatocelular (esteatosis hep\u00e1tica) t\u00edpicamente comienza en:","o":["Los hepatocitos periportales (zona 1)","Los hepatocitos centrolobulillares","Las c\u00e9lulas de Kupffer","El espacio de Disse"],"c":2,"e":"La esteatosis hep\u00e1tica suele iniciarse en los <b>hepatocitos centrolobulillares</b> (perivenulares, zona 3) y se extiende hacia las regiones periportales a medida que progresa. Las gotas pueden ser micro o macrovesiculares."},{"n":"7","noShuffle":false,"img":null,"q":"Las enfermedades por dep\u00f3sito lisos\u00f3mico (tesaurismosis) se caracterizan por:","o":["Exceso de producci\u00f3n de una prote\u00edna normal","D\u00e9ficit de una enzima lisos\u00f3mica","Dep\u00f3sito extracelular de cadenas ligeras","Mutaci\u00f3n activadora de un oncog\u00e9n"],"c":2,"e":"En las tesaurismosis hay un <b>d\u00e9ficit o defecto de una enzima lisos\u00f3mica</b>; el catabolismo es incompleto y los intermediarios insolubles se acumulan en los lisosomas. Son trastornos hereditarios (AR o ligados a X)."},{"n":"8","noShuffle":false,"img":null,"q":"La enfermedad de Tay-Sachs se debe al d\u00e9ficit de:","o":["Glucocerebrosidasa","Hexosaminidasa A","Esfingomielinasa","Alfa-galactosidasa A"],"c":2,"e":"Tay-Sachs = d\u00e9ficit de <b>hexosaminidasa A</b> con ac\u00famulo de gangli\u00f3sido GM2 en neuronas (mancha rojo cereza en m\u00e1cula). Glucocerebrosidasa \u2192 Gaucher; esfingomielinasa \u2192 Niemann-Pick; \u03b1-galactosidasa A \u2192 Fabry."},{"n":"9","noShuffle":false,"img":null,"q":"La antracosis pulmonar se produce por ac\u00famulo de:","o":["Dep\u00f3sito de hemosiderina tisular","Pigmento de carb\u00f3n inhalado","Dep\u00f3sito de melanina d\u00e9rmica","Ac\u00famulo de lipofuscina"],"c":2,"e":"La antracosis es el dep\u00f3sito de <b>pigmento de carb\u00f3n</b> inhalado, fagocitado por macr\u00f3fagos alveolares y transportado a ganglios linf\u00e1ticos. Las part\u00edculas son inertes; solo en grandes cantidades con destrucci\u00f3n tisular causan da\u00f1o (neumoconiosis del minero)."},{"n":"10","noShuffle":false,"img":null,"q":"La lipofuscina es un pigmento que se caracteriza por:","o":["Ser un pigmento ex\u00f3geno carbon\u00e1ceo inhalado","Ser un pigmento pardo de 'desgaste'","Derivar de la degradaci\u00f3n de la hemoglobina","Te\u00f1irse con la t\u00e9cnica de azul de Prusia"],"c":2,"e":"La <b>lipofuscina</b> ('pigmento de desgaste') es un material granuloso pardo-amarillento insoluble que se acumula con el <b>envejecimiento o la atrofia</b> (coraz\u00f3n, h\u00edgado, cerebro). Cuando abunda da el aspecto de 'atrofia parda'."},{"n":"11","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes asociaciones pigmento\u2013naturaleza es CORRECTA?","o":["Melanina \u2013 pigmento hemat\u00f3geno","Hemosiderina \u2013 pigmento f\u00e9rrico","Bilirrubina \u2013 pigmento ex\u00f3geno","Lipofuscina \u2013 pigmento hemat\u00f3geno"],"c":2,"e":"La <b>hemosiderina</b> es un pigmento granular <b>derivado de la hemoglobina</b>, amarillo-dorado, que se ti\u00f1e con azul de Prusia. La melanina y la lipofuscina son end\u00f3genos no hemat\u00f3genos; la bilirrubina es end\u00f3gena hemat\u00f3gena."},{"n":"12","noShuffle":false,"img":null,"q":"Var\u00f3n de 50 a\u00f1os con cirrosis micronodular, diabetes y pigmentaci\u00f3n cut\u00e1nea bronceada. Ac\u00famulo de hierro por mutaci\u00f3n del gen HFE. El diagn\u00f3stico es:","o":["Enfermedad de Wilson hep\u00e1tica","Hemocromatosis hereditaria","Porfiria cut\u00e1nea tarda","Amiloidosis sist\u00e9mica primaria"],"c":2,"e":"La tr\u00edada cirrosis + diabetes ('diabetes bronceada') + pigmentaci\u00f3n es la <b>hemocromatosis hereditaria</b> (mutaci\u00f3n <b>HFE</b>), con dep\u00f3sito de hierro en h\u00edgado, p\u00e1ncreas, coraz\u00f3n y piel y riesgo de hepatocarcinoma."},{"n":"13","noShuffle":false,"img":null,"q":"En la ictericia obstructiva (post-hep\u00e1tica, colest\u00e1sica) se espera encontrar:","o":["Bilirrubina no conjugada alta con orina normal","Bilirrubina conjugada alta con coluria","Bilirrubina no conjugada con heces pigmentadas","Ausencia total de bilirrubina s\u00e9rica"],"c":2,"e":"La obstrucci\u00f3n biliar eleva la <b>bilirrubina conjugada (soluble)</b>, que se elimina por orina (<b>coluria</b>); al no llegar bilis al intestino las heces quedan <b>hipoc\u00f3licas/ac\u00f3licas</b>. La no conjugada predomina en la ictericia prehep\u00e1tica/hemol\u00edtica."},{"n":"14","noShuffle":false,"img":null,"q":"El vit\u00edligo se caracteriza por:","o":["Aumento difuso de la producci\u00f3n de melanina","Despigmentaci\u00f3n por p\u00e9rdida de melanocitos","Dep\u00f3sito an\u00f3malo de hemosiderina cut\u00e1nea","Ac\u00famulo de lipofuscina en la dermis profunda"],"c":2,"e":"El <b>vit\u00edligo</b> es un trastorno adquirido con <b>m\u00e1culas despigmentadas</b> por p\u00e9rdida de melanocitos (citotoxicidad mediada por c\u00e9lulas/anticuerpos). Es hipopigmentaci\u00f3n, opuesto a la hiperpigmentaci\u00f3n de la enfermedad de Addison."},{"noShuffle":false,"img":null,"q":"La amiloidosis asociada a mieloma m\u00faltiple y discrasias de c\u00e9lulas plasm\u00e1ticas es del tipo:","o":["AA","AL","ATTR","A\u03b22-microglobulina"],"c":2,"e":"En discrasias de c\u00e9lulas plasm\u00e1ticas el amiloide es <b>AL</b> (cadenas ligeras de inmunoglobulina). La AA deriva de la prote\u00edna SAA (inflamaci\u00f3n cr\u00f3nica), la ATTR de transtiretina y la A\u03b22m de la hemodi\u00e1lisis.","n":"15"},{"noShuffle":false,"img":null,"q":"El amiloide asociado a enfermedades inflamatorias cr\u00f3nicas (artritis reumatoide, infecciones cr\u00f3nicas) es del tipo:","o":["Tipo AL (cadenas ligeras)","Tipo AA (prote\u00edna SAA)","Tipo A\u03b2 (amiloide de Alzheimer)","Tipo ATTR (transtiretina)"],"c":2,"e":"La <b>amiloidosis AA (secundaria/reactiva)</b> deriva de la prote\u00edna de fase aguda <b>SAA</b>, elevada de forma cr\u00f3nica en artritis reumatoide, EII, infecciones cr\u00f3nicas. Afecta sobre todo ri\u00f1\u00f3n, h\u00edgado y bazo.","n":"16"},{"noShuffle":false,"img":null,"q":"El gluc\u00f3geno y la mayor\u00eda de tinciones de membranas basales y mucinas neutras se demuestran con:","o":["La tinci\u00f3n de rojo Congo","La tinci\u00f3n de PAS","La t\u00e9cnica de azul de Prusia","La tinci\u00f3n de Oil Red O"],"c":2,"e":"El <b>PAS</b> ti\u00f1e gluc\u00f3geno, glucoprote\u00ednas, membranas basales y mucinas neutras (magenta). El rojo Congo marca amiloide, el azul de Prusia hierro y el Oil Red O l\u00edpidos.","n":"17"},{"noShuffle":false,"img":null,"q":"Ni\u00f1o con visceromegalia, retraso y d\u00e9ficit de glucocerebrosidasa, con macr\u00f3fagos 'en papel arrugado' en m\u00e9dula. El diagn\u00f3stico es:","o":["Enfermedad de Tay-Sachs","Enfermedad de Gaucher","Enfermedad de Niemann-Pick","Enfermedad de Fabry"],"c":2,"e":"La <b>enfermedad de Gaucher</b> (d\u00e9ficit de <b>glucocerebrosidasa</b>) acumula glucocerebr\u00f3sido en macr\u00f3fagos ('c\u00e9lulas de Gaucher' en papel arrugado), con hepatoesplenomegalia. Es la tesaurismosis m\u00e1s frecuente.","n":"18"},{"noShuffle":false,"img":null,"q":"La esteatosis hep\u00e1tica macrovesicular se reconoce por:","o":["M\u00faltiples vacuolas peque\u00f1as alrededor del n\u00facleo","Una gran vacuola que desplaza el n\u00facleo","Dep\u00f3sito de hierro azul de Prusia positivo","Presencia exclusiva de cuerpos de Mallory"],"c":2,"e":"En la esteatosis <b>macrovesicular</b> una gran vacuola lip\u00eddica <b>desplaza el n\u00facleo a la periferia</b>. Comienza en hepatocitos centrolobulillares; causas: alcohol, obesidad, diabetes.","n":"19"},{"noShuffle":false,"img":null,"q":"El dep\u00f3sito patol\u00f3gico de hierro limitado a los macr\u00f3fagos del sistema mononuclear fagoc\u00edtico, sin da\u00f1o parenquimatoso, se denomina:","o":["Hemocromatosis","Hemosiderosis","Lipofuscinosis","Antracosis"],"c":2,"e":"La <b>hemosiderosis</b> es el dep\u00f3sito de hemosiderina en macr\u00f3fagos sin lesi\u00f3n org\u00e1nica (p. ej. tras transfusiones o hem\u00f3lisis). La <b>hemocromatosis</b> implica dep\u00f3sito parenquimatoso masivo con da\u00f1o (cirrosis, diabetes).","n":"20"},{"noShuffle":false,"img":null,"q":"La ictericia prehep\u00e1tica (hemol\u00edtica) cursa t\u00edpicamente con:","o":["Bilirrubina conjugada alta con coluria intensa","Bilirrubina no conjugada alta, orina normal","Bilirrubina conjugada con heces ac\u00f3licas","Ausencia completa de bilirrubina s\u00e9rica"],"c":2,"e":"La ictericia <b>hemol\u00edtica/prehep\u00e1tica</b> eleva la <b>bilirrubina no conjugada</b> (insoluble, unida a alb\u00famina, no se excreta en orina \u2192 <b>orina normal</b>) con aumento del urobilin\u00f3geno (heces hiperpigmentadas).","n":"21"}],"repinm":[{"n":"1","noShuffle":false,"img":null,"q":"La reparaci\u00f3n tisular por REGENERACI\u00d3N ('restitutio ad integrum') requiere:","o":["La p\u00e9rdida total de la matriz extracelular","Matriz intacta y tejido que prolifera","La sustituci\u00f3n por tejido conjuntivo cicatricial","La necrosis previa de todo el epitelio"],"c":2,"e":"La regeneraci\u00f3n logra una <b>recuperaci\u00f3n tisular completa</b> y exige <b>integridad de la matriz extracelular</b> y vasos, adem\u00e1s de un tejido capaz de proliferar (l\u00e1bil o estable). Si la matriz se destruye o el tejido no regenera, se forma cicatriz."},{"n":"2","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes tejidos est\u00e1 formado por c\u00e9lulas PERMANENTES?","o":["El epitelio cut\u00e1neo escamoso","Los hepatocitos del lobulillo","El miocardio y las neuronas","El epitelio intestinal velloso"],"c":3,"e":"El <b>miocardio y las neuronas</b> son c\u00e9lulas permanentes (capacidad regenerativa m\u00ednima). El epitelio cut\u00e1neo e intestinal son c\u00e9lulas l\u00e1biles; los hepatocitos son estables (se dividen seg\u00fan demanda)."},{"n":"3","noShuffle":false,"img":null,"q":"Ordene correctamente las fases de formaci\u00f3n de una cicatriz:","o":["Inflamaci\u00f3n, tap\u00f3n, proliferaci\u00f3n y remodelaci\u00f3n","Tap\u00f3n, inflamaci\u00f3n, proliferaci\u00f3n, remodelaci\u00f3n","Proliferaci\u00f3n, inflamaci\u00f3n, tap\u00f3n, remodelaci\u00f3n","Remodelaci\u00f3n, proliferaci\u00f3n, inflamaci\u00f3n, tap\u00f3n"],"c":2,"e":"La secuencia es: <b>tap\u00f3n hemost\u00e1tico</b> (plaquetas/fibrina) \u2192 <b>inflamaci\u00f3n</b> (1-4 d\u00edas) \u2192 <b>proliferaci\u00f3n</b> con tejido de granulaci\u00f3n (2-16 d\u00edas) \u2192 <b>remodelaci\u00f3n</b> del col\u00e1geno (5-25 d\u00edas, MMP/TIMP)."},{"n":"4","noShuffle":false,"img":null,"q":"El tejido de granulaci\u00f3n se caracteriza histol\u00f3gicamente por:","o":["Fibrosis densa, hialina y acelular","Fibroblastos y neovasos en matriz","Necrosis caseosa central extensa","Infiltrado plasmocelular denso"],"c":2,"e":"El <b>tejido de granulaci\u00f3n</b> est\u00e1 formado por <b>fibroblastos proliferantes y neovasos</b> (angiog\u00e9nesis) en matriz conectiva laxa, con macr\u00f3fagos. Es el sello de la fase proliferativa de la cicatrizaci\u00f3n."},{"n":"5","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes factores NO altera (dificultando) la reparaci\u00f3n tisular?","o":["La diabetes mellitus mal controlada","El tratamiento con glucocorticoides","La infecci\u00f3n bacteriana de la herida","La juventud y la buena perfusi\u00f3n"],"c":4,"e":"La <b>juventud y la buena perfusi\u00f3n</b> favorecen la reparaci\u00f3n. La dificultan la diabetes, los glucocorticoides (esteroides), la infecci\u00f3n, la desnutrici\u00f3n, los cuerpos extra\u00f1os y la mala perfusi\u00f3n."},{"n":"6","noShuffle":false,"img":null,"q":"En la inmunidad INNATA, el sistema del complemento se activa predominantemente por la v\u00eda:","o":["La v\u00eda cl\u00e1sica (anticuerpo-dependiente)","La v\u00eda alternativa (sin anticuerpo)","La v\u00eda de las lectinas \u00fanicamente","La v\u00eda intr\u00ednseca de la coagulaci\u00f3n"],"c":2,"e":"En la inmunidad innata el complemento se activa por la <b>v\u00eda alternativa</b>, al contacto con superficies microbianas y <b>sin necesidad de anticuerpos</b>. La v\u00eda cl\u00e1sica (C1, anticuerpo-dependiente) pertenece a la respuesta adaptativa."},{"n":"7","noShuffle":false,"img":null,"q":"La opsonizaci\u00f3n por C3b consiste en:","o":["La lisis osm\u00f3tica del microorganismo","El recubrimiento para la fagocitosis","La degranulaci\u00f3n de los mastocitos","La quimiotaxis de los neutr\u00f3filos"],"c":2,"e":"La <b>opsonizaci\u00f3n</b> es el recubrimiento del microorganismo por <b>C3b</b>, que facilita la uni\u00f3n de los fagocitos y su fagocitosis. La lisis directa la hace el complejo de ataque a membrana; la quimiotaxis y degranulaci\u00f3n las inducen C3a y C5a (anafilotoxinas)."},{"n":"8","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes es una propiedad EXCLUSIVA de la inmunidad adaptativa?","o":["La respuesta inmediata e inespec\u00edfica","La memoria y especificidad antig\u00e9nica","La activaci\u00f3n del complemento alterna","La fagocitosis por los neutr\u00f3filos"],"c":2,"e":"La inmunidad adaptativa se define por <b>especificidad, diversidad, memoria</b> y tolerancia a lo propio. La fagocitosis, la respuesta inmediata inespec\u00edfica y la v\u00eda alternativa del complemento son propias de la inmunidad innata."},{"n":"9","noShuffle":false,"img":null,"q":"Las c\u00e9lulas natural killer (NK):","o":["Producen anticuerpos de forma espec\u00edfica","Matan c\u00e9lulas sin sensibilizaci\u00f3n previa","Son exclusivas de la inmunidad adaptativa","Median la opsonizaci\u00f3n de los microbios"],"c":2,"e":"Las <b>NK</b> son c\u00e9lulas linfoides de la <b>inmunidad innata</b> que destruyen c\u00e9lulas infectadas por virus y algunas tumorales <b>sin necesidad de sensibilizaci\u00f3n previa</b>. Los anticuerpos los producen las c\u00e9lulas plasm\u00e1ticas (linfocitos B)."},{"noShuffle":false,"img":null,"q":"La prote\u00edna C reactiva (PCR), reactante de fase aguda, es producida en el h\u00edgado en respuesta sobre todo a:","o":["IL-6","Histamina","Col\u00e1geno","Bradicinina"],"c":1,"e":"La <b>PCR</b> se sintetiza en el h\u00edgado en respuesta a la <b>IL-6</b> (y otras citocinas). Es un marcador de inflamaci\u00f3n; opsoniza y activa el complemento.","n":"10"},{"noShuffle":false,"img":null,"q":"El queloide es un trastorno de la reparaci\u00f3n caracterizado por:","o":["Un defecto de la epitelizaci\u00f3n","Exceso de col\u00e1geno fuera de la herida","Una falta de tejido de granulaci\u00f3n","La dehiscencia de la herida quir\u00fargica"],"c":2,"e":"El <b>queloide</b> es una cicatriz hipertr\u00f3fica con <b>exceso de col\u00e1geno</b> que se extiende m\u00e1s all\u00e1 de los l\u00edmites de la herida original. Es un ejemplo de reparaci\u00f3n aberrante, con predisposici\u00f3n individual.","n":"11"},{"noShuffle":false,"img":null,"q":"La cicatrizaci\u00f3n por primera intenci\u00f3n ('primera') ocurre cuando:","o":["Hay gran p\u00e9rdida de tejido con bordes separados","Los bordes est\u00e1n limpios y aproximados","Existe infecci\u00f3n con pus abundante","Se forma una \u00falcera cr\u00f3nica que no cierra"],"c":2,"e":"La cicatrizaci\u00f3n por <b>primera intenci\u00f3n</b> sucede con bordes limpios y aproximados (herida quir\u00fargica suturada): poco tejido de granulaci\u00f3n y cicatriz m\u00ednima. Por <b>segunda intenci\u00f3n</b> hay p\u00e9rdida de tejido, m\u00e1s granulaci\u00f3n, contracci\u00f3n y cicatriz mayor.","n":"12"}],"crec":[{"n":"1","noShuffle":false,"img":null,"q":"La metaplasia se define como:","o":["El aumento del tama\u00f1o de las c\u00e9lulas","El cambio de un epitelio adulto por otro","El aumento del n\u00famero de c\u00e9lulas nuevas","La p\u00e9rdida de la diferenciaci\u00f3n con atipia"],"c":2,"e":"La <b>metaplasia</b> es el cambio reversible de un tipo celular adulto por <b>otro tipo celular adulto</b> m\u00e1s resistente al est\u00edmulo nocivo (p. ej. epitelio cil\u00edndrico \u2192 escamoso en el bronquio del fumador). No implica atipia."},{"n":"2","noShuffle":false,"img":null,"q":"El es\u00f3fago de Barrett es un ejemplo de:","o":["Una hiperplasia escamosa reactiva","Metaplasia de escamoso a cil\u00edndrico","Una displasia epitelial de alto grado","Una atrofia de la mucosa esof\u00e1gica"],"c":2,"e":"El <b>Barrett</b> es la metaplasia del epitelio escamoso esof\u00e1gico a <b>epitelio cil\u00edndrico de tipo intestinal</b> por reflujo cr\u00f3nico. Es premaligno (riesgo de adenocarcinoma), pero el cambio en s\u00ed es metaplasia."},{"n":"3","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes es un ejemplo de hiperplasia FISIOL\u00d3GICA?","o":["Hiperplasia endometrial por est\u00edmulo estrog\u00e9nico mantenido","Proliferaci\u00f3n del epitelio mamario en la gestaci\u00f3n","Hiperplasia prost\u00e1tica benigna","Hiperplasia tiroidea en el bocio"],"c":2,"e":"La proliferaci\u00f3n del <b>epitelio mamario durante el embarazo/lactancia</b> es hiperplasia fisiol\u00f3gica (hormonal). Las dem\u00e1s son hiperplasias patol\u00f3gicas por est\u00edmulo hormonal excesivo o desequilibrado."},{"n":"4","noShuffle":false,"img":null,"q":"La diferencia fundamental entre displasia y metaplasia es que la displasia:","o":["Es siempre irreversible y maligna","Implica atipia y desorden arquitectural","Es un aumento del tama\u00f1o celular","No afecta nunca al epitelio de superficie"],"c":2,"e":"La <b>displasia</b> a\u00f1ade <b>atipia citol\u00f3gica y desorden arquitectural</b> (p\u00e9rdida de polaridad, pleomorfismo, mitosis). Es preneopl\u00e1sica pero a\u00fan reversible; cuando es completa y no invade la membrana basal se habla de carcinoma in situ."},{"n":"5","noShuffle":false,"img":null,"q":"La atrofia se caracteriza por:","o":["El aumento del n\u00famero de las c\u00e9lulas","La disminuci\u00f3n del tama\u00f1o y la funci\u00f3n","El cambio de un tipo celular por otro adulto","El ac\u00famulo de l\u00edpidos intracelulares"],"c":2,"e":"La <b>atrofia</b> es la reducci\u00f3n del <b>tama\u00f1o y la funci\u00f3n</b> celular (y del \u00f3rgano) por disminuci\u00f3n de los componentes estructurales, a menudo con aumento de la autofagia. Causas: desuso, denervaci\u00f3n, isquemia, p\u00e9rdida de est\u00edmulo hormonal."},{"noShuffle":false,"img":null,"q":"La hipertrofia se define como:","o":["El aumento del n\u00famero de c\u00e9lulas nuevas","El aumento del tama\u00f1o de la c\u00e9lula","El cambio de un tipo celular por otro","La reducci\u00f3n del tama\u00f1o de la c\u00e9lula"],"c":2,"e":"La <b>hipertrofia</b> es el aumento del <b>tama\u00f1o</b> celular (m\u00e1s componentes estructurales) sin c\u00e9lulas nuevas; t\u00edpica de tejidos con poca capacidad de divisi\u00f3n (miocardio, m\u00fasculo). Puede ser fisiol\u00f3gica o patol\u00f3gica.","n":"6"},{"noShuffle":false,"img":null,"q":"El crecimiento del \u00fatero durante el embarazo combina:","o":["\u00danicamente metaplasia glandular","Hipertrofia e hiperplasia hormonal","Atrofia con displasia reactiva difusa","\u00danicamente aplasia del miometrio"],"c":2,"e":"El \u00fatero gestante crece por <b>hipertrofia e hiperplasia</b> fisiol\u00f3gicas del m\u00fasculo liso, est\u00edmulo estrog\u00e9nico mediante. Es un ejemplo cl\u00e1sico de adaptaci\u00f3n celular reversible.","n":"7"},{"noShuffle":false,"img":null,"q":"La hipertrofia ventricular izquierda por hipertensi\u00f3n arterial es un ejemplo de:","o":["Hipertrofia fisiol\u00f3gica","Hipertrofia patol\u00f3gica","Hiperplasia compensadora","Metaplasia"],"c":2,"e":"La <b>hipertrofia patol\u00f3gica</b> del miocardio responde a una sobrecarga mantenida (HTA, estenosis a\u00f3rtica). Al ser c\u00e9lulas permanentes, el coraz\u00f3n se adapta agrandando los miocitos, no creando nuevos.","n":"8"},{"noShuffle":false,"img":null,"q":"La hiperplasia se define como:","o":["El aumento del tama\u00f1o de las c\u00e9lulas","El aumento del n\u00famero de c\u00e9lulas","La sustituci\u00f3n de un epitelio por otro tipo","La atrofia acompa\u00f1ada de autofagia"],"c":2,"e":"La <b>hiperplasia</b> es el aumento del <b>n\u00famero de c\u00e9lulas</b>, solo posible en tejidos con capacidad proliferativa. Puede ser fisiol\u00f3gica (hormonal/compensadora) o patol\u00f3gica (hiperplasia endometrial, HBP).","n":"9"},{"noShuffle":false,"img":null,"q":"La aplasia se diferencia de la hipoplasia y la agenesia en que la aplasia es:","o":["Ausencia total del \u00f3rgano por falta de esbozo embrionario","Falta de desarrollo de un \u00f3rgano cuyo esbozo s\u00ed se form\u00f3","Desarrollo incompleto con tama\u00f1o reducido","Aumento del n\u00famero de c\u00e9lulas"],"c":2,"e":"La <b>aplasia</b> es la falta de desarrollo de un \u00f3rgano cuyo esbozo embrionario s\u00ed existi\u00f3. La <b>agenesia</b> es la ausencia total (no se forma el esbozo) y la <b>hipoplasia</b> un desarrollo incompleto/reducido.","n":"10"},{"noShuffle":false,"img":null,"q":"El reemplazo del epitelio cil\u00edndrico ciliado bronquial por epitelio escamoso en el fumador es:","o":["Hiperplasia","Metaplasia escamosa","Displasia de alto grado","Hipertrofia"],"c":2,"e":"Es una <b>metaplasia escamosa</b>: el epitelio respiratorio se sustituye por escamoso, m\u00e1s resistente al humo pero con p\u00e9rdida de la funci\u00f3n mucociliar. Es reversible, pero el est\u00edmulo mantenido puede llevar a displasia y carcinoma.","n":"11"}],"inflam":[{"n":"1","noShuffle":false,"img":null,"q":"Los cinco signos cardinales de la inflamaci\u00f3n aguda incluyen todos los siguientes EXCEPTO:","o":["El rubor y el calor locales","El tumor o edema","El dolor a la palpaci\u00f3n","La atrofia tisular"],"c":4,"e":"Los signos cl\u00e1sicos son <b>rubor, calor, tumor, dolor</b> y p\u00e9rdida de funci\u00f3n (functio laesa). La atrofia no es un signo de inflamaci\u00f3n aguda; deriva de otros mecanismos."},{"n":"2","noShuffle":false,"img":null,"q":"La c\u00e9lula predominante en la inflamaci\u00f3n AGUDA es:","o":["El linfocito","El neutr\u00f3filo","La c\u00e9lula plasm\u00e1tica","El macr\u00f3fago"],"c":2,"e":"El <b>neutr\u00f3filo</b> es la c\u00e9lula caracter\u00edstica de la inflamaci\u00f3n aguda (primeras 24 h). En la inflamaci\u00f3n cr\u00f3nica predominan macr\u00f3fagos, linfocitos y c\u00e9lulas plasm\u00e1ticas."},{"n":"3","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes NO participa en la liberaci\u00f3n de histamina durante la inflamaci\u00f3n?","o":["Los mastocitos tisulares","Los bas\u00f3filos circulantes","Las plaquetas activadas","Las c\u00e9lulas plasm\u00e1ticas"],"c":4,"e":"La histamina la liberan <b>mastocitos, bas\u00f3filos y plaquetas</b>. Las <b>c\u00e9lulas plasm\u00e1ticas</b> producen anticuerpos, no histamina. La histamina causa vasodilataci\u00f3n y aumento de la permeabilidad vascular."},{"n":"4","noShuffle":false,"img":null,"q":"La inflamaci\u00f3n cr\u00f3nica granulomatosa se caracteriza por la presencia de:","o":["Neutr\u00f3filos abundantes con fibrina","Macr\u00f3fagos epitelioides agregados","Eosin\u00f3filos de forma casi exclusiva","Necrosis licuefactiva muy extensa"],"c":2,"e":"El granuloma es un agregado de <b>macr\u00f3fagos epitelioides</b> con frecuentes <b>c\u00e9lulas gigantes multinucleadas</b> (Langhans) y un halo de linfocitos. Es t\u00edpico de tuberculosis, sarcoidosis, micosis y cuerpos extra\u00f1os."},{"n":"5","noShuffle":false,"img":null,"q":"La necrosis caseosa es caracter\u00edstica de:","o":["Infarto de miocardio","Tuberculosis","Pancreatitis aguda","Absceso bacteriano pi\u00f3geno"],"c":2,"e":"La <b>necrosis caseosa</b> ('como queso') es t\u00edpica del granuloma <b>tuberculoso</b>. El infarto cardiaco da necrosis coagulativa, la pancreatitis necrosis grasa (saponificaci\u00f3n) y el absceso pi\u00f3geno necrosis licuefactiva."},{"n":"6","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes macr\u00f3fagos tisulares est\u00e1 correctamente emparejado con su localizaci\u00f3n?","o":["C\u00e9lulas de Kupffer \u2013 h\u00edgado","Osteoclastos \u2013 pulm\u00f3n","Microgl\u00eda \u2013 bazo","C\u00e9lulas de Langerhans \u2013 ri\u00f1\u00f3n"],"c":1,"e":"Las <b>c\u00e9lulas de Kupffer</b> son los macr\u00f3fagos del <b>h\u00edgado</b>. La microgl\u00eda est\u00e1 en el SNC, los osteoclastos en el hueso y las c\u00e9lulas de Langerhans en la epidermis; todos son del sistema fagoc\u00edtico mononuclear."},{"n":"7","noShuffle":false,"img":null,"q":"En la inflamaci\u00f3n cr\u00f3nica, la principal c\u00e9lula responsable de gran parte de la lesi\u00f3n tisular es:","o":["El neutr\u00f3filo polimorfonuclear","El macr\u00f3fago activado","El eritrocito maduro","El adipocito tisular"],"c":2,"e":"El <b>macr\u00f3fago activado</b> es el protagonista de la inflamaci\u00f3n cr\u00f3nica: secreta enzimas, especies reactivas de ox\u00edgeno y citocinas/factores de crecimiento, mediando gran parte del da\u00f1o tisular y la fibrosis."},{"n":"8","noShuffle":false,"img":null,"q":"Se\u00f1ale la afirmaci\u00f3n CORRECTA sobre los macr\u00f3fagos:","o":["No act\u00faan como c\u00e9lulas presentadoras de Ag","Se activan por IFN-\u03b3 y presentan ant\u00edgeno","Tienen una vida media de pocas horas","En el h\u00edgado se denominan microgl\u00eda"],"c":2,"e":"Los macr\u00f3fagos <b>son c\u00e9lulas presentadoras de ant\u00edgeno</b> y se activan por <b>IFN-\u03b3</b> y productos microbianos. Los tisulares viven meses-a\u00f1os; en el h\u00edgado son c\u00e9lulas de Kupffer (la microgl\u00eda es del SNC)."},{"noShuffle":false,"img":null,"q":"La diferencia entre exudado y trasudado es que el exudado:","o":["Tiene bajo contenido proteico y poca celularidad","Es rico en prote\u00ednas y c\u00e9lulas","Se debe a aumento de presi\u00f3n hidrost\u00e1tica con vasos normales","No contiene fibrina"],"c":2,"e":"El <b>exudado</b> es rico en <b>prote\u00ednas y c\u00e9lulas</b>, por aumento de la permeabilidad (inflamaci\u00f3n). El <b>trasudado</b> es pobre en prote\u00ednas, por desequilibrio de presiones (hidrost\u00e1tica/onc\u00f3tica) con vasos normales.","n":"9"},{"noShuffle":false,"img":null,"q":"Los dos cambios vasculares fundamentales de la inflamaci\u00f3n aguda son:","o":["Vasoconstricci\u00f3n y trombosis venosa","Vasodilataci\u00f3n y m\u00e1s permeabilidad","Necrosis endotelial y calcificaci\u00f3n","Fibrosis intersticial y angiog\u00e9nesis"],"c":2,"e":"La inflamaci\u00f3n aguda cursa con <b>vasodilataci\u00f3n</b> (rubor, calor; mediada por histamina y \u00f3xido n\u00edtrico) y <b>aumento de la permeabilidad</b> vascular (edema; histamina y quininas que separan las c\u00e9lulas endoteliales).","n":"10"},{"noShuffle":false,"img":null,"q":"El principal mediador preformado liberado por mastocitos en los primeros minutos de la inflamaci\u00f3n aguda es:","o":["TNF","Histamina","Interfer\u00f3n gamma","Col\u00e1geno"],"c":2,"e":"La <b>histamina</b> (preformada en gr\u00e1nulos de mastocitos, bas\u00f3filos y plaquetas) es el primer mediador: produce vasodilataci\u00f3n y aumento de la permeabilidad. Se libera por trauma, calor, C3a/C5a e IgE.","n":"11"},{"noShuffle":false,"img":null,"q":"Los leucotrienos (LTC4, LTD4) producidos por la v\u00eda de la lipooxigenasa causan principalmente:","o":["Vasodilataci\u00f3n e hipotensi\u00f3n sist\u00e9mica","Broncoespasmo y vasoconstricci\u00f3n","Solo la producci\u00f3n de fiebre central","Quimiotaxis de eosin\u00f3filos \u00fanicamente"],"c":2,"e":"Los <b>leucotrienos</b> (v\u00eda lipooxigenasa del \u00e1cido araquid\u00f3nico) producen <b>broncoespasmo</b>, vasoconstricci\u00f3n y aumento de permeabilidad; son clave en el <b>asma</b>. El LTB4 es adem\u00e1s quimiot\u00e1ctico.","n":"12"},{"noShuffle":false,"img":null,"q":"Las citocinas TNF e IL-1 son responsables fundamentalmente de:","o":["La s\u00edntesis de col\u00e1geno tisular","La respuesta sist\u00e9mica de fase aguda","La degradaci\u00f3n de la fibrina","La opsonizaci\u00f3n directa de microbios"],"c":2,"e":"El <b>TNF</b> y la <b>IL-1</b> median la respuesta de <b>fase aguda</b>: fiebre, activaci\u00f3n endotelial (mol\u00e9culas de adhesi\u00f3n), producci\u00f3n hep\u00e1tica de reactantes y leucocitosis. Producidas sobre todo por macr\u00f3fagos.","n":"13"},{"noShuffle":false,"img":null,"q":"La inflamaci\u00f3n cuyo exudado contiene pus (neutr\u00f3filos y restos licuados), t\u00edpicamente por bacterias pi\u00f3genas, se denomina:","o":["Serosa","Fibrinosa","Purulenta","Granulomatosa"],"c":3,"e":"La inflamaci\u00f3n <b>purulenta/supurativa</b> produce <b>pus</b> (neutr\u00f3filos + detritos licuados) y suele deberse a <b>bacterias pi\u00f3genas</b> (estafilococos). Un ac\u00famulo localizado de pus es un absceso.","n":"14"},{"noShuffle":false,"img":null,"q":"La inflamaci\u00f3n serosa se caracteriza por:","o":["Producci\u00f3n de pus abundante","Derrame de l\u00edquido pobre en c\u00e9lulas","Dep\u00f3sito de fibrina en las superficies","Formaci\u00f3n de m\u00faltiples granulomas"],"c":2,"e":"La inflamaci\u00f3n <b>serosa</b> es un derrame de l\u00edquido claro pobre en c\u00e9lulas (trasudado/exudado leve), como la <b>ampolla</b> de una quemadura o un derrame seroso de cavidades.","n":"15"},{"noShuffle":false,"img":null,"q":"Una \u00falcera se define como:","o":["Ac\u00famulo localizado de pus en cavidad","Defecto de superficie por necrosis","Proliferaci\u00f3n de macr\u00f3fagos epitelioides","Dep\u00f3sito de fibrina en el pericardio"],"c":2,"e":"La <b>\u00falcera</b> es un defecto local de la superficie (mucosa o piel) por el esfacelo del tejido necr\u00f3tico inflamado. Ejemplo: \u00falcera p\u00e9ptica gastroduodenal.","n":"16"},{"noShuffle":false,"img":null,"q":"La c\u00e9lula que define histol\u00f3gicamente al granuloma es:","o":["El neutr\u00f3filo polimorfonuclear","El macr\u00f3fago epitelioide","El eosin\u00f3filo tisular","La c\u00e9lula plasm\u00e1tica madura"],"c":2,"e":"El granuloma es un agregado de <b>macr\u00f3fagos epitelioides</b> activados, con frecuentes c\u00e9lulas gigantes multinucleadas y un collar de linfocitos. Es la forma de inflamaci\u00f3n cr\u00f3nica granulomatosa.","n":"17"},{"noShuffle":false,"img":null,"q":"Las c\u00e9lulas gigantes multinucleadas con n\u00facleos dispuestos en herradura en la periferia, t\u00edpicas de la tuberculosis, son las c\u00e9lulas de:","o":["Reed-Sternberg","Langhans","Touton","Anitschkow"],"c":2,"e":"Las c\u00e9lulas gigantes de <b>Langhans</b> (n\u00facleos en herradura perif\u00e9rica) son t\u00edpicas de los granulomas tuberculosos. Las de cuerpo extra\u00f1o tienen n\u00facleos desordenados y las de Touton aparecen en lesiones ricas en l\u00edpidos.","n":"18"},{"noShuffle":false,"img":null,"q":"Un granuloma con necrosis caseosa central orienta principalmente a:","o":["Sarcoidosis","Tuberculosis","Cuerpo extra\u00f1o","Enfermedad de Crohn"],"c":2,"e":"La <b>necrosis caseosa</b> central es t\u00edpica de la <b>tuberculosis</b>. La sarcoidosis da granulomas <b>no caseificantes</b>; los de cuerpo extra\u00f1o y Crohn tampoco caseifican habitualmente.","n":"19"},{"noShuffle":false,"img":null,"q":"Los cuatro patrones morfol\u00f3gicos cl\u00e1sicos de la inflamaci\u00f3n aguda son:","o":["Serosa, fibrinosa, purulenta y ulcerosa","Aguda, subaguda, cr\u00f3nica y granulomatosa","Caseosa, gomosa, fibrinoide y hialina","Catarral, flemonosa, gangrenosa y cr\u00f3nica"],"c":1,"e":"Los patrones morfol\u00f3gicos de la inflamaci\u00f3n aguda son <b>serosa</b>, <b>fibrinosa</b>, <b>purulenta</b> y <b>ulcerosa</b>, seg\u00fan el tipo de exudado y la superficie afectada.","n":"20"},{"noShuffle":false,"img":null,"q":"La secuencia de salida de los leucocitos desde el vaso al foco inflamatorio es:","o":["Quimiotaxis, marginaci\u00f3n y luego adhesi\u00f3n","Marginaci\u00f3n, adhesi\u00f3n y transmigraci\u00f3n","Fagocitosis, marginaci\u00f3n y rodamiento","Adhesi\u00f3n firme, fagocitosis y rodamiento"],"c":2,"e":"El reclutamiento leucocitario sigue: <b>marginaci\u00f3n y rodamiento</b> (selectinas) \u2192 <b>adhesi\u00f3n firme</b> (integrinas-ICAM) \u2192 <b>transmigraci\u00f3n/diap\u00e9desis</b> \u2192 <b>quimiotaxis</b> hacia el foco (C5a, LTB4, productos bacterianos).","n":"21"}],"neopl":[{"n":"1","noShuffle":false,"img":null,"q":"En la nomenclatura tumoral, el sufijo '-oma' aplicado a un tumor mesenquimal indica habitualmente:","o":["Naturaleza maligna del tumor","Naturaleza benigna del tumor","Origen en tejido epitelial","Presencia de met\u00e1stasis"],"c":2,"e":"En los tumores mesenquimales '<b>-oma</b>' indica <b>benignidad</b> (lipoma, leiomioma). La malignidad mesenquimal se nombra '-sarcoma'; la epitelial maligna, 'carcinoma'. Excepciones enga\u00f1osas: linfoma, melanoma y seminoma son malignos."},{"n":"2","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes t\u00e9rminos designa un tumor MALIGNO?","o":["Cistoadenoma mucinoso","Adenocarcinoma","Leiomioma uterino","Papiloma invertido"],"c":2,"e":"El <b>adenocarcinoma</b> es maligno (epitelio glandular). Adenoma, leiomioma y papiloma son benignos. La terminaci\u00f3n 'carcinoma' o 'sarcoma' marca la malignidad."},{"n":"3","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes afirmaciones sobre la transformaci\u00f3n maligna NO es cierta?","o":["Mitosis numerosas, mitosis at\u00edpicas y Ki67 elevado indican alto \u00edndice proliferativo.","Angiog\u00e9nesis, necrosis y desmoplasia son criterios estromales de malignidad.","La hipercromasia y el aumento de la relaci\u00f3n n\u00facleo/citoplasma son criterios de malignidad.","La hipercromasia y el nucleolo grande son criterios citol\u00f3gicos de benignidad."],"c":4,"e":"Es falso: hipercromasia, nucleolo prominente y <b>aumento</b> de la relaci\u00f3n n\u00facleo/citoplasma son criterios de <b>malignidad</b>, no de benignidad. Las otras tres afirmaciones son correctas."},{"n":"4","noShuffle":false,"img":null,"q":"El t\u00e9rmino ANAPLASIA hace referencia a:","o":["Crecimiento lento, bien diferenciado y encapsulado","Falta de diferenciaci\u00f3n con marcado pleomorfismo","Invasi\u00f3n local de la membrana basal subyacente","Capacidad de producir met\u00e1stasis ganglionares"],"c":2,"e":"La <b>anaplasia</b> es la <b>ausencia de diferenciaci\u00f3n</b> con pleomorfismo celular y nuclear, mitosis at\u00edpicas y p\u00e9rdida de polaridad. Es el sello morfol\u00f3gico de la malignidad; a mayor anaplasia, m\u00e1s alto grado."},{"n":"5","noShuffle":false,"img":null,"q":"La caracter\u00edstica que define a un tumor como MALIGNO frente a benigno es fundamentalmente:","o":["El tama\u00f1o grande y el crecimiento r\u00e1pido","La invasi\u00f3n local y la capacidad de met\u00e1stasis","La presencia de una c\u00e1psula fibrosa bien definida","La velocidad de crecimiento del tumor \u00fanicamente"],"c":2,"e":"Lo que define la malignidad es la <b>invasi\u00f3n local</b> (rebasa la membrana basal) y la capacidad de <b>metastatizar</b>. Los tumores benignos suelen estar encapsulados, bien delimitados y no metastatizan."},{"n":"6","noShuffle":false,"img":null,"q":"Indique cu\u00e1l de los siguientes factores favorece la carcinog\u00e9nesis:","o":["La promoci\u00f3n de la apoptosis celular","La activaci\u00f3n de los genes reparadores del ADN","La inactivaci\u00f3n de genes supresores tumorales","El bloqueo de la actividad de los oncogenes"],"c":3,"e":"La <b>inactivaci\u00f3n de genes supresores</b> (TP53, RB) elimina el freno del ciclo celular y favorece la carcinog\u00e9nesis. La apoptosis, los genes reparadores y el bloqueo de oncogenes ser\u00edan protectores."},{"n":"7","noShuffle":false,"img":null,"q":"La diseminaci\u00f3n METAST\u00c1SICA preferente de los carcinomas se realiza por v\u00eda:","o":["Por v\u00eda hemat\u00f3gena exclusivamente","Por v\u00eda linf\u00e1tica inicialmente","Por v\u00eda transcel\u00f3mica exclusivamente","Por v\u00eda perineural exclusivamente"],"c":2,"e":"Los <b>carcinomas</b> metastatizan t\u00edpicamente primero por v\u00eda <b>linf\u00e1tica</b> (al ganglio regional), mientras que los <b>sarcomas</b> lo hacen preferentemente por v\u00eda hemat\u00f3gena. Existen tambi\u00e9n v\u00edas transcel\u00f3mica y perineural."},{"n":"8","noShuffle":false,"img":null,"q":"En el sistema TNM de estadificaci\u00f3n tumoral, la 'N' hace referencia a:","o":["El grado histol\u00f3gico de diferenciaci\u00f3n celular","El tama\u00f1o y la extensi\u00f3n del tumor primario","La afectaci\u00f3n de ganglios regionales","La presencia de met\u00e1stasis a distancia viscerales"],"c":3,"e":"En el <b>TNM</b>: T = tumor primario (tama\u00f1o/extensi\u00f3n), <b>N = ganglios (nodes) regionales</b>, M = met\u00e1stasis a distancia. El grado histol\u00f3gico (diferenciaci\u00f3n) es un par\u00e1metro distinto del estadio."},{"n":"9","noShuffle":false,"img":null,"q":"Diferencia entre GRADO y ESTADIO de un tumor:","o":["Son t\u00e9rminos sin\u00f3nimos e intercambiables","El grado mide diferenciaci\u00f3n; el estadio, extensi\u00f3n","El grado mide extensi\u00f3n; el estadio, diferenciaci\u00f3n","Ambos dependen \u00fanicamente del tama\u00f1o tumoral"],"c":2,"e":"El <b>grado</b> eval\u00faa el grado de <b>diferenciaci\u00f3n/atipia</b> histol\u00f3gica del tumor; el <b>estadio</b> mide su <b>extensi\u00f3n anat\u00f3mica</b> (TNM). El estadio suele tener mayor valor pron\u00f3stico que el grado."},{"n":"10","noShuffle":false,"img":null,"q":"La displasia que afecta a todo el espesor del epitelio sin rebasar la membrana basal se denomina:","o":["Hiperplasia at\u00edpica","Carcinoma in situ","Carcinoma invasor","Metaplasia"],"c":2,"e":"Cuando la atipia displ\u00e1sica afecta a <b>todo el espesor</b> epitelial pero <b>respeta la membrana basal</b>, se denomina <b>carcinoma in situ</b>. Si rompe la membrana basal e invade el estroma, pasa a carcinoma invasor."},{"n":"11","noShuffle":false,"img":null,"q":"Mujer de 55 a\u00f1os con tumoraci\u00f3n mamaria dura, fija, de bordes irregulares y retracci\u00f3n cut\u00e1nea. Estas caracter\u00edsticas cl\u00ednicas sugieren:","o":["Tumor benigno (fibroadenoma)","Tumor maligno (carcinoma)","Quiste simple","Lipoma"],"c":2,"e":"Bordes irregulares, consistencia dura, fijaci\u00f3n a planos y retracci\u00f3n cut\u00e1nea son rasgos de <b>malignidad</b> (carcinoma). Los benignos como el fibroadenoma son m\u00f3viles, bien delimitados y de superficie lisa."},{"n":"12","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes tumores es, pese a su nombre terminado en '-oma', MALIGNO?","o":["Lipoma","Osteoma","Linfoma","Adenoma"],"c":3,"e":"El <b>linfoma</b> es maligno pese a la terminaci\u00f3n '-oma'. Otras excepciones cl\u00e1sicas son el <b>melanoma</b>, el <b>seminoma</b> y el <b>mesotelioma</b>. Lipoma, osteoma y adenoma s\u00ed son benignos."},{"noShuffle":false,"img":null,"q":"Un crecimiento tisular nuevo, aut\u00f3nomo y excesivo que persiste tras cesar el est\u00edmulo que lo provoc\u00f3 se denomina:","o":["Hiperplasia","Neoplasia","Hipertrofia","Metaplasia"],"c":2,"e":"La <b>neoplasia</b> es un crecimiento nuevo, aut\u00f3nomo, excesivo y descoordinado que persiste aunque cese el est\u00edmulo inicial, a diferencia de la hiperplasia, reversible y dependiente del est\u00edmulo.","n":"13"},{"noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes NO es un tumor benigno por su nomenclatura?","o":["Leiomioma","Condroma","Linfoma","Papiloma"],"c":3,"e":"El <b>linfoma</b> es maligno pese a la terminaci\u00f3n '-oma'. Trampas cl\u00e1sicas: linfoma, melanoma, seminoma, mesotelioma. Leiomioma, condroma y papiloma s\u00ed son benignos.","n":"14"},{"noShuffle":false,"img":null,"q":"El hamartoma se define como:","o":["Tumor maligno indiferenciado de c\u00e9lulas germinales","Masa desorganizada de tejidos maduros del \u00f3rgano","Tejido normal en una localizaci\u00f3n ect\u00f3pica an\u00f3mala","Proliferaci\u00f3n clonal de una sola estirpe celular"],"c":2,"e":"El <b>hamartoma</b> es una masa <b>desorganizada de tejidos maduros</b> propios del \u00f3rgano (p. ej. hamartoma pulmonar con cart\u00edlago). El <b>coristoma</b> es tejido normal en localizaci\u00f3n ect\u00f3pica.","n":"15"},{"noShuffle":false,"img":null,"q":"El papiloma es la proliferaci\u00f3n benigna de:","o":["Gl\u00e1ndulas exocrinas","Epitelio escamoso","Tejido adiposo maduro","Melanocitos d\u00e9rmicos"],"c":2,"e":"El <b>papiloma</b> es el tumor benigno del <b>epitelio escamoso</b>. El de gl\u00e1ndulas es el adenoma, el de adipocitos el lipoma y el de melanocitos el nevus.","n":"16"},{"noShuffle":false,"img":null,"q":"El nevus es la proliferaci\u00f3n benigna de:","o":["C\u00e9lulas de Schwann","Melanocitos","Fibroblastos","C\u00e9lulas endoteliales"],"c":2,"e":"El <b>nevus</b> es la proliferaci\u00f3n benigna de <b>melanocitos</b>; su contraparte maligna es el melanoma (Melan-A+, S-100+, HMB45+).","n":"17"},{"noShuffle":false,"img":null,"q":"Un carcinoma es, por definici\u00f3n, un tumor maligno de estirpe:","o":["De estirpe mesenquimal","De estirpe epitelial","De estirpe hematol\u00f3gica","De estirpe melanoc\u00edtica"],"c":2,"e":"El <b>carcinoma</b> es el tumor maligno <b>epitelial</b> (CK+). El sarcoma es mesenquimal, la leucemia/linfoma hematol\u00f3gico (CD45+) y el melanoma melanoc\u00edtico.","n":"18"},{"noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes NO es un criterio CITOL\u00d3GICO de malignidad?","o":["El pleomorfismo nuclear y celular muy marcado","La hipercromasia con nucleolo muy prominente","Las mitosis at\u00edpicas y el \u00edndice Ki67 elevado","La polaridad y la maduraci\u00f3n conservadas"],"c":4,"e":"La conservaci\u00f3n de la polaridad y la maduraci\u00f3n son rasgos de <b>benignidad</b>. La atipia incluye pleomorfismo, hipercromasia, nucleolo grande, aumento de la relaci\u00f3n N/C y alto \u00edndice mit\u00f3tico.","n":"19"},{"noShuffle":false,"img":null,"q":"La displasia re\u00fane criterios fundamentalmente:","o":["Criterios citol\u00f3gicos de atipia nuclear aislada","Criterios arquitecturales de maduraci\u00f3n","Criterios estromales de desmoplasia y necrosis","Criterios vasculares de neoangiog\u00e9nesis tumoral"],"c":2,"e":"La <b>displasia</b> re\u00fane criterios <b>arquitecturales</b>: alteraci\u00f3n de la maduraci\u00f3n, p\u00e9rdida de polaridad y de celularidad basal, formaci\u00f3n de nidos. Es lesi\u00f3n preinvasiva.","n":"20"},{"noShuffle":false,"img":null,"q":"La marcada producci\u00f3n de tejido fibroso por el estroma frente a un carcinoma se denomina:","o":["Angiog\u00e9nesis","Desmoplasia","Necrosis","Metaplasia"],"c":2,"e":"La <b>desmoplasia</b> es la respuesta fibrosa del estroma a un carcinoma infiltrante (consistencia dura, 'escirro'); junto con angiog\u00e9nesis y necrosis es criterio estromal de malignidad.","n":"21"},{"noShuffle":false,"img":null,"q":"La diseminaci\u00f3n por cavidades que produce 'pseudomixoma peritoneal' es t\u00edpica de tumores mucinosos de:","o":["Pulm\u00f3n y pleura","Ovario y ap\u00e9ndice","Pr\u00f3stata y vejiga","Tiroides y paratiroides"],"c":2,"e":"La siembra transcel\u00f3mica de tumores <b>mucinosos de ovario y ap\u00e9ndice</b> produce el <b>pseudomixoma peritoneal</b> (moco en la cavidad peritoneal).","n":"22"},{"noShuffle":false,"img":null,"q":"La met\u00e1stasis hemat\u00f3gena con drenaje portal lleva las c\u00e9lulas preferentemente a:","o":["Pulm\u00f3n","H\u00edgado","Hueso","Cerebro"],"c":2,"e":"Los tumores digestivos (territorio portal) metastatizan al <b>h\u00edgado</b>. El drenaje cava lleva al <b>pulm\u00f3n</b>; el plexo de Batson explica las met\u00e1stasis \u00f3seas de pr\u00f3stata y tiroides.","n":"23"},{"noShuffle":false,"img":null,"q":"Un tumor que conserva los rasgos de HE e inmunohistoqu\u00edmica del tejido de origen se clasifica como:","o":["Tumor anapl\u00e1sico totalmente indiferenciado","Tumor bien diferenciado (de bajo grado)","Tumor pobremente diferenciado y agresivo","Tumor indiferenciado de alto grado cl\u00ednico"],"c":2,"e":"Un tumor <b>bien diferenciado (bajo grado)</b> conserva morfolog\u00eda (HE) e inmunofenotipo (IHQ) del origen. El indiferenciado/anapl\u00e1sico (alto grado) los pierde.","n":"24"},{"noShuffle":false,"img":null,"q":"En la carcinog\u00e9nesis, las mutaciones iniciales t\u00edpicamente:","o":["Activan oncogenes e inactivan supresores","Solo alteran el ARN ribos\u00f3mico de la c\u00e9lula","Activan los genes supresores tumorales","Inactivan los oncogenes celulares normales"],"c":1,"e":"La transformaci\u00f3n implica <b>activaci\u00f3n de oncogenes</b> (RAS), <b>inactivaci\u00f3n de supresores</b> (p53, RB), de reguladores de apoptosis (BCL2) y de genes reparadores (MSH2). La diana es el ADN.","n":"25"},{"noShuffle":false,"img":null,"q":"Las fases secuenciales de la carcinog\u00e9nesis son:","o":["Promoci\u00f3n, transformaci\u00f3n, iniciaci\u00f3n y progresi\u00f3n","Iniciaci\u00f3n, promoci\u00f3n, transformaci\u00f3n y progresi\u00f3n","Progresi\u00f3n, transformaci\u00f3n, promoci\u00f3n e iniciaci\u00f3n","Transformaci\u00f3n, progresi\u00f3n, promoci\u00f3n e iniciaci\u00f3n"],"c":2,"e":"Es un proceso secuencial: <b>iniciaci\u00f3n</b> (mutaci\u00f3n) \u2192 <b>promoci\u00f3n</b> (expansi\u00f3n clonal) \u2192 <b>transformaci\u00f3n</b> \u2192 <b>progresi\u00f3n</b> (diseminaci\u00f3n). Iniciador suele ser ex\u00f3geno y promotor end\u00f3geno.","n":"26"},{"noShuffle":false,"img":null,"q":"El benzopireno del humo del tabaco pertenece al grupo de carcin\u00f3genos:","o":["Los agentes alquilantes de acci\u00f3n directa","Los hidrocarburos polic\u00edclicos","Las aminas arom\u00e1ticas industriales","Las nitrosaminas de los alimentos conservados"],"c":2,"e":"El <b>benzopireno</b> es un <b>hidrocarburo arom\u00e1tico polic\u00edclico</b> de acci\u00f3n indirecta (activaci\u00f3n por citocromo P450); produce c\u00e1ncer de pulm\u00f3n, vejiga y digestivo.","n":"27"},{"noShuffle":false,"img":null,"q":"La aflatoxina B1 (Aspergillus en frutos secos mal conservados) se asocia a c\u00e1ncer de:","o":["Vejiga","H\u00edgado","Piel","Pulm\u00f3n"],"c":2,"e":"La <b>aflatoxina B1</b> produce <b>carcinoma hepatocelular</b> (mutaci\u00f3n caracter\u00edstica de p53). El ars\u00e9nico da c\u00e1ncer cut\u00e1neo y el cloruro de vinilo angiosarcoma hep\u00e1tico.","n":"28"},{"noShuffle":false,"img":null,"q":"Los estr\u00f3genos sin oposici\u00f3n, como promotores, se asocian en la postmenopausia a carcinoma de:","o":["Mama exclusivamente","Endometrio","Ovario germinal","C\u00e9rvix"],"c":2,"e":"Los estr\u00f3genos sin oposici\u00f3n promueven el <b>carcinoma de endometrio</b>. El antiestr\u00f3geno tamoxifeno se usa en mama pero a su vez aumenta el riesgo endometrial.","n":"29"},{"noShuffle":false,"img":null,"q":"La radiaci\u00f3n ultravioleta produce da\u00f1o directo del ADN formando:","o":["Roturas de la doble cadena del ADN","D\u00edmeros de pirimidina","Metilaci\u00f3n de las islas CpG","Translocaciones cromos\u00f3micas"],"c":2,"e":"La <b>UV</b> forma <b>d\u00edmeros de pirimidina</b> reparados por el sistema <b>NER</b>; su fallo (xeroderma pigmentoso) m\u00e1s mutaciones de p53/RAS lleva a queratosis act\u00ednica, carcinomas y melanoma.","n":"30"},{"noShuffle":false,"img":null,"q":"El virus de Epstein-Barr (VEB) se asocia a todos los siguientes EXCEPTO:","o":["Linfoma de Burkitt","Carcinoma de nasofaringe","Sarcoma de Kaposi","Linfoma de Hodgkin"],"c":3,"e":"El <b>sarcoma de Kaposi</b> se asocia al <b>VHH-8</b>, no al VEB. El VEB se vincula a Burkitt (t8;14), carcinoma nasofar\u00edngeo, Hodgkin y linfomas postrasplante.","n":"31"},{"noShuffle":false,"img":null,"q":"El cloruro de vinilo (industria del pl\u00e1stico) se asocia caracter\u00edsticamente a:","o":["Mesotelioma pleural maligno","Angiosarcoma hep\u00e1tico","Carcinoma urotelial de vejiga","Osteosarcoma de f\u00e9mur"],"c":2,"e":"El <b>cloruro de vinilo</b> produce <b>angiosarcoma hep\u00e1tico</b>. El amianto/asbesto produce mesotelioma; las aminas arom\u00e1ticas (\u03b2-naftilamina), c\u00e1ncer de vejiga.","n":"32"},{"noShuffle":false,"img":null,"q":"En el TNM aplicado a una v\u00edscera HUECA (p. ej. colon), el par\u00e1metro T se basa en:","o":["El tama\u00f1o m\u00e1ximo del tumor primario en cent\u00edmetros","La profundidad de invasi\u00f3n de la pared","El n\u00famero de ganglios regionales afectados","El grado histol\u00f3gico de diferenciaci\u00f3n del tumor"],"c":2,"e":"En v\u00edsceras huecas la <b>T</b> mide la <b>profundidad de invasi\u00f3n</b> (mucosa\u2192submucosa\u2192muscular\u2192serosa). En v\u00edsceras s\u00f3lidas (mama) la T se basa en el <b>tama\u00f1o</b>.","n":"33"}],"esofesto":[{"n":"1","noShuffle":false,"img":null,"q":"La acalasia esof\u00e1gica se caracteriza por la tr\u00edada de:","o":["Hiperperistalsis, relajaci\u00f3n completa y tono bajo","Aperistalsis, relajaci\u00f3n incompleta y tono alto","Metaplasia, displasia y adenocarcinoma","Atresia, f\u00edstula y estenosis cong\u00e9nita"],"c":2,"e":"La acalasia se define por <b>aperistalsis</b>, <b>relajaci\u00f3n incompleta del EEI</b> con la degluci\u00f3n y <b>tono en reposo aumentado</b> del esf\u00ednter. Produce disfagia y dilataci\u00f3n esof\u00e1gica."},{"n":"2","noShuffle":false,"img":null,"q":"Las varices esof\u00e1gicas son consecuencia directa de:","o":["Reflujo \u00e1cido cr\u00f3nico","Hipertensi\u00f3n portal","Infecci\u00f3n por Candida","Acalasia de larga evoluci\u00f3n"],"c":2,"e":"Las varices esof\u00e1gicas derivan de la <b>hipertensi\u00f3n portal</b> (t\u00edpicamente cirrosis alcoh\u00f3lica). Se desarrollan en ~50% de cirr\u00f3ticos; su rotura causa hematemesis masiva y es una emergencia con alta mortalidad."},{"n":"3","noShuffle":false,"img":null,"q":"El es\u00f3fago de Barrett se define histol\u00f3gicamente por:","o":["Hiperplasia escamosa con hiperqueratosis","Metaplasia intestinal cil\u00edndrica","Infiltraci\u00f3n densa por eosin\u00f3filos","Atrofia de la capa muscular propia"],"c":2,"e":"El Barrett es la <b>metaplasia intestinal</b> (aparici\u00f3n de epitelio cil\u00edndrico con c\u00e9lulas caliciformes) en la mucosa escamosa esof\u00e1gica distal por ERGE cr\u00f3nica. Es lesi\u00f3n precursora del <b>adenocarcinoma</b>."},{"n":"4","noShuffle":false,"img":null,"q":"Var\u00f3n de 55 a\u00f1os, obeso y con ERGE de larga evoluci\u00f3n, desarrolla un carcinoma en el tercio distal del es\u00f3fago que produce mucina y forma gl\u00e1ndulas. El tipo m\u00e1s probable es:","o":["Carcinoma de c\u00e9lulas escamosas","Adenocarcinoma","Carcinoma de c\u00e9lulas peque\u00f1as","Leiomiosarcoma"],"c":2,"e":"El <b>adenocarcinoma</b> esof\u00e1gico surge sobre Barrett/ERGE, afecta el <b>tercio distal</b>, produce mucina y forma gl\u00e1ndulas. Factores: obesidad, tabaco. La mutaci\u00f3n TP53 aparece precozmente."},{"n":"5","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes NO es factor de riesgo del carcinoma ESCAMOSO de es\u00f3fago?","o":["Alcohol y tabaco","Acalasia y s\u00edndrome de Plummer-Vinson","Bebidas muy calientes y lesi\u00f3n c\u00e1ustica","Es\u00f3fago de Barrett"],"c":4,"e":"El es\u00f3fago de Barrett predispone al <b>adenocarcinoma</b>, no al escamoso. El carcinoma escamoso se asocia a alcohol, tabaco, acalasia, Plummer-Vinson, c\u00e1usticos y bebidas muy calientes; afecta tercio medio y a varones >45 a\u00f1os."},{"n":"6","noShuffle":false,"img":null,"q":"La esofagitis eosinof\u00edlica se caracteriza por:","o":["Infiltrado epitelial de eosin\u00f3filos","\u00dalceras profundas con inclusiones de CMV","Metaplasia intestinal cil\u00edndrica caliciforme","Necrosis caseosa con granulomas"],"c":1,"e":"La esofagitis eosinof\u00edlica es un trastorno inmunol\u00f3gico cr\u00f3nico con <b>infiltraci\u00f3n por eosin\u00f3filos</b>, disfagia/impactaci\u00f3n alimentaria, <b>anillos esof\u00e1gicos</b> en endoscopia y asociaci\u00f3n con <b>atopia</b> (asma, dermatitis, rinitis)."},{"n":"7","noShuffle":false,"img":null,"q":"La causa m\u00e1s frecuente de esofagitis es:","o":["Infecci\u00f3n por Candida","Esofagitis por reflujo","Esofagitis c\u00e1ustica","Esofagitis eosinof\u00edlica"],"c":2,"e":"La <b>esofagitis por reflujo (ERGE)</b> es la causa m\u00e1s frecuente. El epitelio escamoso es sensible al \u00e1cido; factores que bajan el tono del EEI o aumentan la presi\u00f3n abdominal (obesidad, tabaco, hernia hiatal, embarazo) la favorecen."},{"noShuffle":false,"img":null,"q":"Los desgarros longitudinales en la uni\u00f3n gastroesof\u00e1gica por v\u00f3mitos intensos (alcoh\u00f3licos, bulimia) se denominan s\u00edndrome de:","o":["Boerhaave","Mallory-Weiss","Plummer-Vinson","Barrett"],"c":2,"e":"El s\u00edndrome de <b>Mallory-Weiss</b> son desgarros longitudinales de la uni\u00f3n gastroesof\u00e1gica por v\u00f3mitos violentos, causa de hematemesis. El de <b>Boerhaave</b> es la rotura transmural completa (m\u00e1s grave).","n":"8"},{"noShuffle":false,"img":null,"q":"El divert\u00edculo de Zenker se localiza:","o":["Justo por encima del esf\u00ednter esof\u00e1gico superior","En el tercio medio esof\u00e1gico","Inmediatamente por encima del esf\u00ednter esof\u00e1gico inferior","En el cardias"],"c":1,"e":"El <b>divert\u00edculo de Zenker</b> (faringoesof\u00e1gico) se sit\u00faa por encima del <b>esf\u00ednter esof\u00e1gico superior</b>; produce halitosis y regurgitaci\u00f3n de alimentos no digeridos. El epifr\u00e9nico est\u00e1 sobre el EEI.","n":"9"},{"noShuffle":false,"img":null,"q":"La esofagitis infecciosa con \u00falceras y c\u00e9lulas con inclusiones intranucleares 'en ojo de b\u00faho' est\u00e1 causada por:","o":["Candida","Citomegalovirus","Virus herpes simple","Helicobacter pylori"],"c":2,"e":"El <b>CMV</b> produce \u00falceras esof\u00e1gicas con inclusiones <b>intranucleares e intracitoplasm\u00e1ticas</b> en c\u00e9lulas endoteliales/estromales. El herpes simple da inclusiones intranucleares en 'vidrio esmerilado' en el epitelio escamoso ulcerado.","n":"10"}],"gastrico":[{"n":"1","noShuffle":false,"img":null,"q":"La metaplasia intestinal de la mucosa g\u00e1strica es un factor de riesgo para:","o":["Linfoma MALT de bajo grado","Adenocarcinoma g\u00e1strico","Tumor del estroma gastrointestinal","\u00dalcera p\u00e9ptica benigna"],"c":2,"e":"La gastritis cr\u00f3nica atr\u00f3fica (t\u00edpicamente por <i>H. pylori</i>) lleva a <b>metaplasia intestinal</b> \u2192 displasia \u2192 <b>adenocarcinoma de tipo intestinal</b> (secuencia de Correa). H. pylori tambi\u00e9n predispone al linfoma MALT."},{"n":"2","noShuffle":false,"img":null,"q":"El adenocarcinoma g\u00e1strico de tipo difuso se caracteriza por c\u00e9lulas en:","o":["Cordones trabeculares s\u00f3lidos","Anillo de sello con mucina","Empalizada nuclear perif\u00e9rica","Nidos escamosos con perlas c\u00f3rneas"],"c":2,"e":"El adenocarcinoma g\u00e1strico difuso est\u00e1 formado por c\u00e9lulas en <b>anillo de sello</b> (mucina que desplaza el n\u00facleo) que infiltran difusamente la pared dando aspecto de <b>linitis pl\u00e1stica</b> ('est\u00f3mago en bota de cuero'). No forma masa bien definida."},{"n":"3","noShuffle":false,"img":null,"q":"El principal agente etiol\u00f3gico de la gastritis cr\u00f3nica y la \u00falcera p\u00e9ptica es:","o":["Citomegalovirus","Helicobacter pylori","Tropheryma whipplei","Candida albicans"],"c":2,"e":"<b>Helicobacter pylori</b> es la causa principal de gastritis cr\u00f3nica antral y de \u00falcera p\u00e9ptica (g\u00e1strica y duodenal). Adem\u00e1s es factor de riesgo de adenocarcinoma g\u00e1strico y linfoma MALT."},{"n":"4","noShuffle":false,"img":null,"q":"El tumor mesenquimal m\u00e1s frecuente del est\u00f3mago, positivo para CD117 (c-KIT), es:","o":["Leiomioma de m\u00fasculo liso","Schwannoma del plexo","Tumor del estroma (GIST)","Linfoma MALT g\u00e1strico"],"c":3,"e":"El <b>GIST</b> es el tumor mesenquimal m\u00e1s com\u00fan del tubo digestivo; deriva de las c\u00e9lulas intersticiales de Cajal y expresa <b>CD117 (c-KIT)</b> y DOG1. Responde a imatinib (inhibidor de tirosina-cinasa)."},{"noShuffle":false,"img":null,"q":"La gastritis cr\u00f3nica autoinmune se asocia a anticuerpos contra las c\u00e9lulas parietales y el factor intr\u00ednseco, causando:","o":["\u00dalcera duodenal recidivante","Anemia perniciosa por B12","Linfoma MALT g\u00e1strico","Reflujo biliar alcalino"],"c":2,"e":"La <b>gastritis autoinmune</b> destruye las c\u00e9lulas parietales del cuerpo g\u00e1strico (anti-c\u00e9lula parietal y anti-factor intr\u00ednseco) \u2192 aclorhidria y <b>anemia perniciosa</b> (d\u00e9ficit de B12). Predispone a adenocarcinoma y tumores neuroendocrinos.","n":"5"},{"noShuffle":false,"img":null,"q":"La \u00falcera p\u00e9ptica DUODENAL se relaciona sobre todo con:","o":["La hipoclorhidria g\u00e1strica marcada","H. pylori e hiperacidez","El reflujo biliar alcalino","La atrofia g\u00e1strica difusa"],"c":2,"e":"La \u00falcera <b>duodenal</b> se asocia a <b>H. pylori</b> (90%) e hipersecreci\u00f3n \u00e1cida; casi nunca maligniza. La \u00falcera <b>g\u00e1strica</b> requiere descartar malignidad mediante biopsia de los bordes.","n":"6"},{"noShuffle":false,"img":null,"q":"El linfoma g\u00e1strico tipo MALT se asocia etiol\u00f3gicamente a:","o":["El virus de Epstein-Barr","La infecci\u00f3n por H. pylori","El reflujo gastroesof\u00e1gico","La dieta rica en nitrosaminas"],"c":2,"e":"El <b>linfoma MALT g\u00e1strico</b> (zona marginal extranodal) deriva de la hiperplasia linfoide inducida por <b>H. pylori</b>; en fases iniciales puede regresar con la erradicaci\u00f3n del germen.","n":"7"}],"intestino":[{"n":"1","noShuffle":false,"img":null,"q":"La enfermedad cel\u00edaca es una intolerancia permanente a:","o":["La lactosa","Las prote\u00ednas del gluten","Los \u00e1cidos grasos de cadena larga","La fructosa"],"c":2,"e":"La celiaqu\u00eda es la intolerancia permanente al <b>gluten</b> (gliadina del trigo, secalina del centeno, horde\u00edna de la cebada). Intervienen factores gen\u00e9ticos (<b>HLA-DQ2/DQ8</b>), ambientales e inmunol\u00f3gicos."},{"n":"2","noShuffle":false,"img":null,"q":"La lesi\u00f3n histol\u00f3gica caracter\u00edstica de la enfermedad cel\u00edaca incluye:","o":["Granulomas no caseificantes d\u00e9rmicos","Atrofia vellositaria con linfocitosis","Macr\u00f3fagos PAS positivos en l\u00e1mina propia","C\u00e9lulas en anillo de sello mucosas"],"c":2,"e":"La celiaqu\u00eda muestra <b>linfocitosis intraepitelial</b> (>30 linfocitos/100 enterocitos), <b>hiperplasia de criptas</b> y <b>atrofia vellositaria</b> (clasificaci\u00f3n de Marsh). La biopsia es el patr\u00f3n oro; debe hacerse antes de retirar el gluten."},{"n":"3","noShuffle":false,"img":null,"q":"Var\u00f3n de mediana edad con diarrea, malabsorci\u00f3n y biopsia duodenal con macr\u00f3fagos cargados de material PAS+ resistente a diastasa. El diagn\u00f3stico es:","o":["Enfermedad cel\u00edaca","Enfermedad de Whipple","Linfangiectasia intestinal","Enfermedad de Crohn"],"c":2,"e":"La enfermedad de Whipple (infecci\u00f3n por <b>Tropheryma whipplei</b>) se caracteriza por <b>
