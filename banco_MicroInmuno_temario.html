 reaginas; se confirman con pruebas treponémicas (FTA-ABS, TPHA)."}, {"n": "7", "noShuffle": false, "img": null, "q": "Treponema pallidum NO puede diagnosticarse por:", "o": ["La microscopía de campo oscuro de la lesión", "La serología treponémica y no treponémica", "El cultivo rutinario en medios artificiales", "La PCR a partir de la muestra"], "c": 3, "e": "<b>T. pallidum no se cultiva</b> en medios habituales; el diagnóstico es por campo oscuro, serología o PCR."}, {"n": "8", "noShuffle": false, "img": null, "q": "La sífilis terciaria puede manifestarse como:", "o": ["El chancro genital único e indoloro", "El exantema palmoplantar generalizado", "Gomas, aortitis sifilítica y neurosífilis", "La conjuntivitis aguda bilateral"], "c": 3, "e": "La <b>sífilis terciaria</b> (años después) cursa con gomas, aortitis sifilítica y neurosífilis (tabes dorsal, parálisis general)."}], "mic_intracel": [{"n": "1", "noShuffle": false, "img": null, "q": "Chlamydia trachomatis es un patógeno intracelular estricto que causa:", "o": ["La tuberculosis pulmonar cavitada", "La uretritis genital y el tracoma ocular", "El cólera con diarrea acuosa", "La tos ferina del lactante"], "c": 2, "e": "<b>C. trachomatis</b> causa la ETS bacteriana más frecuente (uretritis, cervicitis, EPI) y el tracoma, primera causa de ceguera evitable."}, {"n": "2", "noShuffle": false, "img": null, "q": "Las bacterias intracelulares estrictas (Chlamydia, Rickettsia) se caracterizan por:", "o": ["Crecer con facilidad en el agar sangre", "No multiplicarse fuera de una célula hospedadora", "Formar esporas de gran resistencia", "Tener una pared de peptidoglicano gruesa"], "c": 2, "e": "Las <b>intracelulares estrictas</b> dependen de la célula para obtener energía/metabolitos; no crecen en medios acelulares (se cultivan en líneas celulares)."}, {"n": "3", "noShuffle": false, "img": null, "q": "Las rickettsias se transmiten al ser humano característicamente por:", "o": ["La vía sexual sin protección", "Artrópodos vectores (piojos, garrapatas)", "El agua de bebida contaminada", "Los aerosoles entre personas enfermas"], "c": 2, "e": "Las <b>rickettsias</b> son transmitidas por artrópodos; causan fiebres exantemáticas (tifus, fiebre botonosa) con afectación del endotelio vascular."}, {"n": "4", "noShuffle": false, "img": null, "q": "Mycoplasma pneumoniae es una causa frecuente de:", "o": ["La neumonía atípica del joven", "La meningitis del recién nacido", "La gastroenteritis por alimentos", "La infección urinaria de repetición"], "c": 1, "e": "<b>M. pneumoniae</b> (sin pared) causa neumonía atípica en jóvenes, con clínica leve-arrastrada; resistente a betalactámicos, se trata con macrólidos."}, {"n": "5", "noShuffle": false, "img": null, "q": "Coxiella burnetii es el agente de la fiebre Q y se adquiere por:", "o": ["La vía sexual sin protección", "Los aerosoles del ganado infectado", "La picadura del mosquito vector", "Una transfusión de sangre contaminada"], "c": 2, "e": "<b>C. burnetii</b> es muy resistente e infecta por inhalación de aerosoles del ganado; causa la fiebre Q (neumonía, hepatitis, endocarditis)."}, {"n": "6", "noShuffle": false, "img": null, "q": "¿Por qué los betalactámicos NO son eficaces frente a Mycoplasma?", "o": ["Porque Mycoplasma forma esporas resistentes", "Porque Mycoplasma carece de pared celular", "Porque en realidad es un tipo de virus", "Porque tiene una BLEE que los hidroliza"], "c": 2, "e": "Los betalactámicos actúan sobre la síntesis de pared; <b>Mycoplasma no tiene pared</b>, así que son ineficaces (se usan macrólidos o tetraciclinas)."}, {"n": "7", "noShuffle": false, "img": null, "q": "El cuerpo elemental de Chlamydia corresponde a:", "o": ["La forma activa que se multiplica dentro", "La forma infectiva, extracelular y resistente", "Una espora de resistencia al calor", "Un plásmido de transferencia de genes"], "c": 2, "e": "El <b>cuerpo elemental</b> es la forma infectiva extracelular; dentro de la célula se transforma en cuerpo reticulado, que se multiplica."}, {"n": "8", "noShuffle": false, "img": null, "q": "La fiebre botonosa mediterránea está producida por Rickettsia conorii y se transmite por:", "o": ["El mosquito Anopheles de la malaria", "La garrapata del perro doméstico", "La pulga de la rata urbana", "El piojo del cuerpo humano"], "c": 2, "e": "La <b>fiebre botonosa</b> (R. conorii) la transmite la garrapata del perro; cursa con fiebre, exantema y la 'mancha negra' (tache noire) de inoculación."}], "mic_viro_gen": [{"n": "1", "noShuffle": false, "img": null, "q": "La cápside viral es:", "o": ["La envoltura lipídica más externa del virus", "La cubierta proteica que protege el ácido nucleico", "El propio genoma de ADN o ARN del virus", "Una enzima que replica el material genético"], "c": 2, "e": "La <b>cápside</b> es la cubierta proteica (capsómeros) que protege el genoma; el conjunto cápside+genoma es la nucleocápside."}, {"n": "2", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes afirmaciones sobre los virus NO es correcta?", "o": ["Son parásitos intracelulares obligados", "Tienen ADN o ARN, pero nunca ambos a la vez", "Poseen ribosomas para sintetizar sus proteínas", "Algunos tienen una envoltura de tipo lipídico"], "c": 3, "e": "Los virus <b>carecen de ribosomas</b> y maquinaria propia: usan la de la célula. Tienen un solo tipo de ácido nucleico (ADN o ARN)."}, {"n": "3", "noShuffle": false, "img": null, "q": "Un virus con envoltura (envuelto) es, en general:", "o": ["Más resistente en el ambiente que uno desnudo", "Más sensible a desecación, jabón y disolventes", "Del todo incapaz de infectar a las células", "Siempre un virus de tipo ADN bicatenario"], "c": 2, "e": "La <b>envoltura lipídica</b> hace al virus más lábil (jabón, alcohol, desecación lo inactivan); los virus desnudos son más resistentes en el ambiente."}, {"n": "4", "noShuffle": false, "img": null, "q": "La fase de la replicación viral en que no se detecta virus infeccioso porque está desensamblado se llama:", "o": ["La fase inicial de adsorción al receptor", "El periodo de eclipse de la replicación", "La fase final de liberación de viriones", "La fase de penetración en la célula"], "c": 2, "e": "Durante el <b>eclipse</b> el virus está desensamblado replicando sus componentes; no hay viriones completos detectables hasta el ensamblaje."}, {"n": "5", "noShuffle": false, "img": null, "q": "Los retrovirus se caracterizan por poseer la enzima:", "o": ["ADN polimerasa dependiente de ADN", "Transcriptasa inversa (de ARN a ADN)", "Neuraminidasa de superficie viral", "Lisozima que degrada la pared"], "c": 2, "e": "La <b>transcriptasa inversa</b> copia el ARN viral a ADN, que se integra en el genoma celular; es diana de antirretrovirales."}, {"n": "6", "noShuffle": false, "img": null, "q": "Un bacteriófago es un virus que infecta:", "o": ["A las células humanas nucleadas", "A las bacterias procariotas", "A los hongos levaduriformes", "A los protozoos parásitos"], "c": 2, "e": "El <b>bacteriófago</b> infecta bacterias; puede seguir ciclo lítico o lisogénico (integración como profago) y transferir genes (transducción)."}, {"n": "7", "noShuffle": false, "img": null, "q": "La liberación de los virus envueltos suele producirse por:", "o": ["La lisis brusca de la célula entera", "La gemación a través de la membrana", "La esporulación dentro del citoplasma", "La conjugación con otra célula"], "c": 2, "e": "Los virus <b>envueltos</b> salen por gemación, tomando la membrana celular como envoltura; los desnudos suelen liberarse por lisis."}, {"n": "8", "noShuffle": false, "img": null, "q": "La especificidad de un virus por un tipo de célula (tropismo) depende fundamentalmente de:", "o": ["El tamaño total del virión completo", "La unión entre proteínas virales y receptores", "La temperatura ambiental del entorno", "El número de capsómeros de la cápside"], "c": 2, "e": "El <b>tropismo</b> viene dado por el acoplamiento entre las proteínas de superficie del virus y receptores específicos de la célula (p. ej. CD4 para el VIH)."}, {"n": "9", "noShuffle": false, "img": null, "q": "La infección viral LATENTE se caracteriza por:", "o": ["Una replicación continua con destrucción celular", "La permanencia del genoma sin producir viriones", "La eliminación completa del virus del cuerpo", "Una transformación tumoral de forma inmediata"], "c": 2, "e": "En la <b>latencia</b> (típica de herpesvirus) el genoma persiste silente y puede reactivarse; no hay producción activa de virus mientras dura."}, {"n": "10", "noShuffle": false, "img": null, "q": "Los priones se diferencian de los virus en que:", "o": ["Son moléculas de ARN desnudo infeccioso", "Son proteínas infecciosas sin ácido nucleico", "Contienen ADN circular de doble cadena", "Son en realidad bacterias intracelulares"], "c": 2, "e": "Los <b>priones</b> son proteínas mal plegadas, sin ácido nucleico, que inducen el plegamiento patológico de otras (Creutzfeldt-Jakob, EEB)."}], "mic_viro_dna": [{"n": "1", "noShuffle": false, "img": null, "q": "Los virus del herpes (VHS, VVZ, CMV, VEB) comparten la capacidad de:", "o": ["Integrarse y producir cáncer en todos los casos", "Establecer latencia y reactivarse más tarde", "Replicar en el citoplasma sin usar el núcleo", "Carecer por completo de envoltura lipídica"], "c": 2, "e": "Los <b>herpesvirus</b> (ADN, envueltos) establecen latencia de por vida (ganglios, linfocitos) y se reactivan en inmunodepresión o estrés."}, {"n": "2", "noShuffle": false, "img": null, "q": "El virus del papiloma humano (VPH) de alto riesgo se asocia causalmente a:", "o": ["La mononucleosis infecciosa del joven", "El cáncer de cuello uterino y otros", "La varicela y el herpes zóster", "La hepatitis vírica fulminante"], "c": 2, "e": "El <b>VPH</b> 16 y 18 (oncoproteínas E6/E7 que inactivan p53 y Rb) causan el cáncer de cérvix y otros; existe vacuna preventiva."}, {"n": "3", "noShuffle": false, "img": null, "q": "El virus de Epstein-Barr (VEB) es el agente de:", "o": ["La varicela con vesículas en brotes", "La mononucleosis infecciosa", "La hepatitis A de transmisión fecal-oral", "El sarampión con manchas de Koplik"], "c": 2, "e": "El <b>VEB</b> causa la mononucleosis ('enfermedad del beso') y se asocia a linfoma de Burkitt y carcinoma nasofaríngeo; infecta linfocitos B."}, {"n": "4", "noShuffle": false, "img": null, "q": "El virus varicela-zóster (VVZ) produce varicela en la primoinfección y, al reactivarse, causa:", "o": ["El sarampión con exantema y Koplik", "El herpes zóster o culebrilla", "La rubéola con adenopatías", "La mononucleosis del adolescente"], "c": 2, "e": "Tras la varicela, el <b>VVZ</b> queda latente en ganglios sensitivos; su reactivación produce el herpes zóster con dolor en un dermatoma."}, {"n": "5", "noShuffle": false, "img": null, "q": "El virus de la hepatitis B (VHB) es peculiar entre los virus ADN porque:", "o": ["No tiene ningún tipo de envoltura lipídica", "Replica su ADN usando una transcriptasa inversa", "Es en realidad un virus de tipo ARN", "No produce nunca ningún tipo de infección crónica"], "c": 2, "e": "El <b>VHB</b> (hepadnavirus, ADN) usa transcriptasa inversa en su replicación; puede cronificar y predisponer a cirrosis y hepatocarcinoma."}, {"n": "6", "noShuffle": false, "img": null, "q": "¿Cuál de los siguientes NO es un virus ADN?", "o": ["El virus del herpes simple labial", "El citomegalovirus de la infección congénita", "El virus de la gripe estacional", "El virus del papiloma humano"], "c": 3, "e": "El <b>virus de la gripe</b> (influenza) es un virus ARN; herpes, CMV y VPH son virus ADN."}, {"n": "7", "noShuffle": false, "img": null, "q": "El citomegalovirus (CMV) tiene especial relevancia clínica en:", "o": ["Adultos sanos, en los que siempre es mortal", "El feto y los pacientes inmunodeprimidos", "La piel de forma exclusiva y benigna", "El aparato digestivo de manera exclusiva"], "c": 2, "e": "El <b>CMV</b> suele ser leve en sanos pero es grave como infección congénita (sordera, microcefalia) y en inmunodeprimidos (retinitis, colitis)."}, {"n": "8", "noShuffle": false, "img": null, "q": "El herpes simple tipo 1 (VHS-1) se asocia clásicamente a:", "o": ["El herpes labial y la queratitis ocular", "La hepatitis crónica con cirrosis", "Las verrugas genitales por contacto", "La gastroenteritis aguda del niño"], "c": 1, "e": "El <b>VHS-1</b> causa típicamente herpes orolabial y queratoconjuntivitis; el VHS-2 se asocia más al herpes genital (aunque hay solapamiento)."}, {"n": "9", "noShuffle": false, "img": null, "q": "La vacuna frente al VPH previene principalmente:", "o": ["La hepatitis B crónica y sus complicaciones", "El cáncer de cérvix y las verrugas genitales", "La varicela y la posterior culebrilla del zóster", "La gripe estacional que aparece cada año"], "c": 2, "e": "La <b>vacuna del VPH</b> (frente a los serotipos de alto riesgo y verrugas) previene el cáncer de cuello uterino y otras lesiones por VPH."}, {"n": "10", "noShuffle": false, "img": null, "q": "Los poxvirus, como el de la viruela, son peculiares entre los virus ADN porque:", "o": ["Replican en el citoplasma de la célula", "Se replican de forma exclusiva en el núcleo", "Carecen por completo de genoma de ADN", "Son los virus más pequeños que existen"], "c": 1, "e": "Los <b>poxvirus</b> son grandes y, a diferencia de la mayoría de virus ADN, replican en el <b>citoplasma</b> llevando sus propias enzimas."}], "mic_viro_rna": [{"n": "1", "noShuffle": false, "img": null, "q": "El virus de la gripe (influenza) cambia de antígenos de superficie; el cambio MENOR y gradual se denomina:", "o": ["El salto antigénico brusco (shift)", "La deriva antigénica gradual (drift)", "La latencia del genoma viral", "La lisogenia del bacteriófago"], "c": 2, "e": "La <b>deriva antigénica</b> (drift) son mutaciones puntuales graduales en H y N (epidemias anuales); el <b>shift</b> es reordenamiento brusco (pandemias)."}, {"n": "2", "noShuffle": false, "img": null, "q": "Las proteínas de superficie del virus de la gripe responsables de la entrada y salida son:", "o": ["La cápside y la envoltura lipídica", "La hemaglutinina (H) y la neuraminidasa (N)", "La transcriptasa y la proteasa virales", "La toxina y la adhesina de superficie"], "c": 2, "e": "La <b>hemaglutinina</b> media la unión/entrada y la <b>neuraminidasa</b> la liberación; el oseltamivir inhibe la neuraminidasa."}, {"n": "3", "noShuffle": false, "img": null, "q": "El sarampión es una enfermedad muy contagiosa causada por un paramixovirus, caracterizada por:", "o": ["Una diarrea acuosa muy abundante", "El exantema con manchas de Koplik orales", "Vesículas dolorosas en los genitales", "Ictericia intensa con coluria"], "c": 2, "e": "El <b>sarampión</b> cursa con fiebre, catarro, conjuntivitis, manchas de Koplik y exantema; prevenible con la vacuna triple vírica."}, {"n": "4", "noShuffle": false, "img": null, "q": "Los picornavirus incluyen al poliovirus y a los virus de la hepatitis A; se caracterizan por:", "o": ["Ser virus ADN grandes y envueltos", "Ser virus ARN pequeños y desnudos", "Tener transcriptasa inversa propia", "Formar esporas muy resistentes"], "c": 2, "e": "Los <b>picornavirus</b> (polio, hepatitis A, rinovirus, enterovirus) son ARN pequeños, desnudos y resistentes, de transmisión frecuentemente fecal-oral."}, {"n": "5", "noShuffle": false, "img": null, "q": "El virus respiratorio sincitial (VRS) es la principal causa de:", "o": ["La gastroenteritis aguda del adulto", "La bronquiolitis y neumonía del lactante", "La hepatitis crónica con cirrosis", "La meningitis bacteriana aguda"], "c": 2, "e": "El <b>VRS</b> es la causa más frecuente de bronquiolitis y neumonía en lactantes; muy contagioso en epidemias invernales."}, {"n": "6", "noShuffle": false, "img": null, "q": "El rotavirus es una causa muy frecuente de:", "o": ["La gastroenteritis con diarrea en niños", "La neumonía atípica del joven", "La hepatitis de transmisión sexual", "El exantema febril del lactante"], "c": 1, "e": "El <b>rotavirus</b> causa diarrea aguda deshidratante en lactantes; existe vacuna oral. Transmisión fecal-oral."}, {"n": "7", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes enfermedades NO está causada por un virus ARN?", "o": ["La gripe estacional", "El sarampión infantil", "La poliomielitis", "La varicela"], "c": 4, "e": "La <b>varicela</b> la causa el VVZ, un virus ADN; gripe, sarampión y polio son virus ARN."}, {"n": "8", "noShuffle": false, "img": null, "q": "El virus de la rabia (rhabdovirus) se transmite por:", "o": ["La vía respiratoria mediante gotas", "La mordedura de un animal infectado", "El agua de bebida contaminada", "El contacto sexual sin protección"], "c": 2, "e": "La <b>rabia</b> se transmite por la saliva en mordeduras; asciende por los nervios al SNC causando encefalitis casi siempre mortal una vez sintomática."}, {"n": "9", "noShuffle": false, "img": null, "q": "La vacuna triple vírica protege frente a:", "o": ["La gripe, el VRS y el rotavirus", "El sarampión, la rubéola y la parotiditis", "Las hepatitis A, B y C", "La polio, la difteria y el tétanos"], "c": 2, "e": "La <b>triple vírica</b> (SRP) protege frente a sarampión, rubéola y parotiditis; es una vacuna de virus atenuados."}, {"n": "10", "noShuffle": false, "img": null, "q": "La rubéola adquiere especial gravedad cuando la infección ocurre:", "o": ["En el anciano con pluripatología", "Durante el embarazo (rubéola congénita)", "En el deportista de élite", "Tras una cirugía mayor"], "c": 2, "e": "La <b>rubéola congénita</b> (primer trimestre) causa malformaciones graves (sordera, cardiopatía, cataratas); de ahí la vacunación."}], "mic_retro": [{"n": "1", "noShuffle": false, "img": null, "q": "El VIH infecta preferentemente las células que expresan el receptor:", "o": ["El marcador CD8 de los citotóxicos", "El receptor CD4 de los linfocitos T helper", "El marcador CD19 de los linfocitos B", "El receptor de la transferrina celular"], "c": 2, "e": "El <b>VIH</b> usa CD4 (más correceptores CCR5/CXCR4) para entrar en los linfocitos T colaboradores, que va destruyendo (inmunodeficiencia)."}, {"n": "2", "noShuffle": false, "img": null, "q": "La enzima del VIH que copia su ARN a ADN para integrarse en el genoma celular es:", "o": ["La proteasa que corta proteínas", "La transcriptasa inversa", "La integrasa del provirus", "La neuraminidasa de superficie"], "c": 2, "e": "La <b>transcriptasa inversa</b> sintetiza ADN a partir del ARN viral; luego la integrasa inserta ese ADN en el genoma. Ambas son dianas de fármacos."}, {"n": "3", "noShuffle": false, "img": null, "q": "El SIDA se define por:", "o": ["La primoinfección aguda por el VIH", "La inmunodeficiencia avanzada con oportunistas", "La simple presencia de anticuerpos anti-VIH", "Una carga viral totalmente indetectable"], "c": 2, "e": "El <b>SIDA</b> es la fase avanzada del VIH: caída de CD4 con infecciones oportunistas (Pneumocystis, candidiasis, TB) y tumores definitorios."}, {"n": "4", "noShuffle": false, "img": null, "q": "El virus de la hepatitis C (VHC) se caracteriza por:", "o": ["No cronificar prácticamente nunca tras el contagio", "Su alta tendencia a la cronicidad y la cirrosis", "Transmitirse sobre todo por la vía fecal-oral", "Ser un virus de tipo ADN bicatenario"], "c": 2, "e": "El <b>VHC</b> (ARN) cronifica en la mayoría de los casos y puede llevar a cirrosis y hepatocarcinoma; hoy curable con antivirales de acción directa."}, {"n": "5", "noShuffle": false, "img": null, "q": "El virus de la hepatitis A (VHA) se transmite por:", "o": ["La vía parenteral o sanguínea", "La vía fecal-oral por agua y alimentos", "La vía sexual de forma exclusiva", "La transmisión vertical materno-fetal"], "c": 2, "e": "El <b>VHA</b> se transmite fecal-oral; produce hepatitis aguda autolimitada que NO cronifica. Prevenible con vacuna."}, {"n": "6", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes hepatitis víricas se transmite principalmente por vía parenteral/sexual y puede cronificar?", "o": ["La hepatitis A de los alimentos", "La hepatitis B parenteral y sexual", "La hepatitis E del agua contaminada", "Ninguna de las hepatitis cronifica"], "c": 2, "e": "El <b>VHB</b> se transmite por sangre, sexo y vertical, y puede cronificar (riesgo de cirrosis/hepatocarcinoma); A y E son fecal-orales y agudas."}, {"n": "7", "noShuffle": false, "img": null, "q": "La 'ventana inmunológica' en la infección por VIH se refiere al periodo en que:", "o": ["El virus ya ha desaparecido por completo del cuerpo", "Hay infección pero todavía no se detectan anticuerpos", "El paciente ya no es infeccioso para los demás", "Los linfocitos CD4 están normales de por vida"], "c": 2, "e": "La <b>ventana</b> es el tiempo entre la infección y la aparición de anticuerpos detectables; el infectado puede transmitir aunque la serología sea aún negativa."}, {"n": "8", "noShuffle": false, "img": null, "q": "El tratamiento antirretroviral de gran actividad (TARGA) en el VIH busca:", "o": ["Erradicar por completo el virus del cuerpo", "Suprimir la replicación y recuperar la inmunidad", "Sustituir a las vacunas preventivas", "Curar el VIH en apenas una semana"], "c": 2, "e": "El <b>TARGA</b> combina fármacos de distintas dianas para suprimir la replicación (carga indetectable = intransmisible) y preservar los CD4; no erradica el virus latente."}, {"n": "9", "noShuffle": false, "img": null, "q": "El virus de la hepatitis D (delta) es peculiar porque:", "o": ["Es un virus ADN muy resistente al medio", "Necesita la presencia del VHB para replicarse", "Se transmite por la vía fecal-oral", "No causa ningún tipo de enfermedad"], "c": 2, "e": "El <b>VHD</b> es defectivo: requiere el antígeno de superficie del VHB para infectar; agrava la hepatitis B (coinfección o sobreinfección)."}, {"n": "10", "noShuffle": false, "img": null, "q": "La principal vía de transmisión del VIH a nivel mundial es:", "o": ["La transfusión de sangre contaminada", "Las relaciones sexuales sin protección", "El hecho de compartir cubiertos", "La picadura del mosquito común"], "c": 2, "e": "La <b>transmisión sexual</b> es la principal del VIH; también sangre (jeringas) y vertical. NO se transmite por contacto casual ni mosquitos."}], "mic_hongos": [{"n": "1", "noShuffle": false, "img": null, "q": "Los hongos son microorganismos:", "o": ["Procariotas sin núcleo definido", "Eucariotas con pared de quitina y ergosterol", "Virus de un tamaño especialmente grande", "Bacterias grampositivas filamentosas"], "c": 2, "e": "Los <b>hongos</b> son eucariotas; su pared tiene quitina/glucanos y su membrana ergosterol (diana de azoles y anfotericina)."}, {"n": "2", "noShuffle": false, "img": null, "q": "Candida albicans es una levadura que causa con frecuencia:", "o": ["La tuberculosis pulmonar cavitada", "La candidiasis oral, vaginal o sistémica", "La gripe estacional de cada invierno", "El cólera con diarrea acuosa"], "c": 2, "e": "<b>C. albicans</b> es comensal que se vuelve oportunista: muguet, vulvovaginitis, candidemia en inmunodeprimidos o con catéteres/antibióticos."}, {"n": "3", "noShuffle": false, "img": null, "q": "Aspergillus es un hongo filamentoso (moho) que en el inmunodeprimido puede causar:", "o": ["La aspergilosis pulmonar invasiva", "La caries dental en los molares", "El cólera con diarrea acuosa", "La tos ferina del lactante"], "c": 1, "e": "<b>Aspergillus</b> se inhala (esporas ambientales); causa aspergiloma, aspergilosis broncopulmonar alérgica y enfermedad invasiva en neutropénicos."}, {"n": "4", "noShuffle": false, "img": null, "q": "Las dianas de los antifúngicos azólicos y la anfotericina B en la célula fúngica es:", "o": ["El peptidoglicano de la pared", "El ergosterol de la membrana", "El ribosoma de tipo 70S", "La cápsula polisacárida externa"], "c": 2, "e": "Los <b>azoles</b> inhiben la síntesis de ergosterol y la <b>anfotericina B</b> se une a él formando poros; el ergosterol es exclusivo fúngico."}, {"n": "5", "noShuffle": false, "img": null, "q": "Cryptococcus neoformans causa meningitis especialmente en pacientes con:", "o": ["Diabetes mellitus bien controlada", "SIDA u otra inmunodepresión celular", "Hipertensión arterial esencial", "Caries y enfermedad periodontal"], "c": 2, "e": "<b>Cryptococcus</b> (levadura capsulada, se ve con tinta china) causa meningitis subaguda en inmunodeprimidos, sobre todo en SIDA avanzado."}, {"n": "6", "noShuffle": false, "img": null, "q": "Las dermatofitosis (tiñas) están producidas por hongos que infectan:", "o": ["La sangre y los órganos profundos", "La piel, el pelo y las uñas (queratina)", "El pulmón en su porción profunda", "El intestino delgado y el colon"], "c": 2, "e": "Los <b>dermatofitos</b> (Trichophyton, Microsporum, Epidermophyton) viven de la queratina y causan tiñas (corporal, ungueal, del cuero cabelludo)."}, {"n": "7", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes afirmaciones sobre los hongos NO es correcta?", "o": ["Pueden ser levaduras o mohos filamentosos", "Su pared celular contiene quitina", "Tienen ribosomas 70S como las bacterias", "Algunos son dimórficos según la temperatura"], "c": 3, "e": "Los hongos son eucariotas, con ribosomas <b>80S</b>; las bacterias tienen 70S. El resto de afirmaciones es correcto."}, {"n": "8", "noShuffle": false, "img": null, "q": "Pneumocystis jirovecii causa una neumonía característica en:", "o": ["Los recién nacidos a término sanos", "Los pacientes con SIDA y CD4 bajos", "Los ancianos sanos sin patología", "Los deportistas de alto rendimiento"], "c": 2, "e": "<b>Pneumocystis jirovecii</b> (hongo atípico) causa neumonía oportunista en inmunodeprimidos (SIDA con CD4<200); se trata/previene con cotrimoxazol."}], "mic_parasitos": [{"n": "1", "noShuffle": false, "img": null, "q": "La malaria (paludismo) está causada por protozoos del género Plasmodium y se transmite por:", "o": ["El agua de bebida contaminada", "La picadura del mosquito Anopheles hembra", "El contacto sexual sin protección", "Los alimentos crudos mal lavados"], "c": 2, "e": "El <b>Plasmodium</b> lo inocula el mosquito Anopheles; invade hepatocitos y luego hematíes, causando fiebre cíclica, anemia y, en P. falciparum, malaria grave."}, {"n": "2", "noShuffle": false, "img": null, "q": "Toxoplasma gondii tiene como hospedador definitivo:", "o": ["El perro doméstico", "El gato y otros felinos", "El cerdo de granja", "El propio ser humano"], "c": 2, "e": "El <b>gato</b> es el hospedador definitivo de Toxoplasma; el humano se infecta por ooquistes (heces de gato) o carne poco cocinada. Grave en embarazo e inmunodepresión."}, {"n": "3", "noShuffle": false, "img": null, "q": "Giardia lamblia produce característicamente:", "o": ["La disentería con sangre y moco abundante", "La diarrea con malabsorción intestinal alta", "La meningitis del recién nacido en el parto", "La neumonía atípica del joven sin fiebre"], "c": 2, "e": "<b>Giardia</b> coloniza el duodeno-yeyuno causando diarrea esteatorreica y malabsorción; se transmite por agua/quistes (fecal-oral)."}, {"n": "4", "noShuffle": false, "img": null, "q": "Entamoeba histolytica puede causar, además de disentería amebiana:", "o": ["El absceso hepático amebiano", "La neumonía lobar del adulto", "La caries y la placa dental", "El tétanos con parálisis espástica"], "c": 1, "e": "<b>E. histolytica</b> invade el colon (disentería amebiana) y puede diseminar al hígado formando absceso amebiano (en 'pasta de anchoa')."}, {"n": "5", "noShuffle": false, "img": null, "q": "¿Cuál de los siguientes es un HELMINTO (gusano) y no un protozoo?", "o": ["Plasmodium falciparum", "Toxoplasma gondii", "Ascaris lumbricoides", "Giardia lamblia"], "c": 3, "e": "<b>Ascaris</b> es un helminto (nematodo intestinal); Plasmodium, Toxoplasma y Giardia son protozoos (unicelulares)."}, {"n": "6", "noShuffle": false, "img": null, "q": "El paludismo más grave, con riesgo de malaria cerebral, está producido por:", "o": ["Plasmodium vivax", "Plasmodium falciparum", "Plasmodium ovale", "Plasmodium malariae"], "c": 2, "e": "<b>P. falciparum</b> causa las formas graves (parasitemia alta, malaria cerebral, fallo multiorgánico) y la mayoría de muertes por malaria."}, {"n": "7", "noShuffle": false, "img": null, "q": "La transmisión de muchos helmintos intestinales (Ascaris, anquilostomas) se produce por:", "o": ["La picadura del mosquito vector", "La vía fecal-oral o la piel desde el suelo", "La vía respiratoria entre personas", "La transfusión de sangre infectada"], "c": 2, "e": "Los <b>geohelmintos</b> se adquieren por huevos/larvas del suelo (fecal-oral o penetración cutánea); ligados a saneamiento deficiente."}, {"n": "8", "noShuffle": false, "img": null, "q": "Anisakis es un parásito que se adquiere por:", "o": ["Comer pescado crudo o poco cocinado", "La picadura de una garrapata", "Beber agua de un pozo contaminado", "El contacto con heces de gato"], "c": 1, "e": "El <b>Anisakis</b> se ingiere con pescado crudo (boquerones, sushi); causa dolor abdominal y reacciones alérgicas. Prevención: congelar el pescado."}, {"n": "9", "noShuffle": false, "img": null, "q": "La toxoplasmosis es especialmente peligrosa cuando la primoinfección ocurre:", "o": ["En el deportista de competición", "Durante el embarazo (forma congénita)", "En el anciano previamente sano", "Justo después de una vacunación"], "c": 2, "e": "La <b>toxoplasmosis congénita</b> puede causar coriorretinitis, hidrocefalia y calcificaciones; por eso se vigila en la embarazada seronegativa."}, {"n": "10", "noShuffle": false, "img": null, "q": "Los protozoos se diferencian de los helmintos en que:", "o": ["Son organismos pluricelulares complejos", "Son organismos eucariotas unicelulares", "Son un tipo especial de hongo", "No causan enfermedad en humanos"], "c": 2, "e": "Los <b>protozoos</b> son eucariotas unicelulares (Plasmodium, Giardia, amebas); los <b>helmintos</b> son gusanos pluricelulares (nematodos, cestodos, trematodos)."}, {"n": "11", "noShuffle": false, "img": null, "q": "Trichomonas vaginalis es un protozoo flagelado que causa:", "o": ["La malaria con fiebre cíclica y anemia", "Una vaginitis o uretritis de transmisión sexual", "La neumonía atípica del joven sin fiebre", "La hepatitis crónica de transmisión sexual"], "c": 2, "e": "<b>T. vaginalis</b> es una ITS que produce vaginitis con leucorrea espumosa y uretritis; se trata con metronidazol (a la pareja también)."}, {"n": "12", "noShuffle": false, "img": null, "q": "Taenia solium (tenia del cerdo) puede causar, además de teniasis intestinal:", "o": ["La cisticercosis y la neurocisticercosis", "La malaria con afectación cerebral", "La toxoplasmosis ocular congénita", "La giardiasis con malabsorción"], "c": 1, "e": "La ingesta de huevos de <b>T. solium</b> produce cisticercosis; en el SNC (neurocisticercosis) es causa frecuente de epilepsia en zonas endémicas."}], "mic_practicas": [{"n": "1", "noShuffle": false, "img": null, "q": "La resistencia bacteriana a los antibióticos mediada por betalactamasas consiste en:", "o": ["Modificar la diana ribosómica donde actúa el fármaco", "Producir enzimas que rompen el anillo betalactámico", "Bombear el fármaco hacia fuera de la célula", "Hacer impermeable la espora frente al antibiótico"], "c": 2, "e": "Las <b>betalactamasas</b> rompen el anillo betalactámico inactivando penicilinas/cefalosporinas; un mecanismo clave de resistencia (BLEE, carbapenemasas)."}, {"n": "2", "noShuffle": false, "img": null, "q": "¿Cuál de los siguientes NO es un mecanismo de resistencia bacteriana a antibióticos?", "o": ["La inactivación enzimática del fármaco", "La modificación de la diana del antibiótico", "Las bombas de expulsión o eflujo", "El aumento de la fagocitosis del hospedador"], "c": 4, "e": "Los mecanismos son: inactivación enzimática, modificación de diana, eflujo y disminución de permeabilidad. La fagocitosis es defensa del hospedador, no resistencia."}, {"n": "3", "noShuffle": false, "img": null, "q": "El uso inadecuado y excesivo de antibióticos favorece la resistencia porque:", "o": ["Hace que se creen bacterias totalmente nuevas de cero", "Ejerce presión selectiva que favorece a las resistentes", "Elimina toda la microbiota del cuerpo para siempre", "Vuelve estériles a los propios fármacos antibióticos"], "c": 2, "e": "La <b>presión selectiva</b> elimina las sensibles y deja proliferar las resistentes; de ahí la importancia del uso prudente y los programas PROA."}, {"n": "4", "noShuffle": false, "img": null, "q": "La microbiota normal del organismo cumple funciones de:", "o": ["Producir siempre enfermedad en el hospedador", "Efecto barrera, maduración inmune y vitaminas", "Sustituir por completo al sistema inmune", "Mantener estéril el interior del intestino"], "c": 2, "e": "La <b>microbiota</b> compite con patógenos (efecto barrera), educa al sistema inmune y sintetiza vitaminas (K, grupo B); su desequilibrio es la disbiosis."}, {"n": "5", "noShuffle": false, "img": null, "q": "La concentración mínima inhibitoria (CMI) de un antibiótico es:", "o": ["La dosis que resulta tóxica para el paciente", "La menor concentración que inhibe el crecimiento", "La concentración que mata todo en un minuto", "La dosis que se absorbe a nivel intestinal"], "c": 2, "e": "La <b>CMI</b> es la concentración más baja que inhibe el crecimiento visible; guía la interpretación del antibiograma (sensible/resistente)."}, {"n": "6", "noShuffle": false, "img": null, "q": "El antibiograma por difusión en disco (Kirby-Bauer) interpreta la sensibilidad midiendo:", "o": ["El color que adquiere la colonia", "El diámetro del halo de inhibición del disco", "El número de flagelos de la bacteria", "El tiempo de generación del microbio"], "c": 2, "e": "En el <b>Kirby-Bauer</b>, a mayor halo de inhibición alrededor del disco, mayor sensibilidad; se compara con puntos de corte estandarizados."}, {"n": "7", "noShuffle": false, "img": null, "q": "La tinción de Gram es un paso inicial del diagnóstico que aporta en pocos minutos:", "o": ["La especie exacta y su antibiograma", "La morfología y el tipo de pared (Gram)", "La carga viral presente en la sangre", "El nivel de anticuerpos del paciente"], "c": 2, "e": "La <b>tinción de Gram</b> orienta de forma rápida (morfología y Gram) el tratamiento empírico mientras se espera el cultivo y el antibiograma."}, {"n": "8", "noShuffle": false, "img": null, "q": "Para reducir la resistencia a antibióticos, una medida clave es:", "o": ["Tomar antibióticos ante cualquier catarro", "Usarlos bien y no en infecciones víricas", "Aumentar las dosis siempre al azar", "Compartir la medicación que sobra"], "c": 2, "e": "El <b>uso prudente</b> (no usarlos en virus, completar pautas adecuadas, elegir el de menor espectro eficaz) es esencial para frenar la resistencia."}, {"n": "9", "noShuffle": false, "img": null, "q": "Las muestras para diagnóstico microbiológico deben tomarse, idealmente:", "o": ["Después de iniciar el tratamiento antibiótico", "Antes de iniciar el tratamiento antibiótico", "Solo cuando el paciente ya está curado", "Sin ninguna condición especial de asepsia"], "c": 2, "e": "Tomar la muestra <b>antes del antibiótico</b> evita falsos negativos del cultivo; debe recogerse con asepsia y transportarse adecuadamente."}, {"n": "10", "noShuffle": false, "img": null, "q": "Un parásito que se estudia en las prácticas por transmitirse al comer carne de cerdo poco cocinada es:", "o": ["Giardia lamblia del agua", "Taenia solium o Trichinella", "Plasmodium del mosquito", "Trichomonas de transmisión sexual"], "c": 2, "e": "La carne de cerdo poco cocinada transmite <b>Taenia solium</b> y <b>Trichinella spiralis</b> (triquinosis); la cocción y congelación previenen."}, {"n": "11", "noShuffle": false, "img": null, "q": "La microbiota se considera en disbiosis cuando:", "o": ["Está en perfecto equilibrio y composición", "Su equilibrio se altera y favorece enfermedad", "Desaparece del todo y se recupera sola", "Solo contiene bacterias beneficiosas"], "c": 2, "e": "La <b>disbiosis</b> es el desequilibrio de la microbiota (p. ej. tras antibióticos) y se asocia a infecciones (C. difficile) y otras patologías."}, {"n": "12", "noShuffle": false, "img": null, "q": "La vacunación, desde el punto de vista microbiológico, busca:", "o": ["Tratar una infección que ya está establecida", "Inducir memoria protectora antes del contacto", "Sustituir a los antibióticos en la sepsis", "Eliminar por completo la microbiota normal"], "c": 2, "e": "La <b>vacuna</b> genera memoria inmunológica (linfocitos B y T de memoria) para una respuesta rápida y eficaz ante el patógeno real."}], "inm_intro": [{"n": "1", "noShuffle": false, "img": null, "q": "La inmunidad INNATA se caracteriza, frente a la adaptativa, por:", "o": ["Ser específica de antígeno y tener memoria", "Ser rápida, inespecífica y sin memoria", "Depender por completo de linfocitos T y B", "Tardar varios días en el primer contacto"], "c": 2, "e": "La <b>inmunidad innata</b> es la primera línea: rápida, inespecífica y sin memoria (barreras, fagocitos, NK, complemento). La adaptativa es específica y con memoria."}, {"n": "2", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes NO es una característica de la inmunidad adaptativa?", "o": ["La especificidad frente al antígeno", "La memoria inmunológica duradera", "La respuesta inmediata e inespecífica", "La diversidad de sus receptores"], "c": 3, "e": "La adaptativa es específica, diversa y con memoria, pero su primera respuesta es <b>lenta</b>; la respuesta inmediata e inespecífica es de la innata."}, {"n": "3", "noShuffle": false, "img": null, "q": "Las barreras físicas como la piel y las mucosas forman parte de:", "o": ["La inmunidad adaptativa de tipo humoral", "La inmunidad innata (primera línea)", "La memoria inmunológica de largo plazo", "La respuesta secundaria acelerada"], "c": 2, "e": "Las <b>barreras</b> (piel, mucosas, secreciones, microbiota) son la primera línea de la inmunidad innata, impidiendo la entrada de patógenos."}, {"n": "4", "noShuffle": false, "img": null, "q": "Las células responsables de la inmunidad adaptativa son:", "o": ["Los neutrófilos y los macrófagos", "Los linfocitos T y los linfocitos B", "Las células natural killer (NK)", "Los mastocitos y los basófilos"], "c": 2, "e": "Los <b>linfocitos T y B</b> median la inmunidad adaptativa (celular y humoral); neutrófilos, macrófagos y NK pertenecen a la innata."}, {"n": "5", "noShuffle": false, "img": null, "q": "Un antígeno se define como:", "o": ["Una proteína del propio organismo siempre", "Una molécula que el sistema inmune reconoce", "Un anticuerpo anclado en la membrana", "Una citoquina de tipo inflamatorio"], "c": 2, "e": "Un <b>antígeno</b> es toda molécula reconocida por receptores inmunes (BCR/TCR/anticuerpos); el fragmento concreto reconocido es el epítopo."}, {"n": "6", "noShuffle": false, "img": null, "q": "La inmunidad humoral está mediada principalmente por:", "o": ["Los linfocitos T citotóxicos", "Los anticuerpos de las células plasmáticas", "Los macrófagos fagocíticos", "Las células dendríticas presentadoras"], "c": 2, "e": "La <b>inmunidad humoral</b> la ejercen los anticuerpos (linfocitos B → células plasmáticas); la celular la median los linfocitos T."}, {"n": "7", "noShuffle": false, "img": null, "q": "La inmunidad PASIVA se caracteriza por:", "o": ["Generar una memoria inmunológica muy duradera", "Transferir anticuerpos ya formados (transitoria)", "Requerir siempre una vacunación previa del sujeto", "Activar los propios linfocitos del receptor"], "c": 2, "e": "La <b>inmunidad pasiva</b> (anticuerpos maternos, gammaglobulinas) protege de inmediato pero es transitoria y no genera memoria propia."}, {"n": "8", "noShuffle": false, "img": null, "q": "Los órganos linfoides PRIMARIos (donde maduran los linfocitos) son:", "o": ["El bazo y los ganglios linfáticos", "La médula ósea y el timo", "Las amígdalas y las placas de Peyer", "El hígado y el riñón"], "c": 2, "e": "En los órganos linfoides <b>primarios</b> (médula ósea para B, timo para T) maduran los linfocitos; en los secundarios (ganglios, bazo) se activan."}, {"n": "9", "noShuffle": false, "img": null, "q": "La especificidad del sistema inmunitario adaptativo significa que:", "o": ["Responde igual frente a cualquier microbio", "Cada linfocito reconoce un antígeno concreto", "Carece de cualquier tipo de memoria", "No distingue lo propio de lo extraño"], "c": 2, "e": "La <b>especificidad</b> implica que cada clon linfocitario reconoce un epítopo concreto a través de su receptor único."}, {"n": "10", "noShuffle": false, "img": null, "q": "La capacidad del sistema inmune de no atacar a las moléculas propias se denomina:", "o": ["Inmunogenicidad de los antígenos", "Tolerancia inmunológica", "Opsonización por anticuerpos", "Quimiotaxis de leucocitos"], "c": 2, "e": "La <b>tolerancia</b> inmunológica evita la respuesta frente a lo propio; su fallo origina las enfermedades autoinmunes."}], "inm_innato": [{"n": "1", "noShuffle": false, "img": null, "q": "Los receptores de reconocimiento de patrones (PRR, p. ej. TLR) reconocen:", "o": ["Antígenos específicos y únicos de cada microbio", "Patrones moleculares conservados de los microbios", "Los anticuerpos propios del individuo", "Hormonas circulantes del hospedador"], "c": 2, "e": "Los <b>PRR</b> (como los TLR) reconocen patrones conservados de microbios (PAMP: LPS, peptidoglicano, ARN viral), activando la respuesta innata."}, {"n": "2", "noShuffle": false, "img": null, "q": "Las células NK (natural killer) destruyen preferentemente:", "o": ["Las bacterias libres extracelulares", "Células infectadas por virus y tumorales", "Los hematíes normales circulantes", "Los linfocitos B que están en reposo"], "c": 2, "e": "Las <b>NK</b> matan células estresadas que reducen el MHC-I ('missing self') y median ADCC; clave frente a virus y tumores, sin memoria."}, {"n": "3", "noShuffle": false, "img": null, "q": "El sistema del complemento tiene tres funciones principales: opsonización, inflamación y...", "o": ["La síntesis de los anticuerpos", "La lisis celular mediante el MAC", "La presentación de antígenos", "La memoria inmunológica"], "c": 2, "e": "El complemento opsoniza (C3b), inflama (anafilotoxinas C3a/C5a) y lisa formando el <b>MAC (C5b-9)</b> que perfora la membrana del patógeno."}, {"n": "4", "noShuffle": false, "img": null, "q": "La vía CLÁSICA del complemento se activa por:", "o": ["El LPS de la pared bacteriana de forma directa", "Los complejos antígeno-anticuerpo (IgG o IgM)", "La lectina que se une a la manosa microbiana", "El factor D propio de la vía alternativa"], "c": 2, "e": "La vía <b>clásica</b> se inicia cuando C1q reconoce anticuerpos (IgM/IgG) unidos al antígeno; la alternativa y la de las lectinas no necesitan anticuerpo."}, {"n": "5", "noShuffle": false, "img": null, "q": "La fagocitosis es realizada principalmente por:", "o": ["Los linfocitos B de memoria", "Los neutrófilos y los macrófagos", "Las células plasmáticas secretoras", "Los eritrocitos de la sangre"], "c": 2, "e": "Los <b>fagocitos</b> profesionales (neutrófilos, macrófagos) engloban y destruyen patógenos; la opsonización (C3b, IgG) facilita el proceso."}, {"n": "6", "noShuffle": false, "img": null, "q": "Las anafilotoxinas C3a y C5a del complemento provocan:", "o": ["La lisis directa de la bacteria", "Inflamación, quimiotaxis y permeabilidad", "La síntesis de los anticuerpos", "La tolerancia frente a lo propio"], "c": 2, "e": "C3a y C5a son <b>anafilotoxinas</b>: reclutan leucocitos (quimiotaxis), activan mastocitos y aumentan la permeabilidad, amplificando la inflamación."}, {"n": "7", "noShuffle": false, "img": null, "q": "Los interferones de tipo I (IFN-α/β) tienen como función principal:", "o": ["Inducir un estado antiviral en las células vecinas", "Activar la cascada del complemento sérico", "Producir los anticuerpos neutralizantes", "Formar el complejo de ataque a la membrana"], "c": 1, "e": "Los <b>interferones de tipo I</b> los liberan las células infectadas por virus e inducen resistencia antiviral en las células vecinas."}, {"n": "8", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes NO es una función del complemento?", "o": ["La opsonización del patógeno", "La lisis mediante el MAC", "El reclutamiento de células inflamatorias", "La presentación de antígenos a los T"], "c": 4, "e": "El complemento opsoniza, lisa e inflama; la <b>presentación de antígenos</b> la realizan las células presentadoras (dendríticas, macrófagos) vía MHC."}, {"n": "9", "noShuffle": false, "img": null, "q": "La C3b, fragmento central del complemento, actúa fundamentalmente como:", "o": ["Una anafilotoxina que amplifica la inflamación", "Una opsonina que facilita la fagocitosis", "Un componente exclusivo y final del MAC", "Un anticuerpo neutralizante de toxinas"], "c": 2, "e": "La <b>C3b</b> recubre el patógeno (opsonina) y favorece su fagocitosis al unirse a receptores del complemento de los fagocitos."}, {"n": "10", "noShuffle": false, "img": null, "q": "La inflamación aguda como respuesta innata se caracteriza por la salida de:", "o": ["Linfocitos B de memoria al tejido", "Neutrófilos y plasma al foco inflamatorio", "Células plasmáticas secretoras", "Eritrocitos hacia el tejido sano"], "c": 2, "e": "La <b>inflamación</b> innata moviliza neutrófilos y plasma al foco mediante vasodilatación y aumento de permeabilidad (signos cardinales)."}, {"n": "11", "noShuffle": false, "img": null, "q": "Las células presentadoras de antígeno profesionales por excelencia, que activan a los linfocitos T vírgenes, son:", "o": ["Los eritrocitos de la sangre", "Las células dendríticas", "Los neutrófilos del exudado", "Las plaquetas circulantes"], "c": 2, "e": "Las <b>células dendríticas</b> son las APC más potentes: capturan antígeno, migran al ganglio y activan los linfocitos T vírgenes (puente innata-adaptativa)."}, {"n": "12", "noShuffle": false, "img": null, "q": "Los mastocitos y basófilos participan en la respuesta innata e inflamatoria liberando:", "o": ["Anticuerpos de tipo IgG", "Histamina y mediadores vasoactivos", "Interferón gamma activador", "Perforina y granzimas"], "c": 2, "e": "Mastocitos y basófilos liberan <b>histamina</b> y otros mediadores que aumentan la permeabilidad vascular; centrales en la alergia (hipersensibilidad I)."}], "inm_linfoT": [{"n": "1", "noShuffle": false, "img": null, "q": "Los linfocitos T maduran en:", "o": ["La médula ósea roja", "El timo", "El bazo", "Los ganglios linfáticos"], "c": 2, "e": "Los linfocitos <b>T</b> maduran en el timo (de ahí la 'T'), donde se seleccionan los que reconocen MHC propio y se eliminan los autorreactivos."}, {"n": "2", "noShuffle": false, "img": null, "q": "Los linfocitos T colaboradores (helper) se identifican por el marcador:", "o": ["El marcador CD8", "El marcador CD4", "El marcador CD19", "El marcador CD56"], "c": 2, "e": "Los <b>T helper</b> son CD4+ y reconocen antígeno presentado por MHC-II; coordinan la respuesta (activan B, macrófagos y T citotóxicos)."}, {"n": "3", "noShuffle": false, "img": null, "q": "Los linfocitos T citotóxicos (CD8) reconocen el antígeno presentado por:", "o": ["El MHC de clase II", "El MHC de clase I", "Los anticuerpos de membrana", "El complemento activado"], "c": 2, "e": "Los <b>T CD8 citotóxicos</b> reconocen péptidos sobre <b>MHC-I</b> (presente en toda célula nucleada) y destruyen células infectadas o tumorales."}, {"n": "4", "noShuffle": false, "img": null, "q": "La función principal de los linfocitos T citotóxicos es:", "o": ["Producir grandes cantidades de anticuerpos", "Destruir células infectadas y tumorales", "Fagocitar las bacterias extracelulares", "Liberar histamina en la alergia"], "c": 2, "e": "Los <b>T citotóxicos (CD8)</b> matan células diana mediante perforina y granzimas o vía Fas, clave frente a virus y tumores."}, {"n": "5", "noShuffle": false, "img": null, "q": "Los linfocitos T helper de tipo Th1 promueven fundamentalmente:", "o": ["La respuesta alérgica mediada por IgE", "La inmunidad celular (macrófagos, CD8)", "La producción de anticuerpos IgE", "La tolerancia frente a lo propio"], "c": 2, "e": "Los <b>Th1</b> (IFN-γ) potencian la inmunidad celular frente a patógenos intracelulares; los Th2 favorecen la humoral y la respuesta antiparasitaria/alérgica."}, {"n": "6", "noShuffle": false, "img": null, "q": "Los linfocitos T reguladores (Treg) tienen como función:", "o": ["Amplificar al máximo la inflamación", "Mantener la tolerancia y frenar la respuesta", "Producir grandes cantidades de anticuerpos", "Destruir las bacterias de forma directa"], "c": 2, "e": "Los <b>Treg</b> (CD4+CD25+FoxP3+) frenan la respuesta y mantienen la tolerancia periférica; su déficit favorece la autoinmunidad."}, {"n": "7", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes afirmaciones sobre los linfocitos T NO es correcta?", "o": ["Reconocen el antígeno mediante el TCR", "Maduran en el órgano tímico", "Reconocen antígeno libre, sin necesidad de MHC", "Se dividen en subpoblaciones CD4 y CD8"], "c": 3, "e": "El TCR reconoce el antígeno SOLO procesado y presentado sobre <b>MHC</b> (restricción MHC); no reconoce antígeno libre, a diferencia del anticuerpo."}, {"n": "8", "noShuffle": false, "img": null, "q": "Los linfocitos Th17 se relacionan especialmente con:", "o": ["La defensa antifúngica y la inflamación", "La tolerancia central en el timo", "La lisis directa de las células tumorales", "La producción de anticuerpos IgE"], "c": 1, "e": "Los <b>Th17</b> (IL-17) reclutan neutrófilos y defienden frente a hongos y bacterias extracelulares; implicados también en enfermedades inflamatorias/autoinmunes."}, {"n": "9", "noShuffle": false, "img": null, "q": "La selección negativa de los linfocitos T en el timo sirve para:", "o": ["Eliminar los que no reconocen el MHC propio", "Eliminar los linfocitos fuertemente autorreactivos", "Aumentar el número de autorreactivos", "Producir anticuerpos de alta afinidad"], "c": 2, "e": "La <b>selección negativa</b> elimina los timocitos que reconocen con alta afinidad antígenos propios, estableciendo la tolerancia central."}, {"n": "10", "noShuffle": false, "img": null, "q": "La activación completa de un linfocito T virgen requiere:", "o": ["Solo el reconocimiento del antígeno por el TCR", "Dos señales: antígeno-MHC más coestimulación", "La presencia previa de un anticuerpo", "La fagocitosis previa por un neutrófilo"], "c": 2, "e": "La activación T necesita la <b>señal 1</b> (TCR-péptido/MHC) y la <b>señal 2</b> de coestimulación (CD28-B7); sin coestímulo se induce anergia."}], "inm_receptores": [{"n": "1", "noShuffle": false, "img": null, "q": "El receptor del linfocito T (TCR) reconoce:", "o": ["El antígeno nativo y libre en solución", "Péptidos presentados sobre moléculas MHC", "Los polisacáridos de forma directa", "Los lípidos de la pared bacteriana"], "c": 2, "e": "El <b>TCR</b> reconoce péptidos unidos a MHC (restricción MHC); a diferencia del anticuerpo, no reconoce el antígeno libre ni nativo."}, {"n": "2", "noShuffle": false, "img": null, "q": "El MHC de clase I está presente en:", "o": ["Solo las células presentadoras profesionales", "Todas las células nucleadas del cuerpo", "Solo los linfocitos B activados", "Solo los hematíes circulantes"], "c": 2, "e": "El <b>MHC-I</b> está en todas las células nucleadas y presenta péptidos endógenos a los CD8; permite vigilar infecciones intracelulares y tumores."}, {"n": "3", "noShuffle": false, "img": null, "q": "El MHC de clase II se expresa fundamentalmente en:", "o": ["Todas las células del organismo", "Las células presentadoras de antígeno", "Los hematíes y las plaquetas", "Las neuronas del sistema nervioso"], "c": 2, "e": "El <b>MHC-II</b> es propio de las APC y presenta péptidos exógenos a los linfocitos T CD4 colaboradores."}, {"n": "4", "noShuffle": false, "img": null, "q": "La gran diversidad de receptores de antígeno (TCR y BCR) se genera por:", "o": ["La mutación aleatoria del propio MHC", "La recombinación somática V(D)J", "La síntesis de ADN totalmente nuevo", "La activación del complemento sérico"], "c": 2, "e": "La <b>recombinación V(D)J</b> reordena segmentos génicos generando millones de especificidades distintas; añade diversidad la unión imprecisa y, en B, la hipermutación."}, {"n": "5", "noShuffle": false, "img": null, "q": "El MHC en humanos recibe el nombre de:", "o": ["El sistema de grupos ABO", "El sistema HLA", "El sistema del factor Rh", "El sistema del complemento"], "c": 2, "e": "El complejo mayor de histocompatibilidad humano es el <b>HLA</b> (Human Leukocyte Antigen); su tipificación es clave en trasplantes."}, {"n": "6", "noShuffle": false, "img": null, "q": "Los péptidos presentados por el MHC de clase I proceden característicamente de:", "o": ["Proteínas extracelulares fagocitadas", "Proteínas del citosol de la propia célula", "La membrana de células vecinas", "Los componentes del complemento"], "c": 2, "e": "El <b>MHC-I</b> presenta péptidos endógenos (proteínas citosólicas, virales) procesados por el proteasoma a los CD8."}, {"n": "7", "noShuffle": false, "img": null, "q": "La porción del anticuerpo que reconoce y se une al antígeno es:", "o": ["La región constante Fc", "La región variable Fab", "La cadena J de unión", "El componente C1 del complemento"], "c": 2, "e": "La región <b>Fab</b> (variable) une el antígeno; la <b>Fc</b> (constante) determina la función efectora (unión a complemento, a receptores Fc)."}, {"n": "8", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes afirmaciones sobre el reconocimiento antigénico NO es correcta?", "o": ["El anticuerpo reconoce el antígeno nativo", "El TCR necesita el antígeno sobre el MHC", "El BCR no reconoce antígeno libre", "El MHC-I presenta a los linfocitos CD8"], "c": 3, "e": "El <b>BCR/anticuerpo SÍ</b> reconoce antígeno libre y nativo (epítopos conformacionales); el que necesita MHC es el TCR."}, {"n": "9", "noShuffle": false, "img": null, "q": "La región Fc de la inmunoglobulina es responsable de:", "o": ["Unirse directamente al antígeno", "Las funciones efectoras (complemento, Fc)", "La diversidad por recombinación V(D)J", "La presentación de péptidos por el MHC"], "c": 2, "e": "La <b>Fc</b> media las funciones efectoras: activa complemento, permite opsonofagocitosis (receptores Fc) y la ADCC."}, {"n": "10", "noShuffle": false, "img": null, "q": "La presentación cruzada permite que ciertas células dendríticas:", "o": ["Presenten antígenos exógenos también por MHC-I", "Eliminen el MHC de su propia superficie", "Produzcan grandes cantidades de anticuerpos", "Activen la vía clásica del complemento"], "c": 1, "e": "La <b>presentación cruzada</b> permite a las dendríticas mostrar antígenos exógenos vía MHC-I a los CD8, esencial para la inmunidad antiviral y antitumoral."}, {"n": "11", "noShuffle": false, "img": null, "q": "El procesamiento de antígenos EXÓGENOS (fagocitados) sigue habitualmente la vía:", "o": ["La del MHC-I por el proteasoma", "La del MHC-II por la vía endolisosomal", "La de la cascada del complemento", "La que no necesita procesamiento"], "c": 2, "e": "Los antígenos <b>exógenos</b> se degradan en endosomas/lisosomas y se cargan en <b>MHC-II</b> para presentarlos a los CD4."}, {"n": "12", "noShuffle": false, "img": null, "q": "Las moléculas HLA presentan una enorme variabilidad entre individuos; esto se denomina:", "o": ["Monomorfismo del sistema", "Polimorfismo (muchos alelos)", "Tolerancia inmunológica", "Anergia de los linfocitos"], "c": 2, "e": "El <b>polimorfismo</b> del HLA (muchísimos alelos en la población) dificulta la compatibilidad en trasplantes pero permite presentar gran variedad de péptidos."}, {"n": "13", "noShuffle": false, "img": null, "q": "La unión de un superantígeno se diferencia del antígeno convencional en que:", "o": ["Se procesa y presenta de forma normal", "Une el MHC-II al TCR fuera del surco", "Solo activa un único clon de linfocitos", "No interacciona con ningún linfocito"], "c": 2, "e": "El <b>superantígeno</b> enlaza el MHC-II y el TCR por fuera del surco peptídico, activando masivamente linfocitos T (tormenta de citoquinas)."}, {"n": "14", "noShuffle": false, "img": null, "q": "La afinidad de los anticuerpos por el antígeno aumenta a lo largo de la respuesta por un proceso llamado:", "o": ["La recombinación V(D)J de los segmentos génicos", "La maduración de la afinidad por hipermutación", "La selección positiva de timocitos en el timo", "La opsonización mediada por el complemento"], "c": 2, "e": "La <b>maduración de la afinidad</b> en el centro germinal (hipermutación somática + selección) genera anticuerpos cada vez más afines."}], "inm_linfoB": [{"n": "1", "noShuffle": false, "img": null, "q": "Los linfocitos B, al activarse y diferenciarse, se convierten en:", "o": ["Macrófagos fagocíticos que residen en el tejido", "Células plasmáticas productoras de anticuerpos", "Linfocitos T de tipo citotóxico y memoria", "Células natural killer recién activadas"], "c": 2, "e": "El linfocito B activado se diferencia en <b>célula plasmática</b> (fábrica de anticuerpos) y en células B de memoria."}, {"n": "2", "noShuffle": false, "img": null, "q": "El primer isotipo de anticuerpo que se produce en una respuesta inmune es:", "o": ["La inmunoglobulina IgG", "La inmunoglobulina IgM", "La inmunoglobulina IgA", "La inmunoglobulina IgE"], "c": 2, "e": "La <b>IgM</b> (pentámero) es el primer anticuerpo de la respuesta primaria; su presencia indica infección reciente. Luego ocurre el cambio de clase."}, {"n": "3", "noShuffle": false, "img": null, "q": "El anticuerpo más abundante en suero y el único que atraviesa la placenta es:", "o": ["La inmunoglobulina IgM", "La inmunoglobulina IgG", "La inmunoglobulina IgA", "La inmunoglobulina IgD"], "c": 2, "e": "La <b>IgG</b> es la más abundante, predomina en la respuesta secundaria, opsoniza, fija complemento y cruza la placenta (inmunidad pasiva al feto)."}, {"n": "4", "noShuffle": false, "img": null, "q": "La inmunoglobulina predominante en las secreciones (saliva, lágrimas, mucosas, leche) es:", "o": ["La inmunoglobulina IgG sérica circulante", "La inmunoglobulina IgA de tipo secretor", "La inmunoglobulina IgE de la alergia", "La inmunoglobulina IgD de membrana"], "c": 2, "e": "La <b>IgA secretora</b> protege las mucosas; la leche materna la aporta al lactante (inmunidad pasiva en el tubo digestivo)."}, {"n": "5", "noShuffle": false, "img": null, "q": "La inmunoglobulina implicada en la alergia y la defensa frente a parásitos es:", "o": ["La inmunoglobulina IgG", "La inmunoglobulina IgM", "La inmunoglobulina IgE", "La inmunoglobulina IgA"], "c": 3, "e": "La <b>IgE</b> se une a mastocitos/basófilos; su entrecruzamiento por el alérgeno desencadena la hipersensibilidad inmediata (tipo I) y combate helmintos."}, {"n": "6", "noShuffle": false, "img": null, "q": "El cambio de isotipo (switch de clase) de los anticuerpos:", "o": ["Cambia la especificidad frente al antígeno", "Cambia la región constante (función efectora)", "Elimina por completo la región variable", "Solo ocurre en los linfocitos T"], "c": 2, "e": "El <b>cambio de clase</b> sustituye la región constante (IgM→IgG/IgA/IgE) cambiando la función efectora, pero conserva la especificidad antigénica."}, {"n": "7", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes NO es una función de los anticuerpos?", "o": ["La neutralización de toxinas y virus", "La opsonización para la fagocitosis", "La activación del complemento (vía clásica)", "La lisis directa de la bacteria por contacto"], "c": 4, "e": "Los anticuerpos neutralizan, opsonizan, activan complemento y median ADCC; <b>no lisan por sí solos</b>: necesitan el complemento o células efectoras."}, {"n": "8", "noShuffle": false, "img": null, "q": "Las respuestas a antígenos T-INDEPENDIENTES (p. ej. polisacáridos capsulares) se caracterizan por:", "o": ["Generar mucha memoria y abundante IgG", "Producir sobre todo IgM, con escasa memoria", "Requerir la presentación por el MHC-II", "No producir ningún tipo de anticuerpo"], "c": 2, "e": "Los antígenos <b>T-independientes</b> (polisacáridos) activan B sin ayuda T: respuesta sobre todo IgM, escasa memoria; por eso las vacunas se conjugan a proteína."}, {"n": "9", "noShuffle": false, "img": null, "q": "La ADCC (citotoxicidad dependiente de anticuerpo) consiste en que:", "o": ["El propio anticuerpo lisa la célula diana", "Las NK destruyen la diana recubierta de Ac", "El complemento opsoniza al patógeno", "El linfocito B fagocita el microbio"], "c": 2, "e": "En la <b>ADCC</b>, las NK (y otras células) reconocen la Fc de los anticuerpos que recubren la diana y la destruyen."}, {"n": "10", "noShuffle": false, "img": null, "q": "La estructura básica de una inmunoglobulina está formada por:", "o": ["Una única cadena polipeptídica larga", "Dos cadenas pesadas y dos ligeras", "Únicamente regiones constantes", "Tres cadenas pesadas idénticas"], "c": 2, "e": "El anticuerpo tiene <b>2 cadenas pesadas + 2 ligeras</b> (forma de Y); las regiones variables forman el sitio de unión al antígeno (Fab)."}], "inm_memoria": [{"n": "1", "noShuffle": false, "img": null, "q": "La respuesta inmune SECUNDARIA (segundo contacto con el antígeno) es:", "o": ["Más lenta y débil que la primaria", "Más rápida e intensa, con predominio de IgG", "Idéntica en todo a la respuesta primaria", "Mediada solo por la inmunidad innata"], "c": 2, "e": "La <b>respuesta secundaria</b> es rápida, potente y con IgG de alta afinidad por las células de memoria: fundamento de la vacunación."}, {"n": "2", "noShuffle": false, "img": null, "q": "Las vacunas de microorganismos VIVOS ATENUADOS (p. ej. triple vírica) se caracterizan por:", "o": ["No generar ningún tipo de memoria inmunológica", "Dar inmunidad potente, pero evitarse en inmunodeprimidos", "Ser siempre las más seguras para cualquier paciente", "Contener únicamente toxoides ya inactivados"], "c": 2, "e": "Las <b>atenuadas</b> dan inmunidad fuerte y duradera (a veces una dosis), pero por contener microbio vivo se evitan en inmunodeprimidos y embarazo."}, {"n": "3", "noShuffle": false, "img": null, "q": "Un toxoide vacunal es:", "o": ["Un microorganismo vivo pero claramente atenuado", "Una toxina inactivada que sigue siendo antigénica", "Un anticuerpo ya preformado de protección pasiva", "Un fragmento de ADN del propio patógeno"], "c": 2, "e": "El <b>toxoide</b> (tétanos, difteria) es una toxina inactivada que induce anticuerpos neutralizantes sin causar enfermedad."}, {"n": "4", "noShuffle": false, "img": null, "q": "La inmunidad activa frente a la pasiva se diferencia en que la activa:", "o": ["Aporta anticuerpos ya formados de inmediato", "Genera memoria propia y dura más tiempo", "No necesita al sistema inmune del individuo", "Es siempre de carácter transitorio"], "c": 2, "e": "La <b>inmunidad activa</b> (infección o vacuna) implica al sistema inmune propio y genera memoria duradera; la pasiva da protección inmediata pero transitoria."}, {"n": "5", "noShuffle": false, "img": null, "q": "Las vacunas conjugadas (polisacárido unido a una proteína transportadora) se desarrollaron para:", "o": ["Eliminar la necesidad de cualquier refuerzo", "Lograr respuesta T-dependiente con memoria", "Sustituir por completo a los antibióticos", "Evitar toda respuesta inmune del cuerpo"], "c": 2, "e": "Conjugar el polisacárido a una proteína recluta ayuda T, logrando memoria y respuesta eficaz incluso en lactantes (p. ej. Hib, neumococo, meningococo)."}, {"n": "6", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes NO es un tipo de vacuna?", "o": ["La vacuna de microorganismo vivo atenuado", "La vacuna inactivada o muerta", "La vacuna de subunidades o toxoide", "La administración de anticuerpos preformados"], "c": 4, "e": "Administrar <b>anticuerpos preformados</b> es inmunización pasiva (sueroterapia), no una vacuna; las vacunas inducen inmunidad activa."}, {"n": "7", "noShuffle": false, "img": null, "q": "Las células de memoria responsables de la respuesta secundaria rápida son:", "o": ["Los neutrófilos de memoria del foco", "Los linfocitos T y B de memoria", "Las células natural killer activadas", "Los mastocitos cargados de histamina"], "c": 2, "e": "Los <b>linfocitos T y B de memoria</b> persisten años y responden con rapidez y mayor intensidad ante un nuevo contacto con el antígeno."}, {"n": "8", "noShuffle": false, "img": null, "q": "La inmunidad de grupo (rebaño) consiste en que:", "o": ["Cada individuo se inmuniza unas diez veces", "Una población inmune protege a los no inmunes", "La protección alcanza solo a los vacunados", "Se elimina la necesidad de toda vacuna"], "c": 2, "e": "La <b>inmunidad de rebaño</b> reduce la circulación del patógeno cuando hay suficiente población inmune, protegiendo a quienes no pueden vacunarse."}], "inm_patogenos": [{"n": "1", "noShuffle": false, "img": null, "q": "La defensa frente a BACTERIAS EXTRACELULARES se basa principalmente en:", "o": ["Los linfocitos T citotóxicos", "Anticuerpos, complemento y fagocitos", "Los interferones de tipo I", "Solo las células de memoria"], "c": 2, "e": "Frente a bacterias <b>extracelulares</b>, los anticuerpos opsonizan y neutralizan, el complemento lisa/opsoniza y los neutrófilos fagocitan."}, {"n": "2", "noShuffle": false, "img": null, "q": "La defensa frente a patógenos INTRACELULARES (p. ej. micobacterias, virus) recae sobre todo en:", "o": ["La inmunidad humoral por anticuerpos", "La inmunidad celular (Th1, CD8)", "La vía alternativa del complemento", "La inmunoglobulina A secretora"], "c": 2, "e": "Los patógenos <b>intracelulares</b> requieren respuesta celular: Th1 (IFN-γ) que activa macrófagos, y CD8 que destruyen células infectadas."}, {"n": "3", "noShuffle": false, "img": null, "q": "La principal defensa frente a los VIRUS, una vez dentro de la célula, es:", "o": ["Únicamente los anticuerpos neutralizantes", "Los linfocitos CD8 y los interferones", "El complemento por la vía clásica", "Los eosinófilos de la sangre"], "c": 2, "e": "Frente a la célula ya infectada actúan los <b>CD8</b> (la destruyen) y los <b>interferones</b>; los anticuerpos neutralizan el virus libre extracelular."}, {"n": "4", "noShuffle": false, "img": null, "q": "La defensa frente a HELMINTOS (gusanos) se asocia característicamente a:", "o": ["La IgG opsonizante y los neutrófilos", "La IgE, los eosinófilos y la respuesta Th2", "Los linfocitos T citotóxicos de tipo CD8", "El complemento activado por la vía clásica"], "c": 2, "e": "Frente a <b>helmintos</b> domina la respuesta Th2 con IgE y eosinófilos, que liberan su contenido tóxico sobre el parásito."}, {"n": "5", "noShuffle": false, "img": null, "q": "Los granulomas que se forman en la tuberculosis son una respuesta de tipo:", "o": ["Humoral con anticuerpos circulantes", "Celular (Th1 y macrófagos) de contención", "Alérgica mediada por la IgE", "Mediada por el sistema del complemento"], "c": 2, "e": "El <b>granuloma</b> es una respuesta celular Th1: los macrófagos activados rodean y contienen las micobacterias que no pueden eliminar del todo."}, {"n": "6", "noShuffle": false, "img": null, "q": "Muchos patógenos evaden la respuesta inmune mediante todos los siguientes mecanismos EXCEPTO:", "o": ["La variación de sus antígenos de superficie", "La cápsula que impide la fagocitosis", "La inhibición de la presentación por MHC", "El aumento del interferón del hospedador"], "c": 4, "e": "Los microbios evaden con variación antigénica, cápsula, latencia o bloqueo del MHC; <b>aumentar el interferón del hospedador</b> los perjudicaría, no es evasión."}, {"n": "7", "noShuffle": false, "img": null, "q": "La IgA secretora protege frente a patógenos en:", "o": ["La sangre y el plasma circulante", "Las superficies mucosas del cuerpo", "El interior de las células", "Los ganglios linfáticos"], "c": 2, "e": "La <b>IgA secretora</b> neutraliza patógenos y toxinas en las mucosas, impidiendo su adhesión; primera barrera humoral en superficies."}, {"n": "8", "noShuffle": false, "img": null, "q": "La respuesta Th1 frente a un patógeno intracelular se caracteriza por la citoquina:", "o": ["La interleucina IL-4", "El interferón gamma (IFN-γ)", "La inmunoglobulina IgE", "La histamina vasoactiva"], "c": 2, "e": "Los <b>Th1</b> secretan IFN-γ, que activa a los macrófagos para destruir patógenos intracelulares; eje central de la inmunidad celular."}], "inm_inmunodef": [{"n": "1", "noShuffle": false, "img": null, "q": "Las inmunodeficiencias PRIMARIAS se caracterizan por:", "o": ["Ser adquiridas por infección o fármacos", "Tener un origen genético o congénito", "Afectar únicamente a los ancianos", "Resolverse siempre de forma espontánea"], "c": 2, "e": "Las <b>primarias</b> son congénitas/genéticas (defecto intrínseco del sistema inmune); las secundarias son adquiridas (VIH, fármacos, desnutrición)."}, {"n": "2", "noShuffle": false, "img": null, "q": "La causa más frecuente de inmunodeficiencia SECUNDARIA grave a nivel mundial es:", "o": ["La diabetes mellitus mal controlada", "La infección por el virus VIH", "La hipertensión arterial esencial", "Las alergias estacionales comunes"], "c": 2, "e": "El <b>VIH</b>, al destruir los linfocitos T CD4, es la principal causa de inmunodeficiencia secundaria grave (SIDA) en el mundo."}, {"n": "3", "noShuffle": false, "img": null, "q": "La inmunodeficiencia combinada grave (SCID) se caracteriza por:", "o": ["El déficit aislado de la IgA", "La ausencia de función de linfocitos T y B", "El déficit solo de algún complemento", "Un exceso de producción de anticuerpos"], "c": 2, "e": "La <b>SCID</b> compromete linfocitos T y B: infecciones graves de repetición desde los primeros meses; es una urgencia (trasplante de progenitores)."}, {"n": "4", "noShuffle": false, "img": null, "q": "La agammaglobulinemia de Bruton (ligada al X) cursa con:", "o": ["La ausencia de linfocitos B y anticuerpos", "Un déficit de los factores del complemento", "Un exceso marcado de la IgE", "Una falta total de neutrófilos"], "c": 1, "e": "En la <b>enfermedad de Bruton</b> los linfocitos B no maduran: faltan anticuerpos, con infecciones bacterianas de repetición a partir de los 6 meses (al perder la IgG materna)."}, {"n": "5", "noShuffle": false, "img": null, "q": "Los pacientes con déficit de los componentes terminales del complemento (C5-C9, MAC) presentan riesgo aumentado de:", "o": ["Las infecciones por Neisseria", "Los tumores cutáneos malignos", "Las alergias respiratorias", "Las trombosis venosas profundas"], "c": 1, "e": "El déficit del <b>MAC (C5-9)</b> predispone específicamente a infecciones por Neisseria (meningococo), que requieren la lisis por complemento."}, {"n": "6", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes NO es una inmunodeficiencia secundaria?", "o": ["La causada por el virus VIH", "La inducida por la quimioterapia", "La debida a desnutrición grave", "La enfermedad granulomatosa crónica"], "c": 4, "e": "La <b>enfermedad granulomatosa crónica</b> es primaria (defecto genético de la NADPH oxidasa del fagocito); las otras son adquiridas."}, {"n": "7", "noShuffle": false, "img": null, "q": "La enfermedad granulomatosa crónica se debe a un defecto en:", "o": ["La producción de los anticuerpos", "La destrucción del microbio por el fagocito", "Los linfocitos T de tipo citotóxico", "La cascada del complemento sérico"], "c": 2, "e": "En la <b>EGC</b> falla la NADPH oxidasa: los fagocitos ingieren pero no matan ciertos microbios (catalasa+), formando granulomas e infecciones recurrentes."}, {"n": "8", "noShuffle": false, "img": null, "q": "El síndrome de DiGeorge se asocia a:", "o": ["La aplasia del timo con déficit de linfocitos T", "Un exceso marcado de linfocitos B circulantes", "El déficit selectivo y aislado de la IgA", "La hiperactividad del sistema del complemento"], "c": 1, "e": "El <b>DiGeorge</b> (deleción 22q11) cursa con timo hipoplásico y déficit de linfocitos T, junto a cardiopatía e hipocalcemia."}], "inm_autoinm": [{"n": "1", "noShuffle": false, "img": null, "q": "La autoinmunidad se produce por:", "o": ["Una respuesta excesiva frente a los microbios", "La pérdida de tolerancia frente a lo propio", "Un déficit total de todos los linfocitos", "La ausencia completa de anticuerpos"], "c": 2, "e": "En la <b>autoinmunidad</b> falla la tolerancia y el sistema inmune ataca lo propio (autoanticuerpos y/o linfocitos T autorreactivos)."}, {"n": "2", "noShuffle": false, "img": null, "q": "La tolerancia CENTRAL de los linfocitos T se establece en:", "o": ["El bazo y los ganglios linfáticos", "El timo, por selección negativa", "Los ganglios linfáticos periféricos", "La sangre y los vasos linfáticos"], "c": 2, "e": "La <b>tolerancia central</b> elimina en el timo (T) y la médula (B) los linfocitos fuertemente autorreactivos antes de salir a la periferia."}, {"n": "3", "noShuffle": false, "img": null, "q": "El lupus eritematoso sistémico es una enfermedad autoinmune caracterizada por:", "o": ["Anticuerpos antinucleares y daño multiorgánico", "Un déficit grave de anticuerpos séricos", "Un déficit congénito del complemento", "Afectación solo cutánea sin anticuerpos"], "c": 1, "e": "El <b>lupus</b> cursa con autoanticuerpos (ANA, anti-dsDNA) e inmunocomplejos (hipersensibilidad III) que dañan riñón, piel, articulaciones, etc."}, {"n": "4", "noShuffle": false, "img": null, "q": "La diabetes mellitus tipo 1 es una enfermedad autoinmune en la que se destruyen:", "o": ["Los hepatocitos del hígado", "Las células beta del páncreas", "Los miocitos del músculo", "Las neuronas motoras"], "c": 2, "e": "En la <b>DM tipo 1</b>, linfocitos T autorreactivos destruyen las células beta pancreáticas, provocando déficit de insulina."}, {"n": "5", "noShuffle": false, "img": null, "q": "La miastenia gravis se debe a autoanticuerpos contra:", "o": ["El receptor de acetilcolina muscular", "La mielina del sistema nervioso central", "La membrana basal del glomérulo", "Los hematíes de la sangre"], "c": 1, "e": "En la <b>miastenia gravis</b>, los anticuerpos anti-receptor de acetilcolina bloquean la transmisión neuromuscular: debilidad fatigable."}, {"n": "6", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes NO es una enfermedad autoinmune?", "o": ["La artritis reumatoide", "La esclerosis múltiple", "La tiroiditis de Hashimoto", "La enfermedad de Bruton"], "c": 4, "e": "La <b>enfermedad de Bruton</b> es una inmunodeficiencia primaria; artritis reumatoide, esclerosis múltiple y Hashimoto son autoinmunes."}, {"n": "7", "noShuffle": false, "img": null, "q": "La tiroiditis de Hashimoto y la enfermedad de Graves son ejemplos de autoinmunidad:", "o": ["De tipo sistémico generalizado", "Órgano-específica del tiroides", "Por una inmunodeficiencia de base", "Alérgica mediada por la IgE"], "c": 2, "e": "Hashimoto (hipotiroidismo) y Graves (hipertiroidismo por anticuerpos estimulantes del receptor de TSH) son autoinmunidades <b>órgano-específicas</b> del tiroides."}, {"n": "8", "noShuffle": false, "img": null, "q": "El mimetismo molecular como mecanismo de autoinmunidad consiste en que:", "o": ["El sistema inmune no reconoce ya nada", "Un antígeno microbiano se parece a uno propio", "Se eliminan todos los linfocitos del cuerpo", "Aumenta la tolerancia frente a lo propio"], "c": 2, "e": "En el <b>mimetismo molecular</b>, la respuesta frente a un microbio reacciona también contra antígenos propios similares (p. ej. fiebre reumática tras S. pyogenes)."}], "inm_hipersens": [{"n": "1", "noShuffle": false, "img": null, "q": "La hipersensibilidad de tipo I (inmediata) está mediada por:", "o": ["La IgG y los inmunocomplejos", "La IgE unida a los mastocitos", "Los linfocitos T sensibilizados", "Anticuerpos contra la membrana celular"], "c": 2, "e": "La <b>hipersensibilidad I</b> (alergia, anafilaxia) la media la IgE sobre mastocitos: el alérgeno las entrecruza y liberan histamina y otros mediadores."}, {"n": "2", "noShuffle": false, "img": null, "q": "El shock anafiláctico es la forma más grave de hipersensibilidad de tipo:", "o": ["Tipo I", "Tipo II", "Tipo III", "Tipo IV"], "c": 1, "e": "La <b>anafilaxia</b> es hipersensibilidad I sistémica y grave (broncoespasmo, hipotensión, edema); se trata con adrenalina."}, {"n": "3", "noShuffle": false, "img": null, "q": "La hipersensibilidad de tipo II (citotóxica) se caracteriza por:", "o": ["La IgE sobre los mastocitos", "Anticuerpos contra antígenos de la célula", "Linfocitos T citotóxicos sin anticuerpos", "Inmunocomplejos que circulan en sangre"], "c": 2, "e": "En la <b>tipo II</b>, anticuerpos contra antígenos de membrana causan citólisis (complemento, fagocitosis); p. ej. anemias hemolíticas, reacción transfusional."}, {"n": "4", "noShuffle": false, "img": null, "q": "La hipersensibilidad de tipo III está mediada por:", "o": ["La inmunoglobulina IgE sobre los mastocitos", "El depósito de inmunocomplejos en los tejidos", "Los linfocitos T de memoria sensibilizados", "Las células natural killer citotóxicas"], "c": 2, "e": "La <b>tipo III</b> (enfermedad del suero, lupus, glomerulonefritis postinfecciosa) se debe al depósito de inmunocomplejos que activan complemento e inflamación."}, {"n": "5", "noShuffle": false, "img": null, "q": "La hipersensibilidad de tipo IV (retardada) está mediada por:", "o": ["Los anticuerpos de tipo IgE", "Los linfocitos T sensibilizados", "El sistema del complemento", "Los mastocitos del tejido"], "c": 2, "e": "La <b>tipo IV</b> es celular y retardada (24-72 h): dermatitis de contacto, prueba de la tuberculina, rechazo de injertos; mediada por linfocitos T."}, {"n": "6", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes reacciones es un ejemplo de hipersensibilidad de tipo IV?", "o": ["La anafilaxia tras una picadura", "El Mantoux y la dermatitis de contacto", "La enfermedad del suero clásica", "La reacción hemolítica transfusional"], "c": 2, "e": "El <b>Mantoux</b> y la dermatitis de contacto son hipersensibilidad IV (retardada, mediada por T); las otras son tipos I, III y II respectivamente."}, {"n": "7", "noShuffle": false, "img": null, "q": "La prueba cutánea de la tuberculina positiva refleja una reacción de hipersensibilidad:", "o": ["Inmediata, de tipo I", "Retardada, de tipo IV", "Por inmunocomplejos, de tipo III", "Citotóxica, de tipo II"], "c": 2, "e": "El <b>Mantoux</b> es hipersensibilidad IV: la induración a las 48-72 h refleja la respuesta de linfocitos T memoria frente a antígenos de M. tuberculosis."}, {"n": "8", "noShuffle": false, "img": null, "q": "El mediador liberado por los mastocitos responsable de los síntomas inmediatos de la alergia es:", "o": ["El interferón gamma activador", "La histamina vasoactiva", "La perforina citotóxica", "El factor C3b del complemento"], "c": 2, "e": "La <b>histamina</b> (y otros mediadores como leucotrienos) causa vasodilatación, broncoconstricción y prurito en la reacción alérgica inmediata."}, {"n": "9", "noShuffle": false, "img": null, "q": "La enfermedad hemolítica del recién nacido por incompatibilidad Rh es un ejemplo de hipersensibilidad:", "o": ["De tipo I por la IgE", "De tipo II contra los hematíes", "De tipo III por inmunocomplejos", "De tipo IV mediada por células"], "c": 2, "e": "Es <b>tipo II</b>: la IgG materna anti-Rh atraviesa la placenta y lisa los hematíes Rh+ del feto; se previene con gammaglobulina anti-D."}, {"n": "10", "noShuffle": false, "img": null, "q": "El rechazo de un trasplante de órgano es fundamentalmente una reacción de hipersensibilidad:", "o": ["De tipo I mediada por IgE", "De tipo IV celular (y humoral)", "Solo por el complemento aislado", "Sin ninguna participación inmune"], "c": 2, "e": "El <b>rechazo</b> implica sobre todo respuesta celular (tipo IV, linfocitos T contra el HLA del injerto), con componente humoral (anticuerpos)."}], "inm_trasplante": [{"n": "1", "noShuffle": false, "img": null, "q": "En las transfusiones sanguíneas, el sistema de grupos más importante por sus anticuerpos naturales es:", "o": ["El sistema de antígenos HLA", "El sistema de grupos ABO", "El sistema del complemento", "El sistema Kell de forma exclusiva"], "c": 2, "e": "El <b>ABO</b> es crítico: existen anticuerpos naturales (isohemaglut
