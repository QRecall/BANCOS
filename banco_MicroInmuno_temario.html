<!--
=============================================================
  MOTOR BANCO MIR — v10
  Novedades respecto a v9:
  - Numeración correlativa fija por sección (no se mezcla)
  - Badge neutro en pestaña "Todos" + mezcla real inter-secciones
  - Temporizador sticky editable en header (play/pausa/reset)
  - Buscador de texto en tiempo real
  - Modo repaso rápido (muestra RC + explicación directamente)
  - Estadísticas de errores recurrentes entre sesiones
=============================================================
-->
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">Banco MIR</title>
<style>
:root{
  --bg:#f4f3ef;--surf:#fff;--bd:#e5e5e5;--bd2:#ddd;
  --txt:#1a1a1a;--txt2:#555;--txt3:#999;--txt4:#666;
  --hdr:#1a1a1a;--hdr-t:#fff;
  --ok-bg:#e6f9ef;--ok-t:#0b6e52;--ok-bd:#2da060;
  --ko-bg:#fdecea;--ko-t:#b91c1c;--ko-bd:#d94f45;
  --sc-ok:#dcf5ed;--sc-ko:#fdecea;--sc-rem:#f0f0f0;--sc-rem-t:#666;
  --exp:#fffbe6;--exp-bd:#f0c04a;--exp-t:#5a4500;
  --prog:#e5e5e5;--prog-fill:#1a56db;
  --star:#ccc;--star-on:#f59e0b;
  --hint:#fafafa;--hint-bd:#eee;
  --tab-bd:#ddd;--tab-t:#555;
  --all-bg:#e8f0fe;--all-t:#1a56db;--all-bd:#1a56db;
  --fab:#1a1a1a;--fab-t:#fff;
  --nota-btn-t:#1a56db;--nota-btn-bd:#1a56db;--nota-btn-bg:var(--surf);
  --timer-bg:#222;--timer-t:#fff;--timer-danger:#ef4444;
}
[data-theme="dark"]{
  --bg:#0f0f1a;--surf:#1e1e30;--bd:#2a2a45;--bd2:#333355;
  --txt:#e8e8f0;--txt2:#aaa;--txt3:#555;--txt4:#888;
  --hdr:#0a0a14;--hdr-t:#e8e8f0;
  --ok-bg:#0b3020;--ok-t:#4ade80;--ok-bd:#166534;
  --ko-bg:#2d0a0a;--ko-t:#f87171;--ko-bd:#7f1d1d;
  --sc-ok:#0b3020;--sc-ko:#2d0a0a;--sc-rem:#252540;--sc-rem-t:#aaa;
  --exp:#1a1500;--exp-bd:#a37f10;--exp-t:#d4b84a;
  --prog:#2a2a45;--prog-fill:#60a5fa;
  --star:#444;--star-on:#f59e0b;
  --hint:#1a1a2e;--hint-bd:#2a2a45;
  --tab-bd:#2a2a45;--tab-t:#aaa;
  --all-bg:#1a2a4a;--all-t:#60a5fa;--all-bd:#3b82f6;
  --fab:#2a2a50;--fab-t:#e8e8f0;
  --nota-btn-t:#60a5fa;--nota-btn-bd:#3b82f6;--nota-btn-bg:var(--surf);
  --timer-bg:#1a1a2e;--timer-t:#e8e8f0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .25s,color .25s}

/* ── Header ── */
header{background:var(--hdr);color:var(--hdr-t);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
header h1{font-size:13.5px;font-weight:600;white-space:nowrap}
.hright{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hmeta{font-size:11px;color:#888}
.hbtn{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:3px 5px;border-radius:5px;transition:background .15s;color:var(--hdr-t)}
.hbtn:hover{background:rgba(255,255,255,.12)}
.sbadge{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:500}
.sbadge.ok{background:#15803d;color:#dcfce7}.sbadge.warn{background:#92400e;color:#fef3c7}

/* ── Temporizador ── */
#timer-wrap{display:flex;align-items:center;gap:4px;background:var(--timer-bg);border-radius:7px;padding:3px 8px;border:1px solid rgba(255,255,255,.1)}
#timer-display{font-size:13px;font-weight:700;font-family:monospace;color:var(--timer-t);min-width:58px;text-align:center;cursor:pointer;border-radius:3px;padding:1px 3px}
#timer-display:hover{background:rgba(255,255,255,.08)}
#timer-display.editing{background:rgba(255,255,255,.15);outline:none;color:var(--timer-t)}
#timer-display.danger{color:var(--timer-danger)}
#timer-wrap button{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:12px;padding:1px 3px;border-radius:3px;line-height:1}
#timer-wrap button:hover{background:rgba(255,255,255,.12);color:#fff}

/* ── Barra de progreso ── */
#prog-wrap{height:3px;background:var(--prog);position:sticky;top:40px;z-index:99}
#prog-bar{height:100%;background:var(--prog-fill);width:0%;transition:width .4s}

/* ── Contenedor ── */
.container{max-width:820px;margin:0 auto;padding:16px 12px}

/* ── Buscador ── */
.search-wrap{position:relative;margin-bottom:13px}
.search-wrap input{width:100%;padding:8px 34px 8px 12px;border:1.5px solid var(--bd2);border-radius:8px;font-size:13px;background:var(--surf);color:var(--txt);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--prog-fill)}
.search-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--txt3);font-size:16px;display:none;line-height:1}
#search-count{font-size:11px;color:var(--txt3);margin-top:4px;display:none}

/* ── Modo repaso ── */
.mode-bar{display:flex;gap:6px;margin-bottom:12px;align-items:center}
.mode-btn{padding:5px 12px;border:1.5px solid var(--bd2);border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;background:var(--surf);color:var(--txt2);transition:all .15s}
.mode-btn:hover{border-color:#999}
.mode-btn.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Tabs ── */
.tabs{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.tab{padding:7px 14px;border:1.5px solid var(--tab-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;background:var(--surf);color:var(--tab-t);transition:all .15s}
.tab:hover{border-color:#999;color:var(--txt)}
.tab.t-all.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Score global ── */
.ph-global{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 15px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-left:4px solid var(--prog-fill)}
.score-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.sc{font-size:12px;font-weight:600;padding:3px 9px;border-radius:6px}
.sc.ok{background:var(--sc-ok);color:var(--ok-t)}.sc.ko{background:var(--sc-ko);color:var(--ko-t)}.sc.rem{background:var(--sc-rem);color:var(--sc-rem-t)}

/* ── Acciones ── */
.global-actions{display:none;margin-bottom:10px;gap:7px;flex-wrap:wrap;align-items:center}
.container[data-tab="all"] .global-actions{display:flex}
.sec-actions{margin:6px 0 15px;display:flex;gap:7px;flex-wrap:wrap}
.reset-btn{padding:7px 14px;background:var(--fab);color:var(--fab-t);border:none;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:opacity .15s}
.reset-btn:hover{opacity:.82}
.nota-btn{padding:7px 14px;background:var(--nota-btn-bg);color:var(--nota-btn-t);border:1.5px solid var(--nota-btn-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:background .15s}
.nota-btn:hover{background:var(--all-bg)}

/* ── Nota box ── */
.nota-box,.global-nota-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:2px solid var(--bd2);font-size:13px;line-height:1.7;display:none}
.nota-box.pass,.global-nota-box.pass{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t)}
.nota-box.fail,.global-nota-box.fail{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t)}
.nota-score{font-size:26px;font-weight:700;display:block;margin-bottom:4px}
.nota-detail{font-size:12px;opacity:.85;font-family:monospace}

/* ── Vista revisión ── */
.review-list{margin-top:12px;border-top:1px solid var(--bd2);padding-top:10px}
.review-title{font-size:12px;font-weight:700;margin-bottom:9px;color:var(--txt)}
.review-sec-label{font-size:11.5px;font-weight:700;color:var(--txt3);margin:8px 0 5px;padding-top:6px;border-top:1px solid var(--bd)}
.review-item{background:var(--surf);border-radius:8px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden}
.review-item summary{padding:9px 12px;cursor:pointer;font-size:12.5px;color:var(--txt);list-style:none;display:flex;gap:8px;align-items:flex-start}
.review-item summary::-webkit-details-marker{display:none}
.review-item summary::before{content:'▶';font-size:9px;color:var(--txt3);flex-shrink:0;margin-top:4px;transition:transform .18s}
details[open] summary::before{transform:rotate(90deg)}
.review-body{padding:0 12px 11px}
.review-ans{font-size:12px;color:var(--ok-t);margin-bottom:7px;font-weight:500}

/* ── Estadísticas ── */
.stats-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--surf);display:none}
.stats-box.show{display:block}
.stats-title{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--txt)}
.stats-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12.5px}
.stats-item:last-child{border-bottom:none}
.stats-bar-wrap{flex:1;background:var(--sc-rem);border-radius:4px;height:6px;overflow:hidden}
.stats-bar{height:100%;background:var(--ko-bd);border-radius:4px;transition:width .4s}
.stats-n{font-size:11px;color:var(--txt3);white-space:nowrap}
.stats-q{flex:2;color:var(--txt);font-size:12px;line-height:1.3}

/* ── Panel secciones ── */
.sec-panel{display:none}.sec-panel.visible{display:block}
.ph{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ph-left{flex:1;display:flex;flex-direction:column;gap:5px}
.ph-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:1px}
.ph-desc{font-size:12px;color:var(--txt4)}
.fbtn{padding:6px 12px;font-size:12px;font-weight:500;border:1.5px solid var(--bd2);border-radius:8px;cursor:pointer;background:var(--surf);color:var(--txt2);transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:#999;color:var(--txt)}.fbtn.on{background:var(--ko-bg);color:#b91c1c;border-color:#f87171}
.no-failed{display:none;text-align:center;padding:16px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin-top:4px}
.no-failed.show{display:block}
.no-results{display:none;text-align:center;padding:20px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin:8px 0}

/* ── Hint ── */
.hint{font-size:11px;color:var(--txt3);margin-bottom:15px;padding:7px 11px;background:var(--hint);border-radius:6px;border:1px solid var(--hint-bd)}

/* ── Tarjeta ── */
.qcard{background:var(--surf);border-radius:10px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden;transition:box-shadow .15s}
.qcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.qcard.kb-focus{outline:2px solid var(--prog-fill);outline-offset:-2px}
.qcard.search-hidden{display:none}
.qhead{padding:11px 13px;cursor:pointer;display:flex;align-items:flex-start;gap:9px}

/* ── Badge numérico ── */
.qnum{font-size:11px;font-weight:700;padding:3px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;background:var(--sc-rem);color:var(--sc-rem-t)}
/* En pestaña "Todos" siempre neutro; en sección aplica color de sección */
.qnum.sec-colored{background:var(--sec-dim);color:var(--sec-col)}

.qtxt{font-size:13px;line-height:1.5;flex:1}
.star-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--star);padding:0 2px;flex-shrink:0;margin-top:2px;line-height:1;transition:color .15s,transform .15s}
.star-btn:hover{transform:scale(1.2)}
.star-btn .si{display:inline}.star-btn .sf{display:none}
.star-btn.on .si{display:none}.star-btn.on .sf{display:inline;color:var(--star-on)}
.chev{font-size:15px;color:var(--bd2);flex-shrink:0;margin-top:2px;transition:transform .2s}
.qhead.open .chev{transform:rotate(180deg)}
.qbody{display:none;padding:0 13px 13px}.qbody.open{display:block}

/* ── Imagen ── */
.clinimg-wrap{margin:9px 0 7px;background:#111;border-radius:8px;overflow:hidden;border:1px solid var(--bd2);text-align:center}
.clinimg{max-width:100%;max-height:340px;object-fit:contain;display:block;margin:0 auto}
.clinimg-cap{font-size:11px;color:var(--txt3);padding:4px 0 5px;background:var(--hint);border-top:1px solid var(--bd)}

/* ── Opciones ── */
.opts{list-style:none;margin-top:9px;display:flex;flex-direction:column;gap:5px}
.opt{padding:9px 12px;border-radius:8px;border:1.5px solid var(--bd2);cursor:pointer;display:flex;align-items:flex-start;gap:9px;color:var(--txt);font-size:13px;line-height:1.45;transition:border-color .12s,background .12s;user-select:none}
.opt:hover:not(.done){border-color:#999;background:var(--hint)}
.opt.correct{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t);font-weight:500;cursor:default}
.opt.wrong{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t);cursor:default}
.opt.done:not(.correct):not(.wrong){cursor:default;opacity:.7}
.onum{font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;min-width:15px}

/* ── Modo repaso rápido ── */
.quick-card{padding:9px 12px;border-radius:8px;border:1.5px solid var(--ok-bd);background:var(--ok-bg);margin-top:8px}
.quick-rc{font-size:12.5px;font-weight:600;color:var(--ok-t);margin-bottom:6px}

/* ── Explicación ── */
.expbox{margin-top:10px;padding:10px 12px;background:var(--exp);border-left:4px solid var(--exp-bd);border-radius:0 8px 8px 0;font-size:12.5px;color:var(--exp-t);line-height:1.65}
.expbox b,.expbox strong{font-weight:600}
.et{display:block;margin-bottom:4px;font-weight:600;font-size:13px}
.atag{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
.atag.ok{background:var(--sc-ok);color:var(--ok-t)}.atag.ko{background:var(--sc-ko);color:#c0392b}

/* ── All-tab CSS ── */
.container[data-tab="all"] .ph{display:none!important}
.container[data-tab="all"] .sec-actions{display:none!important}
.container[data-tab="all"] .no-failed{display:none!important}
.container[data-tab="all"] .nota-box{display:none!important}
.container:not([data-tab="all"]) .global-nota-box{display:none!important}
.container:not([data-tab="all"]) #stats-global{display:none!important}
</style>
</head>
<body>
<header>
  <h1 id="h-tit">Banco MIR</h1>
  <div class="hright">
    <span class="hmeta" id="h-meta"></span>
    <!-- Temporizador -->
    <div id="timer-wrap" title="Haz clic en el tiempo para editar">
      <span id="timer-display">0:00:00</span>
      <button id="btn-tplay" onclick="timerToggle()" title="Play/Pausa">▶</button>
      <button onclick="timerReset()" title="Reset">↺</button>
    </div>
    <button class="hbtn" id="btn-dark" onclick="toggleDark()" title="Modo oscuro">🌙</button>
    <span id="save-badge" class="sbadge"></span>
  </div>
</header>
<div id="prog-wrap"><div id="prog-bar"></div></div>

<div class="container" id="main-cont" data-tab="all">
  <!-- Buscador -->
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="🔍 Buscar en enunciados..." oninput="onSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div id="search-count"></div>

  <!-- Modo -->
  <div class="mode-bar">
    <span style="font-size:11.5px;color:var(--txt3);font-weight:600">MODO:</span>
    <button class="mode-btn on" id="mode-test" onclick="setMode('test')">📝 Test</button>
    <button class="mode-btn" id="mode-quick" onclick="setMode('quick')">⚡ Repaso rápido</button>
    <button class="mode-btn" id="btn-stars" onclick="filterStarred()" style="margin-left:auto;border-color:#f59e0b;color:#b45309">⭐ Marcadas</button>
    <button class="mode-btn" id="btn-stats" onclick="toggleStats()">📊 Errores</button>
  </div>

  <!-- Stats globales -->
  <div class="stats-box" id="stats-global"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabs-wrap"></div>

  <!-- Score global -->
  <div class="ph-global">
    <div class="ph-left">
      <span class="ph-desc" id="ph-gdesc"></span>
      <div class="score-row">
        <span class="sc ok" id="sc-ok-all">✓ 0</span>
        <span class="sc ko" id="sc-ko-all">✗ 0</span>
        <span class="sc rem" id="sc-rem-all">○ 0</span>
      </div>
    </div>
  </div>
  <div class="global-actions">
    <button class="reset-btn" onclick="resetAll()">↺ Reiniciar y mezclar</button>
    <button class="nota-btn" onclick="calcNotaAll()">✎ Calcular nota global</button>
  </div>
  <div class="global-nota-box" id="nota-all"></div>
  <p class="hint">💡 <b>1–5</b> responde · <b>↑↓</b> navega · <b>S</b> marca ⭐ · Progreso guardado automáticamente</p>

  <div id="panels-wrap"></div>
</div>

<script>
/* ═══════════════════════════════════════ MOTOR v10 ═══════════════════════════════════════ */

var META=/*__META_JSON__*/{"titulo": "Banco Micro e Inmuno — Teoría (estilo profe)", "subtitulo": "320 preguntas · temario completo 3º Medicina · estilo Alba Martínez", "examen": "Microbiología e Inmunología", "secciones": {"mic_intro": {"label": "Micro T1 · Introducción y diversidad", "emoji": "🔬", "color": "#4f8cff", "colorDim": "#4f8cff22", "desc": "Concepto, historia, diversidad microbiana", "grupo": "Micro"}, "mic_patohosp": {"label": "Micro T2 · Patógeno-hospedador", "emoji": "⚔️", "color": "#4f8cff", "colorDim": "#4f8cff22", "desc": "Virulencia, toxinas, transmisión", "grupo": "Micro"}, "mic_esteril": {"label": "Micro T3 · Esterilización y desinfección", "emoji": "🧪", "color": "#4f8cff", "colorDim": "#4f8cff22", "desc": "Control de microorganismos", "grupo": "Micro"}, "mic_diag": {"label": "Micro T4 · Diagnóstico de infecciones", "emoji": "🧫", "color": "#4f8cff", "colorDim": "#4f8cff22", "desc": "Directo vs indirecto, técnicas", "grupo": "Micro"}, "mic_estructura": {"label": "Micro T5 · Estructura bacteriana", "emoji": "🦠", "color": "#4f8cff", "colorDim": "#4f8cff22", "desc": "Pared, cápsula, esporas, flagelos", "grupo": "Micro"}, "mic_crecim": {"label": "Micro T6 · Crecimiento y cultivo", "emoji": "📈", "color": "#4f8cff", "colorDim": "#4f8cff22", "desc": "Curva, requerimientos, medios", "grupo": "Micro"}, "mic_cocos": {"label": "Micro T7 · Cocos (Staph, Strep)", "emoji": "🟣", "color": "#46b06a", "colorDim": "#46b06a22", "desc": "Staphylococcus, Streptococcus, Enterococcus", "grupo": "Micro"}, "mic_bgp": {"label": "Micro T8 · Bacilos Gram positivos", "emoji": "🟩", "color": "#46b06a", "colorDim": "#46b06a22", "desc": "Bacillus, Clostridium, Listeria, Corynebacterium", "grupo": "Micro"}, "mic_bgn1": {"label": "Micro T9 · Enterobacterias (BGN I)", "emoji": "🟧", "color": "#46b06a", "colorDim": "#46b06a22", "desc": "E. coli, Salmonella, Shigella, Klebsiella", "grupo": "Micro"}, "mic_bgn2": {"label": "Micro T10 · BGN II", "emoji": "🟫", "color": "#46b06a", "colorDim": "#46b06a22", "desc": "Pseudomonas, Vibrio, Campylobacter, Helicobacter", "grupo": "Micro"}, "mic_cocobac": {"label": "Micro T11.1 · Cocobacilos GN", "emoji": "🔶", "color": "#46b06a", "colorDim": "#46b06a22", "desc": "Haemophilus, Bordetella, Brucella, Legionella", "grupo": "Micro"}, "mic_mico": {"label": "Micro T11.2 · Mycobacterium y Nocardia", "emoji": "🫁", "color": "#46b06a", "colorDim": "#46b06a22", "desc": "Tuberculosis, lepra, Nocardia", "grupo": "Micro"}, "mic_espiro": {"label": "Micro T12 · Espiroquetas", "emoji": "🌀", "color": "#46b06a", "colorDim": "#46b06a22", "desc": "Treponema, Borrelia, Leptospira", "grupo": "Micro"}, "mic_intracel": {"label": "Micro T13 · Intracelulares estrictas", "emoji": "🔬", "color": "#46b06a", "colorDim": "#46b06a22", "desc": "Chlamydia, Rickettsia, Coxiella, Mycoplasma", "grupo": "Micro"}, "mic_viro_gen": {"label": "Micro T14 · Virus: generalidades", "emoji": "🧬", "color": "#d9a93e", "colorDim": "#d9a93e22", "desc": "Estructura, replicación, clasificación", "grupo": "Micro"}, "mic_viro_dna": {"label": "Micro T15 · Virus DNA", "emoji": "🅰️", "color": "#d9a93e", "colorDim": "#d9a93e22", "desc": "Herpes, papiloma, hepatitis B, etc.", "grupo": "Micro"}, "mic_viro_rna": {"label": "Micro T16 · Virus RNA I", "emoji": "🅱️", "color": "#d9a93e", "colorDim": "#d9a93e22", "desc": "Gripe, sarampión, picornavirus", "grupo": "Micro"}, "mic_retro": {"label": "Micro T17 · Virus RNA II y retrovirus", "emoji": "🔁", "color": "#d9a93e", "colorDim": "#d9a93e22", "desc": "VIH, hepatitis virales", "grupo": "Micro"}, "mic_hongos": {"label": "Micro T18 · Hongos", "emoji": "🍄", "color": "#d9a93e", "colorDim": "#d9a93e22", "desc": "Levaduras, mohos, micosis", "grupo": "Micro"}, "mic_parasitos": {"label": "Micro T19-20 · Parásitos", "emoji": "🪱", "color": "#d9a93e", "colorDim": "#d9a93e22", "desc": "Protozoos y helmintos", "grupo": "Micro"}, "mic_practicas": {"label": "Prácticas y seminarios", "emoji": "🧰", "color": "#d9a93e", "colorDim": "#d9a93e22", "desc": "Diagnóstico, microbiota, resistencia", "grupo": "Prácticas"}, "inm_intro": {"label": "Inmuno T1 · Introducción", "emoji": "🛡️", "color": "#a877d8", "colorDim": "#a877d822", "desc": "Innato vs adaptativo, propiedades", "grupo": "Inmuno"}, "inm_innato": {"label": "Inmuno T2-3 · Innato y complemento", "emoji": "⚡", "color": "#a877d8", "colorDim": "#a877d822", "desc": "Fagocitos, NK, complemento, PRR", "grupo": "Inmuno"}, "inm_linfoT": {"label": "Inmuno T4 · Linfocitos T", "emoji": "🧫", "color": "#a877d8", "colorDim": "#a877d822", "desc": "CD4, CD8, timo, subpoblaciones", "grupo": "Inmuno"}, "inm_receptores": {"label": "Inmuno T5-7 · Receptores y HLA", "emoji": "🔑", "color": "#a877d8", "colorDim": "#a877d822", "desc": "TCR, BCR, MHC/HLA, presentación", "grupo": "Inmuno"}, "inm_linfoB": {"label": "Inmuno T8 · Linfocitos B y anticuerpos", "emoji": "🅨", "color": "#a877d8", "colorDim": "#a877d822", "desc": "Activación B, isotipos, funciones Ac", "grupo": "Inmuno"}, "inm_memoria": {"label": "Inmuno T9 · Memoria y vacunas", "emoji": "💉", "color": "#a877d8", "colorDim": "#a877d822", "desc": "Respuesta 1ª/2ª, tipos de vacuna", "grupo": "Inmuno"}, "inm_patogenos": {"label": "Inmuno T10 · Inmunidad frente a patógenos", "emoji": "🦠", "color": "#a877d8", "colorDim": "#a877d822", "desc": "Respuesta según tipo de microbio", "grupo": "Inmuno"}, "inm_inmunodef": {"label": "Inmuno T11 · Inmunodeficiencias", "emoji": "📉", "color": "#a877d8", "colorDim": "#a877d822", "desc": "Primarias y secundarias", "grupo": "Inmuno"}, "inm_autoinm": {"label": "Inmuno T12 · Autoinmunidad", "emoji": "🔄", "color": "#a877d8", "colorDim": "#a877d822", "desc": "Tolerancia, enfermedades autoinmunes", "grupo": "Inmuno"}, "inm_hipersens": {"label": "Inmuno T13 · Hipersensibilidad", "emoji": "🤧", "color": "#a877d8", "colorDim": "#a877d822", "desc": "Tipos I-IV", "grupo": "Inmuno"}, "inm_trasplante": {"label": "Inmuno T14 · Trasplante y transfusión", "emoji": "🫀", "color": "#a877d8", "colorDim": "#a877d822", "desc": "Rechazo, ABO/Rh, HLA", "grupo": "Inmuno"}, "inm_tumoral": {"label": "Inmuno T15 · Inmunología tumoral", "emoji": "🎯", "color": "#a877d8", "colorDim": "#a877d822", "desc": "Vigilancia, evasión, inmunoterapia", "grupo": "Inmuno"}}};
var D=/*__D_JSON__*/{"mic_intro": [{"n": "1", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes afirmaciones sobre los postulados de Koch NO es correcta?", "o": ["El microorganismo debe hallarse en todos los enfermos y no en los sanos", "El microorganismo debe poder aislarse y cultivarse en cultivo puro", "Inoculado a un animal sano debe reproducir la misma enfermedad", "Basta con observar el microorganismo al microscopio para confirmarlo"], "c": 4, "e": "Los postulados de <b>Koch</b> exigen aislar, cultivar y reproducir la enfermedad; la mera observación no demuestra causalidad."}, {"n": "2", "noShuffle": false, "img": null, "q": "Louis Pasteur es conocido fundamentalmente por:", "o": ["Describir el primer bacteriófago de la historia", "Refutar la teoría de la generación espontánea", "Formular la tinción de Gram para bacterias", "Descubrir la penicilina de forma accidental"], "c": 2, "e": "<b>Pasteur</b> refutó la generación espontánea con sus matraces de cuello de cisne y desarrolló la pasteurización."}, {"n": "3", "noShuffle": false, "img": null, "q": "El conjunto de microorganismos que habitan de forma habitual en individuos sanos se denomina:", "o": ["Patobionte invasor de los tejidos", "Microbiota o flora normal del individuo", "Inóculo infectante de la enfermedad", "Biofilm patógeno sobre las mucosas"], "c": 2, "e": "La <b>microbiota</b> normal coloniza piel y mucosas sin causar enfermedad y aporta beneficios (barrera, vitaminas)."}, {"n": "4", "noShuffle": false, "img": null, "q": "Respecto a la célula procariota frente a la eucariota, señale la afirmación correcta:", "o": ["La procariota posee un núcleo rodeado de membrana", "La procariota carece de núcleo y de orgánulos membranosos", "La célula eucariota tiene ribosomas de tipo 70S", "La célula procariota presenta mitocondrias propias"], "c": 2, "e": "La <b>procariota</b> no tiene núcleo ni orgánulos membranosos; su material genético está en el nucleoide y sus ribosomas son 70S."}, {"n": "5", "noShuffle": false, "img": null, "q": "Antonie van Leeuwenhoek pasó a la historia de la microbiología por:", "o": ["Inventar el autoclave de vapor a presión", "Observar microorganismos con microscopios artesanales", "Descubrir los primeros antibióticos naturales", "Definir la cadena epidemiológica de contagio"], "c": 2, "e": "<b>Leeuwenhoek</b> fabricó microscopios simples y describió los 'animálculos', primera observación de microorganismos."}, {"n": "6", "noShuffle": false, "img": null, "q": "¿Cuál de los siguientes NO es un dominio de los seres vivos según la clasificación de Woese?", "o": ["Bacteria, de células procariotas", "Archaea, de ambientes a menudo extremos", "Eukarya, de células con núcleo", "Protista, antiguo reino de eucariotas"], "c": 4, "e": "Los tres dominios son <b>Bacteria, Archaea y Eukarya</b>; Protista es un reino dentro de Eukarya, no un dominio."}, {"n": "7", "noShuffle": false, "img": null, "q": "Los virus se diferencian del resto de microorganismos fundamentalmente en que:", "o": ["Poseen una pared rígida de peptidoglicano", "Son parásitos intracelulares sin metabolismo propio", "Se multiplican por fisión binaria como las bacterias", "Tienen ribosomas propios para fabricar proteínas"], "c": 2, "e": "Los <b>virus</b> carecen de metabolismo y maquinaria de síntesis propios: necesitan la célula hospedadora para replicarse."}, {"n": "8", "noShuffle": false, "img": null, "q": "Alexander Fleming es recordado por:", "o": ["Desarrollar la primera vacuna eficaz de la rabia", "El descubrimiento de la penicilina del Penicillium", "Formular la teoría microbiana de la enfermedad", "Crear el primer medio de cultivo selectivo"], "c": 2, "e": "<b>Fleming</b> observó que Penicillium notatum inhibía el crecimiento de estafilococos, descubriendo la penicilina."}, {"n": "9", "noShuffle": false, "img": null, "q": "Una relación en la que el microorganismo se beneficia y el hospedador resulta perjudicado se denomina:", "o": ["Mutualismo, con beneficio para ambos", "Comensalismo, sin perjuicio del hospedador", "Parasitismo, a costa del hospedador", "Neutralismo, sin efecto entre ellos"], "c": 3, "e": "En el <b>parasitismo</b> el microorganismo se beneficia a costa del hospedador; en el comensalismo no hay perjuicio."}, {"n": "10", "noShuffle": false, "img": null, "q": "Los microorganismos beneficiosos de la microbiota intestinal contribuyen a todo lo siguiente EXCEPTO:", "o": ["A la síntesis de vitamina K y del grupo B", "Al efecto barrera frente a los patógenos", "A la maduración del sistema inmunitario", "A producir exotoxinas que dañan el epitelio"], "c": 4, "e": "La microbiota aporta vitaminas, efecto barrera e inmunomodulación; producir <b>exotoxinas lesivas</b> no es propio de la flora beneficiosa."}], "mic_patohosp": [{"n": "1", "noShuffle": false, "img": null, "q": "Un patógeno oportunista se caracteriza por:", "o": ["Causar enfermedad siempre que contacta con alguien", "Producir infección cuando fallan las defensas", "Carecer por completo de factores de virulencia", "No formar parte nunca de la microbiota normal"], "c": 2, "e": "El <b>oportunista</b> solo causa enfermedad cuando fallan las defensas (inmunodepresión, rotura de barreras); a menudo es de la propia microbiota."}, {"n": "2", "noShuffle": false, "img": null, "q": "Respecto a exotoxinas y endotoxinas, señale la afirmación CORRECTA:", "o": ["La endotoxina es el LPS de la pared gramnegativa", "La exotoxina es termoestable y poco antigénica", "La endotoxina se secreta de forma activa al medio", "La exotoxina es siempre un lipopolisacárido"], "c": 1, "e": "La <b>endotoxina</b> es el lípido A del LPS de gramnegativos (termoestable, libre al lisarse); las exotoxinas son proteínas secretadas, termolábiles y muy antigénicas."}, {"n": "3", "noShuffle": false, "img": null, "q": "La dosis infectiva 50 (DI50) expresa:", "o": ["La dosis de antibiótico que mata al 50% de bacterias", "La cantidad que infecta al 50% de los hospedadores", "El tiempo en que muere el 50% del inóculo", "La proporción de portadores que están asintomáticos"], "c": 2, "e": "La <b>DI50</b> mide la cantidad de microorganismo necesaria para infectar al 50% de hospedadores expuestos; menor DI50 = mayor infectividad."}, {"n": "4", "noShuffle": false, "img": null, "q": "¿Cuál de los siguientes NO es un factor de virulencia bacteriano?", "o": ["La cápsula que dificulta la fagocitosis", "Las adhesinas y fimbrias de colonización", "Las exotoxinas secretadas al medio", "El ribosoma 70S común a las bacterias"], "c": 4, "e": "Cápsula, adhesinas y toxinas favorecen la infección; el <b>ribosoma 70S</b> es una estructura común, no un factor de virulencia."}, {"n": "5", "noShuffle": false, "img": null, "q": "La cápsula bacteriana contribuye a la virulencia principalmente porque:", "o": ["Inhibe la síntesis proteica del hospedador", "Dificulta la fagocitosis por los leucocitos", "Degrada los anticuerpos que hay circulando", "Forma poros en la membrana de la célula"], "c": 2, "e": "La <b>cápsula</b> (p. ej. en neumococo o meningococo) es antifagocítica y antigénica; protege a la bacteria de la opsonofagocitosis."}, {"n": "6", "noShuffle": false, "img": null, "q": "Un portador asintomático es un individuo que:", "o": ["Padece la enfermedad de forma especialmente grave", "Alberga y transmite el patógeno sin síntomas", "Es inmune al agente y no lo transmite nunca", "Ha eliminado por completo el microorganismo"], "c": 2, "e": "El <b>portador</b> mantiene y disemina el agente sin enfermar; es clave en la cadena de transmisión (p. ej. portadores de S. aureus)."}, {"n": "7", "noShuffle": false, "img": null, "q": "La transmisión de un patógeno a través de gotas respiratorias corresponde a una vía:", "o": ["Vertical, de la madre al feto", "Vectorial, mediante un artrópodo", "Aérea o respiratoria, por gotas", "Parenteral, a través de la sangre"], "c": 3, "e": "Las <b>gotas y aerosoles respiratorios</b> son una vía aérea de transmisión directa (p. ej. tuberculosis, gripe)."}, {"n": "8", "noShuffle": false, "img": null, "q": "La capacidad de un microorganismo de causar enfermedad se denomina patogenicidad, y el GRADO o intensidad de esa capacidad es:", "o": ["La infectividad de ese microorganismo", "La virulencia del microorganismo", "La inmunogenicidad de sus antígenos", "La resistencia frente a antibióticos"], "c": 2, "e": "La <b>virulencia</b> es el grado de patogenicidad; depende de los factores de virulencia (toxinas, cápsula, invasinas)."}, {"n": "9", "noShuffle": false, "img": null, "q": "La transmisión vertical hace referencia al paso del patógeno:", "o": ["Desde un animal vector hasta el ser humano sano", "De la madre al hijo durante la gestación o el parto", "Por el contacto con fómites y objetos contaminados", "Por vía digestiva al ingerir alimentos en mal estado"], "c": 2, "e": "La <b>transmisión vertical</b> es de madre a descendiente (transplacentaria, en el parto o por leche): p. ej. rubéola, VIH, sífilis."}, {"n": "10", "noShuffle": false, "img": null, "q": "Las exotoxinas que actúan como superantígenos (p. ej. la TSST-1 de S. aureus) provocan:", "o": ["El bloqueo selectivo de un único clon linfocitario", "La activación policlonal masiva de linfocitos T", "La inhibición de la síntesis de ADN bacteriano", "La lisis directa de los hematíes circulantes"], "c": 2, "e": "Los <b>superantígenos</b> unen el MHC-II al TCR fuera del sitio específico, activando muchos linfocitos T a la vez (síndrome del shock tóxico)."}], "mic_esteril": [{"n": "1", "noShuffle": false, "img": null, "q": "¿Cuál es la diferencia entre esterilización y desinfección?", "o": ["La esterilización solo elimina las formas vegetativas activas", "La esterilización elimina toda forma de vida y la desinfección no", "La desinfección destruye también todas las esporas resistentes", "Son términos totalmente sinónimos en la práctica clínica"], "c": 2, "e": "La <b>esterilización</b> destruye TODA forma de vida, incluidas las esporas; la <b>desinfección</b> reduce los patógenos pero puede no eliminar esporas."}, {"n": "2", "noShuffle": false, "img": null, "q": "El autoclave esteriliza mediante:", "o": ["Calor seco mantenido a 180°C", "Vapor de agua a presión a unos 121°C", "Radiación ultravioleta de onda corta", "Filtración a través de una membrana"], "c": 2, "e": "El <b>autoclave</b> usa vapor saturado a presión (121°C, ~15 min); el calor húmedo coagula proteínas y es el método de elección habitual."}, {"n": "3", "noShuffle": false, "img": null, "q": "¿Cuál de los siguientes métodos NO es esterilizante?", "o": ["El autoclave de vapor a presión", "El gas de óxido de etileno", "La pasteurización de los alimentos", "La radiación gamma industrial"], "c": 3, "e": "La <b>pasteurización</b> reduce la carga microbiana (formas vegetativas) pero no destruye esporas: no esteriliza, higieniza."}, {"n": "4", "noShuffle": false, "img": null, "q": "La filtración (filtros de 0,22 µm) se utiliza para esterilizar:", "o": ["El material quirúrgico metálico reutilizable", "Líquidos termolábiles como sueros o antibióticos", "Los medios de cultivo sólidos en placa", "Las superficies de trabajo del quirófano"], "c": 2, "e": "La <b>filtración</b> retiene bacterias y se usa con líquidos que el calor dañaría (termolábiles), aunque no retiene virus pequeños."}, {"n": "5", "noShuffle": false, "img": null, "q": "El óxido de etileno es un agente esterilizante especialmente útil para:", "o": ["El material termosensible como plásticos y ópticas", "El agua destinada al consumo humano", "La piel del paciente antes de la cirugía", "Las superficies de trabajo de rutina diaria"], "c": 1, "e": "El <b>óxido de etileno</b> es un gas esterilizante en frío, ideal para material termosensible; es tóxico y requiere aireación posterior."}, {"n": "6", "noShuffle": false, "img": null, "q": "Señale la afirmación CORRECTA sobre antisépticos y desinfectantes:", "o": ["El antiséptico va en tejidos vivos y el desinfectante en objetos", "Ambos se aplican exactamente igual sobre la piel sana", "El desinfectante es siempre el producto bastante más suave", "El antiséptico llega a esterilizar por completo la piel"], "c": 1, "e": "El <b>antiséptico</b> se usa sobre piel/mucosas (clorhexidina, povidona yodada) y el <b>desinfectante</b> sobre objetos/superficies inertes."}, {"n": "7", "noShuffle": false, "img": null, "q": "Las endosporas bacterianas son tan resistentes al calor porque:", "o": ["Tienen una cápsula lipídica especialmente gruesa", "Están deshidratadas y ricas en ácido dipicolínico", "Producen catalasa en cantidades muy elevadas", "Carecen por completo de material genético"], "c": 2, "e": "La <b>endospora</b> (Bacillus, Clostridium) está deshidratada y rica en ácido dipicolínico-calcio, lo que la hace muy termorresistente."}, {"n": "8", "noShuffle": false, "img": null, "q": "El calor seco (estufa Poupinel) requiere, frente al autoclave:", "o": ["Menor temperatura y bastante menos tiempo", "Mayor temperatura y más tiempo de exposición", "Una presión de vapor de agua muy elevada", "Trabajar solo con material de tipo plástico"], "c": 2, "e": "El <b>calor seco</b> es menos eficiente que el húmedo: necesita más temperatura (160-180°C) y más tiempo; útil para vidrio y metal."}, {"n": "9", "noShuffle": false, "img": null, "q": "La radiación ultravioleta como método de control microbiano tiene como limitación principal:", "o": ["Que destruye únicamente las esporas resistentes", "Su escasa penetración: solo superficies y aire", "Que requiere una presión de trabajo elevada", "Que deja residuos químicos tóxicos en todo"], "c": 2, "e": "La <b>UV</b> daña el ADN (dímeros de timina) pero penetra poco; sirve para superficies y aire, no para esterilizar en profundidad."}, {"n": "10", "noShuffle": false, "img": null, "q": "La pasteurización consiste en:", "o": ["Esterilizar mediante vapor de agua a presión", "Aplicar calor moderado para reducir patógenos", "Filtrar el líquido a través de una membrana", "Irradiar el producto con rayos gamma"], "c": 2, "e": "La <b>pasteurización</b> aplica calor controlado (p. ej. 72°C/15 s) para eliminar patógenos vegetativos de leche/alimentos sin esterilizar."}], "mic_diag": [{"n": "1", "noShuffle": false, "img": null, "q": "El diagnóstico microbiológico DIRECTO se basa en:", "o": ["Detectar los anticuerpos del paciente frente al microbio", "Demostrar el microorganismo o sus componentes", "Valorar la respuesta de hipersensibilidad cutánea", "Interpretar únicamente los síntomas clínicos"], "c": 2, "e": "El <b>diagnóstico directo</b> detecta el agente o sus componentes (cultivo, microscopía, antígenos, PCR); el indirecto detecta la respuesta inmune (serología)."}, {"n": "2", "noShuffle": false, "img": null, "q": "La tinción de Gram permite diferenciar las bacterias según:", "o": ["Su capacidad de formar esporas de resistencia", "La estructura de su pared (grosor del peptidoglicano)", "Su movilidad mediante flagelos polares", "Su temperatura óptima de crecimiento"], "c": 2, "e": "La <b>tinción de Gram</b> separa grampositivas (pared gruesa, retienen violeta) de gramnegativas (pared fina + LPS, se tiñen de rosa)."}, {"n": "3", "noShuffle": false, "img": null, "q": "La serología (detección de anticuerpos) es un método de diagnóstico:", "o": ["Directo, porque demuestra el agente", "Indirecto, porque mide la respuesta inmune", "Molecular directo, basado en ácidos nucleicos", "De cultivo, en medios enriquecidos"], "c": 2, "e": "La <b>serología</b> es diagnóstico indirecto: mide la respuesta inmune (IgM/IgG) del paciente, no el microorganismo en sí."}, {"n": "4", "noShuffle": false, "img": null, "q": "La presencia de IgM específica frente a un agente indica habitualmente:", "o": ["Una infección antigua o inmunidad previa", "Una infección reciente o de fase aguda", "La ausencia de contacto con ese agente", "Una vacunación administrada hace años"], "c": 2, "e": "La <b>IgM</b> aparece primero y orienta a infección reciente/aguda; la IgG persiste e indica infección pasada o inmunidad."}, {"n": "5", "noShuffle": false, "img": null, "q": "Para el diagnóstico de una bacteriemia, la muestra de elección es:", "o": ["El urocultivo de la orina del paciente", "El hemocultivo de sangre venosa", "El frotis de la mucosa faríngea", "El coprocultivo de las heces"], "c": 2, "e": "El <b>hemocultivo</b> detecta bacterias en sangre; se toma idealmente en picos febriles y antes de iniciar antibióticos."}, {"n": "6", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes técnicas NO es un método de diagnóstico directo?", "o": ["La PCR que detecta el genoma del patógeno", "La detección de antígenos por inmunocromatografía", "El cultivo del microbio en medio selectivo", "La determinación de IgG específica en suero"], "c": 4, "e": "PCR, antígenos y cultivo demuestran el agente (directo); la <b>IgG</b> mide la respuesta del paciente y es diagnóstico indirecto."}, {"n": "7", "noShuffle": false, "img": null, "q": "Un medio de cultivo SELECTIVO se caracteriza por:", "o": ["Permitir el crecimiento de cualquier microorganismo", "Inhibir a unos microbios y favorecer a otros", "Distinguir las colonias por su color propio", "Aportar factores para microbios exigentes"], "c": 2, "e": "El medio <b>selectivo</b> contiene inhibidores que frenan a unos microbios para aislar el de interés (p. ej. McConkey para gramnegativos)."}, {"n": "8", "noShuffle": false, "img": null, "q": "Un medio DIFERENCIAL permite:", "o": ["Inhibir el crecimiento de la flora acompañante", "Distinguir microbios por un cambio visible", "Esterilizar la muestra antes de sembrarla", "Conservar el microorganismo de forma indefinida"], "c": 2, "e": "El medio <b>diferencial</b> revela propiedades metabólicas con cambios visibles (fermentación de lactosa, hemólisis en agar sangre)."}, {"n": "9", "noShuffle": false, "img": null, "q": "La PCR aplicada al diagnóstico microbiológico destaca por:", "o": ["Detectar los anticuerpos que produce el paciente", "Amplificar y detectar ácidos nucleicos del patógeno", "Requerir siempre un microorganismo aún viable", "Medir la hipersensibilidad de tipo retardado"], "c": 2, "e": "La <b>PCR</b> amplifica ADN/ARN del agente: muy sensible y rápida, útil incluso con microorganismos no cultivables o ya tratados."}, {"n": "10", "noShuffle": false, "img": null, "q": "El antibiograma sirve para:", "o": ["Identificar el género exacto del microorganismo aislado", "Determinar la sensibilidad del microbio a los antibióticos", "Medir la carga viral presente en la sangre del paciente", "Detectar la presencia de la cápsula en la bacteria"], "c": 2, "e": "El <b>antibiograma</b> (difusión en disco, CMI) establece a qué antibióticos es sensible o resistente el aislado, guiando el tratamiento."}], "mic_estructura": [{"n": "1", "noShuffle": false, "img": null, "q": "El peptidoglicano (mureína) de la pared bacteriana:", "o": ["Es algo exclusivo de las bacterias gramnegativas", "Es una malla de azúcares unida por puentes peptídicos", "Está compuesto únicamente por lípidos y ceras", "Falta por completo en todas las bacterias conocidas"], "c": 2, "e": "El <b>peptidoglicano</b> es una malla de NAG-NAM entrecruzada por péptidos; da rigidez y es diana de betalactámicos. Más grueso en grampositivas."}, {"n": "2", "noShuffle": false, "img": null, "q": "La pared de las bacterias GRAMNEGATIVAS se caracteriza por:", "o": ["Peptidoglicano grueso y abundantes ácidos teicoicos", "Peptidoglicano fino y membrana externa con LPS", "Ausencia total de peptidoglicano en la pared", "Una cápsula externa hecha de quitina"], "c": 2, "e": "Las <b>gramnegativas</b> tienen peptidoglicano delgado y membrana externa con LPS (endotoxina); por eso no retienen el cristal violeta."}, {"n": "3", "noShuffle": false, "img": null, "q": "Los ácidos teicoicos son componentes característicos de la pared de:", "o": ["Las bacterias gramnegativas", "Las bacterias grampositivas", "Las micobacterias ácido-resistentes", "Los hongos levaduriformes"], "c": 2, "e": "Los <b>ácidos teicoicos</b> están en la pared gruesa de las grampositivas; intervienen en adhesión y antigenicidad."}, {"n": "4", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes estructuras NO es de pared/superficie bacteriana?", "o": ["La cápsula de polisacárido", "El flagelo de movilidad", "La mitocondria productora de ATP", "Las fimbrias de adhesión"], "c": 3, "e": "Las bacterias carecen de <b>mitocondrias</b> (procariotas); cápsula, flagelo y fimbrias sí son estructuras de superficie."}, {"n": "5", "noShuffle": false, "img": null, "q": "Las endosporas son producidas característicamente por los géneros:", "o": ["Staphylococcus y Streptococcus", "Bacillus y Clostridium", "Escherichia y Salmonella", "Mycoplasma y Chlamydia"], "c": 2, "e": "Solo <b>Bacillus</b> (aerobio) y <b>Clostridium</b> (anaerobio) forman endosporas, formas de resistencia muy termorresistentes."}, {"n": "6", "noShuffle": false, "img": null, "q": "El flagelo bacteriano es responsable de:", "o": ["La adhesión a las superficies", "La movilidad de la bacteria", "La resistencia a los antibióticos", "El intercambio de plásmidos"], "c": 2, "e": "El <b>flagelo</b> proporciona movilidad (quimiotaxis); su antígeno se denomina H. Las fimbrias, en cambio, median adhesión."}, {"n": "7", "noShuffle": false, "img": null, "q": "Las fimbrias (pili comunes) tienen como función principal:", "o": ["La motilidad rápida de la bacteria", "La adhesión a células y superficies", "La formación de esporas resistentes", "La síntesis de la pared celular"], "c": 2, "e": "Las <b>fimbrias</b> son apéndices cortos de adhesión (factor de colonización); el pili sexual, distinto, media la conjugación."}, {"n": "8", "noShuffle": false, "img": null, "q": "Los micoplasmas se distinguen del resto de bacterias porque:", "o": ["Tienen la pared más gruesa que se conoce", "Carecen por completo de pared celular", "Forman esporas muy resistentes al calor", "Son en realidad un tipo de virus"], "c": 2, "e": "<b>Mycoplasma</b> carece de pared de peptidoglicano (membrana con esteroles); por eso es resistente a betalactámicos y pleomórfico."}, {"n": "9", "noShuffle": false, "img": null, "q": "En la tinción de Gram, las bacterias grampositivas se ven de color:", "o": ["Rosa o rojo, por la safranina", "Violeta o azul, por el cristal violeta", "Verde brillante con birrefringencia", "Incoloras, sin captar el colorante"], "c": 2, "e": "Las <b>grampositivas</b> retienen el complejo cristal violeta-yodo por su pared gruesa y se ven violetas; las gramnegativas, rosadas por la safranina."}, {"n": "10", "noShuffle": false, "img": null, "q": "El glicocálix/cápsula bacteriano se relaciona principalmente con:", "o": ["La síntesis de las proteínas de la bacteria", "La protección frente a la fagocitosis y la adhesión", "La movilidad activa por el medio líquido", "La formación de la endospora de resistencia"], "c": 2, "e": "La <b>cápsula</b> protege de la fagocitosis y favorece adhesión y biofilm; es un importante factor de virulencia."}], "mic_crecim": [{"n": "1", "noShuffle": false, "img": null, "q": "Las fases de la curva de crecimiento bacteriano, en orden, son:", "o": ["Exponencial, latencia, muerte y estacionaria", "Latencia, exponencial, estacionaria y muerte", "Estacionaria, exponencial, latencia y muerte", "Muerte, latencia, exponencial y estacionaria"], "c": 2, "e": "El orden correcto es <b>latencia → exponencial → estacionaria → muerte</b>; en la fase log la población se duplica a ritmo constante."}, {"n": "2", "noShuffle": false, "img": null, "q": "Una bacteria ANAEROBIA estricta se caracteriza por:", "o": ["Necesitar oxígeno de forma obligatoria", "No crecer o morir en presencia de oxígeno", "Crecer mejor con poca cantidad de oxígeno", "Ser indiferente a la presencia de oxígeno"], "c": 2, "e": "El <b>anaerobio estricto</b> (p. ej. Clostridium) no tolera el O2 por carecer de catalasa/superóxido dismutasa; crece solo sin oxígeno."}, {"n": "3", "noShuffle": false, "img": null, "q": "Una bacteria anaerobia FACULTATIVA es aquella que:", "o": ["Solo es capaz de crecer sin oxígeno", "Puede crecer tanto con como sin oxígeno", "Necesita una concentración baja de oxígeno", "Requiere un ambiente rico en CO2"], "c": 2, "e": "El <b>anaerobio facultativo</b> (p. ej. E. coli) crece con o sin O2: usa respiración si lo hay y fermentación si no."}, {"n": "4", "noShuffle": false, "img": null, "q": "El tiempo de generación bacteriano es:", "o": ["El tiempo que tarda en formar una espora", "El tiempo en que la población se duplica", "La duración de la fase de latencia inicial", "El tiempo que sobrevive sin nutrientes"], "c": 2, "e": "El <b>tiempo de generación</b> es el que tarda la población en duplicarse (E. coli ~20 min en condiciones óptimas)."}, {"n": "5", "noShuffle": false, "img": null, "q": "¿Cuál de los siguientes microorganismos requiere una concentración REDUCIDA de oxígeno para crecer?", "o": ["El aerobio estricto, como Pseudomonas", "El anaerobio estricto, como Clostridium", "El microaerófilo, como Campylobacter", "El anaerobio facultativo, como E. coli"], "c": 3, "e": "El <b>microaerófilo</b> (p. ej. Campylobacter, Helicobacter) necesita O2 pero a concentraciones inferiores a las atmosféricas."}, {"n": "6", "noShuffle": false, "img": null, "q": "Una bacteria mesófila crece de forma óptima a temperaturas de:", "o": ["Por debajo de los 15°C (psicrófila)", "Alrededor de 20 a 45°C (corporal)", "Por encima de los 60°C (termófila)", "Únicamente a 0°C en congelación"], "c": 2, "e": "Los <b>mesófilos</b> (la mayoría de patógenos humanos) crecen óptimamente a ~37°C; psicrófilos en frío y termófilos en calor."}, {"n": "7", "noShuffle": false, "img": null, "q": "Un medio de cultivo ENRIQUECIDO es aquel que:", "o": ["Inhibe el crecimiento de la flora acompañante", "Aporta nutrientes para microbios exigentes", "Distingue las colonias por su color", "Carece de cualquier fuente de carbono"], "c": 2, "e": "El medio <b>enriquecido</b> (p. ej. agar chocolate) añade factores (sangre, hemina, NAD) para microorganismos nutricionalmente exigentes."}, {"n": "8", "noShuffle": false, "img": null, "q": "La fase estacionaria de la curva de crecimiento se debe a:", "o": ["La ausencia total de bacterias vivas", "El equilibrio entre división y muerte celular", "Un crecimiento exponencial que es máximo", "La adaptación inicial de la bacteria al medio"], "c": 2, "e": "En la <b>fase estacionaria</b> el agotamiento de nutrientes y los productos tóxicos igualan la división con la muerte: la población se estabiliza."}, {"n": "9", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes afirmaciones sobre el crecimiento bacteriano NO es correcta?", "o": ["En la fase log la división es máxima y constante", "La fase de latencia es de adaptación sin división", "En la fase de muerte predominan las que mueren", "En la fase estacionaria crece de forma exponencial"], "c": 4, "e": "En la fase <b>estacionaria</b> el crecimiento neto es nulo (no exponencial); el crecimiento exponencial es propio de la fase log."}, {"n": "10", "noShuffle": false, "img": null, "q": "El recuento de microorganismos viables en una muestra se expresa habitualmente en:", "o": ["Daltons de masa molecular de la célula", "Unidades formadoras de colonias (UFC) por mL", "Grados fijos de turbidez medidos en el medio", "Número total de flagelos por cada célula"], "c": 2, "e": "Las <b>UFC/mL</b> estiman las bacterias viables capaces de formar colonia; es la unidad estándar de cuantificación en cultivo."}], "mic_cocos": [{"n": "1", "noShuffle": false, "img": null, "q": "Staphylococcus aureus se diferencia del resto de estafilococos por ser:", "o": ["Catalasa negativo, como los estreptococos", "Coagulasa positivo, a diferencia de los demás", "Oxidasa positivo, como las pseudomonas", "Gramnegativo, como las enterobacterias"], "c": 2, "e": "<b>S. aureus</b> es coagulasa positivo (a diferencia de S. epidermidis); catalasa positivo lo separa de los estreptococos."}, {"n": "2", "noShuffle": false, "img": null, "q": "La prueba de la catalasa permite diferenciar:", "o": ["Estafilococos positivos de estreptococos negativos", "Las bacterias grampositivas de las gramnegativas", "Las bacterias aerobias de las anaerobias", "Las bacterias capsuladas de las no capsuladas"], "c": 1, "e": "La <b>catalasa</b> es positiva en estafilococos y negativa en estreptococos/enterococos; descompone el peróxido en agua y oxígeno."}, {"n": "3", "noShuffle": false, "img": null, "q": "Streptococcus pyogenes (grupo A) produce todas las siguientes EXCEPTO:", "o": ["La faringitis aguda y la escarlatina", "La fiebre reumática tras la infección", "La glomerulonefritis postestreptocócica", "La coagulasa que caracteriza a S. aureus"], "c": 4, "e": "<b>S. pyogenes</b> causa faringitis, escarlatina y secuelas inmunes (fiebre reumática, glomerulonefritis); la coagulasa es de S. aureus."}, {"n": "4", "noShuffle": false, "img": null, "q": "La hemólisis BETA en agar sangre se caracteriza por:", "o": ["Un halo verdoso de hemólisis parcial", "Un halo transparente de hemólisis completa", "La ausencia total de hemólisis", "Un crecimiento envuelto en cápsula"], "c": 2, "e": "La <b>betahemólisis</b> es lisis completa (halo claro), típica de S. pyogenes y S. agalactiae; la alfa es parcial (verdosa)."}, {"n": "5", "noShuffle": false, "img": null, "q": "Streptococcus pneumoniae se caracteriza por ser:", "o": ["Betahemolítico, catalasa positivo y resistente", "Alfahemolítico, capsulado y sensible a optoquina", "Gramnegativo, oxidasa positivo y no fermentador", "Anaerobio estricto, esporulado y termorresistente"], "c": 2, "e": "El <b>neumococo</b> es alfahemolítico, encapsulado (cápsula = virulencia) y sensible a optoquina; causa neumonía, otitis y meningitis."}, {"n": "6", "noShuffle": false, "img": null, "q": "La fiebre reumática es una complicación NO supurativa de la infección por:", "o": ["Staphylococcus aureus de la piel", "Streptococcus pyogenes de la faringe", "Enterococcus faecalis intestinal", "Streptococcus agalactiae vaginal"], "c": 2, "e": "La <b>fiebre reumática</b> aparece tras faringitis por S. pyogenes por mimetismo molecular; afecta corazón, articulaciones y SNC."}, {"n": "7", "noShuffle": false, "img": null, "q": "¿Cuál de los siguientes estafilococos es el principal responsable de infecciones de catéteres y prótesis?", "o": ["Staphylococcus aureus, muy virulento y agresivo", "Staphylococcus epidermidis, formador de biofilm", "Staphylococcus saprophyticus, propio de la orina", "Streptococcus mutans, habitual de la cavidad oral"], "c": 2, "e": "<b>S. epidermidis</b> (coagulasa negativo) forma biofilm sobre material protésico y catéteres; S. saprophyticus causa ITU en mujeres jóvenes."}, {"n": "8", "noShuffle": false, "img": null, "q": "El SARM (MRSA) es un S. aureus resistente a:", "o": ["La vancomicina, por cambiar el ribosoma", "La meticilina y betalactámicos, por la PBP2a", "Los aminoglucósidos, por mutar la pared", "Todos los antibióticos que se conocen"], "c": 2, "e": "El <b>SARM</b> porta el gen mecA, que codifica la PBP2a de baja afinidad por betalactámicos: resistente a meticilina y similares."}, {"n": "9", "noShuffle": false, "img": null, "q": "Streptococcus agalactiae (grupo B) tiene especial relevancia clínica por causar:", "o": ["La caries dental en niños", "La sepsis y meningitis del neonato", "El shock tóxico por uso de tampones", "La endocarditis sobre válvula sana"], "c": 2, "e": "<b>S. agalactiae</b> coloniza el tracto genital materno y causa sepsis/meningitis neonatal; se cribará a la embarazada al final de la gestación."}, {"n": "10", "noShuffle": false, "img": null, "q": "Enterococcus faecalis se caracteriza por:", "o": ["Ser muy sensible a casi todos los antibióticos", "Su resistencia y su papel en infecciones nosocomiales", "Producir la toxina diftérica faríngea", "Ser un coco gramnegativo intestinal"], "c": 2, "e": "<b>Enterococcus</b> es un coco grampositivo intestinal con marcada resistencia (incluida vancomicina, ERV); causa ITU, endocarditis e infección nosocomial."}, {"n": "11", "noShuffle": false, "img": null, "q": "La toxina del síndrome del shock tóxico (TSST-1) está producida por:", "o": ["Streptococcus pneumoniae", "Staphylococcus aureus", "Enterococcus faecium", "Streptococcus mutans"], "c": 2, "e": "La <b>TSST-1</b> de S. aureus es un superantígeno que provoca el síndrome del shock tóxico (fiebre, exantema, hipotensión, fallo multiorgánico)."}, {"n": "12", "noShuffle": false, "img": null, "q": "Streptococcus mutans se asocia principalmente a:", "o": ["La endocarditis aguda", "La caries dental", "La meningitis del adulto", "La neumonía lobar"], "c": 2, "e": "<b>S. mutans</b> (grupo viridans) fermenta azúcares produciendo ácido que desmineraliza el esmalte: principal agente de la caries."}], "mic_bgp": [{"n": "1", "noShuffle": false, "img": null, "q": "Clostridium tetani produce el tétanos mediante una toxina que:", "o": ["Activa la adenilato ciclasa del intestino", "Bloquea los neurotransmisores inhibidores (GABA)", "Inhibe la síntesis de proteínas celular", "Lisa directamente los hematíes"], "c": 2, "e": "La <b>tetanospasmina</b> bloquea la liberación de GABA/glicina en la médula, causando parálisis espástica (trismo, opistótonos)."}, {"n": "2", "noShuffle": false, "img": null, "q": "La toxina botulínica de Clostridium botulinum causa:", "o": ["Una parálisis espástica con fuertes contracturas", "Una parálisis flácida por bloquear la acetilcolina", "Una diarrea acuosa muy abundante y profusa", "Fiebre muy alta con exantema generalizado"], "c": 2, "e": "La <b>toxina botulínica</b> impide la liberación de acetilcolina en la placa motora: parálisis flácida descendente; es la base del Botox."}, {"n": "3", "noShuffle": false, "img": null, "q": "Bacillus anthracis (carbunco) se caracteriza por:", "o": ["Ser un coco gramnegativo de tipo anaerobio", "Ser un bacilo grampositivo aerobio y esporulado", "Carecer por completo de cualquier pared celular", "No formar esporas bajo ninguna condición ambiental"], "c": 2, "e": "<b>B. anthracis</b> es un bacilo grampositivo aerobio, esporulado y con cápsula de poliglutámico; causa carbunco cutáneo, pulmonar o digestivo."}, {"n": "4", "noShuffle": false, "img": null, "q": "Listeria monocytogenes destaca por:", "o": ["No poder crecer nunca a baja temperatura", "Crecer en frío y afectar a embarazadas", "Ser un anaerobio estricto del intestino", "Formar esporas muy termorresistentes"], "c": 2, "e": "<b>Listeria</b> es psicrótrofa (crece en nevera), intracelular facultativa; grave en embarazo (aborto, sepsis neonatal) e inmunodeprimidos."}, {"n": "5", "noShuffle": false, "img": null, "q": "Corynebacterium diphtheriae produce la difteria gracias a una toxina que:", "o": ["Estimula la secreción intestinal de cloro", "Inhibe la síntesis proteica al inactivar el EF-2", "Bloquea la unión neuromuscular periférica", "Degrada el peptidoglicano de la pared"], "c": 2, "e": "La <b>toxina diftérica</b> ADP-ribosila el factor de elongación EF-2 y detiene la síntesis proteica; forma la pseudomembrana faríngea."}, {"n": "6", "noShuffle": false, "img": null, "q": "¿Cuál de los siguientes bacilos grampositivos NO forma esporas?", "o": ["Bacillus anthracis, del carbunco", "Clostridium perfringens, de la gangrena", "Listeria monocytogenes, intracelular", "Clostridium tetani, del tétanos"], "c": 3, "e": "<b>Listeria</b> y Corynebacterium no esporulan; los géneros Bacillus y Clostridium sí forman endosporas."}, {"n": "7", "noShuffle": false, "img": null, "q": "Clostridium perfringens es el principal agente de:", "o": ["El tétanos con parálisis espástica", "La gangrena gaseosa o mionecrosis", "El botulismo por conservas", "La difteria con pseudomembrana"], "c": 2, "e": "<b>C. perfringens</b> produce alfa-toxina (lecitinasa) y causa gangrena gaseosa y toxiinfección alimentaria."}, {"n": "8", "noShuffle": false, "img": null, "q": "Clostridioides difficile se asocia característicamente a:", "o": ["La meningitis del recién nacido contagiado en el parto", "La neumonía atípica del joven con poca fiebre", "La colitis pseudomembranosa tras los antibióticos", "La infección urinaria de repetición en la mujer"], "c": 3, "e": "<b>C. difficile</b> prolifera al alterarse la microbiota por antibióticos; sus toxinas A/B causan colitis pseudomembranosa con diarrea."}, {"n": "9", "noShuffle": false, "img": null, "q": "El reservorio y la vía de la toxina preformada del botulismo alimentario clásico es:", "o": ["El agua contaminada por las heces", "Las conservas con la toxina ya formada", "La picadura de un artrópodo vector", "El contacto sexual sin protección"], "c": 2, "e": "El <b>botulismo alimentario</b> se debe a ingerir la toxina ya preformada en conservas anaerobias mal esterilizadas."}, {"n": "10", "noShuffle": false, "img": null, "q": "La cápsula de Bacillus anthracis es peculiar porque está compuesta de:", "o": ["Polisacárido, como en el neumococo", "Ácido poli-D-glutámico, de tipo proteico", "Lípidos complejos, como las ceras", "Quitina, como en los hongos"], "c": 2, "e": "A diferencia de la mayoría, la <b>cápsula de B. anthracis</b> es de naturaleza polipeptídica (ácido poli-D-glutámico), antifagocítica."}], "mic_bgn1": [{"n": "1", "noShuffle": false, "img": null, "q": "Las enterobacterias comparten todas las siguientes características EXCEPTO:", "o": ["Ser bacilos gramnegativos", "Fermentar la glucosa", "Ser oxidasa negativas", "Ser oxidasa positivas"], "c": 4, "e": "Las <b>enterobacterias</b> (E. coli, Salmonella…) son bacilos gramnegativos, fermentadoras de glucosa y <b>oxidasa negativas</b>."}, {"n": "2", "noShuffle": false, "img": null, "q": "Escherichia coli enterohemorrágica (ECEH, O157:H7) produce:", "o": ["La toxina diftérica que afecta a la faringe", "La toxina Shiga y el síndrome hemolítico-urémico", "La toxina botulínica con parálisis flácida", "La coagulasa típica de los estafilococos aureus"], "c": 2, "e": "La <b>ECEH</b> produce toxina Shiga; causa colitis hemorrágica y síndrome hemolítico-urémico, sobre todo en niños."}, {"n": "3", "noShuffle": false, "img": null, "q": "La fiebre tifoidea está causada por:", "o": ["Salmonella Typhi", "Shigella dysenteriae", "Vibrio cholerae", "Klebsiella pneumoniae"], "c": 1, "e": "<b>Salmonella Typhi</b> causa la fiebre tifoidea, enfermedad sistémica con fiebre, bacteriemia y posibles portadores crónicos (vesícula)."}, {"n": "4", "noShuffle": false, "img": null, "q": "La disentería bacilar (deposiciones con sangre y moco) es típica de:", "o": ["Klebsiella pneumoniae", "Shigella dysenteriae", "Proteus mirabilis", "Enterobacter cloacae"], "c": 2, "e": "<b>Shigella</b> invade el epitelio del colon (y produce toxina Shiga) provocando disentería con sangre, moco y tenesmo."}, {"n": "5", "noShuffle": false, "img": null, "q": "Klebsiella pneumoniae se caracteriza por:", "o": ["No tener cápsula de ningún tipo", "Ser muy capsulada y causar neumonía e ITU", "Ser oxidasa positiva como Pseudomonas", "Formar esporas de resistencia"], "c": 2, "e": "<b>Klebsiella</b> es muy capsulada (colonias mucoides); causa neumonía, ITU e infecciones nosocomiales, con cepas multirresistentes (BLEE, carbapenemasas)."}, {"n": "6", "noShuffle": false, "img": null, "q": "El antígeno O de las enterobacterias corresponde a:", "o": ["La proteína estructural del flagelo (H)", "La porción polisacárida del LPS de la pared", "La cápsula polisacárida externa (K)", "El pili sexual de la conjugación"], "c": 2, "e": "El <b>antígeno O</b> es el polisacárido somático del LPS; el H es flagelar y el K capsular: base de la serotipificación."}, {"n": "7", "noShuffle": false, "img": null, "q": "Proteus mirabilis se asocia a infecciones urinarias y destaca por:", "o": ["Ser un microorganismo totalmente inmóvil en el medio", "Su gran movilidad y producir ureasa (cálculos)", "Carecer por completo de pared de peptidoglicano", "Ser un coco grampositivo habitual de la piel"], "c": 2, "e": "<b>Proteus</b> presenta crecimiento en oleadas (swarming) y ureasa, que alcaliniza la orina y favorece cálculos de estruvita."}, {"n": "8", "noShuffle": false, "img": null, "q": "Escherichia coli es, en condiciones normales:", "o": ["Un patógeno estricto siempre que aparece", "Un comensal intestinal que puede ser oportunista", "Un anaerobio estricto sin oxígeno", "Un coco grampositivo de la boca"], "c": 2, "e": "<b>E. coli</b> forma parte de la microbiota intestinal; según cepa y localización puede causar ITU, gastroenteritis o sepsis."}, {"n": "9", "noShuffle": false, "img": null, "q": "La causa bacteriana más frecuente de infección del tracto urinario es:", "o": ["Staphylococcus aureus", "Escherichia coli", "Pseudomonas aeruginosa", "Streptococcus pyogenes"], "c": 2, "e": "<b>E. coli</b> uropatógena es con diferencia la primera causa de ITU comunitaria gracias a sus fimbrias P de adhesión."}, {"n": "10", "noShuffle": false, "img": null, "q": "Las betalactamasas de espectro extendido (BLEE) confieren a las enterobacterias resistencia a:", "o": ["Los aminoglucósidos inyectables", "Las penicilinas y las cefalosporinas", "La vancomicina de uso hospitalario", "El metronidazol de los anaerobios"], "c": 2, "e": "Las <b>BLEE</b> hidrolizan penicilinas y cefalosporinas (incluidas de 3ª generación); un problema creciente de multirresistencia."}, {"n": "11", "noShuffle": false, "img": null, "q": "Yersinia pestis, agente de la peste, se transmite clásicamente por:", "o": ["La vía sexual sin protección", "La picadura de la pulga de la rata", "El agua de bebida contaminada", "Los aerosoles del aire acondicionado"], "c": 2, "e": "La <b>peste</b> se transmite por la pulga (Xenopsylla); la forma bubónica afecta ganglios y la neumónica se contagia por vía aérea."}, {"n": "12", "noShuffle": false, "img": null, "q": "Salmonella (no tifoidea) produce con mayor frecuencia:", "o": ["La fiebre tifoidea sistémica grave con bacteriemia", "La gastroenteritis por alimentos contaminados", "La meningitis bacteriana del adulto inmunodeprimido", "La neumonía atípica del joven sin apenas fiebre"], "c": 2, "e": "Las <b>Salmonella no tifoideas</b> (enteritidis, typhimurium) causan gastroenteritis autolimitada por huevos/aves contaminados."}], "mic_bgn2": [{"n": "1", "noShuffle": false, "img": null, "q": "Pseudomonas aeruginosa se caracteriza por:", "o": ["Ser oxidasa negativa y fermentadora", "Ser oxidasa positiva, aerobia y resistente", "Formar esporas muy termorresistentes", "Ser un coco grampositivo en racimos"], "c": 2, "e": "<b>P. aeruginosa</b> es un BGN oxidasa positivo, no fermentador, con pigmentos (piocianina) y mucha resistencia; oportunista en quemados, FQ y nosocomial."}, {"n": "2", "noShuffle": false, "img": null, "q": "Vibrio cholerae produce el cólera mediante una toxina que:", "o": ["Inhibe la síntesis proteica del enterocito", "Activa la adenilato ciclasa y la secreción de agua", "Bloquea la transmisión neuromuscular", "Lisa directamente las células del colon"], "c": 2, "e": "La <b>toxina colérica</b> ADP-ribosila la proteína Gs, eleva el AMPc y causa diarrea acuosa profusa ('agua de arroz') con deshidratación."}, {"n": "3", "noShuffle": false, "img": null, "q": "Helicobacter pylori se relaciona causalmente con:", "o": ["El cólera con su diarrea acuosa muy abundante", "La úlcera péptica y el adenocarcinoma gástrico", "La tos ferina con tos paroxística del lactante", "La legionelosis adquirida por los aerosoles"], "c": 2, "e": "<b>H. pylori</b> coloniza la mucosa gástrica (produce ureasa), causa gastritis crónica, úlcera péptica, MALToma y cáncer gástrico."}, {"n": "4", "noShuffle": false, "img": null, "q": "Campylobacter jejuni es una causa frecuente de:", "o": ["La neumonía atípica del joven", "La gastroenteritis y el Guillain-Barré", "La infección urinaria de repetición", "La meningitis bacteriana aguda"], "c": 2, "e": "<b>C. jejuni</b> (microaerófilo) causa diarrea por aves/leche cruda y es un desencadenante clásico del síndrome de Guillain-Barré."}, {"n": "5", "noShuffle": false, "img": null, "q": "La prueba de la oxidasa es POSITIVA en:", "o": ["Escherichia coli, comensal intestinal", "Pseudomonas aeruginosa, no fermentadora", "Klebsiella pneumoniae, capsulada", "Shigella dysenteriae, disentérica"], "c": 2, "e": "La <b>oxidasa positiva</b> ayuda a separar Pseudomonas, Vibrio o Neisseria de las enterobacterias, que son oxidasa negativas."}, {"n": "6", "noShuffle": false, "img": null, "q": "El reservorio de Vibrio cholerae y la vía de transmisión del cólera es:", "o": ["La picadura del mosquito Anopheles", "El agua y alimentos con heces (fecal-oral)", "Las gotas respiratorias entre personas", "El contacto sexual sin protección"], "c": 2, "e": "El <b>cólera</b> se transmite por agua/alimentos contaminados con heces; brotes ligados a saneamiento deficiente."}, {"n": "7", "noShuffle": false, "img": null, "q": "Helicobacter pylori sobrevive en el ácido gástrico gracias a:", "o": ["Una cápsula polisacárida muy gruesa", "La ureasa, que neutraliza el ácido alrededor", "La formación de esporas resistentes", "La fermentación rápida de la lactosa"], "c": 2, "e": "La <b>ureasa</b> de H. pylori hidroliza urea en amoniaco, tamponando el pH; es además base del test del aliento para el diagnóstico."}, {"n": "8", "noShuffle": false, "img": null, "q": "Pseudomonas aeruginosa es un patógeno especialmente temido en:", "o": ["Adultos sanos sin ningún factor de riesgo", "Quemados, fibrosis quística e ingresados", "Recién nacidos a término totalmente sanos", "La caries y la placa dental"], "c": 2, "e": "<b>P. aeruginosa</b> es oportunista: infecta quemaduras, vías respiratorias en fibrosis quística, catéteres y pacientes críticos."}, {"n": "9", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes afirmaciones sobre Vibrio cholerae NO es correcta?", "o": ["Es un bacilo gramnegativo de forma curvada", "Es oxidasa positivo en la prueba", "Su toxina aumenta el AMPc del intestino", "Invade el enterocito y produce sangre en heces"], "c": 4, "e": "El cólera produce diarrea <b>acuosa no inflamatoria</b> por la toxina (sin invadir ni sangre); la invasión con sangre es propia de Shigella/ECEH."}, {"n": "10", "noShuffle": false, "img": null, "q": "Las heces 'en agua de arroz' son características de:", "o": ["La salmonelosis por alimentos", "El cólera por su toxina", "La disentería por Shigella", "La colitis por C. difficile"], "c": 2, "e": "Las deposiciones <b>en agua de arroz</b> (acuosas, sin sangre, muy abundantes) son típicas del cólera por la toxina colérica."}], "mic_cocobac": [{"n": "1", "noShuffle": false, "img": null, "q": "Bordetella pertussis es el agente de la tos ferina y se transmite por:", "o": ["El agua de bebida contaminada", "La vía respiratoria mediante gotas", "La picadura de una garrapata", "El contacto sexual sin protección"], "c": 2, "e": "<b>B. pertussis</b> se transmite por gotas; su toxina pertussis y la adhesión ciliar causan la tos paroxística con 'gallo' inspiratorio."}, {"n": "2", "noShuffle": false, "img": null, "q": "Haemophilus influenzae tipo b (Hib) causaba clásicamente, antes de la vacuna:", "o": ["El cólera con diarrea acuosa", "La meningitis y epiglotitis infantil", "La tuberculosis pulmonar cavitada", "La sífilis con chancro genital"], "c": 2, "e": "El <b>Hib</b> capsulado producía meningitis, epiglotitis y sepsis en la infancia; la vacuna conjugada redujo drásticamente su incidencia."}, {"n": "3", "noShuffle": false, "img": null, "q": "Legionella pneumophila se adquiere característicamente a través de:", "o": ["El contacto sexual sin protección", "Los aerosoles de agua contaminada", "Los alimentos en conserva caducados", "La picadura de la pulga de la rata"], "c": 2, "e": "La <b>legionelosis</b> se contrae inhalando aerosoles de agua contaminada; no se transmite persona a persona. Causa neumonía grave."}, {"n": "4", "noShuffle": false, "img": null, "q": "Brucella se transmite al ser humano principalmente por:", "o": ["La picadura del mosquito vector", "El contacto con ganado y lácteos crudos", "La vía respiratoria entre personas", "El agua de mar de las playas"], "c": 2, "e": "La <b>brucelosis</b> (fiebre de Malta) es una zoonosis por contacto con ganado o lácteos crudos; cursa con fiebre ondulante y sudoración."}, {"n": "5", "noShuffle": false, "img": null, "q": "Haemophilus influenzae requiere para su cultivo factores presentes en la sangre:", "o": ["Únicamente una buena tensión de oxígeno", "Los factores X (hemina) y V (NAD)", "Cloruro sódico al 10% en el medio", "Sales biliares para inhibir la flora"], "c": 2, "e": "<b>H. influenzae</b> es exigente: necesita factor X (hemina) y V (NAD), por eso crece en agar chocolate y no en agar sangre normal."}, {"n": "6", "noShuffle": false, "img": null, "q": "La tos ferina presenta una fase paroxística caracterizada por:", "o": ["Una diarrea acuosa muy abundante", "Accesos de tos con 'gallo' inspiratorio", "Un exantema generalizado por el cuerpo", "Ictericia con coluria intensa"], "c": 2, "e": "En la fase <b>paroxística</b> de la tos ferina hay accesos de tos violenta con estridor inspiratorio ('gallo') y a veces vómito."}, {"n": "7", "noShuffle": false, "img": null, "q": "¿Cuál de los siguientes NO es un cocobacilo gramnegativo exigente?", "o": ["Haemophilus influenzae, de la meningitis", "Bordetella pertussis, de la tos ferina", "Clostridium tetani, del tétanos", "Brucella melitensis, de la fiebre de Malta"], "c": 3, "e": "<b>Clostridium tetani</b> es un bacilo grampositivo anaerobio esporulado; los otros son cocobacilos gramnegativos."}, {"n": "8", "noShuffle": false, "img": null, "q": "La fiebre ondulante con afectación articular y antecedente de contacto con ganado sugiere:", "o": ["La legionelosis por aerosoles", "La brucelosis o fiebre de Malta", "La tos ferina del adulto", "La tularemia de tipo pulmonar"], "c": 2, "e": "La <b>brucelosis</b> cursa con fiebre ondulante, sudoración nocturna, artralgias y hepatoesplenomegalia; clave el antecedente epidemiológico."}], "mic_mico": [{"n": "1", "noShuffle": false, "img": null, "q": "Mycobacterium tuberculosis se identifica por su carácter:", "o": ["Gramnegativo en la tinción habitual", "Ácido-alcohol resistente (Ziehl-Neelsen)", "Anaerobio estricto sin oxígeno", "Esporulado y muy termorresistente"], "c": 2, "e": "Las <b>micobacterias</b> tienen pared rica en ácidos micólicos: son ácido-alcohol resistentes (Ziehl-Neelsen, auramina) y de crecimiento lento."}, {"n": "2", "noShuffle": false, "img": null, "q": "La pared de las micobacterias es peculiar por su alto contenido en:", "o": ["Ácidos teicoicos de superficie", "Ácidos micólicos a modo de ceras", "Peptidoglicano puro y muy grueso", "Quitina, como la de los hongos"], "c": 2, "e": "Los <b>ácidos micólicos</b> dan impermeabilidad, ácido-alcohol resistencia y resistencia a muchos antibióticos y a la desecación."}, {"n": "3", "noShuffle": false, "img": null, "q": "La prueba de la tuberculina (Mantoux) o el IGRA detectan:", "o": ["La enfermedad tuberculosa activa con certeza", "La respuesta inmune celular frente al bacilo", "La presencia directa del bacilo en esputo", "Los anticuerpos protectores frente a la TB"], "c": 2, "e": "El <b>Mantoux/IGRA</b> miden hipersensibilidad/respuesta T frente a antígenos de M. tuberculosis: indican infección/contacto, no necesariamente enfermedad activa."}, {"n": "4", "noShuffle": false, "img": null, "q": "Mycobacterium leprae es el agente de la lepra y se caracteriza por:", "o": ["Crecer muy rápido en el agar sangre", "No poder cultivarse en medios artificiales", "Ser un coco grampositivo en cadenas", "Formar esporas de gran resistencia"], "c": 2, "e": "<b>M. leprae</b> no se cultiva in vitro; afecta piel y nervios periféricos, con formas tuberculoide (paucibacilar) y lepromatosa (multibacilar)."}, {"n": "5", "noShuffle": false, "img": null, "q": "El crecimiento de Mycobacterium tuberculosis en medio de Löwenstein-Jensen es:", "o": ["Muy rápido, en unas 24 horas", "Lento, a lo largo de varias semanas", "Imposible en cualquier medio", "Solo posible en anaerobiosis estricta"], "c": 2, "e": "<b>M. tuberculosis</b> crece lentamente (semanas) por su pared y metabolismo, lo que retrasa el diagnóstico por cultivo (de ahí PCR y baciloscopia)."}, {"n": "6", "noShuffle": false, "img": null, "q": "Nocardia se distingue de las micobacterias clásicas por ser:", "o": ["Ácido-resistente parcial, filamentosa y del suelo", "Un virus de gran tamaño y con envoltura lipídica", "Un anaerobio estricto que vive en el intestino", "Un coco gramnegativo propio de las mucosas"], "c": 1, "e": "<b>Nocardia</b> es un actinomiceto aerobio, ramificado, parcialmente ácido-alcohol resistente; causa infección pulmonar/cerebral en inmunodeprimidos."}, {"n": "7", "noShuffle": false, "img": null, "q": "La forma de transmisión de la tuberculosis pulmonar es:", "o": ["La vía fecal-oral por alimentos", "La vía aérea por núcleos goticulares", "La vía vectorial por garrapatas", "La vía sexual sin protección"], "c": 2, "e": "La <b>TB</b> se transmite por vía aérea (gotículas de Wells); el bacilo se aloja en alvéolos y forma el granuloma con necrosis caseosa."}, {"n": "8", "noShuffle": false, "img": null, "q": "¿Cuál de las siguientes afirmaciones sobre Mycobacterium tuberculosis NO es correcta?", "o": ["Es ácido-alcohol resistente al teñir", "Tiene un crecimiento lento característico", "Se tiñe muy bien con la tinción de Gram", "Forma granulomas con necrosis caseosa"], "c": 3, "e": "Las micobacterias <b>no se tiñen bien con Gram</b> por su pared cerosa; se usa Ziehl-Neelsen o auramina."}], "mic_espiro": [{"n": "1", "noShuffle": false, "img": null, "q": "Treponema pallidum, agente de la sífilis, se transmite principalmente por:", "o": ["La vía aérea mediante gotas", "La vía sexual y la transmisión vertical", "La picadura de la pulga de la rata", "El agua de bebida contaminada"], "c": 2, "e": "<b>T. pallidum</b> se transmite por contacto sexual y de madre a feto (sífilis congénita); no se cultiva en medios habituales."}, {"n": "2", "noShuffle": false, "img": null, "q": "El chancro duro indoloro es la lesión característica de la sífilis:", "o": ["Secundaria, con exantema palmoplantar", "Primaria, en el punto de inoculación", "Terciaria, con gomas y aortitis", "Latente, sin ninguna lesión visible"], "c": 2, "e": "La <b>sífilis primaria</b> cursa con el chancro: úlcera indolora, indurada y muy contagiosa en el punto de inoculación."}, {"n": "3", "noShuffle": false, "img": null, "q": "La enfermedad de Lyme está causada por una espiroqueta transmitida por garrapata:", "o": ["Leptospira interrogans, presente en la orina", "Borrelia burgdorferi, del eritema migratorio", "Treponema pallidum, agente de la sífilis", "Borrelia recurrentis, transmitida por el piojo"], "c": 2, "e": "<b>B. burgdorferi</b> causa la enfermedad de Lyme (eritema migratorio, afectación articular, cardiaca y neurológica); vector: garrapata Ixodes."}, {"n": "4", "noShuffle": false, "img": null, "q": "La leptospirosis se adquiere típicamente por:", "o": ["Contacto con agua o suelo con orina de roedores", "La vía sexual sin ningún tipo de protección", "Las gotas respiratorias entre personas", "Las conservas alimentarias mal procesadas"], "c": 1, "e": "<b>Leptospira</b> se transmite por agua/suelo con orina de roedores; cursa con fiebre, mialgias y, en formas graves, ictericia y fallo renal (Weil)."}, {"n": "5", "noShuffle": false, "img": null, "q": "La sífilis secundaria se caracteriza por:", "o": ["El chancro único duro e indoloro", "Un exantema generalizado palmoplantar", "Las gomas y la afectación cardiovascular", "La ausencia total de síntomas clínicos"], "c": 2, "e": "La <b>sífilis secundaria</b> da exantema maculopapular que afecta palmas y plantas, condilomas planos y adenopatías; muy contagiosa."}, {"n": "6", "noShuffle": false, "img": null, "q": "¿Qué prueba se utiliza como cribado (no treponémico) de la sífilis?", "o": ["La tinción de Ziehl-Neelsen", "El RPR o el VDRL en suero", "La prueba cutánea de Mantoux", "El test de Coombs directo"], "c": 2, "e": "El <b>VDRL/RPR</b> son pruebas no treponémicas de cribado que detectan
