alse,"noShuffle":false,"img":null},{"n":"vh16","q":"El s\u00edndrome de Loeffler se encuentra causado por:","o":["Ascaris lumbricoides","Uncinarias/tricoc\u00e9falos","Oxiuros","Onchocerca volvulus"],"c":1,"e":"El S\u00cdNDROME DE LOEFFLER es una neumonitis eosinof\u00edlica transitoria producida por el paso de las larvas de ASCARIS LUMBRICOIDES a trav\u00e9s de los pulmones (migraci\u00f3n larvaria). Las larvas penetran en el intestino delgado, migran por sangre hasta los pulmones, rompen los capilares alveolares, ascienden por la tr\u00e1quea y son deglutidas. Cl\u00ednica: tos, disnea, fiebre, eosinofilia y opacidades pulmonares transitorias.","ai":false,"noShuffle":false,"img":null},{"n":"vh17","q":"La SARNA NORUEGA es una variedad de escabiosis m\u00e1s frecuente en inmunodeprimidos, predispuesta por los siguientes factores con EXCEPCI\u00d3N de uno. Indique cu\u00e1l:","o":["Demencia senil","S\u00edndrome de Down","Hipervitaminosis A","Higiene deficiente"],"c":3,"e":"La HIPERVITAMINOSIS A no es un factor predisponente para la sarna noruega. Los factores predisponentes reconocidos son: inmunosupresi\u00f3n (VIH, corticoides, quimioterapia), enfermedades neurol\u00f3gicas (demencia, S\u00edndrome de Down) que impiden el rascado normal, e higiene deficiente. La sarna noruega tiene millones de \u00e1caros (vs. decenas en la sarna com\u00fan) y es altamente contagiosa.","ai":false,"noShuffle":false,"img":null}],"caso_brucelosis":[{"n":"cc1","q":"CASO CL\u00cdNICO BRUCELOSIS. Paciente de 35 a\u00f1os, 5 meses en India, fiebre de predominio vespertino (m\u00e1x. 39 grados), artromialgias, tos seca, p\u00e9rdida de 7 kg, astenia. Hepatoesplenomegalia y n\u00f3dulo pulmonar (posible granuloma) en imagen. Anal\u00edtica normal salvo PCR=32.\n\nSUB-PREGUNTA 1: Con los antecedentes cl\u00ednicos descritos, cu\u00e1l es el agente etiol\u00f3gico m\u00e1s probable inicialmente:","o":["Mycobacterium tuberculosis","Salmonella enterica serovar Typhi","Virus del Dengue","Ninguna de las anteriores"],"c":1,"e":"Con fiebre cr\u00f3nica vespertina, p\u00e9rdida de peso, tos seca, hepatoesplenomegalia y granuloma pulmonar en un paciente proveniente de India, el primer diagn\u00f3stico a considerar es TUBERCULOSIS. La TB produce fiebre de predominio vespertino, p\u00e9rdida de peso y granulomas pulmonares/hep\u00e1ticos. La Salmonella typhi provoca fiebre tifoidea m\u00e1s aguda y autolimitada. El dengue es autolimitado y no produce granulomas.","ai":false,"noShuffle":false,"img":null},{"n":"cc2","q":"CASO CL\u00cdNICO BRUCELOSIS - continuaci\u00f3n. El paciente ha estado en contacto directo con ganado (cordero, vaca, b\u00fafalo) y consum\u00eda leche reci\u00e9n orde\u00f1ada sin calentar. La familia se dedica a la extracci\u00f3n de leche. Ning\u00fan familiar presenta cl\u00ednica.\n\nSUB-PREGUNTA 2: Con esta nueva informaci\u00f3n, cambiar\u00edas la orientaci\u00f3n diagn\u00f3stica:","o":["No, sigo pensando que se trata de una Tuberculosis","Podr\u00eda tratarse de una Brucelosis","Buscar\u00eda otras causas de hepatoesplenomegalia y granulomas","Podr\u00eda tratarse de una Listeriosis"],"c":2,"e":"El contacto con ganado rumiante (vacas, ovejas, cabras, b\u00fafalos) y la ingesta de leche cruda sin pasteurizar son los factores de riesgo cl\u00e1sicos de la BRUCELOSIS. Brucella melitensis (ovino/caprino) y B. abortus (bovino) son las especies m\u00e1s frecuentes. La brucelosis produce FOD con hepatoesplenomegalia y granulomas, y fiebre ondulante. Esto cambia completamente la orientaci\u00f3n diagn\u00f3stica.","ai":false,"noShuffle":false,"img":null},{"n":"cc3","q":"CASO CL\u00cdNICO BRUCELOSIS - continuaci\u00f3n. Serolog\u00eda FOD: Rosa de Bengala POSITIVO. Brucellacapt (test inmunocaptura) POSITIVO. T\u00edtulo: 1/1280.\n\nSUB-PREGUNTA 3: Qu\u00e9 t\u00edtulo de anticuerpos se considerar\u00eda SIGNIFICATIVO en la prueba de Brucellacapt:","o":["Menor de 1/80","Menor de 1/320","Igual a 1/1280","Mayor o igual a 1/320"],"c":4,"e":"El t\u00edtulo SIGNIFICATIVO (positivo) en la prueba de Brucellacapt (inmunocaptura) es mayor o igual a 1/320. Un t\u00edtulo de 1/1280 como en el caso supera ampliamente este umbral y confirma el diagn\u00f3stico de brucelosis. El test de Rosa de Bengala es una prueba de cribado (alta sensibilidad, baja especificidad) y el Brucellacapt o la SAW (seroaglutinaci\u00f3n de Wright con t\u00edtulo mayor o igual a 1/160) confirman el diagn\u00f3stico.","ai":false,"noShuffle":false,"img":null},{"n":"cc4","q":"CASO CL\u00cdNICO BRUCELOSIS - continuaci\u00f3n. Hemocultivos a los 15 d\u00edas: crecimiento de Brucella melitensis. Antibiograma: sensible a cotrimoxazol, gentamicina, ciprofloxacino, doxiciclina y rifampicina.\n\nSUB-PREGUNTA 4: Qu\u00e9 tratamiento antimicrobiano pautar\u00edas:","o":["Imipenem 1g/8h iv, 4-6 semanas","Ceftriaxona 2g/dia iv, 4 semanas","Ampicilina 2g/6h iv m\u00e1s gentamicina 7mg/kg/dia iv, 3 semanas","Gentamicina 5mg/kg/dia iv 1-2 semanas m\u00e1s doxiciclina 100mg/12h vo 6 semanas"],"c":4,"e":"El tratamiento de elecci\u00f3n de la brucelosis es DOXICICLINA 100mg/12h durante 6 semanas m\u00e1s GENTAMICINA IV durante las primeras 1-2 semanas (pauta OMS). La combinaci\u00f3n doxiciclina m\u00e1s gentamicina tiene menor tasa de reca\u00eddas que doxiciclina m\u00e1s rifampicina. Los betalact\u00e1micos (ampicilina, ceftriaxona) NO son de elecci\u00f3n en brucelosis porque las tasas de reca\u00edda son altas.","ai":false,"noShuffle":false,"img":null},{"n":"cc5","q":"CASO CL\u00cdNICO BRUCELOSIS - continuaci\u00f3n.\n\nSUB-PREGUNTA 5: Cu\u00e1l de las siguientes complicaciones es la m\u00e1s FRECUENTE en la brucelosis:","o":["Endocarditis (la m\u00e1s grave)","Espondilitis","Meningitis","Glomerulonefritis"],"c":2,"e":"La ESPONDILITIS es la complicaci\u00f3n localizada m\u00e1s FRECUENTE de la brucelosis (afecta especialmente a la columna lumbar, L4-L5). La ENDOCARDITIS es la m\u00e1s GRAVE (aunque poco frecuente, con alta mortalidad) y la principal causa de muerte en la brucelosis. La artritis perif\u00e9rica tambi\u00e9n es frecuente. El diagn\u00f3stico diferencial de espondilodiscitis siempre debe incluir brucelosis en zonas ganaderas.","ai":false,"noShuffle":false,"img":null},{"n":"br1","q":"El diagnostico de brucelosis mas rapido y efectivo se realiza con:","o":["Test Coombs antibrucella","Seroaglutinacion de Wright","Hemocultivos","El test de Rosa de Bengala"],"c":4,"e":"El TEST DE ROSA DE BENGALA es la prueba de CRIBADO mas rapida para el diagnostico de brucelosis: aglutinacion en portaobjetos, resultado en minutos, sensibilidad superior al 99% en infeccion aguda. Es el test de eleccion para el cribado inicial. La seroaglutinacion de Wright confirma el diagnostico con titulos mayores o iguales a 1/160. Los hemocultivos tienen mayor especificidad pero tardan hasta 15 dias en crecer y requieren incubacion prolongada.","ai":false,"noShuffle":false,"img":null},{"n":"br2","q":"La complicacion mas tipica y frecuente de la brucelosis es:","o":["Endocarditis","Orquitis","Meningoencefalitis","Espondilodiscitis"],"c":4,"e":"La ESPONDILODISCITIS es la complicacion localizada mas FRECUENTE de la brucelosis, afectando especialmente la columna lumbar (L4-L5). La ENDOCARDITIS es la mas GRAVE (alta mortalidad, principal causa de muerte) pero es poco frecuente. La orquitis es frecuente en varones (30-40%) pero no la mas frecuente en general. La meningoencefalitis es una complicacion rara. El diagnostico diferencial de espondilodiscitis siempre debe incluir brucelosis en zonas ganaderas.","ai":false,"noShuffle":false,"img":null},{"n":"br3","q":"Respecto al germen de la brucelosis, senale la respuesta FALSA:","o":["Su virulencia depende de factores geneticos","Son extremadamente resistentes a la intemperie porque producen esporas","El germen que la produce es del genero Brucella","El genero Brucella se divide en 3 cepas diferentes"],"c":2,"e":"FALSA: Brucella NO produce ESPORAS. Es un coco-bacilo gramnegativo intracelular facultativo que NO tiene capacidad esporuladora. Su resistencia ambiental se debe a su lipopolisacarido (LPS) atipico y a otros factores de su membrana externa, no a esporas. B. anthracis (carbunco) si produce esporas, pero Brucella no. Las otras opciones son correctas: la virulencia depende de factores geneticos (genes virB, bvrS, bvrR), el genero es Brucella, y las especies de mayor interes medico son B. melitensis (ovinos/caprinos), B. abortus (bovinos) y B. suis (porcinos).","ai":false,"noShuffle":false,"img":null},{"n":"br4","q":"Respecto a las manifestaciones clinicas de la brucelosis, senale la respuesta FALSA:","o":["La Brucelosis es una enfermedad infecciosa de caracteristicas principalmente agudas","Las manifestaciones organicas reflejan la formacion de granulomas en diversos organos","El estadio de generalizacion es sinonimo de bacteriemia","Los sintomas tipicos del estadio de generalizacion son la hepatoesplenomegalia y la fiebre"],"c":1,"e":"FALSA: la brucelosis NO es una enfermedad de caracteristicas principalmente agudas. Al contrario, es una enfermedad de curso SUBAGUDO O CRONICO con inicio insidioso (semanas-meses de evolucion antes del diagnostico). Es precisamente la cronificacion una de sus caracteristicas mas importantes. Las otras opciones son correctas: los granulomas explican las manifestaciones organicas (hepatoesplenomegalia, espondilodiscitis), el estadio de generalizacion equivale a bacteriemia, y la fiebre ondulante con hepatoesplenomegalia es la presentacion tipica.","ai":false,"noShuffle":false,"img":null}],"sindromes":[{"n":"si1","q":"Cu\u00e1l de los siguientes NO es un criterio de qSOFA:","o":["L\u00e1ctico mayor de 2 mmol/L","Frecuencia respiratoria mayor de 22 respiraciones por minuto","Alteraci\u00f3n del sensorio (GCS menor de 15)","Presi\u00f3n arterial sist\u00f3lica menor de 100 mmHg"],"c":1,"e":"El L\u00c1CTICO mayor de 2 mmol/L es criterio de SHOCK S\u00c9PTICO (Sepsis-3), NO del qSOFA. Los 3 criterios del qSOFA son: (1) FR mayor o igual a 22 rpm, (2) Alteraci\u00f3n del nivel de conciencia (GCS menor de 15), (3) PAS menor o igual a 100 mmHg. El qSOFA se usa fuera de UCI para identificar pacientes con sospecha de sepsis.","ai":false,"noShuffle":false,"img":null},{"n":"si2","q":"Cu\u00e1l de los siguientes conceptos NO se incluye para identificar a un paciente con SEPSIS en las nuevas definiciones (Sepsis-3, 2016):","o":["Disfunci\u00f3n org\u00e1nica potencialmente mortal","Aumento en la escala SOFA de 2 o m\u00e1s puntos respecto al basal","Respuesta inapropiada del hu\u00e9sped a la infecci\u00f3n","S\u00edndrome de respuesta inflamatoria sist\u00e9mica (SIRS)"],"c":4,"e":"El SIRS fue ELIMINADO de la definici\u00f3n de sepsis en Sepsis-3 (2016). La nueva definici\u00f3n es: DISFUNCI\u00d3N ORG\u00c1NICA (SOFA mayor o igual a 2 puntos) potencialmente mortal causada por una RESPUESTA INAPROPIADA DEL HU\u00c9SPED a la infecci\u00f3n. El SIRS era muy inespec\u00edfico (tambi\u00e9n en trauma, quemaduras, pancreatitis).","ai":false,"noShuffle":false,"img":null},{"n":"si3","q":"Un paciente con infecci\u00f3n de partes blandas, l\u00e1ctico 4 mmol/L, TAS 60 mmHg. Tras 100ml de suero salino isot\u00f3nico la presi\u00f3n arterial no sufre cambios y se mantiene en 60 mmHg. El paciente tiene:","o":["SIRS","Sepsis grave","Shock s\u00e9ptico","Shock s\u00e9ptico refractario"],"c":3,"e":"SHOCK S\u00c9PTICO (Sepsis-3): sepsis con hipotensi\u00f3n persistente que REQUIERE VASOPRESORES para mantener PAM mayor de 65 mmHg m\u00e1s l\u00e1ctico mayor de 2 mmol/L a pesar de reposici\u00f3n de volumen adecuada. En este caso: sepsis m\u00e1s l\u00e1ctico 4 m\u00e1s hipotensi\u00f3n refractaria a volumen = SHOCK S\u00c9PTICO. La mortalidad supera el 40%. Sepsis grave ya no existe en la terminolog\u00eda Sepsis-3.","ai":false,"noShuffle":false,"img":null},{"n":"si4","q":"La FOD Cl\u00e1sica del adulto se define seg\u00fan la clasificaci\u00f3n modificada de Durack y Street con excepci\u00f3n de una de ellas. Indique cu\u00e1l:","o":["Duraci\u00f3n de la fiebre superior a 3 semanas","Fiebre de 38,3 grados objetivada en m\u00e1s de 3 determinaciones","Ausencia de diagn\u00f3stico tras las investigaciones oportunas realizadas despu\u00e9s de al menos 3 consultas","Ausencia de diagn\u00f3stico tras 3 d\u00edas de investigaci\u00f3n intrahospitalaria"],"c":4,"e":"La definici\u00f3n cl\u00e1sica de FOD modificada (Durack y Street) requiere: fiebre mayor de 38.3 grados en m\u00e1s de 3 ocasiones m\u00e1s duraci\u00f3n mayor de 3 semanas m\u00e1s ausencia de diagn\u00f3stico tras AL MENOS 3 CONSULTAS AMBULATORIAS o 3 d\u00edas de hospitalizaci\u00f3n con investigaciones adecuadas. La opci\u00f3n D no representa fielmente el criterio completo de la definici\u00f3n cl\u00e1sica.","ai":false,"noShuffle":false,"img":null},{"n":"si5","q":"La infecci\u00f3n de piel y partes blandas que comporta de MAYOR GRAVEDAD es:","o":["For\u00fanculo","Imp\u00e9tigo","Fascitis necrotizante","Erisipela","\u00c1ntrax"],"c":3,"e":"La FASCITIS NECROTIZANTE es la infecci\u00f3n de partes blandas m\u00e1s grave. Produce necrosis del tejido subcut\u00e1neo y fascia, mortalidad del 20-40% incluso con tratamiento. Requiere DESBRIDAMIENTO QUIR\u00daRGICO AGRESIVO urgente m\u00e1s antibioterapia de amplio espectro m\u00e1s soporte UCI. El diagn\u00f3stico tard\u00edo es catastr\u00f3fico. Erisipela y celulitis son graves pero no al nivel de la fascitis.","ai":false,"noShuffle":false,"img":null},{"n":"si6","q":"Cu\u00e1l de las siguientes NO es indicaci\u00f3n de tratamiento de la bacteriuria asintom\u00e1tica:","o":["Mujer embarazada","Paciente inmunodeprimido","Bacteriuria persistente tras intervenci\u00f3n urol\u00f3gica","Paciente portador de sonda vesical"],"c":4,"e":"El paciente PORTADOR DE SONDA VESICAL con bacteriuria asintom\u00e1tica NO debe tratarse con antibi\u00f3ticos: aumenta la resistencia sin beneficio cl\u00ednico. Indicaciones de tratar la bacteriuria asintom\u00e1tica: (1) EMBARAZADAS, (2) PREVIA A MANIPULACI\u00d3N UROL\u00d3GICA con riesgo de sangrado, (3) Trasplante renal reciente. El inmunodeprimido TAMPOCO es indicaci\u00f3n est\u00e1ndar a menos que haya otros factores.","ai":false,"noShuffle":false,"img":null},{"n":"si7","q":"Cu\u00e1l es el microorganismo que m\u00e1s frecuentemente causa infecci\u00f3n en el tracto urinario en la comunidad:","o":["Proteus mirabilis","Klebsiella pneumoniae","E. coli","Pseudomonas aeruginosa"],"c":3,"e":"E. COLI es el agente causal del 70-85% de las infecciones urinarias en la comunidad. Otros agentes comunes: Klebsiella (5-10%), Proteus mirabilis (ureasa positivo, litiasis de estruvita), Staphylococcus saprophyticus (IU en mujeres j\u00f3venes). Pseudomonas es m\u00e1s frecuente en infecciones nosocomiales y pacientes con cat\u00e9ter.","ai":false,"noShuffle":false,"img":null},{"n":"si8","q":"Cu\u00e1l de las siguientes medidas en la prevenci\u00f3n de infecciones urinarias relacionadas con la asistencia sanitaria NO se ha mostrado eficaz:","o":["Limitaci\u00f3n del periodo del uso de la sonda urinaria","Mantenimiento de un sistema de drenaje urinario cerrado","Uso de antibi\u00f3ticos de acci\u00f3n sist\u00e9mica previo al sondaje urinario","T\u00e9cnica de asepsia en la inserci\u00f3n"],"c":3,"e":"El uso de ANTIBI\u00d3TICOS SIST\u00c9MICOS PREVIOS al sondaje urinario NO se ha demostrado eficaz en la prevenci\u00f3n de ITU relacionada con la asistencia sanitaria. Adem\u00e1s, promueve la selecci\u00f3n de microorganismos resistentes. Las medidas eficaces son: retirada precoz de la sonda, sistema de drenaje CERRADO, t\u00e9cnica as\u00e9ptica en la inserci\u00f3n.","ai":false,"noShuffle":false,"img":null},{"n":"si9","q":"En qu\u00e9 patr\u00f3n radiol\u00f3gico neum\u00f3nico es caracter\u00edstico el BRONCOGRAMA A\u00c9REO:","o":["Bronconeumon\u00eda","Neumon\u00eda alveolar","Neumon\u00eda intersticial","Neumon\u00eda necrotizante"],"c":2,"e":"El BRONCOGRAMA A\u00c9REO (visualizaci\u00f3n de los bronquios rellenos de aire sobre un fondo de par\u00e9nquima opacificado) es caracter\u00edstico de la NEUMON\u00cdA ALVEOLAR (o lobar). En la neumon\u00eda alveolar, el exudado inflamatorio llena los alv\u00e9olos pero los bronquios permanecen permeables. En la bronconeumon\u00eda el patr\u00f3n es parcheado. En la neumon\u00eda intersticial el patr\u00f3n es de vidrio esmerilado bilateral sin broncograma.","ai":false,"noShuffle":false,"img":null},{"n":"si10","q":"Relaci\u00f3n verdadera entre pat\u00f3geno y fuente de exposici\u00f3n en neumon\u00edas:","o":["Aparatos de refrigeraci\u00f3n a Legionella pneumophila","Ahogamiento en agua dulce a Streptococcus pneumoniae","Exposici\u00f3n a ganado a Haemophilus influenzae","Diabetes a Pseudomonas aeruginosa"],"c":1,"e":"CORRECTA: Legionella pneumophila se asocia a sistemas de agua y climatizaci\u00f3n (torres de refrigeraci\u00f3n, conducciones de agua caliente, jacuzzis). Otras asociaciones: Coxiella burnetii a ganado ovino (partos); Pseudomonas a inmunodeprimidos, ventilaci\u00f3n mec\u00e1nica, EPOC. La Legionella causa brotes epid\u00e9micos en hoteles, hospitales y centros de trabajo.","ai":false,"noShuffle":false,"img":null},{"n":"si11","q":"Se\u00f1ale la FALSA: Pneumocystis jirovecii produce neumon\u00eda de patr\u00f3n alveolar.","o":["Esta afirmaci\u00f3n es FALSA: PCP produce patr\u00f3n intersticial/en vidrio esmerilado bilateral","Esta afirmaci\u00f3n es VERDADERA: PCP puede producir consolidaci\u00f3n alveolar t\u00edpica","Esta afirmaci\u00f3n es VERDADERA: PCP produce condensaci\u00f3n lobar cl\u00e1sica","Esta afirmaci\u00f3n es VERDADERA: PCP puede confundirse con una neumon\u00eda bacteriana lobar"],"c":1,"e":"FALSA: Pneumocystis jirovecii produce NEUMON\u00cdA INTERSTICIAL (no alveolar), con patr\u00f3n en VIDRIO ESMERILADO bilateral y perihiliar en la TC/Rx de t\u00f3rax. Es caracter\u00edstica la imagen en alas de mariposa. La neumon\u00eda alveolar (consolidaci\u00f3n, broncograma a\u00e9reo) es caracter\u00edstica de bacterias como S. pneumoniae. La PCP es la infecci\u00f3n oportunista m\u00e1s frecuente en pacientes con VIH y CD4 menor de 200 cel/uL.","ai":false,"noShuffle":false,"img":null},{"n":"si12","q":"Las 5 rutas a trav\u00e9s de las cuales los g\u00e9rmenes penetran en la articulaci\u00f3n y pueden provocar artritis s\u00e9ptica son:","o":["Diseminaci\u00f3n hemat\u00f3gena, osteomielitis, por propagaci\u00f3n, tras procedimientos terap\u00e9uticos, por inoculaci\u00f3n directa","Diseminaci\u00f3n linf\u00e1tica, osteomielitis, por propagaci\u00f3n, tras procedimientos terap\u00e9uticos, por inoculaci\u00f3n directa","Diseminaci\u00f3n hemat\u00f3gena, cistitis, por propagaci\u00f3n, tras procedimientos terap\u00e9uticos, por inoculaci\u00f3n directa","Diseminaci\u00f3n linf\u00e1tica, osteomielitis, por propagaci\u00f3n, tras procedimientos terap\u00e9uticos, por inoculaci\u00f3n de vacunas"],"c":1,"e":"Las 5 rutas de entrada de g\u00e9rmenes en la articulaci\u00f3n son: (1) DISEMINACI\u00d3N HEMAT\u00d3GENA (la m\u00e1s frecuente), (2) EXTENSI\u00d3N DESDE OSTEOMIELITIS adyacente, (3) PROPAGACI\u00d3N POR CONTIG\u00dcIDAD desde tejidos blandos periarticulares, (4) TRAS PROCEDIMIENTOS TERAP\u00c9UTICOS (artrocentesis, infiltraciones, artroscopia, pr\u00f3tesis) y (5) INOCULACI\u00d3N DIRECTA (traumatismo penetrante, mordedura). La diseminaci\u00f3n linf\u00e1tica no es una ruta reconocida.","ai":false,"noShuffle":false,"img":null},{"n":"si13","q":"La artritis s\u00e9ptica no gonoc\u00f3cica: la localizaci\u00f3n m\u00e1s frecuente es:","o":["Hombro","Mu\u00f1eca","Rodilla","Esternoclavicular","Cadera"],"c":3,"e":"La RODILLA es la localizaci\u00f3n m\u00e1s frecuente de la artritis s\u00e9ptica no gonoc\u00f3cica (30-50% de los casos). Le siguen la cadera, el hombro, la mu\u00f1eca y el tobillo. En ADVP son frecuentes la sacroil\u00edaca y esternoclavicular. En neonatos, la cadera es la m\u00e1s afectada. La artritis gonoc\u00f3cica afecta preferentemente articulaciones peque\u00f1as de las manos y mu\u00f1ecas.","ai":false,"noShuffle":false,"img":null},{"n":"si14","q":"Mujer de 58 a\u00f1os con DM2 y gonartrosis derecha. Tras infiltraci\u00f3n con corticoides hace 6 d\u00edas, presenta dolor intenso, inflamaci\u00f3n progresiva, fiebre y derrame articular purulento en la artrocentesis. Cu\u00e1l es la conducta diagn\u00f3stica y terap\u00e9utica m\u00e1s correcta:","o":["Antibioterapia emp\u00edrica IV con cobertura para S. aureus y espec\u00edfica cuando se disponga de cultivo y antibiograma","An\u00e1lisis del l\u00edquido y cultivo. Si confirma artritis s\u00e9ptica realizar drenaje quir\u00fargico y antibioterapia espec\u00edfica","Punci\u00f3n articular guiada por ECO para desbridamiento y antibioterapia local intrarticular","Artrocentesis de repetici\u00f3n hasta lograr la reducci\u00f3n de los s\u00edntomas inflamatorios","Drenaje quir\u00fargico urgente y antibioterapia IV emp\u00edrica hasta disponer del antibiograma"],"c":1,"e":"La artritis s\u00e9ptica es una urgencia m\u00e9dica. La conducta correcta es iniciar ANTIBIOTERAPIA EMP\u00cdRICA IV con cobertura para S. aureus (el germen m\u00e1s frecuente) de forma INMEDIATA, sin esperar al cultivo, combinada con drenaje articular. S. aureus es el agente m\u00e1s frecuente y en el contexto de una infiltraci\u00f3n reciente con corticoides, la sospecha es a\u00fan mayor.","ai":false,"noShuffle":false,"img":null},{"n":"si15","q":"Respecto a la artritis s\u00e9ptica, cu\u00e1l de las siguientes respuestas es CORRECTA:","o":["S. aureus y S. pneumoniae son microorganismos frecuentemente implicados y poco lesivos","La artritis gonoc\u00f3cica es la forma habitualmente m\u00e1s destructiva de la articulaci\u00f3n","La artritis s\u00e9ptica es un proceso infeccioso local de curso habitualmente benigno y con pocas complicaciones","Debemos realizar artrocentesis e iniciar tratamiento antibi\u00f3tico emp\u00edrico ante sospecha cl\u00ednica"],"c":4,"e":"CORRECTA: ante sospecha cl\u00ednica de artritis s\u00e9ptica, la conducta es realizar ARTROCENTESIS (para an\u00e1lisis y cultivo del l\u00edquido sinovial) e iniciar de forma inmediata ANTIBIOTERAPIA EMP\u00cdRICA IV. S. aureus es extremadamente lesivo (destruye el cart\u00edlago articular en horas-d\u00edas). La artritis gonoc\u00f3cica es la MENOS destructiva entre las artritis s\u00e9pticas.","ai":false,"noShuffle":false,"img":null},{"n":"si16","q":"Var\u00f3n de 58 a\u00f1os con pr\u00f3tesis articular en rodilla derecha hace 3 meses. Consulta por dolor intenso, inflamaci\u00f3n y fiebre de 2 d\u00edas. Derrame articular a tensi\u00f3n. Cu\u00e1l es la conducta m\u00e1s correcta:","o":["Inmovilizaci\u00f3n de la articulaci\u00f3n con analgesia y drenajes diarios hasta resoluci\u00f3n","Artrocentesis, hemocultivos e iniciar antibioterapia IV emp\u00edrica para S. aureus con limpieza quir\u00fargica local precoz","Hemocultivos e iniciar antibioterapia emp\u00edrica para Pseudomona sin limpieza quir\u00fargica","Hemocultivos, retirada de pr\u00f3tesis e iniciar antibioterapia IV emp\u00edrica con nueva pr\u00f3tesis tras 12 d\u00edas de ATB"],"c":2,"e":"En la INFECCI\u00d3N PRECOZ de pr\u00f3tesis articular (menos de 3 meses) con pr\u00f3tesis estable: artrocentesis m\u00e1s hemocultivos m\u00e1s antibioterapia IV emp\u00edrica con cobertura de S. aureus m\u00e1s DESBRIDAMIENTO QUIR\u00daRGICO PRECOZ con retenci\u00f3n de la pr\u00f3tesis si es estable (DAIR: Desbridamiento, Antibioterapia, Irrigaci\u00f3n, Retenci\u00f3n). La retirada se reserva para pr\u00f3tesis inestables o fracaso del DAIR.","ai":false,"noShuffle":false,"img":null},{"n":"si17","q":"Uno de los siguientes microorganismos est\u00e1 frecuentemente implicado en los cuadros de artritis s\u00e9ptica de la articulaci\u00f3n sacroil\u00edaca en el paciente ADVP:","o":["Candida albicans","Staphylococcus aureus","Streptococcus pyogenes","Pseudomonas aeruginosa"],"c":2,"e":"STAPHYLOCOCCUS AUREUS es el microorganismo m\u00e1s frecuente en la artritis s\u00e9ptica sacroil\u00edaca del paciente ADVP (aunque Pseudomonas aeruginosa es el segundo m\u00e1s frecuente en este contexto). En los ADVP, las artritis s\u00e9pticas tienen preferencia por articulaciones axiales (sacroil\u00edaca, esternoclavicular).","ai":false,"noShuffle":false,"img":null},{"n":"si18","q":"Se consideran criterios de infecci\u00f3n \u00f3sea prot\u00e9sica todos los siguientes EXCEPTO:","o":["Presencia de f\u00edstulas cut\u00e1neas","Crecimiento de un microorganismo en cultivo del LS o en tejido periprot\u00e9sico","Cualquier cultivo positivo para Brucella spp, Salmonella spp o Mycobacterium tuberculosis","Inflamaci\u00f3n aguda en histopatolog\u00eda de tejido periprot\u00e9sico sin otra causa"],"c":2,"e":"El crecimiento de un microorganismo en UN SOLO cultivo del l\u00edquido sinovial o tejido periprot\u00e9sico puede representar contaminaci\u00f3n de la muestra. Los criterios mayores requieren 2 o m\u00e1s cultivos del mismo microorganismo. La opci\u00f3n B por tanto puede no cumplirse por s\u00ed sola. Esta pregunta puede considerarse impugnada seg\u00fan la versi\u00f3n de los criterios de infecci\u00f3n prot\u00e9sica utilizada.","ai":true,"imp":true,"noShuffle":false,"img":null},{"n":"si19","q":"El diagn\u00f3stico de brucelosis m\u00e1s r\u00e1pido y efectivo se realiza con:","o":["El test Coombs antibrucella","La seroaglutinaci\u00f3n de Wright","Los hemocultivos","El test de Rosa de Bengala"],"c":4,"e":"El TEST DE ROSA DE BENGALA es la prueba de cribado de MAYOR RAPIDEZ para el diagn\u00f3stico de brucelosis: prueba de aglutinaci\u00f3n en portaobjetos que da resultado en minutos, con alta sensibilidad (mayor del 99%) en infecci\u00f3n aguda. Es el test de elecci\u00f3n para cribado inicial. La seroaglutinaci\u00f3n de Wright confirma el diagn\u00f3stico con t\u00edtulos mayor o igual a 1/160.","ai":false,"noShuffle":false,"img":null},{"n":"si20","q":"Se\u00f1ala la causa m\u00e1s frecuente de URETRITIS:","o":["Neisseria gonorrhoeae","Mycoplasma genitalium","Chlamydia trachomatis","Tricomonas vaginalis"],"c":3,"e":"CHLAMYDIA TRACHOMATIS es la causa m\u00e1s frecuente de uretritis NO GONOC\u00d3CICA (UNG), que es a su vez m\u00e1s frecuente que la gonoc\u00f3cica. Causas de UNG en orden de frecuencia: Chlamydia trachomatis (40-50%), Mycoplasma genitalium (15-20%), Ureaplasma urealyticum (10-15%). La uretritis gonoc\u00f3cica (N. gonorrhoeae) es m\u00e1s sintom\u00e1tica pero menos frecuente que la no gonoc\u00f3cica en pa\u00edses desarrollados.","ai":false,"noShuffle":false,"img":null},{"n":"si21","q":"Cu\u00e1l de estas NO se considera una Infecci\u00f3n de Transmisi\u00f3n Sexual (ITS):","o":["Linfogranuloma ven\u00e9reo","Linfogranuloma inguinal (chancroide)","Vaginosis bacteriana","Chancroide"],"c":3,"e":"La VAGINOSIS BACTERIANA no se considera cl\u00e1sicamente una ITS aunque se asocia con la actividad sexual. Es un s\u00edndrome por disbiosis vaginal (predominio de Gardnerella vaginalis y anaerobios sobre Lactobacillus) sin un \u00fanico pat\u00f3geno causante. No se recomienda tratamiento del compa\u00f1ero sexual. Las ITS cl\u00e1sicas incluyen: gonorrea, s\u00edfilis, clamidiasis, linfogranuloma ven\u00e9reo, chancroide, herpes genital, VPH, VIH, tricomoniasis.","ai":false,"noShuffle":false,"img":null},{"n":"si22","q":"Mujer de 34 a\u00f1os con fiebre elevada, cefalea intensa y disminuci\u00f3n del nivel de conciencia de menos de 12h de evoluci\u00f3n. TA 97/56 mmHg, FC 110 lpm, GCS 10/15, T 38,6 grados, estuporosa, rigidez de nuca, signo de Kernig. Ausencia de petequias. Qu\u00e9 tratamiento indicar\u00eda de forma emp\u00edrica:","o":["Cefotaxima, vancomicina, ampicilina y dexametasona","Meropenem, vancomicina y dexametasona","Cefotaxima, vancomicina y dexametasona","Cefotaxima y vancomicina"],"c":3,"e":"Meningitis bacteriana aguda en adulto joven sin factores de riesgo especiales: tratamiento emp\u00edrico = CEFOTAXIMA (o ceftriaxona) + VANCOMICINA + DEXAMETASONA. La cefotaxima cubre S. pneumoniae y N. meningitidis (los m\u00e1s frecuentes). La vancomicina se a\u00f1ade por el riesgo de S. pneumoniae resistente a penicilina. La dexametasona reduce las complicaciones (sordera). La ampicilina solo se a\u00f1ade si hay riesgo de Listeria (mayor de 50 a\u00f1os, inmunodeprimidos, embarazo). Aqu\u00ed no est\u00e1 indicada.","ai":false,"noShuffle":false,"img":null},{"n":"si23","q":"Paciente de 34 a\u00f1os con sospecha de meningitis bacteriana. Cu\u00e1l ser\u00eda la secuencia correcta de procedimientos a realizar:","o":["Hemocultivos, antibi\u00f3tico emp\u00edrico (ceftriaxona), fondo de ojo y punci\u00f3n lumbar","Hemocultivos, fondo de ojo, punci\u00f3n lumbar y antibi\u00f3tico emp\u00edrico con cefotaxima y esteroides","Antibi\u00f3tico emp\u00edrico, TC craneal y punci\u00f3n lumbar","Hemocultivos, antibi\u00f3tico emp\u00edrico (ceftriaxona m\u00e1s vancomicina) y esteroides, fondo de ojo y punci\u00f3n lumbar"],"c":4,"e":"Secuencia correcta: (1) HEMOCULTIVOS, (2) ANTIBI\u00d3TICO EMP\u00cdRICO + DEXAMETASONA inmediatamente (sin esperar la PL), (3) FONDO DE OJO para descartar hipertensi\u00f3n intracraneal antes de la PL, (4) TC craneal si hay datos de HTIC o d\u00e9ficit focal, (5) PUNCI\u00d3N LUMBAR. El antibi\u00f3tico NUNCA debe retrasarse por esperar la PL o el TC.","ai":false,"noShuffle":false,"img":null},{"n":"si24","q":"Cu\u00e1l de estas medidas NO favorece la prevenci\u00f3n de infecci\u00f3n nosocomial de bacterias en cat\u00e9ter (BRC):","o":["Colocar v\u00edas de pocas luces","Colocaci\u00f3n de v\u00eda subclavia","Aportaci\u00f3n de soluciones lip\u00eddicas endovenosas","Lavado de manos antes de colocar la v\u00eda","Uso de medidas barrera antes de colocar la v\u00eda"],"c":3,"e":"La aportaci\u00f3n de SOLUCIONES LIP\u00cdDICAS ENDOVENOSAS (nutrici\u00f3n parenteral con l\u00edpidos) FAVORECE la infecci\u00f3n del cat\u00e9ter: las emulsiones lip\u00eddicas son un excelente medio de cultivo para hongos (especialmente Candida y Malassezia furfur) y bacterias. NO es una medida preventiva. Las medidas que S\u00cd previenen la BRC: pocas luces, v\u00eda subclavia, lavado de manos (la m\u00e1s eficaz), m\u00e1ximas medidas barrera y clorhexidina.","ai":false,"noShuffle":false,"img":null},{"n":"si25","q":"Tratamiento antibi\u00f3tico emp\u00edrico en paciente con bacteriemia relacionada con cat\u00e9ter (BRC) y estabilidad hemodin\u00e1mica:","o":["Vancomicina y gentamicina","Penicilina G y cloxacilina","Daptomicina y cefepima","Fluconazol y vancomicina"],"c":3,"e":"El tratamiento emp\u00edrico de la BRC en paciente estable es DAPTOMICINA + CEFEPIMA: la daptomicina cubre grampositivos (incluyendo S. coagulasa-negativo y SARM, los agentes m\u00e1s frecuentes de BRC), y la cefepima cubre gramnegativos (incluyendo Pseudomona). La vancomicina es alternativa a la daptomicina para gram positivos.","ai":false,"noShuffle":false,"img":null},{"n":"si26","q":"La etiolog\u00eda m\u00e1s frecuente en la bacteriemia relacionada con los cat\u00e9teres (BRC) es:","o":["Pseudomonas aeruginosa","Staphylococcus coagulasa-negativos (SCN)","Enterococcus","Estreptococos"],"c":2,"e":"Los ESTAFILOCOCOS COAGULASA-NEGATIVOS (S. epidermidis principalmente) son la causa m\u00e1s frecuente de BRC (30-40% de los casos). Le siguen: S. aureus (el m\u00e1s grave, con alta mortalidad), Candida spp, gramnegativos. Los SCN forman biofilm sobre el cat\u00e9ter y son resistentes a muchos antibi\u00f3ticos.","ai":false,"noShuffle":false,"img":null},{"n":"si27","q":"Paciente de 65 a\u00f1os ingresado por ictus, cat\u00e9ter venoso perif\u00e9rico. A las 48h desarrolla fiebre 38,5 grados y signos flog\u00f3ticos con supuraci\u00f3n franca en el punto de inserci\u00f3n del cat\u00e9ter. Tras obtener hemocultivos, qu\u00e9 har\u00eda a continuaci\u00f3n:","o":["Retirar\u00eda el cat\u00e9ter e iniciar\u00eda de forma emp\u00edrica vancomicina","Mantendr\u00eda el cat\u00e9ter ya que no presenta repercusi\u00f3n hemodin\u00e1mica e iniciar\u00eda cloxacilina","Retirar\u00eda el cat\u00e9ter y esperar\u00eda al resultado de los hemocultivos antes de iniciar ATB","Retirar\u00eda el cat\u00e9ter e iniciar\u00eda de forma emp\u00edrica Linezolid"],"c":1,"e":"La conducta correcta es: RETIRADA INMEDIATA DEL CAT\u00c9TER (especialmente con signos locales de infecci\u00f3n como la supuraci\u00f3n franca) + inicio de VANCOMICINA EMP\u00cdRICA (cobertura de S. coagulasa-negativos y SARM, los agentes m\u00e1s frecuentes de infecci\u00f3n de cat\u00e9ter perif\u00e9rico). No se debe esperar al cultivo cuando hay signos claros de infecci\u00f3n del cat\u00e9ter.","ai":false,"noShuffle":false,"img":null},{"n":"si28","q":"Cu\u00e1l de las siguientes NO es una indicaci\u00f3n en s\u00ed misma de cirug\u00eda en un paciente con endocarditis:","o":["Desarrollo de un absceso intramioc\u00e1rdico con bloqueo aur\u00edculo-ventricular asociado","Desarrollo de insuficiencia card\u00edaca aguda por rotura valvular","Endocarditis sobre v\u00e1lvula nativa por Aggregatibacter actinomycetemcomitans","Persistencia de hemocultivos positivos tras 7 d\u00edas de tratamiento antibi\u00f3tico correcto"],"c":3,"e":"La endocarditis por AGGREGATIBACTER ACTINOMYCETEMCOMITANS (organismo HACEK) generalmente responde bien al tratamiento antibi\u00f3tico (ceftriaxona o amoxicilina-clavul\u00e1nico) sin necesidad de cirug\u00eda en la mayor\u00eda de los casos. No es una indicaci\u00f3n quir\u00fargica por s\u00ed misma. Las otras opciones S\u00cd son indicaciones quir\u00fargicas: absceso perianular con BAV (indica extensi\u00f3n de la infecci\u00f3n), IC aguda por rotura valvular (emergencia) y hemocultivos positivos persistentes.","ai":false,"noShuffle":false,"img":null},{"n":"si29","q":"En relaci\u00f3n con la epidemiolog\u00eda de la endocarditis infecciosa, se\u00f1ale la asociaci\u00f3n INCORRECTA:","o":["Enterococo es la causa m\u00e1s frecuente en relaci\u00f3n a manipulaciones genitourinarias","S. gallolyticus causa m\u00e1s frecuente relacionada con el c\u00e1ncer de colon","Staphylococcus aureus: causa m\u00e1s frecuente en v\u00e1lvula nativa","Staphylococcus aureus: causa m\u00e1s frecuente en v\u00e1lvula prot\u00e9sica precoz (menos de 2 meses)"],"c":4,"e":"INCORRECTA: la causa m\u00e1s frecuente de endocarditis sobre V\u00c1LVULA PROT\u00c9SICA PRECOZ (menos de 2 meses) NO es S. aureus sino S. EPIDERMIDIS (y otros SCN). Los SCN contaminan la pr\u00f3tesis durante la cirug\u00eda card\u00edaca y forman biofilm. S. aureus es la causa m\u00e1s frecuente en v\u00e1lvula nativa. En la v\u00e1lvula prot\u00e9sica tard\u00eda (m\u00e1s de 12 meses), el espectro se asemeja a la v\u00e1lvula nativa.","ai":false,"noShuffle":false,"img":null},{"n":"si30","q":"Var\u00f3n de 84 a\u00f1os con marcapasos bicameral, mal estado general de varios d\u00edas y sensaci\u00f3n dist\u00e9rmica. En la exploraci\u00f3n f\u00edsica destacan lesiones ungueales (hemorragias en astilla). Qu\u00e9 sospecha cl\u00ednica y exploraciones solicitar\u00edas:","o":["S\u00edndrome paraneopl\u00e1sico. PET-TAC","Onicomicosis. Biopsia ungueal","Endocarditis. Hemocultivos","Melanoma. Biopsia de la lesi\u00f3n"],"c":3,"e":"Las HEMORRAGIAS EN ASTILLA subungueales son uno de los signos perif\u00e9ricos cl\u00e1sicos de la ENDOCARDITIS INFECCIOSA (junto con los n\u00f3dulos de Osler, manchas de Janeway, manchas de Roth, petequias conjuntivales). En un paciente con marcapasos (factor de riesgo de infecci\u00f3n de dispositivo card\u00edaco), mal estado general y fiebre, la endocarditis es la primera sospecha. Los HEMOCULTIVOS son la exploraci\u00f3n m\u00e1s importante y deben extraerse ANTES del antibi\u00f3tico.","ai":false,"noShuffle":false,"img":null},{"n":"si31","q":"La endocarditis del paciente ADVP: entre sus caracter\u00edsticas particulares, todas figuran EXCEPTO:","o":["Ausencia de insuficiencia card\u00edaca","Implicaci\u00f3n frecuente de Staphylococcus aureus meticil\u00edn-resistente (SARM)","Excepcional necesidad de tratamiento quir\u00fargico","Posibilidad de limitar la duraci\u00f3n de tratamiento antibi\u00f3tico a 2 semanas"],"c":2,"e":"La endocarditis sobre v\u00e1lvula TRIC\u00daSPIDE en ADVP se caracteriza por: afecta al coraz\u00f3n derecho, causa embolia PULMONAR (no sist\u00e9mica), AUSENCIA de IC (el VD compensa), excepcional necesidad de cirug\u00eda, y puede tratarse con pautas cortas (2 semanas con beta-lact\u00e1mico si S. aureus sensible a meticilina). El agente m\u00e1s frecuente es S. aureus pero habitualmente SENSIBLE a meticilina (SASM), NO SARM.","ai":false,"noShuffle":false,"img":null},{"n":"si32","q":"Respecto a las infecciones relacionadas con la asistencia sanitaria, se\u00f1ale la FALSA:","o":["El principal factor de riesgo de infecci\u00f3n nosocomial quir\u00fargica es el grado de contaminaci\u00f3n durante el procedimiento","La aparici\u00f3n de sistemas urinarios cerrados ha AUMENTADO las infecciones urinarias nosocomiales","Es la que adquiere el enfermo durante su estancia en el hospital aunque los s\u00edntomas aparezcan en su domicilio tras 7 d\u00edas del alta","El lavado de manos en los 5 pasos conocidos previene la infecci\u00f3n nosocomial"],"c":2,"e":"FALSA: los sistemas de drenaje urinario CERRADOS han REDUCIDO significativamente las infecciones urinarias nosocomiales (hasta un 50% de reducci\u00f3n). Con sistemas abiertos, casi el 100% de los pacientes con sonda desarrollaban bacteriuria en 30 d\u00edas. Con sistema cerrado se reduce dr\u00e1sticamente la incidencia.","ai":false,"noShuffle":false,"img":null},{"n":"si33","q":"Respecto a las pautas de antibi\u00f3ticos en profilaxis quir\u00fargica, se\u00f1ale la FALSA:","o":["Se aconseja repetir la dosis si la duraci\u00f3n de la intervenci\u00f3n es MENOR que la vida media del antimicrobiano","La primera dosis se recomienda administrarla en las 2 horas antes de la intervenci\u00f3n","Se aconseja repetir dosis si hay sangrado importante en la i la extubaci\u00f3n","No, porque no se identific\u00f3 el agente infeccioso","No, porque la neumon\u00eda fue diagnosticada m\u00e1s de 48h tras el alta hospitalaria","S\u00ed, porque la infecci\u00f3n ocurri\u00f3 dentro de las 48h tras el alta hospitalaria"],"c":5,"e":"S\u00cd es una neumon\u00eda asociada a la asistencia sanitaria (NAAS/HCAP). La definici\u00f3n incluye la infecci\u00f3n que se inicia en las 48h POSTERIORES AL ALTA hospitalaria. El paciente fue dado de alta el 18/3 y los s\u00edntomas comenzaron el 19/3 (dentro de las 48h post-alta), por lo que es una NAAS. Tambi\u00e9n incluye pacientes hospitalizados m\u00e1s de 2 d\u00edas en los 90 d\u00edas previos.","ai":false,"noShuffle":false,"img":null},{"n":"si36","q":"Respecto a la toma de hemocultivos en una sospecha de sepsis grave, cu\u00e1l ser\u00eda la actitud M\u00c1S CORRECTA:","o":["Se deben extraer los hemocultivos ANTES de iniciar el tratamiento antibi\u00f3tico","Los hemocultivos se han de extraer coincidiendo con la fiebre","Se deben extraer los hemocultivos antes de iniciar el tratamiento antit\u00e9rmico","Los hemocultivos no son \u00fatiles en casos con inmunogenicidad antig\u00e9nica alterada"],"c":1,"e":"Los hemocultivos SIEMPRE deben extraerse ANTES de iniciar la antibioterapia. Extraer los hemocultivos primero no retrasa significativamente el tratamiento (2-3 minutos). Se recomienda extraer 2-3 sets de venas diferentes para aumentar la sensibilidad. No es necesario esperar al pico febril: los hemocultivos pueden extraerse en cualquier momento de la bacteriemia.","ai":false,"noShuffle":false,"img":null},{"n":"si37","q":"Mujer con leucemia mieloide aguda, neutr\u00f3filos 290 cel/uL, cat\u00e9ter venoso central, en profilaxis con ciprofloxacino. Fiebre 38,7 grados sin focalidad aparente. Mucositis importante. Qu\u00e9 actitud seguir\u00eda tras extraer hemocultivos:","o":["Iniciar\u00eda amoxicilina/clavul\u00e1nico de forma emp\u00edrica","Iniciar\u00eda piperacilina/tazobactam de forma emp\u00edrica","Iniciar\u00eda cefepime y vancomicina de forma emp\u00edrica","Esperar\u00eda el resultado de los hemocultivos ya que est\u00e1 hemodin\u00e1micamente estable"],"c":3,"e":"NEUTROPENIA FEBRIL con cat\u00e9ter venoso central y mucositis: tratamiento emp\u00edrico = CEFEPIME (cobertura de gramnegativos incluyendo Pseudomona) + VANCOMICINA (cobertura de grampositivos: cat\u00e9ter central m\u00e1s mucositis con riesgo de estreptococos viridans, especialmente con profilaxis previa con ciprofloxacino que puede seleccionar organismos resistentes). NO se debe esperar al cultivo en neutropenia febril.","ai":false,"noShuffle":false,"img":null},{"n":"si38","q":"Cu\u00e1l es el pat\u00f3geno involucrado m\u00e1s frecuentemente en las diarreas del viajero:","o":["Salmonella","Campylobacter","Escherichia coli","Giardia lamblia"],"c":3,"e":"ESCHERICHIA COLI enterotoxig\u00e9nico (ETEC) es la causa m\u00e1s frecuente de diarrea del viajero (30-70% de los casos), seguido de Campylobacter jejuni y Salmonella. El ETEC produce toxinas (LT y ST) que causan diarrea acuosa sin sangre en las primeras 1-2 semanas del viaje. El tratamiento es azitromicina o rifaximina m\u00e1s hidrataci\u00f3n.","ai":false,"noShuffle":false,"img":null},{"n":"si39","q":"La infecci\u00f3n m\u00e1s habitual del viajero al tr\u00f3pico es:","o":["Dengue","Diarrea del viajero","Neumon\u00eda","Malaria"],"c":2,"e":"La DIARREA DEL VIAJERO es la infecci\u00f3n m\u00e1s frecuente en viajeros al tr\u00f3pico: afecta al 20-50% de los viajeros a pa\u00edses en v\u00edas de desarrollo. El agente m\u00e1s frecuente es E. coli enterotoxig\u00e9nico (ETEC). La malaria y el dengue son las causas de fiebre m\u00e1s importantes en el viajero, pero la diarrea es la infecci\u00f3n m\u00e1s FRECUENTE en t\u00e9rminos absolutos.","ai":false,"noShuffle":false,"img":null}]};
var IMGS=/*__IMGS_JSON__*/{};

/* ── Estado ── */
var canSave=typeof localStorage!=='undefined';
var saved={};try{saved=JSON.parse(localStorage.getItem(KEY)||'null')||{};}catch(e){}
var state   =saved.state   ||{};
var qOrd    =saved.qOrd    ||{};
var oOrd    =saved.oOrd    ||{};
var starred =saved.starred ||{};
var failHist=saved.failHist||{};  // {qid: count} entre sesiones
var darkMode=saved.dark    ||false;
var timerSec=saved.timerSec||0;   // segundos configurados
var SECS=Object.keys(META.secciones||{});
var fFailed={};
var qIdx={};           // {sec: {n: q}}
var qNums={};          // {sec: {n: numero_correlativo}}
var allOrder=null;     // orden mezclado inter-secciones para pestaña Todos
var activeCid=null;
var currentTab='all';
var currentMode='test';

var starsFilter=false;
var statsVisible=false;

var timerRemaining=timerSec;

/* ── INIT ── */
(function init(){
  SECS.forEach(function(s){fFailed[s]=false;});
  injectSecCSS();
  buildHeader();
  buildTabs();
  buildPanels();
  buildIdx();
  buildNums();
  buildAllOrder();
  SECS.forEach(render);
  renderAll();
  updateScores();
  updateProg();
  applyTheme();
  initTimer();
  setBadge(canSave?'Guardado':'Sin guardado',canSave?'ok':'warn');
  document.addEventListener('keydown',handleKey);
  var si=document.getElementById('search-input');
  if(si)si.addEventListener('keydown',function(e){if(e.key==='Escape'){clearSearch();}});
})();

/* ── CSS dinámico ── */
function injectSecCSS(){
  var css='';
  SECS.forEach(function(s){
    var m=META.secciones[s]||{};
    var c=m.color||'#1a56db',cd=m.colorDim||'#e8f0fe';
    css+='.tab.t-'+s+'.on{background:'+cd+';color:'+c+';border-color:'+c+'}\n';
    css+='.ph.s-'+s+'{border-left:4px solid '+c+'}\n';
    // Variables CSS por sección para el badge coloreado
    css+='#panel-'+s+' .qnum.sec-colored{background:'+cd+';color:'+c+'}\n';
  });
  var st=document.createElement('style');st.textContent=css;document.head.appendChild(st);
}

/* ── Header ── */
function buildHeader(){
  var total=SECS.reduce(function(a,s){return a+(D[s]?D[s].length:0);},0);
  var t=document.getElementById('h-tit');if(t)t.textContent=META.titulo||'Banco MIR';
  var pt=document.getElementById('page-title');if(pt)pt.textContent=META.titulo||'Banco MIR';
  var m=document.getElementById('h-meta');
  if(m){var p=[];if(total)p.push(total+' preguntas');if(META.examen)p.push(META.examen);m.textContent=p.join(' · ');}
  var d=document.getElementById('ph-gdesc');if(d)d.textContent=META.subtitulo||'';
  var r=document.getElementById('sc-rem-all');if(r)r.textContent='○ '+total;
}

/* ── Tabs ── */
function buildTabs(){
  var total=SECS.reduce(function(a,s){return a+(D[s]?D[s].length:0);},0);
  var h='<button class="tab t-all on" onclick="showTab(\'all\')">📋 Todos ('+total+')</button>';
  SECS.forEach(function(s){
    var m=META.secciones[s]||{},cnt=D[s]?D[s].length:0;
    h+='<button class="tab t-'+s+'" onclick="showTab(\''+s+'\')">'+(m.emoji?m.emoji+' ':'')+escH(m.label||s)+' ('+cnt+')</button>';
  });
  var w=document.getElementById('tabs-wrap');if(w)w.innerHTML=h;
}

  SECS.forEach(function(s){

    h+='<div class="score-row">';

    h+='<span class="sc ko" id="sc-ko-'+s+'">✗ 0</span>';

    h+='</div></div>';
    h+='<button class="fbtn" id="fb-'+s+'" onclick="toggleFail(\''+s+'\')">Solo falladas</button>';

    h+='</div>';
    h+='<div class="nota-box" id="nota-'+s+'"></div>';
    h+='</div>';
  });
  var pw=document.getElementById('panels-wrap');if(pw)pw.innerHTML=h;
}

/* ── Índice O(1) + numeración fija ── */
function buildIdx(){
  SECS.forEach(function(s){
    qIdx[s]={};
    if(D[s])D[s].forEach(function(q){qIdx[s][q.n]=q;});
  });
}
function buildNums(){
  // Numeración correlativa fija: 1, 2, 3... por sección
  SECS.forEach(function(s){
    qNums[s]={};
    if(D[s])D[s].forEach(function(q,i){qNums[s][q.n]=i+1;});
  });
}
function getNum(sec,n){return qNums[sec]?qNums[sec][n]||n:n;}
function findQ(qid){
  var d=qid.indexOf('-'),s=qid.substring(0,d),n=qid.substring(d+1);
  return(qIdx[s]&&qIdx[s][n])||null;
}
function getSecFromQid(qid){return qid.substring(0,qid.indexOf('-'));}
function getNFromQid(qid){return qid.substring(qid.indexOf('-')+1);}

/* ── Orden inter-secciones para Todos ── */
function buildAllOrder(){
  var all=[];
  SECS.forEach(function(s){if(D[s])D[s].forEach(function(q){all.push({sec:s,n:q.n});});});
  if(!qOrd['__all__'])qOrd['__all__']=shuffle(all.map(function(x){return x.sec+'|'+x.n;}));
  allOrder=qOrd['__all__'].map(function(key){
    var p=key.indexOf('|'),sec=key.substring(0,p),n=key.substring(p+1);
    return{sec:sec,n:n,q:qIdx[sec]&&qIdx[sec][n]};
  }).filter(function(x){return x.q;});
}

/* ── Utilidades ── */
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function getQOrd(s,qs){if(!qOrd[s])qOrd[s]=shuffle(qs.map(function(q){return q.n;}));return qOrd[s];}
function getOOrd(qid){
  var q=findQ(qid);var n=q&&q.o?q.o.length:4;
  if(q&&q.noShuffle){var a=[];for(var i=0;i<n;i++)a.push(i);return a;}
  if(!oOrd[qid]){var a=[];for(var i=0;i<n;i++)a.push(i);oOrd[qid]=shuffle(a);}
  return oOrd[qid];
}
function imgHtml(key){
  if(!IMGS[key]){console.warn('IMGS: clave no encontrada →',key);return'';}
  return'<div class="clinimg-wrap"><img src="'+IMGS[key]+'" class="clinimg" alt="Imagen clínica" loading="lazy"><div class="clinimg-cap">Imagen clínica</div></div>';
}

/* ── localStorage debounce ── */
function saveLocal(){
  if(!canSave)return;
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    try{
      localStorage.setItem(KEY,JSON.stringify({state:state,qOrd:qOrd,oOrd:oOrd,starred:starred,failHist:failHist,dark:darkMode,timerSec:timerSec}));
      setBadge('Guardado','ok');
    }catch(e){setBadge('Sin guardado','warn');}
  },300);
}
function setBadge(t,c){var b=document.getElementById('save-badge');if(b){b.textContent=t;b.className='sbadge '+c;}}

/* ── Construcción de tarjeta ── */
function buildCard(q,sec,inAll,allPos){
  var qid=sec+'-'+q.n;
  var cid=(inAll?'A-':'S-')+qid;
  var num=inAll?(allPos+1):getNum(sec,q.n);
  var oo=getOOrd(qid);
  var sOpts=oo.map(function(i){return q.o[i];});
  var nc=oo.indexOf(q.c-1)+1;
  var ans=state[qid];
  var cc=ans?(ans.r?' answered-ok':' answered-wrong'):'';
  var badgeCls='qnum'+(inAll?'':' sec-colored');
  var h='<div class="qcard s-'+sec+cc+'" id="card-'+cid+'">';
  h+='<div class="qhead" id="h-'+cid+'" data-cid="'+cid+'" data-qid="'+qid+'" data-sec="'+sec+'" onclick="tog(this.dataset.cid)">';
  h+='<span class="'+badgeCls+'">'+num+'</span>';
  h+='<span class="qtxt">'+q.q+(ans?'<span class="atag '+(ans.r?'ok':'ko')+'">'+(ans.r?'✓ acertada':'✗ fallada')+'</span>':'')+'</span>';
  h+='<button class="star-btn'+(starred[qid]?' on':'')+'\" id="star-'+cid+'" onclick="event.stopPropagation();toggleStar(\''+qid+'\')" title="Marcar (S)"><span class="si">\u2606</span><span class="sf">\u2605</span></button>';
  h+='<span class="chev">▾</span>';
  h+='</div>';
  h+='<div class="qbody" id="b-'+cid+'">';
  if(q.img)h+=imgHtml(q.img);
  if(currentMode==='quick'){
    h+='<div class="quick-card"><div class="quick-rc">✓ Respuesta correcta: opción '+nc+' — '+escH(q.o[q.c-1])+'</div><div class="expbox">'+q.e+'</div></div>';
  } else {
    h+='<ul class="opts" id="opts-'+cid+'">';
    h+=sOpts.map(function(o,i){
      var p=i+1,oc='opt';
      if(ans){oc+=' done';if(p===nc)oc+=' correct';else if(p===ans.c&&!ans.r)oc+=' wrong';}
      return'<li class="'+oc+'" data-qid="'+qid+'" data-pos="'+p+'" data-sec="'+sec+'" onclick="answer(this.dataset.qid,+this.dataset.pos,this.dataset.sec)"><span class="onum">'+p+'.</span><span>'+o+'</span></li>';
    }).join('');
    h+='</ul>';
    if(ans){h+='<div class="expbox"><span class="et">'+(ans.r?'✓ Correcto':'✗ Incorrecto — Respuesta correcta: opción '+nc)+'</span>'+q.e+'</div>';}
  }
  h+='</div></div>';
  return h;
}

/* ── Render sección ── */
function render(sec){
  var qs=D[sec];if(!qs)return;
  var ord=getQOrd(sec,qs);
  var sorted=ord.map(function(n){return qIdx[sec]&&qIdx[sec][n];}).filter(Boolean);
  var el=document.getElementById('qs-'+sec);
  if(el)el.innerHTML=sorted.map(function(q){return buildCard(q,sec,false,0);}).join('');
}

/* ── Render Todos (mezcla inter-secciones) ── */
function renderAll(){
  if(!allOrder)buildAllOrder();
  var el=document.getElementById('qs-all');
  if(el)el.innerHTML=allOrder.map(function(x,i){return buildCard(x.q,x.sec,true,i);}).join('');
}

/* ── Toggle open/close ── */
function tog(cid){
  var b=document.getElementById('b-'+cid),h=document.getElementById('h-'+cid);
  if(!b||!h)return;
  var opening=!b.classList.contains('open');
  b.classList.toggle('open');h.classList.toggle('open');
  if(opening){
    if(activeCid&&activeCid!==cid){var pc=document.getElementById('card-'+activeCid);if(pc)pc.classList.remove('kb-focus');}
    activeCid=cid;
    var card=document.getElementById('card-'+cid);if(card)card.classList.add('kb-focus');
  }else{
    if(activeCid===cid){activeCid=null;var card=document.getElementById('card-'+cid);if(card)card.classList.remove('kb-focus');}
  }
}

/* ── Responder ── */
function answer(qid,pos,sec){
  if(state[qid])return;
  var q=findQ(qid);if(!q)return;
  var oo=getOOrd(qid);
  var nc=oo.indexOf(q.c-1)+1;
  var isRight=pos===nc;
  state[qid]={c:pos,r:isRight};
  // Registro de errores
  if(!isRight){failHist[qid]=(failHist[qid]||0)+1;}
  saveLocal();
  // Actualizar todas las instancias del card (panel sección + panel all)
  // Actualizar opciones en todas las instancias del card
  ['A-'+qid,'S-'+qid].forEach(function(cid){
    var optsEl=document.querySelectorAll('#opts-'+cid+' .opt');
    optsEl.forEach(function(el,i){
      el.classList.add('done');
      if(i+1===nc)el.classList.add('correct');
      else if(i+1===pos&&!isRight)el.classList.add('wrong');
    });
    var bdy=document.getElementById('b-'+cid);
    if(bdy){
      var eb=bdy.querySelector('.expbox');
      if(!eb){eb=document.createElement('div');eb.className='expbox';bdy.appendChild(eb);}
      eb.innerHTML='<span class="et">'+(isRight?'✓ Correcto':'✗ Incorrecto — Respuesta correcta: opción '+nc)+'</span>'+q.e;
    }
    var hd=document.getElementById('h-'+cid);
    if(hd){var qt=hd.querySelector('.qtxt');if(qt&&!qt.querySelector('.atag')){var at=document.createElement('span');at.className='atag '+(isRight?'ok':'ko');at.innerHTML=isRight?'✓ acertada':'✗ fallada';qt.appendChild(at);}}
    var card=document.getElementById('card-'+cid);
    if(card)card.classList.add(isRight?'answered-ok':'answered-wrong');
  });
  updateScores();updateProg();
  if(fFailed[sec]&&isRight){
    var fcard=document.getElementById('card-S-'+qid);
    if(fcard)fcard.style.display='none';
    refreshNF(sec);
  }
}

/* ── Estrella ── */
function toggleStar(qid){
  starred[qid]=!starred[qid];
  ['A-'+qid,'S-'+qid].forEach(function(cid){
    var btn=document.getElementById('star-'+cid);
    if(btn)btn.classList.toggle('on',starred[qid]);
  });
  saveLocal();
}
function filterStarred(){
  starsFilter=!starsFilter;
  var btn=document.getElementById('btn-stars');
  if(btn){btn.style.background=starsFilter?'#fef3c7':'';btn.style.fontWeight=starsFilter?'700':'';}
  document.querySelectorAll('.qcard').forEach(function(card){
    if(starsFilter){
      var hd=card.querySelector('.qhead');
      var qid=hd?hd.dataset.qid:'';
      card.style.display=starred[qid]?'':'none';
    }else{card.style.display='';}
  });
}

/* ── Filtro falladas ── */
function refreshNF(sec){
  var c=document.getElementById('qs-'+sec);if(!c||!fFailed[sec])return;
  var n=c.querySelectorAll('.qcard.answered-wrong').length;
  var m=document.getElementById('nf-'+sec);if(m)m.classList.toggle('show',n===0);
}
function toggleFail(sec){
  fFailed[sec]=!fFailed[sec];
  var btn=document.getElementById('fb-'+sec);
  if(btn){btn.classList.toggle('on',fFailed[sec]);btn.textContent=fFailed[sec]?'← Ver todas':'Solo falladas';}
  var c=document.getElementById('qs-'+sec);if(!c)return;
  var nf=0;
  c.querySelectorAll('.qcard').forEach(function(card){
    if(fFailed[sec]){var show=card.classList.contains('answered-wrong');card.style.display=show?'':'none';if(show)nf++;}
    else{card.style.display='';}
  });
  var m=document.getElementById('nf-'+sec);if(m)m.classList.toggle('show',fFailed[sec]&&nf===0);
}

/* ── Scores y progreso ── */
function updateScores(){
  var tok=0,tok2=0,tok3=0;
  SECS.forEach(function(sec){
    var ok=0,ko=0;
    if(D[sec])D[sec].forEach(function(q){var a=state[sec+'-'+q.n];if(a){if(a.r)ok++;else ko++;}});
    var tot=D[sec]?D[sec].length:0,rem=tot-ok-ko;
    tok+=ok;tok2+=ko;tok3+=rem;
    var eok=document.getElementById('sc-ok-'+sec),eko=document.getElementById('sc-ko-'+sec),erm=document.getElementById('sc-rem-'+sec);
    if(eok)eok.textContent='✓ '+ok;if(eko)eko.textContent='✗ '+ko;if(erm)erm.textContent='○ '+rem;
  });
  var eok=document.getElementById('sc-ok-all'),eko=document.getElementById('sc-ko-all'),erm=document.getElementById('sc-rem-all');
  if(eok)eok.textContent='✓ '+tok;if(eko)eko.textContent='✗ '+tok2;if(erm)erm.textContent='○ '+tok3;
}
function updateProg(){
  var total=0,done=Object.keys(state).length;
  SECS.forEach(function(s){if(D[s])total+=D[s].length;});
  var pct=total>0?Math.round(done/total*100):0;
  var bar=document.getElementById('prog-bar');if(bar)bar.style.width=pct+'%';
}

/* ── Tabs ── */
function showTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  var tb=document.querySelector('.tab.t-'+t);if(tb)tb.classList.add('on');
  var mc=document.getElementById('main-cont');if(mc)mc.setAttribute('data-tab',t);
  var panelAll=document.getElementById('panel-all');
  if(panelAll)panelAll.classList.toggle('visible',t==='all');
  SECS.forEach(function(s){
    var p=document.getElementById('panel-'+s);
    if(p)p.classList.toggle('visible',t===s);
  });
  var gnb=document.getElementById('nota-all');if(gnb){gnb.style.display='none';gnb.className='global-nota-box';}
  clearSearch();
}

/* ── Reset ── */
function resetSec(sec){
  if(D[sec])D[sec].forEach(function(q){var qid=sec+'-'+q.n;delete state[qid];delete oOrd[qid];});
  delete qOrd[sec];fFailed[sec]=false;activeCid=null;
  var btn=document.getElementById('fb-'+sec);if(btn){btn.classList.remove('on');btn.textContent='Solo falladas';}
  var nb=document.getElementById('nota-'+sec);if(nb){nb.style.display='none';nb.className='nota-box';}
  saveLocal();render(sec);
  var m=document.getElementById('nf-'+sec);if(m)m.classList.remove('show');
  updateScores();updateProg();
  // Reconstruir panel all para reflejar cambios
  buildAllOrder();renderAll();
}
function resetAll(){
  Object.keys(state).forEach(function(k){delete state[k];});
  Object.keys(oOrd).forEach(function(k){delete oOrd[k];});
  Object.keys(qOrd).forEach(function(k){delete qOrd[k];});
  activeCid=null;starsFilter=false;allOrder=null;
  var bs=document.getElementById('btn-stars');if(bs){bs.style.background='';bs.style.fontWeight='';}
  SECS.forEach(function(s){
    fFailed[s]=false;
    var btn=document.getElementById('fb-'+s);if(btn){btn.classList.remove('on');btn.textContent='Solo falladas';}
    var nb=document.getElementById('nota-'+s);if(nb){nb.style.display='none';nb.className='nota-box';}
  });
  saveLocal();
  SECS.forEach(render);
  buildAllOrder();renderAll();
  var gnb=document.getElementById('nota-all');if(gnb){gnb.style.display='none';gnb.className='global-nota-box';}
  updateScores();updateProg();
}

/* ── Nota y revisión ── */
function buildRevList(sec){
  var qs=D[sec];if(!qs)return'';
  var failed=qs.filter(function(q){var a=state[sec+'-'+q.n];return a&&!a.r;});
  if(!failed.length)return'';
  var html='<div class="review-list"><div class="review-title">📋 '+failed.length+' pregunta'+(failed.length>1?'s':'')+' fallada'+(failed.length>1?'s':'')+' — repasa aquí:</div>';
  failed.forEach(function(q){
    var qid=sec+'-'+q.n;var oo=getOOrd(qid);var nc=oo.indexOf(q.c-1)+1;
    html+='<details class="review-item"><summary><span><b>'+getNum(sec,q.n)+'.</b> '+q.q+'</span></summary>';
    html+='<div class="review-body"><div class="review-ans">✓ Opción '+nc+': '+escH(q.o[q.c-1]||'')+'</div>';
    html+='<div class="expbox">'+q.e+'</div></div></details>';
  });
  return html+'</div>';
}
function calcNota(sec){
  var qs=D[sec];if(!qs)return;
  var total=qs.length,ok=0,ko=0,skip=0;
  qs.forEach(function(q){var a=state[sec+'-'+q.n];if(!a)skip++;else if(a.r)ok++;else ko++;});
  var nota=Math.max(0,(ok-ko/3)/total*10),str=nota.toFixed(2),pass=nota>=5;
  var box=document.getElementById('nota-'+sec);if(!box)return;
  box.className='nota-box '+(pass?'pass':'fail');
  box.innerHTML='<span class="nota-score">'+(pass?'✓':'✗')+' '+str+' / 10</span>'
    +'<div class="nota-detail">Aciertos: '+ok+' | Fallos: '+ko+' | Sin responder: '+skip+'<br>'
    +'('+ok+' − '+ko+'/3) / '+total+' × 10 = '+str+'</div>'
    +buildRevList(sec);
  box.style.display='block';
}
function calcNotaAll(){
  var total=0,ok=0,ko=0,skip=0;
  SECS.forEach(function(sec){
    var qs=D[sec];if(!qs)return;
    total+=qs.length;
    qs.forEach(function(q){var a=state[sec+'-'+q.n];if(!a)skip++;else if(a.r)ok++;else ko++;});
  });
  var nota=Math.max(0,(ok-ko/3)/total*10),str=nota.toFixed(2),pass=nota>=5;
  var box=document.getElementById('nota-all');if(!box)return;
  box.className='global-nota-box '+(pass?'pass':'fail');
  var html='<span class="nota-score">'+(pass?'✓':'✗')+' '+str+' / 10 (global)</span>'
    +'<div class="nota-detail">Aciertos: '+ok+' | Fallos: '+ko+' | Sin responder: '+skip+'<br>'
    +'('+ok+' − '+ko+'/3) / '+total+' × 10 = '+str+'</div>';
  SECS.forEach(function(sec){
    var rv=buildRevList(sec);
    if(rv){var m=META.secciones[sec]||{};html+='<div class="review-sec-label">'+(m.emoji?m.emoji+' ':'')+escH(m.label||sec)+'</div>'+rv;}
  });
  box.innerHTML=html;box.style.display='block';
}

/* ── Estadísticas de errores ── */
function toggleStats(){
  statsVisible=!statsVisible;
  var btn=document.getElementById('btn-stats');
  if(btn){btn.style.background=statsVisible?'var(--ko-bg)':'';btn.style.color=statsVisible?'var(--ko-t)':'';}
  var box=document.getElementById('stats-global');
  if(!box)return;
  if(!statsVisible){box.classList.remove('show');return;}
  var entries=Object.entries(failHist).filter(function(e){return e[1]>0;});
  if(!entries.length){box.innerHTML='<div class="stats-title">📊 Sin errores registrados todavía</div>';box.classList.add('show');return;}
  entries.sort(function(a,b){return b[1]-a[1];});
  var top=entries.slice(0,10);
  var maxV=top[0][1];
  var html='<div class="stats-title">📊 Preguntas más falladas (acumulado entre sesiones)</div>';
  top.forEach(function(e,i){
    var qid=e[0],count=e[1];
    var q=findQ(qid);if(!q)return;
    var sec=getSecFromQid(qid),n=getNFromQid(qid);
    var m=META.secciones[sec]||{};
    var pct=Math.round(count/maxV*100);
    html+='<div class="stats-item">';
    html+='<span class="stats-n" style="min-width:18px;color:var(--ko-t);font-weight:700">'+(i+1)+'.</span>';
    html+='<span class="stats-q">'+(m.emoji?m.emoji+' ':'')+getNum(sec,n)+'. '+q.q.substring(0,60)+(q.q.length>60?'…':'')+'</span>';
    html+='<div class="stats-bar-wrap"><div class="stats-bar" style="width:'+pct+'%"></div></div>';
    html+='<span class="stats-n">'+count+'✗</span>';
    html+='</div>';
  });
  box.innerHTML=html;box.classList.add('show');
}

/* ── Buscador ── */
function onSearch(val){
  var v=val.trim().toLowerCase();
  var clr=document.getElementById('search-clear');
  var cnt=document.getElementById('search-count');
  if(clr)clr.style.display=v?'block':'none';
  var found=0,total=0;
  document.querySelectorAll('.qcard').forEach(function(card){
    total++;
    if(!v){card.classList.remove('search-hidden');found++;}
    else{
      var qtxt=card.querySelector('.qtxt');
      var match=qtxt&&qtxt.textContent.toLowerCase().indexOf(v)!==-1;
      card.classList.toggle('search-hidden',!match);
      if(match)found++;
    }
  });
  if(cnt){
    if(v){cnt.textContent=found+' de '+total+' preguntas';cnt.style.display='block';}
    else{cnt.style.display='none';}
  }
  // Mostrar "sin resultados" por panel
  ['all'].concat(SECS).forEach(function(s){
    var panel=document.getElementById('panel-'+s);if(!panel||!panel.classList.contains('visible'))return;
    var cards=panel.querySelectorAll('.qcard:not(.search-hidden)');
    var nr=document.getElementById('nr-'+s);if(nr)nr.style.display=cards.length===0&&v?'block':'none';
  });
}
function clearSearch(){
  var si=document.getElementById('search-input');if(si)si.value='';
  onSearch('');
}

/* ── Modo ── */
function setMode(mode){
  currentMode=mode;
  document.getElementById('mode-test').classList.toggle('on',mode==='test');
  document.getElementById('mode-quick').classList.toggle('on',mode==='quick');
  // Rerenderizar todo
  SECS.forEach(render);renderAll();
}

/* ── Modo oscuro ── */
function applyTheme(){
  document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');
  var btn=document.getElementById('btn-dark');if(btn)btn.textContent=darkMode?'☀️':'🌙';
}
function toggleDark(){darkMode=!darkMode;applyTheme();saveLocal();}

/* ── Temporizador ── */
function initTimer(){
  timerRemaining=timerSec;
  renderTimer();
  var disp=document.getElementById('timer-display');
  if(disp){
    disp.addEventListener('click',function(){startEditTimer();});
  }
}
function fmtTime(s){
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return h+':'+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;
}
function renderTimer(){
  var disp=document.getElementById('timer-display');
  if(!disp)return;
  disp.textContent=fmtTime(timerRemaining);
  disp.classList.toggle('danger',timerSec>0&&timerRemaining===0);
}
function timerToggle(){
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('btn-tplay').textContent='▶';
  }else{
    if(timerRemaining<=0&&timerSec>0)timerRemaining=timerSec;
    timerRunning=true;
    document.getElementById('btn-tplay').textContent='⏸';
    timerInterval=setInterval(function(){
      if(timerRemaining>0){timerRemaining--;renderTimer();}
      else{clearInterval(timerInterval);timerRunning=false;document.getElementById('btn-tplay').textContent='▶';renderTimer();}
    },1000);
  }
}
function timerReset(){
  clearInterval(timerInterval);timerRunning=false;
  timerRemaining=timerSec;
  document.getElementById('btn-tplay').textContent='▶';
  renderTimer();
}
function startEditTimer(){
  var disp=document.getElementById('timer-display');if(!disp)return;
  if(timerRunning){timerToggle();}
  var old=fmtTime(timerRemaining);
  disp.contentEditable='true';disp.classList.add('editing');
  disp.textContent=old;
  disp.focus();
  var range=document.createRange();range.selectNodeContents(disp);
  var sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  function commit(){
    disp.contentEditable='false';disp.classList.remove('editing');
    var txt=disp.textContent.trim();
    var parts=txt.split(':').map(Number);
    var secs=0;
    if(parts.length===3)secs=parts[0]*3600+parts[1]*60+parts[2];
    else if(parts.length===2)secs=parts[0]*60+parts[1];
    else if(parts.length===1)secs=parts[0]*60;
    if(!isNaN(secs)&&secs>=0){timerSec=secs;timerRemaining=secs;saveLocal();}
    renderTimer();
  }
  disp.addEventListener('blur',commit,{once:true});
  disp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();disp.blur();}});
}

/* ── Helpers cid ── */
function cidToQid(cid){return cid.replace(/^[AS]-/,'');}

/* ── Teclado ── */
function handleKey(e){
  var tg=e.target.tagName;
  if(tg==='INPUT'||tg==='TEXTAREA'||e.target.contentEditable==='true')return;
  var k=e.key;
  if(k>='1'&&k<='5'){
    if(activeCid&&!state[cidToQid(activeCid)]){
      var aqid=cidToQid(activeCid);
      var pos=parseInt(k),q=findQ(aqid);
      if(q&&pos<=q.o.length){e.preventDefault();answer(aqid,pos,getSecFromQid(aqid));}
    }
  }else if(k==='ArrowDown'||k==='ArrowUp'){
    e.preventDefault();navigateQ(k==='ArrowDown'?1:-1);
  }else if(k==='s'||k==='S'){
    if(activeCid)toggleStar(cidToQid(activeCid));
  }
}
function navigateQ(dir){
  var cards=Array.from(document.querySelectorAll('.sec-panel.visible .qcard')).filter(function(c){return c.style.display!=='none'&&!c.classList.contains('search-hidden');});
  var cids=cards.map(function(c){return c.id.replace('card-','');});
  if(!cids.length)return;
  var idx=activeCid?cids.indexOf(activeCid):-1;
  var nidx=Math.max(0,Math.min(cids.length-1,idx+dir));
  var ncid=cids[nidx];if(!ncid||ncid===activeCid)return;
  if(activeCid){var ob=document.getElementById('b-'+activeCid);var oh=document.getElementById('h-'+activeCid);if(ob)ob.classList.remove('open');if(oh)oh.classList.remove('open');var oc=document.getElementById('card-'+activeCid);if(oc)oc.classList.remove('kb-focus');}
  activeCid=ncid;
  var nb=document.getElementById('b-'+ncid);var nh=document.getElementById('h-'+ncid);
  if(nb)nb.classList.add('open');if(nh)nh.classList.add('open');
  var nc2=document.getElementById('card-'+ncid);if(nc2){nc2.classList.add('kb-focus');nc2.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
</script>
