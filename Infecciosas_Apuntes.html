<!--
=============================================================
  MOTOR BANCO MIR — v10
  Novedades respecto a v9:
  - Numeración correlativa fija por sección (no se mezcla)
  - Badge neutro en pestaña "Todos" + mezcla real inter-secciones
  - Temporizador sticky editable en header (play/pausa/reset)
  - Buscador de texto en tiempo real
  - Modo repaso rápido (muestra RC + explicación directamente)
  - Estadísticas de errores recurrentes entre sesiones
=============================================================
-->
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">Banco MIR</title>
<style>
:root{
  --bg:#f4f3ef;--surf:#fff;--bd:#e5e5e5;--bd2:#ddd;
  --txt:#1a1a1a;--txt2:#555;--txt3:#999;--txt4:#666;
  --hdr:#1a1a1a;--hdr-t:#fff;
  --ok-bg:#e6f9ef;--ok-t:#0b6e52;--ok-bd:#2da060;
  --ko-bg:#fdecea;--ko-t:#b91c1c;--ko-bd:#d94f45;
  --sc-ok:#dcf5ed;--sc-ko:#fdecea;--sc-rem:#f0f0f0;--sc-rem-t:#666;
  --exp:#fffbe6;--exp-bd:#f0c04a;--exp-t:#5a4500;
  --prog:#e5e5e5;--prog-fill:#1a56db;
  --star:#ccc;--star-on:#f59e0b;
  --hint:#fafafa;--hint-bd:#eee;
  --tab-bd:#ddd;--tab-t:#555;
  --all-bg:#e8f0fe;--all-t:#1a56db;--all-bd:#1a56db;
  --fab:#1a1a1a;--fab-t:#fff;
  --nota-btn-t:#1a56db;--nota-btn-bd:#1a56db;--nota-btn-bg:var(--surf);
  --timer-bg:#222;--timer-t:#fff;--timer-danger:#ef4444;
}
[data-theme="dark"]{
  --bg:#0f0f1a;--surf:#1e1e30;--bd:#2a2a45;--bd2:#333355;
  --txt:#e8e8f0;--txt2:#aaa;--txt3:#555;--txt4:#888;
  --hdr:#0a0a14;--hdr-t:#e8e8f0;
  --ok-bg:#0b3020;--ok-t:#4ade80;--ok-bd:#166534;
  --ko-bg:#2d0a0a;--ko-t:#f87171;--ko-bd:#7f1d1d;
  --sc-ok:#0b3020;--sc-ko:#2d0a0a;--sc-rem:#252540;--sc-rem-t:#aaa;
  --exp:#1a1500;--exp-bd:#a37f10;--exp-t:#d4b84a;
  --prog:#2a2a45;--prog-fill:#60a5fa;
  --star:#444;--star-on:#f59e0b;
  --hint:#1a1a2e;--hint-bd:#2a2a45;
  --tab-bd:#2a2a45;--tab-t:#aaa;
  --all-bg:#1a2a4a;--all-t:#60a5fa;--all-bd:#3b82f6;
  --fab:#2a2a50;--fab-t:#e8e8f0;
  --nota-btn-t:#60a5fa;--nota-btn-bd:#3b82f6;--nota-btn-bg:var(--surf);
  --timer-bg:#1a1a2e;--timer-t:#e8e8f0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;transition:background .25s,color .25s}

/* ── Header ── */
header{background:var(--hdr);color:var(--hdr-t);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
header h1{font-size:13.5px;font-weight:600;white-space:nowrap}
.hright{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hmeta{font-size:11px;color:#888}
.hbtn{background:none;border:none;cursor:pointer;font-size:16px;line-height:1;padding:3px 5px;border-radius:5px;transition:background .15s;color:var(--hdr-t)}
.hbtn:hover{background:rgba(255,255,255,.12)}
.sbadge{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:500}
.sbadge.ok{background:#15803d;color:#dcfce7}.sbadge.warn{background:#92400e;color:#fef3c7}

/* ── Temporizador ── */
#timer-wrap{display:flex;align-items:center;gap:4px;background:var(--timer-bg);border-radius:7px;padding:3px 8px;border:1px solid rgba(255,255,255,.1)}
#timer-display{font-size:13px;font-weight:700;font-family:monospace;color:var(--timer-t);min-width:58px;text-align:center;cursor:pointer;border-radius:3px;padding:1px 3px}
#timer-display:hover{background:rgba(255,255,255,.08)}
#timer-display.editing{background:rgba(255,255,255,.15);outline:none;color:var(--timer-t)}
#timer-display.danger{color:var(--timer-danger)}
#timer-wrap button{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:12px;padding:1px 3px;border-radius:3px;line-height:1}
#timer-wrap button:hover{background:rgba(255,255,255,.12);color:#fff}

/* ── Barra de progreso ── */
#prog-wrap{height:3px;background:var(--prog);position:sticky;top:40px;z-index:99}
#prog-bar{height:100%;background:var(--prog-fill);width:0%;transition:width .4s}

/* ── Contenedor ── */
.container{max-width:820px;margin:0 auto;padding:16px 12px}

/* ── Buscador ── */
.search-wrap{position:relative;margin-bottom:13px}
.search-wrap input{width:100%;padding:8px 34px 8px 12px;border:1.5px solid var(--bd2);border-radius:8px;font-size:13px;background:var(--surf);color:var(--txt);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--prog-fill)}
.search-clear{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--txt3);font-size:16px;display:none;line-height:1}
#search-count{font-size:11px;color:var(--txt3);margin-top:4px;display:none}

/* ── Modo repaso ── */
.mode-bar{display:flex;gap:6px;margin-bottom:12px;align-items:center}
.mode-btn{padding:5px 12px;border:1.5px solid var(--bd2);border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;background:var(--surf);color:var(--txt2);transition:all .15s}
.mode-btn:hover{border-color:#999}
.mode-btn.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Tabs ── */
.tabs{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.tab{padding:7px 14px;border:1.5px solid var(--tab-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;background:var(--surf);color:var(--tab-t);transition:all .15s}
.tab:hover{border-color:#999;color:var(--txt)}
.tab.t-all.on{background:var(--all-bg);color:var(--all-t);border-color:var(--all-bd)}

/* ── Score global ── */
.ph-global{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 15px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border-left:4px solid var(--prog-fill)}
.score-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.sc{font-size:12px;font-weight:600;padding:3px 9px;border-radius:6px}
.sc.ok{background:var(--sc-ok);color:var(--ok-t)}.sc.ko{background:var(--sc-ko);color:var(--ko-t)}.sc.rem{background:var(--sc-rem);color:var(--sc-rem-t)}

/* ── Acciones ── */
.global-actions{display:none;margin-bottom:10px;gap:7px;flex-wrap:wrap;align-items:center}
.container[data-tab="all"] .global-actions{display:flex}
.sec-actions{margin:6px 0 15px;display:flex;gap:7px;flex-wrap:wrap}
.reset-btn{padding:7px 14px;background:var(--fab);color:var(--fab-t);border:none;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:opacity .15s}
.reset-btn:hover{opacity:.82}
.nota-btn{padding:7px 14px;background:var(--nota-btn-bg);color:var(--nota-btn-t);border:1.5px solid var(--nota-btn-bd);border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;transition:background .15s}
.nota-btn:hover{background:var(--all-bg)}

/* ── Nota box ── */
.nota-box,.global-nota-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:2px solid var(--bd2);font-size:13px;line-height:1.7;display:none}
.nota-box.pass,.global-nota-box.pass{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t)}
.nota-box.fail,.global-nota-box.fail{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t)}
.nota-score{font-size:26px;font-weight:700;display:block;margin-bottom:4px}
.nota-detail{font-size:12px;opacity:.85;font-family:monospace}

/* ── Vista revisión ── */
.review-list{margin-top:12px;border-top:1px solid var(--bd2);padding-top:10px}
.review-title{font-size:12px;font-weight:700;margin-bottom:9px;color:var(--txt)}
.review-sec-label{font-size:11.5px;font-weight:700;color:var(--txt3);margin:8px 0 5px;padding-top:6px;border-top:1px solid var(--bd)}
.review-item{background:var(--surf);border-radius:8px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden}
.review-item summary{padding:9px 12px;cursor:pointer;font-size:12.5px;color:var(--txt);list-style:none;display:flex;gap:8px;align-items:flex-start}
.review-item summary::-webkit-details-marker{display:none}
.review-item summary::before{content:'▶';font-size:9px;color:var(--txt3);flex-shrink:0;margin-top:4px;transition:transform .18s}
details[open] summary::before{transform:rotate(90deg)}
.review-body{padding:0 12px 11px}
.review-ans{font-size:12px;color:var(--ok-t);margin-bottom:7px;font-weight:500}

/* ── Estadísticas ── */
.stats-box{margin-top:8px;padding:12px 15px;border-radius:10px;border:1.5px solid var(--bd2);background:var(--surf);display:none}
.stats-box.show{display:block}
.stats-title{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--txt)}
.stats-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12.5px}
.stats-item:last-child{border-bottom:none}
.stats-bar-wrap{flex:1;background:var(--sc-rem);border-radius:4px;height:6px;overflow:hidden}
.stats-bar{height:100%;background:var(--ko-bd);border-radius:4px;transition:width .4s}
.stats-n{font-size:11px;color:var(--txt3);white-space:nowrap}
.stats-q{flex:2;color:var(--txt);font-size:12px;line-height:1.3}

/* ── Panel secciones ── */
.sec-panel{display:none}.sec-panel.visible{display:block}
.ph{background:var(--surf);border-radius:10px;border:1px solid var(--bd);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ph-left{flex:1;display:flex;flex-direction:column;gap:5px}
.ph-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt3);margin-bottom:1px}
.ph-desc{font-size:12px;color:var(--txt4)}
.fbtn{padding:6px 12px;font-size:12px;font-weight:500;border:1.5px solid var(--bd2);border-radius:8px;cursor:pointer;background:var(--surf);color:var(--txt2);transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:#999;color:var(--txt)}.fbtn.on{background:var(--ko-bg);color:#b91c1c;border-color:#f87171}
.no-failed{display:none;text-align:center;padding:16px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin-top:4px}
.no-failed.show{display:block}
.no-results{display:none;text-align:center;padding:20px;color:var(--txt3);font-size:13px;border:1.5px dashed var(--bd2);border-radius:8px;margin:8px 0}

/* ── Hint ── */
.hint{font-size:11px;color:var(--txt3);margin-bottom:15px;padding:7px 11px;background:var(--hint);border-radius:6px;border:1px solid var(--hint-bd)}

/* ── Tarjeta ── */
.qcard{background:var(--surf);border-radius:10px;border:1px solid var(--bd);margin-bottom:7px;overflow:hidden;transition:box-shadow .15s}
.qcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.qcard.kb-focus{outline:2px solid var(--prog-fill);outline-offset:-2px}
.qcard.search-hidden{display:none}
.qhead{padding:11px 13px;cursor:pointer;display:flex;align-items:flex-start;gap:9px}

/* ── Badge numérico ── */
.qnum{font-size:11px;font-weight:700;padding:3px 7px;border-radius:5px;white-space:nowrap;flex-shrink:0;margin-top:2px;background:var(--sc-rem);color:var(--sc-rem-t)}
/* En pestaña "Todos" siempre neutro; en sección aplica color de sección */
.qnum.sec-colored{background:var(--sec-dim);color:var(--sec-col)}

.qtxt{font-size:13px;line-height:1.5;flex:1}
.star-btn{background:none;border:none;cursor:pointer;font-size:15px;color:var(--star);padding:0 2px;flex-shrink:0;margin-top:2px;line-height:1;transition:color .15s,transform .15s}
.star-btn:hover{transform:scale(1.2)}
.star-btn .si{display:inline}.star-btn .sf{display:none}
.star-btn.on .si{display:none}.star-btn.on .sf{display:inline;color:var(--star-on)}
.chev{font-size:15px;color:var(--bd2);flex-shrink:0;margin-top:2px;transition:transform .2s}
.qhead.open .chev{transform:rotate(180deg)}
.qbody{display:none;padding:0 13px 13px}.qbody.open{display:block}

/* ── Imagen ── */
.clinimg-wrap{margin:9px 0 7px;background:#111;border-radius:8px;overflow:hidden;border:1px solid var(--bd2);text-align:center}
.clinimg{max-width:100%;max-height:340px;object-fit:contain;display:block;margin:0 auto}
.clinimg-cap{font-size:11px;color:var(--txt3);padding:4px 0 5px;background:var(--hint);border-top:1px solid var(--bd)}

/* ── Opciones ── */
.opts{list-style:none;margin-top:9px;display:flex;flex-direction:column;gap:5px}
.opt{padding:9px 12px;border-radius:8px;border:1.5px solid var(--bd2);cursor:pointer;display:flex;align-items:flex-start;gap:9px;color:var(--txt);font-size:13px;line-height:1.45;transition:border-color .12s,background .12s;user-select:none}
.opt:hover:not(.done){border-color:#999;background:var(--hint)}
.opt.correct{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok-t);font-weight:500;cursor:default}
.opt.wrong{background:var(--ko-bg);border-color:var(--ko-bd);color:var(--ko-t);cursor:default}
.opt.done:not(.correct):not(.wrong){cursor:default;opacity:.7}
.onum{font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;min-width:15px}

/* ── Modo repaso rápido ── */
.quick-card{padding:9px 12px;border-radius:8px;border:1.5px solid var(--ok-bd);background:var(--ok-bg);margin-top:8px}
.quick-rc{font-size:12.5px;font-weight:600;color:var(--ok-t);margin-bottom:6px}

/* ── Explicación ── */
.expbox{margin-top:10px;padding:10px 12px;background:var(--exp);border-left:4px solid var(--exp-bd);border-radius:0 8px 8px 0;font-size:12.5px;color:var(--exp-t);line-height:1.65}
.expbox b,.expbox strong{font-weight:600}
.et{display:block;margin-bottom:4px;font-weight:600;font-size:13px}
.atag{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:5px;vertical-align:middle}
.atag.ok{background:var(--sc-ok);color:var(--ok-t)}.atag.ko{background:var(--sc-ko);color:#c0392b}

/* ── All-tab CSS ── */
.container[data-tab="all"] .ph{display:none!important}
.container[data-tab="all"] .sec-actions{display:none!important}
.container[data-tab="all"] .no-failed{display:none!important}
.container[data-tab="all"] .nota-box{display:none!important}
.container:not([data-tab="all"]) .global-nota-box{display:none!important}
.container:not([data-tab="all"]) #stats-global{display:none!important}
</style>
</head>
<body>
<header>
  <h1 id="h-tit">Banco MIR</h1>
  <div class="hright">
    <span class="hmeta" id="h-meta"></span>
    <!-- Temporizador -->
    <div id="timer-wrap" title="Haz clic en el tiempo para editar">
      <span id="timer-display">0:00:00</span>
      <button id="btn-tplay" onclick="timerToggle()" title="Play/Pausa">▶</button>
      <button onclick="timerReset()" title="Reset">↺</button>
    </div>
    <button class="hbtn" id="btn-dark" onclick="toggleDark()" title="Modo oscuro">🌙</button>
    <span id="save-badge" class="sbadge"></span>
  </div>
</header>
<div id="prog-wrap"><div id="prog-bar"></div></div>

<div class="container" id="main-cont" data-tab="all">
  <!-- Buscador -->
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="🔍 Buscar en enunciados..." oninput="onSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div id="search-count"></div>

  <!-- Modo -->
  <div class="mode-bar">
    <span style="font-size:11.5px;color:var(--txt3);font-weight:600">MODO:</span>
    <button class="mode-btn on" id="mode-test" onclick="setMode('test')">📝 Test</button>
    <button class="mode-btn" id="mode-quick" onclick="setMode('quick')">⚡ Repaso rápido</button>
    <button class="mode-btn" id="btn-stars" onclick="filterStarred()" style="margin-left:auto;border-color:#f59e0b;color:#b45309">⭐ Marcadas</button>
    <button class="mode-btn" id="btn-stats" onclick="toggleStats()">📊 Errores</button>
  </div>

  <!-- Stats globales -->
  <div class="stats-box" id="stats-global"></div>

  <!-- Tabs -->
  <div class="tabs" id="tabs-wrap"></div>

  <!-- Score global -->
  <div class="ph-global">
    <div class="ph-left">
      <span class="ph-desc" id="ph-gdesc"></span>
      <div class="score-row">
        <span class="sc ok" id="sc-ok-all">✓ 0</span>
        <span class="sc ko" id="sc-ko-all">✗ 0</span>
        <span class="sc rem" id="sc-rem-all">○ 0</span>
      </div>
    </div>
  </div>
  <div class="global-actions">
    <button class="reset-btn" onclick="resetAll()">↺ Reiniciar y mezclar</button>
    <button class="nota-btn" onclick="calcNotaAll()">✎ Calcular nota global</button>
  </div>
  <div class="global-nota-box" id="nota-all"></div>
  <p class="hint">💡 <b>1–5</b> responde · <b>↑↓</b> navega · <b>S</b> marca ⭐ · Progreso guardado automáticamente</p>

  <div id="panels-wrap"></div>
</div>

<script>
/* ═══════════════════════════════════════ MOTOR v10 ═══════════════════════════════════════ */

var META=/*__META_JSON__*/{"titulo":"Infecciosas \u2014 Preguntas de Apuntes","subtitulo":"Epidemiolog\u00eda \u00b7 Antimicrobianos \u00b7 Bacterias \u00b7 TBC \u00b7 Rickettsias \u00b7 Virus \u00b7 Brucelosis \u00b7 S\u00edndromes","examen":"Infecciosas PDT \u00b7 Preguntas de Apuntes","secciones":{"intro_epi":{"label":"Introducci\u00f3n y Epidemiolog\u00eda","emoji":"\ud83d\udd17","color":"#0b6e52","colorDim":"#dcf5ed","desc":"Cadena epidemiol\u00f3gica \u00b7 Patogenia \u00b7 Defensa del hu\u00e9sped"},"antimicro":{"label":"Antimicrobianos","emoji":"\ud83d\udc8a","color":"#1a56db","colorDim":"#e8f0fe","desc":"Antibi\u00f3ticos \u00b7 Antivirales \u00b7 Ant\u00edfungicos \u00b7 Mecanismos de resistencia"},"bacterias":{"label":"Bacterias","emoji":"\ud83e\udda0","color":"#b91c1c","colorDim":"#fde8e8","desc":"Gram+ \u00b7 Gram\u2212 \u00b7 Espiroquetas \u00b7 Difteria \u00b7 Clostridium"},"tbc":{"label":"Tuberculosis","emoji":"\ud83e\udeaa","color":"#78350f","colorDim":"#fef9c3","desc":"Diagn\u00f3stico \u00b7 Tratamiento \u00b7 Latente \u00b7 Extrapulmonar"},"rickettsia_myco":{"label":"Rickettsias y Mycoplasma","emoji":"\ud83e\uddab","color":"#7c3aed","colorDim":"#ede9fe","desc":"Rickettsias \u00b7 Mycoplasma \u00b7 Clamidias \u00b7 Brucelosis"},"virus_hongos":{"label":"Virus y Hongos","emoji":"\ud83c\udf44","color":"#0f766e","colorDim":"#ccfbf1","desc":"Herpes \u00b7 VIH \u00b7 Hepatitis \u00b7 Hongos \u00b7 Par\u00e1sitos"},"caso_brucelosis":{"label":"Caso Brucelosis","emoji":"\ud83d\udc04","color":"#b45309","colorDim":"#fef3c7","desc":"Caso cl\u00ednico integrador \u00b7 Diagn\u00f3stico diferencial \u00b7 Tratamiento"},"sindromes":{"label":"S\u00edndromes Infecciosos","emoji":"\ud83c\udfe5","color":"#374151","colorDim":"#e2e8f0","desc":"Sepsis \u00b7 FOD \u00b7 ITU \u00b7 Respiratorio \u00b7 SNC \u00b7 Endocarditis \u00b7 ITS"}}};
var D=/*__D_JSON__*/{"intro_epi":[{"n":"ie1","q":"Se\u00f1ale cu\u00e1l NO es un factor de riesgo del hospedador para adquirir Enfermedad Infecciosa:","o":["Edades extremas","Inmunosupresi\u00f3n","Mal estado nutricional","Vacunaci\u00f3n correcta"],"c":4,"e":"La vacunaci\u00f3n correcta es el principal MECANISMO DE PROTECCI\u00d3N frente a las enfermedades infecciosas, no un factor de riesgo. Los factores de riesgo del hospedador son: edades extremas, inmunosupresi\u00f3n y mal estado nutricional (deteriora la respuesta inmunitaria).","ai":false,"noShuffle":false,"img":null},{"n":"ie2","q":"Seg\u00fan Koch (1893), para afirmar que un microorganismo es un pat\u00f3geno estricto debe cumplir ciertos postulados. Indique cu\u00e1l es la respuesta FALSA:","o":["Que, obtenido de la infecci\u00f3n, no pueda cultivarse","Que la inoculaci\u00f3n del cultivo pueda reproducir la misma infecci\u00f3n","Encontrarse siempre en esa infecci\u00f3n","Que pueda aislarse en cultivo puro de las inoculaciones experimentales"],"c":1,"e":"Es FALSO que 'obtenido de la infecci\u00f3n no pueda cultivarse'. El postulado de Koch exige lo contrario: debe AISLARSE EN CULTIVO PURO a partir del tejido enfermo. Los 4 postulados: (1) encontrarse siempre en la enfermedad, (2) cultivarse en cultivo puro, (3) inoculado debe reproducir la enfermedad, y (4) re-aislarse del animal inoculado.","ai":false,"noShuffle":false,"img":null},{"n":"ie3","q":"El t\u00e9rmino 'colonizaci\u00f3n/inoculaci\u00f3n' dentro de la fisiopatolog\u00eda de cualquier enfermedad infecciosa se define como:","o":["La presencia y replicaci\u00f3n de un microorganismo en los tejidos de un hu\u00e9sped que se acompa\u00f1a de respuesta cl\u00ednica aunque no de respuesta inmunitaria","La presencia y replicaci\u00f3n de un microorganismo en los tejidos de un hu\u00e9sped que no se acompa\u00f1a de respuesta cl\u00ednica aunque s\u00ed de respuesta inmunitaria","La presencia de un microorganismo en un hu\u00e9sped que crece y se multiplica en \u00e9l pero que no induce invasi\u00f3n tisular ni da\u00f1o org\u00e1nico","La presencia de un microorganismo en un hu\u00e9sped que crece y se multiplica en \u00e9l induciendo invasi\u00f3n tisular y da\u00f1o org\u00e1nico"],"c":3,"e":"La colonizaci\u00f3n es la simple PRESENCIA del microorganismo en el hu\u00e9sped donde crece y se multiplica SIN invadir tejidos ni causar da\u00f1o org\u00e1nico. Diferente de INFECCI\u00d3N (respuesta inmunitaria sin s\u00edntomas) y ENFERMEDAD INFECCIOSA (s\u00edntomas cl\u00ednicos).","ai":false,"noShuffle":false,"img":null},{"n":"ie4","q":"Los eslabones de la cadena epidemiol\u00f3gica de una enfermedad transmisible son:","o":["Agente infeccioso, mecanismo de transmisi\u00f3n y hu\u00e9sped susceptible","Agente infeccioso, mecanismo de transmisi\u00f3n y medio ambiente","Hu\u00e9sped susceptible, agente infeccioso y mecanismo de transmisi\u00f3n","Agente infeccioso, fuente de infecci\u00f3n y mecanismo de transmisi\u00f3n"],"c":1,"e":"La cadena epidemiol\u00f3gica b\u00e1sica tiene 3 eslabones: (1) AGENTE INFECCIOSO, (2) MECANISMO DE TRANSMISI\u00d3N y (3) HU\u00c9SPED SUSCEPTIBLE. Las opciones A y C son equivalentes. El medio ambiente y la fuente de infecci\u00f3n forman parte del esquema extendido.","ai":false,"noShuffle":false,"img":null},{"n":"ie5","q":"El t\u00e9rmino acad\u00e9mico que define las enfermedades transmitidas por animales se denomina:","o":["Brucelosis","Humanosis","Animalosis","Zoonosis"],"c":4,"e":"Las ZOONOSIS son enfermedades infecciosas que se transmiten de manera natural entre animales vertebrados y el ser humano. Ejemplos: brucelosis (ganado bovino/ovino), leptospirosis (roedores), fiebre Q (ganado), rabia. La brucelosis es UN ejemplo espec\u00edfico de zoonosis, no el t\u00e9rmino gen\u00e9rico.","ai":false,"noShuffle":false,"img":null},{"n":"ie6","q":"Cuando se produce un aumento de la incidencia de una enfermedad superior al esperado para una poblaci\u00f3n o zona geogr\u00e1fica determinada y en un periodo de tiempo concreto, se define como:","o":["Endemia","Pandemia","Epidemia","Endoendemia"],"c":3,"e":"EPIDEMIA: aumento de la incidencia SUPERIOR al esperado para una poblaci\u00f3n/zona/per\u00edodo concreto. ENDEMIA = incidencia constante y esperada en una zona. PANDEMIA = extensi\u00f3n a gran parte del mundo.","ai":false,"noShuffle":false,"img":null},{"n":"ie7","q":"El t\u00e9rmino 'Colonizaci\u00f3n' dentro de la fisiopatolog\u00eda natural de cualquier enfermedad infecciosa se define ampliamente como:","o":["La presencia y replicaci\u00f3n de un microorganismo en los tejidos de un hu\u00e9sped que se acompa\u00f1a de respuesta cl\u00ednica aunque no de respuesta inmune","La presencia y replicaci\u00f3n de un microorganismo en los tejidos de un hu\u00e9sped que no se acompa\u00f1a de respuesta cl\u00ednica aunque s\u00ed de respuesta inmune","La presencia de un microorganismo en un hu\u00e9sped que crece y se multiplica en \u00e9l pero que no induce invasi\u00f3n tisular ni da\u00f1o org\u00e1nico","La presencia de un microorganismo en un hu\u00e9sped que crece y se multiplica en \u00e9l induciendo invasi\u00f3n tisular y da\u00f1o org\u00e1nico"],"c":3,"e":"COLONIZACI\u00d3N: microorganismo presente y multiplic\u00e1ndose en el hu\u00e9sped SIN invadir tejidos ni causar da\u00f1o org\u00e1nico, sin respuesta cl\u00ednica ni inmunol\u00f3gica significativa. Ejemplo: S. aureus coloniza las fosas nasales del 30% de la poblaci\u00f3n sana sin causar enfermedad.","ai":false,"noShuffle":false,"img":null},{"n":"ie8","q":"El t\u00e9rmino 'INFECCI\u00d3N' dentro de la fisiopatolog\u00eda de cualquier enfermedad infecciosa se define ampliamente como:","o":["La presencia de un microorganismo en un hu\u00e9sped que crece y se multiplica en \u00e9l pero no induce invasi\u00f3n tisular ni da\u00f1o org\u00e1nico","La presencia y replicaci\u00f3n de un microorganismo en los tejidos de un hu\u00e9sped que no se acompa\u00f1a de respuesta cl\u00ednica aunque s\u00ed de respuesta inmunitaria","La presencia y replicaci\u00f3n de un microorganismo en los tejidos de un hu\u00e9sped que se acompa\u00f1a de respuesta cl\u00ednica e inmunitaria","La presencia y replicaci\u00f3n de un microorganismo en los tejidos de un hu\u00e9sped que se acompa\u00f1a de respuesta cl\u00ednica aunque no d\u00e9 respuesta inmune"],"c":2,"e":"En terminolog\u00eda acad\u00e9mica estricta, INFECCI\u00d3N = replicaci\u00f3n del microorganismo en tejidos con respuesta INMUNITARIA pero SIN s\u00edntomas cl\u00ednicos (infecci\u00f3n subcl\u00ednica o latente). La ENFERMEDAD INFECCIOSA a\u00f1ade la respuesta cl\u00ednica (s\u00edntomas). La COLONIZACI\u00d3N no implica invasi\u00f3n tisular.","ai":false,"noShuffle":false,"img":null},{"n":"ie9","q":"Con respecto a la patogenia de las enfermedades infecciosas, cu\u00e1l de las siguientes afirmaciones es CORRECTA:","o":["El periodo de convalecencia comprende el tiempo transcurrido entre la colonizaci\u00f3n y la infecci\u00f3n","No existe una enfermedad infecciosa sin infecci\u00f3n previa pero s\u00ed puede existir infecci\u00f3n sin llegar a desarrollar una enfermedad","El aislamiento de E. coli en el tracto gastrointestinal de un paciente asintom\u00e1tico significa que tiene infecci\u00f3n y hay que tratarlo","Si un paciente est\u00e1 colonizado por S. aureus tendremos que iniciar tratamiento para evitar que origine una enfermedad infecciosa"],"c":2,"e":"Puede existir INFECCI\u00d3N (con respuesta inmune) SIN enfermedad cl\u00ednica. E. coli en colon es FLORA NORMAL (colonizaci\u00f3n), no infecci\u00f3n. La colonizaci\u00f3n por S. aureus nasal en sano NO requiere tratamiento salvo situaciones especiales.","ai":false,"noShuffle":false,"img":null},{"n":"ie10","q":"Se entiende por BACTERI\u00d3FAGOS (pregunta MIR 2006-2007):","o":["Bacterias que ingieren otras bacterias","Par\u00e1sitos que ingieren bacterias","Virus que se multiplican en bacterias","Bacterias que producen lisis en cultivos de tejidos celulares"],"c":3,"e":"Los BACTERI\u00d3FAGOS (fagos) son VIRUS que infectan y se replican en bacterias. En microbiolog\u00eda m\u00e9dica median la transferencia horizontal de genes (transducci\u00f3n), incluyendo genes de virulencia y resistencia antibi\u00f3tica. La toxina dift\u00e9rica, la toxina botul\u00ednica A y las exotoxinas pirog\u00e9nicas del estreptococo est\u00e1n codificadas por bacteri\u00f3fagos lisog\u00e9nicos.","ai":false,"noShuffle":false,"img":null}],"antimicro":[{"n":"am1","q":"Mujer de 45 a\u00f1os. En hemocultivos se a\u00edsla Listeria monocytogenes tras ingesta de fiambre contaminado. Cu\u00e1l es el tratamiento de elecci\u00f3n:","o":["Penicilina G benzatina","Ampicilina","Ceftriaxona","Amoxicilina-clavul\u00e1nico"],"c":2,"e":"Listeria monocytogenes es naturalmente RESISTENTE a las cefalosporinas (incluyendo ceftriaxona). El tratamiento de elecci\u00f3n es AMPICILINA IV. En pacientes graves o con meningitis se a\u00f1ade gentamicina por sinergia. TMP-SMX es la alternativa en al\u00e9rgicos a betalact\u00e1micos.","ai":false,"noShuffle":false,"img":null},{"n":"am2","q":"Var\u00f3n de 82 a\u00f1os con sepsis abdominal. En hemocultivos se a\u00edsla Pseudomonas aeruginosa en los 4 frascos. Cu\u00e1l de los siguientes antibi\u00f3ticos NO estar\u00eda indicado:","o":["Ertapenem","Doripenem","Imipenem","Meropenem"],"c":1,"e":"El ERTAPENEM es el \u00daNICO carbapen\u00e9mico sin actividad frente a Pseudomonas aeruginosa. Los otros tres carbapen\u00e9micos (imipenem, meropenem, doripenem) S\u00cd tienen actividad antipseudom\u00f3nica. Regla mnemot\u00e9cnica: Todos los carbapen\u00e9micos MENOS el ertapenem cubren Pseudomona. Cl\u00e1sico del MIR.","ai":false,"noShuffle":false,"img":null},{"n":"am3","q":"Var\u00f3n de 72 a\u00f1os con EPOC en cuyo \u00faltimo ingreso se aisl\u00f3 Pseudomonas aeruginosa en esputo. Ahora presenta agudizaci\u00f3n con fiebre y expectoraci\u00f3n verdosa. Cu\u00e1l f\u00e1rmaco es m\u00e1s adecuado emp\u00edricamente:","o":["Amoxicilina-clavul\u00e1nico","Ceftriaxona","Ceftazidima","Cefuroxima"],"c":3,"e":"Con antecedente de colonizaci\u00f3n por Pseudomonas aeruginosa en EPOC, el tratamiento emp\u00edrico debe cubrir este microorganismo. De las cefalosporinas listadas, solo la CEFTAZIDIMA tiene actividad antipseudom\u00f3nica. La amoxicilina-clavul\u00e1nico, ceftriaxona y cefuroxima no cubren Pseudomona.","ai":false,"noShuffle":false,"img":null},{"n":"am4","q":"Daptomicina podr\u00eda utilizarse para tratar los siguientes g\u00e9rmenes EXCEPTO:","o":["Enterobacter cloacae","Staphylococcus hominis","SAMR (S. aureus resistente a meticilina)","Enterococcus faecium"],"c":1,"e":"La daptomicina es un lipop\u00e9ptido c\u00edclico con espectro EXCLUSIVO frente a GRAMPOSITIVOS. Enterobacter cloacae es un bacilo GRAMNEGATIVO completamente resistente a daptomicina de forma intr\u00ednseca. La daptomicina S\u00cd cubre: S. aureus incluyendo SAMR, estafilococos coagulasa-negativos, Enterococcus spp. Adem\u00e1s, en neumon\u00edas se inactiva por el surfactante pulmonar.","ai":false,"noShuffle":false,"img":null},{"n":"am5","q":"Una de las siguientes asociaciones entre agente antibi\u00f3tico y espectro de actividad es INCORRECTA:","o":["Ceftarolina: Staphylococcus aureus resistente a la meticilina (SARM)","Amikacina: Pseudomona aeruginosa","Cefepime: Enterococcus faecalis","Doxiciclina: Rickettsia"],"c":3,"e":"El CEFEPIME (cefalosporina de 4a generaci\u00f3n) NO tiene actividad frente a Enterococcus faecalis. Ninguna cefalosporina cubre enterococos (resistencia intr\u00ednseca). La cobertura de enterococo requiere ampicilina, glucop\u00e9ptidos (vancomicina), linezolid o daptomicina. Ceftarolina S\u00cd cubre SARM (\u00fanica cefalosporina con esta propiedad). Amikacina S\u00cd cubre Pseudomona. Doxiciclina S\u00cd cubre Rickettsia.","ai":false,"noShuffle":false,"img":null},{"n":"am6","q":"Cu\u00e1l de los siguientes reg\u00edmenes antibi\u00f3ticos NO emplear\u00eda en el tratamiento emp\u00edrico de un absceso intraabdominal secundario a apendicitis perforada:","o":["Aztreonam m\u00e1s ciprofloxacino","Ertapenem","Tigeciclina","Ceftriaxona m\u00e1s metronidazol"],"c":1,"e":"Un absceso intraabdominal requiere cobertura de GRAMNEGATIVOS y ANAEROBIOS. Aztreonam m\u00e1s ciprofloxacino FALLA porque ninguno cubre anaerobios de forma eficaz. Ertapenem: cubre gramnegativos y anaerobios. Tigeciclina: amplio espectro incluyendo anaerobios. Ceftriaxona m\u00e1s metronidazol: cobertura completa.","ai":false,"noShuffle":false,"img":null},{"n":"am7","q":"Mujer de 47 a\u00f1os en UCI con neumon\u00eda asociada a VM. Cultivo aspirado endotraqueal: m\u00e1s de 100000 UCF/mL de SARM. Cu\u00e1l de los siguientes tratamientos NO ser\u00eda apropiado:","o":["Tigeciclina","Ceftarolina","Vancomicina","Daptomicina"],"c":4,"e":"La DAPTOMICINA est\u00e1 CONTRAINDICADA en neumon\u00edas porque el SURFACTANTE PULMONAR la INACTIVA, impidiendo su acci\u00f3n bactericida. Para SARM en neumon\u00eda las opciones son: vancomicina IV (de elecci\u00f3n), linezolid (mejor penetraci\u00f3n pulmonar), ceftarolina o tigeciclina. La daptomicina es de elecci\u00f3n para bacteriemia/endocarditis por S. aureus, pero NO para infecci\u00f3n pulmonar.","ai":false,"noShuffle":false,"img":null},{"n":"am8","q":"Var\u00f3n de 67 a\u00f1os con polimialgia reum\u00e1tica (prednisona 10 mg/dia) e insuficiencia renal cr\u00f3nica. Le prescriben un antibi\u00f3tico por fiebre y expectoraci\u00f3n purulenta. Una semana despu\u00e9s desarrolla dolor intenso en el tal\u00f3n e incapacidad para la dorsiflexi\u00f3n del tobillo. Que antibi\u00f3tico le habian prescrito:","o":["Cefditoren","Telitromicina","Moxifloxacino","Cefixima"],"c":3,"e":"El cuadro es una TENDINITIS/ROTURA DEL TEND\u00d3N DE AQUILES, efecto adverso caracter\u00edstico de las FLUOROQUINOLONAS. El MOXIFLOXACINO es una fluoroquinolona respiratoria. El riesgo de tendinopat\u00eda por fluoroquinolonas aumenta con: edad avanzada, uso concomitante de CORTICOIDES (prednisona) e insuficiencia renal.","ai":false,"noShuffle":false,"img":null},{"n":"am9","q":"Mujer de 25 a\u00f1os con pielonefritis inicia cefotaxima emp\u00edrica. A las 24h contin\u00faa con fiebre y se a\u00edsla E. coli productor de BLEE en hemocultivos. Que actitud tomar\u00eda:","o":["Sustituir\u00eda cefotaxima por ertapenem","Mantendr\u00eda cefotaxima","Sustituir\u00eda cefotaxima por tigeciclina","Sustituir\u00eda cefotaxima por ceftazidima"],"c":1,"e":"Las cepas de E. coli productoras de BLEE son RESISTENTES a TODAS las cefalosporinas. El tratamiento de elecci\u00f3n son los CARBAPEN\u00c9MICOS. Para infecciones urinarias por BLEE se usa ERTAPENEM (activo frente a enterobacterias BLEE, no antipseudom\u00f3nico). La tigeciclina tiene limitada excreci\u00f3n urinaria. La ceftazidima tambi\u00e9n es susceptible a las BLEE.","ai":false,"noShuffle":false,"img":null},{"n":"am10","q":"Una de las siguientes afirmaciones en relaci\u00f3n con el tratamiento de las infecciones estafiloc\u00f3cicas es FALSA:","o":["Oxacilina y cloxacilina son penicilinas resistentes a betalactamasas","Ning\u00fan beta-lact\u00e1mico presenta actividad frente a las cepas de SARM","Dentro de las indicaciones de los glucop\u00e9ptidos encontramos cocos grampositivos incluyendo listeria y estafilococo","Daptomicina tiene actividad bactericida frente a S. aureus incluyendo SARM"],"c":2,"e":"Es FALSO que ning\u00fan beta-lact\u00e1mico sea activo frente a SARM. La CEFTAROLINA (cefalosporina de 5a generaci\u00f3n) S\u00cd tiene actividad frente a SARM, pues tiene alta afinidad por la PBP2a alterada que confiere la resistencia. Tambi\u00e9n ceftobiprole. Afirmar que ning\u00fan beta-lact\u00e1mico cubre SARM es incorrecto con las nuevas cefalosporinas anti-SARM.","ai":false,"noShuffle":false,"img":null},{"n":"am11","q":"El antiv\u00edrico de elecci\u00f3n en la encefalitis aguda con afectaci\u00f3n de la regi\u00f3n basal de los l\u00f3bulos temporales cerebrales es:","o":["Arodutamidona","Ganciclovir","Aciclovir","Ribavirina"],"c":3,"e":"La afectaci\u00f3n de los L\u00d3BULOS TEMPORALES BASALES es el patr\u00f3n caracter\u00edstico de la ENCEFALITIS HERP\u00c9TICA por VHS-1. Es la encefalitis espor\u00e1dica m\u00e1s frecuente en pa\u00edses desarrollados. Tratamiento de elecci\u00f3n: ACICLOVIR IV (10 mg/kg/8h durante 14-21 dias). El ganciclovir se usa para CMV. Diagn\u00f3stico: PCR de VHS en LCR m\u00e1s RM.","ai":false,"noShuffle":false,"img":null},{"n":"am12","q":"Son an\u00e1logos de nucle\u00f3sidos, EXCEPTO:","o":["Foscarnet","Lamivudina","Entecavir","Aciclovir"],"c":1,"e":"El FOSCARNET (\u00e1cido fosfonof\u00f3rmico) es un AN\u00c1LOGO DEL PIROFOSFATO, no de un nucle\u00f3sido. Act\u00faa inhibiendo directamente la ADN-polimerasa viral y la transcriptasa inversa sin necesidad de fosforilaci\u00f3n celular previa. Es \u00fatil en infecciones por CMV resistente a ganciclovir. Lamivudina, entecavir y aciclovir S\u00cd son an\u00e1logos de nucle\u00f3sidos.","ai":false,"noShuffle":false,"img":null},{"n":"am13","q":"Se\u00f1ale la respuesta INCORRECTA sobre las equinocandinas:","o":["Las equinocandinas se utilizan para el tratamiento de la aspergilosis invasora","La caspofungina es eficaz en la candidiasis esof\u00e1gica","Las equinocandinas se utilizan en combinaci\u00f3n para el tratamiento de los hongos resistentes","La caspofungina es eficaz en la mucormicosis"],"c":4,"e":"Las equinocandinas (caspofungina, micafungina, anidulafungina) NO tienen actividad frente a MUCORMICOSIS. Su tratamiento requiere anfotericina B liposomal m\u00e1s posaconazol o isavuconazol. Las equinocandinas S\u00cd son activas frente a Aspergillus (segunda l\u00ednea tras voriconazol) y son de primera l\u00ednea para candidiasis incluyendo esof\u00e1gica grave.","ai":false,"noShuffle":false,"img":null},{"n":"am14","q":"Se\u00f1ale la incorrecta sobre los antif\u00fangicos:","o":["Las equinocandinas son activas contra las c\u00e1ndidas resistentes a azoles","El fluconazol puede utilizarse por v\u00eda oral o IV","La anfotericina actualmente se utiliza en forma de presentaci\u00f3n lip\u00eddica","El fluconazol es eficaz para tratar las infecciones por Candida auris"],"c":4,"e":"FALSO: el fluconazol NO es eficaz para Candida auris. Esta levadura emergente se caracteriza por su resistencia intr\u00ednseca al fluconazol (m\u00e1s del 90% de cepas resistentes) y frecuente multirresistencia. Las equinocandinas son el tratamiento de elecci\u00f3n para C. auris.","ai":false,"noShuffle":false,"img":null},{"n":"am15","q":"Se\u00f1ale la incorrecta respecto a los antif\u00fangicos:","o":["El fluconazol puede utilizarse por v\u00eda oral o IV","La anfotericina actualmente se utiliza en forma de presentaci\u00f3n lip\u00eddica","Las equinocandinas son efectivas para aspergilosis pulmonar","El voriconazol es eficaz contra mucormicosis"],"c":4,"e":"El VORICONAZOL no es eficaz contra la mucormicosis y puede ser perjudicial. El tratamiento de la mucormicosis es anfotericina B liposomal m\u00e1s posaconazol o isavuconazol. Las equinocandinas tienen cierta actividad frente a Aspergillus (segunda l\u00ednea) pero no son el primer escal\u00f3n.","ai":false,"noShuffle":false,"img":null},{"n":"am16","q":"Cu\u00e1l de las siguientes combinaciones entre micosis y tratamiento antif\u00fangico es INCORRECTA:","o":["Aspergilosis pulmonar invasora: voriconazol","Mucormicosis en paciente con toxicidad por anfotericina B: posaconazol","Esofagitis por Candida krusei: fluconazol","Histoplasmosis diseminada: anfotericina B"],"c":3,"e":"INCORRECTA: Candida krusei (Pichia kudriavzevii) es INTR\u00cdNSECAMENTE RESISTENTE al fluconazol. El tratamiento de la candidiasis por C. krusei requiere equinocandinas o voriconazol. Las otras opciones son correctas: voriconazol = primera l\u00ednea aspergilosis invasora; posaconazol = alternativa en mucormicosis; anfotericina B = de elecci\u00f3n en histoplasmosis diseminada grave.","ai":false,"noShuffle":false,"img":null}],"bacterias":[{"n":"ba1","q":"Respecto a la epidemiolog\u00eda de la tularemia, se\u00f1ale la respuesta CORRECTA:","o":["Es t\u00edpica de los pa\u00edses mediterr\u00e1neos","Afecta con especial frecuencia al ganado vacuno","Se transmite por inhalaci\u00f3n exclusivamente","Es producida por el germen Brucella melitensis","Es una zoonosis poco frecuente en Espa\u00f1a"],"c":5,"e":"La tularemia (Francisella tularensis) es una zoonosis poco frecuente en Espa\u00f1a. Es m\u00e1s t\u00edpica de pa\u00edses escandinavos y Am\u00e9rica del Norte (no mediterr\u00e1neos). Afecta principalmente a animales SILVESTRES (liebres, conejos, roedores), no al ganado vacuno. El agente causal es F. tularensis, no Brucella.","ai":false,"noShuffle":false,"img":null},{"n":"ba2","q":"Respecto a la tularemia, se\u00f1ale la respuesta FALSA:","o":["Es t\u00edpica de pa\u00edses escandinavos","La transmiten insectos hemat\u00f3fagos como los t\u00e1banos","Suele afectar mayoritariamente a animales silvestres","El germen causante apenas vive unas pocas horas a la intemperie","El germen pertenece al G\u00e9nero Francisella"],"c":4,"e":"Es FALSO que F. tularensis viva solo unas pocas horas a la intemperie. Al contrario, es MUY RESISTENTE en el ambiente: puede sobrevivir semanas en agua fr\u00eda, en cad\u00e1veres de animales y en el hielo. Esta alta resistencia ambiental la hace peligrosa como potencial agente de bioterrorismo (clasificada como agente Categor\u00eda A por el CDC).","ai":false,"noShuffle":false,"img":null},{"n":"ba3","q":"Respecto a la epidemiolog\u00eda de la PESTE, se\u00f1ale la respuesta FALSA:","o":["La peste es una zoonosis","Los vectores suelen ser roedores y pulgas","La bacteria causante es Yersinia pestis","Es una enfermedad t\u00edpica de las zonas del Norte de Europa","La peste es potencialmente letal"],"c":4,"e":"FALSO: la peste NO es t\u00edpica del Norte de Europa. Y. pestis afecta principalmente a Asia Central, \u00c1frica subsahariana (especialmente Madagascar), y focos en Am\u00e9rica del Sur. Las pulgas de las ratas (Xenopsylla cheopis) son el vector cl\u00e1sico de la forma bub\u00f3nica.","ai":false,"noShuffle":false,"img":null},{"n":"ba4","q":"Respecto al CARBUNCO, se\u00f1ale la respuesta FALSA:","o":["El carbunco es producido por Bacillus anthracis","Representa el t\u00edpico germen utilizado por el bioterrorismo","No produce esporas","Es extremadamente infeccioso","Las manifestaciones iniciales son generales"],"c":3,"e":"Es FALSO que B. anthracis no produzca esporas. La ESPOROG\u00c9NESIS es la caracter\u00edstica m\u00e1s importante: las esporas son extremadamente resistentes (sobreviven d\u00e9cadas en el suelo), pueden aerosolizarse (carbunco inhalatorio, la forma m\u00e1s mortal con mortalidad mayor del 80% sin tratamiento), y son la base de su uso como arma biol\u00f3gica.","ai":false,"noShuffle":false,"img":null},{"n":"ba5","q":"Respecto al T\u00c9TANOS, se\u00f1ale la FALSA:","o":["Es una enfermedad neuroparalizante","Est\u00e1 producida por una toxina del bacilo Clostridium botulinum","Provoca una par\u00e1lisis esp\u00e1stica ascendente sin manifestaciones sensitivas","Se inicia como neuropat\u00eda craneal bilateral"],"c":2,"e":"FALSO: el t\u00e9tanos est\u00e1 producido por la TETANOSPASMINA de Clostridium TETANI, NO de C. botulinum. C. botulinum produce la toxina botul\u00ednica. La cl\u00ednica es opuesta: el t\u00e9tanos causa espasmos ESP\u00c1STICOS (trismus, opist\u00f3tonos), mientras que el botulismo causa par\u00e1lisis FL\u00c1CCIDA DESCENDENTE.","ai":false,"noShuffle":false,"img":null},{"n":"ba6","q":"La Difteria es una enfermedad infecto-contagiosa reemergente. Se\u00f1ale la FALSA (sobre la notificaci\u00f3n):","o":["El germen responsable es Corynebacterium diphtheriae, bacilo grampositivo","La notificaci\u00f3n de la enfermedad es necesaria pero no debe ser urgente ni individualizada","El signo caracter\u00edstico es la membrana espesa gris que cubre la parte posterior de la garganta","En la actualidad ya disponemos de vacuna"],"c":2,"e":"FALSO: la notificaci\u00f3n de la difteria S\u00cd debe ser URGENTE e INDIVIDUALIZADA. Es una EDO de notificaci\u00f3n urgente en Espa\u00f1a. Un caso obliga a: notificaci\u00f3n inmediata a Salud P\u00fablica, investigaci\u00f3n de contactos, quimioprofilaxis a contactos (eritromicina o penicilina) y verificaci\u00f3n del estado vacunal.","ai":false,"noShuffle":false,"img":null},{"n":"ba7","q":"La Difteria es una enfermedad infecto-contagiosa reemergente. Se\u00f1ale la FALSA (sobre el agente causal):","o":["El reservorio es el hombre","El germen responsable es el Corynebacterium diphtheriae","El signo caracter\u00edstico es la membrana espesa gris que cubre la parte posterior de la garganta","Es un bacilo gramnegativo aerobio facultativo"],"c":4,"e":"FALSO: Corynebacterium diphtheriae es un bacilo GRAMPOSITIVO (no gramnegativo). Se caracteriza por morfolog\u00eda en letras chinas o empalizada en la tinci\u00f3n de Gram, aerobio, no esporulado, no m\u00f3vil. La patogenicidad se debe a la TOXINA DIFT\u00c9RICA (codificada por un bacteri\u00f3fago lisog\u00e9nico) que inhibe la s\u00edntesis proteica por ADP-ribosilaci\u00f3n del factor de elongaci\u00f3n EF-2.","ai":false,"noShuffle":false,"img":null},{"n":"ba8","q":"Se\u00f1ale la FALSA respecto al BOTULISMO transmitido por alimentos:","o":["Es una enfermedad neuroparalizante","La toxina afecta a la uni\u00f3n neuromuscular a nivel presin\u00e1ptico inhibiendo la liberaci\u00f3n de acetilcolina","Provoca midriasis arreactiva, visi\u00f3n borrosa y sequedad bucofar\u00edngea","La debilidad es descendente y ASIM\u00c9TRICA"],"c":4,"e":"FALSO: la debilidad en el botulismo es DESCENDENTE pero SIM\u00c9TRICA (bilateral). Comienza en la musculatura craneal (diplopia, ptosis, disfagia, disartria) y desciende sim\u00e9tricamente hasta el paro respiratorio. La ASIMETR\u00cdA no es caracter\u00edstica del botulismo. La toxina botul\u00ednica bloquea la exocitosis de acetilcolina en la placa neuromuscular de forma irreversible.","ai":false,"noShuffle":false,"img":null},{"n":"ba9","q":"Se entiende por bacteri\u00f3fagos (pregunta MIR 2006-2007):","o":["Bacterias que ingieren otras bacterias","Par\u00e1sitos que ingieren bacterias","Virus que se multiplican en bacterias","Bacterias que producen lisis en cultivos de tejidos celulares"],"c":3,"e":"Los BACTERI\u00d3FAGOS (fagos) son VIRUS que infectan y se replican en bacterias. Son los organismos m\u00e1s abundantes en la Tierra. En microbiolog\u00eda m\u00e9dica median la transferencia horizontal de genes (transducci\u00f3n), incluyendo genes de virulencia y resistencia antibi\u00f3tica. La toxina dift\u00e9rica, la toxina botul\u00ednica A y las exotoxinas pirog\u00e9nicas del estreptococo est\u00e1n codificadas por bacteri\u00f3fagos.","ai":false,"noShuffle":false,"img":null},{"n":"ba10","q":"El vector que transmite el paludismo o la malaria es:","o":["Flebotomos","Vinchuca","Mosca tse-tse","Mosquito Anopheles"],"c":4,"e":"El MOSQUITO ANOPHELES (hembra) es el \u00fanico vector del paludismo. Otros vectores: Flebotomos a leishmaniasis; Vinchuca a enfermedad de Chagas; Mosca tse-tse a tripanosomiasis africana; Mosquito Aedes a dengue, Zika, fiebre amarilla; Garrapata Ixodes a enfermedad de Lyme; Rhipicephalus sanguineus a fiebre botonosa mediterr\u00e1nea.","ai":false,"noShuffle":false,"img":null},{"n":"ba11","q":"Hemocultivos positivos para cocos gram positivos en racimo coagulasa negativos. De cu\u00e1l de los siguientes microorganismos es m\u00e1s probable:","o":["S. pyogenes","S. pneumoniae","S. epidermidis","S. aureus"],"c":3,"e":"Los estafilococos coagulasa-NEGATIVOS (SCN) m\u00e1s frecuentes en hemocultivos son S. epidermidis, S. haemolyticus y S. hominis. S. epidermidis es el m\u00e1s frecuente. S. aureus es coagulasa-POSITIVO. S. pyogenes y S. pneumoniae son estreptococos. Los SCN son causa frecuente de bacteriemia relacionada con cat\u00e9ter e infecci\u00f3n de pr\u00f3tesis.","ai":false,"noShuffle":false,"img":null},{"n":"ba12","q":"Qu\u00e9 no se considera zona est\u00e9ril del organismo:","o":["Sangre","Est\u00f3mago","L\u00edquido cefalorraqu\u00eddeo","Vejiga"],"c":2,"e":"El EST\u00d3MAGO no es una zona est\u00e9ril: aunque el \u00e1cido g\u00e1strico reduce la carga bacteriana, alberga Helicobacter pylori, lactobacilos, etc. Zonas normalmente EST\u00c9RILES: sangre, LCR, orina vesical, l\u00edquido pleural, peritoneal y sinovial. El aislamiento de microorganismos en cualquiera de estas zonas est\u00e9riles es siempre patol\u00f3gico.","ai":false,"noShuffle":false,"img":null},{"n":"ba13","q":"Respecto a las bacterias GRAM NEGATIVAS, se\u00f1ale la asociaci\u00f3n INCORRECTA:","o":["Fermentadores en Agar MacConkey - Klebsiella","Diplococos - Neisseria","No fermentadores en Agar MacConkey - E. coli","Cocobacilos - H. influenzae"],"c":3,"e":"INCORRECTA: E. coli es una bacteria FERMENTADORA de la lactosa y produce colonias ROSAS en agar MacConkey. Las bacterias no-fermentadoras en MacConkey (colonias incoloras) incluyen: Pseudomonas aeruginosa, Acinetobacter. Klebsiella S\u00cd es fermentadora (colonias mucosas rosas). Neisseria = diplococos gramnegativos. H. influenzae = cocobacilos gramnegativos pleom\u00f3rficos.","ai":false,"noShuffle":false,"img":null},{"n":"ba14","q":"Cu\u00e1l de los siguientes es un estreptococo ALFA-HEMOL\u00cdTICO:","o":["S. pneumoniae","S. pyogenes","S. agalactiae","E. faecalis"],"c":1,"e":"S. pneumoniae es ALFA-HEMOL\u00cdTICO: produce hem\u00f3lisis parcial con halo verdoso en agar sangre. Tambi\u00e9n son alfa-hemol\u00edticos los Streptococcus del grupo viridans. BETA-HEMOL\u00cdTICOS (hem\u00f3lisis completa, halo claro): S. pyogenes (grupo A) y S. agalactiae (grupo B). GAMMA-HEMOL\u00cdTICOS (sin hem\u00f3lisis): Enterococcus faecalis/faecium. Mnemot\u00e9cnica: alfa=verde, beta=completa, gamma=nada.","ai":false,"noShuffle":false,"img":null}],"tbc":[{"n":"tb1","q":"Cu\u00e1l es la primera opci\u00f3n de tratamiento en paciente con TBC pulmonar sin conocer las resistencias:","o":["HP x 2 meses y HPRE x 4 meses","HR x 2 meses y HPRE x 4 meses","PEH x 2 meses y HPR x 4 meses","HRZE x 2 meses y HR x 4 meses"],"c":4,"e":"El tratamiento est\u00e1ndar de la TBC pulmonar es HRZE (Isoniazida m\u00e1s Rifampicina m\u00e1s Pirazinamida m\u00e1s Etambutol) durante 2 meses de fase intensiva m\u00e1s HR (Isoniazida m\u00e1s Rifampicina) durante 4 meses de fase de consolidaci\u00f3n. Total 6 meses. El etambutol se incluye en la fase intensiva para prevenir la selecci\u00f3n de mutantes resistentes hasta conocer el antibiograma.","ai":false,"noShuffle":false,"img":null},{"n":"tb2","q":"Respecto a la tuberculosis, es FALSO que:","o":["Puede acompa\u00f1arse de monocitosis sangu\u00ednea","En la pleuritis la prueba de Mantoux es negativa con frecuencia","Una forma de tuberculosis cut\u00e1nea es el lupus vulgaris","La manifestaci\u00f3n m\u00e1s frecuente de los tuberculomas cerebrales es la epilepsia","El derrame pleural tuberculoso presenta abundancia de c\u00e9lulas mesoteliales"],"c":5,"e":"FALSO: el derrame pleural tuberculoso se caracteriza por la AUSENCIA de c\u00e9lulas mesoteliales (caracter\u00edstica diagn\u00f3stica importante). El l\u00edquido pleural en la TBC es un EXUDADO LINFOCITARIO (m\u00e1s del 70% linfocitos) con ADA (adenosina desaminasa) elevada. La PRESENCIA de c\u00e9lulas mesoteliales orienta hacia otras etiolog\u00edas (maligna, cardiaca).","ai":false,"noShuffle":false,"img":null},{"n":"tb3","q":"Respecto a la tuberculosis MILIAR, NO es cierto que:","o":["La prueba Mantoux suele ser negativa","Los tub\u00e9rculos coroideos son frecuentes","La radiograf\u00eda de t\u00f3rax con frecuencia es normal","Es m\u00e1s frecuente en inmunodeprimidos","Es poco contagiosa"],"c":3,"e":"NO ES CIERTO que la Rx de t\u00f3rax sea normal en la TBC miliar. La TBC miliar se caracteriza por el PATR\u00d3N MILIAR cl\u00e1sico: m\u00faltiples micron\u00f3dulos de 1-3mm de distribuci\u00f3n difusa bilateral (imagen en grano de mijo). El Mantoux S\u00cd puede ser negativo (anergia). La TBC miliar es POCO CONTAGIOSA porque no produce cavernas pulmonares (principal fuente de transmisi\u00f3n a\u00e9rea).","ai":false,"noShuffle":false,"img":null},{"n":"tb4","q":"Respecto a las distintas formas cl\u00ednicas de tuberculosis, se\u00f1ale la respuesta FALSA:","o":["La meningitis cursa de forma subaguda y con lesi\u00f3n de pares craneales como complicaci\u00f3n","La tuberculosis vertebral es m\u00e1s frecuentemente dorsal","La forma urinaria cursa con piuria est\u00e9ril","Las adenopat\u00edas no son dolorosas","La afecci\u00f3n intestinal m\u00e1s frecuente es duodeno-yeyunal"],"c":5,"e":"FALSO: la afecci\u00f3n intestinal m\u00e1s frecuente en la tuberculosis es el \u00cdLEON DISTAL y el CIEGO (zona ileocecal), no el duodeno-yeyuno. En esa zona hay mayor concentraci\u00f3n de tejido linfoide (placas de Peyer) y mayor absorci\u00f3n de bacilos. La TBC duodeno-yeyunal existe pero es poco frecuente.","ai":false,"noShuffle":false,"img":null},{"n":"tb5","q":"El diagn\u00f3stico de INFECCI\u00d3N tuberculosa latente (no enfermedad activa) se establece principalmente mediante:","o":["Prueba de tuberculina (Mantoux) o IGRA","Radiograf\u00eda de t\u00f3rax","Estudio histol\u00f3gico de material de biopsia","Estudio microbiol\u00f3gico de muestra cl\u00ednica","Cultivo de BAAR en orina si no hay lesi\u00f3n localizada"],"c":1,"e":"El diagn\u00f3stico de INFECCI\u00d3N TUBERCULOSA LATENTE (ITL) se establece mediante la PRUEBA DE TUBERCULINA (Mantoux/PPD) o los IGRA (QuantiFERON-TB Gold Plus o T-SPOT.TB). Estas pruebas detectan la respuesta inmune celular pero NO distinguen infecci\u00f3n activa de latente. La Rx de t\u00f3rax, biopsia y microbiolog\u00eda son para diagnosticar ENFERMEDAD tuberculosa activa.","ai":false,"noShuffle":false,"img":null},{"n":"tb6","q":"Entre las causas de falsos negativos en la prueba de Mantoux se encuentran todas EXCEPTO:","o":["Fase preal\u00e9rgica de la primoinfecci\u00f3n","Tratamiento antituberculoso correcto con curaci\u00f3n","Edad avanzada","Uso de esteroides","Enfermedad de Hodgkin"],"c":2,"e":"El tratamiento antituberculoso correcto con curaci\u00f3n NO provoca falso negativo en el Mantoux: los pacientes curados MANTIENEN la positividad del Mantoux durante a\u00f1os o d\u00e9cadas. Causas de falso negativo del Mantoux: fase preal\u00e9rgica (primeras 2-10 semanas), inmunosupresi\u00f3n (esteroides, VIH, linfomas como Hodgkin, desnutrici\u00f3n), edad avanzada (anergia), infecciones agudas graves (sarampi\u00f3n), t\u00e9cnica incorrecta.","ai":false,"noShuffle":false,"img":null},{"n":"tb7","q":"Paciente de 45 a\u00f1os con TBC pulmonar, segundo episodio, resistencia a isoniazida identificada. El mejor tratamiento es:","o":["Rifampicina, isoniazida, pirazinamida y etambutol durante 18 meses","Rifampicina, pirazinamida, etambutol y levofloxacino durante 6 meses","Rifampicina, bedaquilina y proteonamida durante 12 meses","Rifampicina, etambutol, pirazinamida y linezolid durante 3 meses"],"c":2,"e":"Con RESISTENCIA A ISONIAZIDA, el r\u00e9gimen debe excluir la isoniazida y a\u00f1adir una FLUOROQUINOLONA. La opci\u00f3n B (rifampicina m\u00e1s pirazinamida m\u00e1s etambutol m\u00e1s LEVOFLOXACINO durante 6 meses) es el esquema recomendado por OMS para TBC mono-resistente a isoniazida. Mantener isoniazida cuando hay resistencia comprobada seleccionar\u00eda m\u00e1s resistencias.","ai":false,"noShuffle":false,"img":null},{"n":"tb8","q":"Paciente con VIH (CD4 40 cel/uL) inicia TARV. A las 3 semanas desarrolla fiebre, adenopat\u00edas cervicales y mediast\u00ednicas. CD4 sube a 77, carga viral baja. Mantoux negativo. Cu\u00e1l es el diagn\u00f3stico m\u00e1s probable:","o":["Tuberculosis ganglionar como s\u00edndrome de reconstituci\u00f3n inmune","Linfoma de alto grado","Reacci\u00f3n adversa al tratamiento antirretroviral","Criptococosis sist\u00e9mica","Infecci\u00f3n por Pneumocystis jirovecii"],"c":1,"e":"El cuadro es cl\u00e1sico del S\u00cdNDROME DE RECONSTITUCI\u00d3N INMUNE (SRI): el TARV produce aumento de CD4 y reducci\u00f3n de la carga viral, desencadenando respuesta inflamatoria exagerada frente a infecciones latentes previas (en este caso TB ganglionar). Es la causa m\u00e1s frecuente de SRI. Aparece en las 4-8 semanas tras inicio del TARV.","ai":false,"noShuffle":false,"img":null},{"n":"tb9","q":"En el diagn\u00f3stico de la espondilodiscitis infecciosa, se\u00f1ale la INCORRECTA:","o":["La RMN es de elecci\u00f3n sobre todo en las fases iniciales","Se objetiva erosi\u00f3n y destrucci\u00f3n de los cuerpos vertebrales","La espondilodiscitis tuberculosa (Mal de Pott) afecta sobre todo la v\u00e9rtebra anterosuperior","Es la afectaci\u00f3n m\u00e1s frecuente de la tuberculosis osteoarticular","La RMN vertebral eval\u00faa adem\u00e1s el componente neurol\u00f3gico"],"c":3,"e":"INCORRECTA: el Mal de Pott (TBC vertebral) afecta preferentemente la REGI\u00d3N ANTEROINFERIOR del cuerpo vertebral (\u00e1ngulo anteroinferior), no la anterosuperior. La infecci\u00f3n se origina en la regi\u00f3n subligamentosa anterior y se extiende al disco intervertebral. La columna DORSAL es la m\u00e1s afectada. La RMN es la prueba de imagen de elecci\u00f3n.","ai":false,"noShuffle":false,"img":null},{"n":"tb10","q":"Cu\u00e1l es el tratamiento inicial m\u00e1s adecuado de la tuberculosis pulmonar en paciente inmunocompetente sin conocer resistencias:","o":["Isoniazida, pirazinamida, rifampicina y etambutol los primeros 2 meses m\u00e1s isoniazida y rifampicina 4 meses m\u00e1s","Isoniazida, pirazinamida y rifampicina durante 4 meses m\u00e1s pirazinamida y etambutol 2 meses m\u00e1s","Isoniazida, pirazinamida, rifampicina y etambutol los primeros 4 meses m\u00e1s isoniazida y rifampicina 2 meses m\u00e1s","Isoniazida y rifampicina durante 2 meses m\u00e1s isoniazida, pirazinamida y etambutol 4 meses m\u00e1s"],"c":1,"e":"El tratamiento est\u00e1ndar es HRZE durante 2 meses de fase INTENSIVA m\u00e1s HR durante 4 meses de fase de CONSOLIDACI\u00d3N. Total: 6 meses. El etambutol se incluye en la fase intensiva para cubrir la posibilidad de resistencia inicial no conocida a isoniazida. En meningitis TBC la duraci\u00f3n es 12 meses.","ai":false,"noShuffle":false,"img":null},{"n":"tb11","q":"Hombre de 25 a\u00f1os, ADVP, sale de la c\u00e1rcel. PPD con 10mm de induraci\u00f3n, hace un a\u00f1o era negativo. Asintom\u00e1tico, VIH negativo, Rx t\u00f3rax normal. Qu\u00e9 actitud es m\u00e1s adecuada:","o":["No realizar tratamiento y control anual de Radiograf\u00eda","Cultivo de esputo para micobacterias y tratar solo si son positivos","Isoniazida durante 6 meses","Tratamiento con 4 drogas 4 meses"],"c":3,"e":"Este paciente tiene CONVERSI\u00d3N tubercul\u00ednica reciente (de negativo a 10mm en 1 a\u00f1o) y es ADVP, grupo de riesgo para TBC. Conversi\u00f3n reciente m\u00e1s grupo de riesgo es indicaci\u00f3n de tratamiento de la INFECCI\u00d3N TUBERCULOSA LATENTE con ISONIAZIDA durante 6-9 meses. Con Rx t\u00f3rax normal no hay enfermedad activa: no se necesitan 4 f\u00e1rmacos.","ai":true,"imp":true,"noShuffle":false,"img":null},{"n":"tb12","q":"Paciente de 23 a\u00f1os con tuberculosis miliar. Uno de los siguientes asertos NO es correcto:","o":["Es m\u00e1s frecuente en pacientes inmunodeprimidos","Con frecuencia cursa con un Mantoux negativo","El riesgo de transmisi\u00f3n es muy elevado","La Rx de t\u00f3rax puede ser normal en fases iniciales precoces"],"c":3,"e":"NO es correcto que el riesgo de transmisi\u00f3n sea muy elevado. La TBC miliar es POCO CONTAGIOSA porque no suele producir cavernas pulmonares (fuente principal de transmisi\u00f3n a\u00e9rea). El Mantoux S\u00cd puede ser negativo (anergia). La Rx de t\u00f3rax con patr\u00f3n miliar puede tardar en hacerse visible.","ai":false,"noShuffle":false,"img":null},{"n":"tb13","q":"Se\u00f1ale cu\u00e1l de las siguientes afirmaciones en relaci\u00f3n con la tuberculosis es FALSA:","o":["Durante la enfermedad activa en el interior de los macr\u00f3fagos los bacilos se replican lentamente por el medio anaerobio y pH \u00e1cido","El PPD empleado en el Mantoux presenta ant\u00edgenos compartidos por distintas especies de Mycobacterium","Una respuesta de la inmunidad celular con s\u00edntesis predominante de IL-4 e IL-10 es protectora frente al desarrollo de la enfermedad","El m\u00e1ximo riesgo de reactivaci\u00f3n de una infecci\u00f3n tuberculosa latente tiene lugar durante los dos primeros a\u00f1os tras la primoinfecci\u00f3n"],"c":3,"e":"FALSA: la respuesta Th2 (IL-4, IL-10, IL-13) NO es protectora frente a la TBC, sino que FAVORECE la susceptibilidad y progresi\u00f3n de la enfermedad. La respuesta PROTECTORA es la Th1 (IFN-gamma, IL-12, TNF-alfa), que activa la micobacteri\u00f3lisis en los macr\u00f3fagos.","ai":false,"noShuffle":false,"img":null},{"n":"tb14","q":"Uno de los siguientes escenarios NO estar\u00eda indicado en el tratamiento de la infecci\u00f3n tuberculosa latente (IGRA positivo):","o":["Paciente con enfermedad renal cr\u00f3nica","Paciente con enfermedad de Crohn que va a iniciar golimumab (anti-TNF)","Paciente con 85 a\u00f1os con una caverna residual estable en la Rx de t\u00f3rax","Sujeto de 56 a\u00f1os sin antecedentes que hace 4 a\u00f1os presentaba un Mantoux negativo"],"c":4,"e":"El sujeto de 56 a\u00f1os sin factores de riesgo espec\u00edficos, IGRA positivo pero sin conversi\u00f3n reciente documentada ni inmunosupresi\u00f3n planificada, no tiene indicaci\u00f3n clara de tratar la ITL: el balance riesgo-beneficio de la isoniazida (hepatotoxicidad) puede no ser favorable. Las otras opciones S\u00cd son indicaciones: IRC, anti-TNF (inmunosupresor mayor) y caverna residual.","ai":false,"noShuffle":false,"img":null},{"n":"tb15","q":"Padre con TBC pulmonar activa (baciloscopia positiva). Su hija de 7 a\u00f1os tiene Mantoux de 2mm (negativo). Qu\u00e9 conducta seguir\u00eda:","o":["Tranquilizar\u00eda al padre: con Mantoux negativo el riesgo es remoto","No administrar\u00eda isoniazida y repetir\u00eda el Mantoux a los 2 meses. Si positivo: placa y baciloscopia y si negativas isoniazida 9 meses","No administrar\u00eda isoniazida y repetir\u00eda el Mantoux a los 2 meses. Si positivo: isoniazida 9 meses","Comenzar\u00eda isoniazida y repetir\u00eda el Mantoux a los 2 meses. Si negativo: suspender. Si positivo: descartar enfermedad activa y mantener isoniazida hasta completar 9 meses"],"c":4,"e":"En ni\u00f1os peque\u00f1os menores de 5 a\u00f1os contactos \u00edntimos de caso \u00edndice bacil\u00edfero, se INICIA PROFILAXIS CON ISONIAZIDA aunque el Mantoux sea negativo inicialmente (per\u00edodo ventana de 2-10 semanas). A los 2 meses se repite: si NEGATIVO, suspender; si POSITIVO, descartar enfermedad activa (Rx t\u00f3rax, baciloscopia) y si negativas mantener isoniazida hasta completar 9 meses. Conducta de las gu\u00edas espa\u00f1olas.","ai":false,"noShuffle":false,"img":null}],"rickettsia_myco":[{"n":"ri1","q":"Mujer de 28 a\u00f1os con fiebre, cefalea, escara negra con halo eritematoso y exantema con afectaci\u00f3n palmoplantar. La etiolog\u00eda m\u00e1s probable es:","o":["Sepsis meningoc\u00f3cica","Rickettsia conorii","Sarampi\u00f3n","Primoinfecci\u00f3n por VIH"],"c":2,"e":"La TR\u00cdADA cl\u00e1sica de la fiebre botonosa mediterr\u00e1nea (R. conorii) es: (1) FIEBRE elevada, (2) ESCARA de inoculaci\u00f3n (tache noire) en la zona de picadura de garrapata y (3) EXANTEMA maculopapular que afecta a palmas y plantas. La sepsis meningoc\u00f3cica produce petequias/p\u00farpura. El sarampi\u00f3n no tiene escara. La primoinfecci\u00f3n VIH da exantema sin escara.","ai":false,"noShuffle":false,"img":null},{"n":"ri2","q":"En cu\u00e1l de las siguientes entidades cl\u00ednicas el hospedador es el ser humano:","o":["Tifus epid\u00e9mico","Tifus murino","Tifus de los matorrales","Fiebre botonosa"],"c":1,"e":"En el TIFUS EPID\u00c9MICO (Rickettsia prowazekii), el SER HUMANO es tanto el RESERVORIO como el hospedador. El vector es el piojo del cuerpo (Pediculus humanus corporis). En el tifus murino, el reservorio es la rata y el vector la pulga de rata. En la fiebre botonosa, el reservorio es el perro y el vector R. sanguineus.","ai":false,"noShuffle":false,"img":null},{"n":"ri3","q":"Cu\u00e1l es el artr\u00f3podo que act\u00faa como vector de la fiebre botonosa mediterr\u00e1nea:","o":["Rhipicephalus sanguineus","Ixodes ricinus","Dermacentor spp","Amblyomma americanum"],"c":1,"e":"El RHIPICEPHALUS SANGUINEUS (garrapata parda del perro) es el vector de la fiebre botonosa mediterr\u00e1nea (Rickettsia conorii). Ixodes ricinus transmite la enfermedad de Lyme (Borrelia burgdorferi). Dermacentor spp transmite la fiebre de las Monta\u00f1as Rocosas en Am\u00e9rica. Amblyomma americanum transmite erliquiosis en EE.UU.","ai":false,"noShuffle":false,"img":null},{"n":"ri4","q":"Mujer de 46 a\u00f1os de La Mancha, agosto, con lesiones cut\u00e1neas que tambi\u00e9n afectan a palmas y plantas, y m\u00e1cula necr\u00f3tica negruzca. Cu\u00e1l es el agente etiol\u00f3gico m\u00e1s probable:","o":["Treponema pallidum","Bartonella henselae","Borrelia burgdorferi","Rickettsia conorii"],"c":4,"e":"RICKETTSIA CONORII: el contexto epidemiol\u00f3gico (Espa\u00f1a mediterr\u00e1nea, agosto = pico de actividad de garrapatas) m\u00e1s exantema con afectaci\u00f3n palmoplantar m\u00e1s escara negra (tache noire) es diagn\u00f3stico de fiebre botonosa mediterr\u00e1nea. La s\u00edfilis secundaria da exantema palmoplantar pero sin escara. Borrelia produce eritema migratorio anular, no exantema difuso con escara.","ai":false,"noShuffle":false,"img":null},{"n":"ri5","q":"Cu\u00e1l de las siguientes entidades NO tiene un exantema con afectaci\u00f3n PALMOPLANTAR:","o":["Sarampi\u00f3n","Tifus murino","S\u00edfilis secundaria","Fiebre botonosa mediterr\u00e1nea"],"c":2,"e":"El TIFUS MURINO (Rickettsia typhi) produce un exantema maculopapular que RESPETA palmas y plantas. Exantemas CON afectaci\u00f3n palmoplantar: s\u00edfilis secundaria, fiebre botonosa mediterr\u00e1nea (R. conorii), fiebre de las Monta\u00f1as Rocosas, eritema multiforme, s\u00edndrome de Stevens-Johnson.","ai":false,"noShuffle":false,"img":null},{"n":"ri6","q":"Paciente de 35 a\u00f1os sin antecedentes, fiebre 38 grados de 3 d\u00edas, tos seca y mialgias. Rx de t\u00f3rax: infiltrado intersticial bilateral. Cu\u00e1l es el diagn\u00f3stico m\u00e1s probable:","o":["Neumon\u00eda por Streptococcus pneumoniae","Neumon\u00eda por Mycoplasma pneumoniae","Neumon\u00eda por Haemophilus influenzae","Bronquitis aguda"],"c":2,"e":"La neumon\u00eda AT\u00cdPICA por MYCOPLASMA PNEUMONIAE es la m\u00e1s probable: paciente joven sin comorbilidades, inicio insidioso, tos seca, fiebre moderada, mialgias (s\u00edntomas extrapulmonares), infiltrado INTERSTICIAL bilateral (disociaci\u00f3n cl\u00ednico-radiol\u00f3gica). La neumon\u00eda por S. pneumoniae es t\u00edpica (inicio brusco, fiebre alta, escalofr\u00edos, esputo purulento, condensaci\u00f3n lobar). Mycoplasma es la causa m\u00e1s frecuente de NAC at\u00edpica en j\u00f3venes.","ai":false,"noShuffle":false,"img":null},{"n":"ri7","q":"Cu\u00e1l de las siguientes NO es una caracter\u00edstica de las neumon\u00edas at\u00edpicas:","o":["Comienzo gradual","Cefalea","Mialgia","Auscultaci\u00f3n de crepitantes focales","Tos seca"],"c":4,"e":"La DISOCIACI\u00d3N CL\u00cdNICO-RADIOL\u00d3GICA es la caracter\u00edstica clave de las neumon\u00edas at\u00edpicas: a pesar de los infiltrados radiol\u00f3gicos, la AUSCULTACI\u00d3N es NORMAL o m\u00ednimamente alterada (sin crepitantes focales t\u00edpicos). La inflamaci\u00f3n es intersticial/peribronquiolar, no alveolar. Las otras caracter\u00edsticas S\u00cd son propias de las neumon\u00edas at\u00edpicas: inicio gradual, s\u00edntomas extrapulmonares (cefalea, mialgias) y tos seca.","ai":false,"noShuffle":false,"img":null},{"n":"ri8","q":"Cu\u00e1l de los siguientes pat\u00f3genos NO se manifiesta con un patr\u00f3n pulmonar de NEUMON\u00cdA T\u00cdPICA:","o":["Streptococcus pneumoniae","Haemophilus influenzae","Mycoplasma pneumoniae","Klebsiella pneumoniae","Moraxella catarrhalis"],"c":3,"e":"MYCOPLASMA PNEUMONIAE produce neumon\u00eda AT\u00cdPICA (infiltrado intersticial, s\u00edntomas extrapulmonares, disociaci\u00f3n cl\u00ednico-radiol\u00f3gica), no patr\u00f3n t\u00edpico de condensaci\u00f3n lobar. Los otros pat\u00f3genos S\u00cd producen patr\u00f3n t\u00edpico: S. pneumoniae (consolidaci\u00f3n lobar), H. influenzae (bronconeumon\u00eda), Klebsiella pneumoniae (neumon\u00eda lobar densa), Moraxella catarrhalis (bronconeumon\u00eda en EPOC).","ai":false,"noShuffle":false,"img":null},{"n":"ri9","q":"Estudiante de 24 a\u00f1os sano, con febr\u00edcula, artromialgias, tos seca y astenia de 2 semanas. Sus 2 hermanos presentaron un cuadro similar un mes antes que se autolimit\u00f3. Rx de t\u00f3rax: neumon\u00eda at\u00edpica. Cu\u00e1l es el agente etiol\u00f3gico m\u00e1s probable:","o":["Haemophilus influenzae","Coxiella burnetii (fiebre Q)","Mycoplasma pneumoniae","Legionella pneumophila"],"c":3,"e":"MYCOPLASMA PNEUMONIAE: la afectaci\u00f3n FAMILIAR por contacto \u00edntimo es muy caracter\u00edstica (se transmite por gotitas respiratorias entre convivientes). Presentaci\u00f3n con tos seca persistente durante semanas, s\u00edntomas extrapulmonares, inicio gradual y propagaci\u00f3n intrafamiliar es el cuadro cl\u00e1sico. Legionella se asocia a sistemas de agua/climatizaci\u00f3n. Fiebre Q a animales dom\u00e9sticos.","ai":false,"noShuffle":false,"img":null}],"virus_hongos":[{"n":"vh1","q":"Cu\u00e1l de los serotipos de la familia Herpesviridae se corresponde con el CITOMEGALOVIRUS:","o":["HHV-1","HHV-2","HHV-3","HHV-5"],"c":4,"e":"Los 8 herpesvirus humanos: HHV-1 es VHS-1 (herpes oral), HHV-2 es VHS-2 (herpes genital), HHV-3 es VVZ (varicela/z\u00f3ster), HHV-4 es VEB (Epstein-Barr/mononucleosis), HHV-5 es CMV (citomegalovirus), HHV-6 es roseolovirus (exantema s\u00fabito), HHV-7 es relacionado, HHV-8 es KSHV (sarcoma de Kaposi). Mnemot\u00e9cnica: CMV es el 5 igual a Cin-Co-Mega-Virus.","ai":false,"noShuffle":false,"img":null},{"n":"vh2","q":"Algunos g\u00e9rmenes infecciosos son responsables de enfermedades no infecciosas. Cu\u00e1l es la respuesta FALSA:","o":["VPH a c\u00e1ncer de cuello uterino infiltrante","Helicobacter pylori a \u00falcera p\u00e9ptica","Herpesvirus humano tipo 8 a sarcoma de Kaposi","Virus Epstein-Barr (VEB) a meningioma"],"c":4,"e":"FALSA: el VEB NO se asocia a meningioma. El VEB (HHV-4) s\u00ed se asocia a: linfoma de Burkitt (\u00c1frica), carcinoma nasofar\u00edngeo (Asia), linfomas de Hodgkin y no-Hodgkin en inmunodeprimidos, leucoplasia oral vellosa (VIH). Los meningiomas son tumores men\u00edngeos de origen aracnoideo SIN relaci\u00f3n establecida con el VEB.","ai":false,"noShuffle":false,"img":null},{"n":"vh3","q":"Cu\u00e1l de las siguientes afirmaciones es VERDADERA respecto a la infecci\u00f3n por citomegalovirus (CMV):","o":["Es un virus de transmisi\u00f3n especialmente respiratoria ya que solo suele aislarse en secreciones respiratorias","La infecci\u00f3n por CMV puede ser el resultado del contacto con una cepa externa o la reactivaci\u00f3n del virus latente en el organismo","Los anticuerpos generados confieren protecci\u00f3n permanente y pueden ser utilizados para el diagn\u00f3stico","Los s\u00edntomas apenas dependen del estado inmunol\u00f3gico del paciente"],"c":2,"e":"VERDADERA: el CMV puede causar INFECCI\u00d3N PRIMARIA (por saliva, orina, sangre, leche materna o contacto sexual) o REACTIVACI\u00d3N de la infecci\u00f3n latente (especialmente en inmunodeprimidos). Los anticuerpos NO confieren protecci\u00f3n permanente. Los s\u00edntomas DEPENDEN MUCHO del estado inmunol\u00f3gico (grave en inmunodeprimidos, leve en inmunocompetentes).","ai":false,"noShuffle":false,"img":null},{"n":"vh4","q":"Respecto al virus VIH, se\u00f1ale la respuesta INCORRECTA:","o":["Es un retrovirus","Destruye fundamentalmente los linfocitos CD4","Afecta sobre todo a la inmunidad humoral","Actualmente no se puede curar pero s\u00ed controlar"],"c":3,"e":"INCORRECTA: el VIH afecta principalmente a la INMUNIDAD CELULAR (no humoral). Infecta y destruye los linfocitos T CD4+ (helper), que coordinan la respuesta inmune celular. La p\u00e9rdida de CD4+ conduce a susceptibilidad a infecciones oportunistas que explotan la inmunidad celular deficiente (toxoplasmosis, PCP, CMV, MAC, criptococosis).","ai":false,"noShuffle":false,"img":null},{"n":"vh5","q":"El omeprazol est\u00e1 contraindicado por interacci\u00f3n medicamentosa con:","o":["Darunavir","Atazanavir","Lopinavir","Saquinavir"],"c":2,"e":"El ATAZANAVIR (inhibidor de la proteasa) requiere pH \u00c1CIDO g\u00e1strico para su absorci\u00f3n intestinal. Los inhibidores de la bomba de protones (omeprazol, pantoprazol) aumentan el pH g\u00e1strico y REDUCEN SIGNIFICATIVAMENTE los niveles plasm\u00e1ticos de atazanavir hasta hacerlo ineficaz. Esta interacci\u00f3n es la m\u00e1s importante entre IBPs y antirretrovirales.","ai":false,"noShuffle":false,"img":null},{"n":"vh6","q":"Del siguiente perfil serol\u00f3gico del VHB (HBsAg positivo, Anti-HBs negativo, transaminasas alteradas), el paciente presenta:","o":["Infecci\u00f3n aguda por VHB","Portador sano","Infecci\u00f3n cr\u00f3nica con replicaci\u00f3n viral activa","Infecci\u00f3n cr\u00f3nica sin replicaci\u00f3n viral"],"c":3,"e":"HBsAg positivo = virus presente / Anti-HBs negativo = no eliminado ni vacunado / Transaminasas ALTERADAS = da\u00f1o hep\u00e1tico activo por replicaci\u00f3n. Corresponde a INFECCI\u00d3N CR\u00d3NICA CON REPLICACI\u00d3N. Portador sano tiene HBsAg positivo pero transaminasas NORMALES. Curaci\u00f3n = Anti-HBs positivo m\u00e1s HBsAg negativo.","ai":false,"noShuffle":false,"img":null},{"n":"vh7","q":"Cu\u00e1l de las siguientes combinaciones entre micosis y tratamiento antif\u00fangico es INCORRECTA:","o":["Aspergilosis pulmonar invasora: voriconazol","Mucormicosis en paciente con toxicidad por anfotericina B: posaconazol","Esofagitis por Candida krusei: fluconazol","Histoplasmosis diseminada: anfotericina B"],"c":3,"e":"INCORRECTA: Candida krusei (Pichia kudriavzevii) es INTR\u00cdNSECAMENTE RESISTENTE al fluconazol. El tratamiento de la candidiasis por C. krusei requiere equinocandinas o voriconazol. Las otras opciones son correctas: voriconazol = primera l\u00ednea aspergilosis invasora; posaconazol = alternativa en mucormicosis; anfotericina B = de elecci\u00f3n en histoplasmosis diseminada grave.","ai":false,"noShuffle":false,"img":null},{"n":"vh8","q":"Cu\u00e1l de los siguientes par\u00e1sitos es el causante m\u00e1s com\u00fan de la leishmaniasis visceral en la cuenca mediterr\u00e1nea:","o":["Leishmania braziliensis","Leishmania mexicana","Leishmania infantum","Leishmania tropica"],"c":3,"e":"LEISHMANIA INFANTUM (= L. chagasi en Am\u00e9rica) es el agente de la leishmaniasis visceral en la cuenca mediterr\u00e1nea, incluyendo Espa\u00f1a. Vector: fleb\u00f3tomo (Phlebotomus perniciosus). Reservorio principal: el PERRO. En Espa\u00f1a hay focos end\u00e9micos (destacado el brote de Fuenlabrada/Madrid en 2010).","ai":false,"noShuffle":false,"img":null},{"n":"vh9","q":"En la toxoplasmosis cong\u00e9nita, cu\u00e1l de las siguientes alteraciones forma parte de la cl\u00e1sica t\u00e9trada cl\u00ednica:","o":["Hipotiroidismo","Microtia","Retinocoroiditis bilateral","Cardiomegalia"],"c":3,"e":"La T\u00c9TRADA CL\u00c1SICA de la toxoplasmosis cong\u00e9nita (t\u00e9trada de Sabin): (1) RETINOCOROIDITIS bilateral (la m\u00e1s frecuente y caracter\u00edstica), (2) HIDROCEFALIA, (3) CALCIFICACIONES intracraneales periventriculares y (4) CONVULSIONES. La retinocoroiditis puede aparecer m\u00e1s tarde, incluso en infecciones inicialmente asintom\u00e1ticas.","ai":false,"noShuffle":false,"img":null},{"n":"vh10","q":"Cu\u00e1l es el tratamiento de elecci\u00f3n para un paciente inmunocompetente con leishmaniasis visceral:","o":["Metronidazol oral m\u00e1s paromomicina","Miltefosina durante 4 semanas","Anfotericina B liposomal 3 mg/kg/dia d\u00edas 1-5, 14 y 21","Trimetoprim/sulfametoxazol 800/160 mg"],"c":3,"e":"La ANFOTERICINA B LIPOSOMAL es el tratamiento de elecci\u00f3n de la leishmaniasis visceral en Europa. La formulaci\u00f3n liposomal reduce la nefrotoxicidad. La pauta OMS es 3 mg/kg/d\u00eda los d\u00edas 1-5, 14 y 21 (total 21 mg/kg). La miltefosina es una alternativa oral eficaz. El metronidazol y TMP-SMX no tienen actividad frente a Leishmania.","ai":false,"noShuffle":false,"img":null},{"n":"vh11","q":"Qu\u00e9 par\u00e1sito intestinal produce diarrea acuosa f\u00e9tida, distensi\u00f3n abdominal y puede asociar intolerancia a la lactosa:","o":["Entamoeba histolytica","Cryptosporidium parvum","Giardia lamblia","Isospora belli"],"c":3,"e":"GIARDIA LAMBLIA (G. intestinalis) produce giardiasis: diarrea acuosa F\u00c9TIDA (signo caracter\u00edstico), distensi\u00f3n abdominal, flatulencia, dolor epig\u00e1strico, y puede causar S\u00cdNDROME DE MALABSORCI\u00d3N con intolerancia a la lactosa secundaria por da\u00f1o de la mucosa del intestino delgado proximal. E. histolytica produce disenter\u00eda (heces con moco y sangre).","ai":false,"noShuffle":false,"img":null},{"n":"vh12","q":"Qu\u00e9 forma del Toxoplasma gondii es responsable de la reactivaci\u00f3n en pacientes inmunodeprimidos:","o":["Oocisto","Bradizo\u00edto","Quiste fecal","Taquizo\u00edto"],"c":2,"e":"Los BRADIZO\u00cdTOS forman los QUISTES TISULARES (en m\u00fasculo y cerebro) durante la fase cr\u00f3nica/latente. En pacientes inmunodeprimidos (especialmente CD4 menor de 100 cel/uL en VIH), los bradizo\u00edtos se reactivan transform\u00e1ndose en TAQUIZO\u00cdTOS (forma proliferativa e invasiva), causando encefalitis toxopl\u00e1smica. El oocisto es la forma infecciosa en las heces de gatos.","ai":false,"noShuffle":false,"img":null},{"n":"vh13","q":"Cu\u00e1l es la forma cl\u00ednica m\u00e1s grave de la amebiasis intestinal:","o":["Ameboma","Colitis ulcerada fulminante con megacolon t\u00f3xico","Diarrea intermitente","Disenter\u00eda amebiana leve"],"c":2,"e":"La COLITIS ULCERADA FULMINANTE CON MEGACOLON T\u00d3XICO es la forma m\u00e1s grave de amebiasis intestinal. Presenta: dilataci\u00f3n col\u00f3nica masiva, perforaci\u00f3n intestinal inminente, sepsis, peritonitis y alta mortalidad (mayor del 40%). Requiere tratamiento m\u00e9dico intensivo y frecuentemente colectom\u00eda urgente.","ai":false,"noShuffle":false,"img":null},{"n":"vh14","q":"Un paciente que tras regresar de un viaje al tr\u00f3pico presenta diarrea cr\u00f3nica y eosinofilia nos debe sugerir:","o":["Infecci\u00f3n por Salmonella","Amebiasis","Helmintiasis","C\u00f3lera"],"c":3,"e":"La EOSINOFILIA en el viajero que regresa del tr\u00f3pico con diarrea cr\u00f3nica sugiere HELMINTIASIS. La eosinofilia es una respuesta inmune caracter\u00edstica frente a par\u00e1sitos multicelulares (helmintos). La amebiasis, salmonelosis y c\u00f3lera NO producen eosinofilia significativa.","ai":false,"noShuffle":false,"img":null},{"n":"vh15","q":"Cu\u00e1l es la causa infecciosa que ocasiona la SEGUNDA CAUSA DE CEGUERA INFECCIOSA en el mundo, extendida por pa\u00edses de clima c\u00e1lido y h\u00famedo de \u00c1frica, Am\u00e9rica central y Sudam\u00e9rica:","o":["Wuchereria bancrofti","Trichinella spiralis","Schistosoma mansoni","Onchocerca volvulus"],"c":4,"e":"ONCHOCERCA VOLVULUS causa la oncocercosis (ceguera de los r\u00edos), la segunda causa de ceguera infecciosa en el mundo (despu\u00e9s del tracoma). Las microfilarias migran al ojo y causan queratitis cr\u00f3nica que lleva a la ceguera. End\u00e9mica de \u00c1frica subsahariana, Yemen y Am\u00e9rica central/Sudam\u00e9rica. Vector: mosca negra (Simulium). W. bancrofti produce filariasis linf\u00e1tica (elefantiasis).","ai":f
