var META=/*__META_JSON__*/{"titulo":"Farmacolog\u00eda Final Enero 2024","subtitulo":"Examen Final \u00b7 Farmacolog\u00eda 3\u00ba Medicina \u00b7 Enero 2024","examen":"Final Farmacolog\u00eda \u00b7 Enero 2024","secciones":{"farma":{"label":"Farmacolog\u00eda General y Cl\u00ednica","emoji":"\ud83d\udc8a","color":"#7c3aed","colorDim":"#ede9fe","desc":"Farmacocin\u00e9tica \u00b7 Farmacodin\u00e1mica \u00b7 Antibi\u00f3ticos \u00b7 Cardiovascular \u00b7 SNC \u00b7 Analgesia \u00b7 Endocrino"}}};
var D=/*__D_JSON__*/{"farma":[{"n":"1","noShuffle":false,"img":null,"q":"Se\u00f1ale la afirmaci\u00f3n FALSA sobre la absorci\u00f3n de un f\u00e1rmaco:","o":["La liberaci\u00f3n del f\u00e1rmaco de la forma farmac\u00e9utica no afecta a la absorci\u00f3n de dicho f\u00e1rmaco.","Es el paso de un f\u00e1rmaco de su lugar de administraci\u00f3n al plasma.","Influye en la biodisponibilidad del f\u00e1rmaco.","En la cin\u00e9tica de la absorci\u00f3n de orden cero la velocidad de absorci\u00f3n es constante e independiente de la concentraci\u00f3n."],"c":1,"e":"La <b>liberaci\u00f3n del f\u00e1rmaco de la forma farmac\u00e9utica</b> es el primer paso y condiciona directamente la absorci\u00f3n: sin liberaci\u00f3n no hay absorci\u00f3n. La forma farmac\u00e9utica (comprimido, c\u00e1psula, parche) determina la velocidad y cantidad de f\u00e1rmaco disponible para absorberse."},{"n":"2","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l es la principal mol\u00e9cula encargada de las reacciones de fase I hep\u00e1tica?","o":["P-450.","Kinesina.","K-Ras.","P53."],"c":1,"e":"El citocromo <b>P-450</b> (CYP) es el sistema enzim\u00e1tico clave en las reacciones de fase I (oxidaci\u00f3n, reducci\u00f3n, hidr\u00f3lisis). Kinesina es una prote\u00edna motora; K-Ras es un oncog\u00e9n; P53 es un supresor tumoral. Ninguno interviene en el metabolismo hep\u00e1tico de f\u00e1rmacos."},{"n":"3","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 f\u00e1rmaco inhibe el transportador NPC1L1?","o":["Ezetimiba.","Gemfibrozilo.","Fenofibrato.","Colestiramina."],"c":1,"e":"<b>Ezetimiba</b> inhibe el transportador intestinal <b>NPC1L1</b>, bloqueando la absorci\u00f3n de colesterol diet\u00e9tico y biliar en el enterocito. Gemfibrozilo y fenofibrato son fibratos (activan PPAR-\u03b1); colestiramina es una resina secuestradora de \u00e1cidos biliares."},{"n":"4","noShuffle":false,"img":null,"q":"En un paciente con \u00falcera duodenal y alto riesgo cardiovascular por cardiopat\u00eda isqu\u00e9mica que requiere un AINE, \u00bfcu\u00e1l elegir\u00eda como m\u00e1s seguro?","o":["Naproxeno.","Ketoprofeno.","Indometacina.","Ibuprofeno."],"c":1,"e":"<b>Naproxeno</b> es el AINE con menor riesgo cardiovascular tromb\u00f3tico (inhibe COX de forma equilibrada). En \u00falcera se asociar\u00eda a IBP. Los COXIB reducen riesgo g\u00e1strico pero aumentan riesgo CV. Ibuprofeno e indometacina tienen mayor riesgo CV que naproxeno."},{"n":"5","noShuffle":false,"img":null,"q":"\u00bfQui\u00e9n puede notificar las sospechas de una RAM al SEFV-H?","o":["Solo los m\u00e9dicos.","Solo los profesionales sanitarios.","Solo los ciudadanos.","Los ciudadanos y los profesionales sanitarios."],"c":4,"e":"El Sistema Espa\u00f1ol de Farmacovigilancia (SEFV-H) acepta notificaciones de <b>tarjeta amarilla</b> tanto de <b>profesionales sanitarios</b> como de <b>ciudadanos/pacientes</b>. Desde 2013 la participaci\u00f3n ciudadana est\u00e1 reconocida en la legislaci\u00f3n espa\u00f1ola (RD 577/2013)."},{"n":"6","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 estatina puede administrarse a cualquier hora del d\u00eda?","o":["Atorvastatina.","Simvastatina.","Pravastatina.","Lovastatina."],"c":1,"e":"<b>Atorvastatina</b> tiene una semivida larga (~14h) y puede tomarse a cualquier hora. Simvastatina, pravastatina y lovastatina tienen semividas cortas y deben tomarse por la noche, ya que la s\u00edntesis hep\u00e1tica de colesterol es m\u00e1xima durante el sue\u00f1o."},{"n":"7","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de los siguientes f\u00e1rmacos podr\u00eda producir hipertermia maligna?","o":["Succinilcolina.","Tubocurarina.","Bloqueantes neuromusculares no despolarizantes.","Edrofonio."],"c":1,"e":"La <b>succinilcolina</b> (bloqueante despolarizante) puede desencadenar <b>hipertermia maligna</b> en individuos gen\u00e9ticamente susceptibles (mutaci\u00f3n RYR1), con liberaci\u00f3n masiva de Ca\u00b2\u207a del ret\u00edculo sarcoplasm\u00e1tico. El tratamiento es dantroleno. Los no despolarizantes no producen este efecto."},{"n":"8","noShuffle":false,"img":null,"q":"A un paciente se le administran 1000 ml/d\u00eda de suero glucosado al 5%. \u00bfCu\u00e1ntos mg de glucosa recibe al d\u00eda?","o":["25.000 mg.","50.000 mg.","50 mg.","10.000 mg."],"c":2,"e":"Suero glucosado al <b>5%</b> = 5 g de glucosa por 100 ml = 50 g por 1000 ml = <b>50.000 mg</b>. C\u00e1lculo: 5 g/100 ml \u00d7 1000 ml = 50 g = 50.000 mg. Es el c\u00e1lculo est\u00e1ndar de concentraci\u00f3n porcentual (g/100 ml)."},{"n":"9","noShuffle":false,"img":null,"q":"Teniendo en cuenta las curvas dosis-respuesta mostradas, \u00bfcu\u00e1l corresponder\u00eda a un antagonista?","o":["A.","B.","C.","Ninguna de esas tres."],"c":2,"e":"Un <b>antagonista puro</b> se une al receptor sin producir efecto (actividad intr\u00ednseca = 0), desplazando la curva dosis-respuesta del agonista hacia la derecha. La curva B muestra eficacia nula (l\u00ednea plana en 0%), caracter\u00edstica del antagonista competitivo."},{"n":"10","noShuffle":false,"img":null,"q":"Respecto a la distribuci\u00f3n de un f\u00e1rmaco por el organismo, se\u00f1ale la opci\u00f3n correcta:","o":["Las regiones peor vascularizadas son las m\u00e1s accesibles para los f\u00e1rmacos.","Los f\u00e1rmacos liposolubles atraviesan mejor la barrera hematoencef\u00e1lica.","La barrera hematoencef\u00e1lica es una barrera virtual, que permite el paso libre de f\u00e1rmacos.","En f\u00e1rmacos con bajo grado de uni\u00f3n a prote\u00ednas plasm\u00e1ticas tendremos un dep\u00f3sito transitorio del f\u00e1rmaco en sangre."],"c":2,"e":"La <b>barrera hematoencef\u00e1lica</b> est\u00e1 formada por uniones estrechas entre c\u00e9lulas endoteliales y astrocitos. Solo la cruzan f\u00e1rmacos <b>liposolubles</b>, no ionizados y de bajo peso molecular. Los hidrosolubles o muy ionizados no acceden al SNC."},{"n":"11","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 inhibe al RANKL?","o":["Denosumab.","Raloxifeno.","Alendronato."],"c":1,"e":"<b>Denosumab</b> es un anticuerpo monoclonal que inhibe <b>RANKL</b> (ligando del receptor activador del NF-\u03baB), bloqueando la diferenciaci\u00f3n y activaci\u00f3n de osteoclastos. Raloxifeno es un SERM; alendronato es un bisfosfonato (inhibe la resorci\u00f3n pero no directamente RANKL)."},{"n":"12","noShuffle":false,"img":null,"q":"Se\u00f1ale la relaci\u00f3n correcta entre receptor adren\u00e9rgico y efecto:","o":["Receptores beta3 \u2013 m\u00fasculo liso vascular.","Receptores alfa1 \u2013 relajaci\u00f3n m\u00fasculo liso vascular.","Receptores beta1 \u2013 bradicardia.","Receptores alfa2 \u2013 control presin\u00e1ptico de la liberaci\u00f3n de neurotransmisores."],"c":4,"e":"Los <b>receptores alfa2</b> presin\u00e1pticos son autorreceptores que inhiben la liberaci\u00f3n de noradrenalina (retroalimentaci\u00f3n negativa). \u03b21 produce taquicardia (no bradicardia); \u03b11 contrae el m\u00fasculo liso vascular; \u03b23 se localiza en tejido adiposo (lip\u00f3lisis)."},{"n":"13","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 f\u00e1rmaco empeora el ataque agudo de gota?","o":["Colchicina.","Febuxostat.","Probenecid.","Benzbromarona."],"c":2,"e":"<b>Febuxostat</b> (inhibidor de la xantina oxidasa) y alopurinol pueden desencadenar o empeorar el ataque agudo de gota al movilizar dep\u00f3sitos de urato. Se inician despu\u00e9s del episodio agudo. Colchicina trata el ataque; probenecid y benzbromarona son uricos\u00faricos cr\u00f3nicos."},{"n":"14","noShuffle":false,"img":null,"q":"El cardi\u00f3logo prescribe furosemida 5 mg/8h por sonda nasog\u00e1strica a un ni\u00f1o de 5 meses. La farmacia tiene furosemida 2 mg/ml en jeringa oral. \u00bfCu\u00e1ntos ml hay que administrar al d\u00eda?","o":["2,5 ml.","5 ml.","3 ml.","7,5 ml."],"c":4,"e":"Dosis/toma: 5 mg. Tomas/d\u00eda: 3 (cada 8h). Dosis total/d\u00eda: 15 mg. Concentraci\u00f3n: 2 mg/ml. <b>Volumen = 15 mg \u00f7 2 mg/ml = 7,5 ml/d\u00eda</b>. Verificaci\u00f3n: 5 mg \u00f7 2 mg/ml = 2,5 ml/toma \u00d7 3 tomas = 7,5 ml."},{"n":"15","noShuffle":false,"img":null,"q":"El pizotifeno:","o":["Es antiem\u00e9tico.","Es un antipsic\u00f3tico at\u00edpico.","Estimula el apetito.","Es \u00fatil en el tratamiento sintom\u00e1tico de la migra\u00f1a."],"c":3,"e":"El <b>pizotifeno</b> es un antihistam\u00ednico/antiseroton\u00e9rgico usado en la <b>profilaxis de la migra\u00f1a</b>. Como efecto secundario produce <b>aumento del apetito</b> y ganancia de peso. No es antiem\u00e9tico ni antipsic\u00f3tico. No trata el ataque agudo, sino que previene las crisis."},{"n":"16","noShuffle":false,"img":null,"q":"Paciente con HTA y EPOC. \u00bfCu\u00e1l NO elegir\u00eda de primera elecci\u00f3n para tratar su hipertensi\u00f3n?","o":["Losart\u00e1n.","Amlodipino.","Nadolol.","Enalapril."],"c":3,"e":"<b>Nadolol</b> es un betabloqueante no selectivo que bloquea los receptores \u03b22 bronquiales, provocando <b>broncoespasmo</b>. Est\u00e1 contraindicado en EPOC y asma. Losart\u00e1n (ARA-II), amlodipino (calcioantagonista) y enalapril (IECA) son alternativas seguras en este contexto."},{"n":"17","noShuffle":false,"img":null,"q":"Respecto a los conceptos de potencia y eficacia de un f\u00e1rmaco, las siguientes frases son correctas, EXCEPTO:","o":["La eficacia se relaciona con el efecto m\u00e1ximo de un f\u00e1rmaco.","La DE50 (dosis eficaz 50) es una medida de la eficacia.","La potencia permite comparar la dosis necesaria de 2 f\u00e1rmacos diferentes para alcanzar el mismo efecto.","La potencia de un f\u00e1rmaco no est\u00e1 relacionada con el efecto m\u00e1ximo."],"c":2,"e":"La <b>DE50</b> es una medida de <b>potencia</b> (cu\u00e1nta dosis se necesita para el 50% del efecto m\u00e1ximo), no de eficacia. La <b>eficacia</b> es el efecto m\u00e1ximo alcanzable (Emax). Un f\u00e1rmaco muy potente tiene DE50 baja; un f\u00e1rmaco muy eficaz tiene Emax alto."},{"n":"18","noShuffle":false,"img":null,"q":"La acci\u00f3n agonista serotonin\u00e9rgica sobre receptores 5-HT4 es responsable de:","o":["Acci\u00f3n vasoconstrictora en vasos craneales.","Acci\u00f3n procin\u00e9tica en la pared digestiva.","Acci\u00f3n ansiol\u00edtica.","Inhibici\u00f3n de la inflamaci\u00f3n del \u00e1rbol vascular."],"c":2,"e":"Los receptores <b>5-HT4</b> en el plexo mient\u00e9rico estimulan la motilidad gastrointestinal (efecto <b>procin\u00e9tico</b>). Los agonistas 5-HT4 como metoclopramida y cisaprida act\u00faan por este mecanismo. Los 5-HT1B/1D median vasoconstricci\u00f3n craneal (triptanes); 5-HT1A, ansi\u00f3lisis."},{"n":"19","noShuffle":false,"img":null,"q":"La succinilcolina es un bloqueante neuromuscular que tiene como caracter\u00edstica:","o":["Ser un antagonista irreversible de receptores muscar\u00ednicos.","La inducci\u00f3n de fasciculaciones transitorias al inicio del tratamiento debido a su acci\u00f3n no despolarizante.","Ser un antagonista competitivo y reversible de los receptores NM.","De elecci\u00f3n en ancianos y reci\u00e9n nacidos."],"c":2,"e":"La <b>succinilcolina</b> es un bloqueante <b>despolarizante</b>: activa los receptores NM produciendo <b>fasciculaciones</b> transitorias antes de la par\u00e1lisis fl\u00e1cida. No es antagonista irreversible ni muscar\u00ednico. Est\u00e1 contraindicada en ancianos y neonatos por mayor riesgo de hipertermia maligna e hiperpotasemia."},{"n":"20","noShuffle":false,"img":null,"q":"Es un opioide agonista parcial:","o":["Morfina.","Pentazocina.","Buprenorfina.","Naltrexona."],"c":3,"e":"<b>Buprenorfina</b> es un <b>agonista parcial</b> del receptor \u03bc (mu): produce efecto analg\u00e9sico pero con techo terap\u00e9utico y menor dependencia. Morfina es agonista puro \u03bc; pentazocina es agonista \u03ba y antagonista parcial \u03bc; naltrexona es antagonista puro."},{"n":"21","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 corticoide es de uso t\u00f3pico o inhalatorio exclusivamente?","o":["Clobetasol.","Deflazacort.","Prednisona.","Fluprednisolona."],"c":1,"e":"<b>Clobetasol</b> es un corticoide de muy alta potencia de uso <b>exclusivamente t\u00f3pico</b> (cremas, ung\u00fcentos). No se usa sist\u00e9micamente. Deflazacort y prednisona son de uso sist\u00e9mico oral. Budesonida y beclometasona son los inhalatorios de referencia."},{"n":"22","noShuffle":false,"img":null,"q":"Indica la respuesta CORRECTA sobre farmacolog\u00eda tiroidea:","o":["La tiroperoxidasa es la responsable del almacenamiento de las hormonas tiroideas.","El hipertiroidismo causa coma mixedematoso.","La levotiroxina inhibe la yodaci\u00f3n de los residuos de la tiroglobulina.","El metimazol tiene un efecto cl\u00ednico despu\u00e9s de varias semanas debido a la prolongada semivida de la T4."],"c":4,"e":"El <b>metimazol</b> inhibe la s\u00edntesis de nuevas hormonas tiroideas, pero el efecto cl\u00ednico tarda semanas porque hay hormonas preformadas almacenadas y la T4 tiene una <b>semivida larga</b> (~7 d\u00edas). La tiroperoxidasa sintetiza y yoda; el coma mixedematoso es del hipotiroidismo."},{"n":"23","noShuffle":false,"img":null,"q":"Ante un paciente con dolor cr\u00f3nico no oncol\u00f3gico que no responde a un AINE, \u00bfqu\u00e9 f\u00e1rmaco puede a\u00f1adir?","o":["Tramadol.","Anticonvulsivante.","Antidepresivo tric\u00edclico.","Metamizol."],"c":1,"e":"Seg\u00fan la <b>escalera analg\u00e9sica de la OMS</b>, si el AINE (escal\u00f3n 1) es insuficiente, el siguiente paso es un <b>opioide d\u00e9bil</b> como tramadol (escal\u00f3n 2). Los coadyuvantes (anticonvulsivantes, tric\u00edclicos) se a\u00f1aden en dolor neurop\u00e1tico. El metamizol es del mismo escal\u00f3n."},{"n":"24","noShuffle":false,"img":null,"q":"Indique la afirmaci\u00f3n FALSA. Los antagonistas alfa1 se emplean en:","o":["Feocromocitoma.","Depresi\u00f3n.","Hipertrofia benigna de pr\u00f3stata.","Enfermedades vasculares perif\u00e9ricas."],"c":2,"e":"Los <b>antagonistas alfa1</b> (doxazosina, prazosina, tamsulosina) se usan en HTA, feocromocitoma, HBP y vasculopat\u00edas perif\u00e9ricas. <b>No tienen indicaci\u00f3n en depresi\u00f3n</b>. Los antidepresivos con acci\u00f3n alfa1 antagonista (mirtazapina) se usan en depresi\u00f3n, pero no por esa v\u00eda."},{"n":"25","noShuffle":false,"img":null,"q":"Es un opioide sin techo terap\u00e9utico:","o":["Oxicodona.","Tramadol.","Buprenorfina.","Code\u00edna."],"c":1,"e":"<b>Oxicodona</b> es un opioide mayor (agonista puro \u03bc) <b>sin techo terap\u00e9utico</b>: la dosis puede aumentarse indefinidamente para controlar el dolor. Tramadol, buprenorfina y code\u00edna tienen techo terap\u00e9utico. La morfina tambi\u00e9n carece de techo analg\u00e9sico."},{"n":"26","noShuffle":false,"img":null,"q":"Indica la respuesta INCORRECTA:","o":["La furosemida aumenta la ototoxicidad de los aminogluc\u00f3sidos.","La eritromicina alcanza el tejido cerebral y es \u00fatil frente a toxoplasmosis cerebral.","La vancomicina se usa cuando hay resistencias a penicilinas y cefalosporinas (MRSA).","La clindamicina es una alternativa en al\u00e9rgicos a penicilina."],"c":2,"e":"La <b>eritromicina no atraviesa bien la BHE</b> y no es \u00fatil en toxoplasmosis cerebral. El tratamiento de elecci\u00f3n es pirimetamina + sulfadiazina. La furosemida s\u00ed potencia la ototoxicidad de aminogluc\u00f3sidos; la vancomicina s\u00ed cubre MRSA; la clindamicina s\u00ed es alternativa en al\u00e9rgicos."},{"n":"27","noShuffle":false,"img":null,"q":"Indica la relaci\u00f3n INCORRECTA:","o":["Meloxicam \u2013 artritis reumatoide.","Indometacina \u2013 artritis reumatoide.","Salicilatos \u2013 bloqueo reversible de las dos isoformas de la COX.","Paracetamol \u2013 ni\u00f1os con infecci\u00f3n v\u00edrica."],"c":3,"e":"Los <b>salicilatos</b> (aspirina) producen un bloqueo <b>irreversible</b> (acetilaci\u00f3n covalente) de COX-1 y COX-2, no reversible. Los AINE cl\u00e1sicos (ibuprofeno, naproxeno) inhiben de forma reversible. El paracetamol es de elecci\u00f3n en ni\u00f1os con fiebre v\u00edrica (evitar aspirina por riesgo de s\u00edndrome de Reye)."},{"n":"28","noShuffle":false,"img":null,"q":"Indica el f\u00e1rmaco reactivador de la acetilcolinesterasa:","o":["Pralidoxima.","Edrofonio.","Atropina.","Donepezilo."],"c":1,"e":"<b>Pralidoxima</b> (2-PAM) es el \u00fanico <b>reactivador de la acetilcolinesterasa</b>: desplaza el organofosforado del sitio activo de la enzima antes del envejecimiento. Atropina bloquea los efectos muscar\u00ednicos; edrofonio inhibe reversiblemente la AChE; donepezilo es inhibidor de AChE para Alzheimer."},{"n":"29","noShuffle":false,"img":null,"q":"Indica la respuesta CORRECTA respecto a la terapia combinada TARGA:","o":["2 inhibidores de la TI no nucleos\u00eddicos + 1 inhibidor de la TI nucleos\u00eddico o 1-2 inhibidores de la proteasa.","Inicio de la terapia cuando la inmunodeficiencia es evidente.","Se basa en el recuento de CD4+.","2 inhibidores de la TI nucleos\u00eddicos + 1 inhibidor de la TI no nucleos\u00eddico o imiquimod."],"c":4,"e":"La <b>TARGA</b> est\u00e1ndar incluye <b>2 ITIAN + 1 ITINN o 1-2 inhibidores de la proteasa</b> (o inhibidor de integrasa). Se inicia precozmente independientemente de CD4+. Imiquimod es un inmunomodulador t\u00f3pico, sin papel en TARGA."},{"n":"30","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 f\u00e1rmacos est\u00e1n aconsejados en terapia inicial de angina inestable cuando los \u03b2-bloqueantes est\u00e1n contraindicados?","o":["Verapamilo o diltiazem.","Ivabradina.","Amlodipino.","Nifedipino."],"c":1,"e":"<b>Verapamilo o diltiazem</b> (calcioantagonistas no dihidropirid\u00ednicos) son la alternativa a los \u03b2-bloqueantes en angina inestable: reducen la frecuencia cardiaca y la contractilidad. Las dihidropiridinas (amlodipino, nifedipino) causan taquicardia refleja, contraindicadas en angina inestable sin \u03b2-bloqueante."},{"n":"31","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 grupo de f\u00e1rmacos son de elecci\u00f3n en el tratamiento de infecciones durante el embarazo?","o":["Metronidazol.","Macr\u00f3lidos.","Tetraciclinas.","Sulfamidas."],"c":2,"e":"Los <b>macr\u00f3lidos</b> (azitromicina, eritromicina) son seguros en el embarazo (categor\u00eda B). Tetraciclinas est\u00e1n contraindicadas (da\u00f1o dental/\u00f3seo fetal); sulfamidas en el tercer trimestre (kernicterus); metronidazol se usa con precauci\u00f3n y no es de primera elecci\u00f3n general."},{"n":"32","noShuffle":false,"img":null,"q":"Con respecto a los ensayos cl\u00ednicos:","o":["En un ensayo cl\u00ednico aleatorizado cruzado existe per\u00edodo de lavado.","En el enmascaramiento de tipo simple ciego, el m\u00e9dico desconoce a qu\u00e9 grupo pertenece el paciente.","En la fase III se mide la eficacia terap\u00e9utica y se establece la relaci\u00f3n dosis/eficacia.","En la fase I se incluyen pacientes enfermos a tratar con el medicamento en estudio."],"c":1,"e":"En los ensayos <b>cruzados</b> (crossover), cada sujeto recibe los dos tratamientos en secuencia, separados por un <b>per\u00edodo de lavado</b> para eliminar el efecto del tratamiento previo. Simple ciego: solo el paciente desconoce el grupo. Fase I: voluntarios sanos; Fase II: dosis/eficacia."},{"n":"33","noShuffle":false,"img":null,"q":"En la meningitis causada por Neisseria meningitidis est\u00e1 recomendada la profilaxis con:","o":["Penicilina G.","Ciprofloxacino.","Amoxicilina.","Vancomicina."],"c":2,"e":"La profilaxis de contactos de meningitis meningoc\u00f3cica se realiza con <b>rifampicina</b> (de elecci\u00f3n) o <b>ciprofloxacino</b> (dosis \u00fanica, alternativa). No se usa penicilina G en profilaxis. La vacuna es el m\u00e9todo preventivo principal a largo plazo."},{"n":"34","noShuffle":false,"img":null,"q":"\u00bfA qu\u00e9 fase del ciclo celular afecta el metotrexato?","o":["Fase G0.","Fase M.","Fase G1.","Fase S."],"c":4,"e":"<b>Metotrexato</b> inhibe la dihidrofolato reductasa, bloqueando la s\u00edntesis de purinas y timidilato necesarios para la replicaci\u00f3n del ADN. Act\u00faa en <b>fase S</b> (s\u00edntesis de ADN). Los alcaloides de la vinca (vincristina) act\u00faan en M; los alquilantes en todas las fases."},{"n":"35","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 asociaci\u00f3n de f\u00e1rmacos potencia su acci\u00f3n combinada frente a Streptococos?","o":["Rifampicina + vancomicina.","Cefalosporinas + aminogluc\u00f3sidos.","Penicilinas + aminogluc\u00f3sidos.","Penicilina G + gentamicina."],"c":4,"e":"<b>Penicilina G + gentamicina</b> es la combinaci\u00f3n sin\u00e9rgica cl\u00e1sica frente a estreptococos: la penicilina da\u00f1a la pared bacteriana facilitando la entrada del aminogluc\u00f3sido al interior celular. Esta sinergia es la base del tratamiento de la endocarditis estreptoc\u00f3cica."},{"n":"36","noShuffle":false,"img":null,"q":"Indica cu\u00e1l de los siguientes efectos NO lo producir\u00eda un f\u00e1rmaco parasimpaticomim\u00e9tico:","o":["Incremento de la micci\u00f3n.","Broncoconstricci\u00f3n.","Estre\u00f1imiento.","Miosis."],"c":3,"e":"Los f\u00e1rmacos <b>parasimpaticomim\u00e9ticos</b> (colin\u00e9rgicos) aumentan la motilidad intestinal y producen <b>diarrea</b>, no estre\u00f1imiento. El estre\u00f1imiento es efecto de los anticolin\u00e9rgicos (parasimpaticol\u00edticos). Tambi\u00e9n producen miosis, broncoconstricci\u00f3n y aumento de la micci\u00f3n (contracci\u00f3n del detrusor)."},{"n":"37","noShuffle":false,"img":null,"q":"La inhibici\u00f3n selectiva de la COX-2 por parte de ciertos AINEs es responsable de su acci\u00f3n:","o":["No cardioprotectora.","Aumentan los efectos secundarios de los AINEs cl\u00e1sicos.","Eficaces uricos\u00faricos.","Potentes antiagregantes."],"c":1,"e":"Los <b>inhibidores selectivos de COX-2</b> (coxibs) no inhiben la COX-1 plaquetaria, por lo que no generan TXA2 vasodilatador ni tienen efecto antiagregante. Esto los hace <b>no cardioprotectores</b> y aumenta el riesgo tromb\u00f3tico cardiovascular, a diferencia de la aspirina."},{"n":"38","noShuffle":false,"img":null,"q":"En relaci\u00f3n a los f\u00e1rmacos agonistas adren\u00e9rgicos, se\u00f1ale la relaci\u00f3n FALSA:","o":["Dobutamina \u2013 efecto alfa1.","Adrenalina \u2013 efecto alfa y beta.","Salbutamol \u2013 broncodilataci\u00f3n.","Agonistas alfa1 adren\u00e9rgicos v\u00eda t\u00f3pica \u2013 descongestionantes nasales."],"c":1,"e":"<b>Dobutamina</b> es principalmente un agonista <b>\u03b21</b> (inotr\u00f3pico positivo), con m\u00ednimo efecto alfa. No produce vasoconstricci\u00f3n significativa. La adrenalina tiene efectos \u03b1+\u03b2; salbutamol es \u03b22 (broncodilataci\u00f3n); los \u03b11 t\u00f3picos (oximetazolina) son descongestionantes."},{"n":"39","noShuffle":false,"img":null,"q":"Se\u00f1ala la respuesta INCORRECTA sobre f\u00e1rmacos corticosuprarrenales:","o":["La mifepristona es un antagonista de receptores glucocorticoides indicada para el s\u00edndrome de Cushing.","Los f\u00e1rmacos mineralcorticoides aumentan la reabsorci\u00f3n de Na+ en los t\u00fabulos distales.","La aminoglutetimida inhibe la 11\u03b2-hidroxilasa.","Los f\u00e1rmacos mineralcorticoides aumentan la excreci\u00f3n de K+ y H+."],"c":3,"e":"La <b>aminoglutetimida</b> inhibe la <b>20,22-desmolasa</b> (colesterol \u2192 pregnenolona), bloqueando la esteroidog\u00e9nesis en su primer paso. La <b>11\u03b2-hidroxilasa</b> es inhibida por el <b>metirapona</b>. La mifepristona s\u00ed antagoniza el receptor GC; los mineralcorticoides s\u00ed retienen Na+ y excretan K+/H+."},{"n":"40","noShuffle":false,"img":null,"q":"La doxazosina:","o":["Est\u00e1 indicada en HTA en embarazadas.","Se asocia con diur\u00e9ticos para evitar la retenci\u00f3n de Na+ y agua.","Presenta como RAM asma y broncoespasmo.","Provoca s\u00edndrome de abstinencia tras retirada brusca."],"c":2,"e":"<b>Doxazosina</b> (antagonista \u03b11) produce vasodilataci\u00f3n con retenci\u00f3n refleja de sodio y agua, por lo que se asocia a <b>diur\u00e9ticos</b> para contrarrestar este efecto. El broncoespasmo es RAM de \u03b2-bloqueantes, no de \u03b11. No produce s\u00edndrome de abstinencia ni est\u00e1 de primera elecci\u00f3n en embarazo."},{"n":"41","noShuffle":false,"img":null,"q":"Marca la respuesta INCORRECTA respecto al per\u00f3xido de hidr\u00f3geno:","o":["Es de tipo oxidante.","Es bactericida y fungicida.","A dosis altas es esporicida.","Pertenece a las biguanidas."],"c":4,"e":"El <b>per\u00f3xido de hidr\u00f3geno</b> es un <b>oxidante</b>, no una biguanida. Las biguanidas incluyen la clorhexidina. El H\u2082O\u2082 es bactericida, fungicida y, a concentraciones elevadas, esporicida. Act\u00faa liberando radicales libres de ox\u00edgeno que da\u00f1an membranas y prote\u00ednas bacterianas."},{"n":"42","noShuffle":false,"img":null,"q":"Se\u00f1ala la relaci\u00f3n INCORRECTA entre f\u00e1rmaco antiviral e indicaci\u00f3n:","o":["Nevirapina \u2013 prevenci\u00f3n transmisi\u00f3n VIH madre-hijo.","Famciclovir \u2013 queratoconjuntivitis herp\u00e9tica.","Oseltamivir \u2013 virus gripe A y B.","Interfer\u00f3n \u03b1-2a \u2013 hepatitis B."],"c":2,"e":"<b>Famciclovir</b> (y su metabolito activo penciclovir) es \u00fatil en herpes z\u00f3ster y herpes genital, pero <b>no est\u00e1 indicado en queratoconjuntivitis herp\u00e9tica</b>. Esta se trata con trifluridina o aciclovir t\u00f3pico oft\u00e1lmico. Nevirapina s\u00ed reduce transmisi\u00f3n vertical VIH; oseltamivir cubre gripe A/B."},{"n":"43","noShuffle":false,"img":null,"q":"El tratamiento de la intoxicaci\u00f3n con agonistas colin\u00e9rgicos indirectos (organofosforados) incluye:","o":["Administraci\u00f3n de acetilcolina.","Administraci\u00f3n de atropina.","Administraci\u00f3n de inhibidores de la acetilcolinesterasa.","Administraci\u00f3n de neostigmina."],"c":2,"e":"<b>Atropina</b> es el ant\u00eddoto de los efectos muscar\u00ednicos de los organofosforados (broncoespasmo, bradicardia, hipersecreciones). Se combina con <b>pralidoxima</b> (reactivadora de AChE) para los efectos nicot\u00ednicos. Administrar m\u00e1s AChE o inhibidores agravar\u00eda la intoxicaci\u00f3n."},{"n":"44","noShuffle":false,"img":null,"q":"Marca la respuesta INCORRECTA sobre antibi\u00f3ticos \u03b2-lact\u00e1micos:","o":["Las cefalosporinas pueden causar hemorragias.","La producci\u00f3n de \u03b2-lactamasas en Gram(+) es inducible por la presencia de antibi\u00f3ticos.","Los \u03b2-lact\u00e1micos se unen a la PBP interfiriendo en la s\u00edntesis de peptidoglucano.","La comida disminuye la absorci\u00f3n de cloxacilina."],"c":4,"e":"La <b>cloxacilina</b> debe tomarse en <b>ayunas</b> (30-60 min antes de comer): la comida <b>reduce</b> su absorci\u00f3n oral. La afirmaci\u00f3n de que la comida disminuye la absorci\u00f3n es correcta, no incorrecta. Las cefalosporinas s\u00ed pueden causar hemorragia (efecto antivitamina K); las PBP s\u00ed son la diana."},{"n":"45","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 enzima altera el trimetoprima?","o":["Dihidrofolato reductasa.","Dihidrofolato sintetasa.","Transpeptidasa.","Transglucosilasa."],"c":1,"e":"<b>Trimetoprima</b> inhibe la <b>dihidrofolato reductasa</b> bacteriana (DHFR), bloqueando la reducci\u00f3n de dihidrofolato a tetrahidrofolato. Las sulfamidas inhiben la dihidrofolato sintetasa. La combinaci\u00f3n cotrimoxazol (TMP+sulfametoxazol) bloquea dos pasos consecutivos de la s\u00edntesis de folato."},{"n":"46","noShuffle":false,"img":null,"q":"Marca la respuesta INCORRECTA sobre moduladores hormonales:","o":["El raloxifeno puede bloquear la se\u00f1al estrog\u00e9nica a nivel hipot\u00e1lamo-hip\u00f3fisis.","El etinilestradiol es un f\u00e1rmaco semisint\u00e9tico.","La aromatizaci\u00f3n es la transformaci\u00f3n de andr\u00f3genos en estr\u00f3genos.","El tamoxifeno es agonista estrog\u00e9nico sobre el hueso."],"c":1,"e":"El <b>raloxifeno</b> es un SERM: <b>antagonista</b> estrog\u00e9nico en mama y \u00fatero, pero <b>agonista</b> en hueso y con efecto neutro/leve en hipot\u00e1lamo. No bloquea de forma significativa la se\u00f1al hipot\u00e1lamo-hipofisaria. El tamoxifeno s\u00ed tiene efecto agonista \u00f3seo. Etinilestradiol es semisint\u00e9tico."},{"n":"47","noShuffle":false,"img":null,"q":"Se\u00f1ala la respuesta CORRECTA sobre el sistema renina-angiotensina:","o":["Los IECA disminuyen los niveles de bradicinina.","El losart\u00e1n presenta como efecto adverso tos irritativa.","La uni\u00f3n de la angiotensina II al receptor RAT1 causa nefropat\u00eda diab\u00e9tica y aterosclerosis.","El aliskir\u00e9n interacciona con AINEs al inhibir la s\u00edntesis de prostaglandinas."],"c":3,"e":"La activaci\u00f3n del receptor <b>AT1</b> por angiotensina II produce vasoconstricci\u00f3n, inflamaci\u00f3n endotelial, proliferaci\u00f3n celular, fibrosis y retenci\u00f3n de Na+, contribuyendo a la <b>nefropat\u00eda diab\u00e9tica y aterosclerosis</b>. Los IECA aumentan bradicinina (\u2192 tos); losart\u00e1n no produce tos."},{"n":"48","noShuffle":false,"img":null,"q":"La ritodrina:","o":["Es un antagonista de receptores de la oxitocina.","Se utiliza en la prevenci\u00f3n del parto prematuro.","Presenta menos efectos adversos cardiovasculares que los agonistas \u03b22.","\u00datil en la prevenci\u00f3n de la preeclampsia y eclampsia."],"c":2,"e":"<b>Ritodrina</b> es un <b>agonista \u03b22</b> uterino utilizado como tocol\u00edtico en la <b>prevenci\u00f3n del parto prematuro</b> (inhibe las contracciones uterinas). El antagonista de oxitocina es atosiban. Ritodrina tiene m\u00e1s efectos CV que otros tocol\u00edticos. El sulfato de magnesio previene la eclampsia."},{"n":"49","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 terapia antihipertensiva est\u00e1 indicada en la prevenci\u00f3n de accidente cerebrovascular?","o":["IECA + ARA II.","Diur\u00e9tico + IECA.","Diur\u00e9tico + \u03b2-bloqueante + IECA + bloqueante canales de Ca\u00b2\u207a.","\u03b2-bloqueante + IECA + antagonista aldosterona."],"c":2,"e":"La combinaci\u00f3n <b>diur\u00e9tico + IECA</b> ha demostrado en grandes ensayos (PROGRESS) reducir la recurrencia de ACV. La asociaci\u00f3n IECA + ARA-II est\u00e1 contraindicada (doble bloqueo SRAA). La triple/cu\u00e1druple terapia se reserva para HTA resistente."},{"n":"50","noShuffle":false,"img":null,"q":"Se\u00f1ala la respuesta INCORRECTA acerca de la desmopresina:","o":["Indicada para la enuresis nocturna.","Reduce la poliuria en diabetes ins\u00edpida nefrog\u00e9nica resistente a la vasopresina.","Modifica acuaporinas que abre canales de agua.","Tiene una alta actividad antidiur\u00e9tica y baja acci\u00f3n vasoconstrictora."],"c":2,"e":"La <b>desmopresina</b> act\u00faa sobre receptores V2 renales y es eficaz en la diabetes ins\u00edpida <b>central</b>. En la diabetes ins\u00edpida <b>nefrog\u00e9nica</b>, el ri\u00f1\u00f3n no responde a la ADH/desmopresina, por lo que <b>no es \u00fatil</b>. Se trata con tiazidas y AINEs en este caso."},{"n":"51","noShuffle":false,"img":null,"q":"Indica la respuesta INCORRECTA respecto a los antagonistas del Ca\u00b2\u207a:","o":["Las dihidropiridinas causan taquicardias reflejas.","El verapamilo tiene menor efecto antiarr\u00edtmico que diltiazem y dihidropiridinas.","Provocan mayor bloqueo en canales m\u00e1s despolarizados.","El nifedipino es un cronotropo positivo excepto en el sistema OROS."],"c":2,"e":"<b>Verapamilo</b> es el calcioantagonista con <b>mayor efecto antiarr\u00edtmico</b> (nodo AV), m\u00e1s que diltiazem y mucho m\u00e1s que las dihidropiridinas (que apenas tienen efecto sobre el nodo). Verapamilo es de elecci\u00f3n en TSV. Las dihidropiridinas s\u00ed causan taquicardia refleja."},{"n":"52","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l de las siguientes opciones NO es una RAM de los anest\u00e9sicos inhalatorios?","o":["Toxicidad cr\u00f3nica del personal sanitario.","Ataque de porfiria en individuos propensos.","Hipertermia maligna.","Hepatotoxicidad."],"c":2,"e":"Los <b>ataques de porfiria</b> son RAM de barbit\u00faricos (tiopental), no de los anest\u00e9sicos inhalatorios. Los halogenados (halotano, sevoflurano) s\u00ed pueden causar hepatotoxicidad, hipertermia maligna y toxicidad cr\u00f3nica en personal expuesto. El propofol (IV) tampoco precipita porfiria."},{"n":"53","noShuffle":false,"img":null,"q":"Sobre los f\u00e1rmacos que aumentan el AMPc:","o":["La dopamina causa menos taquicardia que la dobutamina.","La milrinona es un agonista \u03b2-adren\u00e9rgico.","La milrinona y enoximona est\u00e1n indicadas en insuficiencia cardiaca grave persistente tras tratamiento con diur\u00e9ticos, vasodilatadores, dobutamina y/o \u03b2-bloqueantes.","La dobutamina presenta toxicidad aumentada por interacci\u00f3n con diur\u00e9ticos del asa y tiazidas."],"c":3,"e":"<b>Milrinona y enoximona</b> son inhibidores de la <b>fosfodiesterasa III</b> (no agonistas \u03b2): aumentan AMPc en cardiomiocitos y m\u00fasculo liso. Se reservan para IC grave refractaria a tratamiento convencional. La milrinona no interacciona con diur\u00e9ticos del asa de forma cl\u00ednicamente relevante."},{"n":"54","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 anest\u00e9sico se administra a pacientes con riesgo de hipotensi\u00f3n o isquemia mioc\u00e1rdica?","o":["Propofol.","Etomidato.","Fentanilo.","Ketamina."],"c":2,"e":"<b>Etomidato</b> es el anest\u00e9sico IV de elecci\u00f3n en pacientes hemodin\u00e1micamente inestables o con riesgo de isquemia mioc\u00e1rdica: m\u00ednimos efectos cardiovasculares, no produce hipotensi\u00f3n. Propofol produce vasodilataci\u00f3n e hipotensi\u00f3n; ketamina aumenta PA y FC; fentanilo es opioide analg\u00e9sico."},{"n":"55","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 f\u00e1rmaco emplear\u00eda para revertir la fibrilaci\u00f3n auricular en las primeras 48h?","o":["Propranolol.","Flecainida.","Amiodarona.","Quinina."],"c":2,"e":"<b>Flecainida</b> (clase IC) es de elecci\u00f3n para la cardioversi\u00f3n farmacol\u00f3gica de FA de inicio reciente (<48h) en pacientes sin cardiopat\u00eda estructural. En pacientes con cardiopat\u00eda, se prefiere amiodarona. Propranolol controla la frecuencia pero no convierte a ritmo sinusal."},{"n":"56","noShuffle":false,"img":null,"q":"Indica la respuesta CORRECTA acerca de los f\u00e1rmacos diur\u00e9ticos:","o":["Los diur\u00e9ticos del asa causan tolerancia por la disminuci\u00f3n de la filtraci\u00f3n glomerular.","Los inhibidores de la s\u00edntesis de prostaglandinas aumentan la acci\u00f3n de la furosemida.","Los edemas y elevados niveles sangu\u00edneos de compuestos nitrogenados causan tolerancia.","Las tiazidas y diur\u00e9ticos del asa provocan tolerancia por aparici\u00f3n de estasis en el t\u00fabulo proximal."],"c":3,"e":"La tolerancia a los diur\u00e9ticos del asa se produce por <b>edemas</b> (que reducen el volumen circulante efectivo y activan el SRAA) y por elevaci\u00f3n de <b>compuestos nitrogenados</b> (uremia). Los AINEs <b>reducen</b> el efecto de la furosemida al inhibir prostaglandinas vasodilatadoras renales."},{"n":"57","noShuffle":false,"img":null,"q":"Se\u00f1ala la respuesta CORRECTA sobre antibi\u00f3ticos:","o":["Las tetraciclinas antagonizan el efecto de los \u03b2-lact\u00e1micos.","La tendinitis es una RAM propia de la sulfametazina.","La doxiciclina y minociclina sufren inactivaci\u00f3n enzim\u00e1tica y bombas de reflujo como mecanismo de resistencia.","El cloranfenicol forma complejos insolubles con el Ca\u00b2\u207a."],"c":1,"e":"Las <b>tetraciclinas</b> son bacteriost\u00e1ticas y pueden <b>antagonizar</b> el efecto de los \u03b2-lact\u00e1micos (bactericidas que necesitan bacterias en crecimiento activo). La tendinitis es RAM de <b>quinolonas</b>; el cloranfenicol no forma complejos con Ca\u00b2\u207a (eso es la tetraciclina con Ca, Mg, Fe)."},{"n":"58","noShuffle":false,"img":null,"q":"Marca la relaci\u00f3n INCORRECTA entre diur\u00e9tico y caracter\u00edstica:","o":["Acetazolamida \u2013 \u00fatil en glaucoma.","Furosemida \u2013 RAM: hiperpotasemia.","Hidroclorotiazida \u2013 inhibici\u00f3n prote\u00edna cotransportadora de Na\u207a-Cl\u207b.","Espironolactona \u2013 afinidad receptores androg\u00e9nicos y gestag\u00e9nicos."],"c":2,"e":"<b>Furosemida</b> causa <b>hipopotasemia</b> (no hiperpotasemia), al aumentar la excreci\u00f3n de K+ en el t\u00fabulo colector. La hiperpotasemia es RAM de los ahorradores de potasio (espironolactona, amilorida). Acetazolamida s\u00ed reduce la producci\u00f3n de humor acuoso; espironolactona s\u00ed tiene afinidad androg\u00e9nica (ginecomastia)."},{"n":"59","noShuffle":false,"img":null,"q":"Marca la relaci\u00f3n CORRECTA respecto a los mecanismos de acci\u00f3n de los antibi\u00f3ticos:","o":["Clindamicina \u2013 subunidad 50S.","Cloranfenicol \u2013 subunidad 30S.","Polimixinas \u2013 inhibici\u00f3n \u00e1cido f\u00f3lico.","Bacitracina \u2013 DNA girasa."],"c":1,"e":"<b>Clindamicina</b> inhibe la s\u00edntesis proteica uni\u00e9ndose a la subunidad <b>50S</b> ribosomal. El cloranfenicol tambi\u00e9n act\u00faa en 50S (no 30S). Los aminogluc\u00f3sidos y tetraciclinas act\u00faan en 30S. Las polimixinas alteran la membrana celular; bacitracina inhibe la s\u00edntesis de pared (no DNA girasa)."},{"n":"60","noShuffle":false,"img":null,"q":"La revisi\u00f3n del tratamiento farmacol\u00f3gico:","o":["No es necesaria realizarla en pacientes cr\u00f3nicos polimedicados.","Permite detectar duplicidad de principios activos, pero no interacciones farmacol\u00f3gicas.","Tiene como objetivo asegurar una utilizaci\u00f3n adecuada y segura de los medicamentos.","Tiene como objetivo favorecer la cascada terap\u00e9utica."],"c":3,"e":"La <b>revisi\u00f3n del tratamiento farmacol\u00f3gico</b> (conciliaci\u00f3n, revisi\u00f3n de la medicaci\u00f3n) tiene como objetivo garantizar una <b>farmacoterapia segura, efectiva y adecuada</b>. Detecta duplicidades, interacciones, errores de dosis e indicaciones incorrectas. Es especialmente importante en polimedicados."},{"n":"61","noShuffle":false,"img":null,"q":"El metronidazol es un inhibidor del metabolismo de la warfarina. \u00bfQu\u00e9 efecto tendr\u00eda en un paciente anticoagulado con warfarina?","o":["Aumento de los niveles plasm\u00e1ticos de warfarina con peligro de hemorragia.","No habr\u00eda ning\u00fan cambio en la concentraci\u00f3n plasm\u00e1tica.","Disminuci\u00f3n de los niveles plasm\u00e1ticos de warfarina con p\u00e9rdida del efecto anticoagulante.","Se producir\u00eda una interacci\u00f3n farmacodin\u00e1mica."],"c":1,"e":"El <b>metronidazol</b> inhibe el CYP2C9, enzima responsable del metabolismo de la <b>warfarina</b>. Al inhibir su metabolismo, los niveles de warfarina <b>aumentan</b>, potenciando el efecto anticoagulante con riesgo de <b>hemorragia</b>. Es una interacci\u00f3n farmacocin\u00e9tica (inhibici\u00f3n enzim\u00e1tica)."},{"n":"62","noShuffle":false,"img":null,"q":"\u00bfCon qu\u00e9 alimento y planta medicinal hay que tener cuidado por sus importantes interacciones con f\u00e1rmacos?","o":["Pomelo e hip\u00e9rico (hierba de San Juan).","Naranja y romero.","Mandarina y tomillo.","Arroz y hierbabuena."],"c":1,"e":"El <b>pomelo</b> inhibe el CYP3A4 intestinal, aumentando la biodisponibilidad de estatinas, calcioantagonistas, etc. El <b>hip\u00e9rico</b> (Hypericum perforatum) <b>induce</b> el CYP3A4, reduciendo niveles de ciclosporina, anticonceptivos, antivirales y warfarina. Ambas son interacciones cl\u00ednicamente relevantes."},{"n":"63","noShuffle":false,"img":null,"q":"Se\u00f1ala la respuesta INCORRECTA sobre el palivizumab:","o":["Es un anticuerpo monoclonal IgG1.","Es un anticuerpo activo frente a una glucoprote\u00edna del virus sincitial respiratorio.","Se utiliza como profilaxis despu\u00e9s de un trasplante hep\u00e1tico debido a insuficiencia hep\u00e1tica inducida por el virus de la hepatitis B.","Es una inmunoglobulina."],"c":3,"e":"<b>Palivizumab</b> es un AcMo IgG1 humanizado que neutraliza la <b>prote\u00edna F del VRS</b>, usado en profilaxis del VRS en neonatos prematuros y cardiopat\u00edas cong\u00e9nitas. <b>No tiene indicaci\u00f3n en hepatitis B</b> ni en trasplante hep\u00e1tico. Para eso se usa inmunoglobulina anti-HBs."},{"n":"64","noShuffle":false,"img":null,"q":"Se\u00f1ale la afirmaci\u00f3n correcta sobre las reacciones adversas de tipo A:","o":["No son predecibles.","No dependen de la dosis.","La incidencia es elevada pero la mortalidad baja.","El tratamiento siempre es retirar el f\u00e1rmaco."],"c":3,"e":"Las RAM <b>tipo A</b> (augmented) son predecibles, dosis-dependientes, frecuentes y con <b>mortalidad baja</b>. Son la consecuencia exagerada del efecto farmacol\u00f3gico. El tratamiento es reducir la dosis, no necesariamente retirar el f\u00e1rmaco. Las tipo B (bizarre) son impredecibles, raras y potencialmente graves."},{"n":"65","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 es cierto sobre la insulina 'Mixtard 30 innolet'?","o":["El tipo de dispositivo viene indicado por el nombre 'Mixtard'.","El tipo de dispositivo viene indicado por el nombre 'innolet'.","El tipo de dispositivo no viene indicado en el nombre.","Ninguna es correcta."],"c":2,"e":"En la nomenclatura de insulinas, <b>'Mixtard'</b> indica el tipo de mezcla (insulina bif\u00e1sica), <b>'30'</b> el porcentaje de insulina r\u00e1pida, e <b>'innolet'</b> indica el tipo de <b>dispositivo</b> (pluma precargada desechable). Cada t\u00e9rmino del nombre aporta informaci\u00f3n espec\u00edfica sobre la presentaci\u00f3n."},{"n":"66","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 es FALSO sobre los parches transd\u00e9rmicos?","o":["Cuando se cambia un parche transd\u00e9rmico no hace falta lavarse las manos porque no queda f\u00e1rmaco.","Los parches transd\u00e9rmicos son formas farmac\u00e9uticas que se aplican sobre la piel, pero la acci\u00f3n del f\u00e1rmaco tiene lugar a nivel sist\u00e9mico.","Los parches transd\u00e9rmicos no se deben cortar.","Existen parches cuyo efecto es t\u00f3pico a nivel del lugar de la piel donde se colocan."],"c":1,"e":"Al retirar o cambiar un parche transd\u00e9rmico <b>siempre hay que lavarse las manos</b>, ya que queda f\u00e1rmaco residual en los dedos que puede absorberse o contaminar a otras personas. Esta es una recomendaci\u00f3n de seguridad fundamental, especialmente con parches de opioides o fentanilo."},{"n":"67","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 es cierto sobre el medicamento gen\u00e9rico?","o":["La biodisponibilidad con su especialidad registrada es exactamente igual.","La biodisponibilidad es an\u00e1loga, variando dentro de unos l\u00edmites aceptados, de forma que su eficacia y seguridad son esencialmente id\u00e9nticas.","Siempre es posible intercambiar en la farmacia la marca por su gen\u00e9rico.","Siempre es posible intercambiar en la farmacia la marca por su gen\u00e9rico a excepci\u00f3n de los inhaladores."],"c":2,"e":"El <b>medicamento gen\u00e9rico</b> debe demostrar <b>bioequivalencia</b> con el original: la biodisponibilidad var\u00eda dentro de un margen aceptado (\u00b120% en AUC/Cmax). No son id\u00e9nticas, sino esencialmente equivalentes. Hay f\u00e1rmacos de estrecho margen terap\u00e9utico (antiepil\u00e9pticos, anticoagulantes) donde la sustituci\u00f3n requiere precauci\u00f3n."},{"n":"68","noShuffle":false,"img":null,"q":"Marca la respuesta INCORRECTA respecto al s\u00edndrome de Stevens-Johnson:","o":["Es una RAM ocasionada por ketoconazol y miconazol.","Comienza con s\u00edntomas similares a la gripe seguidos de sarpullidos dolorosos.","Es una RAM del itraconazol junto a la nefrotoxicidad.","Est\u00e1 relacionada con los derivados az\u00f3licos."],"c":3,"e":"El <b>s\u00edndrome de Stevens-Johnson</b> se asocia a az\u00f3licos, alopurinol, sulfamidas y antiepil\u00e9pticos, pero la <b>nefrotoxicidad</b> es una RAM caracter\u00edstica de la <b>anfotericina B</b>, no del itraconazol. El itraconazol se asocia a hepatotoxicidad e insuficiencia cardiaca."},{"n":"69","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l es la FALSA sobre formas farmac\u00e9uticas?","o":["Jarabe es cualquier forma farmac\u00e9utica l\u00edquida que se administre por v\u00eda oral.","Inyectable es una forma farmac\u00e9utica l\u00edquida est\u00e9ril y apir\u00f3gena.","Polvo y granulado pueden administrarse tal cual o a\u00f1adiendo agua transform\u00e1ndola en forma l\u00edquida.","Existen distintos tipos de comprimidos, como por ejemplo: masticables, multicapa, efervescentes."],"c":1,"e":"El <b>jarabe</b> es una soluci\u00f3n oral azucarada concentrada, no cualquier forma l\u00edquida oral. Existen otras formas l\u00edquidas orales como elixires, suspensiones, soluciones y emulsiones. Definir 'jarabe' como equivalente a cualquier forma l\u00edquida oral es incorrecto."},{"n":"70","noShuffle":false,"img":null,"q":"Se\u00f1ala la relaci\u00f3n CORRECTA entre antif\u00fangico e indicaci\u00f3n:","o":["Nistatina \u2013 v\u00eda sist\u00e9mica.","Flucitosina \u2013 muguet.","Anfotericina B \u2013 afinidad c\u00e9lulas precursoras de queratina.","Griseofulvina \u2013 dermatofitosis."],"c":4,"e":"<b>Griseofulvina</b> tiene alta afinidad por las c\u00e9lulas precursoras de queratina y se concentra en piel, u\u00f1as y pelo, siendo de elecci\u00f3n en <b>dermatofitosis</b> (ti\u00f1as). Nistatina es solo t\u00f3pica; flucitosina trata infecciones sist\u00e9micas por Candida/Cryptococcus; anfotericina B es sist\u00e9mica."},{"n":"71","noShuffle":false,"img":null,"q":"Se\u00f1ala la afirmaci\u00f3n CORRECTA sobre prescripci\u00f3n farmac\u00e9utica:","o":["Toda receta m\u00e9dica da derecho a descuento en el precio del f\u00e1rmaco.","Los pacientes en la seguridad social se incluyen en un TSI u otro en funci\u00f3n de su edad.","Cualquier profesional sanitario puede prescribir medicamentos.","Ninguna es correcta."],"c":4,"e":"Ninguna es correcta: la receta no siempre genera descuento (depende de la financiaci\u00f3n p\u00fablica); el TSI se asigna seg\u00fan la <b>renta</b>, no la edad; y solo los <b>m\u00e9dicos, dentistas y pod\u00f3logos</b> (en su \u00e1mbito) pueden prescribir medicamentos. Las enfermeras pueden prescribir productos de enfermer\u00eda con protocolos."},{"n":"72","noShuffle":false,"img":null,"q":"El mebendazol:","o":["Se asocia al praziquantel en infestaciones por tenias.","Facilita la entrada de Ca\u00b2\u207a y provoca la par\u00e1lisis del par\u00e1sito.","Inhibe la funci\u00f3n de los microt\u00fabulos del par\u00e1sito.","Inhibe la funci\u00f3n de los microt\u00fabulos del par\u00e1sito."],"c":3,"e":"<b>Mebendazol</b> (benzimidazol) inhibe la polimerizaci\u00f3n de la <b>tubulina</b> del par\u00e1sito, bloqueando la formaci\u00f3n de microt\u00fabulos y alterando su metabolismo gluc\u00eddico. El praziquantel facilita la entrada de Ca\u00b2\u207a en platelmintos. Mebendazol se usa en oxiuros, \u00e1scaris y tricocefalos."},{"n":"73","noShuffle":false,"img":null,"q":"Se\u00f1ale la opci\u00f3n CORRECTA sobre farmacovigilancia:","o":["La farmacovigilancia es la actividad de salud p\u00fablica que tiene como objetivo identificar, cuantificar, evaluar y prevenir los riesgos asociados al uso de los medicamentos una vez comercializados.","La farmacovigilancia tiene como objetivo identificar los riesgos antes de autorizar los medicamentos para su uso.","La farmacovigilancia tiene como objetivo identificar los riesgos antes y despu\u00e9s de la autorizaci\u00f3n.","Ninguna es cierta."],"c":1,"e":"La <b>farmacovigilancia</b> (definici\u00f3n OMS) es la ciencia que monitoriza los efectos de los medicamentos <b>una vez comercializados</b> en condiciones reales de uso. La evaluaci\u00f3n previa a la comercializaci\u00f3n corresponde a los ensayos cl\u00ednicos y el proceso de autorizaci\u00f3n regulatoria."},{"n":"74","noShuffle":false,"img":null,"q":"Se\u00f1ale la afirmaci\u00f3n CORRECTA sobre nutrici\u00f3n y dietoterapia:","o":["Tanto la alimentaci\u00f3n como la nutrici\u00f3n son actos voluntarios.","La dietoterapia es el establecimiento de unas pautas alimentarias con el fin de mejorar o prevenir ciertas enfermedades.","Tanto la alimentaci\u00f3n como la nutrici\u00f3n son actos involuntarios.","La dietoterapia tiene como fin mejorar o prevenir solo enfermedades relacionadas con el aparato digestivo."],"c":2,"e":"La <b>dietoterapia</b> es la aplicaci\u00f3n terap\u00e9utica de la alimentaci\u00f3n para <b>prevenir o tratar enfermedades</b> de cualquier tipo (cardiovasculares, diabetes, renal, oncol\u00f3gica, etc.), no solo digestivas. La alimentaci\u00f3n es un acto voluntario; la nutrici\u00f3n es el proceso metab\u00f3lico (involuntario)."},{"n":"75","noShuffle":false,"img":null,"q":"\u00bfQu\u00e9 es cierto sobre el dispositivo de ostom\u00eda mostrado en la imagen?","o":["Es una bolsa abierta de 2 piezas de l\u00e1mina plana recortable.","Es una bolsa cerrada de 2 piezas.","Es una bolsa abierta de una pieza.","Ninguna es cierta."],"c":1,"e":"El dispositivo muestra una <b>bolsa abierta de 2 piezas</b>: placa de fijaci\u00f3n (barrera cut\u00e1nea) separada de la bolsa, con sistema de acoplamiento. La l\u00e1mina <b>recortable</b> permite adaptar el orificio al estoma. Las bolsas cerradas no tienen apertura inferior; las de 1 pieza tienen placa y bolsa integradas."},{"n":"R1","noShuffle":false,"img":null,"q":"\u00bfCu\u00e1l es la preferencia de tratamiento en hepatitis cr\u00f3nica por VHC?","o":["IFN\u03b1-2b.","IFN\u03b1 pegilado + ribavirina.","IFN\u03b1.","Ribavirina."],"c":2,"e":"El est\u00e1ndar hist\u00f3rico del tratamiento de la hepatitis C cr\u00f3nica fue <b>IFN\u03b1 pegilado + ribavirina</b> (antes de la era de los antivirales de acci\u00f3n directa). El IFN\u03b1 pegilado tiene mayor semivida y eficacia que el no pegilado. Actualmente los AAD (sofosbuvir, etc.) han sustituido este esquema."},{"n":"R2","noShuffle":false,"img":null,"q":"La cimetidina NO puede incrementar la actividad de:","o":["Benzodiacepinas.","Propranolol.","Fenito\u00edna.","\u00c1cido nicot\u00ednico."],"c":4,"e":"La <b>cimetidina</b> es inhibidor del CYP450 y aumenta los niveles de f\u00e1rmacos metabolizados por \u00e9l (benzodiacepinas, propranolol, fenito\u00edna, warfarina). El <b>\u00e1cido nicot\u00ednico</b> (vitamina B3/niacina) no se metaboliza significativamente por el CYP450, por lo que cimetidina no incrementa su actividad."},{"n":"R3","noShuffle":false,"img":null,"q":"Se\u00f1ala la relaci\u00f3n INCORRECTA entre antiepil\u00e9ptico y mecanismo de acci\u00f3n:","o":["Primidona \u2013 canales gaba\u00e9rgicos.","Fenobarbital \u2013 canales de sodio voltaje-dependientes.","Etosuximida \u2013 canales de calcio voltaje-dependientes.","Fenito\u00edna \u2013 canales de sodio voltaje-dependientes."],"c":2,"e":"<b>Fenobarbital</b> act\u00faa potenciando los receptores <b>GABA-A</b> (no canales de sodio). Los canales de sodio son la diana de fenito\u00edna, carbamazepina y lamotrigina. Etosuximida bloquea canales de Ca\u00b2\u207a tipo T (ausencias); primidona se metaboliza a fenobarbital, con mecanismo gaba\u00e9rgico."},{"n":"R4","noShuffle":true,"img":null,"q":"Las siguientes caracter\u00edsticas: involuntario, inerva coraz\u00f3n/m\u00fasculo liso/gl\u00e1ndulas, consta de fibra preganglionar y postganglionar, neurotransmisor preganglionar = acetilcolina. Se corresponde con:","o":["Sistema nervioso simp\u00e1tico.","Sistema nervioso som\u00e1tico.","Sistema nervioso parasimp\u00e1tico.","Sistema nervioso simp\u00e1tico y parasimp\u00e1tico."],"c":4,"e":"Todas las caracter\u00edsticas descritas son comunes al <b>sistema nervioso aut\u00f3nomo</b> en general (tanto simp\u00e1tico como parasimp\u00e1tico): involuntario, inerva v\u00edsceras, tiene ganglio con fibra pre y postganglionar, y la acetilcolina es el neurotransmisor preganglionar en ambos. La diferencia est\u00e1 en la postganglionar."},{"n":"R5","noShuffle":false,"img":null,"q":"Indica la afirmaci\u00f3n CORRECTA sobre tipos de f\u00e1rmacos seg\u00fan su actividad intr\u00ednseca:","o":["Un antagonista se une al receptor, pero no produce ning\u00fan cambio al no poseer actividad intr\u00ednseca.","Un agonista inverso da lugar al efecto m\u00e1ximo y presenta elevada eficiencia.","Un agonista parcial produce un efecto farmacol\u00f3gico opuesto al generado por el agonista puro.","Un agonista incrementa la concentraci\u00f3n de otra sustancia por lo que aumenta el efecto de esa otra sustancia."],"c":1,"e":"Un <b>antagonista</b> tiene afinidad por el receptor pero <b>actividad intr\u00ednseca = 0</b>: se une sin producir efecto propio, bloqueando la acci\u00f3n del agonista. El agonista inverso produce efecto opuesto al agonista; el agonista parcial produce efecto subm\u00e1ximo; la definici\u00f3n de agonista en d) es incorrecta."}]};
var IMGS=/*__IMGS_JSON__*/{};

/* ── Estado ── */
var canSave=typeof localStorage!=='undefined';
var saved={};try{saved=JSON.parse(localStorage.getItem(KEY)||'null')||{};}catch(e){}
var state   =saved.state   ||{};
var qOrd    =saved.qOrd    ||{};
var oOrd    =saved.oOrd    ||{};
var starred =saved.starred ||{};
var failHist=saved.failHist||{};  // {qid: count} entre sesiones
var darkMode=saved.dark    ||false;
var timerSec=saved.timerSec||0;   // segundos configurados
var SECS=Object.keys(META.secciones||{});
var fFailed={};
var qIdx={};           // {sec: {n: q}}
var qNums={};          // {sec: {n: numero_correlativo}}
var allOrder=null;     // orden mezclado inter-secciones para pestaña Todos
var activeCid=null;
var currentTab='all';
var currentMode='test';
var saveTimer=null;
var starsFilter=false;
var statsVisible=false;
var timerRunning=false;
var timerRemaining=timerSec;
var timerInterval=null;

/* ── INIT ── */
(function init(){
  SECS.forEach(function(s){fFailed[s]=false;});
  injectSecCSS();
  buildHeader();
  buildTabs();
  buildPanels();
  buildIdx();
  buildNums();
  buildAllOrder();
  SECS.forEach(render);
  renderAll();
  updateScores();
  updateProg();
  applyTheme();
  initTimer();
  setBadge(canSave?'Guardado':'Sin guardado',canSave?'ok':'warn');
  document.addEventListener('keydown',handleKey);
  var si=document.getElementById('search-input');
  if(si)si.addEventListener('keydown',function(e){if(e.key==='Escape'){clearSearch();}});
})();

/* ── CSS dinámico ── */
function injectSecCSS(){
  var css='';
  SECS.forEach(function(s){
    var m=META.secciones[s]||{};
    var c=m.color||'#1a56db',cd=m.colorDim||'#e8f0fe';
    css+='.tab.t-'+s+'.on{background:'+cd+';color:'+c+';border-color:'+c+'}\n';
    css+='.ph.s-'+s+'{border-left:4px solid '+c+'}\n';
    // Variables CSS por sección para el badge coloreado
    css+='#panel-'+s+' .qnum.sec-colored{background:'+cd+';color:'+c+'}\n';
  });
  var st=document.createElement('style');st.textContent=css;document.head.appendChild(st);
}

/* ── Header ── */
function buildHeader(){
  var total=SECS.reduce(function(a,s){return a+(D[s]?D[s].length:0);},0);
  var t=document.getElementById('h-tit');if(t)t.textContent=META.titulo||'Banco MIR';
  var pt=document.getElementById('page-title');if(pt)pt.textContent=META.titulo||'Banco MIR';
  var m=document.getElementById('h-meta');
  if(m){var p=[];if(total)p.push(total+' preguntas');if(META.examen)p.push(META.examen);m.textContent=p.join(' · ');}
  var d=document.getElementById('ph-gdesc');if(d)d.textContent=META.subtitulo||'';
  var r=document.getElementById('sc-rem-all');if(r)r.textContent='○ '+total;
}

/* ── Tabs ── */
function buildTabs(){
  var total=SECS.reduce(function(a,s){return a+(D[s]?D[s].length:0);},0);
  var h='<button class="tab t-all on" onclick="showTab(\'all\')">📋 Todos ('+total+')</button>';
  SECS.forEach(function(s){
    var m=META.secciones[s]||{},cnt=D[s]?D[s].length:0;
    h+='<button class="tab t-'+s+'" onclick="showTab(\''+s+'\')">'+(m.emoji?m.emoji+' ':'')+escH(m.label||s)+' ('+cnt+')</button>';
  });
  var w=document.getElementById('tabs-wrap');if(w)w.innerHTML=h;
}

/* ── Paneles ── */
function buildPanels(){
  var h='<div id="panel-all" class="sec-panel visible"><div id="qs-all"></div><div class="no-results" id="nr-all">No se encontraron preguntas</div></div>';
  SECS.forEach(function(s){
    var m=META.secciones[s]||{},cnt=D[s]?D[s].length:0;
    h+='<div id="panel-'+s+'" class="sec-panel">';
    h+='<div class="ph s-'+s+'">';
    h+='<div class="ph-left">';
    h+='<span class="ph-label">'+(m.emoji?m.emoji+'&nbsp;':'')+escH(m.label||s)+'</span>';
    if(m.desc)h+='<span class="ph-desc">'+escH(m.desc)+'</span>';
    h+='<div class="score-row">';
    h+='<span class="sc ok" id="sc-ok-'+s+'">✓ 0</span>';
    h+='<span class="sc ko" id="sc-ko-'+s+'">✗ 0</span>';
    h+='<span class="sc rem" id="sc-rem-'+s+'">○ '+cnt+'</span>';
    h+='</div></div>';
    h+='<button class="fbtn" id="fb-'+s+'" onclick="toggleFail(\''+s+'\')">Solo falladas</button>';
    h+='</div>';
    h+='<div id="qs-'+s+'"></div>';
    h+='<div class="no-failed" id="nf-'+s+'">Aún no has fallado ninguna 🎉</div>';
    h+='<div class="no-results" id="nr-'+s+'">No se encontraron preguntas</div>';
    h+='<div class="sec-actions">';
    h+='<button class="reset-btn" onclick="resetSec(\''+s+'\')">↺ Reiniciar</button>';
    h+='<button class="nota-btn" onclick="calcNota(\''+s+'\')">✎ Calcular nota</button>';
    h+='</div>';
    h+='<div class="nota-box" id="nota-'+s+'"></div>';
    h+='</div>';
  });
  var pw=document.getElementById('panels-wrap');if(pw)pw.innerHTML=h;
}

/* ── Índice O(1) + numeración fija ── */
function buildIdx(){
  SECS.forEach(function(s){
    qIdx[s]={};
    if(D[s])D[s].forEach(function(q){qIdx[s][q.n]=q;});
  });
}
function buildNums(){
  // Numeración correlativa fija: 1, 2, 3... por sección
  SECS.forEach(function(s){
    qNums[s]={};
    if(D[s])D[s].forEach(function(q,i){qNums[s][q.n]=i+1;});
  });
}
function getNum(sec,n){return qNums[sec]?qNums[sec][n]||n:n;}
function findQ(qid){
  var d=qid.indexOf('-'),s=qid.substring(0,d),n=qid.substring(d+1);
  return(qIdx[s]&&qIdx[s][n])||null;
}
function getSecFromQid(qid){return qid.substring(0,qid.indexOf('-'));}
function getNFromQid(qid){return qid.substring(qid.indexOf('-')+1);}

/* ── Orden inter-secciones para Todos ── */
function buildAllOrder(){
  var all=[];
  SECS.forEach(function(s){if(D[s])D[s].forEach(function(q){all.push({sec:s,n:q.n});});});
  if(!qOrd['__all__'])qOrd['__all__']=shuffle(all.map(function(x){return x.sec+'|'+x.n;}));
  allOrder=qOrd['__all__'].map(function(key){
    var p=key.indexOf('|'),sec=key.substring(0,p),n=key.substring(p+1);
    return{sec:sec,n:n,q:qIdx[sec]&&qIdx[sec][n]};
  }).filter(function(x){return x.q;});
}

/* ── Utilidades ── */
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function getQOrd(s,qs){if(!qOrd[s])qOrd[s]=shuffle(qs.map(function(q){return q.n;}));return qOrd[s];}
function getOOrd(qid){
  var q=findQ(qid);var n=q&&q.o?q.o.length:4;
  if(q&&q.noShuffle){var a=[];for(var i=0;i<n;i++)a.push(i);return a;}
  if(!oOrd[qid]){var a=[];for(var i=0;i<n;i++)a.push(i);oOrd[qid]=shuffle(a);}
  return oOrd[qid];
}
function imgHtml(key){
  if(!IMGS[key]){console.warn('IMGS: clave no encontrada →',key);return'';}
  return'<div class="clinimg-wrap"><img src="'+IMGS[key]+'" class="clinimg" alt="Imagen clínica" loading="lazy"><div class="clinimg-cap">Imagen clínica</div></div>';
}

/* ── localStorage debounce ── */
function saveLocal(){
  if(!canSave)return;
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    try{
      localStorage.setItem(KEY,JSON.stringify({state:state,qOrd:qOrd,oOrd:oOrd,starred:starred,failHist:failHist,dark:darkMode,timerSec:timerSec}));
      setBadge('Guardado','ok');
    }catch(e){setBadge('Sin guardado','warn');}
  },300);
}
function setBadge(t,c){var b=document.getElementById('save-badge');if(b){b.textContent=t;b.className='sbadge '+c;}}

/* ── Construcción de tarjeta ── */
function buildCard(q,sec,inAll,allPos){
  var qid=sec+'-'+q.n;
  var cid=(inAll?'A-':'S-')+qid;
  var num=inAll?(allPos+1):getNum(sec,q.n);
  var oo=getOOrd(qid);
  var sOpts=oo.map(function(i){return q.o[i];});
  var nc=oo.indexOf(q.c-1)+1;
  var ans=state[qid];
  var cc=ans?(ans.r?' answered-ok':' answered-wrong'):'';
  var badgeCls='qnum'+(inAll?'':' sec-colored');
  var h='<div class="qcard s-'+sec+cc+'" id="card-'+cid+'">';
  h+='<div class="qhead" id="h-'+cid+'" data-cid="'+cid+'" data-qid="'+qid+'" data-sec="'+sec+'" onclick="tog(this.dataset.cid)">';
  h+='<span class="'+badgeCls+'">'+num+'</span>';
  h+='<span class="qtxt">'+q.q+(ans?'<span class="atag '+(ans.r?'ok':'ko')+'">'+(ans.r?'✓ acertada':'✗ fallada')+'</span>':'')+'</span>';
  h+='<button class="star-btn'+(starred[qid]?' on':'')+'\" id="star-'+cid+'" onclick="event.stopPropagation();toggleStar(\''+qid+'\')" title="Marcar (S)"><span class="si">\u2606</span><span class="sf">\u2605</span></button>';
  h+='<span class="chev">▾</span>';
  h+='</div>';
  h+='<div class="qbody" id="b-'+cid+'">';
  if(q.img)h+=imgHtml(q.img);
  if(currentMode==='quick'){
    h+='<div class="quick-card"><div class="quick-rc">✓ Respuesta correcta: opción '+nc+' — '+escH(q.o[q.c-1])+'</div><div class="expbox">'+q.e+'</div></div>';
  } else {
    h+='<ul class="opts" id="opts-'+cid+'">';
    h+=sOpts.map(function(o,i){
      var p=i+1,oc='opt';
      if(ans){oc+=' done';if(p===nc)oc+=' correct';else if(p===ans.c&&!ans.r)oc+=' wrong';}
      return'<li class="'+oc+'" data-qid="'+qid+'" data-pos="'+p+'" data-sec="'+sec+'" onclick="answer(this.dataset.qid,+this.dataset.pos,this.dataset.sec)"><span class="onum">'+p+'.</span><span>'+o+'</span></li>';
    }).join('');
    h+='</ul>';
    if(ans){h+='<div class="expbox"><span class="et">'+(ans.r?'✓ Correcto':'✗ Incorrecto — Respuesta correcta: opción '+nc)+'</span>'+q.e+'</div>';}
  }
  h+='</div></div>';
  return h;
}

/* ── Render sección ── */
function render(sec){
  var qs=D[sec];if(!qs)return;
  var ord=getQOrd(sec,qs);
  var sorted=ord.map(function(n){return qIdx[sec]&&qIdx[sec][n];}).filter(Boolean);
  var el=document.getElementById('qs-'+sec);
  if(el)el.innerHTML=sorted.map(function(q){return buildCard(q,sec,false,0);}).join('');
}

/* ── Render Todos (mezcla inter-secciones) ── */
function renderAll(){
  if(!allOrder)buildAllOrder();
  var el=document.getElementById('qs-all');
  if(el)el.innerHTML=allOrder.map(function(x,i){return buildCard(x.q,x.sec,true,i);}).join('');
}

/* ── Toggle open/close ── */
function tog(cid){
  var b=document.getElementById('b-'+cid),h=document.getElementById('h-'+cid);
  if(!b||!h)return;
  var opening=!b.classList.contains('open');
  b.classList.toggle('open');h.classList.toggle('open');
  if(opening){
    if(activeCid&&activeCid!==cid){var pc=document.getElementById('card-'+activeCid);if(pc)pc.classList.remove('kb-focus');}
    activeCid=cid;
    var card=document.getElementById('card-'+cid);if(card)card.classList.add('kb-focus');
  }else{
    if(activeCid===cid){activeCid=null;var card=document.getElementById('card-'+cid);if(card)card.classList.remove('kb-focus');}
  }
}

/* ── Responder ── */
function answer(qid,pos,sec){
  if(state[qid])return;
  var q=findQ(qid);if(!q)return;
  var oo=getOOrd(qid);
  var nc=oo.indexOf(q.c-1)+1;
  var isRight=pos===nc;
  state[qid]={c:pos,r:isRight};
  // Registro de errores
  if(!isRight){failHist[qid]=(failHist[qid]||0)+1;}
  saveLocal();
  // Actualizar todas las instancias del card (panel sección + panel all)
  // Actualizar opciones en todas las instancias del card
  ['A-'+qid,'S-'+qid].forEach(function(cid){
    var optsEl=document.querySelectorAll('#opts-'+cid+' .opt');
    optsEl.forEach(function(el,i){
      el.classList.add('done');
      if(i+1===nc)el.classList.add('correct');
      else if(i+1===pos&&!isRight)el.classList.add('wrong');
    });
    var bdy=document.getElementById('b-'+cid);
    if(bdy){
      var eb=bdy.querySelector('.expbox');
      if(!eb){eb=document.createElement('div');eb.className='expbox';bdy.appendChild(eb);}
      eb.innerHTML='<span class="et">'+(isRight?'✓ Correcto':'✗ Incorrecto — Respuesta correcta: opción '+nc)+'</span>'+q.e;
    }
    var hd=document.getElementById('h-'+cid);
    if(hd){var qt=hd.querySelector('.qtxt');if(qt&&!qt.querySelector('.atag')){var at=document.createElement('span');at.className='atag '+(isRight?'ok':'ko');at.innerHTML=isRight?'✓ acertada':'✗ fallada';qt.appendChild(at);}}
    var card=document.getElementById('card-'+cid);
    if(card)card.classList.add(isRight?'answered-ok':'answered-wrong');
  });
  updateScores();updateProg();
  if(fFailed[sec]&&isRight){
    var fcard=document.getElementById('card-S-'+qid);
    if(fcard)fcard.style.display='none';
    refreshNF(sec);
  }
}

/* ── Estrella ── */
function toggleStar(qid){
  starred[qid]=!starred[qid];
  ['A-'+qid,'S-'+qid].forEach(function(cid){
    var btn=document.getElementById('star-'+cid);
    if(btn)btn.classList.toggle('on',starred[qid]);
  });
  saveLocal();
}
function filterStarred(){
  starsFilter=!starsFilter;
  var btn=document.getElementById('btn-stars');
  if(btn){btn.style.background=starsFilter?'#fef3c7':'';btn.style.fontWeight=starsFilter?'700':'';}
  document.querySelectorAll('.qcard').forEach(function(card){
    if(starsFilter){
      var hd=card.querySelector('.qhead');
      var qid=hd?hd.dataset.qid:'';
      card.style.display=starred[qid]?'':'none';
    }else{card.style.display='';}
  });
}

/* ── Filtro falladas ── */
function refreshNF(sec){
  var c=document.getElementById('qs-'+sec);if(!c||!fFailed[sec])return;
  var n=c.querySelectorAll('.qcard.answered-wrong').length;
  var m=document.getElementById('nf-'+sec);if(m)m.classList.toggle('show',n===0);
}
function toggleFail(sec){
  fFailed[sec]=!fFailed[sec];
  var btn=document.getElementById('fb-'+sec);
  if(btn){btn.classList.toggle('on',fFailed[sec]);btn.textContent=fFailed[sec]?'← Ver todas':'Solo falladas';}
  var c=document.getElementById('qs-'+sec);if(!c)return;
  var nf=0;
  c.querySelectorAll('.qcard').forEach(function(card){
    if(fFailed[sec]){var show=card.classList.contains('answered-wrong');card.style.display=show?'':'none';if(show)nf++;}
    else{card.style.display='';}
  });
  var m=document.getElementById('nf-'+sec);if(m)m.classList.toggle('show',fFailed[sec]&&nf===0);
}

/* ── Scores y progreso ── */
function updateScores(){
  var tok=0,tok2=0,tok3=0;
  SECS.forEach(function(sec){
    var ok=0,ko=0;
    if(D[sec])D[sec].forEach(function(q){var a=state[sec+'-'+q.n];if(a){if(a.r)ok++;else ko++;}});
    var tot=D[sec]?D[sec].length:0,rem=tot-ok-ko;
    tok+=ok;tok2+=ko;tok3+=rem;
    var eok=document.getElementById('sc-ok-'+sec),eko=document.getElementById('sc-ko-'+sec),erm=document.getElementById('sc-rem-'+sec);
    if(eok)eok.textContent='✓ '+ok;if(eko)eko.textContent='✗ '+ko;if(erm)erm.textContent='○ '+rem;
  });
  var eok=document.getElementById('sc-ok-all'),eko=document.getElementById('sc-ko-all'),erm=document.getElementById('sc-rem-all');
  if(eok)eok.textContent='✓ '+tok;if(eko)eko.textContent='✗ '+tok2;if(erm)erm.textContent='○ '+tok3;
}
function updateProg(){
  var total=0,done=Object.keys(state).length;
  SECS.forEach(function(s){if(D[s])total+=D[s].length;});
  var pct=total>0?Math.round(done/total*100):0;
  var bar=document.getElementById('prog-bar');if(bar)bar.style.width=pct+'%';
}

/* ── Tabs ── */
function showTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  var tb=document.querySelector('.tab.t-'+t);if(tb)tb.classList.add('on');
  var mc=document.getElementById('main-cont');if(mc)mc.setAttribute('data-tab',t);
  var panelAll=document.getElementById('panel-all');
  if(panelAll)panelAll.classList.toggle('visible',t==='all');
  SECS.forEach(function(s){
    var p=document.getElementById('panel-'+s);
    if(p)p.classList.toggle('visible',t===s);
  });
  var gnb=document.getElementById('nota-all');if(gnb){gnb.style.display='none';gnb.className='global-nota-box';}
  clearSearch();
}

/* ── Reset ── */
function resetSec(sec){
  if(D[sec])D[sec].forEach(function(q){var qid=sec+'-'+q.n;delete state[qid];delete oOrd[qid];});
  delete qOrd[sec];fFailed[sec]=false;activeCid=null;
  var btn=document.getElementById('fb-'+sec);if(btn){btn.classList.remove('on');btn.textContent='Solo falladas';}
  var nb=document.getElementById('nota-'+sec);if(nb){nb.style.display='none';nb.className='nota-box';}
  saveLocal();render(sec);
  var m=document.getElementById('nf-'+sec);if(m)m.classList.remove('show');
  updateScores();updateProg();
  // Reconstruir panel all para reflejar cambios
  buildAllOrder();renderAll();
}
function resetAll(){
  Object.keys(state).forEach(function(k){delete state[k];});
  Object.keys(oOrd).forEach(function(k){delete oOrd[k];});
  Object.keys(qOrd).forEach(function(k){delete qOrd[k];});
  activeCid=null;starsFilter=false;allOrder=null;
  var bs=document.getElementById('btn-stars');if(bs){bs.style.background='';bs.style.fontWeight='';}
  SECS.forEach(function(s){
    fFailed[s]=false;
    var btn=document.getElementById('fb-'+s);if(btn){btn.classList.remove('on');btn.textContent='Solo falladas';}
    var nb=document.getElementById('nota-'+s);if(nb){nb.style.display='none';nb.className='nota-box';}
  });
  saveLocal();
  SECS.forEach(render);
  buildAllOrder();renderAll();
  var gnb=document.getElementById('nota-all');if(gnb){gnb.style.display='none';gnb.className='global-nota-box';}
  updateScores();updateProg();
}

/* ── Nota y revisión ── */
function buildRevList(sec){
  var qs=D[sec];if(!qs)return'';
  var failed=qs.filter(function(q){var a=state[sec+'-'+q.n];return a&&!a.r;});
  if(!failed.length)return'';
  var html='<div class="review-list"><div class="review-title">📋 '+failed.length+' pregunta'+(failed.length>1?'s':'')+' fallada'+(failed.length>1?'s':'')+' — repasa aquí:</div>';
  failed.forEach(function(q){
    var qid=sec+'-'+q.n;var oo=getOOrd(qid);var nc=oo.indexOf(q.c-1)+1;
    html+='<details class="review-item"><summary><span><b>'+getNum(sec,q.n)+'.</b> '+q.q+'</span></summary>';
    html+='<div class="review-body"><div class="review-ans">✓ Opción '+nc+': '+escH(q.o[q.c-1]||'')+'</div>';
    html+='<div class="expbox">'+q.e+'</div></div></details>';
  });
  return html+'</div>';
}
function calcNota(sec){
  var qs=D[sec];if(!qs)return;
  var total=qs.length,ok=0,ko=0,skip=0;
  qs.forEach(function(q){var a=state[sec+'-'+q.n];if(!a)skip++;else if(a.r)ok++;else ko++;});
  var nota=Math.max(0,(ok-ko/3)/total*10),str=nota.toFixed(2),pass=nota>=5;
  var box=document.getElementById('nota-'+sec);if(!box)return;
  box.className='nota-box '+(pass?'pass':'fail');
  box.innerHTML='<span class="nota-score">'+(pass?'✓':'✗')+' '+str+' / 10</span>'
    +'<div class="nota-detail">Aciertos: '+ok+' | Fallos: '+ko+' | Sin responder: '+skip+'<br>'
    +'('+ok+' − '+ko+'/3) / '+total+' × 10 = '+str+'</div>'
    +buildRevList(sec);
  box.style.display='block';
}
function calcNotaAll(){
  var total=0,ok=0,ko=0,skip=0;
  SECS.forEach(function(sec){
    var qs=D[sec];if(!qs)return;
    total+=qs.length;
    qs.forEach(function(q){var a=state[sec+'-'+q.n];if(!a)skip++;else if(a.r)ok++;else ko++;});
  });
  var nota=Math.max(0,(ok-ko/3)/total*10),str=nota.toFixed(2),pass=nota>=5;
  var box=document.getElementById('nota-all');if(!box)return;
  box.className='global-nota-box '+(pass?'pass':'fail');
  var html='<span class="nota-score">'+(pass?'✓':'✗')+' '+str+' / 10 (global)</span>'
    +'<div class="nota-detail">Aciertos: '+ok+' | Fallos: '+ko+' | Sin responder: '+skip+'<br>'
    +'('+ok+' − '+ko+'/3) / '+total+' × 10 = '+str+'</div>';
  SECS.forEach(function(sec){
    var rv=buildRevList(sec);
    if(rv){var m=META.secciones[sec]||{};html+='<div class="review-sec-label">'+(m.emoji?m.emoji+' ':'')+escH(m.label||sec)+'</div>'+rv;}
  });
  box.innerHTML=html;box.style.display='block';
}

/* ── Estadísticas de errores ── */
function toggleStats(){
  statsVisible=!statsVisible;
  var btn=document.getElementById('btn-stats');
  if(btn){btn.style.background=statsVisible?'var(--ko-bg)':'';btn.style.color=statsVisible?'var(--ko-t)':'';}
  var box=document.getElementById('stats-global');
  if(!box)return;
  if(!statsVisible){box.classList.remove('show');return;}
  var entries=Object.entries(failHist).filter(function(e){return e[1]>0;});
  if(!entries.length){box.innerHTML='<div class="stats-title">📊 Sin errores registrados todavía</div>';box.classList.add('show');return;}
  entries.sort(function(a,b){return b[1]-a[1];});
  var top=entries.slice(0,10);
  var maxV=top[0][1];
  var html='<div class="stats-title">📊 Preguntas más falladas (acumulado entre sesiones)</div>';
  top.forEach(function(e,i){
    var qid=e[0],count=e[1];
    var q=findQ(qid);if(!q)return;
    var sec=getSecFromQid(qid),n=getNFromQid(qid);
    var m=META.secciones[sec]||{};
    var pct=Math.round(count/maxV*100);
    html+='<div class="stats-item">';
    html+='<span class="stats-n" style="min-width:18px;color:var(--ko-t);font-weight:700">'+(i+1)+'.</span>';
    html+='<span class="stats-q">'+(m.emoji?m.emoji+' ':'')+getNum(sec,n)+'. '+q.q.substring(0,60)+(q.q.length>60?'…':'')+'</span>';
    html+='<div class="stats-bar-wrap"><div class="stats-bar" style="width:'+pct+'%"></div></div>';
    html+='<span class="stats-n">'+count+'✗</span>';
    html+='</div>';
  });
  box.innerHTML=html;box.classList.add('show');
}

/* ── Buscador ── */
function onSearch(val){
  var v=val.trim().toLowerCase();
  var clr=document.getElementById('search-clear');
  var cnt=document.getElementById('search-count');
  if(clr)clr.style.display=v?'block':'none';
  var found=0,total=0;
  document.querySelectorAll('.qcard').forEach(function(card){
    total++;
    if(!v){card.classList.remove('search-hidden');found++;}
    else{
      var qtxt=card.querySelector('.qtxt');
      var match=qtxt&&qtxt.textContent.toLowerCase().indexOf(v)!==-1;
      card.classList.toggle('search-hidden',!match);
      if(match)found++;
    }
  });
  if(cnt){
    if(v){cnt.textContent=found+' de '+total+' preguntas';cnt.style.display='block';}
    else{cnt.style.display='none';}
  }
  // Mostrar "sin resultados" por panel
  ['all'].concat(SECS).forEach(function(s){
    var panel=document.getElementById('panel-'+s);if(!panel||!panel.classList.contains('visible'))return;
    var cards=panel.querySelectorAll('.qcard:not(.search-hidden)');
    var nr=document.getElementById('nr-'+s);if(nr)nr.style.display=cards.length===0&&v?'block':'none';
  });
}
function clearSearch(){
  var si=document.getElementById('search-input');if(si)si.value='';
  onSearch('');
}

/* ── Modo ── */
function setMode(mode){
  currentMode=mode;
  document.getElementById('mode-test').classList.toggle('on',mode==='test');
  document.getElementById('mode-quick').classList.toggle('on',mode==='quick');
  // Rerenderizar todo
  SECS.forEach(render);renderAll();
}

/* ── Modo oscuro ── */
function applyTheme(){
  document.documentElement.setAttribute('data-theme',darkMode?'dark':'light');
  var btn=document.getElementById('btn-dark');if(btn)btn.textContent=darkMode?'☀️':'🌙';
}
function toggleDark(){darkMode=!darkMode;applyTheme();saveLocal();}

/* ── Temporizador ── */
function initTimer(){
  timerRemaining=timerSec;
  renderTimer();
  var disp=document.getElementById('timer-display');
  if(disp){
    disp.addEventListener('click',function(){startEditTimer();});
  }
}
function fmtTime(s){
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return h+':'+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;
}
function renderTimer(){
  var disp=document.getElementById('timer-display');
  if(!disp)return;
  disp.textContent=fmtTime(timerRemaining);
  disp.classList.toggle('danger',timerSec>0&&timerRemaining===0);
}
function timerToggle(){
  if(timerRunning){
    clearInterval(timerInterval);timerRunning=false;
    document.getElementById('btn-tplay').textContent='▶';
  }else{
    if(timerRemaining<=0&&timerSec>0)timerRemaining=timerSec;
    timerRunning=true;
    document.getElementById('btn-tplay').textContent='⏸';
    timerInterval=setInterval(function(){
      if(timerRemaining>0){timerRemaining--;renderTimer();}
      else{clearInterval(timerInterval);timerRunning=false;document.getElementById('btn-tplay').textContent='▶';renderTimer();}
    },1000);
  }
}
function timerReset(){
  clearInterval(timerInterval);timerRunning=false;
  timerRemaining=timerSec;
  document.getElementById('btn-tplay').textContent='▶';
  renderTimer();
}
function startEditTimer(){
  var disp=document.getElementById('timer-display');if(!disp)return;
  if(timerRunning){timerToggle();}
  var old=fmtTime(timerRemaining);
  disp.contentEditable='true';disp.classList.add('editing');
  disp.textContent=old;
  disp.focus();
  var range=document.createRange();range.selectNodeContents(disp);
  var sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
  function commit(){
    disp.contentEditable='false';disp.classList.remove('editing');
    var txt=disp.textContent.trim();
    var parts=txt.split(':').map(Number);
    var secs=0;
    if(parts.length===3)secs=parts[0]*3600+parts[1]*60+parts[2];
    else if(parts.length===2)secs=parts[0]*60+parts[1];
    else if(parts.length===1)secs=parts[0]*60;
    if(!isNaN(secs)&&secs>=0){timerSec=secs;timerRemaining=secs;saveLocal();}
    renderTimer();
  }
  disp.addEventListener('blur',commit,{once:true});
  disp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();disp.blur();}});
}

/* ── Helpers cid ── */
function cidToQid(cid){return cid.replace(/^[AS]-/,'');}

/* ── Teclado ── */
function handleKey(e){
  var tg=e.target.tagName;
  if(tg==='INPUT'||tg==='TEXTAREA'||e.target.contentEditable==='true')return;
  var k=e.key;
  if(k>='1'&&k<='5'){
    if(activeCid&&!state[cidToQid(activeCid)]){
      var aqid=cidToQid(activeCid);
      var pos=parseInt(k),q=findQ(aqid);
      if(q&&pos<=q.o.length){e.preventDefault();answer(aqid,pos,getSecFromQid(aqid));}
    }
  }else if(k==='ArrowDown'||k==='ArrowUp'){
    e.preventDefault();navigateQ(k==='ArrowDown'?1:-1);
  }else if(k==='s'||k==='S'){
    if(activeCid)toggleStar(cidToQid(activeCid));
  }
}
function navigateQ(dir){
  var cards=Array.from(document.querySelectorAll('.sec-panel.visible .qcard')).filter(function(c){return c.style.display!=='none'&&!c.classList.contains('search-hidden');});
  var cids=cards.map(function(c){return c.id.replace('card-','');});
  if(!cids.length)return;
  var idx=activeCid?cids.indexOf(activeCid):-1;
  var nidx=Math.max(0,Math.min(cids.length-1,idx+dir));
  var ncid=cids[nidx];if(!ncid||ncid===activeCid)return;
  if(activeCid){var ob=document.getElementById('b-'+activeCid);var oh=document.getElementById('h-'+activeCid);if(ob)ob.classList.remove('open');if(oh)oh.classList.remove('open');var oc=document.getElementById('card-'+activeCid);if(oc)oc.classList.remove('kb-focus');}
  activeCid=ncid;
  var nb=document.getElementById('b-'+ncid);var nh=document.getElementById('h-'+ncid);
  if(nb)nb.classList.add('open');if(nh)nh.classList.add('open');
  var nc2=document.getElementById('card-'+ncid);if(nc2){nc2.classList.add('kb-focus');nc2.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
</script>
